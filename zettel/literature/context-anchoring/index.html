--memory-tool-ai-sekarang-mayoritas-hanya-project-level","line":50,"column":0,"depth":3},"atomic-idea--kecemasan-menutup-chat-sebagai-heuristik-context-leakage":{"type":"header","text":"Atomic idea — kecemasan menutup chat sebagai heuristik context leakage","value":"atomic-idea--kecemasan-menutup-chat-sebagai-heuristik-context-leakage","line":62,"column":0,"depth":3},"atomic-idea--erosi-konteks-ai-adalah-isu-arsitektural-bukan-bug-acak":{"type":"header","text":"Atomic idea — erosi konteks AI adalah isu arsitektural, bukan bug acak","value":"atomic-idea--erosi-konteks-ai-adalah-isu-arsitektural-bukan-bug-acak","line":74,"column":0,"depth":3},"atomic-idea--context-window-besar-tetap-cepat-habis-dalam-praktik-engineering":{"type":"header","text":"Atomic idea — context window besar tetap cepat habis dalam praktik engineering","value":"atomic-idea--context-window-besar-tetap-cepat-habis-dalam-praktik-engineering","line":86,"column":0,"depth":3},"context-anchoring-adalah-memindahkan-konteks-keputusan-dari-chat-yang-sementara-ke-dokumen-yang-hidup":{"type":"header","text":"Context anchoring adalah memindahkan konteks keputusan dari chat yang sementara ke dokumen yang hidup","value":"context-anchoring-adalah-memindahkan-konteks-keputusan-dari-chat-yang-sementara-ke-dokumen-yang-hidup","line":98,"column":0,"depth":3},"kelemahan-kontekstual-ai-adalah-rapuhnya-memori-kerja-model-bukan-kurangnya-kecerdasan":{"type":"header","text":"Kelemahan kontekstual AI adalah rapuhnya memori kerja model, bukan kurangnya \"kecerdasan\"","value":"kelemahan-kontekstual-ai-adalah-rapuhnya-memori-kerja-model-bukan-kurangnya-kecerdasan","line":113,"column":0,"depth":3},"codebase-hanya-menunjukkan-hasil-bukan-rentang-keputusan-yang-dilewati":{"type":"header","text":"Codebase hanya menunjukkan hasil, bukan rentang keputusan yang dilewati","value":"codebase-hanya-menunjukkan-hasil-bukan-rentang-keputusan-yang-dilewati","line":121,"column":0,"depth":3},"external-memory-praktisnya-adalah-feature-document-yang-hidup-bukan-dokumentasi-formal-besar":{"type":"header","text":"External memory praktisnya adalah feature document yang hidup, bukan dokumentasi formal besar","value":"external-memory-praktisnya-adalah-feature-document-yang-hidup-bukan-dokumentasi-formal-besar","line":129,"column":0,"depth":3},"ada-dua-lapisan-konteks-project-level-priming-dan-feature-level-anchoring":{"type":"header","text":"Ada dua lapisan konteks: project-level priming dan feature-level anchoring","value":"ada-dua-lapisan-konteks-project-level-priming-dan-feature-level-anchoring","line":140,"column":0,"depth":3},"praktik-ini-worth-it-ketika-pekerjaan-lintas-sesi-atau-lintas-tim":{"type":"header","text":"Praktik ini worth it ketika pekerjaan lintas sesi atau lintas tim","value":"praktik-ini-worth-it-ketika-pekerjaan-lintas-sesi-atau-lintas-tim","line":149,"column":0,"depth":3},"zettels-yang-dibuat-dari-sumber-ini":{"type":"header","text":"Zettels yang Dibuat dari Sumber Ini","value":"zettels-yang-dibuat-dari-sumber-ini","line":157,"column":0,"depth":2},"pertanyaan-terbuka":{"type":"header","text":"Pertanyaan Terbuka","value":"pertanyaan-terbuka","line":198,"column":0,"depth":2}},"children":[],"parent":"ae3bw38eg7l5p3ntry27x87","data":{}},"body":"\u003ch1 id=\"context-anchoring--memindahkan-konteks-keputusan-dari-chat-ke-dokumen-hidup\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#context-anchoring--memindahkan-konteks-keputusan-dari-chat-ke-dokumen-hidup\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"tentang-sumber\"\u003eTentang Sumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tentang-sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJudul\u003c/strong\u003e: Context Anchoring\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePenulis / Author\u003c/strong\u003e: Rahul Garg\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTahun\u003c/strong\u003e: 2026\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJenis\u003c/strong\u003e: artikel\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLink / ISBN\u003c/strong\u003e: \u003ca href=\"https://martinfowler.com/articles/reduce-friction-ai/context-anchoring.html\"\u003eThoughtworks / Martin Fowler blog\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"catatan-per-gagasan\"\u003eCatatan Per Gagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan-per-gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"paragraf-0--pembuka-mendefinisikan-problem-dan-solusi\"\u003eParagraf 0 — pembuka mendefinisikan problem dan solusi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#paragraf-0--pembuka-mendefinisikan-problem-dan-solusi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eAI conversations are ephemeral by design — decisions made early fade as sessions lengthen, and nothing survives the session boundary. Developers hold on to long conversations not because long sessions are productive, but because the context lives nowhere else. I propose externalizing decision context into a living document — external memory that persists what the context window cannot, turning transient alignment into durable shared understanding.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: pembuka ini langsung menegaskan tesis utama artikel. Percakapan AI itu fana; keputusan awal memudar; developer mempertahankan sesi panjang karena konteks tidak hidup di tempat lain. Solusinya adalah memindahkan konteks keputusan ke dokumen hidup.\u003c/p\u003e\n\u003cp\u003eAtomic idea: percakapan AI bukan tempat penyimpanan keputusan jangka panjang; konteks penting harus die-eksternalisasi.\u003c/p\u003e\n\u003cp\u003eKenapa penting: ini tesis utama seluruh artikel. Semua paragraf berikutnya pada dasarnya menjelaskan dan membuktikan klaim ini.\u003c/p\u003e\n\u003ch3 id=\"atomic-idea--dokumen-bersama-sebagai-external-memory-di-kolaborasi-manusia\"\u003eAtomic idea — dokumen bersama sebagai external memory di kolaborasi manusia\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#atomic-idea--dokumen-bersama-sebagai-external-memory-di-kolaborasi-manusia\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eWhen I work with a colleague on a feature that spans several days, we keep a shared document. Not formal documentation: a working record. What we decided, why, what we rejected, what questions remain open. If either of us is absent for a day, the other picks up where we left off. Neither of us relies on memory alone. The document is our external memory — it persists what individual recall cannot.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePenulis merujuk ini dari paragraf 1.\u003c/p\u003e\n\u003cp\u003eCatatan gue: penulis memulai dari praktik engineering manusia-manusia. Untuk fitur multi-hari, tim secara alami memindahkan memori kerja penting ke dokumen bersama yang merekam keputusan, alasan, penolakan, dan pertanyaan terbuka.\u003c/p\u003e\n\u003cp\u003eAtomic idea: dalam kolaborasi manusia, memori kerja penting secara alami dipindahkan ke dokumen bersama.\u003c/p\u003e\n\u003cp\u003eKenapa penting: ini baseline. Penulis tidak mulai dari AI, tapi dari praktik yang sudah normal. Jadi ketika dia mengusulkan hal serupa untuk AI, itu bukan ide aneh—itu perpanjangan dari kebiasaan engineer.\u003c/p\u003e\n\u003ch3 id=\"atomic-idea--memory-tool-ai-sekarang-mayoritas-hanya-project-level\"\u003eAtomic idea — memory tool AI sekarang mayoritas hanya project-level\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#atomic-idea--memory-tool-ai-sekarang-mayoritas-hanya-project-level\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eWith AI coding assistants, the conversation is still largely the record. Some tools now offer persistent memory features (Claude's project memory, Cursor's rules files, Copilot's workspace indexing) but these operate at the project level, not the feature level. They remember that the project uses Fastify, not that yesterday's session rejected a RetryQueue abstraction for specific reasons.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePenulis merujuk ini dari paragraf 2.\u003c/p\u003e\n\u003cp\u003eCatatan gue: AI tools modern punya “memory”, tapi itu kebanyakan konteks proyek: stack, pola umum, konvensi. Mereka masih gagal menyimpan keputusan fitur spesifik, terutama alasan dan keputusan yang ditolak.\u003c/p\u003e\n\u003cp\u003eAtomic idea: tool memory saat ini gagal menyimpan keputusan fitur; akibatnya developer terjebak mempertahankan chat panjang yang justru makin merusak kualitas konteks.\u003c/p\u003e\n\u003cp\u003eKenapa penting: di sini artikel mulai menyempitkan problem. Bukan sekadar “AI lupa”, tapi AI tidak punya tempat yang tepat untuk menyimpan reasoning fitur.\u003c/p\u003e\n\u003ch3 id=\"atomic-idea--kecemasan-menutup-chat-sebagai-heuristik-context-leakage\"\u003eAtomic idea — kecemasan menutup chat sebagai heuristik context leakage\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#atomic-idea--kecemasan-menutup-chat-sebagai-heuristik-context-leakage\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eHere is a test I find revealing: could I close this conversation right now and start a new one without anxiety? If that question creates discomfort, if I feel I would lose something important — my context is trapped inside a medium that was never designed to preserve it.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePenulis merujuk ini dari paragraf 3.\u003c/p\u003e\n\u003cp\u003eCatatan gue: rasa cemas saat menutup chat adalah sinyal bahwa konteks masih terjebak dalam medium yang salah. Itu berarti Anda sedang bergantung pada percakapan sebagai tempat penyimpanan, bukan sekadar alat berpikir.\u003c/p\u003e\n\u003cp\u003eAtomic idea: rasa cemas saat menutup chat adalah sinyal bahwa konteks masih hidup di tempat yang salah.\u003c/p\u003e\n\u003cp\u003eKenapa penting: ini mengubah problem teknis jadi heuristik praktis. Lo tidak perlu teori token untuk mendeteksi masalah—cukup cek rasa “sayang nutup chat”.\u003c/p\u003e\n\u003ch3 id=\"atomic-idea--erosi-konteks-ai-adalah-isu-arsitektural-bukan-bug-acak\"\u003eAtomic idea — erosi konteks AI adalah isu arsitektural, bukan bug acak\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#atomic-idea--erosi-konteks-ai-adalah-isu-arsitektural-bukan-bug-acak\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThe degradation is not random. It follows from how large language models process context.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePenulis merujuk ini dari paragraf 4.\u003c/p\u003e\n\u003cp\u003eCatatan gue: kehilangan konteks pada AI bukan akibat kebetulan atau limit kecil. Ini adalah konsekuensi arsitektural dari cara LLM memprioritaskan token, sehingga reasoning menengah mudah menguap.\u003c/p\u003e\n\u003cp\u003eAtomic idea: kehilangan konteks pada AI adalah konsekuensi arsitektural, bukan sekadar bug acak.\u003c/p\u003e\n\u003cp\u003eKenapa penting: penulis menggeser pembahasan dari gejala ke mekanisme. Ini penting supaya solusi yang ditawarkan tidak terasa seperti workaround asal-asalan.\u003c/p\u003e\n\u003ch3 id=\"atomic-idea--context-window-besar-tetap-cepat-habis-dalam-praktik-engineering\"\u003eAtomic idea — context window besar tetap cepat habis dalam praktik engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#atomic-idea--context-window-besar-tetap-cepat-habis-dalam-praktik-engineering\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eEvery model has a finite context window: a hard limit on how many tokens it can attend to at once. Current models offer windows ranging from hundreds of thousands to over a million tokens. These numbers sound generous, but a productive development session generates context quickly: code snippets, design discussions, decision rationale, file contents. The window fills faster than most developers expect.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003ePenulis merujuk ini dari paragraf 5.\u003c/p\u003e\n\u003cp\u003eCatatan gue: semua model memang punya context window terbatas. Walau angka token terlihat besar, kerja engineering nyata mengonsumsi konteks sangat cepat karena banyaknya kode, diskusi, dan reasoning.\u003c/p\u003e\n\u003cp\u003eAtomic idea: context window besar tetap cepat habis dalam kerja engineering nyata.\u003c/p\u003e\n\u003cp\u003eKenapa penting: ini membongkar ilusi umum bahwa context window yang besar sudah cukup. Penulis bilang: besar di atas kertas belum tentu besar di praktik.\u003c/p\u003e\n\u003ch3 id=\"context-anchoring-adalah-memindahkan-konteks-keputusan-dari-chat-yang-sementara-ke-dokumen-yang-hidup\"\u003eContext anchoring adalah memindahkan konteks keputusan dari chat yang sementara ke dokumen yang hidup\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#context-anchoring-adalah-memindahkan-konteks-keputusan-dari-chat-yang-sementara-ke-dokumen-yang-hidup\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003ePenulis mengusulkan \"externalizing decision context into a living document\" dan menjadikannya \"external memory\".\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: context anchoring bukan sekadar ringkasan chat atau wiki projek. Ini adalah dokumen fitur yang menyimpan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekeputusan yang dibuat,\u003c/li\u003e\n\u003cli\u003ealasan di baliknya,\u003c/li\u003e\n\u003cli\u003ealternatif yang ditolak,\u003c/li\u003e\n\u003cli\u003econstraint yang harus dihormati,\u003c/li\u003e\n\u003cli\u003eapa yang masih terbuka,\u003c/li\u003e\n\u003cli\u003estatus pekerjaan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni membuat alignment menjadi lebih tahan waktu, karena chat hanya medium berpikir sementara.\u003c/p\u003e\n\u003ch3 id=\"kelemahan-kontekstual-ai-adalah-rapuhnya-memori-kerja-model-bukan-kurangnya-kecerdasan\"\u003eKelemahan kontekstual AI adalah rapuhnya memori kerja model, bukan kurangnya \"kecerdasan\"\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kelemahan-kontekstual-ai-adalah-rapuhnya-memori-kerja-model-bukan-kurangnya-kecerdasan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eErosi konteks AI terjadi karena token window terbatas, diskusi engineering padat, dan model cenderung kehilangan reasoning yang dibahas di tengah sesi.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: masalahnya bukan AI tidak lulus fakta. Yang paling mahal hilang adalah \"why\". Model bisa masih ingat \"pakai PostgreSQL\", tapi lupa kenapa PostgreSQL dipilih dan apa konsekuensi komprominya.\u003c/p\u003e\n\u003cp\u003eIni mirip dengan failure mode di mana junior dev tahu aturan permukaan, tapi tidak paham tujuan desain.\u003c/p\u003e\n\u003ch3 id=\"codebase-hanya-menunjukkan-hasil-bukan-rentang-keputusan-yang-dilewati\"\u003eCodebase hanya menunjukkan hasil, bukan rentang keputusan yang dilewati\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#codebase-hanya-menunjukkan-hasil-bukan-rentang-keputusan-yang-dilewati\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eCodebase memberi jejak outcome. Itu tidak menunjukkan alternatif, pertanyaan terbuka, atau constraint yang melahirkan keputusan.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: ini alasan utama kenapa feature document perlu ada. Code memberi tahu apa yang dipakai, tetapi tidak mengungkap proses berpikir.\u003c/p\u003e\n\u003cp\u003eIni relevan dengan ADR: catatan arsitektur menyimpan reasoning, sedangkan repo hanya menyimpan implementasi. Artikel ini mengajak membuat ADR ringan di level fitur.\u003c/p\u003e\n\u003ch3 id=\"external-memory-praktisnya-adalah-feature-document-yang-hidup-bukan-dokumentasi-formal-besar\"\u003eExternal memory praktisnya adalah feature document yang hidup, bukan dokumentasi formal besar\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#external-memory-praktisnya-adalah-feature-document-yang-hidup-bukan-dokumentasi-formal-besar\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eContoh Notification Service v1 menunjukkan format ringkas:\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cul\u003e\n\u003cli\u003eDecisions (dengan reason dan rejected alternative)\u003c/li\u003e\n\u003cli\u003eConstraints\u003c/li\u003e\n\u003cli\u003eOpen questions\u003c/li\u003e\n\u003cli\u003eState\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCatatan gue: struktur ini membuat dokumen menjadi state container, bukan dokumentasi pasif. Dokumen fitur harus cepat di-update setiap sesi dan mudah dibaca kembali.\u003c/p\u003e\n\u003ch3 id=\"ada-dua-lapisan-konteks-project-level-priming-dan-feature-level-anchoring\"\u003eAda dua lapisan konteks: project-level priming dan feature-level anchoring\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ada-dua-lapisan-konteks-project-level-priming-dan-feature-level-anchoring\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003ePriming document = konteks proyek yang relatif stabil.\nFeature document = konteks fitur yang dinamis.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: dua lapisan ini tidak saling menggantikan. Priming memberi norma dan bahasa, sementara feature document memberi riwayat keputusan lokal.\u003c/p\u003e\n\u003cp\u003eJika hanya ada priming, AI tahu proyek tapi tidak tahu alasan keputusan spesifik. Jika hanya ada feature doc, AI tahu keputusan sekarang tapi tidak tahu nilai-nilai proyek.\u003c/p\u003e\n\u003ch3 id=\"praktik-ini-worth-it-ketika-pekerjaan-lintas-sesi-atau-lintas-tim\"\u003ePraktik ini worth it ketika pekerjaan lintas sesi atau lintas tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#praktik-ini-worth-it-ketika-pekerjaan-lintas-sesi-atau-lintas-tim\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eUji sederhana: \"Could I close this conversation right now and start a new one without anxiety?\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: context anchoring paling berguna untuk fitur multi-hari, fitur yang akan direvisit, atau ketika satu fitur dikerjakan oleh lebih dari satu developer. Untuk quick fix atau debugging singkat, overheadnya bisa lebih besar dari manfaat.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"zettels-yang-dibuat-dari-sumber-ini\"\u003eZettels yang Dibuat dari Sumber Ini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#zettels-yang-dibuat-dari-sumber-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e — Percakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e — Kolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131312\"\u003eAI memory tools sekarang kebanyakan project-level, bukan feature-level\u003c/a\u003e — AI memory tools sekarang kebanyakan project-level, bukan feature-level\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131400\"\u003eKecemasan menutup chat adalah indikator context leakage\u003c/a\u003e — Kecemasan menutup chat adalah indikator context leakage\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131401\"\u003eErosi konteks AI adalah isu arsitektural, bukan bug acak\u003c/a\u003e — Erosi konteks AI adalah isu arsitektural, bukan bug acak\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131402\"\u003eContext window besar tetap cepat habis dalam praktik engineering\u003c/a\u003e — Context window besar tetap cepat habis dalam praktik engineering\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131403\"\u003ePosisi informasi memengaruhi recall; tengah konteks adalah zona rawan hilang\u003c/a\u003e — Posisi informasi memengaruhi recall; tengah konteks adalah zona rawan hilang\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131404\"\u003eDalam erosi konteks, why hilang sebelum what\u003c/a\u003e — Dalam erosi konteks, \"why\" hilang sebelum \"what\"\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131405\"\u003eKalau medium lupa, pindahkan memori ke luar medium itu\u003c/a\u003e — Kalau medium lupa, pindahkan memori ke luar medium itu\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131406\"\u003eSummarization otomatis menyelamatkan what, bukan why\u003c/a\u003e — Summarization otomatis menyelamatkan what, bukan why\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131407\"\u003eAlignment tanpa persistence tetap rapuh\u003c/a\u003e — Alignment tanpa persistence tetap rapuh\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131408\"\u003eContext anchoring adalah durability layer untuk alignment manusia-AI\u003c/a\u003e — Context anchoring adalah durability layer untuk alignment manusia-AI\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131409\"\u003eDecision context harus menjadi external state, bukan jejak chat\u003c/a\u003e — Decision context harus menjadi external state, bukan jejak chat\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131410\"\u003eProject context dan feature context punya fungsi berbeda\u003c/a\u003e — Project context dan feature context punya fungsi berbeda\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131411\"\u003ePriming document adalah memori stabil level proyek\u003c/a\u003e — Priming document adalah memori stabil level proyek\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131412\"\u003eFeature document adalah memori dinamis level pekerjaan yang sedang berlangsung\u003c/a\u003e — Feature document adalah memori dinamis level pekerjaan yang sedang berlangsung\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131413\"\u003eAgar efektif, AI butuh dua lapis konteks: fondasi stabil dan riwayat lokal\u003c/a\u003e — Agar efektif, AI butuh dua lapis konteks: fondasi stabil dan riwayat lokal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131414\"\u003eMembaca codebase tidak sama dengan memahami keputusan\u003c/a\u003e — Membaca codebase tidak sama dengan memahami keputusan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131415\"\u003eCode menyimpan outcome; reasoning dan rejected history tidak tampak di sana\u003c/a\u003e — Code menyimpan outcome; reasoning dan rejected history tidak tampak di sana\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131416\"\u003eFeature document lebih semantik-padatan dan token-efisien daripada mengekstrak reasoning dari kode\u003c/a\u003e — Feature document lebih semantik-padatan dan token-efisien daripada mengekstrak reasoning dari kode\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131417\"\u003eContext anchoring untuk AI adalah versi kontemporer dari kebutuhan yang melahirkan ADR\u003c/a\u003e — Context anchoring untuk AI adalah versi kontemporer dari kebutuhan yang melahirkan ADR\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131418\"\u003eFeature document adalah ADR hidup selama proses, bukan catatan pasca-fakta\u003c/a\u003e — Feature document adalah ADR hidup selama proses, bukan catatan pasca-fakta\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131419\"\u003eFeature document bisa jadi jembatan antara kerja harian dan dokumentasi formal\u003c/a\u003e — Feature document bisa jadi jembatan antara kerja harian dan dokumentasi formal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131420\"\u003eContext anchoring adalah infrastruktur koordinasi tim, bukan hanya memori individu\u003c/a\u003e — Context anchoring adalah infrastruktur koordinasi tim, bukan hanya memori individu\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131421\"\u003eDokumen adalah mekanisme persistence yang menggantikan keterbatasan model\u003c/a\u003e — Dokumen adalah mekanisme persistence yang menggantikan keterbatasan model\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131422\"\u003eSolusi ini bisa dipasang ke contoh praktis, bukan sekadar teori\u003c/a\u003e — Solusi ini bisa dipasang ke contoh praktis, bukan sekadar teori\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131423\"\u003eBegitu keputusan desain terkristal, pindahkan ke dokumen bersama alasannya\u003c/a\u003e — Begitu keputusan desain terkristal, pindahkan ke dokumen bersama alasannya\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131424\"\u003eFeature document yang efektif itu ringkas dan operasional\u003c/a\u003e — Feature document yang efektif itu ringkas dan operasional\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131425\"\u003eStruktur minimal feature document jelas dan praktis\u003c/a\u003e — Struktur minimal feature document jelas dan praktis\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131426\"\u003eNilai anchoring muncul saat sesi baru bisa warm start\u003c/a\u003e — Nilai anchoring muncul saat sesi baru bisa warm start\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131427\"\u003eMaintenance dokumen harus menempel ke ritme kerja alami\u003c/a\u003e — Maintenance dokumen harus menempel ke ritme kerja alami\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131428\"\u003eFeature document memaksa reasoning menjadi lebih jelas\u003c/a\u003e — Feature document memaksa reasoning menjadi lebih jelas\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131429\"\u003eFeature document mengompresi hari kerja menjadi konteks yang bisa diakses ulang cepat\u003c/a\u003e — Feature document mengompresi hari kerja menjadi konteks yang bisa diakses ulang cepat\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131430\"\u003eContext anchoring adalah alat yang harus dikalibrasi, bukan default universal\u003c/a\u003e — Context anchoring adalah alat yang harus dikalibrasi, bukan default universal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131431\"\u003eKebutuhan anchoring naik seiring durasi, revisit, dan jumlah orang\u003c/a\u003e — Kebutuhan anchoring naik seiring durasi, revisit, dan jumlah orang\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131432\"\u003eNilai anchoring ditentukan oleh overhead dokumentasi versus biaya kehilangan konteks\u003c/a\u003e — Nilai anchoring ditentukan oleh overhead dokumentasi versus biaya kehilangan konteks\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131433\"\u003eKeinginan mempertahankan chat adalah indikator anchoring belum cukup\u003c/a\u003e — Keinginan mempertahankan chat adalah indikator anchoring belum cukup\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131434\"\u003eChat adalah medium berpikir; dokumen adalah medium penyimpanan keputusan\u003c/a\u003e — Chat adalah medium berpikir; dokumen adalah medium penyimpanan keputusan\u003c/li\ el\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131312\"\u003eAI memory tools sekarang kebanyakan project-level, bukan feature-level\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131400\"\u003eKecemasan menutup chat adalah indikator context leakage\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131401\"\u003eErosi konteks AI adalah isu arsitektural, bukan bug acak\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131402\"\u003eContext window besar tetap cepat habis dalam praktik engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131403\"\u003ePosisi informasi memengaruhi recall; tengah konteks adalah zona rawan hilang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131404\"\u003eDalam erosi konteks, why hilang sebelum what\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131405\"\u003eKalau medium lupa, pindahkan memori ke luar medium itu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131406\"\u003eSummarization otomatis menyelamatkan what, bukan why\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131407\"\u003eAlignment tanpa persistence tetap rapuh\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131408\"\u003eContext anchoring adalah durability layer untuk alignment manusia-AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131409\"\u003eDecision context harus menjadi external state, bukan jejak chat\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131410\"\u003eProject context dan feature context punya fungsi berbeda\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131411\"\u003ePriming document adalah memori stabil level proyek\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131412\"\u003eFeature document adalah memori dinamis level pekerjaan yang sedang berlangsung\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131413\"\u003eAgar efektif, AI butuh dua lapis konteks: fondasi stabil dan riwayat lokal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131414\"\u003eMembaca codebase tidak sama dengan memahami keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131415\"\u003eCode menyimpan outcome; reasoning dan rejected history tidak tampak di sana\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131416\"\u003eFeature document lebih semantik-padatan dan token-efisien daripada mengekstrak reasoning dari kode\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131417\"\u003eContext anchoring untuk AI adalah versi kontemporer dari kebutuhan yang melahirkan ADR\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131418\"\u003eFeature document adalah ADR hidup selama proses, bukan catatan pasca-fakta\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131419\"\u003eFeature document bisa jadi jembatan antara kerja harian dan dokumentasi formal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131420\"\u003eContext anchoring adalah infrastruktur koordinasi tim, bukan hanya memori individu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131421\"\u003eDokumen adalah mekanisme persistence yang menggantikan keterbatasan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131422\"\u003eSolusi ini bisa dipasang ke contoh praktis, bukan sekadar teori\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131423\"\u003eBegitu keputusan desain terkristal, pindahkan ke dokumen bersama alasannya\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131424\"\u003eFeature document yang efektif itu ringkas dan operasional\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131425\"\u003eStruktur minimal feature document jelas dan praktis\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131426\"\u003eNilai anchoring muncul saat sesi baru bisa warm start\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131427\"\u003eMaintenance dokumen harus menempel ke ritme kerja alami\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131428\"\u003eFeature document memaksa reasoning menjadi lebih jelas\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131429\"\u003eFeature document mengompresi hari kerja menjadi konteks yang bisa diakses ulang cepat\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131430\"\u003eContext anchoring adalah alat yang harus dikalibrasi, bukan default universal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131431\"\u003eKebutuhan anchoring naik seiring durasi, revisit, dan jumlah orang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131432\"\u003eNilai an
