":{"type":"header","text":"Referensi","value":"referensi","line":84,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":92,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"ai-native-adalah-jargon-strategi-yang-menandai-asumsi-desain-ai-sebagai-fondasi-bukan-sekadar-fitur-tambahan\"\u003eAI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native-adalah-jargon-strategi-yang-menandai-asumsi-desain-ai-sebagai-fondasi-bukan-sekadar-fitur-tambahan\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa arti inti AI-native?\u003c/li\u003e\n\u003cli\u003eDi domain mana istilah ini lebih dulu matang?\u003c/li\u003e\n\u003cli\u003eKapan istilah ini masuk ke software engineering secara eksplisit?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI-native bukanlah konsep teknis final seperti TCP/IP atau Kubernetes. Ia adalah jargon transisi paradigma yang dipakai untuk menandai sistem, organisasi, atau workflow yang sejak awal didesain dengan AI sebagai asumsi dasar.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"AI-native is the next natural step, building on and enabled by cloud-native architectures.\" — Google\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"AI native adalah produk, perusahaan, atau workflow yang didesain dari awal dengan AI sebagai komponen inti, bukan fitur tambahan.\" — IBM\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"inti-makna-ai-native\"\u003eInti makna AI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#inti-makna-ai-native\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eAI-native = AI dijadikan asumsi desain basis, bukan add-on.\u003c/li\u003e\n\u003cli\u003eProduk atau workflow AI-native mengasumsikan inference sebagai bagian normal sistem.\u003c/li\u003e\n\u003cli\u003eOrganisasi AI-native merombak pembagian kerja, arsitektur, dan operasional supaya AI ikut berperan sebagai elemen inti.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"batasan-penting\"\u003eBatasan penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#batasan-penting\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eAI-enabled = ada fitur AI.\u003c/li\u003e\n\u003cli\u003eAI-first = AI jadi prioritas.\u003c/li\u003e\n\u003cli\u003eAI-native = sistem/organisasi/workflow dari desain awal memang mengasumsikan AI sebagai bagian inti.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"evolusi-istilah\"\u003eEvolusi istilah\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#evolusi-istilah\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eFase pertama\u003c/strong\u003e: label strategi yang menandai generasi baru sistem/organisasi, mirip analogi cloud-native.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFase kedua\u003c/strong\u003e: investor dan operator produk menggunakan istilah ini untuk membedakan startup atau aplikasi yang lahir dari asumsi AI, bukan incumbent yang menempelkan AI.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFase ketiga\u003c/strong\u003e: istilah ini masuk ke software engineering sebagai \"AI-native engineering\", \"AI-native software delivery\", dan sejenisnya ketika agentic workflows dan spesifikasi workflow mulai matang.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"domain-asal-yang-lebih-matang\"\u003eDomain asal yang lebih matang\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#domain-asal-yang-lebih-matang\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eIstilah ini tampak lebih dulu matang di domain telekomunikasi dan transformasi jaringan, bukan langsung di software engineering.\u003c/li\u003e\n\u003cli\u003eDokumen telekom seperti Google/Intel dan ITU memosisikan \"AI-native telecommunication network\" sebagai jaringan yang mengintegrasikan AI sebagai komponen inti.\u003c/li\u003e\n\u003cli\u003eIni menunjukkan bahwa makna awalnya lebih dekat ke posture arsitektur dan operasi daripada sekadar \"engineer pakai Copilot\".\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"kapan-istilah-masuk-ke-software-engineering\"\u003eKapan istilah masuk ke software engineering?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-istilah-masuk-ke-software-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e2024–2026 adalah periode ledakan penggunaan istilah ini di industri software.\u003c/li\u003e\n\u003cli\u003eMicrosoft WorkLab menyebut \"AI-native companies\" sebagai organisasi yang didesain ulang di sekitar AI.\u003c/li\u003e\n\u003cli\u003eInvestor dan startup thesis seperti a16z mulai memakai istilah \"AI-native applications\" dan \"AI-native workflows\" untuk membedakan produk baru dari incumbent yang hanya menempelkan fitur AI.\u003c/li\u003e\n\u003cli\u003eTahun-tahun berikutnya, istilah ini makin spesifik dipakai sebagai label praktik engineering: \"AI-native engineering\", \"AI-native enterprise\", dan \"AI-native engineering organization\".\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"ai-native-engineering-menurut-thoughtworks\"\u003eAI-native engineering menurut Thoughtworks\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native-engineering-menurut-thoughtworks\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eThoughtworks memformulasikan AI-native engineering sebagai transisi dari \"vibe coding\" ke praktik engineering yang terstruktur. Ini bukan sekadar pakai model atau chat; ini tentang menyusun ulang proses software development menjadi rangkaian yang mencakup:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eagen sebagai layer eksekusi aktif,\u003c/li\u003e\n\u003cli\u003emodel yang dipilih untuk tugas kognitif spesifik,\u003c/li\u003e\n\u003cli\u003emetodologi yang mencegah agent thrashing,\u003c/li\u003e\n\u003cli\u003espesifikasi (spec-to-code) sebagai input utama,\u003c/li\u003e\n\u003cli\u003ekonteks dan guardrail yang melekat ke dalam workflow.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePraktik ini menekankan otomasi yang diaudit, CI/CD yang terintegrasi, test-driven AI, dokumentasi auditable, dan oversight manusia sebagai arsitek/reviewer.\u003c/p\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eKata ini cepat menyebar karena lentur: vendor, investor, engineering org, dan media bisa menggunakannya sesuai tujuan.\u003c/li\u003e\n\u003cli\u003eKetika terlalu cair, AI-native berisiko jadi jargon kosong.\u003c/li\u003e\n\u003cli\u003eIndikator pemahaman yang benar adalah membedakan antara AI-enabled, AI-first, dan AI-native.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"hubungan-dengan-software-architecture\"\u003eHubungan dengan software architecture\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-dengan-software-architecture\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI-native sebaiknya dipahami sebagai label arsitektural dan organisatoris. Ia relevan dalam diskusi arsitektur karena menandai transisi dari desain berbasis komponen tradisional ke desain yang mengasumsikan AI sebagai bagian dari fondasi sistem.\u003c/p\u003e\n\u003ch2 id=\"referensi\"\u003eReferensi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#referensi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eIBM Think — \"What is AI native?\" (Februari 2026): mendefinisikan AI-native sebagai produk, perusahaan, atau workflow yang didesain dari awal dengan AI sebagai komponen inti.\u003c/li\u003e\n\u003cli\u003eMicrosoft WorkLab — \"What Can AI-Native Startups Teach the Rest of Us? A Lot\" (September 2024): melihat AI-native sebagai karakteristik organisasi dan model bisnis yang dibangun ulang di sekitar AI.\u003c/li\u003e\n\u003cli\u003eThoughtworks — \"Beyond vibe coding: The five building blocks of AI-native engineering\" (Maret 2026): menempatkan AI-native engineering sebagai praktik engineering terstruktur dengan agen, model, metodologi, spesifikasi, dan konteks.\u003c/li\u003e\n\u003cli\u003eGoogle Cloud / Intel dan ITU (sumber industri telekom): istilah AI-native dipakai dalam transformasi jaringan sebagai langkah berikut dari cloud-native.\u003c/li\u003e\n\u003cli\u003eDiskusi investor / startup thesis (misalnya a16z): memisahkan AI-native applications dari incumbent AI-enabled product.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055738\"\u003eSoftware architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/a\u003e — Software architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-architecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ejargon (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162253\"\u003eClassic, Modern, dan AI-native Software Engineering adalah tiga mode kerja, bukan disiplin formal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421163750\"\u003eThoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421192951\"\u003eSpec semakin penting ketika AI bisa menulis kode, bukan hanya karena kode lebih murah\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193300\"\u003eModel dan agent adalah fungsi berbeda dalam AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193301\"\u003eMethodology wajib ada supaya AI-assisted development tidak jadi chaos yang efisien\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193756\"\u003eSpec Kit tetap relevan sebagai pipeline spesifikasi meski banyak framework AI-native muncul\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.thoughtworks-ai-native-engineering\"\u003eThoughtworks AI-native engineering sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev"
