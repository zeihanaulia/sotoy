ps":{"note":{"id":"til.coding.valid-palindrome","title":"Valid Palindrom","desc":"","updated":1742443210977,"created":1742352034553,"custom":{},"fname":"til.coding.valid-palindrome","type":"note","vault":{"fsPath":"vault"},"contentHash":"3ebef56a4e4713d346fc9c119a166680","links":[],"anchors":{"memahami-problem":{"type":"header","text":"Memahami Problem","value":"memahami-problem","line":35,"column":0,"depth":2},"1-constrains":{"type":"header","text":"1. Constrains","value":"1-constrains","line":37,"column":0,"depth":3},"2-memahami-deskripsi-soal":{"type":"header","text":"2. Memahami deskripsi soal","value":"2-memahami-deskripsi-soal","line":44,"column":0,"depth":3},"3-memahami-contoh":{"type":"header","text":"3. Memahami contoh","value":"3-memahami-contoh","line":50,"column":0,"depth":3},"solusi":{"type":"header","text":"Solusi","value":"solusi","line":83,"column":0,"depth":2},"brute-force":{"type":"header","text":"Brute Force","value":"brute-force","line":85,"column":0,"depth":3},"two-pointer":{"type":"header","text":"Two Pointer","value":"two-pointer","line":93,"column":0,"depth":3}},"children":["til.coding.valid-palindrome.Code"],"parent":"til.coding","data":{}},"body":"\u003ch1 id=\"valid-palindrom\"\u003eValid Palindrom\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#valid-palindrom\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eA phrase is a \u003cstrong\u003epalindrome\u003c/strong\u003e if, after converting all uppercase letters into lowercase letters and removing all non-alphanumeric characters, it reads the same forward and backward. Alphanumeric characters include letters and numbers.\u003c/p\u003e\n\u003cp\u003eGiven a string s, return true if it is a \u003cstrong\u003epalindrome\u003c/strong\u003e, or false otherwise.\u003c/p\u003e\n\u003cp\u003eExample 1:\u003c/p\u003e\n\u003cp\u003eInput: s = \"A man, a plan, a canal: Panama\"\nOutput: true\nExplanation: \"amanaplanacanalpanama\" is a palindrome.\nExample 2:\u003c/p\u003e\n\u003cp\u003eInput: s = \"race a car\"\nOutput: false\nExplanation: \"raceacar\" is not a palindrome.\nExample 3:\u003c/p\u003e\n\u003cp\u003eInput: s = \" \"\nOutput: true\nExplanation: s is an empty string \"\" after removing non-alphanumeric characters.\nSince an empty string reads the same forward and backward, it is a palindrome.\u003c/p\u003e\n\u003cp\u003eConstraints:\u003c/p\u003e\n\u003cp\u003e1 \u0026#x3C;= s.length \u0026#x3C;= 2 * 105\ns consists only of printable ASCII characters.\u003c/p\u003e\n\u003ch2 id=\"memahami-problem\"\u003eMemahami Problem\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#memahami-problem\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-constrains\"\u003e1. Constrains\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-constrains\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e1 \u0026#x3C;= s.length \u0026#x3C;= 2 * 10^5\u003c/code\u003e lengthnya akalan sampe 200rb karakter\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003es consists only of printable ASCII characters.\u003c/code\u003e string berisi ASCII character, jadi kemungkinan akan ada special charakter.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDari sini gue dapet insight kalau harus remove dulu special karakter dan spasi. agar semuanya jadi alphanumeric jadi ada angka juga.\u003c/p\u003e\n\u003ch3 id=\"2-memahami-deskripsi-soal\"\u003e2. Memahami deskripsi soal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-memahami-deskripsi-soal\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003econverting all uppercase letters into lowercase\u003c/code\u003e convert dulu ke lowercase\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eremoving all non-alphanumeric characters\u003c/code\u003e hapus semua non-alphanumeric karakter\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eit reads the same forward and backward\u003c/code\u003e kalau dibaca dari depan dan belakan terbaca sama\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-memahami-contoh\"\u003e3. Memahami contoh\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-memahami-contoh\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eExample 1\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eInput: s = \"A man, a plan, a canal: Panama\"\nOutput: true\nExplanation: \"amanaplanacanalpanama\" is a palindrome.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003esetelah dihapus semua special character dan di lowercase dan terbaca sama dari depan dan belakang, maka ini disebut palindrome\u003c/p\u003e\n\u003cp\u003eExample 2\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eInput: s = \"race a car\"\nOutput: false\nExplanation: \"raceacar\" is not a palindrome.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eini tidak terbaca sama dari depan dan belakang, maka ini bukan palindrome\u003c/p\u003e\n\u003cp\u003eExample 3\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eInput: s = \" \"\nOutput: true\nExplanation: s is an empty string \"\" after removing non-alphanumeric characters.\nSince an empty string reads the same forward and backward, it is a palindrome.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau string kosong langsung aja return true\u003c/p\u003e\n\u003ch2 id=\"solusi\"\u003eSolusi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#solusi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"brute-force\"\u003eBrute Force\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#brute-force\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eHapus spesial karakter\u003c/li\u003e\n\u003cli\u003eUbah string jadi lower case\u003c/li\u003e\n\u003cli\u003elooping agar bisa dieja dari belakang dan masukan kedalam variable  \u003ccode\u003ebackward\u003c/code\u003e dengan type []string\u003c/li\u003e\n\u003cli\u003eJoin slice strings.Join(backward, \"\")\u003c/li\u003e\n\u003cli\u003eCheck apakah sama jika dibaca forward dan backward\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"two-pointer\"\u003eTwo Pointer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#two-pointer\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKalau menggunakan two pointer, logikanya bisa gini\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eDefinisikan \u003ccode\u003eleft = 0\u003c/code\u003e dan \u003ccode\u003eright = len(s) -\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLoop dengan kondisi \u003ccode\u003eleft \u0026#x3C; right\u003c/code\u003e\n\u003col\u003e\n\u003cli\u003eLoop dengan kondisi \u003ccode\u003eleft \u0026#x3C; righ \u0026#x26;\u0026#x26; s[left]\u003c/code\u003e, Jika bukan alphanumeric geser kiri, \u003ccode\u003eleft++\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLoop dengan kondisi \u003ccode\u003eleft \u0026#x3C; righ \u0026#x26;\u0026#x26; s[right]\u003c/code\u003e, Jika bukan alphanumeric geser kanan, \u003ccode\u003eright++\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eJika \u003ccode\u003es[left]\u003c/code\u003e lowercase tidak sama dengan \u003ccode\u003es[right]\u003c/code\u003e maka return false\u003c/li\u003e\n\u003cli\u003eJika sama, geser kiri dan kanan\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eJika loop selesai return true\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/til.coding.valid-palindrome.Code\"\u003eCode\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","t
