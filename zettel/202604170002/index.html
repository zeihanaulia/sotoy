n","line":14,"column":0,"depth":2},"mengapa-ini-penting":{"type":"header","text":"Mengapa Ini Penting","value":"mengapa-ini-penting","line":25,"column":0,"depth":2},"hubungan-ke-zettel-lain":{"type":"header","text":"Hubungan ke Zettel Lain","value":"hubungan-ke-zettel-lain","line":34,"column":0,"depth":2},"sumber":{"type":"header","text":"Sumber","value":"sumber","line":39,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"ide-yang-tidak-ditulis-sama-dengan-ide-yang-tidak-ada\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ide-yang-tidak-ditulis-sama-dengan-ide-yang-tidak-ada\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSebuah ide yang hanya hidup di kepala memiliki dua kelemahan fatal:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eTidak persisten\u003c/strong\u003e — bisa hilang kapan saja, terutama saat tidur, distraksi, atau waktu berlalu\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTidak bisa dikombinasikan\u003c/strong\u003e — ide di kepala tidak bisa \u003cem\u003ebertemu\u003c/em\u003e dengan ide lain yang juga ada di kepala, tidak seperti dua catatan tertulis yang bisa dibaca bersama dan dibandingkan\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eMenulis bukan hanya merekam — menulis adalah \u003cstrong\u003eeksternalisasi gagasan\u003c/strong\u003e sehingga bisa diperiksa, diperbaiki, dan dihubungkan.\u003c/p\u003e\n\u003cp\u003eLuhmann sendiri bilang: \u003cem\u003e\"We should reflect on whether and how we arrange our notes so that they are available for later access.\"\u003c/em\u003e Kata kunci: \u003cem\u003eavailable for later access\u003c/em\u003e — ide yang tidak ditulis tidak tersedia untuk akses berikutnya.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBanyak orang merasa sudah \"tahu\" sesuatu karena pernah membacanya. Tapi tanpa menuliskannya, pengetahuan itu tidak bisa:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDikritik dan disempurnakan\u003c/li\u003e\n\u003cli\u003eDihubungkan ke pengetahuan lain\u003c/li\u003e\n\u003cli\u003eDigunakan saat insight itu relevan di masa depan\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMengandalkan memori saja = \u003cem\u003eCollector's Fallacy\u003c/em\u003e dalam bentuk digital.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eDidasari oleh \u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — karena otak yang tidak bisa diandalkan untuk menyimpan adalah \u003cem\u003ealasan\u003c/em\u003e mengapa menulis wajib dilakukan setiap kali ada ide\u003c/li\u003e\n\u003cli\u003eMengimplikasikan \u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e — karena ketika ide ditulis, barulah ia bisa \u003cem\u003eterhubung\u003c/em\u003e dengan ide lain dan menciptakan nilai\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.building-a-second-brain\"\u003eLiterature Note — Building a Second Brain\u003c/a\u003e — Bab 3 tentang \"Collector's Fallacy\"\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zettelkasten.de/introduction/\"\u00
