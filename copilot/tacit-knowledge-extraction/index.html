xt":"Kasus: PR endpoint update profile","value":"kasus-pr-endpoint-update-profile","line":195,"column":0,"depth":3},"kasus-debugging-flaky-test":{"type":"header","text":"Kasus: debugging flaky test","value":"kasus-debugging-flaky-test","line":218,"column":0,"depth":3},"hubungan-ke-artefak-lain":{"type":"header","text":"Hubungan ke artefak lain","value":"hubungan-ke-artefak-lain","line":238,"column":0,"depth":2},"langkah-berikutnya":{"type":"header","text":"Langkah berikutnya","value":"langkah-berikutnya","line":246,"column":0,"depth":2},"referensi-dan-bukti-praktik":{"type":"header","text":"Referensi dan bukti praktik","value":"referensi-dan-bukti-praktik","line":254,"column":0,"depth":2}},"children":[],"parent":"notes.copilot","data":{}},"body":"\u003ch1 id=\"ekstraksi-tacit-knowledge-senior-untuk-ai-dan-tim\"\u003eEkstraksi Tacit Knowledge Senior untuk AI dan Tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ekstraksi-tacit-knowledge-senior-untuk-ai-dan-tim\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"tujuan\"\u003eTujuan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tujuan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePanduan ini menjelaskan bagaimana mengambil tacit knowledge senior dari kasus nyata, lalu mentransformasikannya menjadi artefak operasional untuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ecustom instructions (\u003ccode\u003e.github/copilot-instructions.md\u003c/code\u003e, \u003ccode\u003e.github/instructions/*.instructions.md\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eskills (\u003ccode\u003e.github/skills/*/SKILL.md\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eagent behavior (\u003ccode\u003eAGENTS.md\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003ereview rubric dan checklist tim\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDokumentasi ini fokus pada proses, format, dan contoh penerapan yang bisa langsung dipakai tim dan agent.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa ini penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTacit knowledge senior sering berupa judgement cepat yang baru bisa dijelaskan setelah melihat contoh konkret.\u003c/p\u003e\n\u003cp\u003eJika tidak diambil dengan benar, pengetahuan ini akan tetap:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ehanya di kepala senior,\u003c/li\u003e\n\u003cli\u003edijelaskan secara terlalu umum,\u003c/li\u003e\n\u003cli\u003eatau diubah jadi \"best practice\" yang sulit dipakai.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTujuan dokumen ini adalah menjadikan tacit knowledge senior:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003elebih mudah ditangkap,\u003c/li\u003e\n\u003cli\u003elebih mudah dipakai oleh developer lain,\u003c/li\u003e\n\u003cli\u003elebih mudah dijadikan petunjuk untuk AI/agent.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"kapan-gunakan-proses-ini\"\u003eKapan gunakan proses ini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-gunakan-proses-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eGunakan metodologi ini ketika tim ingin:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emembuat custom instruction tim dari pengalaman review nyata,\u003c/li\u003e\n\u003cli\u003emengubah feedback senior menjadi rule yang bisa dijalankan,\u003c/li\u003e\n\u003cli\u003emenulis skill debugging berdasarkan pola senior,\u003c/li\u003e\n\u003cli\u003emendokumentasikan batas penggunaan dan pengecualian suatu aturan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"proses-ekstraksi\"\u003eProses ekstraksi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#proses-ekstraksi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-pilih-kasus-nyata-sebagai-sumber\"\u003e1. Pilih kasus nyata sebagai sumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-pilih-kasus-nyata-sebagai-sumber\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAmbil sumber dari contoh konkret, seperti:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePR yang ditolak atau dikomentari ketat\u003c/li\u003e\n\u003cli\u003ebug atau incident nyata\u003c/li\u003e\n\u003cli\u003etest flaky atau issue yang sulit direproduksi\u003c/li\u003e\n\u003cli\u003edesain arsitektur yang diperdebatkan\u003c/li\u003e\n\u003cli\u003epostmortem setelah produksi\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJangan mulai dari pertanyaan abstrak seperti \"apa best practice?\".\u003c/p\u003e\n\u003ch3 id=\"2-tanyakan-bukti-bukan-teori\"\u003e2. Tanyakan bukti, bukan teori\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-tanyakan-bukti-bukan-teori\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eStrukturkan sesi menggunakan pertanyaan berikut:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eApa yang pertama membuat kamu pause?\u003c/li\u003e\n\u003cli\u003eMasalah apa yang segera terlihat?\u003c/li\u003e\n\u003cli\u003eKenapa ini berisiko?\u003c/li\u003e\n\u003cli\u003eApa failure mode utamanya?\u003c/li\u003e\n\u003cli\u003eKapan ini harus ditolak?\u003c/li\u003e\n\u003cli\u003eKapan ini boleh dilanggar?\u003c/li\u003e\n\u003cli\u003eBukti minimalnya apa untuk menunjukkan aturan ini dipenuhi?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-ubah-jawaban-jadi-unit-kecil\"\u003e3. Ubah jawaban jadi unit kecil\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-ubah-jawaban-jadi-unit-kecil\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAmbil jawaban senior dan pisahkan menjadi unit yang bisa dipakai ulang:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRule\u003c/strong\u003e: aturan operasional yang bisa diikuti.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSmell\u003c/strong\u003e: sinyal awal bahwa sesuatu mungkin salah.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSeverity\u003c/strong\u003e: blocking / important / suggestion.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eException\u003c/strong\u003e: kapan aturan tidak berlaku.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVerification\u003c/strong\u003e: bukti yang harus ada untuk membuktikan kepatuhan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eContoh:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRule: authorization eksplisit wajib pada endpoint yang mengubah state.\u003c/li\u003e\n\u003cli\u003eSmell: auth hanya bergantung pada middleware implisit.\u003c/li\u003e\n\u003cli\u003eSeverity: blocking.\u003c/li\u003e\n\u003cli\u003eException: endpoint public yang sudah terdokumentasi dengan jelas.\u003c/li\u003e\n\u003cli\u003eVerification: diagram jalur auth atau explicit code path.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"4-kalibrasi-dengan-beberapa-kasus\"\u003e4. Kalibrasi dengan beberapa kasus\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-kalibrasi-dengan-beberapa-kasus\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eUji kembali aturan dengan situasi lain:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eendpoint public vs internal\u003c/li\u003e\n\u003cli\u003eservice kecil vs komponen domain\u003c/li\u003e\n\u003cli\u003erefactor kecil vs perubahan besar\u003c/li\u003e\n\u003cli\u003elegacy code vs kode baru\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTujuannya adalah memastikan aturan tidak terlalu kaku dan tidak terlalu longgar.\u003c/p\u003e\n\u003ch3 id=\"5-terjemahkan-ke-artefak-operasional\"\u003e5. Terjemahkan ke artefak operasional\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-terjemahkan-ke-artefak-operasional\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGunakan hasil ekstraksi untuk membuat atau memperbarui:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ecustom instructions\u003c/code\u003e untuk kebijakan yang konsisten\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eskills\u003c/code\u003e untuk workflow investigasi atau debugging\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAGENTS.md\u003c/code\u003e untuk agent behavior dan eskalasi\u003c/li\u003e\n\u003cli\u003ereview rubric atau checklist untuk reviewer manusia\u003c/li\u003e\n\u003cli\u003eonboarding docs untuk mental model tim\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"use-case-yang-paling-cocok\"\u003eUse case yang paling cocok\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#use-case-yang-paling-cocok\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMetode ini paling efektif pada situasi di mana AI output bergantung pada judgement, bukan sekadar kemampuan teknis:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCode generation fitur baru\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eKetika tim sering membuat endpoint/service baru dan output awal harus selaras dengan pola arsitektur, auth, error handling, dan testing tim.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRefactoring yang berisiko jadi liar\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eSaat perubahan perlu terjaga kontrak publik, limited scope, dan tidak boleh menambah abstraksi prematur.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSecurity review yang team-specific\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eSaat threat model tim berbeda dari checklist generik dan aturan autorisasi, multi-tenant, atau audit harus tertanam dalam standar.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCode review dengan severity konsisten\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eSaat review harus memisahkan blocking/important/suggestion agar AI tidak memberi komentar acak.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOnboarding developer dan agent\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eSaat konteks repo besar atau domain kompleks, sehingga dokumentasi saja tidak cukup; harus ada artefak yang bisa dipakai langsung.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBug investigation / systematic debugging\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eSaat masalah memerlukan urutan diagnosis yang konsisten dan bukan sekadar patch cepat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"6-menghubungkan-ke-sumber-dan-bukti-praktik\"\u003e6. Menghubungkan ke sumber dan bukti praktik\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#6-menghubungkan-ke-sumber-dan-bukti-praktik\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBeberapa catatan penting tentang sumber:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eArtikel \u003cem\u003eEncoding Team Standards\u003c/em\u003e memberi kerangka konsep dan contoh ilustratif, bukan demo publik end-to-end.\u003c/li\u003e\n\u003cli\u003eBagian ini lebih berupa praktik yang disarankan dan anekdot, terutama tentang bagaimana tim bisa memindahkan judgement senior ke artefak.\u003c/li\u003e\n\u003cli\u003eGitHub Docs mendukung model ini dengan fitur custom instructions, path-specific instructions, code review customization, dan agent skills.\u003c/li\u003e\n\u003cli\u003eKomunitas \u003ccode\u003eawesome-copilot\u003c/code\u003e menunjukkan banyak contoh nyata penggunaan instruction dan skill, walaupun bukan demo dari narasumber asli.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eReferensi yang langsung mendukung use case ini:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGitHub Docs: \u003cstrong\u003eRepository Custom Instructions\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eGitHub Docs: \u003cstrong\u003eCustom instructions for code review\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eGitHub Docs: \u003cstrong\u003eAgent skills and workflows\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eGitHub \u003ccode\u003eawesome-copilot\u003c/code\u003e examples\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"format-sesi-decision-mining\"\u003eFormat sesi decision mining\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#format-sesi-decision-mining\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eGunakan template ini untuk menjalankan sesi dengan senior:\u003c/p\u003e\n\u003cpre class=\"language-md\"\u003e\u003ccode class=\"language-md\"\u003e\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e#\u003c/span\u003e Tacit Knowledge Extraction Session\u003c/span\u003e\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e Context\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Area: [API / review / debugging / testing / architecture]\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Case: [PR / bug / incident / design change]\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Senior: [name]\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Facilitator: [name]\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 1. Trigger\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Apa yang pertama membuat kamu pause?\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Sinyal apa yang terlihat \"salah\"?\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 2. Diagnosis\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Masalah ini masuk kategori apa?\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Failure mode utamanya apa?\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 3. Severity\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Blocking / Important / Suggestion?\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Kenapa?\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 4. Rule extraction\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Jika ini dijadikan aturan tim, bunyinya apa?\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Apakah ini hard rule atau default heuristic?\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 5. Exceptions\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Kapan aturan ini boleh dilanggar?\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Apa syaratnya?\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 6. Verification\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Evidence minimum apa yang menunjukkan aturan ini dipatuhi?\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e Test/check apa yang wajib ada?\n\n\u003cspan class=\"token title important\"\u003e\u003cspan class=\"token punctuation\"\u003e##\u003c/span\u003e 7. Artifact mapping\u003c/span\u003e\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e custom instruction:\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e skill/workflow:\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e review rubric:\n\u003cspan class=\"token list punctuation\"\u003e-\u003c/span\u003e onboarding doc:\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"contoh-konkret\"\u003eContoh konkret\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-konkret\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"kasus-pr-endpoint-update-profile\"\u003eKasus: PR endpoint update profile\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kasus-pr-endpoint-update-profile\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSenior komentar:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003econtroller terlalu gemuk\u003c/li\u003e\n\u003cli\u003eauth tidak eksplisit\u003c/li\u003e\n\u003cli\u003eresponse contract berubah tanpa diskusi\u003c/li\u003e\n\u003cli\u003etest hanya happy path\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHasil ekstraksi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRule: authorization eksplisit wajib untuk state-changing endpoint.\u003c/li\u003e\n\u003cli\u003eSmell: auth tersembunyi lewat middleware implisit.\u003c/li\u003e\n\u003cli\u003eSeverity: blocking.\u003c/li\u003e\n\u003cli\u003eException: public endpoint yang terdokumentasi jelas.\u003c/li\u003e\n\u003cli\u003eVerification: dokumentasi jalur auth dan hasil test failure path.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eArtefak operasional:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ecustom instruction: \u003ccode\u003eAuthorization harus eksplisit pada endpoint state-changing.\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003ereview rubric: \u003ccode\u003ePeriksa apakah auth path jelas dan contract response tidak berubah diam-diam.\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eonboarding note: \u003ccode\u003eMengapa auth implicit berbahaya di API.\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"kasus-debugging-flaky-test\"\u003eKasus: debugging flaky test\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kasus-debugging-flaky-test\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSenior workflow:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003epastikan reproduksi stabil dulu\u003c/li\u003e\n\u003cli\u003esempitkan layer sebelum edit code\u003c/li\u003e\n\u003cli\u003ecari bukti sebelum membuat hipotesis\u003c/li\u003e\n\u003cli\u003ehindari perubahan ganda\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHasil ekstraksi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRule: mulai dari reproduksi, bukan refactor.\u003c/li\u003e\n\u003cli\u003eSmell: symptom berubah-ubah dan dependent async/shared state.\u003c/li\u003e\n\u003cli\u003eVerification: proof of concept kecil yang menegaskan hipotesis.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eArtefak operasional:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eskill: \u003ccode\u003esystematic-debugging\u003c/code\u003e untuk investigative workflow.\u003c/li\u003e\n\u003cli\u003eAGENTS.md: \u003ccode\u003eStop and ask if blast radius terlalu besar atau ketika kontrak publik berubah.\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"hubungan-ke-artefak-lain\"\u003eHubungan ke artefak lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-artefak-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192040\"\u003eExecutable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior\u003c/a\u003e — executable governance di Copilot\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419194901\"\u003eTacit knowledge senior diubah jadi artefak operasional untuk AI dan tim\u003c/a\u003e — tacit knowledge senior jadi artefak operasional\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192541\"\u003ePraktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/a\u003e — instruksi standar tim untuk AI: role, konteks, prioritas, output\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.copilot.custom-instructions-best-practices\"\u003eBest Practices for Writing Copilot Custom Instructions\u003c/a\u003e — struktur dan jenis file instruksi Copilot\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.encoding-team-standards\"\u003eEncoding Team Standards — executable AI instruction untuk konsistensi tim\u003c/a\u003e — literatur dasar executable AI instruction\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"langkah-berikutnya\"\u003eLangkah berikutnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#langkah-berikutnya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003ePilih satu kasus nyata dari PR atau bug.\u003c/li\u003e\n\u003cli\u003eJalankan sesi decision mining dengan senior.\u003c/li\u003e\n\u003cli\u003eTuliskan hasilnya sebagai aturan kecil.\u003c/li\u003e\n\u003cli\u003eTerapkan langsung ke \u003ccode\u003ecustom instructions\u003c/code\u003e atau \u003ccode\u003eskill\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eValidasi dengan developer lain atau agent.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"referensi-dan-bukti-praktik\"\u003eReferensi dan bukti praktik\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#referensi-dan-bukti-praktik\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eArtikel \u003cem\u003eEncoding Team Standards\u003c/em\u003e memberi kerangka dan ilustrasi use case; bukan demo publik end-to-end.\u003c/li\u003e\n\u003cli\u003eGitHub Docs mendukung penerapan ini melalui custom instructions, path-specific instructions, code review customization, dan agent skills.\u003c/li\u003e\n\u003cli\u003eRepository \u003ccode\u003egithub/awesome-copilot\u003c/code\u003e menunjukkan praktik nyata custom instructions dan skills, walau bukan demo dari penulis artikel.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSumber penting:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://martinfowler.com/articles/reduce-friction-ai/encoding-team-standards.html\"\u003ehttps://martinfowler.com/articles/reduce-friction-ai/encoding-team-standards.html\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://docs.github.com/en/copilot/how-tos/configure-custom-instructions/add-repository-instructions\"\u003ehttps://docs.github.com/en/copilot/how-tos/configure-custom-instructions/add-repository-instructions\u003c/a\u003e\u003
