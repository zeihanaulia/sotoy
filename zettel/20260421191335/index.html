:false,"sameFile":false,"to":{"fname":"zettel.20260421184845"}},{"type":"wiki","from":{"fname":"zettel.20260421191335","id":"zettel.20260421191335","vaultName":"vault"},"value":"zettel.20260421184757","position":{"start":{"line":60,"column":3,"offset":2878},"end":{"line":60,"column":28,"offset":2903},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260421184757"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":140,"column":3,"offset":12916},"end":{"line":140,"column":28,"offset":12941},"indent":[]},"value":"zettel.20260421191335"},{"from":{"fname":"zettel.20260421184801","id":"zettel.20260421184801","vaultName":"vault"},"type":"backlink","position":{"start":{"line":28,"column":3,"offset":1056},"end":{"line":28,"column":28,"offset":1081},"indent":[]},"value":"zettel.20260421191335"},{"from":{"fname":"zettel.moc.ai-native","id":"zettel.moc.ai-native","vaultName":"vault"},"type":"backlink","position":{"start":{"line":58,"column":3,"offset":5112},"end":{"line":58,"column":28,"offset":5137},"indent":[]},"value":"zettel.20260421191335"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":18,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":24,"column":0,"depth":2},"penjelasan":{"type":"header","text":"Penjelasan","value":"penjelasan","line":28,"column":0,"depth":2},"contoh-pendek":{"type":"header","text":"Contoh pendek","value":"contoh-pendek","line":45,"column":0,"depth":2},"implikasi":{"type":"header","text":"Implikasi","value":"implikasi","line":56,"column":0,"depth":2},"referensi":{"type":"header","text":"Referensi","value":"referensi","line":63,"column":0,"depth":2},"contoh-nyata":{"type":"header","text":"Contoh nyata","value":"contoh-nyata","line":68,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":72,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"pre-mortem-bisa-dilakukan-tanpa-event-nyata-dengan-asumsi-terstruktur-bukan-nebak-nebak-acak\"\u003ePre-mortem bisa dilakukan tanpa event nyata dengan asumsi terstruktur, bukan nebak-nebak acak\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pre-mortem-bisa-dilakukan-tanpa-event-nyata-dengan-asumsi-terstruktur-bukan-nebak-nebak-acak\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBagaimana melakukan pre-mortem ketika belum pernah ada kegagalan sejenis?\u003c/li\u003e\n\u003cli\u003eApakah pre-mortem pada akhirnya cuma menebak dengan asumsi?\u003c/li\u003e\n\u003cli\u003eMetode apa yang membuat pre-mortem tetap grounded meski tanpa point data historis?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePre-mortem pada kode atau design baru bukan sekadar nebak-nebak. Ia adalah proses asumsi terstruktur yang menggunakan evidence, pola risiko, dan analogi domain untuk menguji kegagalan potensial.\u003c/p\u003e\n\u003ch2 id=\"penjelasan\"\u003ePenjelasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#penjelasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika belum ada event nyata, pre-mortem tetap valid dengan cara ini:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emulailah dari outcome yang jelas: \"apa saja yang membuat ini gagal?\"\u003c/li\u003e\n\u003cli\u003egunakan evidence yang tersedia: domain, teknologi, user behaviour, dependency, regulasi, dan pengalaman tim.\u003c/li\u003e\n\u003cli\u003episahkan asumsi eksplisit dari tebakan kabur: tulis \"saya asumsikan X\" dan cari alasan kenapa X mungkin benar.\u003c/li\u003e\n\u003cli\u003elihat pola risiko umum di area serupa: deployment, auth, data integrity, performance, maintenance.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJadi bukan \"kita tebak kalau ini akan gagal\". Yang dilakukan adalah:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emendefinisikan kegagalan potensial,\u003c/li\u003e\n\u003cli\u003ememetakan jalur yang bisa mencapainya,\u003c/li\u003e\n\u003cli\u003elalu mencari bukti atau counter-evidence untuk setiap jalur.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKalau validasi penuh tidak tersedia, pre-mortem menghasilkan daftar risiko yang terstruktur, bukan prediksi pasti.\u003c/p\u003e\n\u003ch2 id=\"contoh-pendek\"\u003eContoh pendek\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-pendek\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eUntuk fitur baru upload file:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003easumsi: file size selalu kecil\u003c/li\u003e\n\u003cli\u003erisiko: user mengunggah file besar dan menyebabkan OOM\u003c/li\u003e\n\u003cli\u003ebukti: tidak ada limit di UI, sistem ukur file belum dipasang\u003c/li\u003e\n\u003cli\u003emitigasi: tetapkan limit, tambahkan validation, observability untuk ukuran upload\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDi sini, pre-mortem tidak bergantung pada event \"server pernah OOM\". Ia hanya pakai pola risiko dan asumsi yang bisa diuji.\u003c/p\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003ePre-mortem tetap bisa dilakukan meski sistem belum pernah gagal.\u003c/li\u003e\n\u003cli\u003eKualitasnya tergantung pada struktur pertanyaan dan evidence, bukan pada data kegagalan historis.\u003c/li\u003e\n\u003cli\u003eHal yang paling berbahaya adalah pre-mortem yang hanya berisi \"kayaknya bisa gagal kalau...\" tanpa bukti atau pola.\u003c/li\u003e\n\u003cli\u003eJika tim punya pengalaman serupa di domain lain, itu lebih berharga daripada data historis langsung.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"referensi\"\u003eReferensi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#referensi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eGary Klein, \"Performing a Project Premortem\", Harvard Business Review, September 2007 — sumber primer pre-mortem modern. \u003ca href=\"https://hbr.org/2007/09/performing-a-project-premortem\"\u003ehttps://hbr.org/2007/09/performing-a-project-premortem\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eWikipedia, \"Pre-mortem\" — ringkasan konsep dan hubungan dengan prospective hindsight. \u003ca href=\"https://en.wikipedia.org/wiki/Premortem\"\u003ehttps://en.wikipedia.org/wiki/Premortem\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"contoh-nyata\"\u003eContoh nyata\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-nyata\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTim product launch yang menggunakan pre-mortem sering menemukan risiko seperti dependency pihak ketiga down, error message yang memicu overload helpdesk, dan asumsi performa yang terlalu optimistis sebelum ada kegagalan nyata.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421184801\"\u003ePre-mortem analysis memaksa perencanaan menilai hasil dengan asumsi kegagalan\u003c/a\u003e — Pre-mortem analysis memaksa perencanaan menilai hasil dengan asumsi kegagalan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421184845\"\u003eSocratic questioning mengungkap asumsi lewat pertanyaan terarah\u003c/a\u003e — Socratic questioning mengungkap asumsi lewat pertanyaan terarah\u003c/li\u003e\n\u003cli\u003
