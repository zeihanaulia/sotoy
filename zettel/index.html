20131407\"\u003eAlignment tanpa persistence tetap rapuh\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420091101\"\u003eAplikasi juga arsitektur delivery, consistency, dan frontend structure\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085714\"\u003eAplikasi tetap ada karena boundary adalah unit sosial dan ekonomi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420062009\"\u003eArchitect bukan jabatan; dia adalah kemampuan judgment desain\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061530\"\u003eArchitecture adalah seni memilah keputusan penting\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420060847\"\u003eArsitektur adalah penentu biaya perubahan masa depan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420060928\"\u003eArsitektur bukan kasta; dia harus hidup bersama kode\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061356\"\u003eArsitektur bukan sekadar keputusan awal proyek\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061259\"\u003eArsitektur nyata adalah shared understanding expert developer\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131423\"\u003eBegitu keputusan desain terkristal, pindahkan ke dokumen bersama alasannya\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085507\"\u003eBoundary aplikasi adalah konstruksi sosial, bukan fakta alam\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131434\"\u003eChat adalah medium berpikir; dokumen adalah medium penyimpanan keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131415\"\u003eCode menyimpan outcome; reasoning dan rejected history tidak tampak di sana\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131430\"\u003eContext anchoring adalah alat yang harus dikalibrasi, bukan default universal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131408\"\u003eContext anchoring adalah durability layer untuk alignment manusia-AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131420\"\u003eContext anchoring adalah infrastruktur koordinasi tim, bukan hanya memori individu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131417\"\u003eContext anchoring untuk AI adalah versi kontemporer dari kebutuhan yang melahirkan ADR\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131402\"\u003eContext window besar tetap cepat habis dalam praktik engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420062120\"\u003eCruft adalah utang kebingungan yang memperlambat perubahan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131404\"\u003eDalam erosi konteks, why hilang sebelum what\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131409\"\u003eDecision context harus menjadi external state, bukan jejak chat\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131421\"\u003eDokumen adalah mekanisme persistence yang menggantikan keterbatasan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092900\"\u003eEnterprise architects lebih efektif ketika ikut masuk ke tim pengembangan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092901\"\u003eEnterprise architecture Fowler: organisasi, funding, komunikasi, dan learning system\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420091825\"\u003eEnterprise architecture adalah soal apakah biaya koordinasi pusat layak\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420091306\"\u003eEnterprise architecture bergeser ke koordinasi antar-pulau, bukan lagi modularitas kode\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131401\"\u003eErosi konteks AI adalah isu arsitektural, bukan bug acak\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192239\"\u003eExecutable governance adalah standar tim yang bukan hanya ditulis, tapi dijalankan oleh AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192040\"\u003eExecutable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131418\"\u003eFeature document adalah ADR hidup selama proses, bukan catatan pasca-fakta\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131412\"\u003eFeature document adalah memori dinamis level pekerjaan yang sedang berlangsung\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131419\"\u003eFeature document bisa jadi jembatan antara kerja harian dan dokumentasi formal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131416\"\u003eFeature document lebih semantik-padatan dan token-efisien daripada mengekstrak reasoning dari kode\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131428\"\u003eFeature document memaksa reasoning menjadi lebih jelas\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131429\"\u003eFeature document mengompresi hari kerja menjadi konteks yang bisa diakses ulang cepat\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131424\"\u003eFeature document yang efektif itu ringkas dan operasional\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092652\"\u003eFowler condong ke desentralisasi tetapi tetap waspada terhadap chaos\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061232\"\u003eFowler memulai definisi arsitektur dengan kritik terhadap ‘fundamental organization’\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420090327\"\u003eGUI Architectures: pattern harus diikuti prinsip, bukan label familiar\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061007\"\u003eHalaman Software Architecture Guide adalah peta keputusan, bukan tutorial implementasi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420062331\"\u003eInternal quality adalah infrastruktur kecepatan delivery\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419190800\"\u003eJudgement senior harus di-infrastrukturkan sebagai executable instruction AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131405\"\u003eKalau medium lupa, pindahkan memori ke luar medium itu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131435\"\u003eKeberhasilan context anchoring diukur dari murahnya restart\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131431\"\u003eKebutuhan anchoring naik seiring durasi, revisit, dan jumlah orang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131400\"\u003eKecemasan menutup chat adalah indikator context leakage\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131433\"\u003eKeinginan mempertahankan chat adalah indikator anchoring belum cukup\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085349\"\u003eKeputusan arsitektural penting bergantung pada skala sistem\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/ae3bw38eg7l5p3ntry27x87\"\u003eLiterature\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131427\"\u003eMaintenance dokumen harus menempel ke ritme kerja alami\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131414\"\u003eMembaca codebase tidak sama dengan memahami keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420090203\"\u003eMicro Frontends menunjukkan arsitektur juga soal koordinasi tim\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085834\"\u003eMicroservices adalah trade-off machine, bukan arsitektur modern otomatis\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/6ie1ckeu7jfftzq54vt9e44\"\u003eMoc\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420090017\"\u003eModernisasi yang matang adalah displacement bertahap, bukan rewrite besar\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131432\"\u003eNilai anchoring ditentukan oleh overhead dokumentasi versus biaya kehilangan konteks\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131426\"\u003eNilai anchoring muncul saat sesi baru bisa warm start\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193542\"\u003eOnboarding docs penting untuk agent karena mereka menyediakan mental model repo\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092459\"\u003eOtonomi tanpa koordinasi di EA berubah jadi fragmentasi mahal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193541\"\u003ePlan AI bukan sekadar to-do list; ia adalah artefak governance operasional\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192952\"\u003ePlan, onboarding, dan tracker adalah artefak governance AI, bukan dokumentasi pasif\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131403\"\u003ePosisi informasi memengaruhi recall; tengah konteks adalah zona rawan hilang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192541\"\u003ePraktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420090829\"\u003ePresentation Domain Data Layering adalah baseline, bukan arsitektur kuno\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131411\"\u003ePriming document adalah memori stabil level proyek\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131410\"\u003eProject context dan feature context punya fungsi berbeda\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055414\"\u003eSatu keputusan per ADR menjaga batasan dan riwayat yang bersih\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092009\"\u003eSentralisasi total di EA melambatkan keputusan dan kehilangan konteks lokal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420090627\"\u003eServerless mengurangi operasi tapi menambah ketergantungan platform\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085220\"\u003eShortcut kualitas adalah pinjaman dari masa depan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055738\"\u003eSoftware architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131422\"\u003eSolusi ini bisa dipasang ke contoh praktis, bukan sekadar teori\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131425\"\u003eStruktur minimal feature document jelas dan praktis\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131406\"\u003eSummarization otomatis menyelamatkan what, bukan why\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419194901\"\u003eTacit knowledge senior diubah jadi artefak operasional untuk AI dan tim\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193543\"\u003eTracker adalah artefak observabilitas untuk workflow AI dan developer\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #de9dac;\" href=\"/sotoy/notes/tags.zettelkasten\"\u003ezettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ffbacd;\" href=\"/sotoy/notes/tags.index\"\u003eindex\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.zettelkasten.cara-pakai\"\u003eCara Pakai Zettelkasten di Project Ini\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent
