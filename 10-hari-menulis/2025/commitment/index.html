ps":{"note":{"id":"notes.10-hari-menulis.2025.commitment","title":"Di Antara Ribuan","desc":"","updated":1742437722882,"created":1742419698243,"custom":{},"fname":"notes.10-hari-menulis.2025.commitment","type":"note","vault":{"fsPath":"vault"},"contentHash":"593358a203089fbd264692648793b704","links":[],"anchors":{"alasan---rasa-kecewa-dan-trauma":{"type":"header","text":"Alasan - Rasa Kecewa dan Trauma","value":"alasan---rasa-kecewa-dan-trauma","line":27,"column":0,"depth":2},"masa-lalu":{"type":"header","text":"Masa Lalu","value":"masa-lalu","line":47,"column":0,"depth":2},"kebingungan-dan-terjebak":{"type":"header","text":"Kebingungan dan Terjebak","value":"kebingungan-dan-terjebak","line":87,"column":0,"depth":2},"banjir":{"type":"header","text":"Banjir","value":"banjir","line":101,"column":0,"depth":2},"arti-komitment":{"type":"header","text":"Arti Komitment","value":"arti-komitment","line":162,"column":0,"depth":2}},"children":[],"parent":"notes.10-hari-menulis.2025","data":{}},"body":"\u003ch1 id=\"di-antara-ribuan\"\u003eDi Antara Ribuan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#di-antara-ribuan\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eTidak semua semut tahu kenapa mereka bekerja keras seumur hidup. Mungkin hanya karena tidak ada pilihan lain, atau mungkin karena takut merasa tidak berarti jika berhenti. Archie adalah seekor semut yang menjalani hidup dengan seadanya. Dia tidak mengerti kenapa semut-semut lain begitu bersemangat kerja. Mungkin mereka tahu sesuatu yang dia tidak tahu atau mungkin mereka hanya lebih pandai berpura pura.\u003c/p\u003e\n\u003cp\u003eArchie semut muda yang hidupnya mengalir saja di dunia tipu tipu. Terbawa arus dan hidup dalam bubble. Tidak ada yang spesial dari dirinya. Dia tidak dalam posisi terbaik dan juga tidak yang paling buruk. Tidak ada keahlian yang mencolok. Semua biasa saja. Satu hal yang pasti tentang Archie, dia selalu menghindari kesulitan. Dia lakukan itu tanpa sadar dan tidak pernah merasa ada masalah.\u003c/p\u003e\n\u003cp\u003eSetiap hari, ia melakukan tugas tugasnya dengan secukupnya. Mengangkut remah remah makanan, membersihkan sarang dan mengikuti arus pekerja lainnya. Ketika semut pekerja lain bekerja keras membangung terowongan. Archie memilih beristirahat lebih cepat dari yang lain, karena merasa pekerjaannya telah selesai dan tidak perlu ambil extra miles lagi.\u003c/p\u003e\n\u003cp\u003eIa tahu betul kalau ada ribuan semut lain yang bisa menggantikan posisinya. \"Kalau ada orang lain, kenapa gue?\", \"Buat apa sih kerja keras sampe segitunya\". Temannya, Lenny, semut pekerja keras yang selalu bersemangat, sering menegurnya.\u003c/p\u003e\n\u003cp\u003e\"Chi, kalau kita semua punya pemikiran kaya lo, koloni ini gak akan bertahan dan mungkin suatu saat nanti lo akan tertinggal dan gak relevan lagi\"\u003c/p\u003e\n\u003cp\u003eArchie menjawab tanpa melihat Lenny sambil tertawa kecil. \u003c/p\u003e\n\u003cp\u003e\"Santai aja, len, itu banyak kok semut lain yang bisa. Nanti aja lah wkwkwkwk\"\u003c/p\u003e\n\u003cp\u003eLenny menanggapi, \"Yee sempak tuyul, kalo dikasih tau suka nyepelein. Nanti kapan sih chi? Nunggu sampe 2030 koloni bubar? wkwkwkwk\"\u003c/p\u003e\n\u003cp\u003eArchie cuma angkat bahu sambil ngelirik Lenny.\n\"Gak tau ah. Nanti pas gue lagi mood kali, hehehe.\"\u003c/p\u003e\n\u003ch2 id=\"alasan---rasa-kecewa-dan-trauma\"\u003eAlasan - Rasa Kecewa dan Trauma\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#alasan---rasa-kecewa-dan-trauma\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBukan tanpa alasan, Arhie hidup seperti ini karena dia marah pada dirinya sendiri. Dulu, archie pernah punya mimpi besar. Ia pernah berjuang keras sebagai koordinator pencari makanan, mengatur jalur pengiriman supaya lebih efisien, bahkan memimpin timnya melawan invasi laba-laba. Semut-semut lain menghormatinya.\u003c/p\u003e\n\u003cp\u003eTapi itu bukan masalah. Masalahnya ada di Pemimpin regu mereka yang baru, Brigjen semut Robert.\u003c/p\u003e\n\u003cp\u003eBrigjen Robert adalah pemimpin yang licik dan manipulatif. Ia sering mengambil keputusan tanpa mendengar masukan tim, tapi saat keputusan itu gagal, ia menyalahkan semua orang. Di depan timnya, ia menyalahkan brigjen lain. Di depan para brigjen, ia menyalahkan timnya.\u003c/p\u003e\n\u003cp\u003eSuatu hari Robert memutuskan mengubah rute pencarian makanan tanpa memberitahu tim. Jalur baru yang ia pilih ternyata rawan banjir, tapi ia memaksakan ke daerah itu. Ketika banjir benar-benar datang dan menghanyutkan banyak makanan sehingga merugikan koloni, Robert langsung menyalahkan semua orang termasuk Archie yang ada pada regu itu.\u003c/p\u003e\n\u003cp\u003e\"Kenapa kalian terlalu ambisius? Kalau tidak bisa memastikan keselamatan, lebih baik tidak usah bertindak!\" Kata Brigjen Robert dengan nada tinggi, yang seolah olah semua itu bukan salahnya.\u003c/p\u003e\n\u003cp\u003eKarena Archie salah satu pemimpin tengah, semut-semut lain langsung melihat Archie dengan tatapan menyalahkan. Padahal mereka semua tau itu bukan kesalahan Archie. Tapi mereka diam karena takut dengan Robert karena ia punya pengaruh besar di koloni.\u003c/p\u003e\n\u003cp\u003eKekecewaan terhadap Robert itu adalah puncak dari semua kekecewaan hidup Archie.\nIa merasa bahwa orang tidak kompeten, manipulatif dan penuh gaslighting bisa merusak segalanya dan tetap berkuasa.\nSistem yang rusak membiarkan orang seperti itu menang.\nNamun, Kejadian itu bukan satu-satunya penyebab Archie jadi apatis.\nSebenarnya hidup Archie sudah penuh kekecewaan sejak ia masih kecil.\u003c/p\u003e\n\u003ch2 id=\"masa-lalu\"\u003eMasa Lalu\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#masa-lalu\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDulu, Archie adalah anak semut yang ceria dan penuh ide. Kalau digambarin dia seperti jendral kancil. Ia punya ribuan rencana kecil untuk memperbaiki sarang, menghemat makanan, dan membuat jalur lebih cepat. Tak pernah kehabisan akal, Archie mampu memimpin kawanan semut kecilnya dengan kecerdikannya.\u003c/p\u003e\n\u003cp\u003eTapi idenya selalu ditertawakan oleh semut-semut dewasa.\u003c/p\u003e\n\u003cp\u003e\"Ngapain sih? Sudah biasa gini kok, jangan banyak gaya!\"\n\"Kamu pikir kamu lebih pintar dari senior-senior di sini? Gak sopan, Anak jaman sekarang songong songong\"\u003c/p\u003e\n\u003cp\u003eOrang tuanya juga tidak pernah mendukung mimpinya.\n\"Jangan aneh-aneh, Archie. Ikut arus aja. Jangan bikin malu keluarga. Sekolah yang bener biar cepet dapet kerja.\"\u003c/p\u003e\n\u003cp\u003eArchie sering terdiam dengan kepala menunduk.\n\"Kenapa mereka gak bisa lihat kalau aku cuma ingin membantu?\"\u003c/p\u003e\n\u003cp\u003eDi masa sekolah, Archie pun kehilangan semangat bertanya. Di sekolahnya jika bertanya dianggap bodoh dan belum belajar atau tidak mengerti apa yang diberikan oleh guru. Guru hanya mengajarkan sesuai text book. \"Baca, Baca, Catet , Ujian\". \u003c/p\u003e\n\u003cp\u003eKalau ada yang berani mengangkat tangan dan bertanya, gurunya hanya akan berkata dengan wajah datar,\n\"Kamu sudah baca belum?\"\u003c/p\u003e\n\u003cp\u003ePertanyaan yang seharusnya menjadi pemicu diskusi justru dianggap sebagai tanda kebodohan.\u003c/p\u003e\n\u003cp\u003eDan kalau ada jawaban yang tidak sesuai buku, akan langsung ditegur,\n\"Jangan mengada-ada. Sudah jelas kan ada di buku? Kalau kamu sudah baca, gak perlu tanya hal kayak gini.\"\u003c/p\u003e\n\u003cp\u003eSejak saat itu sampai kejadian tidak mengenakan dengan Brigjen Robert, Archie tidak lagi mencoba tampil beda. Ia mengambil semua kekecewaan masuk kedalam hatinya. Dia mulai menganggap mimpinya itu tidak realistis dan hanya membuatnya jadi bahan tertawaan. Dia mulai menganggap semuanya hanya sandiwara belaka, beruntung jika kamu punya kenalan, meski kompetensi mu jelek, kamu tetap bisa ada di posisi tinggi.\u003c/p\u003e\n\u003cp\u003eItu membuatnya benar-benar patah arang.\nSejak saat itu, ia memilih hidup seadanya.\nTidak lagi mencoba lebih keras.\nTidak lagi mengambil tanggung jawab.\nTidak lagi ingin jadi semut yang berbeda.\nTidak ada komitmen.\u003c/p\u003e\n\u003cp\u003eKarena bagi Archie, komitmen hanya membawa luka dan kekecewaan.\nBerjuang hanya membuatnya merasa lebih gagal.\u003c/p\u003e\n\u003cp\u003e\"Buat apa ribet-ribet? Lagian, pada akhirnya cuma akan disalahkan dan berantakan.\"\nJadi, ia memilih ikut arus. Menjadi semut yang biasa-biasa saja.\u003c/p\u003e\n\u003ch2 id=\"kebingungan-dan-terjebak\"\u003eKebingungan dan Terjebak\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kebingungan-dan-terjebak\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMusim hujan datang lebih awal. Perubahan Iklim dunia saat ini membuat cuaca sangat tidak jelas dan sulit diprediksi.\u003c/p\u003e\n\u003cp\u003eAir mulai menggenangi sarang dan para semut dengan cepat mengerahkan kekuatan mereka untuk memindahkan persediaan ke tempat yang lebih aman.\u003c/p\u003e\n\u003cp\u003eArchie kebingungan, semut-semut berlarian menuju terowongan darurat, tapi ia gak tau rutenya yang membuat dia kesulitan untuk kabur aja dulu. Selama ini, ia tidak pernah benar-benar mendengarkan ketika teman-temannya membahas tentang evakuasi bersama para mentor dan pemimpin tinggi. Dia sebenernya tau ini penting, tapi dia gak serius menanggapinya. \u003c/p\u003e\n\u003cp\u003eAir mulai masuk lebih deras. Ia mencoba ikut berlari. Tapi terowongan itu sudah penuh. Archie merasa kesepian dan tidak berguna. Ia ingin minta tolong, tapi gak ada yang benar-benar peduli dengannya. Untuk pertama kali dalam hidupnya, ia merasa butuh orang lain dan hidup seadanya itu tidak cukup.\u003c/p\u003e\n\u003c!---\nTODO: lanjutin nanti bisa dilanjutin lebih drama dan refeltif, karena Archie mulai merasa hidup tanpa komitmen bisa gak baik baik aja. Dia cukup ubah cara pandangnya, tidak terlalu memikirkan apa kata orang.\n--\u003e\n\u003ch2 id=\"banjir\"\u003eBanjir\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#banjir\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eArchie melihat seekor semut kecil terseret arus air.\nSemut kecil itu berjuang sekuat tenaga, tapi badannya terlalu ringan untuk melawan derasnya air. Teriakan meminta tolong suaranya terkadang besar terkadan kecil karena mulut semut kecil itu kemasukan air berulang kali.\u003c/p\u003e\n\u003cp\u003eTanpa berpikir panjang, Archie melompat dan menggigit tubuh kecil itu, menariknya ke tempat yang lebih aman. Sebuah celah yang agak tinggi dan masih kering.\nSemut kecil itu selamat.\u003c/p\u003e\n\u003cp\u003e\"Kamu aman di sini, jangan keluar dulu!\" ujar Archie dengan napas terengah.\nSemut kecil itu mengangguk sambil menggigil, tapi setidaknya sekarang ia tidak lagi terseret arus.\u003c/p\u003e\n\u003cp\u003eNamun, saat Archie mau berbalik untuk mengecek keadaan, kakinya terpeleset di batu licin.\nTubuhnya tergelincir ke bawah dan sebelum sempat menggenggam sesuatu, arus deras menghantamnya dari samping.\u003c/p\u003e\n\u003cp\u003eArchie terseret lebih jauh, terhempas ke bagian sarang yang rusak parah akibat banjir.\u003c/p\u003e\n\u003cp\u003eDi sana, ia melihat banyak semut lain yang terjebak. Merasa takut, bingung, dan tidak tahu arah. Beberapa semut tua terlihat berkerumun dengan tubuh gemetar kedingingan, sementara yang lain mencoba menggali jalur keluar lainnya dengan panik.\u003c/p\u003e\n\u003cp\u003eSuasana terasa mencekam. Takut banjir makin deras dan menghancurkan semuanya. Tapi gak ada yang tau apa yang harus dilakukan. Archie mendengar salah satu semut berkata dengan suara penuh ketakutan, \"Kita bakal mati di sini! Lihat itu airnya makin naik!\"\u003c/p\u003e\n\u003cp\u003eSemua panik, ada yang menangis ada yang mukul mukul dinding lebih cepat, Ada yang cuma bingung entah mau melakukan apa. Archie merasa tangannya bergetar, dan ada dorongan kuat di dalam dadanya untuk melakukan sesuatu.\u003c/p\u003e\n\u003cp\u003eTapi apa?\u003c/p\u003e\n\u003cp\u003eSelama ini, ia hanya ikut arus, menghindari tanggung jawab.\nTapi sekarang...\nKalau dia tetap diam, semua akan berakhir.\u003c/p\u003e\n\u003cp\u003eArchie mengingat kembali rasa takut saat dirinya terseret arus, dan bagaimana semut kecil itu hampir mati karena dia ragu-ragu. \"Gue gak bisa diem aja!\"\u003c/p\u003e\n\u003cp\u003eDengan napas berat, ia menggigit bibirnya, berusaha mengumpulkan keberanian.\nDi saat semua semut mulai kehilangan harapan, Archie berdiri dan mengambil langkah maju.\nSuara dalam dirinya berteriak, \"Kalau lo gak ngapa-ngapain sekarang, lo bakal nyesel lagi!\"\u003c/p\u003e\n\u003cp\u003eTanpa sadar, Archie berteriak keras, suaranya menggema di dalam terowongan,\n\"Dengerin gue! Ayo kita buat jalur baru lewat terowongan timur! Jangan diam aja! Cepat bawa persediaan yang bisa diselamatkan!\"\u003c/p\u003e\n\u003cp\u003ePara semut terkejut mendengar suara lantang Archie.\nBeberapa dari mereka menoleh bingung, tapi suara penuh keyakinan itu menular.\u003c/p\u003e\n\u003cp\u003eArchie sadar bahwa pengalamannya dulu sebagai koordinator pencari makanan masih ada di dalam dirinya.\nDulu, ia sering menggali terowongan baru untuk mencari jalan tercepat menuju persediaan, dan mengatur arah gerakan tim.\nTanpa sadar, ingatan itu muncul lagi, seakan-akan insting lamanya terbangun oleh situasi kritis ini.\u003c/p\u003e\n\u003cp\u003e\"Jangan berhenti! Ambil alat penggali! Kita harus buat jalur lebih cepat!\" serunya sambil mulai menggali lebih dulu.\u003c/p\u003e\n\u003cp\u003eSatu per satu, semut-semut mulai bergerak mengikuti arahannya.\nBeberapa mencari alat sederhana dari tumpukan persediaan, sementara yang lain membantu mengikis tanah dengan kaki dan rahang mereka.\u003c/p\u003e\n\u003cp\u003eArchie mengatur posisi:\n\"Lo bantu di sisi kanan biar tanahnya gak ambruk! Yang lain jagain persediaan jangan sampai kebawa arus!\"\u003c/p\u003e\n\u003cp\u003eMereka bekerja sama menggali jalur baru, melawan derasnya air, dan menyelamatkan yang masih bisa diselamatkan.\nKeringat dan lumpur bercampur, tapi mereka tidak berhenti.\u003c/p\u003e\n\u003cp\u003eButuh waktu lama, penuh tantangan, tapi akhirnya mereka berhasil mencapai bagian sarang yang aman.\u003c/p\u003e\n\u003c!---\nTODO: dilanjutin nanti, ini bisa dibuat lebih drama\n--\u003e\n\u003ch2 id=\"arti-komitment\"\u003eArti Komitment\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#arti-komitment\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBeberapa hari kemudian, Archie duduk sendirian di pinggir sarang, mengamati tumpukan remah roti yang tersisa dari banjir kemarin.\u003c/p\u003e\n\u003cp\u003eTiba tiba, semut kecil yang ia selamatkan menghampirinya.\u003c/p\u003e\n\u003cp\u003e\"Bang Archie, aku mau jadi pencari makanan kayak Bang Archie! Makasih udah selamatin aku!\"\u003c/p\u003e\n\u003cp\u003eArchie terdiam.\nIa berpikir bahwa hidupnya akhirnya punya arti, meskipun tidak ada yang tahu usahanya.\nAda kehangatan aneh di dadanya, seperti ada sesuatu yang meleleh dari dalam hatinya.\nSeumur hidupnya, ia tidak pernah merasa berguna, dan kali ini, untuk pertama kalinya, ada seseorang yang menganggapnya penting.\nIa menyadari bahwa komitmen bukan tentang dihargai atau menjadi pahlawan.\nKomitmen adalah tentang keberanian memilih sesuatu yang berarti, terlepas dari hasil akhirnya.\u003c/p\u003e\n\u003cp\u003e\"Kalau hidup cuma ikut arus, ya gak ada bedanya sama mati pelan-pelan.\"\u003c/p\u003e\n\u003cp\u003eMulai hari itu, Archie memutuskan untuk menjadi versi terbaik dirinya, bukan untuk orang lain, tapi untuk menjadi mata air yang memberi kehidupan bagi sekitarnya.\u003c/p\u003e\n\u003c!---\nTODO: ini bisa lebih banyak penyelesaian, sesuatu yang kasih insigt diakhir. Tidak harus happy ending tapi ada sesuatu yang disampaikan. kaya film into the wild. wkwkwkwk\n--\u003e\n\u003cp\u003eSelesai.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"cus
