n":0,"depth":3},"4-structure-note--moc":{"type":"header","text":"4. Structure Note / MOC","value":"4-structure-note--moc","line":49,"column":0,"depth":3},"mapping-ke-hierarki-dendron":{"type":"header","text":"Mapping ke Hierarki Dendron","value":"mapping-ke-hierarki-dendron","line":57,"column":0,"depth":2},"workflow-end-to-end":{"type":"header","text":"Workflow End-to-End","value":"workflow-end-to-end","line":71,"column":0,"depth":2},"aturan-emas-linking":{"type":"header","text":"Aturan Emas Linking","value":"aturan-emas-linking","line":89,"column":0,"depth":2},"konvensi-penamaan":{"type":"header","text":"Konvensi Penamaan","value":"konvensi-penamaan","line":103,"column":0,"depth":2},"contoh-konkret":{"type":"header","text":"Contoh Konkret","value":"contoh-konkret","line":113,"column":0,"depth":2},"perbedaan-dari-cara-lama":{"type":"header","text":"Perbedaan dari Cara Lama","value":"perbedaan-dari-cara-lama","line":125,"column":0,"depth":2},"referensi":{"type":"header","text":"Referensi","value":"referensi","line":136,"column":0,"depth":2}},"children":["notes.zettelkasten.cara-pakai"],"parent":"notes","data":{}},"body":"\u003ch1 id=\"zettelkasten-di-dendron--panduan-implementasi\"\u003eZettelkasten di Dendron — Panduan Implementasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#zettelkasten-di-dendron--panduan-implementasi\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"apa-itu-zettelkasten\"\u003eApa itu Zettelkasten?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-itu-zettelkasten\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eZettelkasten (bahasa Jerman: \"kotak catatan\") adalah sistem pencatatan yang dikembangkan oleh sosiolog Niklas Luhmann. Dia menerbitkan \u003cstrong\u003e50 buku dan 600+ artikel\u003c/strong\u003e dengan bantuan sistem ini. Intinya bukan sekedar menyimpan catatan, tapi \u003cstrong\u003emembangun jaring gagasan yang hidup\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eTiga prinsip utama:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eAtomicity\u003c/strong\u003e — satu catatan = satu gagasan. Bukan satu bab, bukan satu topik besar.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConnectivity\u003c/strong\u003e — setiap catatan baru harus dihubungkan ke catatan lain yang sudah ada.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOwn words\u003c/strong\u003e — tulis ulang dengan kata-katamu sendiri, bukan copy-paste.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"A Zettelkasten is a personal tool for thinking and writing. The difference to other systems is that you create a \u003cstrong\u003eweb of thoughts\u003c/strong\u003e instead of notes of arbitrary size, and emphasize \u003cstrong\u003econnection\u003c/strong\u003e, not a collection.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2 id=\"tiga-jenis-catatan\"\u003eTiga Jenis Catatan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tiga-jenis-catatan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-fleeting-note-catatan-kilat\"\u003e1. Fleeting Note (Catatan Kilat)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-fleeting-note-catatan-kilat\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eTangkap dulu, proses nanti. Bisa dari ide yang tiba-tiba muncul, highlight saat membaca, atau pertanyaan dari diskusi.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTempat\u003c/strong\u003e: \u003ccode\u003evault2/\u003c/code\u003e (private inbox) atau daily journal\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUmur\u003c/strong\u003e: sementara — harus diproses dalam 1-2 hari\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTemplate\u003c/strong\u003e: \u003ccode\u003etemplates.zettel.fleeting\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"2-literature-note-catatan-sumber\"\u003e2. Literature Note (Catatan Sumber)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-literature-note-catatan-sumber\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eCatatan yang diambil dari sumber (buku, artikel, video, podcast). Ditulis \u003cstrong\u003edengan kata-katamu sendiri\u003c/strong\u003e, bukan summary bab per bab.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTempat\u003c/strong\u003e: \u003ccode\u003evault/zettel.literature.*\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTujuan\u003c/strong\u003e: jembatan antara sumber eksternal dan Zettel permanenmu\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTemplate\u003c/strong\u003e: \u003ccode\u003etemplates.zettel.literature\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-permanent-zettel-catatan-permanen\"\u003e3. Permanent Zettel (Catatan Permanen)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-permanent-zettel-catatan-permanen\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eIni inti dari sistem. Satu Zettel = satu gagasan yang dinyatakan sebagai \u003cstrong\u003eklaim/pernyataan\u003c/strong\u003e, bukan sekadar topik.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTempat\u003c/strong\u003e: \u003ccode\u003evault/zettel.YYYYMMDDHHMMSS.*\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNama file\u003c/strong\u003e: timestamp 12-digit + slug pendek (contoh: \u003ccode\u003ezettel.202604170001.ide-tanpa-catatan-sama-dengan-tidak-ada\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTemplate\u003c/strong\u003e: \u003ccode\u003etemplates.zettel.permanent\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"4-structure-note--moc\"\u003e4. Structure Note / MOC\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-structure-note--moc\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMeta-catatan yang menjadi \"peta\" dari kumpulan Zettel. Bukan berisi konten, tapi \u003cstrong\u003edaftar link\u003c/strong\u003e ke Zettel yang saling berhubungan dalam satu tema.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTempat\u003c/strong\u003e: \u003ccode\u003evault/zettel.moc.*\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTemplate\u003c/strong\u003e: \u003ccode\u003etemplates.zettel.moc\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"mapping-ke-hierarki-dendron\"\u003eMapping ke Hierarki Dendron\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mapping-ke-hierarki-dendron\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cpre\u003e\u003ccode\u003evault/\n├── zettel.md                          ← root index\n├── zettel.YYYYMMDDHHMMSS.slug.md      ← permanent Zettel\n├── zettel.literature.source-slug.md   ← literature note\n└── zettel.moc.topic-slug.md           ← structure note / MOC\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eCatatan yang sudah ada (\u003ccode\u003ebook-summaries.*\u003c/code\u003e) tetap bisa dipakai sebagai \u003cstrong\u003eliterature note kasar\u003c/strong\u003e yang perlu diekstrak menjadi Zettel-Zettel individual.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"workflow-end-to-end\"\u003eWorkflow End-to-End\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#workflow-end-to-end\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cpre\u003e\u003ccode\u003eBaca buku/artikel\n      ↓\n[Fleeting Note] — highlight \u0026#x26; pertanyaan cepat\n      ↓\n[Literature Note] — proses: tulis ulang di kata-katamu sendiri\n      ↓\n[Permanent Zettel] — ekstrak 1 gagasan per Zettel, beri ID timestamp\n      ↓\nHubungkan ke Zettel lain yang sudah ada (dengan menjelaskan MENGAPA dihubungkan)\n      ↓\n[Structure Note / MOC] — buat peta dari klaster Zettel yang terbentuk\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2 id=\"aturan-emas-linking\"\u003eAturan Emas Linking\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#aturan-emas-linking\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSaat membuat link ke Zettel lain, \u003cstrong\u003eselalu tulis mengapa\u003c/strong\u003e link itu dibuat. Bukan hanya \u003ccode\u003e[[zettel.xxx]]\u003c/code\u003e, tapi:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eSecond brain memperpanjang working memory kita [[zettel.202604170001]] karena\nia memindahkan beban penyimpanan dari otak ke sistem eksternal, mirip dengan\nprinsip yang dibahas di [[zettel.202604170003]].\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eLink tanpa konteks = tidak ada pengetahuan yang diciptakan.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"konvensi-penamaan\"\u003eKonvensi Penamaan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#konvensi-penamaan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eJenis\u003c/th\u003e\u003cth\u003ePola\u003c/th\u003e\u003cth\u003eContoh\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003ePermanent Zettel\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.YYYYMMDDHHMMSS\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.202604170001\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eLiterature Note\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.literature.author-judul\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.literature.building-a-second-brain\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eMOC\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.moc.topik\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.moc.personal-knowledge-management\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003chr\u003e\n\u003ch2 id=\"contoh-konkret\"\u003eContoh Konkret\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-konkret\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eLihat contoh mini-web Zettelkasten yang sudah dibuat di vault ini:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.personal-knowledge-management\"\u003eMOC: Personal Knowledge Management\u003c/a\u003e — peta topik PKM\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.building-a-second-brain\"\u003eLiterature Note — Building a Second Brain\u003c/a\u003e — literature note dari BASB\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — \"Second brain perluasan kapasitas berpikir\"\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e — \"Ide yang tak ditulis = ide yang tidak ada\"\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e — \"Koneksi lebih bernilai dari koleksi\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"perbedaan-dari-cara-lama\"\u003ePerbedaan dari Cara Lama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#perbedaan-dari-cara-lama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eCara Lama (book-summaries)\u003c/th\u003e\u003cth\u003eCara Zettelkasten\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003eSatu file per buku\u003c/td\u003e\u003ctd\u003eSatu file per \u003cstrong\u003egagasan\u003c/strong\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eRingkasan bab per bab\u003c/td\u003e\u003ctd\u003eKlaim yang bisa dibantah/dibuktikan\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003ePasif — disimpan, jarang dibuka\u003c/td\u003e\u003ctd\u003eAktif — selalu dihubungkan saat menulis\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eKoleksi informasi\u003c/td\u003e\u003ctd\u003eJaring pengetahuan\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003chr\u003e\n\u003ch2 id=\"referensi\"\u003eReferensi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#referensi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zettelkasten.de/introduction/\"\u003eIntroduction to the Zettelkasten Method\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zettelkasten.de/posts/overview/\"\u003eZettelkasten Overview \u0026#x26; Principles\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.zettelkasten.cara-pakai\"\u003eCara Pakai Zettelkasten di Project Ini\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #de9dac;\" href=\"/sotoy/notes/tags.zettelkasten\"\u003ezettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\" href=\"/sotoy/notes/tags.knowledge-management\"\u003eknowledge-management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #c7fdb5;\" href=\"/sotoy/notes/tags.dendron\"\u003edendron\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.zettelkasten.cara-pakai\"\u003eCara Pakai Zettelkasten di Project Ini\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leave
