bungan-ke-zettel-lain":{"type":"header","text":"Hubungan ke Zettel Lain","value":"hubungan-ke-zettel-lain","line":62,"column":0,"depth":2},"sumber":{"type":"header","text":"Sumber","value":"sumber","line":68,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"feature-document-yang-efektif-itu-ringkas-dan-operasional\"\u003eFeature document yang efektif itu ringkas dan operasional\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#feature-document-yang-efektif-itu-ringkas-dan-operasional\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika dokumen terlalu tebal, orang bakal ngerasa itu cuma dokumentasi formal lagi.\u003c/p\u003e\n\u003cp\u003eDalam praktik, thresholdnya biasanya sekitar 1–2 halaman atau sekitar 300–800 kata. Kalau sebuah feature document membutuhkan lebih dari itu untuk dipahami, besar kemungkinan orang akan menganggapnya sebagai dokumentasi berat dan enggan membacanya.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJadi nilai efektif feature document ada di kegunaan, bukan panjangnya.\u003c/p\u003e\n\u003cp\u003eFeature document yang efektif punya dua ciri utama:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003elangsung jawab \"apa yang harus dibangun\" dan \"kenapa\" tanpa harus menggali berlembar-lembar latar belakang;\u003c/li\u003e\n\u003cli\u003emudah di-update dan dipakai tim saat keputusan berubah.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKalau dokumen panjangnya hanya untuk menampilkan kompleksitas, itu biasanya menjadi beban baca dan berhenti jadi sumber kebenaran.\u003c/p\u003e\n\u003ch2 id=\"contoh\"\u003eContoh\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"efektif\"\u003eEfektif\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#efektif\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eSatu halaman ringkas yang berisi masalah pengguna, tujuan bisnis, batasan utama, dan kriteria berhasil.\u003c/li\u003e\n\u003cli\u003eContoh: issue atau PR yang punya \"Goal\", \"What\", \"Why\", \"Out of Scope\", dan \"Open Questions\".\u003c/li\u003e\n\u003cli\u003eItu cukup untuk tim sadar apa yang harus dilanjutkan dan mengapa keputusan dibuat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"kurang-efektif\"\u003eKurang efektif\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kurang-efektif\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eDokumen 5 halaman yang memuat semua alternatif solusi, sejarah diskusi panjang, dan output riset mendetail.\u003c/li\u003e\n\u003cli\u003eOrang sering baca setengah, lalu menyerah karena \"ini terlalu banyak untuk segera diputuskan\".\u003c/li\u003e\n\u003cli\u003eAkhirnya, konteks berantakan dan tim kembali ke chat atau meeting untuk klarifikasi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"intinya\"\u003eIntinya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#intinya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eDokumentasi formal yang tebal membuat dokumen berubah status dari \"alat kolaborasi\" menjadi \"arsip pasif\".\u003c/li\u003e\n\u003cli\u003eLebih baik sedikit informasi yang operasional dan bisa langsung dipakai, daripada banyak informasi yang cuma membuat orang bingung.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"level-koneksi-konteks\"\u003eLevel Koneksi Konteks\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#level-koneksi-konteks\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eArtikel \"Context Anchoring\" membedakan beberapa lapisan konteks yang berbeda:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eProject-level\u003c/code\u003e / priming document: konteks stabil proyek — tech stack, arsitektur umum, naming convention, pola integrasi. Ini adalah foundation yang jarang berubah dan dibagikan ke semua fitur dan sesi.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eFeature-level\u003c/code\u003e / feature document: konteks spesifik fitur — keputusan yang dibuat, alasan, constraint, alternatif yang ditolak, open questions, dan status implementasi. Ini bersifat dinamis dan diperbarui setiap sesi atau setiap kali keputusan penting diambil.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eSession-level\u003c/code\u003e: percakapan AI itu sendiri. Berguna untuk berpikir dan eksplorasi, tapi rapuh karena konteksnya hilang saat sesi ditutup. Itulah yang harus ditambatkan ke dokumen jika harus menjadi permanen.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePada praktiknya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eproject-level membantu AI memahami \"bagaimana proyek bekerja\" sebelum sesi dimulai.\u003c/li\u003e\n\u003cli\u003efeature-level menjelaskan \"di mana fitur ini sekarang dan kenapa kita memilih jalur ini\".\u003c/li\u003e\n\u003cli\u003esession-level adalah tempat berpikir sementara; keputusan penting harus keluar dari sini dan masuk ke feature document.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni membantu menjelaskan mengapa dokumen yang efisien itu tidak hanya ringkas, tapi juga berada di level yang tepat. Kelebihan 5 halaman biasanya terjadi ketika dokumen mencoba menutupi semua level sekaligus — mulai dari latar belakang proyek sampai detail sesi — sehingga kehilangan fokus operasional.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMendukung \u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — klaim diambil dari Paragraf 27.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e — tesis utama bahwa chat AI adalah medium berpikir, bukan tempat penyimpanan keputusan.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e — baseline kolaborasi manusia yang transfer konteks ke dokumen.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — Paragraf 27\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #a03623;\" href=\"/sotoy/notes/tags.zettel\"\u003ezettel\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-collaboration (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\" href=\"/sotoy/notes/tags.knowledge-management\"\u003eknowledge-management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003econtext-anchoring (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback
