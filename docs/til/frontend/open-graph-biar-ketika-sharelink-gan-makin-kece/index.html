kece/image.png\" alt=\"alt text\"\u003e\u003c/p\u003e\n\u003cp\u003ePernah nggak lo share link artikel, produk, atau portfolio lo di grup WA atau medsos, tapi yang muncul cuma link polos? Nah, di sinilah Open Graph (OG) berperan penting.\u003c/p\u003e\n\u003cp\u003eOG itu standar yang pertama kali diperkenalkan Facebook. Intinya, lo bisa tambahin beberapa meta tag di HTML, supaya waktu link lo dishare, yang muncul bukan cuma teks URL doang. Judul, deskripsi, gambar, semua bisa lo atur biar lebih menarik dilihat.\u003c/p\u003e\n\u003cp\u003eCara kerjanya simpel. Lo taruh tag kayak gini di bagian \u003ccode\u003e\u0026#x3C;head\u003e\u003c/code\u003e HTML lo:\u003c/p\u003e\n\u003cpre class=\"language-html\"\u003e\u003ccode class=\"language-html\"\u003e\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token punctuation\"\u003e\u0026#x3C;\u003c/span\u003emeta\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003eproperty\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003eog:title\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003econtent\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003eResep Bakso Super Kenyal\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e/\u003e\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token punctuation\"\u003e\u0026#x3C;\u003c/span\u003emeta\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003eproperty\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003eog:description\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003econtent\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003eRahasia bikin bakso yang kenyalnya luar biasa.\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e/\u003e\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token punctuation\"\u003e\u0026#x3C;\u003c/span\u003emeta\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003eproperty\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003eog:image\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003econtent\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003ehttps://example.com/images/bakso.jpg\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e/\u003e\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token tag\"\u003e\u003cspan class=\"token punctuation\"\u003e\u0026#x3C;\u003c/span\u003emeta\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003eproperty\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003eog:url\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token attr-name\"\u003econtent\u003c/span\u003e\u003cspan class=\"token attr-value\"\u003e\u003cspan class=\"token punctuation attr-equals\"\u003e=\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003ehttps://example.com/resep/bakso-kenyal\u003cspan class=\"token punctuation\"\u003e\"\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e/\u003e\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNanti, begitu link lo dibuka di WhatsApp, Facebook, Twitter, LinkedIn—mereka bakal otomatis nampilin preview yang lebih rapi dan informatif.\u003c/p\u003e\n\u003cp\u003eKenapa ini penting?\nSelain bikin link lo kelihatan lebih “niat”, OG juga bikin orang lebih penasaran buat ngeklik. Ini nambahin peluang engagement, bikin link lo lebih profesional, dan bantu naikin citra brand atau personal branding lo.\u003c/p\u003e\n\u003cp\u003eAda beberapa hal yang penting buat diperhatiin:\nJudul dan deskripsi jangan kepanjangan. Judul sekitar 60 karakter, deskripsi 110–150 karakter udah cukup padat dan menarik. Gambar juga usahain proporsional, biasanya ukuran 1200x630px udah pas di kebanyakan platform medsos. Jangan sampe filenya kegedean, biar waktu share link, previewnya cepet muncul.\u003c/p\u003e\n\u003cp\u003eKalau mau lebih lengkap, Twitter juga punya standar sendiri—\u003ccode\u003etwitter:card\u003c/code\u003e, \u003ccode\u003etwitter:title\u003c/code\u003e, \u003ccode\u003etwitter:description\u003c/code\u003e, \u003ccode\u003etwitter:image\u003c/code\u003e—yang bisa lo tambahin biar previewnya nggak berantakan.\u003c/p\u003e\n\u003cp\u003eSatu hal yang suka dilupain: selalu cek preview sebelum lo publish. Tools kayak Facebook Sharing Debugger dan Twitter Card Validator itu ngebantu lo banget. Tinggal masukin link lo, terus lo bisa liat tampilan previewnya udah bener apa belum.\u003c/p\u003e\n\u003cp\u003eLo bisa dalemin lagi lewat beberapa referensi kayak situs resmi \u003ca href=\"https://ogp.me/\"\u003eOpen Graph Protocol\u003c/a\u003e, dokumentasi di \u003ca href=\"https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta\"\u003eMDN\u003c/a\u003e, atau tools yang udah disediain sama Facebook dan Twitter.\u003c/p\u003e\n\u003cp\u003eOpen Graph ini emang kesannya sepele, tapi dampaknya gede banget. Bukan cuma soal tampil keren, tapi juga soal kredibilitas dan profesionalitas lo di mata orang lain. Link lo jadi lebih “ngomong”, dan orang lain lebih yakin buat ngeklik.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncwhf8qpuaoz764uzfn","y8jzdhjhhmqub1t9wx5w9e4","ff8zp75qbznut6joziqr1nx"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the
