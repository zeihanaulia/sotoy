decision tetap jernih\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#planning-harus-dipisah-dari-solutioning-agar-requirement-dan-teknikal-decision-tetap-jernih\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eMengapa planning dan solutioning harus dipisah?\u003c/li\u003e\n\u003cli\u003eApa failure mode kalau keduanya dicampur dalam AI-native workflows?\u003c/li\u003e\n\u003cli\u003eBagaimana pemisahan ini membantu konsistensi teknis?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePlanning dan solutioning adalah dua jenis keputusan berbeda dengan failure mode berbeda. Planning menjawab \"apa yang harus dibangun\"; solutioning menjawab \"bagaimana membangunnya.\" Pemisahan menjaga target dan jalur teknis tetap jelas.\u003c/p\u003e\n\u003ch2 id=\"peran-masing-masing\"\u003ePeran masing-masing\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#peran-masing-masing\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003ePlanning: tujuan fitur, nilai bisnis, FR/NFR, acceptance criteria.\u003c/li\u003e\n\u003cli\u003eSolutioning: pola arsitektur, boundary sistem, API style, state model, unit kerja teknis.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"kenapa-penting\"\u003eKenapa penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika implementor/agent harus mengekstrak keputusan teknis langsung dari requirement bisnis, tim akan rentan terhadap:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekonflik lokal antara agent yang berbeda,\u003c/li\u003e\n\u003cli\u003easumsi teknis tersembunyi yang berubah-ubah,\u003c/li\u003e\n\u003cli\u003epilihan teknis inkonsisten seperti REST vs GraphQL, snake_case vs camelCase, state library apa.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJika technical design dibahas terlalu dini, requirement bisnis bisa dibajak oleh asumsi teknis sebelum problem jelas.\u003c/p\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003ePlanning harus memberi context bisnis dan tujuan.\u003c/li\u003e\n\u003cli\u003eSolutioning harus memberi basis teknis bersama untuk implementasi.\u003c/li\u003e\n\u003cli\u003eIni bukan formalitas; ini mekanisme untuk menjaga dua sudut pandang tetap terpisah tapi saling terhubung.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"insight\"\u003eInsight\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#insight\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDengan pemisahan ini, backlog dan story lebih mungkin lahir setelah arsitektur dan keputusan teknis cukup jelas, sehingga work breakdown informed by architecture, bukan hanya oleh daftar fitur.\u003c/p\u003e\n\u003ch2 id=\"kesalahan-umum\"\u003eKesalahan umum\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kesalahan-umum\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMengira planning yang bagus otomatis cukup untuk memulai implementasi.\u003c/li\u003e\n\u003cli\u003eMengira solutioning bisa digantikan oleh general prompt jika requirement cukup jelas.\u003c/li\u003e\n\u003cli\u003eMengaburkan planning dan solutioning menjadi satu dokumen yang membuat dual audience bingung.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193303\"\u003eBMAD duduk di lapisan methodology dan orchestration, bukan sekadar prompt atau persona\u003c/a\u003e — BMAD duduk di lapisan methodology dan orchestration, bukan sekadar prompt atau persona\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eplanning (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esolutioning (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003edecision-making (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMO
