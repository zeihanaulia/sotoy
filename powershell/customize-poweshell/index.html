ps":{"note":{"id":"notes.powershell.customize-poweshell","title":"Customize Poweshell","desc":"","updated":1746175911546,"created":1746175781930,"custom":{},"fname":"notes.powershell.customize-poweshell","type":"note","vault":{"fsPath":"vault"},"contentHash":"bc331a99992ed03488d115c8049c06f6","links":[],"anchors":{"ssh-key-ke-github-pondasi-awal":{"type":"header","text":"SSH Key ke GitHub: Pondasi Awal","value":"ssh-key-ke-github-pondasi-awal","line":10,"column":0,"depth":2},"upgrade-powershell-7-biar-gak-tertinggal-zaman":{"type":"header","text":"Upgrade PowerShell 7: Biar Gak Tertinggal Zaman","value":"upgrade-powershell-7-biar-gak-tertinggal-zaman","line":32,"column":0,"depth":2},"error-lagi-masalah-module--path-yang-nggak-terbaca":{"type":"header","text":"Error Lagi? Masalah Module \u0026 Path yang Nggak Terbaca","value":"error-lagi-masalah-module--path-yang-nggak-terbaca","line":46,"column":0,"depth":2},"oh-my-posh-biar-terminal-lo-kece":{"type":"header","text":"Oh My Posh: Biar Terminal Lo Kece","value":"oh-my-posh-biar-terminal-lo-kece","line":68,"column":0,"depth":2},"git-alias-biar-ngetik-cepet":{"type":"header","text":"Git Alias biar Ngetik Cepet","value":"git-alias-biar-ngetik-cepet","line":84,"column":0,"depth":2},"issue-di-vscode":{"type":"header","text":"Issue di VSCode","value":"issue-di-vscode","line":100,"column":0,"depth":2},"penutup":{"type":"header","text":"Penutup","value":"penutup","line":116,"column":0,"depth":2}},"children":[],"parent":"notes.powershell","data":{}},"body":"\u003ch1 id=\"customize-poweshell\"\u003eCustomize Poweshell\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#customize-poweshell\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eLo pasti pernah ngerasa terminal bawaan Windows itu... meh. Hitam, polos, dan bosenin. Gue juga gitu. Tapi sekarang gue mau share perjalanan gue dari awal setup SSH key ke GitHub sampai akhirnya punya PowerShell yang bukan cuma enak diliat, tapi juga enak dipake. \u003c/p\u003e\n\u003ch2 id=\"ssh-key-ke-github-pondasi-awal\"\u003eSSH Key ke GitHub: Pondasi Awal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ssh-key-ke-github-pondasi-awal\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSemua berawal dari kebutuhan buat push-pull repo di GitHub tanpa harus ketik username dan password tiap saat. Solusinya? SSH key. Gue generate key pakai \u003ccode\u003essh-keygen\u003c/code\u003e, terus tambahin ke ssh-agent. Tapi kayak biasa, Windows nggak semulus itu. Service \u003ccode\u003essh-agent\u003c/code\u003e nggak bisa jalan, ternyata harus dijalanin secara manual dulu.\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token function\"\u003eStart-Service\u003c/span\u003e ssh-agent\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eSetelah itu gue add key-nya:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003essh-add \u003cspan class=\"token string\"\u003e\"C:\\Users\\Windows\\.ssh\\id_rsa\"\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eTerus test koneksi:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003essh \u003cspan class=\"token operator\"\u003e-\u003c/span\u003eT git@github\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003ecom\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau muncul pesan \"Hi username, you've successfully authenticated...\" berarti aman.\u003c/p\u003e\n\u003ch2 id=\"upgrade-powershell-7-biar-gak-tertinggal-zaman\"\u003eUpgrade PowerShell 7: Biar Gak Tertinggal Zaman\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#upgrade-powershell-7-biar-gak-tertinggal-zaman\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTernyata PowerShell lama nggak bisa install module modern. Gue install PowerShell 7 pakai winget:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003ewinget install \u003cspan class=\"token operator\"\u003e--\u003c/span\u003eid Microsoft\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003ePowershell \u003cspan class=\"token operator\"\u003e--\u003c/span\u003esource winget\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eTerus make sure jalanin pakai \u003ccode\u003epwsh\u003c/code\u003e, bukan \u003ccode\u003epowershell\u003c/code\u003e. Bisa dicek versi juga:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token variable\"\u003e$PSVersionTable\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003ePSVersion\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"error-lagi-masalah-module--path-yang-nggak-terbaca\"\u003eError Lagi? Masalah Module \u0026#x26; Path yang Nggak Terbaca\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#error-lagi-masalah-module--path-yang-nggak-terbaca\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePas gue coba install module \u003ccode\u003eTerminal-Icons\u003c/code\u003e atau \u003ccode\u003ePowerShellGet\u003c/code\u003e, error mulu. Setelah dicek-cek, ternyata module yang udah gue extract secara manual malah nggak bisa di-load. Gue kira karena path-nya salah atau PowerShell nggak nemu file \u003ccode\u003e.psd1\u003c/code\u003e yang jadi identitas modulnya.\u003c/p\u003e\n\u003cp\u003eSolusinya? Pastikan semua file module udah diekstrak ke folder:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token variable\"\u003e$env\u003c/span\u003e:USERPROFILE\\Documents\\PowerShell\\Modules\\PowerShellGet\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eDan make sure file \u003ccode\u003ePowerShellGet.psd1\u003c/code\u003e emang beneran ada:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token function\"\u003eTest-Path\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003cspan class=\"token variable\"\u003e$env\u003c/span\u003e:USERPROFILE\\Documents\\PowerShell\\Modules\\PowerShellGet\\PowerShellGet.psd1\"\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau udah, tinggal import ulang:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token function\"\u003eImport-Module\u003c/span\u003e PowerShellGet \u003cspan class=\"token operator\"\u003e-\u003c/span\u003eForce\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 id=\"oh-my-posh-biar-terminal-lo-kece\"\u003eOh My Posh: Biar Terminal Lo Kece\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#oh-my-posh-biar-terminal-lo-kece\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSekarang bagian serunya. Gue install \u003ccode\u003eoh-my-posh\u003c/code\u003e biar prompt-nya warna-warni dan informatif:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003ewinget install JanDeDobbeleer\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003eOhMyPosh \u003cspan class=\"token operator\"\u003e-\u003c/span\u003es winget\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eTerus gue pake theme \u003ccode\u003ejandedobbeleer\u003c/code\u003e yang udah built-in. Di \u003ccode\u003e$PROFILE\u003c/code\u003e, tambahin:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003eoh-my-posh init pwsh \u003cspan class=\"token operator\"\u003e--\u003c/span\u003econfig \u003cspan class=\"token string\"\u003e\"\u003cspan class=\"token variable\"\u003e$env\u003c/span\u003e:POSH_THEMES_PATH\\jandedobbeleer.omp.json\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e|\u003c/span\u003e \u003cspan class=\"token function\"\u003eInvoke-Expression\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eDan pastiin pake font Nerd Font seperti \u003ccode\u003eMesloLGS NF\u003c/code\u003e, karena tanpa ini icon bakal jadi tanda tanya semua.\u003c/p\u003e\n\u003ch2 id=\"git-alias-biar-ngetik-cepet\"\u003eGit Alias biar Ngetik Cepet\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#git-alias-biar-ngetik-cepet\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eGue tambahin alias ala ZSH ke dalam \u003ccode\u003e$PROFILE\u003c/code\u003e juga:\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e ga  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e git add @args \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e \u003cspan class=\"token function\"\u003egc\u003c/span\u003e  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e git commit @args \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e gcm \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e git commit \u003cspan class=\"token operator\"\u003e-\u003c/span\u003em @args \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e \u003cspan class=\"token function\"\u003egp\u003c/span\u003e  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e git push @args \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e \u003cspan class=\"token function\"\u003egl\u003c/span\u003e  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e git log @args \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e gst \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e git status \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003efunction\u003c/span\u003e gcam \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token keyword\"\u003eparam\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token variable\"\u003e$msg\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e git commit \u003cspan class=\"token operator\"\u003e-\u003c/span\u003eam \u003cspan class=\"token variable\"\u003e$msg\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eAlias ini bener-bener ngebantu biar nggak perlu ketik panjang tiap kali commit.\u003c/p\u003e\n\u003ch2 id=\"issue-di-vscode\"\u003eIssue di VSCode\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#issue-di-vscode\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eNyebelin banget entah kenapa vscode ngerefer ke \u003ccode\u003e$PROFILE\u003c/code\u003e yang berbeda. jadi mesti diakalin di profile dia buat dialigkan ke yang sama kaya di terminal\u003c/p\u003e\n\u003cpre class=\"language-powershell\"\u003e\u003ccode class=\"language-powershell\"\u003e\u003cspan class=\"token comment\"\u003e# Forwarder: Redirect pwsh to use WindowsPowerShell profile\u003c/span\u003e\n\u003cspan class=\"token variable\"\u003e$winProfile\u003c/span\u003e = \u003cspan class=\"token string\"\u003e\"\u003cspan class=\"token variable\"\u003e$env\u003c/span\u003e:OneDrive\\Dokumen\\WindowsPowerShell\\Microsoft.PowerShell_profile.ps1\"\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003eif\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token function\"\u003eTest-Path\u003c/span\u003e \u003cspan class=\"token variable\"\u003e$winProfile\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n    \u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e \u003cspan class=\"token variable\"\u003e$winProfile\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e \u003cspan class=\"token keyword\"\u003eelse\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n    \u003cspan class=\"token function\"\u003eWrite-Host\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"⚠️ Profile WindowsPowerShell tidak ditemukan.\"\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKonyol baget, abis dialihin kaya gini, baru bisa.\u003c/p\u003e\n\u003ch2 id=\"penutup\"\u003ePenutup\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#penutup\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSekarang PowerShell gue nggak cuma enak dipake tapi juga enak diliat. Prompt-nya informatif, icon muncul semua, dan semua udah sinkron dengan baik. Mungkin keliatan ribet, tapi begitu semua kelar, rasanya puas banget.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"crea
