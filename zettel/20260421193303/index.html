,{"type":"wiki","from":{"fname":"zettel.20260421193303","id":"zettel.20260421193303","vaultName":"vault"},"value":"zettel.20260421193302","position":{"start":{"line":43,"column":3,"offset":1854},"end":{"line":43,"column":28,"offset":1879},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260421193302"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":116,"column":3,"offset":10440},"end":{"line":116,"column":28,"offset":10465},"indent":[]},"value":"zettel.20260421193303"},{"from":{"fname":"zettel.20260421193304","id":"zettel.20260421193304","vaultName":"vault"},"type":"backlink","position":{"start":{"line":47,"column":3,"offset":2042},"end":{"line":47,"column":28,"offset":2067},"indent":[]},"value":"zettel.20260421193303"},{"from":{"fname":"zettel.moc.ai-native","id":"zettel.moc.ai-native","vaultName":"vault"},"type":"backlink","position":{"start":{"line":29,"column":3,"offset":1959},"end":{"line":29,"column":28,"offset":1984},"indent":[]},"value":"zettel.20260421193303"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":17,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":23,"column":0,"depth":2},"fungsi-bmad":{"type":"header","text":"Fungsi BMAD","value":"fungsi-bmad","line":29,"column":0,"depth":2},"mengapa-ini-penting":{"type":"header","text":"Mengapa ini penting","value":"mengapa-ini-penting","line":36,"column":0,"depth":2},"kesalahan-umum":{"type":"header","text":"Kesalahan umum","value":"kesalahan-umum","line":42,"column":0,"depth":2},"implikasi":{"type":"header","text":"Implikasi","value":"implikasi","line":48,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":54,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-duduk-di-lapisan-methodology-dan-orchestration-bukan-sekadar-prompt-atau-persona\"\u003eBMAD duduk di lapisan methodology dan orchestration, bukan sekadar prompt atau persona\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-duduk-di-lapisan-methodology-dan-orchestration-bukan-sekadar-prompt-atau-persona\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eDi lapisan mana BMAD sebenarnya berada dalam AI-native engineering?\u003c/li\u003e\n\u003cli\u003eKenapa BMAD bukan sekadar prompt system atau persona?\u003c/li\u003e\n\u003cli\u003eApa nilai utama BMAD sebagai operating model?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD bukan model, bukan agent, dan bukan sekadar toolkit prompt. BMAD berada paling kuat di lapisan methodology dan orchestration.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBMAD adalah cara menyusun ritme kerja: kapan ide digali, kapan requirement dipetakan, kapan keputusan teknis dibekukan, kapan implementasi boleh jalan cepat, dan kapan review dilakukan.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"fungsi-bmad\"\u003eFungsi BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#fungsi-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMemaksa workflow terstruktur dengan fase terpisah.\u003c/li\u003e\n\u003cli\u003eMenyediakan artefak yang menyambung antar fase.\u003c/li\u003e\n\u003cli\u003eMenata peran agent melalui named agents.\u003c/li\u003e\n\u003cli\u003eMengintegrasikan context dan spec sebagai boundary.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa ini penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKalau agent adalah pelaksana dan model adalah otak, BMAD adalah cara menyusun ritme kerja agar keduanya tidak saling memperbesar kebingungan.\u003c/p\u003e\n\u003cp\u003eDengan BMAD, perubahan tidak hanya diukur dari seberapa cepat AI menghasilkan output, tapi seberapa baik output itu berada dalam jalur yang dapat dipertanggungjawabkan.\u003c/p\u003e\n\u003ch2 id=\"kesalahan-umum\"\u003eKesalahan umum\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kesalahan-umum\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMengira BMAD hanya soal persona Mary, John, Winston, Amelia.\u003c/li\u003e\n\u003cli\u003eMengira BMAD hanya soal prompt atau UI.\u003c/li\u003e\n\u003cli\u003eMengukur BMAD dari kecepatan kode yang dihasilkan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eBMAD paling masuk akal sebagai jawaban terhadap problem \"bagaimana AI harus bekerja seperti tim yang terstruktur.\"\u003c/li\u003e\n\u003cli\u003eNilai BMAD adalah pada fase, artefak, dan operating rhythm yang mengikat model, agent, context, dan spec.\u003c/li\u003e\n\u003cli\u003eIni membuat BMAD lebih dekat ke operating model daripada fitur produk.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170516\"\u003eBMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/a\u003e — BMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e — BMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193302\"\u003eContext engineering adalah menyusun constraint lokal, bukan sekadar menambahkan informasi\u003c/a\u003e — Context engineering adalah menyusun constraint lokal, bukan sekadar menambahkan informasi\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emethodology (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eorchestration (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193304\"\u003ePlanning harus dipisah dari solutioning agar requirement dan teknikal decision tetap jernih\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineeri
