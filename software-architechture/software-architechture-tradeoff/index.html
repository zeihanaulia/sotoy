ps":{"note":{"id":"notes.software-architechture.software-architechture-tradeoff","title":"Software Architechture Tradeoff","desc":"","updated":1674110510897,"created":1674106458496,"custom":{},"fname":"notes.software-architechture.software-architechture-tradeoff","type":"note","vault":{"fsPath":"vault"},"contentHash":"178fe6cbb67cbe3ffbb36cfe87c6e7a2","links":[{"from":{"fname":"zettel.moc.software-architecture","id":"zettel.moc.software-architecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":25,"column":3,"offset":1082},"end":{"line":25,"column":67,"offset":1146},"indent":[]},"value":"notes.software-architechture.software-architechture-tradeoff"},{"from":{"fname":"zettel.moc.software-architecture","id":"zettel.moc.software-architecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":71,"column":3,"offset":4781},"end":{"line":71,"column":67,"offset":4845},"indent":[]},"value":"notes.software-architechture.software-architechture-tradeoff"}],"anchors":{"law-of-software-architechture":{"type":"header","text":"Law of Software Architechture","value":"law-of-software-architechture","line":13,"column":0,"depth":2},"analyzing-architechture-tradeoff":{"type":"header","text":"Analyzing Architechture Tradeoff","value":"analyzing-architechture-tradeoff","line":30,"column":0,"depth":2},"modern-tradeoff-analysis":{"type":"header","text":"Modern tradeoff analysis","value":"modern-tradeoff-analysis","line":44,"column":0,"depth":2}},"children":[],"parent":"notes.software-architechture","data":{}},"body":"\u003ch1 id=\"software-architechture-tradeoff\"\u003eSoftware Architechture Tradeoff\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#software-architechture-tradeoff\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eLink:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/live-events/software-architecture-superstream-software-architecture-trade-offs/0636920083581/0636920083579/\"\u003eSoftware Architecture Superstream: Software Architecture Trade-Offs\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/library/view/fundamentals-of-software/9781492043447/\"\u003eFundamentals of Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"law-of-software-architechture\"\u003eLaw of Software Architechture\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#law-of-software-architechture\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003eEverything in software architecture is a trade-off.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e           - First Law of Software Architecture\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eGak ada yang disemua lini itu bagus. Setiap keputusan harus mempertimbangkan banyak faktor yang saling berlawanan.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eIf an architect thinks they have discovered something that isn’t a trade-off, more likely they just haven’t identified the trade-off yet.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eArsitekture lebih luas dari sekedar kombinasi struktural.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eWhy is more important than how.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eSebagai Architect kita harus fokus kepada \u003cstrong\u003eWHY\u003c/strong\u003e dibandingkan dengan \u003cstrong\u003eHOW\u003c/strong\u003e.\nApa alasan kenapa kita perlu banget lalu baru bicara HOW. Mungkin seorang arsitek bisa memahami bagaimana sistem yang ada diimplementasikan dari segi architechture, tapi tidak tau kenapa keputusan itu diambil. Maka dari itu pentingnya membuat ADR untuk mencatat kenapa hal itu diputuskan.\u003c/p\u003e\n\u003ch2 id=\"analyzing-architechture-tradeoff\"\u003eAnalyzing Architechture Tradeoff\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#analyzing-architechture-tradeoff\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/1-software-architechture-tradeoff.png\" alt=\"software architechture tradeoff\"\u003e\u003c/p\u003e\n\u003cp\u003eJika kamu diminta oleh tim bisnis untuk membantu mewujudkan goalnya yaitu \"kita perlu cepat \u003cstrong\u003etime to market\u003c/strong\u003e\" maka yang perlu kamu lakukan adalah mentransform \"Time to Market\" ke dalam Architechture characteristing ada 3 karakteristik utama yaitu Maintainability, Testatility, Deployability.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMaintainability adalah kemampuan dimana lo bisa dengan mudah menemukan lokasi code dan menggantinya. the ability to find and locate and change our code\u003c/li\u003e\n\u003cli\u003eTestability adalah  ease of but the completeness of testing\u003c/li\u003e\n\u003cli\u003eDeployability adalah which is about the frequency of deployment\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSetelah mendapatkan karakteristiknya maka selanjutkan kita analisa trade-offnya antara performance vs maintainability.\u003c/p\u003e\n\u003cp\u003eLalu bagaimana lo memilihnya? ya balik lagi ke architechture karakteristik dan balik lagi ke bisnis apa yang lebih penting untuk saat ini.\u003c/p\u003e\n\u003ch2 id=\"modern-tradeoff-analysis\"\u003eModern tradeoff analysis\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#modern-tradeoff-analysis\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/2-software-architechture-tradeoff-modern-tradeoff-analysis.png\" alt=\"modern tradeoff analisys\"\u003e\u003c/p\u003e\n\u003cp\u003eTipsnya adalah dengan membuat perbandingan dengan menggunakan scorecard. Misalnya lo gak tau nih gimana cara kita tau lebih bagus mana membuat shared library atau shared service?\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/3-software-architechture-traderoff-modern-analysis.png\" alt=\"trader of modern analysys\"\u003e  \u003c/p\u003e\n\u003cp\u003eKriterianya adalah\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eHeterogeneous code: Kriteria ini mengukur tingkat keragaman kode yang digunakan dalam arsitektur. Arsitektur yang memiliki kode yang lebih homogen akan dianggap lebih baik daripada arsitektur yang memiliki kode yang beragam.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eHigh code volatility: Kriteria ini mengukur tingkat perubahan kode yang terjadi dalam arsitektur. Arsitektur yang memiliki tingkat perubahan kode yang rendah akan dianggap lebih baik daripada arsitektur yang memiliki tingkat perubahan kode yang tinggi.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAbility to version changes: Kriteria ini mengukur kemampuan arsitektur untuk mengelola perubahan kode dalam versi yang berbeda. Arsitektur yang memiliki kemampuan yang baik dalam hal ini akan dianggap lebih baik daripada arsitektur yang kurang baik dalam hal ini.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eOverall change risk: Kriteria ini mengukur risiko perubahan keseluruhan yang terjadi dalam arsitektur. Arsitektur yang memiliki risiko perubahan yang rendah akan dianggap lebih baik daripada arsitektur yang memiliki risiko perubahan yang tinggi.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePerformance: Kriteria ini mengukur tingkat kinerja arsitektur. Arsitektur yang memiliki kinerja yang baik akan dianggap lebih baik daripada arsitektur yang kinerjanya kurang baik.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFault tolerance: Kriteria ini mengukur tingkat toleransi arsitektur terhadap kesalahan. Arsitektur yang memiliki tingkat toleransi yang tinggi akan dianggap lebih baik daripada arsitektur yang memiliki tingkat toleransi yang rendah.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eScalability: Kriteria ini mengukur tingkat skalabilitas arsitektur. Arsitektur yang dapat di skalakan dengan mudah akan dianggap lebih baik daripada arsitektur yang kurang dapat di skalakan.- Heterogeneous code apakah compatible dengan semua bahasa pemrograman?\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach ou
