ndron?\u003c/strong\u003e\u003cbr\u003e\nGue suka dengan pendekatan Dendron yang berbasis “seed” (notes) dan “vault” (kumpulan catatan). Mempermudah Gue mengorganisasi catatan yang biasanya berserakan.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"temukan-lebih-banyak\"\u003eTemukan Lebih Banyak\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#temukan-lebih-banyak\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika tertarik untuk tahu lebih banyak atau berinteraksi, berikut beberapa tautan yang mungkin berguna:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://zeihanaulia.github.io/sotoy/\"\u003eHalaman Utama Dendron\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/zeihanaulia\"\u003eGitHub Gue\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://x.com/zeihanaulia\"\u003eTwitter Gue\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSemoga lo betah di sini, dan jangan sungkan untuk memberikan masukan atau bertanya apa saja. Selamat menjelajah!\u003c/p\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/spfwom01chbihki1twghclf\"\u003eBook Summaries\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/bsv930j2j6qlih60c7eu7wh\"\u003eHandbook\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/ohf85tu5nw2b8ewx6cetsmp\"\u003eNotes\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/tvdcga33h6hi7fxd9cwqd66\"\u003eToday I Learned\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","note":{"id":"oqxmejlafk9x8rj9t5hya5z","title":"Halo dan Selamat Datang! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"ef2fcac03cf4ea8d1d4a86cb0b055ce0","links":[],"anchors":{"temukan-lebih-banyak":{"type":"header","text":"Temukan Lebih Banya
