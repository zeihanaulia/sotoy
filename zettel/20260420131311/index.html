 issue/ticket, PR description, shared design doc, spesifikasi fitur, atau catatan keputusan yang terus diperbarui.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eIni memberi legitimasi praktis untuk context anchoring AI. Kalau engineer sudah memakai dokumen bersama untuk memelihara konteks antar rekan, maka ide yang sama untuk AI bukanlah abstraksi jauh.\u003c/p\u003e\n\u003cp\u003eKalimat ini ditulis di sini untuk menegaskan bahwa kita sedang bicara tentang pola kolaborasi nyata, bukan teori. Contoh dokumen bersama menunjukkan bagaimana konteks kerja memang dipindahkan dari kepala satu orang ke artifact bersama yang bisa dibaca dan dilanjutkan oleh orang lain — dan oleh AI.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMendukung \u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — klaim diambil dari Paragraf 1.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e — tesis utama bahwa chat AI adalah medium berpikir, bukan tempat penyimpanan keputusan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — Paragraf 1\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #a03623;\" href=\"/sotoy/notes/tags.zettel\"\u003ezettel\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-collaboration (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\" href=\"/sotoy/notes/tags.knowledge-management\"\u003eknowledge-management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003econtext-anchoring (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131312\"\u003eAI memory tools sekarang kebanyakan project-level, bukan feature-level\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131400\"\u003eKecemasan menutup chat adalah indikator context leakage\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131401\"\u003eErosi konteks AI adalah isu arsitektural, bukan bug acak\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131402\"\u003eContext window besar tetap cepat habis dalam praktik engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131403\"\u003ePosisi informasi memengaruhi recall; tengah konteks adalah zona rawan hilang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131404\"\u003eDalam erosi konteks, why hilang sebelum what\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131405\"\u003eKalau medium lupa, pindahkan memori ke luar medium itu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131406\"\u003eSummarization otomatis menyelamatkan what, bukan why\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131407\"\u003eAlignment tanpa persistence tetap rapuh\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131408\"\u003eContext anchoring adalah durability layer untuk alignment manusia-AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131409\"\u003eDecision context harus menjadi external state, bukan jejak chat\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131410\"\u003eProject context dan feature context punya fungsi berbeda\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131411\"\u003ePriming document adalah memori stabil level proyek\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131412\"\u003eFeature document adalah memori dinamis level pekerjaan yang sedang berlangsung\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131413\"\u003eAgar efektif, AI butuh dua lapis konteks: fondasi stabil dan riwayat lokal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131414\"\u003eMembaca codebase tidak sama dengan memahami keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131415\"\u003eCode menyimpan outcome; reasoning dan rejected history tidak tampak di sana\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131416\"\u003eFeature document lebih semantik-padatan dan token-efisien daripada mengekstrak reasoning dari kode\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131417\"\u003eContext anchoring untuk AI adalah versi kontemporer dari kebutuhan yang melahirkan ADR\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131418\"\u003eFeature document adalah ADR hidup selama proses, bukan catatan pasca-fakta\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131419\"\u003eFeature document bisa jadi jembatan antara kerja harian dan dokumentasi formal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131420\"\u003eContext anchoring adalah infrastruktur koordinasi tim, bukan hanya memori individu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131421\"\u003eDokumen adalah mekanisme persistence yang menggantikan keterbatasan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131422\"\u003eSolusi ini bisa dipasang ke contoh praktis, bukan sekadar teori\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131423\"\u003eBegitu keputusan desain terkristal, pindahkan ke dokumen bersama alasannya\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131424\"\u003eFeature document yang efektif itu ringkas dan operasional\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131425\"\u003eStruktur minimal feature document jelas dan praktis\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131426\"\u003eNilai anchoring muncul saat sesi baru bisa warm start\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131427\"\u003eMaintenance dokumen harus menempel ke ritme kerja alami\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131428\"\u003eFeature document memaksa reasoning menjadi lebih jelas\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131429\"\u003eFeature document mengompresi hari kerja menjadi konteks yang bisa diakses ulang cepat\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131430\"\u003eContext anchoring adalah alat yang harus dikalibrasi, bukan default universal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131431\"\u003eKebutuhan anchoring naik seiring durasi, revisit, dan jumlah orang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131432\"\u003eNilai anchoring ditentukan oleh overhead dokumentasi versus biaya kehilangan konteks\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131433\"\u003eKeinginan mempertahankan chat adalah indikator anchoring belum cukup\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131434\"\u003eChat adalah medium berpikir; dokumen adalah medium penyimpanan keputusan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420131435\"\u003eKeberhasilan context anchoring diukur dari murahnya restart\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehav
