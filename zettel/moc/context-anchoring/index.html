u003eReviewer/owner finalize saat PR merge: mark sebagai \u003ccode\u003estatus: settled\u003c/code\u003e atau convert ke ADR jika berdampak besar.\u003c/li\u003e\n\u003cli\u003eKalau perlu, tambahkan field \u003ccode\u003elast-updated\u003c/code\u003e dan siapa yang mengubah.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eTemplate YAML minimal (copy-paste)\u003c/strong\u003e\u003c/p\u003e\n\u003cpre class=\"language-yaml\"\u003e\u003ccode class=\"language-yaml\"\u003e\u003cspan class=\"token key atrule\"\u003etitle\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Feature X — quick context\"\u003c/span\u003e\n\u003cspan class=\"token key atrule\"\u003edate\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token datetime number\"\u003e2026-04-20\u003c/span\u003e\n\u003cspan class=\"token key atrule\"\u003eowner\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e @nama\n\u003cspan class=\"token key atrule\"\u003edecision\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Gunakan paginasi server-side\"\u003c/span\u003e\n\u003cspan class=\"token key atrule\"\u003ereason\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Kurangi latency \u0026#x26; memori di client\"\u003c/span\u003e\n\u003cspan class=\"token key atrule\"\u003erefs\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n  \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e \u003cspan class=\"token key atrule\"\u003eissue\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token number\"\u003e123\u003c/span\u003e\n  \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e \u003cspan class=\"token key atrule\"\u003efiles\u003
