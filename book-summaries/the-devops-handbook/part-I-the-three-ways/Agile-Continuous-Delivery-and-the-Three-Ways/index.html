ps":{"note":{"id":"book-summaries.the-devops-handbook.part-I-the-three-ways.Agile-Continuous-Delivery-and-the-Three-Ways","title":"Agile Continuous Delivery and the Three Ways","desc":"","updated":1682058124603,"created":1682056287407,"custom":{},"fname":"book-summaries.the-devops-handbook.part-I-the-three-ways.Agile-Continuous-Delivery-and-the-Three-Ways","type":"note","vault":{"fsPath":"vault"},"contentHash":"7fa37a61cbd2a03c4b384c2d74d45d2e","links":[],"anchors":{"ringkasan":{"type":"header","text":"Ringkasan","value":"ringkasan","line":11,"column":0,"depth":2},"action-items":{"type":"header","text":"Action Items","value":"action-items","line":15,"column":0,"depth":2},"the-manufacturing-value-stream":{"type":"header","text":"THE MANUFACTURING VALUE STREAM","value":"the-manufacturing-value-stream","line":29,"column":0,"depth":2},"the-technology-value-stream":{"type":"header","text":"THE TECHNOLOGY VALUE STREAM","value":"the-technology-value-stream","line":37,"column":0,"depth":2},"focus-on-deployment-lead-time":{"type":"header","text":"FOCUS ON DEPLOYMENT LEAD TIME","value":"focus-on-deployment-lead-time","line":45,"column":0,"depth":2},"defining-lead-time-vs-processing-time":{"type":"header","text":"Defining Lead Time vs. Processing Time","value":"defining-lead-time-vs-processing-time","line":53,"column":0,"depth":3},"skenario-umum-waktu-pemakaian-yang-memerlukan-berbulan-bulan":{"type":"header","text":"Skenario Umum: Waktu Pemakaian Yang Memerlukan Berbulan-Bulan","value":"skenario-umum-waktu-pemakaian-yang-memerlukan-berbulan-bulan","line":63,"column":0,"depth":3},"visi-devops-kami-deployment-lead-time-dalam-hitungan-menit":{"type":"header","text":"Visi DevOps Kami: Deployment Lead Time dalam Hitungan Menit","value":"visi-devops-kami-deployment-lead-time-dalam-hitungan-menit","line":72,"column":0,"depth":3},"observing-ca-as-a-measure-of-rework":{"type":"header","text":"OBSERVING “%C/A” AS A MEASURE OF REWORK","value":"observing-ca-as-a-measure-of-rework","line":84,"column":0,"depth":3},"the-three-ways-the-principles-underpinning-devops":{"type":"header","text":"THE THREE WAYS: THE PRINCIPLES UNDERPINNING DEVOPS","value":"the-three-ways-the-principles-underpinning-devops","line":94,"column":0,"depth":2}},"children":[],"parent":"book-summaries.the-devops-handbook.part-I-the-three-ways","data":{}},"body":"\u003ch1 id=\"agile-continuous-delivery-and-the-three-ways\"\u003eAgile Continuous Delivery and the Three Ways\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#agile-continuous-delivery-and-the-three-ways\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eTeori dasar dari Lean Manufacturing dan The Three Ways, prinsip-prinsip dari mana semua perilaku DevOps dapat diperoleh. Fokus utama di sini adalah pada teori dan prinsip-prinsip tersebut, yang menggambarkan banyak pengalaman yang dipelajari selama beberapa dekade dari manufaktur, organisasi dengan keandalan tinggi, model manajemen dengan kepercayaan tinggi, dan lain-lain, dari mana praktik DevOps telah diperoleh. Prinsip-prinsip dan pola-pola konkret yang dihasilkan, serta aplikasi praktisnya untuk aliran nilai teknologi, disajikan dalam bab-bab yang tersisa dari buku ini.\u003c/p\u003e\n\u003ch2 id=\"ringkasan\"\u003eRingkasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ringkasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eRingkasan dari section \"PART I - Agile, Continuous Delivery, and the Three Ways\" adalah memperkenalkan konsep-konsep yang terkait dengan pengiriman nilai melalui teknologi value stream, termasuk pengukuran waktu pemrosesan dan pengiriman, serta prinsip-prinsip dasar DevOps yang dikenal sebagai Three Ways. Three Ways ini mencakup prinsip-prinsip Flow, Feedback, dan Experimentation yang menjadi dasar DevOps dan digunakan untuk menghasilkan pengiriman produk dan layanan secara cepat, berkualitas, dan terus menerus. Selain itu, disebutkan juga tentang praktik-praktik yang memungkinkan aliran kerja yang cepat, mengamplifikasi umpan balik untuk mencegah masalah yang sama terjadi lagi, dan menciptakan budaya yang mendukung pengambilan risiko dan percobaan yang inovatif.\u003c/p\u003e\n\u003ch2 id=\"action-items\"\u003eAction Items\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#action-items\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBeberapa action item yang dapat diambil dari section \"PART I - Agile, Continuous Delivery, and the Three Ways\" adalah:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIdentifikasi dan visualisasikan value stream organisasi Anda untuk memahami bagaimana pekerjaan dilakukan, siapa yang melakukannya, dan bagaimana nilai diciptakan.\u003c/li\u003e\n\u003cli\u003eUkur lead time dan process time dalam value stream Anda untuk mengetahui bagaimana proses bekerja dan mengidentifikasi area yang dapat dioptimalkan.\u003c/li\u003e\n\u003cli\u003eGunakan %C/A sebagai metrik untuk mengukur kualitas output dalam setiap tahap value stream dan mengidentifikasi area yang perlu ditingkatkan.\u003c/li\u003e\n\u003cli\u003eTerapkan prinsip-prinsip Three Ways untuk meningkatkan efektivitas dan efisiensi value stream organisasi Anda.\u003c/li\u003e\n\u003cli\u003eFokus pada prinsip Flow untuk menciptakan aliran kerja yang cepat dan efektif dalam value stream Anda.\u003c/li\u003e\n\u003cli\u003eImplementasikan praktik-praktik seperti continuous build, integration, test, dan deployment processes, menciptakan lingkungan on-demand, dan membatasi work in process (WIP).\u003c/li\u003e\n\u003cli\u003eFokus pada prinsip Feedback Loop untuk menciptakan sistem kerja yang lebih aman dan berkelanjutan, dan memaksimalkan kesempatan untuk belajar dan berkembang.\u003c/li\u003e\n\u003cli\u003eMembangun budaya organisasi yang mendukung eksperimen dan pengambilan risiko yang didasarkan pada pendekatan ilmiah dan disiplin, sehingga organisasi dapat belajar dan berkembang lebih cepat dari pesaing di pasar.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"the-manufacturing-value-stream\"\u003eTHE MANUFACTURING VALUE STREAM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-manufacturing-value-stream\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePada bagian ini, diperkenalkan konsep dasar dari Lean Manufacturing yaitu value stream. Konsep ini dijelaskan terlebih dahulu dalam konteks manufaktur dan kemudian diterapkan pada DevOps dan teknologi value stream. \u003c/p\u003e\n\u003cp\u003eKaren Martin dan Mike Osterling mendefinisikan value stream dalam bukunya Value Stream Mapping: How to Visualize Work and Align Leadership for Organizational Transformation sebagai \"urutan aktivitas yang dilakukan oleh sebuah organisasi untuk memenuhi permintaan pelanggan,\" atau \"urutan aktivitas yang diperlukan untuk merancang, memproduksi, dan mengirimkan barang atau layanan kepada pelanggan, termasuk aliran ganda informasi dan bahan.\" \u003c/p\u003e\n\u003cp\u003ePada operasi manufaktur, value stream seringkali mudah dilihat dan diamati: dimulai ketika pesanan pelanggan diterima dan bahan baku dirilis ke lantai pabrik. Untuk memungkinkan waktu pemrosesan yang cepat dan dapat diprediksi pada setiap value stream, biasanya terdapat fokus yang tak kenal lelah dalam menciptakan aliran kerja yang lancar dan merata, dengan menggunakan teknik seperti ukuran batch kecil, mengurangi work in process (WIP), mencegah rework untuk memastikan bahwa tidak ada cacat yang diteruskan ke work center downstream, dan terus mengoptimalkan sistem kita menuju tujuan global kita.\u003c/p\u003e\n\u003ch2 id=\"the-technology-value-stream\"\u003eTHE TECHNOLOGY VALUE STREAM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-technology-value-stream\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSelanjutnya buku ini membahas mengenai value stream di dalam teknologi, di mana prinsip-prinsip yang sama yang memungkinkan aliran kerja yang cepat dalam proses fisik juga sama-sama berlaku untuk pekerjaan teknologi (dan, pada kenyataannya, untuk semua pekerjaan pengetahuan). Dalam DevOps, teknologi value stream didefinisikan sebagai proses yang diperlukan untuk mengubah hipotesis bisnis menjadi layanan yang diaktifkan oleh teknologi yang memberikan nilai kepada pelanggan.\u003c/p\u003e\n\u003cp\u003eInput dari proses ini adalah formulasi tujuan bisnis, konsep, ide, atau hipotesis, dan dimulai ketika pekerjaan diterima di Pengembangan, ditambahkan ke backlog pekerjaan yang sudah dikommit. Dari sana, tim Pengembangan yang mengikuti proses Agile atau iteratif yang khas kemungkinan akan mentransformasikan ide itu menjadi cerita pengguna dan beberapa jenis spesifikasi fitur, yang kemudian diimplementasikan dalam kode ke aplikasi atau layanan yang sedang dibangun. Kode kemudian diperiksa di dalam repositori kontrol versi, di mana setiap perubahan diintegrasikan dan diuji dengan bagian lain dari sistem perangkat lunak.\u003c/p\u003e\n\u003cp\u003eKarena nilai diciptakan hanya ketika layanan kami berjalan di production, kami harus memastikan bahwa kami tidak hanya memberikan aliran yang cepat, tetapi juga bahwa deployment kami dapat dilakukan tanpa menyebabkan kekacauan dan gangguan seperti outage layanan, impairments layanan, atau kegagalan keamanan atau kepatuhan.\u003c/p\u003e\n\u003ch2 id=\"focus-on-deployment-lead-time\"\u003eFOCUS ON DEPLOYMENT LEAD TIME\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#focus-on-deployment-lead-time\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSelanjutnya buku ini fokus pada waktu deployment (deployment lead time), suatu subset dari nilai aliran yang telah dijelaskan sebelumnya. Nilai aliran ini dimulai ketika setiap insinyur dalam nilai aliran kita (yang mencakup Development, QA, IT Operations, dan Infosec) memeriksa perubahan ke dalam kontrol versi dan berakhir ketika perubahan itu berhasil berjalan di produksi, memberikan nilai kepada pelanggan dan menghasilkan umpan balik dan telemetri yang berguna.\u003c/p\u003e\n\u003cp\u003eFase pertama dari pekerjaan yang mencakup Desain dan Pengembangan mirip dengan Lean Product Development dan sangat bervariasi dan sangat tidak pasti, seringkali memerlukan tingkat kreativitas yang tinggi dan pekerjaan yang mungkin tidak pernah dilakukan lagi, menghasilkan waktu proses yang sangat bervariasi. Sebaliknya, fase kedua dari pekerjaan, yang mencakup Pengujian dan Operasi, mirip dengan Lean Manufacturing. Ini membutuhkan kreativitas dan keahlian, dan berusaha untuk dapat diprediksi dan mekanistik, dengan tujuan mencapai hasil kerja dengan minimalkan variabilitas (misalnya, waktu deployment yang pendek dan dapat diprediksi, hampir tanpa cacat).\u003c/p\u003e\n\u003cp\u003eAlih-alih memproses batch kerja besar secara berurutan melalui nilai aliran desain/pengembangan dan kemudian melalui nilai aliran pengujian/operasi (seperti ketika kita memiliki proses air terjun batch besar atau cabang fitur yang hidup lama), tujuan kita adalah untuk memiliki pengujian dan operasi berjalan secara simultan dengan desain/pengembangan, memungkinkan aliran yang cepat dan berkualitas tinggi. Metode ini berhasil ketika kita bekerja dalam batch kecil dan membangun kualitas ke setiap bagian dari nilai aliran kita.†††\u003c/p\u003e\n\u003ch3 id=\"defining-lead-time-vs-processing-time\"\u003eDefining Lead Time vs. Processing Time\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#defining-lead-time-vs-processing-time\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDi komunitas Lean, lead time adalah salah satu dari dua ukuran yang umum digunakan untuk mengukur kinerja dalam value stream, dengan yang lain adalah processing time (kadang-kadang dikenal sebagai touch time atau task time).\u003c/p\u003e\n\u003cp\u003eSementara jam lead time dimulai saat permintaan dibuat dan berakhir ketika permintaan terpenuhi, jam process time dimulai hanya ketika kami mulai bekerja pada permintaan pelanggan—secara khusus, menghilangkan waktu ketika pekerjaan berada di antrian, menunggu untuk diproses.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230421130113.png\" alt=\"Lead time vs. process time of a deployment operation\"\u003e\u003c/p\u003e\n\u003cp\u003eKarena lead time adalah yang dialami pelanggan, kami biasanya memfokuskan perhatian perbaikan proses kami di sana daripada pada process time. Namun, proporsi process time terhadap lead time menjadi ukuran efisiensi yang penting—mencapai aliran cepat dan lead time yang pendek hampir selalu memerlukan pengurangan waktu pekerjaan kami menunggu di antrian.\u003c/p\u003e\n\u003ch3 id=\"skenario-umum-waktu-pemakaian-yang-memerlukan-berbulan-bulan\"\u003eSkenario Umum: Waktu Pemakaian Yang Memerlukan Berbulan-Bulan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#skenario-umum-waktu-pemakaian-yang-memerlukan-berbulan-bulan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDalam bisnis biasa, seringkali kita menemukan diri kita berada dalam situasi di mana waktu penyebaran kami memerlukan berbulan-bulan. Ini terutama umum terjadi dalam organisasi besar dan kompleks yang bekerja dengan aplikasi monolitik yang sangat terkait, seringkali dengan lingkungan uji integrasi yang langka, waktu pemimpin lingkungan uji dan produksi yang lama, ketergantungan tinggi pada pengujian manual, dan beberapa proses persetujuan yang diperlukan. Ketika ini terjadi, maka value stream kita mungkin terlihat seperti pada gambar:\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230421130420.png\" alt=\"A technology value stream with a deployment lead time of three months (Source: Damon Edwards, “DevOps Kaizen,” 2015.)\"\u003e\u003c/p\u003e\n\u003cp\u003eKetika kita memiliki waktu penyebaran yang lama, heroisme diperlukan di hampir setiap tahap value stream. Kita mungkin menemukan bahwa tidak ada yang berfungsi pada akhir proyek ketika kita menggabungkan semua perubahan tim pengembangan, yang menghasilkan kode yang tidak lagi dibangun dengan benar atau lulus semua tes kami. Memperbaiki setiap masalah memerlukan hari atau minggu investigasi untuk menentukan siapa yang merusak kode dan bagaimana itu dapat diperbaiki, dan masih menghasilkan hasil pelanggan yang buruk.\u003c/p\u003e\n\u003ch3 id=\"visi-devops-kami-deployment-lead-time-dalam-hitungan-menit\"\u003eVisi DevOps Kami: Deployment Lead Time dalam Hitungan Menit\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#visi-devops-kami-deployment-lead-time-dalam-hitungan-menit\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePada kondisi ideal DevOps, para developer menerima umpan balik cepat dan terus-menerus terhadap pekerjaan mereka, yang memungkinkan mereka untuk dengan cepat dan mandiri mengimplementasikan, mengintegrasikan, dan memvalidasi kode mereka, serta melakukan deployment kode tersebut ke dalam lingkungan produksi (baik dengan melakukan deployment sendiri atau oleh orang lain).\u003c/p\u003e\n\u003cp\u003eKami mencapainya dengan terus memeriksa perubahan kode kecil ke dalam repositori kontrol versi kami, melakukan pengujian otomatis dan eksploratori terhadapnya, dan mendeploynya ke dalam produksi. Ini memungkinkan kami memiliki tingkat keyakinan yang tinggi bahwa perubahan kami akan berfungsi seperti yang direncanakan di produksi dan bahwa setiap masalah dapat dideteksi dan diperbaiki dengan cepat.\u003c/p\u003e\n\u003cp\u003eHal ini paling mudah dicapai ketika kita memiliki arsitektur yang modular, terenkapsulasi dengan baik, dan longgar-terkait sehingga tim kecil mampu bekerja dengan tingkat otonomi yang tinggi, dengan kegagalan yang kecil dan terkandung, dan tanpa menyebabkan gangguan global.\u003c/p\u003e\n\u003cp\u003ePada skenario ini, waktu deployment lead time kita diukur dalam hitungan menit, atau, dalam kasus terburuk, jam. Peta alir nilai hasil kami harus terlihat seperti gambar:\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230421130853.png\" alt=\"A technology value stream with a lead time of minutes\"\u003e\u003c/p\u003e\n\u003ch3 id=\"observing-ca-as-a-measure-of-rework\"\u003eOBSERVING “%C/A” AS A MEASURE OF REWORK\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#observing-ca-as-a-measure-of-rework\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMetric ketiga dalam technology value stream, yaitu persentase selesai dan akurat (%C/A) yang mencerminkan kualitas output dari setiap langkah dalam value stream. %C/A dapat diukur dengan cara menanyakan kepada pelanggan downstream berapa persentase waktu mereka menerima pekerjaan yang \"dapat digunakan apa adanya\" yang berarti mereka dapat melakukan pekerjaan mereka tanpa harus memperbaiki informasi yang diberikan, menambahkan informasi yang hilang yang seharusnya disediakan, atau menjelaskan informasi yang seharusnya dan bisa lebih jelas. \u003c/p\u003e\n\u003cp\u003eHal ini menjadi penting karena kualitas yang buruk akan menghasilkan pekerjaan yang tidak efektif dan efisien dalam penggunaan sumber daya.\u003c/p\u003e\n\u003cp\u003eMisalnya, dalam sebuah perusahaan software, jika 80% dari kode yang dikerjakan oleh tim pengembang dalam sprint pertama dapat diserahkan ke tim testing tanpa perlu dilakukan perbaikan tambahan, maka %C/A untuk sprint tersebut adalah 80%. Artinya, dari semua pekerjaan yang diselesaikan dalam sprint pertama, 80% dari pekerjaan tersebut dapat digunakan tanpa perlu dikerjakan ulang atau memperbaiki lagi.\u003c/p\u003e\n\u003cp\u003eJika persentase %C/A ini rendah, misalnya hanya 30%, artinya hanya 30% pekerjaan yang dapat diserahkan ke downstream tanpa perlu dilakukan perbaikan tambahan, sedangkan 70% sisanya memerlukan rework atau perbaikan lagi, yang berarti adanya masalah dalam proses pengembangan yang harus diperbaiki. Dalam hal ini, peningkatan %C/A menjadi tujuan yang harus dicapai untuk meningkatkan kualitas hasil kerja dan mengurangi rework.\u003c/p\u003e\n\u003ch2 id=\"the-three-ways-the-principles-underpinning-devops\"\u003eTHE THREE WAYS: THE PRINCIPLES UNDERPINNING DEVOPS\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-three-ways-the-principles-underpinning-devops\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKonsep ini terdiri dari tiga prinsip yang menjadi dasar bagi semua perilaku dan pola DevOps yang diamati. Prinsip pertama disebut The First Way, yang bertujuan untuk memungkinkan aliran kerja yang cepat dari Development ke Operations hingga ke pelanggan. \u003c/p\u003e\n\u003cp\u003eUntuk memaksimalkan aliran kerja ini, perlu membuat pekerjaan terlihat, mengurangi ukuran batch dan interval pekerjaan, membangun kualitas dengan mencegah cacat agar tidak diteruskan ke pusat kerja hilir, dan terus mengoptimalkan tujuan global. Prinsip-prinsip lain dari The Three Ways akan dibahas pada bagian selanjutnya.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230421131336.png\" alt=\"The Three Ways (Source: Gene Kim, “The Three Ways: The Principles Underpinning DevOps,” IT Revolution Press blog, accessed August 9, 2016, http://itrevolution.com/the-three-ways-principles-underpinning-devops/.)\"\u003e\u003c/p\u003e\n\u003cp\u003eDengan mempercepat aliran melalui value stream teknologi, kita dapat mengurangi waktu yang diperlukan untuk memenuhi permintaan internal atau pelanggan, terutama waktu yang dibutuhkan untuk mendeploy kode ke lingkungan produksi. Dengan melakukan hal ini, kita meningkatkan kualitas pekerjaan dan throughput, serta meningkatkan kemampuan kita untuk melampaui kompetisi.\u003c/p\u003e\n\u003cp\u003ePraktik yang dihasilkan meliputi proses continuous build, integration, test, dan deployment; menciptakan lingkungan sesuai permintaan; membatasi work in process (WIP); dan membangun sistem dan organisasi yang aman untuk diubah.\u003c/p\u003e\n\u003cp\u003ePrinsip kedua (The Second Way) adalah memungkinkan aliran feedback yang cepat dan konstan dari kanan ke kiri di semua tahap value stream kita. Dalam prinsip ini, kita perlu memperkuat feedback untuk mencegah masalah terjadi lagi atau memungkinkan deteksi dan pemulihan yang lebih cepat. Dengan melakukan ini, kita menciptakan kualitas di sumbernya dan menghasilkan atau menyematkan pengetahuan di tempat yang dibutuhkan.\u003c/p\u003e\n\u003cp\u003eDengan melihat masalah saat terjadi dan menanganinya hingga tindakan perbaikan yang efektif diterapkan, kita terus memperpendek dan memperkuat feedback loop, prinsip inti dari hampir semua metodologi perbaikan proses modern. Hal ini memaksimalkan peluang organisasi kita untuk belajar dan meningkatkan.\u003c/p\u003e\n\u003cp\u003ePrinsip ketiga (The Third Way) adalah memungkinkan terciptanya budaya generatif yang tinggi kepercayaannya dan mendukung pendekatan yang dinamis, disiplin, dan ilmiah terhadap eksperimen dan pengambilan risiko. Prinsip ini memfasilitasi terciptanya pembelajaran organisasi dari keberhasilan dan kegagalan. Dengan memperpendek dan memperkuat terus-menerus feedback loop, kita menciptakan sistem kerja yang semakin aman dan mampu mengambil risiko serta melakukan eksperimen yang membantu kita belajar lebih cepat dari kompetitor dan menang di pasar.\u003c/p\u003e\n\u003cp\u003eSebagai bagian dari The Third Way, kita juga merancang sistem kerja kita sehingga kita dapat memperbanyak efek pengetahuan baru, mengubah penemuan lokal menjadi perbaikan global. Terlepas dari di mana seseorang melakukan pekerjaan, mereka melakukannya dengan pengalaman kumulatif dan kolektif dari semua orang di organisasi.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocke
