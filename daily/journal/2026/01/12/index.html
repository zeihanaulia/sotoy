ps":{"note":{"id":"daily.journal.2026.01.12","title":"2026-01-12","desc":"","updated":1768230180475,"created":1768173083930,"traitIds":["journalNote"],"custom":{},"fname":"daily.journal.2026.01.12","type":"note","vault":{"fsPath":"vault"},"contentHash":"24de16d4f6f0d19f3a3976ed1ea91683","links":[],"anchors":{},"children":[],"parent":"daily.journal.2026.01","data":{}},"body":"\u003ch1 id=\"2026-01-12\"\u003e2026-01-12\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2026-01-12\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://antirez.com/news/158\"\u003eDon't fall into the anti-AI hype\u003c/a\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003efacts are facts, and AI is going to change programming forever.\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eDisini antirez founder Redis, bikin poin yang menarik banget soal AI dan programming.\u003c/li\u003e\n\u003cli\u003eAI is going to change programming forever.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFor most projects, writing the code yourself is no longer sensible, if not to have fun.\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003engoding buat fun aja, kalo buat produktivitas mending pake AI.\u003c/li\u003e\n\u003cli\u003eAI menang dari sisi ekonomis dan efisiensi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIt is now a lot more interesting to understand what to do, and how to do it (and, about this second part, LLMs are great partners, too)\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eProgramming gak mati, tapi berubah bentuk.\u003c/li\u003e\n\u003cli\u003eDulu programmer itu nulis code, sekarang:\n\u003cul\u003e\n\u003cli\u003engerti problem secara konseptual\u003c/li\u003e\n\u003cli\u003ebisa bikin mental model yang jelas\u003c/li\u003e\n\u003cli\u003ebisa mengkomunukasikan tujuan dan constraint ke AI\u003c/li\u003e\n\u003cli\u003ebisa review koreksi dan mengarahkan\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eJadi kalau lo gak ngerti problemnya, lo gak bakal bisa manfaatin AI dengan maksimal\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eI feel great to be part of that.\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eDi profesi lain, banyak orang takut karyanya dimakan sama AI, merasa dicuri hasil jerih payahnya.\u003c/li\u003e\n\u003cli\u003eTapi di programming, LLM ini kelanjutan dari open source. Tujuannya sama demokratisasi kemampuan.\n\u003cul\u003e\n\u003cli\u003etahun 90an, open source bikin tim kecil bisa ngalahin korporasi besar.\u003c/li\u003e\n\u003cli\u003eSekaranhg LLM bikin individu bisa bersaing.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eit is absolutely not obvious that it will be like that forever.\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eTapi ada ke khawatiran, karena AI di kontrol sama perusahaan besar seperti OpenAI, Antropic, Google. \u003c/li\u003e\n\u003cli\u003eCompute training jadi barrier baru.\u003c/li\u003e\n\u003cli\u003eModel tertutup ini mendominasi, dan ini bisa bermasalah.\u003c/li\u003e\n\u003cli\u003eTapi agak lega karena ada  beberapa open models yang mulai bermunculan.\u003c/li\u003e\n\u003cli\u003eChina ikutan dan semoga merelease GPUs canggih mereka ke publik.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBut I'm worried for the folks that will get fired.\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003eTapi bakal ada orang yang kena PHK karena AI.\u003c/li\u003e\n\u003cli\u003eMasih belum jelas apakah perusahaan bakal hire lebih banyak untuk membuat lebih banyak atau justru mengurani karyawan dan hire Prompt Engineer Elite.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWhatever you believe about what the Right Thing should be, you can't control it by refusing what is happening right now.\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eAI is happening, gak bisa dihindari.\u003c/li\u003e\n\u003cli\u003eKalo lo nolak, lo bakal ketinggalan.\u003c/li\u003e\n\u003cli\u003eMendingan pelajarin dan manfaatin AI sebaik mungkin.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=knVaCNiH-8I\"\u003eCareer Strategy For People With Too Many Interests (The M-Shaped Future)\u003c/a\u003e\n\u003cul\u003e\n\u003cli\u003eI could do anything if I only knew what it was.\n\u003cul\u003e\n\u003cli\u003eIni adalah quote dari Ray Dalio, investor sukses yang juga founder Bridgewater Associates.\u003c/li\u003e\n\u003cli\u003eDia bilang, dia bisa sukses kalo dia tau apa yang harus dia lakukan.\u003c/li\u003e\n\u003cli\u003eMasalahnya, dia gak tau apa yang harus dia lakukan.\u003c/li\u003e\n\u003cli\u003eDia punya banyak minat, tapi gak ada yang dia rasa \"ini dia yang harus gue lakuin\".\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eBanyak orang punya masalah yang sama.\n\u003cul\u003e\n\u003cli\u003eMereka punya banyak minat, tapi gak ada yang mereka rasa \"ini dia yang harus gue lakuin\".\u003c/li\u003e\n\u003cli\u003eMereka bingung, harus fokus ke satu minat aja, atau eksplorasi semua minat mereka.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eini disebut juga scanner's dilemma.\n\u003cul\u003e\n\u003cli\u003eScanner's dilemma adalah kondisi dimana seseorang punya banyak minat, tapi gak ada yang dia rasa \"ini dia yang harus gue lakuin\".\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003ekind environment vs wicked environment\n\u003cul\u003e\n\u003cli\u003eKind environment adalah lingkungan yang stabil, dimana aturan mainnya jelas, dan hasilnya bisa diprediksi.\u003c/li\u003e\n\u003cli\u003eWicked environment adalah lingkungan yang dinamis, dimana aturan mainnya berubah-ubah, dan hasilnya gak bisa diprediksi.\u003c/li\u003e\n\u003cli\u003edi Kind envronment kalau lo ulangi hal yang sama, hasilnya bisa jadi relatif sama. Di dunia seperti ini make sense kalau orang yang paling sukses adalah orang yang menggali paling dalam.\u003c/li\u003e\n\u003cli\u003eMasalahnya, dunia sudah tidak seperti itu lagi. Dunia sekarang berubah dengan cepat, aturan bergeser, feedback datang terlambat, dan serkali datangnya bertahun tahun kemudian.\u003c/li\u003e\n\u003cli\u003eSebagai analogi, golfer vs firefighter.\n\u003cul\u003e\n\u003cli\u003eGolfer itu main di lingkungan yang kind, dia bisa latihan terus menerus, dan hasilnya bisa diprediksi.\u003c/li\u003e\n\u003cli\u003eFirefighter itu main di lingkungan yang wicked, dia gak bisa latihan terus menerus, dan hasilnya gak bisa diprediksi malah kalau ikuti prosedur mentah mentah malah bisa bahaya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eSpecialist tidak salah, yang salah adalah ketika satu model manusia dijadikan satu satunya model standard.\u003c/li\u003e\n\u003cli\u003eJadi dari berhenti mikir karir itu sebagai job title, tapi mulai mikir sebagai bentuk.\n\u003cul\u003e\n\u003cli\u003eKalau specialis itu bentuknya seperti I\u003c/li\u003e\n\u003cli\u003eKalau orang yang tau banyak hal tapi gak terlalu dalam itu bentuknya seperti dash (-) lebar tapi rapuh.\u003c/li\u003e\n\u003cli\u003eMaka bentuk yang paling masuk akal buat scanner adalah M.\n\u003cul\u003e\n\u003cli\u003eArtinya, lo punya beberapa pilar yang benar benar dalam, bukan satu tapi juga bukan semua.\n\u003cul\u003e\n\u003cli\u003eContoh: data science, storytelling, dan bisnis.\u003c/li\u003e\n\u003cli\u003ePilar pertama lo dari data science lo bisa bayar hidup dengan bekerja sebagai data analyst atau data engineer.\u003c/li\u003e\n\u003cli\u003ePilar kedua lo dari storytelling lo bisa bikin content yang menarik, dan bikin brand personal yang kuat.\u003c/li\u003e\n\u003cli\u003ePilar ketiga lo dari bisnis lo bisa ngerti gimana caranya bikin produk yang laku.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eSisanua lo bisa cari minat minat lain tidak jadi karier terpisah tapi jadi jembatan horizontal yang menhubungkan ketiga pilar utama lo.\u003c/li\u003e\n\u003cli\u003eDititik ini lo berubah, lo bukan lagi seorang data scientist yang gampang terdistraksi, tapi orang langka yang bisa ngubah data kompleks jadi cerita yang menarik yang bisa dipahami orang bisnis.\u003c/li\u003e\n\u003cli\u003eNilai lo bukan satu skill, tapi kombinasi skill yang unik.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eBagaimana ini bisa terjadi secara kognitif?\n\u003cul\u003e\n\u003cli\u003eAda namanya konsep Far Transfer.\n\u003cul\u003e\n\u003cli\u003eSpecialis biasanya pake Near Transfer, yaitu kemampuan untuk menerapkan pengetahuan dan keterampilan yang dipelajari dalam satu konteks ke konteks yang mirip.\u003c/li\u003e\n\u003cli\u003ePolymath pakai Far Transfer, yaitu kemampuan untuk menerapkan pengetahuan dan keterampilan yang dipelajari dalam satu konteks ke konteks yang berbeda. Dia melihat structure bukan isi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eGimana cara ngebangunnya?\n\u003cul\u003e\n\u003cli\u003eIntinya bukan dengan mengejar semuanya sekaligus, ini jebakan dash shape. Lo bakal sibuk tapi gak ada hasil. Lo tau banyak tapi gak dalem. Lo gak punya pilar yang kuat.\u003c/li\u003e\n\u003cli\u003eJadi strateginya dengan serial mastery.\n\u003cul\u003e\n\u003cli\u003eLo pilih satu minat, dalemin sampe satu musim (3-6 bulan). bukan seumur hidup.\n\u003cul\u003e\n\u003cli\u003eTujuannya, bukan jadi kelas dunia, paling tidak 80% kompeten di bidang itu.\u003c/li\u003e\n\u003cli\u003eSampai lo bisa pake skill itu buat ngasilin sesuatu yang nyata.\u003c/li\u003e\n\u003cli\u003eDengan begini lo bisa bisa ngejaga dan gak kabur\u003c/li\u003e\n\u003cli\u003eIni namanya strategic quiitting, lo berhenti bukan karena lo gak suka, tapi karena lo udah dapet apa yang lo butuhin dari minat itu.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eDay job\n\u003cul\u003e\n\u003cli\u003eOtak scanner itu gampang bosen, jadi lo butuh day job yang stabil buat ngebiayain hidup lo.\u003c/li\u003e\n\u003cli\u003ePekerjaan terbaik sering kali bukan yang passion draining, tapi yang stabil dan low drain.\n\u003cul\u003e\n\u003cli\u003eMaksudnya, pekerjaan yang gak nyedot energi mental lo terlalu banyak.\u003c/li\u003e\n\u003cli\u003eContoh: pekerjaan yang rutin, gak butuh mikir kreatif terus, gak butuh interaksi sosial yang intens.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eKerjaan adalah asset strategis buat ngebiayain hidup lo, bukan tujuan akhir. Kalau kerjaan nyedot 120% energi lo, lo gak bakal punya energi buat ngejar minat lo di luar kerjaan.\u003c/li\u003e\n\u003cli\u003eDan buat scanner, eksplorasi bukan hobi, tapi kebutuhan kognitif.\n\u003cul\u003e\n\u003cli\u003emaksudnya, lo butuh eksplorasi buat ngejaga otak lo tetap aktif dan sehat.\u003c/li\u003e\n\u003cli\u003eJadi lo butuh waktu buat eksplorasi, bukan cuma di akhir pekan, tapi juga di hari kerja.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eContoh Niklas luhmann dan Zettelkasten, bagaimana ide kecil kecil yang dia dapet dari eksplorasi dia di catat, dan lama lama jadi sistem pengetahuan yang besar. bahkan bertahun tahun kemudian malah jadi buku yang berpengaruh.\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://x.com/thedankoe/status/2010042119121957316\"\u003eIf you have multiple interests, do not waste the next 2-3 years\u003c/a\u003e\n\u003cul\u003e\n\u003cli\u003ePunya banyak ketertarikan itu superpower, tapi cuma berguna kalau lo punya wadah buat nampungnya. \n\u003cul\u003e\n\u003cli\u003eTanpa wadah, semua minat itu cuma jadi konsumsi dopamin, bikin lo sibuk, tapi nggak ngasih hasil apa-apa. \u003c/li\u003e\n\u003cli\u003eBikin lo ngerasa berkembang dan sibuk, tapi sebenernya lo cuma muter-muter di tempat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eGeneralis aktif, ini adalah tipe manusia yang bisa bertahan, bukan spesialis sempit.\n\u003cul\u003e\n\u003cli\u003eCiri utamanya ada 3:\n\u003cul\u003e\n\u003cli\u003eSelf Education: Belajar mandiri, nggak nungguin sekolah atau institusi buat ngasih ilmu\u003c/li\u003e\n\u003cli\u003eSelf Interest: Punya rasa penasaran yang tinggi, suka eksplorasi berbagai topik\u003c/li\u003e\n\u003cli\u003eSelf Sufficiency: Mampu ngatur diri sendiri, nggak tergantung sama orang lain buat maju\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eLo belajar karena lo pengen, bukan karena disuruh.  Lo ikutin minat lo sendiri, bukan agenda institusi. Lo gak nyewa otak orang lain buat mikirin masa depan lo.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eKalau mau hidup dari minat, lo harus bikin orang lain peduli sama minat lo itu.\n\u003cul\u003e\n\u003cli\u003eCaranya: Tunjukin keahlian lo, bangun reputasi, dan kasih nilai tambah ke orang lain lewat minat lo.\u003c/li\u003e\n\u003cli\u003eDengan menjadikan belajar lo sebagai sesuatu yang terlihat alias belajar di public, catatan yang tadinya buat diri sendiri sekarang bisa jadi content.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003elo kejar tujuan hidup lo -\u003e lo ceritakan prosesnya -\u003e lo bantu versi lama dari diri lo lewat produk atau sistem.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"ancho
