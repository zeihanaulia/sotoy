c-4.4 0-8 3.6-8 8v152H116c-8.8 0-16 7.2-16 16v288c0 8.8 7.2 16 16 16h288c8.8 0 16-7.2 16-16V656c0-8.8-7.2-16-16-16H292v-88h440v88H620c-8.8 0-16 7.2-16 16v288c0 8.8 7.2 16 16 16h288c8.8 0 16-7.2 16-16V656c0-8.8-7.2-16-16-16zm-564 76v168H176V716h168zm84-408V140h168v168H428zm420 576H680V716h168v168z"></path></svg></span></a></div></div><div style="display:none;align-items:center;justify-content:center" class="ant-col ant-col-xs-4 ant-col-sm-4 ant-col-md-0 ant-col-lg-0 css-mncuj7"><span role="img" aria-label="menu" style="font-size:24px" tabindex="-1" class="anticon anticon-menu"><svg viewBox="64 64 896 896" focusable="false" data-icon="menu" width="1em" height="1em" fill="currentColor" aria-hidden="true"><path d="M904 160H120c-4.4 0-8 3.6-8 8v64c0 4.4 3.6 8 8 8h784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8zm0 624H120c-4.4 0-8 3.6-8 8v64c0 4.4 3.6 8 8 8h784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8zm0-312H120c-4.4 0-8 3.6-8 8v64c0 4.4 3.6 8 8 8h784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8z"></path></svg></span></div></div></header><div class="ant-layout css-mncuj7" style="margin-top:64px;display:flex;flex-direction:row;width:100%;max-width:1200px;margin:0 auto"><div class="site-layout-sidebar" style="flex:0 0 auto;width:200px;min-width:200px"><aside class="ant-layout-sider ant-layout-sider-dark css-mncuj7" style="position:fixed;top:64px;overflow:auto;height:calc(100vh - 64px);background-color:transparent;flex:0 0 200px;max-width:200px;min-width:200px;width:200px"><div class="ant-layout-sider-children"></div></aside></div><main class="ant-layout-content side-layout-main css-mncuj7" style="flex:1;min-width:0;display:block"><div style="padding:48px 24px 0;max-width:1200px;margin:0 auto"><div class="main-content" role="main"></div></div><div class="ant-divider css-mncuj7 ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer css-mncuj7" style="padding:0 24px 24px"></footer></main></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"note":{"id":"book-summaries.madilog","title":"Madilog","desc":"","updated":1741704456530,"created":1739782767097,"custom":{},"fname":"book-summaries.madilog","type":"note","vault":{"fsPath":"vault"},"contentHash":"a084992d1b3bdee886433be27a286068","links":[{"type":"wiki","from":{"fname":"book-summaries.madilog","id":"book-summaries.madilog","vaultName":"vault"},"value":"tags.TolakPPN12Persen","alias":"#TolakPPN12Persen","position":{"start":{"line":23,"column":395,"offset":2448},"end":{"line":23,"column":412,"offset":2465},"indent":[]},"xvault":false,"to":{"fname":"tags.TolakPPN12Persen"}}],"anchors":{"iklim":{"type":"header","text":"IKLIM","value":"iklim","line":21,"column":0,"depth":2},"peringatan":{"type":"header","text":"Peringatan","value":"peringatan","line":59,"column":0,"depth":2},"logika":{"type":"header","text":"Logika","value":"logika","line":75,"column":0,"depth":3},"dialektika--cara-berpikir-yang-melihat-perubahan":{"type":"header","text":"Dialektika : Cara Berpikir yang Melihat Perubahan","value":"dialektika--cara-berpikir-yang-melihat-perubahan","line":90,"column":0,"depth":3},"tiga-hukum-dialektika-kenapa-perubahan-terjadi":{"type":"header","text":"Tiga Hukum Dialektika: Kenapa Perubahan Terjadi?","value":"tiga-hukum-dialektika-kenapa-perubahan-terjadi","line":96,"column":0,"depth":4},"materialisme":{"type":"header","text":"Materialisme","value":"materialisme","line":123,"column":0,"depth":3},"melihat-ke-muka":{"type":"header","text":"Melihat ke Muka","value":"melihat-ke-muka","line":151,"column":0,"depth":2}},"children":[],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"madilog\"\u003eMadilog\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#madilog\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eMadilog itu buku yang sering banget dibahas orang. Banyak yang bilang ini buku penting buat belajar berpikir kritis. Tapi jujur aja, gue berkali-kali coba baca, selalu mentok. Gaya bahasanya ribet, cara bertuturnya juga gak gampang dipahami. \u003c/p\u003e\n\u003cp\u003eSekarang, gara-gara tiba-tiba punya banyak waktu luang (thanks to layoff wkwkwk), gue akhirnya mutusin buat baca dan nyelesain buku ini. Tapi kenapa? Kenapa gue harus baca buku beginian di tahun 2025?\u003c/p\u003e\n\u003cp\u003eCoba lo pikir, beberapa tahun terakhir, lo pasti liat:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePesulap Merah vs dukun, orang masih percaya hal mistis di era internet.\u003c/li\u003e\n\u003cli\u003eFerry Irwandi nantangin dukun, dan gak ada yang bisa nyatet dia wkwkwk.\u003c/li\u003e\n\u003cli\u003eOrang gampang percaya hoax, gak kritis sama kebijakan pemerintah, dan gak paham gimana sistem ekonomi ngerugiin mereka sendiri.\u003c/li\u003e\n\u003cli\u003eBanyak yang males mikir, asal ikut-ikutan, ujung-ujungnya rungkad: kejebak pinjol, judol, atau sekadar jadi korban clickbait.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBuku ini ngajarin lo buat berpikir lebih tajam, lebih kritis, dan gak gampang ditipu—baik oleh dukun, pemerintah, maupun sistem yang ada. Gak cuma soal sejarah, tapi soal gimana cara kita mikir di zaman sekarang. Nah, ini catatan gue selama baca Madilog. Moga-moga lo bisa dapet sesuatu juga dari sini (kalo sempet mending baca sendiri aja wkwkwk). \u003c/p\u003e\n\u003ch2 id=\"iklim\"\u003eIKLIM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#iklim\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSaat membaca bagian \u003cstrong\u003eIKLIM\u003c/strong\u003e, gue merasa kondisi tahun 1942, ketika Tan Malaka menulis buku ini, tidak jauh berbeda dengan kondisi intelektual orang Indonesia saat ini.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Saya pikir otak proletar mesin Indonesia tak bisa mencernakan paham yang berurat dan tumbuh pada masyarakat Indonesia dalam hal iklim, sejarah, keadaan jiwa dan idamannya.\"\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eGue merasa pada masa itu, kaum intelektual terlalu banyak mengadopsi teori Barat tanpa benar-benar memahami kondisi rakyatnya sendiri. Mereka belajar Marxisme, liberalisme, atau nasionalisme dari buku-buku Eropa, tapi belum tentu bisa mengaitkannya dengan realitas petani dan buruh Indonesia yang masih miskin, minim pendidikan, dan hidup di bawah sistem feodal. Saat itu, mereka memperjuangkan kemerdekaan dari Belanda dan Jepang.\u003c/p\u003e\n\u003cp\u003eHal yang sama terjadi sekarang. Pemerintah saat ini justru mencoba meniru sistem Nordic dengan menaikkan pajak tanpa terlebih dahulu mengadaptasi atau menyediakan fasilitas yang layak bagi rakyatnya. Ini terasa aneh sekali. Jadi, kebijakan ini gak lebih dari \"asal ikut-ikutan\" tanpa memikirkan kesejahteraan rakyatnya uangnya mau tapi kasih fasilitas ala kadarnya. Setelah marah dengan tagar \u003ca href=\"https://x.com/search?q=%23TolakPPN12Persen\u0026#x26;src=typed_query\"\u003e#TolakPPN12Persen\u003c/a\u003e ramai diperbincangkan, barulah pemerintah membatalkan kebijakan tersebut.\u003c/p\u003e\n\u003cp\u003eDi sub-bab \u003cstrong\u003ePendahuluan Perpustakaan\u003c/strong\u003e, banyak hal menarik sekaligus mengejutkan. Bayangin lo baru umur 20-an, tapi udah dianggap sebagai \"musuh negara\" cuma gara-gara tulisan lo cuy. Tan Malaka diburu karena dia mengkritik kolonialisme dan ngajarin rakyat cara berpikir kritis. Belanda, Inggris, sampai Jepang nganggep dia ancaman karena pemikirannya bisa bikin rakyat sadar dan berontak. \u003c/p\u003e\n\u003cp\u003eKalau ini terjadi di zaman sekarang, mungkin dia bakal kena UU ITE atau dianggap \"radikal\" cuma karena ngajak orang buat mikir. Bedanya, di tahun 1940-an, yang ngejar dia bukan cuma polisi, tapi juga agen intelijen dari berbagai negara. Gue tuh pas baca sempet gak percaya, masa sih ada pemuda 20an tahun diburu gara-gara nulis, gue coba search ada dong yang bahas wkwkwkwk.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://world.time.com/2013/06/15/exiled-in-hong-kong-famous-company-for-edward-snowden/slide/tan-malaka/\"\u003eTan Malaka di Time\u003c/a\u003e  \u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.cambridge.org/core/books/abs/ho-chi-minh-in-hong-kong/parallel-case-of-tan-malaka/33478E6EDE9DB65C89FD049EB18C235A\"\u003eParallel Case of Tan Malaka - Cambridge\u003c/a\u003e  \u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://apjjf.org/2022/12/gunn\"\u003eAsia-Pacific Journal\u003c/a\u003e  \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSampai di titik ini, gue semakin kagum dengan cara pandang dan gaya hidupnya. Selain itu, ada beberapa paragraf menarik yang gue tangkap dari buku ini.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Seorang pengarang atau ahli pidato, perlu akan catatan dari buku musuh, kawan ataupun guru.\"\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eGue nangkep maksud Tan Malaka di sini gini: kalau lo mau menang debat atau nyebarin ide, lo harus baca buku dari banyak perspektif. Banyak orang sekarang cuma baca informasi dari sisi yang mereka setujuin aja (filter bubble). Kalau lo liberal, lo cuma baca media pro-liberal. Kalau lo konservatif, lo cuma baca media pro-konservatif. Kalo lo suka mulyono lo akan baca berita pro mulyono, berita yang sebaliknya akan dikatain buzzer. Begutu juga dengan kubu anak abah dan politikus lainnya wkwkwkw\u003c/p\u003e\n\u003cp\u003eIni strategi yang cerdas sih. Tan Malaka ngajarin cara main yang beda. Dia bilang: \"Kalau lo mau menang debat atau bikin argumen kuat, lo harus paham cara pikir lawan juga.\"\u003c/p\u003e\n\u003cp\u003eDi era sekarang? Lo jangan cuma baca media yang lo suka, coba juga liat sudut pandang lawan biar bisa nangkep di mana titik lemahnya argumen mereka.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Selain dari pada buat dipakai sebagai barang bahan ini, buku-buku yang berarti tentulah besar faedahnya buat pengetahuan dalam arti umumnya.\"\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eYang gue tangkep dari kalimat ini, buku itu bukan cuma buat bahan debat, tapi juga buat memperluas wawasan secara umum. Pendidikan dan pemikiran kritis itu penting, bukan cuma buat revolusi atau perlawanan, tapi juga buat ngebangun masyarakat yang lebih baik.\u003c/p\u003e\n\u003cp\u003eIni juga masih relevan banget. Di era sekarang, orang lebih sering baca tweet pendek, nonton video TikTok 15 detik, atau percaya headline tanpa cek isi artikelnya. Masalahnya? Kalau lo cuma baca yang serba pendek dan gak dalem, lo gampang banget ketipu clickbait dan manipulasi informasi. Tan Malaka paham bahwa kalau lo mau punya pemikiran yang tajam, lo harus banyak baca dan bukan cuma baca yang pendek-pendek, tapi yang beneran ngasih lo konteks dan pemahaman mendalam.\u003c/p\u003e\n\u003cp\u003eMungkin itu aja yang bisa gue tulis di sub-bab ini. Sisanya, kayak cara dia belajar pakai teknik \"jembatan keledai\", udah banyak yang ngebahas sih, jadi gue skip aja.\u003c/p\u003e\n\u003cp\u003eOh iya, ada satu hal yang masih bikin gue penasaran—gimana caranya dia bisa nyampe Singapura tapi pakai paspor dari China? Wkwkwk.\u003c/p\u003e\n\u003ch2 id=\"peringatan\"\u003ePeringatan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#peringatan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eGue lanjut ke bagian \u003cstrong\u003ePendahuluan - Peringatan\u003c/strong\u003e. Dari yang gue tangkep, Tan Malaka mau ngejelasin kalau logika itu penting, tapi jangan sampai terlalu terpukau sampai lupa batasannya. Materialisme, dialektika, dan logika harus dipakai bareng-bareng buat memahami realitas. Gue salfok sama kalimat ini:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Pemikir borjuis dan pemikir feodal bergantung pada dialektika mistika itu seperti seekor semut hanyut bergantung pada sepotong rumput yang diayun-ayunkan gelombang.\"\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eKalau dipikir-pikir, \u003cem\u003epemikir borjuis dan feodal\u003c/em\u003e ini masih eksis sampai sekarang. Gue sering lihat orang-orang yang pakai dialektika mistik buat kepentingan sendiri. Ada yang beneran gak paham realitas dan cuma ikut arus, tapi ada juga yang sebenernya ngerti. Mereka tahu cara ini works buat ngejaga kekuasaan dan ngambil lebih banyak, makanya mereka sengaja pakai trik ini buat nge-bego-begoin rakyat. Misalnya\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePolitisi yang bilang \"kita harus bersabar, semua akan membaik dengan sendirinya,\" padahal sistemnya tetap korup dan gak ada yang diubah.\u003c/li\u003e\n\u003cli\u003eOrang kaya yang nyuruh rakyat miskin bersyukur dan rajin ibadah biar rezeki lancar, tapi mereka sendiri hidup enak karena ngehisap tenaga buruh.\u003c/li\u003e\n\u003cli\u003eOrang-orang yang percaya hidup harus \"nrimo\" dan gak boleh banyak tanya, padahal mereka sebenernya dimanfaatin sistem.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIntinya? Dialektika mistika ini cara halus buat bikin orang tunduk, nerima keadaan, dan gak kritis sama realitas yang ada.\u003c/p\u003e\n\u003cp\u003eDi sub-bab ini juga, gue mulai dikenalin sama istilah \u003cem\u003eMaterialisme, Dialektika dan Logika (MADILOG)\u003c/em\u003e. Gue coba memahami maksudnya biar bisa lebih gampang ngecerna isi buku ini. Intinya, \u003cstrong\u003eMADILOG\u003c/strong\u003e itu cara berpikir yang realistis, pragmatis, dan fleksibel. Kalau cuma pakai salah satu, belum tentu hasilnya tepat. Mungkin bakal lebih jelas kalau pakai contoh.  \u003c/p\u003e\n\u003ch3 id=\"logika\"\u003e\u003ca href=\"https://id.wikipedia.org/wiki/Logika\"\u003e\u003cstrong\u003eLogika\u003c/strong\u003e\u003c/a\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#logika\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eLogika itu cara berpikir yang sistematis dan terstruktur. Kalau premisnya bener, maka kesimpulannya juga harus bener. Sederhananya, logika bikin kita bisa nyusun argumen yang masuk akal.  \u003c/p\u003e\n\u003cp\u003eMisalnya:  \u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKalau hujan, jalanan jadi basah.  \u003c/li\u003e\n\u003cli\u003eSekarang hujan.  \u003c/li\u003e\n\u003cli\u003eBerarti, jalanan pasti basah.  \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKelihatannya simpel, kan? Tapi masalahnya, gak semua kenyataan bisa diteorikan sesederhana itu. Kalau cuma ngandelin logika doang tanpa lihat realitas, kita bisa aja kejebak di kesimpulan yang keliru.  \u003c/p\u003e\n\u003cp\u003eContohnya, \u003cstrong\u003e\"Semua orang sukses karena kerja keras. Jadi kalau gue kerja keras, gue pasti sukses.\"\u003c/strong\u003e\u003cbr\u003e\nKedengeran masuk akal, tapi kenyataannya gak sesederhana itu. Ada faktor lain yang ikut main—keberuntungan, networking, kesempatan, bahkan privilege. Jadi, logika itu penting, tapi kalau dipakai sendirian tanpa mempertimbangkan realitas, bisa-bisa kita percaya sesuatu yang kelihatannya bener, tapi sebenernya gak selalu sesuai sama dunia nyata.\u003c/p\u003e\n\u003ch3 id=\"dialektika--cara-berpikir-yang-melihat-perubahan\"\u003e\u003ca href=\"https://id.wikipedia.org/wiki/Dialektik\"\u003eDialektika\u003c/a\u003e : Cara Berpikir yang Melihat Perubahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#dialektika--cara-berpikir-yang-melihat-perubahan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGue mulai ngerti kalau \u003cem\u003eDialektika\u003c/em\u003e itu bukan sekadar konsep perubahan biasa, tapi cara berpikir yang ngejelasin kenapa perubahan itu terjadi. Segala sesuatu di dunia ini gak statis, semuanya berkembang dan berevolusi karena adanya kontradiksi di dalamnya. Lo gak bisa cuma nerima keadaan tanpa mempertanyakan \u003cem\u003ekenapa\u003c/em\u003e sesuatu terjadi dan \u003cem\u003egimana\u003c/em\u003e prosesnya bisa berubah. Justru, dengan mempertanyakan dan melihat kontradiksi, kita bisa dapet pemahaman yang lebih dalam.  \u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDialektika bukan sekadar perubahan yang terjadi begitu aja. Dialektika itu soal memahami KONTRADIKSI yang menyebabkan perubahan.\u003c/strong\u003e Kalau lo cuma duduk diam dan berharap perubahan datang sendiri, itu bukan dialektika—itu \u003ca href=\"https://id.wikipedia.org/wiki/Fatalisme\"\u003efatalisme\u003c/a\u003e! Sebaliknya, dialektika ngajarin kita buat ngelihat konflik dalam sistem yang ada dan nyari cara buat mendorong perubahan yang lebih baik. Biar lebih gampang, ada tiga hukum utama dialektika yang bisa bantu kita memahami kenapa dunia ini gak pernah benar-benar diam.\u003c/p\u003e\n\u003ch4 id=\"tiga-hukum-dialektika-kenapa-perubahan-terjadi\"\u003e\u003cstrong\u003e\u003ca href=\"https://www.historicalmaterialism.org/a-review-of-friedrich-engels-and-the-dialectics-of-nature-by-kaan-kangal/#:~:text=\u0026#x27;%20Engels%20listed%20three%20\u0026#x27;laws%20of,168\"\u003eTiga Hukum Dialektika\u003c/a\u003e: Kenapa Perubahan Terjadi?\u003c/strong\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tiga-hukum-dialektika-kenapa-perubahan-terjadi\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003ePerubahan Kuantitatif jadi Kualitatif\u003c/strong\u003e\u003cbr\u003e\nHal kecil yang terus bertambah bisa menyebabkan perubahan besar. Contoh: \u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSosial → Protes kecil di satu kota kalau terus meluas bisa berubah jadi revolusi. Contoh nyatanya \u003ca href=\"https://en.wikipedia.org/wiki/Arab_Spring\"\u003eArab Spring\u003c/a\u003e atau \u003ca href=\"https://id.wikipedia.org/wiki/Era_Reformasi\"\u003edemonstrasi reformasi 1998\u003c/a\u003e di Indonesia.\u003c/li\u003e\n\u003cli\u003eSains → Air yang dipanaskan perlahan dari 25°C ke 99°C gak akan berubah bentuk. Tapi pas sampai 100°C? BOOM! Dia berubah jadi uap\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003ePertentangan dalam Segala Hal\u003c/strong\u003e\u003cbr\u003e\nSegala sesuatu berkembang lewat konflik. Contoh: \u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEkonomi → Buruh vs kapitalis, kelas pekerja pengen upah tinggi, pemilik modal pengen biaya produksi rendah. Konflik ini yang bikin sistem ekonomi terus berkembang.\u003c/li\u003e\n\u003cli\u003eTeknologi → Dulu, orang males pake smartphone karena layar sentuhnya jelek. Lalu muncul iPhone, touchscreen makin canggih, sekarang malah gak ada tombol sama sekali.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eNegasi atas Negasi\u003c/strong\u003e\u003cbr\u003e\nSistem lama digantikan oleh sistem baru, lalu berevolusi ke bentuk lain. Contoh: \u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEkonomi → Dulu manusia pake barter → uang logam → uang kertas → sekarang digital currency \u0026#x26; crypto.\u003c/li\u003e\n\u003cli\u003ePolitik → Feodalisme runtuh, muncul monarki konstitusional → lalu berkembang jadi demokrasi modern.\u003c/li\u003e\n\u003cli\u003eTeknologi → Dulu orang pakai Kaset (yang kalo mau rewind lo puter pake pulpen wkwkwk), terus pindah ke MP3, sekarang streaming langsung di Youtube Music atau Spotify.\u003c/li\u003e\n\u003cli\u003eTransportasi → Dulu naik kuda, terus ada kereta uap, sekarang ada mobil listrik.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eDialektika bukan asal membantah tanpa dasar.\u003c/strong\u003e Konsep ini ngelihat bahwa setiap ide berkembang lewat kontradiksi. Makanya, kalau kita mau benar-benar paham sesuatu, kita harus ngerti gimana pertentangan itu bekerja.  \u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKalau lo ngerti dialektika, lo bakal sadar kalau perubahan itu bukan sekadar \"hukum alam\". Ada cara buat memahami dan bahkan mengarahkannya!\u003c/strong\u003e\u003c/p\u003e\n\u003ch3 id=\"materialisme\"\u003e\u003ca href=\"https://id.wikipedia.org/wiki/Materialisme\"\u003e\u003cstrong\u003eMaterialisme\u003c/strong\u003e\u003c/a\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#materialisme\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eOke, sekarang gue coba untuk memahami materialisme, materialisme ini adalah cara berpikir yang fokus ke fakta dan realitas yang kongkrit. Segala sesuatu yang ada di muka bumi ini pasti punya penyebab materiil, gak ada tuh yang kebetulan dan ditentukan oleh takdir. Kalau ada kejadian atau fenomena tertentu, pasti ada faktor lain yang bisa dijelasin. Materialisme ngajarin kita buat liat bukti nyata dan pengalaman asli dalam memahami sesuatu. Misalnya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOrang miskin bukan karena \"sial\" atau \"karma,\" tapi karena faktor ekonomi, akses ke pendidikan, dan ketimpangan sosial.\u003c/li\u003e\n\u003cli\u003eTeknologi bukan \"keajaiban,\" tapi hasil dari riset, investasi, dan pengembangan bertahun-tahun.\u003c/li\u003e\n\u003cli\u003eHarga bahan pokok naik bukan karena \"kutukan,\" tapi karena rantai pasokan, inflasi, dan kebijakan ekonomi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBerangkat dari pengetahuan materialisme, lo udah bisa melihat realitas dan fakta. Tapi supaya lo bisa menganalisis sesuatu secara lebih mendalam, kita perlu menggabungkan materialisme dengan logika dan dialektika. Lo pake logika materialisme kalau lo mau memahami sesuatu yang sifatnya tetap dan konkret, misalnya:\u003c/p\u003e\n\u003cp\u003eLogika Materialisme → Dipakai buat memahami sesuatu yang tetap dan konkret. Contoh:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGimana cara kerja mesin?\u003c/li\u003e\n\u003cli\u003eKenapa algoritma Youtube bisa ngarahin kita ke video tertentu?\u003c/li\u003e\n\u003cli\u003eKenapa harga barang bisa naik dan turun?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTapi kalau lo mau memahami sesuatu yang terus berubah dan berkembang, Misalnya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKenapa politik selalu berubah?\u003c/li\u003e\n\u003cli\u003eKenapa sistem ekonomi berkembang dari feodalisme ke kapitalisme?\u003c/li\u003e\n\u003cli\u003eKenapa budaya atau tren sosial terus bergeser?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLo mesti mempertanyakan dan melihat sesuatu sebagai proses yang terus berubah. Ini yang disebut dialektika materialisme—cara memahami perubahan dengan melihat kontradiksi yang ada di dalamnya.\u003c/p\u003e\n\u003cp\u003eKalau lo cuma pake logika materialisme doang, lo bakal ngerti realitas, tapi gak paham perubahan. Kalau lo cuma pake dialektika materialisme doang, lo bakal ngerti perubahan, tapi bisa kehilangan pijakan fakta konkret. Kalau lo gabungin semuanya, lo bakal bisa mikir secara sistematis, berbasis fakta, dan paham bagaimana perubahan terjadi.\u003c/p\u003e\n\u003cp\u003eMaterialisme ngajarin kita buat melihat dunia berdasarkan fakta konkret, bukan mistik atau mitos. Logika materialisme bikin kita bisa memahami realitas yang ada, tapi kalau kita mau ngerti kenapa sesuatu berubah, kita butuh dialektika materialisme. Dengan gabungan ketiganya, kita bisa punya cara berpikir yang lebih tajam dan gak gampang dimanipulasi.\u003c/p\u003e\n\u003ch2 id=\"melihat-ke-muka\"\u003eMelihat ke Muka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#melihat-ke-muka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eOh ya, pas gue mulai masuk ke sub-bab terakhir dari pendahuluan, yaitu \u003cstrong\u003eMelihat ke Muka\u003c/strong\u003e. Ada satu kalimat yang menurut gue lucu:  \u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e\"Salah satu sifat rakyat Belanda yang terlihat pada saya adalah sifat demogogisch, ialah sifat berkilah, sifat suka mempertentangkan perkara kecil-kecil dengan melupakan pokok yang besar.\"\u003c/em\u003e  \u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eKenapa ini lucu? Wkwkwkwk. Soalnya kalau kita lihat zaman sekarang, terus liat keributan di \u003cstrong\u003eX.com\u003c/strong\u003e, kayaknya apa aja bisa jadi bahan ribut. Hal-hal sepele dibesar-besarkan, sedangkan masalah yang lebih penting malah kelewat.  \u003c/p\u003e\n\u003cp\u003eJadi gue kepikiran, ini sifat manusia pada umumnya? Atau jangan-jangan ini warisan dari Belanda yang \u003cem\u003editularkan\u003c/em\u003e ke manusia Indonesia zaman sekarang? Wkwkwk.\u003c/p\u003e\n\u003cp\u003eThanks yak, udah kelar bab pendahuluan! Sisanya bakal gue lanjut di artikel selanjutnya biar gak kepanjangan.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"enableAutoCreateOnDefinition":false,"enableXVaultWikiLink":false,"enableRemoteVaultInit":true,"enableUserTags":true,"enableHashTags":true,"workspaceVaultSyncMode":"noCommit","enableAutoFoldFrontmatter":false,"enableEditorDecorations":true,"maxPreviewsCached":10,"maxNoteLength":204800,"seeds":{"dendron.templates":{}},"enableFullHierarchyNoteTitle":false},"preview":{"enableFMTitle":true,"enableNoteTitleForLink":true,"enableFrontmatterTags":true,"enableHashesForFMTags":false,"enablePrettyRefs":true,"enableKatex":true,"automaticallyShowPreview":false},"publishing":{"enableFMTitle":true,"enableNoteTitleForLink":true,"enablePrettyRefs":true,"enableKatex":true,"copyAssets":true,"siteHierarchies":["root"],"writeStubs":true,"siteRootDir":"docs","seo":{"title":"Sotoy","description":"Personal knowledge space about anything I learn. Notes, knowledge, and ideas from me.","author":"Zeihan Aulia","twitter":"zeihanaulia","image":{"url":"https://pbs.twimg.com/profile_images/502375255256485888/1UYtt7PT_400x400.jpeg","alt":"Software Engineer, "}},"github":{"enableEditLink":true,"editLinkText":"Edit this page on GitHub","editBranch":"main","editViewMode":"tree"},"enableSiteLastModified":true,"enableFrontmatterTags":true,"enableHashesForFMTags":false,"enableRandomlyColoredTags":true,"enableTaskNotes":true,"enablePrettyLinks":true,"searchMode":"lookup","assetsPrefix":"/sotoy","siteUrl":"https://zeihanaulia.github.io","duplicateNoteBehavior":{"action":"useVault","payload":["vault-private","vault","dendron.templates"]},"siteFaviconPath":"favicon.ico","siteIndex":"root"}}},"__N_SSG":true},"page":"/[...slug]","query":{"slug":["book-summaries","madilog"]},"buildId":"z603NpggMbVvyEs5TQ2fm","assetPrefix":"/sotoy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
