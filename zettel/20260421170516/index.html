g project","value":"brownfield--existing-project","line":128,"column":0,"depth":3},"team-onboarding-dan-knowledge-transfer":{"type":"header","text":"Team onboarding dan knowledge transfer","value":"team-onboarding-dan-knowledge-transfer","line":136,"column":0,"depth":3},"delivery-fitur-terstruktur":{"type":"header","text":"Delivery fitur terstruktur","value":"delivery-fitur-terstruktur","line":140,"column":0,"depth":3},"kapan-bmad-tidak-cocok":{"type":"header","text":"Kapan BMAD tidak cocok?","value":"kapan-bmad-tidak-cocok","line":144,"column":0,"depth":2},"bmad-dan-thoughtworks":{"type":"header","text":"BMAD dan Thoughtworks","value":"bmad-dan-thoughtworks","line":157,"column":0,"depth":2},"contoh-output-bmad":{"type":"header","text":"Contoh output BMAD","value":"contoh-output-bmad","line":171,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":182,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-adalah-framework-workflow-ai-native-engineering-yang-mengganti-prompt-chaos-dengan-peran-dan-fase-terstruktur\"\u003eBMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-adalah-framework-workflow-ai-native-engineering-yang-mengganti-prompt-chaos-dengan-peran-dan-fase-terstruktur\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBMAD itu sebenarnya apa?\u003c/li\u003e\n\u003cli\u003eDia menyelesaikan problem apa dalam AI-assisted / AI-native engineering?\u003c/li\u003e\n\u003cli\u003eCara kerjanya bagaimana?\u003c/li\u003e\n\u003cli\u003eCocok dipakai untuk use case seperti apa, dan kapan tidak cocok?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD bukan model AI dan bukan sekadar template prompt. BMAD adalah kerangka kerja tim buatan untuk AI-native engineering: ia memaksa interaksi AI menjadi workflow berperan, berfase, dan terikat konteks.\u003c/p\u003e\n\u003ch2 id=\"apa-itu-bmad\"\u003eApa itu BMAD?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-itu-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD singkatan dari \u003cstrong\u003eBuild More Architect Dreams\u003c/strong\u003e. Menurut dokumentasi, BMAD adalah AI-driven development framework yang membimbing software development dari ideation sampai implementasi.\u003c/p\u003e\n\u003cp\u003eSecara sederhana:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBMAD adalah sistem kerja untuk membuat AI ikut menjalankan proses software development end-to-end.\u003c/li\u003e\n\u003cli\u003eBMAD mengasumsikan software engineering perlu dipecah menjadi fase disiplin: analysis, planning, solutioning, implementation.\u003c/li\u003e\n\u003cli\u003eBMAD mengisi bagian \"methodology\" dalam tumpukan AI-native engineering.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"problem-yang-diselesaikan-bmad\"\u003eProblem yang diselesaikan BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#problem-yang-diselesaikan-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD dirancang untuk menangani failure mode khas AI-assisted engineering:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAI loncat ke coding sebelum masalah jelas.\u003c/li\u003e\n\u003cli\u003erequirement kabur.\u003c/li\u003e\n\u003cli\u003edesain belum matang.\u003c/li\u003e\n\u003cli\u003earsitektur tidak dipikir.\u003c/li\u003e\n\u003cli\u003eAI menulis kode yang kelihatan bagus tapi melenceng konteks.\u003c/li\u003e\n\u003cli\u003eagent muter-muter revisi tanpa arah.\u003c/li\u003e\n\u003cli\u003ehasil akhir sulit direview dan diaudit.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAtomic insight:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBMAD memaksa AI untuk \"berpikir seperti tim\", bukan bertindak seperti chatbot serba bisa.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"cara-kerja-bmad\"\u003eCara kerja BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cara-kerja-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-role-based-agents\"\u003e1. Role-based agents\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-role-based-agents\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD memakai specialized AI agents / personas.\u003c/p\u003e\n\u003cp\u003ePeran-peran ini bukan manusia berbeda, tetapi pola kerja lain yang dikomunikasikan ke AI:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eanalyst\u003c/li\u003e\n\u003cli\u003eplanner\u003c/li\u003e\n\u003cli\u003earchitect\u003c/li\u003e\n\u003cli\u003edeveloper\u003c/li\u003e\n\u003cli\u003etester\u003c/li\u003e\n\u003cli\u003ereviewer\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSetiap peran punya fokus berbeda. Ini mencegah satu prompt tunggal memaksa AI menyelesaikan semua fungsi sekaligus.\u003c/p\u003e\n\u003ch3 id=\"2-guided-workflows\"\u003e2. Guided workflows\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-guided-workflows\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD membangun alur kerja eksplisit dari fase-fase:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAnalysis (optional)\u003c/li\u003e\n\u003cli\u003ePlanning (required)\u003c/li\u003e\n\u003cli\u003eSolutioning (BMad Method / Enterprise)\u003c/li\u003e\n\u003cli\u003eImplementation\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDokumentasi BMAD menekankan penggunaan \u003ccode\u003ebmad-help\u003c/code\u003e sebagai pemandu cerdas yang tahu apa yang harus dilakukan selanjutnya.\u003c/p\u003e\n\u003cp\u003eWorkflow juga dibagi menurut kompleksitas proyek:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eQuick Flow — bug fix, fitur sederhana, ruang lingkup jelas.\u003c/li\u003e\n\u003cli\u003eBMad Method — produk, platform, fitur kompleks.\u003c/li\u003e\n\u003cli\u003eEnterprise — compliance, multi-tenant, security, DevOps.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-intelligent-planning--context\"\u003e3. Intelligent planning + context\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-intelligent-planning--context\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD menekankan plan dan project context sebagai artefak pertama.\u003c/p\u003e\n\u003cp\u003eDokumentasi menyebut:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eproject-context.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePRD.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003earchitecture.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eepics/stories\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esprint-status.yaml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eContext proyek membantu AI tetap sesuai aturan tim, arsitektur, dan implementation policy.\u003c/p\u003e\n\u003ch3 id=\"4-fresh-chat-dan-skill-invocation\"\u003e4. Fresh chat dan skill invocation\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-fresh-chat-dan-skill-invocation\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD merekomendasikan setiap workflow dijalankan di chat baru. Ini menghindari masalah batas konteks dan membuat setiap langkah fokus.\u003c/p\u003e\n\u003cp\u003eContoh skill / workflow:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ebmad-help\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-create-prd\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-create-architecture\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-generate-project-context\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-sprint-planning\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-create-story\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-dev-story\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-code-review\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-retrospective\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"use-case-yang-cocok\"\u003eUse case yang cocok\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#use-case-yang-cocok\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"greenfield-project\"\u003eGreenfield project\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#greenfield-project\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD berguna untuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emengubah ide mentah jadi requirement\u003c/li\u003e\n\u003cli\u003emembangun perencanaan yang disiplin\u003c/li\u003e\n\u003cli\u003ememberikan struktur untuk produk baru atau MVP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"brownfield--existing-project\"\u003eBrownfield / existing project\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#brownfield--existing-project\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD juga cocok untuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememahami codebase sebelum mengubahnya\u003c/li\u003e\n\u003cli\u003emenjaga perubahan sesuai arsitektur lawas\u003c/li\u003e\n\u003cli\u003ememecah perubahan besar jadi langkah terkendali\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"team-onboarding-dan-knowledge-transfer\"\u003eTeam onboarding dan knowledge transfer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#team-onboarding-dan-knowledge-transfer\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD membantu mengeksternalisasi reasoning tim melalui dokumentasi fase dan peran.\u003c/p\u003e\n\u003ch3 id=\"delivery-fitur-terstruktur\"\u003eDelivery fitur terstruktur\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#delivery-fitur-terstruktur\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD masih bisa dipakai untuk quick dev atau feature kecil asalkan scope tidak terlalu remeh.\u003c/p\u003e\n\u003ch2 id=\"kapan-bmad-tidak-cocok\"\u003eKapan BMAD tidak cocok?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-bmad-tidak-cocok\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD kurang cocok bila:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etask-nya sangat kecil dan jelas (misalnya mengganti warna tombol atau typo)\u003c/li\u003e\n\u003cli\u003etim butuh eksperimen ultra cepat tanpa struktur\u003c/li\u003e\n\u003cli\u003etim belum siap disiplin menulis context/spec\u003c/li\u003e\n\u003cli\u003eproject terlalu kecil untuk dibebani proses berfase\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAtomic insight:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBMAD menambah struktur. Jika biaya misal arah lebih rendah dari biaya proses, BMAD bisa terasa overkill.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"bmad-dan-thoughtworks\"\u003eBMAD dan Thoughtworks\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-dan-thoughtworks\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD mengisi blok \u003cstrong\u003emethodology\u003c/strong\u003e pada kerangka Thoughtworks AI-native engineering.\u003c/p\u003e\n\u003cp\u003eDalam praktek:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eagent = peran BMAD (developer, architect, PM, dsb.)\u003c/li\u003e\n\u003cli\u003emodel = komponen reasoning di balik tiap agent\u003c/li\u003e\n\u003cli\u003emethodology = BMAD workflow dan track\u003c/li\u003e\n\u003cli\u003espec = PRD, story, project context\u003c/li\u003e\n\u003cli\u003econtext = project-context dan artefak planning\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJadi BMAD bukan saingan agent atau model. BMAD adalah cara mengoperasikan stack AI-native.\u003c/p\u003e\n\u003ch2 id=\"contoh-output-bmad\"\u003eContoh output BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-output-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetelah langkah awal, proyek BMAD biasanya menghasilkan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e_bmad/\u003c/code\u003e — konfigurasi, agent, workflow, task\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_bmad-output/\u003c/code\u003e — planning artifacts, implementation artifacts, project context\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePRD.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003earchitecture.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eepic/story files\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esprint-status.yaml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421163750\"\u003eThoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003c/a\u003e — Thoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emethodology (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-engineering (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170812\"\u003eBMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193301\"\u003eMethodology wajib ada supaya AI-assisted development tidak jadi chaos yang efisien\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193303\"\u003eBMAD duduk di lapisan methodology dan orchestration, bukan sekadar prompt atau persona\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-overview\"\u003eBMAD overview sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUp
