ps":{"note":{"id":"til.managing-team.youtube.the-most-powerful-way-to-think-first-principles","title":"The Most Powerful Way to Think First Principles","desc":"","updated":1682563064475,"created":1682531091616,"custom":{},"fname":"til.managing-team.youtube.the-most-powerful-way-to-think-first-principles","type":"note","vault":{"fsPath":"vault"},"contentHash":"7101296fd06f96ec32162cabf39d4bb2","links":[{"from":{"fname":"til.managing-team","id":"til.managing-team","vaultName":"vault"},"type":"backlink","position":{"start":{"line":24,"column":34,"offset":1905},"end":{"line":24,"column":111,"offset":1982},"indent":[]},"value":"til.managing-team.youtube.the-most-powerful-way-to-think-first-principles"}],"anchors":{"intinya":{"type":"header","text":"Intinya","value":"intinya","line":12,"column":0,"depth":2},"transkrip":{"type":"header","text":"Transkrip","value":"transkrip","line":16,"column":0,"depth":2},"pengaplikasian-untuk-seorang-engineering-manager":{"type":"header","text":"Pengaplikasian untuk seorang Engineering Manager","value":"pengaplikasian-untuk-seorang-engineering-manager","line":60,"column":0,"depth":2}},"children":[],"parent":"til.managing-team.youtube","data":{}},"body":"\u003ch1 id=\"the-most-powerful-way-to-think-first-principles\"\u003eThe Most Powerful Way to Think First Principles\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-most-powerful-way-to-think-first-principles\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230427005745.png\" alt=\"The Most Powerful Way to Think First Principles\"\u003e\u003c/p\u003e\n\u003cp\u003elink: \u003ca href=\"https://www.youtube.com/watch?v=HZRDUZuIKg4\"\u003ehttps://www.youtube.com/watch?v=HZRDUZuIKg4\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"intinya\"\u003eIntinya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#intinya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eInti dari transkrip ini adalah membahas tentang cara berpikir dari first principles thinker atau pemikir prinsip-prinsip dasar yang mencari kebenaran dari suatu konsep atau ide dengan memulai dari fundamental terkecil yang dapat dikonseptualisasikan. Pembicara dalam transkrip juga membahas manfaat dan cara menjadi seorang first principles thinker, yaitu dengan membuat hierarki atau peta pikiran yang menghubungkan konsep-konsep tersebut. Transkrip ini juga menyoroti pentingnya pemikiran dari first principles dalam mengembangkan ide, inovasi, dan pembelajaran, serta membahas bahaya dari menjadi first principles thinker.\u003c/p\u003e\n\u003ch2 id=\"transkrip\"\u003eTranskrip\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#transkrip\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePada video sebelumnya, kita membahas tentang gagasan kekuasaan dan menciptakan kerangka pemikiran untuk memahaminya. Saya menyatakan bahwa seseorang membutuhkan dua bahan dasar untuk menjadi kuat: pemahaman yang benar tentang dunia dan sumber daya untuk membentuknya. Seperti yang dijanjikan, kita akan membahas apa yang saya tinggalkan dalam video terakhir, yaitu bagaimana cara mendapatkan pemahaman yang lebih benar tentang dunia. Saya percaya bahwa esai ini akan menerangi fakta bahwa beberapa cara berpikir lebih berguna daripada yang lain. Dari semua esai yang pernah saya tulis, ini adalah yang paling penting.\u003c/p\u003e\n\u003cp\u003eHari ini, kita akan membahas cara berpikir dari prinsip-prinsip pertama. Prinsip-prinsip pertama adalah blok bangunan fundamental dari sebuah gagasan; mereka adalah bagian paling tidak terpisahkan yang kita ketahui benar dan yang kita gunakan untuk membangun pemikiran yang lebih kompleks. Saya tahu ini terdengar agak abstrak saat ini, tapi izinkan saya memberikan sejarah, analogi, dan contoh.\u003c/p\u003e\n\u003cp\u003eBerpikir dari prinsip-prinsip pertama bukanlah ide yang baru atau revolusioner. Sebenarnya, ini telah menjadi mode berpikir dominan di antara semua ilmuwan dan filsuf besar selama beberapa waktu sekarang; mungkin faktor paling konsisten di antara para pemikir besar. Meskipun ada banyak praktisi dari cara berpikir ini, saya ingin memfokuskan pada salah satu yang mungkin pernah Anda dengar: Aristoteles.\u003c/p\u003e\n\u003cp\u003eDia adalah seorang penyusun yang produktif yang percaya bahwa segala sesuatu dapat dibagi menjadi kategori dan subkategori. Subkategori terkecil dalam domain apa pun adalah apa yang akan kita sebut sebagai prinsip pertama. Dia juga salah satu empiris awal yang kita ketahui. Empiris adalah orang yang percaya bahwa semua pengetahuan dicapai melalui pengalaman. Sebagai salah satu kontributor besar awal dalam studi biologi, adalah masuk akal bahwa Aristoteles adalah seorang pemikir prinsip-prinsip pertama. Dia akan membedah hewan untuk memperoleh pengetahuan dunia nyata dan kemudian menggunakan kapasitasnya untuk merangkai dan mengkategorikan informasi ini. Siklus mencari pengetahuan melalui pengalaman dan menggunakan akal untuk memberikan struktur padanya adalah bagaimana seseorang sampai pada prinsip-prinsip pertama dari suatu subjek. Aristoteles percaya bahwa kita tidak bisa memiliki pengetahuan yang benar kecuali kita memahami prinsip-prinsip ini.\u003c/p\u003e\n\u003cp\u003eSekarang bahwa Anda memiliki pemahaman sedikit tentang sejarah, biarkan saya memberikan analogi tentang berpikir dari prinsip-prinsip pertama. Bayangkan pengetahuan Anda dalam suatu domain tertentu sebagai pohon. Seseorang yang berpikir dari prinsip-prinsip pertama - seorang pemikir yang tidak konvensional - akan memahami tubuh pengetahuan dari buah sampai akar. Buah adalah apa yang kita lihat di depan kita: itu adalah pengetahuan yang belum dihasilkan yang dapat kita peroleh, alami, dan ulangi segera. Kita dapat melihat pohon apel, mengatakan bahwa itu hanya sesuatu yang menghasilkan apel, dan menyerah.\u003c/p\u003e\n\u003cp\u003eIni adalah pemahaman yang sangat dangkal tentang pohon tetapi itu tidak salah. Di sisi lain, seorang pemikir dari prinsip-prinsip pertama akan ingin tahu bagaimana penciptaan ini benar-benar terjadi. Mereka akan melihat bahwa apel terhubung ke cabang. Setiap cabang adalah bagian dari keseluruhan yang lebih besar yang disebut batang. Akhirnya, mereka melihat bahwa akar adalah bagian paling mendasar dari pohon yang memberikan munculnya buah. Mereka telah mengumpulkan beberapa informasi tentang pohon melalui pengalaman tetapi mereka juga telah mengorganisir potongan informasi dalam hubungannya satu sama lain.\u003c/p\u003e\n\u003cp\u003eFakta-fakta yang mengambang ini telah diubah menjadi tubuh pengetahuan yang terorganisir. Pemikir konvensional akan percaya bahwa mereka dapat menempatkan biji apel di mana saja dan tumbuh apel yang lezat; mereka kurang memahami yang sebenarnya. Setelah memeriksa akar, pemikir dari prinsip-prinsip pertama akan melihat bahwa buah yang lezat dimulai dengan tanah yang baik; mereka memiliki pemahaman yang halus. Pemikir konvensional adalah orang di pesta koktail yang memiliki semua fakta menarik: pengetahuannya terdiri hanya dari buah yang dapat mereka tampilkan.\u003c/p\u003e\n\u003cp\u003eSebaliknya, pemikir yang tidak konvensional secara konsisten fokus pada membangun pohon pengetahuan. Seperti Aristoteles, dia atau dia bolak-balik antara pengalaman dan akal untuk membangun tubuh pengetahuan yang terorganisir dan terstruktur. Pohon yang ditanam di tanah yang baik akan memiliki akar yang kuat dan sehat dan dengan demikian menghasilkan buah yang lezat. Demikian pula, ide yang berkembang dari prinsip-prinsip pertama yang benar dan indah itu sendiri akan menjadi indah dan benar. Secara alami, jika bagian-bagian sederhana yang membentuk keseluruhan yang kompleks baik dan benar, maka keseluruhan yang kompleks itu sendiri haruslah baik dan benar juga.\u003c/p\u003e\n\u003cp\u003eIni penting karena, seperti yang kita bahas dalam video terakhir, pemahaman yang benar tentang dunia diperlukan untuk memperoleh kekuatan. Apapun keyakinan kompleks yang kita miliki hanya bisa benar jika bagian-bagiannya juga benar. Untuk membuatnya lebih konkrit, mari kita pikirkan tentang proses menulis esai dari prinsip-prinsip pertama. Sebuah esai yang ditulis dengan baik seperti buah yang lezat: nikmat untuk dikonsumsi dan sulit diproduksi tanpa memahami dasarnya. Kita dapat mengidentifikasi dasarnya dengan memecahnya menjadi bagian-bagiannya.\u003c/p\u003e\n\u003cp\u003eSebuah esai adalah kumpulan paragraf. Nah, sebuah paragraf adalah kumpulan kalimat. Sebuah kalimat adalah kumpulan kata. Kata-kata adalah kumpulan huruf dan huruf adalah blok bangunan dasar dari sebuah esai. Setelah komponen-komponen sebuah esai dipahami, kita dapat memperbaiki masing-masing komponen dari yang paling sederhana hingga yang kompleks. Jika kita dapat membuat setiap komponen menjadi luar biasa maka keseluruhan harus luar biasa dan itu adalah seni berpikir dari prinsip-prinsip pertama.\u003c/p\u003e\n\u003cp\u003eSekarang, mari kita bicara tentang manfaatnya. Beberapa manfaat datang dari memahami ide sampai ke komponen dasarnya. Setelah Anda memahami dasar-dasar suatu ide, Anda dapat mengatur ulang, mengubah, atau menyatukannya dengan cara yang berbeda untuk menciptakan ide atau produk baru. Pada contoh menulis, kita bisa membuat lapisan lain di atas esai: kita bisa menyebut kumpulan esai sebagai buku.\u003c/p\u003e\n\u003cp\u003eSekarang kita telah menciptakan sesuatu yang baru. Komponen dasar dapat diubah untuk meningkatkan ide atau produk. Misalnya, setelah kita mengetahui komponen dasar dari esai, kita dapat mengevaluasi masing-masing komponennya untuk melihat bagaimana masing-masing komponen bisa menjadi yang terbaik. Tetapi, tanpa mengetahui komponen-komponen ini, tidak mungkin membuat perbaikan apa pun. Setelah Anda memahami komponen dasar dari suatu ide, lebih mudah untuk mengintegrasikan pengetahuan baru ke dalam pemahaman Anda. Misalnya, setelah Anda tahu cara menulis huruf, menjadi lebih mudah untuk membuat kata.\u003c/p\u003e\n\u003cp\u003eSetelah Anda tahu cara menulis kata, Anda bisa membuat kalimat. Setelah Anda bisa membuat kalimat, Anda bisa membuat paragraf, kemudian esai, kemudian buku, kemudian seluruh perpustakaan. Memahami komponen dasar dari suatu ide membuat lebih mudah untuk mentransfer ide yang kompleks ke orang lain. Anda dapat mulai dari komponen paling sederhana dan membangun ide dari sana; ini sama persis dengan apa yang kita coba lakukan di sekolah.\u003c/p\u003e\n\u003cp\u003eKami mengajarkan anak-anak bagaimana menulis abjad, kemudian kata-kata, dan seterusnya. Pemikir prinsip pertama adalah guru yang lebih baik karena mereka dapat menentukan tingkat persis di mana pemahaman seorang siswa gagal. Jadi, Anda melihat manfaatnya tapi bagaimana seseorang bisa menjadi pemikir prinsip pertama? Bagaimana Seseorang Bisa Berpikir dari Prinsip Pertama? Berpikir dari prinsip pertama sederhana, tetapi tidak mudah.\u003c/p\u003e\n\u003cp\u003eSaya hanya memiliki satu saran yang dapat dilakukan dan terinspirasi oleh Aristoteles: membuat hierarki (seperti yang kami lakukan dengan contoh esai).\nKebanyakan gagasan bersarang di dalam atau di luar satu sama lain dan tugas pemikir prinsip pertama\nadalah memetakan bagaimana gagasan-gagasan ini terkait. Seperti Aristoteles, seperti semua empiris, akan mengatakan, pengetahuan dimulai dengan pengalaman. Dunia menyajikan buah di sekeliling Anda: tindakan penciptaan yang menakjubkan dan kompleks. Menemukan akar penciptaan ini dimulai dengan pertanyaan seperti mengapa atau bagaimana.\u003c/p\u003e\n\u003cp\u003ePencari kebenaran tertinggi tidak boleh puas dengan buah, namun mereka menyadari bahwa pencarian\nakar tidak pernah berakhir. Setelah mereka mengurangi suatu ide menjadi dasar-dasar terkecil yang dapat mereka pikirkan, mereka telah tiba pada prinsip-prinsip pertama.\u003c/p\u003e\n\u003cp\u003eDasar-dasar ini dapat digunakan untuk berinovasi, mengoptimalkan, mempelajari ide yang lebih kompleks, atau mengajarkan orang lain. Salah satu cara terbaik untuk menemukan dasar-dasar ini adalah dengan menulis dan mengorganisir informasi dalam suatu subjek yang Anda minati dengan menggunakan hierarki atau peta pikiran seperti yang kami lakukan dengan esai.\nJadi, itu mengakhiri seri mini saya tentang kekuatan. Saya mengajukan kerangka kerja untuk kekuatan dalam video terakhir dan membahas ide menjadi berharga untuk memperolehnya.\u003c/p\u003e\n\u003cp\u003eDalam video ini, saya mengajukan mode pemikiran umum untuk pencari kebenaran.\nDi video berikutnya, saya berencana untuk membahas sesuatu yang mungkin mengejutkan Anda: bahaya\nmenjadi pemikir prinsip pertama.\u003c/p\u003e\n\u003ch2 id=\"pengaplikasian-untuk-seorang-engineering-manager\"\u003ePengaplikasian untuk seorang Engineering Manager\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pengaplikasian-untuk-seorang-engineering-manager\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eIdentifikasi dan dekonstruksi masalah: Identifikasi masalah yang perlu dipecahkan, kemudian dekonstruksi masalah tersebut menjadi elemen-elemen dasar. Misalnya, jika masalahnya adalah keterlambatan pengembangan produk, kemudian dekonstruksi masalah tersebut menjadi tugas-tugas dasar yang perlu diselesaikan, seperti pengembangan fitur, debugging, dan integrasi.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eCari solusi dari dasar: Gunakan pendekatan bottom-up untuk menemukan solusi-solusi baru dari elemen-elemen dasar yang telah diidentifikasi. Misalnya, jika masalahnya adalah keterlambatan pengembangan produk, pertimbangkan solusi-solusi seperti mengotomatisasi tugas-tugas tertentu, memperbaiki proses debugging, atau menggunakan teknologi baru untuk mengintegrasikan fitur-fitur produk.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eEvaluasi solusi: Evaluasi setiap solusi yang dihasilkan dari sudut pandang logis dan fakta-fakta yang tersedia. Pertimbangkan juga konsekuensi jangka panjang dari setiap solusi. Jika solusi tersebut terbukti efektif, gunakan untuk memperbaiki proses pengembangan produk.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eTerus belajar: Tetap mempelajari teknologi dan tren terbaru dalam industri. Selalu mencari tahu cara-cara baru untuk memecahkan masalah dan meningkatkan proses pengembangan perangkat lunak.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/til.managing-team\"\u003eManaging Team\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"enableAutoCreateOnDefinition":false,"enableXVaultWikiLink":false,"enableRemoteVaultInit":true,"enableUserTags":true,"enableHashTags":true,"workspaceVaultSyncMode":"noCommit","enableAutoFoldFrontmatter":false,"enableEditorDecorations":true,"maxPreviewsCached":10,"maxNoteLength":204800,"seeds":{"dendron.templates":{}},"enableFullHierarchyNoteTitle":false},"preview":{"enableFMTitle":true,"enableNoteTitleForLink":true,"enableFrontmatterTags":true,"enableHashesForFMTags":false,"enablePrettyRefs":true,"enableKatex":true,"automaticallyShowPreview":false},"publishing":{"enableFMTitle":true,"enableNoteTitleForLink":true,"enable
