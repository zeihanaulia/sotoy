ps":{"note":{"id":"til.managing-team.quantified-self","title":"Quantified Self","desc":"","updated":1741593785656,"created":1741593681926,"custom":{},"fname":"til.managing-team.quantified-self","type":"note","vault":{"fsPath":"vault"},"contentHash":"50b116b0f2d3a82239cc89e03b2fab7f","links":[{"type":"wiki","from":{"fname":"til.managing-team.quantified-self","id":"til.managing-team.quantified-self","vaultName":"vault"},"value":"tags.YangPentingKonsisten.","alias":"#YangPentingKonsisten.","position":{"start":{"line":37,"column":228,"offset":4752},"end":{"line":37,"column":250,"offset":4774},"indent":[]},"xvault":false,"to":{"fname":"tags.YangPentingKonsisten."}},{"from":{"fname":"book-summaries.building-a-second-brain","id":"book-summaries.building-a-second-brain","vaultName":"vault"},"type":"backlink","position":{"start":{"line":4,"column":511,"offset":543},"end":{"line":4,"column":548,"offset":580},"indent":[]},"value":"til.managing-team.quantified-self"}],"anchors":{"quantified-self":{"type":"header","text":"Quantified Self","value":"quantified-self","line":9,"column":0,"depth":3},"the-questioning":{"type":"header","text":"The Questioning","value":"the-questioning","line":13,"column":0,"depth":4},"the-observing":{"type":"header","text":"The Observing","value":"the-observing","line":17,"column":0,"depth":4},"reasoning-penalaran":{"type":"header","text":"Reasoning (Penalaran)","value":"reasoning-penalaran","line":37,"column":0,"depth":4},"consolidating-insight":{"type":"header","text":"Consolidating Insight","value":"consolidating-insight","line":59,"column":0,"depth":4}},"children":[],"parent":"til.managing-team","data":{}},"body":"\u003ch1 id=\"quantified-self\"\u003eQuantified Self\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#quantified-self\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch3 id=\"quantified-self-1\"\u003eQuantified Self\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#quantified-self-1\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eLagi baca buku \"Building a second brain\" gue nemuin sesuatu yang menarik. Penulis buku tiago forte memiliki problem pada tubuhnya dan dia metion sesutu yang belum pernah gue tau, yaitu: \u003ca href=\"https://quantifiedself.com/get-started/\"\u003eQuantified Self\u003c/a\u003e project yang cukup menarik dimana komunitasi ini saling membantu ke orang orang yang membutuhan self tracking. Orang orang bisa menggali insight tentang suatu masalah atau pertanyaan mengunakan data diri sendiri. Ada empat aktifitas yang akan dilakukan yaitu Pertanyaan, Mengamati, Reasoning (Memikirkan) dan Konsolidasi insight. Gue coba elaborasi\u003c/p\u003e\n\u003ch4 id=\"the-questioning\"\u003eThe Questioning\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-questioning\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eTahap ini lo mulai list apa aja yang jadi masalah di hidup lo. Kalau gue akhir akhir ini, ya mungkin udah lama juga sih semenjak 2020 mulai terasa mudah capek dan waktu berlalu begitu cepat. Dari sini akan tau apa yang nanti mau gue track dan coba observasi lebih dalam. Pertanyaan ini menjadi motivasi untuk diselesaikan. Yang jadi problem dalam menyelesaikan sesuatu adalah kita gak tau progress, gak tau udah sampai mana sehingga sering kali problem tidak terselesaikan dan cenderung diabaikan. Forum Quantified Self juga menyediakan platform untuk bertanya yang disebut \u003ca href=\"https://forum.quantifiedself.com/c/quantified-self/project-logs/41\"\u003eProject Logs\u003c/a\u003e, disini kita bisa sharing dan meminta bantuan seperti cara tracking atau mungkin ada aplikasi yang membantu melakukan tracking.\u003c/p\u003e\n\u003ch4 id=\"the-observing\"\u003eThe Observing\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-observing\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eDi tahap ini lo mulai memutuskan, dari banyakanya pertanyaan yang jadi masalah buat lo, mana yang mau lo observasi lebih dalam. Ditahap ini lo akan melakukan trial error dan bereksperimen diawal. Lo akan mencoba buat menebak nebak data seperti apa yang mau lo collect. Lihat apakah ada pattern? Seberapa sering lo bakal ngukur atau mencatat? Apakah lo bakal nemu sesuatu yang bikin lo terkejut. Dan pastikan lo berfikir jernih tentang observasi ini, apakah observasi akan memberikan hal yang mungkin relevan, nyaman dan dapat dipercaya.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRelevant: Apakah observasi ini benar benar memberikan insight?\u003c/li\u003e\n\u003cli\u003eConvenient: Apakah bisa mengumpulkan data observasi dengan mudah dan konsisten?\u003c/li\u003e\n\u003cli\u003eTrustworthy: Seberapa yakin dengan pengukurannya?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNgomong ngomong soal validasi data bisa baca ini \u003ca href=\"https://quantifiedself.com/blog/validating-self-tracking-devices/\"\u003eIs My Data Valid?\u003c/a\u003e sebagai petunjuk. Pada tahap observasi catet semua apa yang sudah diamati. Toolsnya gak perlu ribet, notes digital di smartphone atau gsheet bisa, pake pensil dan kertas juga boleh. Yang penting konsisten dan gampang nyatetnya. Self tracking yang berhasil sebenernya cuma perlu satu jenis pengukuran angka setiap hari. Jadi kalau cuma buat ngukur diri sendiri gak perlu yang rumit rumit alatnya. Contohnya bisa gini\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMood sebelum tidur atau perasaan segar setelah bangun tidur -\u003e ini lo bisa nilai dengan angka 1-10.\u003c/li\u003e\n\u003cli\u003eKalau lo ada sakit yang menggangu, seberapa besar dan sering rasa itu -\u003e ini juga bisa kasih skala 1-10 buat ngukur intensitas gangguan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIntinya, self tracking bisa lo lakukan dengan cara yang sederhana tapi datanya bisa memberikan lo insight tentang kondisi diri. Kalo lo bikin prosesnya terlalu rumit ujung ujungnya lo bakal udahan, gak dilanjutin observasinya. Sebelum mulai self tracking tanya sama diri sendiri:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eApakah lo bisa melakukan ini meskipun lo udah gak semangat lagi?\u003c/li\u003e\n\u003cli\u003eApakah metode observasi lo bisa dilakukan kapan pun? mekipun ketika lo sedang bekerja atau sedang bersama keluarga?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBagian ini penting karena, lo biasanya banyak orang cuma semangat diawal dan gak bisa konsisten dengan banyak alasan seperti sibuk lah, bosen lah, gak sempet lah, dll. Akhir ini banyak sekali produk yang menawarkan health measurement, tapi pertanyaannya bisa diexport gak data mentahnya? jadi bukan cuma grafik aja. Dengan bisa mengakses data mentah, kita bisa mengolah lebih jauh lagi. Buat diskusi app dan tools bisa cek disini \u003ca href=\"https://forum.quantifiedself.com/c/quantified-self/apps-tools/7\"\u003eApp Tools\u003c/a\u003e\u003c/p\u003e\n\u003ch4 id=\"reasoning-penalaran\"\u003eReasoning (Penalaran)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#reasoning-penalaran\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eSetelah lo kumpulin data langkah selanjutnya adalah reasoning. Ada banyak cara untuk menganalisa data berbentuk angka. Bisa pake teknik statistik, Bikin prediksi dan Cek hubungan sebab-akibat antara satu tindakan dan hasil yang diperoleh. Memahami data bisa dilakukan oleh siapa saja, mau itu anak kecil sampai ilmuan, dari yang sederhana hingga yang kompleks. Ada tiga cara sederhana untuk ambil kesimpulan dari data.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eMembuat baseline: ini adalah titik awal pengukuran, gunanya buat membandingkan perubahan dimasa depan.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eSebagai contoh, lo mau ngukur seberapa kuat lo. Lo bisa coba dulu di iterasi pertama lo kuat berapa? misalnya 10 kali. angka 10 ini menjadi baseline yang nantinya lo bisa ngebandingin dengan performa lo beberapa minggu kedepan \u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003e#YangPentingKonsisten. (Private)\u003c/a\u003e Kalau tadi kita pake single number, tapi bisa juga pake average karena pengukurannya selalu berubah ubah seperti denyut jantung, tekanan darah, berat badan dan mood. Kita bisa ambil satu kali pengukuran tapi bisa gak akurat. Dengan pake rata rata ini bisa membantu kita buat memahami variasi pola data. Seberapa besar fluktuasi normal dari suatu pengukuran ke pengukuran lainnya? Apakah perubahan terjadi karena kondisi tertentu? Kalau kita mengukur sesuatu pada waktu yang berbeda, misalnya pagi dan sore mungkin hasilnya tidak sama. \u003c/p\u003e\n\u003cp\u003eSelain angka kita juga bisa kumpulin berdasarkan catatan atau observasi sehari hari. Tanyakan hali ini pada diri sendiri, Apa yang sebenarnya ingin lo ketahui? Apa yang ingin dipelajari dari data ini? Jawaban dari pertanyaan ini bakalan ngarahin lo ke cara kita ngumpulin baseline. Baseline gak harus berupa angka. Bisa juga berupa catatan sederhana tentang pengalaman sehari hari. Misalnya, catet pola tidur, lo merasa lebih segar setelah tidur 7 jam dibanding 6 jam, atau merasa lebih cepat tidur jika habis ngegym atau mandi air hangat. Contoh lain mencatat pola stres: Hari ini lo merasa lebih tenanhg karena lo olahraga di pagi hari. Atau mencatat interaksi sosial, Ternyata lo lebih bahagia jika lo ketemu teman lama atau lo lebih bahagia jika lo bertemu orang baru. Jadi baseline non angka ini intinya adalah asumsi awal lo tentang masalah yang lo alami, lo catet dan coba lakukan hal berbeda apakah hasilnya sama saja atau berubah.\u003c/p\u003e\n\u003col start=\"2\"\u003e\n\u003cli\u003eGunakan timeline\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eSalah satu cara paling umum dalam menganalisis data adalah dengan grafik yang menunjukan perubahan dari waktu ke waktu. Dengan begini lo bisa mudah melihat pola dan tren. Ini juga bakal membantu lo untuk mengidentifikasi hubungan sebab-akibat berdasarkan urutan waktu. Dan berguna untuk melihat dampak dari suatu intervensi. Timeline bissa dibuat dengan jumlah data yang sedikit maupun banyak. Mau itu cuma beberapa titik data sampe juataan. Tapi ada tantatangan teknis dalam membuatnya terutama kalau jumlah datanya besar banget dan data dikumpulkan dengan metode berbeda. Timeline tidak harus dibuat dengan alat digital yang rumit, cara paling sederhana bisa menggunakan kertan dan pensil.\u003c/p\u003e\n\u003col start=\"3\"\u003e\n\u003cli\u003eRetrospective annotation\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eLangkah berikutnya adalah mencari tahu penyebab perlubahan yang terlihat. Apakah ada tren naik/turun? Apakah ada pola yang muncul? Apa yang menyebabkan perubahan tersebut? Jawabannya bisa aja gak langsung kelihatan. Jadi lo perlu lihat lebih dalam ke dalam konteks saat perubahan terjadi. Misalnya:\u003c/p\u003e\n\u003cp\u003eTiba tiba berat badan lo turun drastis, Apakah ada perubahan dalam pola makan atau aktivitas?\nMood lo ancur dalam beberapa waktu terakhir, apakah ada kejadian yang memicu stres?\nMelakukan restrospeksi dapat membantu memahami pola ini. Lo bisa kombnasikan catatan digital lo dan memori otak lo buat merefleksikan perubahan berdasarkan data yang udah lo kumpulin. Lo juga bisa manfaatin jejak digital, kaya foto, kalender, email, chat atau aplikasi.\u003c/p\u003e\n\u003ch4 id=\"consolidating-insight\"\u003eConsolidating Insight\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#consolidating-insight\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eSelf tracing project adalah proses pembelajaran yang terus berjalan, bukan hanya sekedar mengumpulkand ata dan menarik kesimpulan. Setiap langkah dalam proyek ini, mulai dari menentukan pertanyaan awal bisa menjadi wawasan yang berguna. Salah satu cara terbaik buat memperdalam pemahaman tentang data adalah bertindak berdasarkan insight yang diperloleh dan membagikan kepada orang lain? kenapa gitu? dengan begini lo akan dipaksa berpikir lebih dalam tentang data yang lo kumpulin. Lo bisa ningkatin kreativitas dalam melihat pola dan mencari solusi. Lo akan terbantu dalam mengoraganisir insight biar lebih fokus. Ketika lo mencoba share insight yang lo udah dapet ke orang lain, lo akan cenderung mengevaluasi ulang prosesnya. Dari sini lo bisa lebih paham tentang diri lo sendiri. Lo bakal nemuin pertanyaan baru buat diteliti lebih lanjut. Lo juga bakal mengeksploarasi teknik baru buat memvalidasi ulang. Sharing bukan tujuan akhirnya, tapi juga cara buat memerdalam pemahaman. Lo bisa sharing dengan ikut komunitas Quantified Self atau nulis blogpost. \u003c/p\u003e\n\u003cp\u003eKalau lo mau ikut show\u0026#x26;Tell, Biasanya struktur nya seperti ini. Ada tiga pertanyaan utama\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eApa yang lo lakukan?\u003c/li\u003e\n\u003cli\u003eBagaimana lo melakukannya?\u003c/li\u003e\n\u003cli\u003eApa yang lo pelajari\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePart \"Bagaimana\" ini lebih penting karena disini lo bisa bantu orang lain yang mau cobain hal yang sama. Yang pasti kejujuran itu hal yang paling utama, gak perlu melebih lebihkan agar hasil terlihat menarik (gak perlu ada double book buat ginian kan wkwkwkwk). Justru kejujuran dalam berbagi pengalaman, termasuk kegagalan bisa lebih bermanfaat. Hal yang tidak berhasil bisa sama berharganya dengan hal yang berhasil, karena sama sama memberikan perlajaran yang bisa dihindari orang lain. Selain itu saat berbagi hindari membuat kesimpulan yang terlalu unmum. Biasanya dari self tracking bersifat sangat pribadi, sesuatu yang berhasil buat kita belum tentu berhasil buat orang lain. jadi jangan diubah agar orang lain mengikuti.\u003c/p\u003e\n\u003cp\u003eTidak ada cara yang benar atau salah dalam self tracking, tidak perlu mengesankan orang lain. Cukup fokus pada eksplorasi pribadi.\u003c/p\u003e\n\u003cp\u003eHari ini gue belajar sesuatu yang menarik dan ini bakalan jadi project gue kedepannya.\u003c/p\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/book-summaries.building-a-second-brain\"\u003eBuilding a Second Brain\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confir
