e\n\u003cli\u003e\u003cstrong\u003ePenulis\u003c/strong\u003e: Tiago Forte\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTahun\u003c/strong\u003e: 2022\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJenis\u003c/strong\u003e: Buku\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLihat juga\u003c/strong\u003e: \u003ca href=\"/sotoy/notes/book-summaries.building-a-second-brain\"\u003eBuilding a Second Brain\u003c/a\u003e — ringkasan awal (belum diproses ke Zettel)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"catatan-per-gagasan\"\u003eCatatan Per Gagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan-per-gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"otak-manusia-didesain-untuk-menghasilkan-ide-bukan-menyimpannya\"\u003eOtak manusia didesain untuk menghasilkan ide, bukan menyimpannya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#otak-manusia-didesain-untuk-menghasilkan-ide-bukan-menyimpannya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Your mind is for having ideas, not holding them.\" — David Allen (dikutip Forte)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: Ini selaras dengan GTD. Otak kita sangat buruk sebagai tempat penyimpanan jangka panjang — kapasitasnya terbatas dan tidak reliabel. Tapi otak sangat bagus dalam membuat \u003cem\u003ekoneksi\u003c/em\u003e dan menghasilkan \u003cem\u003einsight\u003c/em\u003e kalau diberi bahan yang cukup. Maka tugasnya bukan menyimpan, tapi berpikir.\u003c/p\u003e\n\u003cp\u003e→ Zettel dibuat: \u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"informasi-yang-tidak-diproses-tidak-meningkatkan-pengetahuan\"\u003eInformasi yang tidak diproses tidak meningkatkan pengetahuan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#informasi-yang-tidak-diproses-tidak-meningkatkan-pengetahuan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eForte menyebut ini \"Collector's Fallacy\" — orang mengumpulkan highlight, bookmark, dan catatan tapi tidak pernah memprosesnya. Koleksi sebesar apapun tidak akan menghasilkan pemahaman kalau tidak ada tahap \u003cem\u003eelaborasi\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eCatatan gue: Ini mirip dengan konsep \"levels of processing\" dalam psikologi kognitif — semakin dalam kamu memproses informasi (misalnya menulis ulang dengan kata sendiri), semakin kuat memori dan pemahamannya.\u003c/p\u003e\n\u003cp\u003e→ Zettel dibuat: \u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"nilai-pengetahuan-ada-pada-koneksinya-bukan-kuantitasnya\"\u003eNilai pengetahuan ada pada koneksinya, bukan kuantitasnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#nilai-pengetahuan-ada-pada-koneksinya-bukan-kuantitasnya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eForte menggunakan metafora \"commonplace book\" yang dipakai oleh para pemikir besar — mereka tidak mengumpulkan fakta, tapi membangun \u003cem\u003ejaringan\u003c/em\u003e ide yang bisa diakses dan dikombinasikan.\u003c/p\u003e\n\u003cp\u003eCatatan gue: Ini \u003cem\u003epersis\u003c/em\u003e prinsip utama Zettelkasten — koneksi (bukan koleksi) adalah sumber dari insight baru. Sebuah Zettel yang terhubung ke 10 Zettel lain jauh lebih bernilai dari 100 Zettel yang berdiri sendiri.\u003c/p\u003e\n\u003cp\u003e→ Zettel dibuat: \u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"zettels-yang-dibuat-dari-sumber-ini\"\u003eZettels yang Dibuat dari Sumber Ini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#zettels-yang-dibuat-dari-sumber-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — Second brain memperluastu kapasitas berpikir dengan offloading memori\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e — Ide yang tidak ditulis sama dengan ide yang tidak ada\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e — Koneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"pertanyaan-terbuka\"\u003ePertanyaan Terbuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-terbuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eBagaimana CODE (Capture, Organize, Distill, Express) bisa diimplementasikan di Dendron secara konkret?  \u003c/li\u003e\n\u003cli\u003eApakah hierarki \u003ccode\u003ezettel.*\u003c/code\u003e sudah cukup sebagai pengganti PARA system dari Forte?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #154406;\" href=\"/sotoy/notes/tags.literature-note\"\u003eliterature-note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\" href=\"/sotoy/notes/tags.knowledge-management\"\u003eknowledge-management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #475f94;\" href=\"/sotoy/notes/tags.second-brain\"\u003esecond-brain\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.zettelkasten\"\u003eZettelkasten di Dendron — Panduan Implementasi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.zettelkasten.cara-pakai\"\u003eCara Pakai Zettelkasten di Project Ini\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.personal-knowledge-management\"\u003eMOC: Personal Knowledge Management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},
