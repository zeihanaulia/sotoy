ar lebih efektif, bagaimana menyimpan dan menemukan kembali pengetahuan, dan bagaimana mengubah informasi menjadi output nyata (tulisan, keputusan, keahlian).\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"entry-point--mulai-dari-sini\"\u003eEntry Point — Mulai dari Sini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#entry-point--mulai-dari-sini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e — \u003cstrong\u003eKoneksi \u003e Koleksi\u003c/strong\u003e: prinsip paling fundamental yang membedakan PKM yang efektif dari tumpukan catatan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — \u003cstrong\u003eOtak sebagai prosesor, bukan storage\u003c/strong\u003e: mengapa kita butuh sistem eksternal\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"klaster-gagasan\"\u003eKlaster Gagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaster-gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"mengapa-sistem-eksternal-diperlukan\"\u003eMengapa Sistem Eksternal Diperlukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-sistem-eksternal-diperlukan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — Second brain memperluas kapasitas berpikir dengan offloading memori\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e — Ide yang tidak ditulis sama dengan ide yang tidak ada\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 i
