aim utama","value":"klaim-utama","line":22,"column":0,"depth":2},"product-brief-merapikan-keyakinan":{"type":"header","text":"Product Brief: merapikan keyakinan","value":"product-brief-merapikan-keyakinan","line":28,"column":0,"depth":2},"prfaq-menguji-keyakinan":{"type":"header","text":"PRFAQ: menguji keyakinan","value":"prfaq-menguji-keyakinan","line":41,"column":0,"depth":2},"kapan-pakai-apa":{"type":"header","text":"Kapan pakai apa?","value":"kapan-pakai-apa","line":53,"column":0,"depth":2},"implikasi-untuk-planning":{"type":"header","text":"Implikasi untuk planning","value":"implikasi-untuk-planning","line":58,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":64,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-product-brief-vs-prfaq-klarifikasi-lembut-versus-pengujian-adversarial\"\u003eBMAD Product Brief vs PRFAQ: klarifikasi lembut versus pengujian adversarial\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-product-brief-vs-prfaq-klarifikasi-lembut-versus-pengujian-adversarial\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa perbedaan fundamental antara Product Brief dan PRFAQ?\u003c/li\u003e\n\u003cli\u003eKapan menggunakan masing-masing dalam BMAD?\u003c/li\u003e\n\u003cli\u003eBagaimana kedua alat ini mengubah kualitas planning?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD Product Brief dan PRFAQ sama-sama ada untuk memperjelas ide sebelum planning. Perbedaannya adalah tingkat tekanan yang diberikan pada ide tersebut.\u003c/p\u003e\n\u003cp\u003eProduct Brief adalah klarifikasi lembut. PRFAQ adalah pengujian adversarial.\u003c/p\u003e\n\u003ch2 id=\"product-brief-merapikan-keyakinan\"\u003eProduct Brief: merapikan keyakinan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#product-brief-merapikan-keyakinan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eProduct Brief cocok ketika ide Anda sudah punya arah, tetapi masih perlu dirapikan menjadi narasi strategis.\u003c/p\u003e\n\u003cp\u003eFungsinya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emerangkum target user,\u003c/li\u003e\n\u003cli\u003emenegaskan masalah utama,\u003c/li\u003e\n\u003cli\u003emenuliskan nilai proposisi secara ringkas,\u003c/li\u003e\n\u003cli\u003ememberikan batasan scope tanpa memaksa detail teknis.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIa membantu mengubah keyakinan yang sudah ada menjadi bentuk yang bisa dipakai oleh PRD.\u003c/p\u003e\n\u003ch2 id=\"prfaq-menguji-keyakinan\"\u003ePRFAQ: menguji keyakinan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#prfaq-menguji-keyakinan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePRFAQ dipilih ketika Anda ingin ide diuji secara serius.\u003c/p\u003e\n\u003cp\u003eFungsinya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emenulis press release seolah produk sudah jadi,\u003c/li\u003e\n\u003cli\u003emenjawab pertanyaan kritis pelanggan dan stakeholder,\u003c/li\u003e\n\u003cli\u003emenantang asumsi nilai, diferensiasi, dan kelayakan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJika Product Brief membuat ide terlihat jelas, PRFAQ menanyakan apakah ide itu cukup kuat untuk bertahan terhadap pertanyaan sulit.\u003c/p\u003e\n\u003ch2 id=\"kapan-pakai-apa\"\u003eKapan pakai apa?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-pakai-apa\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eGunakan Product Brief jika Anda sudah punya arahnya dan butuh bentuk strategis.\u003c/li\u003e\n\u003cli\u003eGunakan PRFAQ jika Anda ingin menguji apakah ide tersebut bisa mengomunikasikan nilai dan memuat asumsi yang tahan terhadap kritik.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"implikasi-untuk-planning\"\u003eImplikasi untuk planning\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi-untuk-planning\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eProduct Brief membuat planning lebih terarah dan lebih cepat. PRFAQ membuat planning lebih tahan terhadap kesalahan konseptual.\u003c/p\u003e\n\u003cp\u003eKeduanya bukan ganti satu sama lain. Mereka adalah dua cara berbeda untuk menyiapkan ide menjadi bahan yang layak dibentuk menjadi PRD.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171637\"\u003eBMAD product brief merapikan visi produk sebelum PRD\u003c/a\u003e — BMAD product brief merapikan visi produk sebelum PRD\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171638\"\u003eBMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/a\u003e — BMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003
