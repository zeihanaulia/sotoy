tecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":47,"column":3,"offset":3273},"end":{"line":47,"column":28,"offset":3298},"indent":[]},"value":"zettel.20260421173600"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":17,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":23,"column":0,"depth":2},"simulasi-kasus-tim-kecil-yang-pakai-ai-coding-tools":{"type":"header","text":"Simulasi: kasus tim kecil yang pakai AI coding tools","value":"simulasi-kasus-tim-kecil-yang-pakai-ai-coding-tools","line":33,"column":0,"depth":2},"input-awal":{"type":"header","text":"Input awal","value":"input-awal","line":35,"column":0,"depth":3},"1-setup":{"type":"header","text":"1. Setup","value":"1-setup","line":41,"column":0,"depth":3},"2-choose-approach":{"type":"header","text":"2. Choose approach","value":"2-choose-approach","line":58,"column":0,"depth":3},"3-facilitation":{"type":"header","text":"3. Facilitation","value":"3-facilitation","line":71,"column":0,"depth":3},"4-organize":{"type":"header","text":"4. Organize","value":"4-organize","line":90,"column":0,"depth":3},"5-action":{"type":"header","text":"5. Action","value":"5-action","line":108,"column":0,"depth":3},"hasil-sesi":{"type":"header","text":"Hasil sesi","value":"hasil-sesi","line":117,"column":0,"depth":2},"kenapa-simulasi-ini-penting":{"type":"header","text":"Kenapa simulasi ini penting","value":"kenapa-simulasi-ini-penting","line":129,"column":0,"depth":2},"hubungan-ke-analysis-phase":{"type":"header","text":"Hubungan ke analysis phase","value":"hubungan-ke-analysis-phase","line":140,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":152,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"simulasi-bmad-brainstorming-dari-keresahan-tim-kecil-ai-coding-tools-ke-problem-definition\"\u003eSimulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#simulasi-bmad-brainstorming-dari-keresahan-tim-kecil-ai-coding-tools-ke-problem-definition\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBagaimana \u003ccode\u003ebmad-brainstorming\u003c/code\u003e bekerja ketika input awal masih kabur?\u003c/li\u003e\n\u003cli\u003eApa yang berubah setelah sesi setup, facilitation, dan organize?\u003c/li\u003e\n\u003cli\u003eBagaimana output brainstorming menjadi bahan valid untuk fase berikutnya?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD brainstorming terbaik sukses ketika ia mengubah \"gue punya keresahan\" menjadi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eproblem inti yang terdefinisi,\u003c/li\u003e\n\u003cli\u003ekandidat arah solusi yang relevan,\u003c/li\u003e\n\u003cli\u003elangkah validasi berikutnya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUkuran suksesnya bukan jumlah ide, tapi kejernihan yang keluar dari sesi.\u003c/p\u003e\n\u003ch2 id=\"simulasi-kasus-tim-kecil-yang-pakai-ai-coding-tools\"\u003eSimulasi: kasus tim kecil yang pakai AI coding tools\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#simulasi-kasus-tim-kecil-yang-pakai-ai-coding-tools\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"input-awal\"\u003eInput awal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#input-awal\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e\"Gue pengen bikin sesuatu buat bantu tim kecil yang pakai AI coding tools, soalnya workflow mereka kelihatan cepat tapi sering berantakan.\"\u003c/p\u003e\n\u003cp\u003eDari kalimat ini, BMAD tidak langsung membuat daftar fitur. Ia mulai dengan setup.\u003c/p\u003e\n\u003ch3 id=\"1-setup\"\u003e1. Setup\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-setup\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD menanyakan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esiapa tim kecil itu? (ukuran, peran, cara kerja)\u003c/li\u003e\n\u003cli\u003eapa arti \"berantakan\" di sini? (konteks hilang, review lemah, ownership tidak jelas)\u003c/li\u003e\n\u003cli\u003eapa tujuan sesi ini? (cari problem paling bernilai, arah produk awal, atau validasi feel)\u003c/li\u003e\n\u003cli\u003eapa constraint utama? (target user 2–10 engineer, validasi cepat, avoid enterprise-heavy)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHasil setup:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etopik: workflow tim software kecil yang memakai AI coding tools\u003c/li\u003e\n\u003cli\u003etujuan: menemukan problem paling bernilai untuk arah produk awal\u003c/li\u003e\n\u003cli\u003econstraint: tim 2–10 engineer, produk harus bisa divalidasi cepat, solusi sederhana lebih diutamakan\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSetup ini bukan mematikan kreativitas. Ia memberi batas yang membuat semua ide yang muncul bisa dibandingkan.\u003c/p\u003e\n\u003ch3 id=\"2-choose-approach\"\u003e2. Choose approach\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-choose-approach\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDengan input masih kabur, BMAD cenderung memilih pendekatan eksploratif.\u003c/p\u003e\n\u003cp\u003eAI sebagai fasilitator menawarkan teknik yang membantu user menggali bentuk masalah, misalnya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003epertanyaan probing,\u003c/li\u003e\n\u003cli\u003ereframing situasi,\u003c/li\u003e\n\u003cli\u003ebreakdown masalah,\u003c/li\u003e\n\u003cli\u003everifikasi asumsi awal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTujuannya adalah menemukan nama untuk nyeri yang belum jelas, bukan langsung menghasilkan solusi teknis.\u003c/p\u003e\n\u003ch3 id=\"3-facilitation\"\u003e3. Facilitation\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-facilitation\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFasilitasi BMAD memaksa pertanyaan-pertanyaan seperti:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003edimana berantakannya? Quality? komunikasi? review? konteks? ownership?\u003c/li\u003e\n\u003cli\u003esiapa yang paling merasakan sakitnya?\u003c/li\u003e\n\u003cli\u003ekapan masalah ini muncul? saat coding, review, atau lintas agen AI?\u003c/li\u003e\n\u003cli\u003eapa akibat paling mahal dari kekacauan ini?\u003c/li\u003e\n\u003cli\u003ekalau AI dihapus, apakah masalah masih ada?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDari percakapan, user mungkin menemukan bahwa masalah utamanya adalah:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekonteks keputusan tidak tertangkap,\u003c/li\u003e\n\u003cli\u003ealasan perubahan tersebar,\u003c/li\u003e\n\u003cli\u003ereview hanya melihat output kode, bukan reasoning,\u003c/li\u003e\n\u003cli\u003earsitektur drift pelan tapi nyata.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni bukan ide baru. Ini adalah cara memberi nama pada rasa sakit yang tadi masih kabur.\u003c/p\u003e\n\u003ch3 id=\"4-organize\"\u003e4. Organize\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-organize\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSetelah fasilitasi, BMAD mengelompokkan hasilnya ke cluster:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003econtext retention — menangkap keputusan dan alasan di balik perubahan,\u003c/li\u003e\n\u003cli\u003ereview quality — membuat review melihat niat, trade-off, dan intent,\u003c/li\u003e\n\u003cli\u003eagent coordination — menjaga benang merah ketika banyak alat AI dipakai bersamaan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLalu prioritas ditentukan berdasarkan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emana yang paling sakit,\u003c/li\u003e\n\u003cli\u003emana yang paling khas untuk tim kecil,\u003c/li\u003e\n\u003cli\u003emana yang paling feasible divalidasi cepat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDalam simulasi ini, fokus awal yang muncul adalah:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ealat untuk menangkap dan menyusun konteks perubahan saat menggunakan AI coding workflows.\u003c/strong\u003e\u003c/p\u003e\n\u003ch3 id=\"5-action\"\u003e5. Action\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-action\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAgar tidak berhenti pada insight, BMAD menutup sesi dengan output tindakan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003evalidasi masalah ke engineer atau tech lead yang pakai AI coding tools,\u003c/li\u003e\n\u003cli\u003eidentifikasi cara mereka sekarang menyimpan keputusan: PR description, commit message, docs, issue tracker, atau tidak sama sekali,\u003c/li\u003e\n\u003cli\u003edefinisikan hipotesis MVP: context capture, review-ready change summary, atau decision log,\u003c/li\u003e\n\u003cli\u003eputuskan apakah sesi berikutnya masuk Product Brief atau PRFAQ.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"hasil-sesi\"\u003eHasil sesi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hasil-sesi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika sesi berjalan benar, outputnya bukan daftar 20 ide. Outputnya adalah narasi yang lebih jelas:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eTim software kecil yang menggunakan AI coding tools sering kehilangan konteks keputusan dan alasan perubahan. Masalah inti bukan kualitas kode semata, tetapi arsitektur drift dan review yang lemah karena reasoning tidak tercatat. Arah solusi awal yang paling menjanjikan adalah produk untuk menangkap dan menyusun konteks perubahan agar tim bisa melanjutkan kerja tanpa kehilangan reasoning.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eHasil seperti ini sudah masuk ke fase berikutnya karena ia:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememberikan problem statement yang lebih spesifik,\u003c/li\u003e\n\u003cli\u003emenempatkan solusi di domain context retention,\u003c/li\u003e\n\u003cli\u003emenyisakan ruang untuk validasi dan fokus MVP.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"kenapa-simulasi-ini-penting\"\u003eKenapa simulasi ini penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-simulasi-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSimulasi ini menunjukkan bahwa BMAD brainstorming bukan sekadar eksplorasi bebas. Ia adalah proses yang:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememecah kabut awal,\u003c/li\u003e\n\u003cli\u003ememberi nama pada nyeri pengguna,\u003c/li\u003e\n\u003cli\u003emembuat opsi menjadi lebih terarah,\u003c/li\u003e\n\u003cli\u003emenjaga hasilnya agar bisa dilanjutkan ke Product Brief atau PRFAQ.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJika brainstorming hanya menghasilkan banyak ide, kemungkinan besar tidak ada yang terpakai. BMAD menilai sukses dari kejernihan sesudah sesi.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-analysis-phase\"\u003eHubungan ke analysis phase\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-analysis-phase\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBrainstorming adalah titik awal dalam BMAD analysis phase. Outputnya bukan final solution, tetapi bahan mentah berpikir yang lebih mapan.\u003c/p\u003e\n\u003cp\u003eProduct Brief akan mengambil fokus yang sudah jelas dan merumuskan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etarget user,\u003c/li\u003e\n\u003cli\u003evalue proposition,\u003c/li\u003e\n\u003cli\u003escope awal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePRFAQ akan menguji apakah arah tersebut tahan terhadap pertanyaan kritis.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171825\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003c/a\u003e — Simulasi BMAD analysis phase: invoice app untuk freelancer\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173427\"\u003eAI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/a\u003e — AI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebrainstorming (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esimulation (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171825\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Ca
