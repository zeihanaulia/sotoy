 yang lain jangan dikasih lihat.”\nTapi lo juga males nulis \u003ccode\u003eif (isAdmin) columns.push(...)\u003c/code\u003e karena ya… jelek aja dilihat.\u003c/p\u003e\n\u003cp\u003eNah, di saat-saat kayak gitu, muncullah satu teknik yang kalau kata gue: underrated tapi power banget. Namanya \u003cstrong\u003eConditional Spread\u003c/strong\u003e.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"latar-belakang-spread-biasa\"\u003eLatar Belakang: Spread Biasa\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#latar-belakang-spread-biasa\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSebelum masuk ke versi kondisional, mari kita bahas dulu spread yang umum. Misalnya lo punya array tambahan:\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e extra \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e4\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e5\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e angka \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e1\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e2\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token number\"\u003e3\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token spread operator\"\u003e...\u003c/span\u003eextra\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGampang kan? \u003ccode\u003e...extra\u003c/code\u003e langsung ngelebarin array \u003ccode\u003e[4, 5]\u003c/code\u003e ke array utama.\u003c/p\u003e\n\u003cp\u003eAtau kalau lo main object:\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e defaultUser \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003ename\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Anon\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e fullUser \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token spread operator\"\u003e...\u003c/span\u003edefaultUser\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eage\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token number\"\u003e30\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGak ada yang aneh. Ini basic-nya spread.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"masuk-ke-kasus-nyata-kolom-table\"\u003eMasuk ke Kasus Nyata: Kolom Table\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#masuk-ke-kasus-nyata-kolom-table\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSekarang lo punya sebuah UI table, isinya kolom-kolom buat nampilin data service yang udah diparse. Ada kolom \u003ccode\u003ename\u003c/code\u003e, \u003ccode\u003efilename\u003c/code\u003e, \u003ccode\u003ecreated_at\u003c/code\u003e, dan satu kolom spesial: \u003ccode\u003eprompt\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eMasalahnya, \u003ccode\u003eprompt\u003c/code\u003e ini confidential. Lo gak mau semua orang lihat, apalagi kalau user-nya bukan admin.\nJadi gimana caranya lo tetep bisa nulis array kolom secara rapi, tapi \u003cstrong\u003ekondisional\u003c/strong\u003e?\u003c/p\u003e\n\u003cp\u003eKalau pake cara klasik:\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e columns \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\n  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eaccessorKey\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"name\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eheader\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Name\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eaccessorKey\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"filename\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eheader\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"File\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\n\u003cspan class=\"token keyword control-flow\"\u003eif\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eisAdmin\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n  columns\u003cspan class=\"token punctuation\"\u003e.\u003c/span\u003e\u003cspan class=\"token method function property-access\"\u003epush\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eaccessorKey\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"prompt\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eheader\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Prompt\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eYa bisa. Tapi lama-lama kolom lo makin banyak, kondisi makin kompleks, \u003ccode\u003eif\u003c/code\u003e berserakan, array mutasi di mana-mana. Gak enak.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"di-sinilah-conditional-spread-datang-menyelamatkan\"\u003eDi sinilah Conditional Spread Datang Menyelamatkan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#di-sinilah-conditional-spread-datang-menyelamatkan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDengan satu line:\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e columns \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\n  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eaccessorKey\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"name\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eheader\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Name\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eaccessorKey\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"filename\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eheader\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"File\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token spread operator\"\u003e...\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eisAdmin \u003cspan class=\"token operator\"\u003e?\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eaccessorKey\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"prompt\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003eheader\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Prompt\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e \u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eLo udah nyelesaiin dua masalah sekaligus:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eNambahin kolom prompt cuma kalau admin\u003c/li\u003e\n\u003cli\u003eTetep nulis array secara deklaratif, gak pake \u003ccode\u003epush\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eLihat bagian \u003ccode\u003e...(isAdmin ? [promptColumn] : [])\u003c/code\u003e\nArtinya simpel: \u003cstrong\u003ekalau lo admin\u003c/strong\u003e, tambahin kolom \u003ccode\u003eprompt\u003c/code\u003e. Kalau enggak, spread array kosong \u003ccode\u003e[]\u003c/code\u003e — yang artinya gak ngaruh apa-apa.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"bukan-cuma-array-bisa-juga-di-object\"\u003eBukan Cuma Array, Bisa Juga di Object\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bukan-cuma-array-bisa-juga-di-object\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eLo bisa pake trick yang sama buat object. Misalnya lo punya object user dan lo pengen nambahin property \u003ccode\u003ebadge\u003c/code\u003e kalau user-nya premium:\u003c/p\u003e\n\u003cpre class=\"language-js\"\u003e\u003ccode class=\"language-js\"\u003e\u003cspan class=\"token keyword\"\u003econst\u003c/span\u003e user \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n  \u003cspan class=\"token literal-property property\"\u003ename\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"Zeihan\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token spread operator\"\u003e...\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e(\u003c/span\u003eisPremium \u003cspan class=\"token operator\"\u003e\u0026#x26;\u0026#x26;\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e \u003cspan class=\"token literal-property property\"\u003ebadge\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"gold\"\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e)\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e;\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKenapa ini works? Karena di JS:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003efalse \u0026#x26;\u0026#x26; {}\u003c/code\u003e → hasilnya \u003ccode\u003efalse\u003c/code\u003e, jadi \u003ccode\u003e...false\u003c/code\u003e gak nambah apa-apa\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etrue \u0026#x26;\u0026#x26; { badge: \"gold\" }\u003c/code\u003e → hasilnya object, jadi \u003ccode\u003e...{ badge: \"gold\" }\u003c/code\u003e disebar\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJadi lo bisa punya object yang isinya nambah atau nggak nambah tergantung kondisi. Mirip kayak di Go lo lagi manggil fungsi variadic, tapi sebelum dipass-in lo punya \u003ccode\u003eif\u003c/code\u003e yang nentuin param mana yang masuk.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"kapan-teknik-ini-berguna\"\u003eKapan Teknik Ini Berguna?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-teknik-ini-berguna\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eLagi bikin config \u003ccode\u003ecolumns\u003c/code\u003e, \u003ccode\u003etabs\u003c/code\u003e, \u003ccode\u003eroutes\u003c/code\u003e, \u003ccode\u003emenu\u003c/code\u003e, \u003ccode\u003eprops\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLo pengen hasil akhir yang rapi, clean, dan gak pakai mutasi array\u003c/li\u003e\n\u003cli\u003eLo pengen maintain logic access atau permission tanpa if-else berderet\u003c/li\u003e\n\u003cli\u003eLo ngoding pake framework declarative kayak React, Svelte, atau Vue\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDi project gue, teknik ini jadi senjata utama buat nyusun UI yang kontekstual — berubah tergantung siapa user-nya, role-nya, atau setting-nya.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"catatan-tambahan\"\u003eCatatan Tambahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan-tambahan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAda satu hal yang bikin ini makin enak: \u003cstrong\u003enggak perlu bikin array baru di luar\u003c/strong\u003e. Lo langsung inject logika ke tempat di mana lo bangun array-nya.\u003c/p\u003e\n\u003cp\u003eKalau lo mau makin modular, lo bisa ekstrak jadi fungsi \u003ccode\u003egetDynamicColumns(isAdmin)\u003c/code\u003e atau bahkan bikin \u003ccode\u003eusePermission()\u003c/code\u003e biar \u003ccode\u003ecanViewPrompt\u003c/code\u003e tinggal dipakai di mana-mana.\u003c/p\u003e\n\u003cp\u003eDan yang paling penting, syntax ini bikin lo keliatan pinter pas code review — padahal yang lo lakuin cuma spread ternary.\u003c/p\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ejavascript (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003etypescript (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003efrontend (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ereact (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003etips (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebest-practice (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003econditional (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003espread-operator (Private)\u003c/a\u003e\u
