ps":{"note":{"id":"book-summaries.the-devops-handbook.part-I-the-three-ways","title":"Part I - The Three Ways","desc":"","updated":1682050411373,"created":1682049639262,"custom":{},"fname":"book-summaries.the-devops-handbook.part-I-the-three-ways","type":"note","vault":{"fsPath":"vault"},"contentHash":"98ee22a62e342bfe3b91fb55ee3dd15a","links":[],"anchors":{"the-lean-movement":{"type":"header","text":"THE LEAN MOVEMENT","value":"the-lean-movement","line":18,"column":0,"depth":3},"the-agile-manifesto":{"type":"header","text":"THE AGILE MANIFESTO","value":"the-agile-manifesto","line":26,"column":0,"depth":3},"agile-infrastructure-and-velocity-movement":{"type":"header","text":"AGILE INFRASTRUCTURE AND VELOCITY MOVEMENT","value":"agile-infrastructure-and-velocity-movement","line":34,"column":0,"depth":3},"gerakan-pengiriman-berkelanjutan":{"type":"header","text":"GERAKAN PENGIRIMAN BERKELANJUTAN","value":"gerakan-pengiriman-berkelanjutan","line":42,"column":0,"depth":3},"ringkasan":{"type":"header","text":"Ringkasan","value":"ringkasan","line":54,"column":0,"depth":3}},"children":["book-summaries.the-devops-handbook.part-I-the-three-ways.Agile-Continuous-Delivery-and-the-Three-Ways"],"parent":"book-summaries.the-devops-handbook","data":{}},"body":"\u003ch1 id=\"part-i---the-three-ways\"\u003ePart I - The Three Ways\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-i---the-three-ways\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eFokus utama pada bab ini meliputi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePrinsip-prinsip Flow, yang mempercepat pengiriman pekerjaan dari Development ke Operations hingga pelanggan kami\u003c/li\u003e\n\u003cli\u003ePrinsip-prinsip Feedback, yang memungkinkan kami untuk menciptakan sistem kerja yang semakin aman\u003c/li\u003e\n\u003cli\u003ePrinsip-prinsip Continual Learning and Experimentation, yang menumbuhkan budaya kepercayaan tinggi dan pendekatan ilmiah untuk perbaikan organisasi dengan mengambil risiko sebagai bagian dari pekerjaan kami sehari-hari.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDevOps dihasilkan dari penerapan prinsip-prinsip terbaik dari bidang manufaktur fisik dan kepemimpinan pada aliran nilai teknologi informasi. DevOps mengandalkan berbagai pengetahuan dari Lean, Theory of Constraints, Toyota Production System, resilience engineering, learning organizations, safety culture, human factors, dan lain-lain. Praktik DevOps juga mengambil konteks dari budaya manajemen kepercayaan tinggi, kepemimpinan pelayan, dan manajemen perubahan organisasi. \u003c/p\u003e\n\u003cp\u003eHasilnya adalah kualitas, keandalan, stabilitas, dan keamanan kelas dunia dengan biaya dan usaha yang semakin rendah; serta percepatan aliran dan keandalan di seluruh aliran nilai teknologi, termasuk Manajemen Produk, Pengembangan, QA, Operasi IT, dan Infosec. Meskipun dasar DevOps dapat dilihat berasal dari Lean, Theory of Constraints, dan gerakan Toyota Kata, banyak yang melihat DevOps sebagai kelanjutan logis dari perjalanan software Agile yang dimulai pada tahun 2001.\u003c/p\u003e\n\u003ch3 id=\"the-lean-movement\"\u003eTHE LEAN MOVEMENT\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-lean-movement\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGerakan Lean yang menjadi dasar dari prinsip-prinsip DevOps. Teknik-teknik seperti Value Stream Mapping, Kanban Boards, dan Total Productive Maintenance dikodifikasi untuk Sistem Produksi Toyota pada tahun 1980-an. Pada tahun 1997, Lean Enterprise Institute mulai meneliti aplikasi Lean pada value stream lain, seperti industri jasa dan kesehatan.\u003c/p\u003e\n\u003cp\u003eDua prinsip utama dari Lean adalah keyakinan yang sangat kuat bahwa waktu tunggu dalam manufaktur yang diperlukan untuk mengubah bahan mentah menjadi barang jadi adalah prediktor terbaik dari kualitas, kepuasan pelanggan, dan kebahagiaan karyawan, dan bahwa salah satu prediktor terbaik dari waktu tunggu yang singkat adalah ukuran batch kecil dari pekerjaan.\u003c/p\u003e\n\u003cp\u003ePrinsip-prinsip Lean fokus pada bagaimana menciptakan nilai bagi pelanggan melalui pemikiran sistem dengan menciptakan kesinambungan tujuan, mengadopsi pemikiran ilmiah, menciptakan aliran dan menarik (daripada mendorong), memastikan kualitas di sumbernya, memimpin dengan rendah hati, dan menghormati setiap individu.\u003c/p\u003e\n\u003ch3 id=\"the-agile-manifesto\"\u003eTHE AGILE MANIFESTO\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-agile-manifesto\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSelanjutnya tentang Agile Manifesto yang dibuat pada tahun 2001 oleh 17 pemikir terkemuka dalam pengembangan software. Manifesto ini bertujuan untuk menciptakan seperangkat nilai dan prinsip yang ringan dibandingkan dengan proses pengembangan software yang berat seperti pengembangan waterfall, dan metodologi seperti Rational Unified Process.\u003c/p\u003e\n\u003cp\u003eSalah satu prinsip kunci dari Agile Manifesto adalah \"menghasilkan software yang berfungsi secara teratur, dari beberapa minggu hingga beberapa bulan, dengan preferensi pada jangka waktu yang lebih pendek,\" yang menekankan keinginan untuk ukuran batch yang kecil, rilis bertahap daripada rilis waterfall yang besar. Prinsip-prinsip lain menekankan perlunya tim kecil yang bermotivasi sendiri, bekerja dalam model manajemen yang tinggi kepercayaannya.\u003c/p\u003e\n\u003cp\u003eAgile diakui telah secara dramatis meningkatkan produktivitas banyak organisasi pengembangan. Dan menariknya, banyak momen kunci dalam sejarah DevOps juga terjadi di dalam komunitas Agile atau di konferensi Agile, seperti yang dijelaskan di bawah ini.\u003c/p\u003e\n\u003ch3 id=\"agile-infrastructure-and-velocity-movement\"\u003eAGILE INFRASTRUCTURE AND VELOCITY MOVEMENT\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#agile-infrastructure-and-velocity-movement\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePada konferensi Agile tahun 2008 di Toronto, Kanada, Patrick Debois dan Andrew Schafer mengadakan sesi \"birds of a feather\" tentang penerapan prinsip Agile pada infrastruktur dibandingkan kode aplikasi. Meskipun mereka adalah satu-satunya orang yang datang, mereka dengan cepat mendapat pengikut pemikir sejalan, termasuk salah satu penulis buku ini, John Willis.\u003c/p\u003e\n\u003cp\u003eKemudian, pada konferensi Velocity tahun 2009, John Allspaw dan Paul Hammond memberikan presentasi krusial berjudul \"10 Deploys per Day: Dev and Ops Cooperation at Flickr\", di mana mereka menjelaskan bagaimana mereka menciptakan tujuan bersama antara Dev dan Ops dan menggunakan praktik integrasi terus menerus untuk membuat pengiriman menjadi bagian dari pekerjaan sehari-hari semua orang. Menurut laporan langsung, semua orang yang menghadiri presentasi tersebut langsung tahu bahwa mereka berada di hadapan sesuatu yang dalam dan bersejarah.\u003c/p\u003e\n\u003cp\u003ePatrick Debois tidak hadir pada saat itu, tetapi begitu terkesan dengan ide Allspaw dan Hammond sehingga dia membuat DevOpsDays pertama di Ghent, Belgia (tempat tinggalnya) pada tahun 2009. Di sana, istilah \"DevOps\" diciptakan.\u003c/p\u003e\n\u003ch3 id=\"gerakan-pengiriman-berkelanjutan\"\u003eGERAKAN PENGIRIMAN BERKELANJUTAN\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gerakan-pengiriman-berkelanjutan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMengembangkan disiplin pengembangan build, test, dan integrasi yang berkelanjutan, Jez Humble dan David Farley memperluas konsep tersebut ke pengiriman berkelanjutan, yang menentukan peran \"pipa pengiriman\" untuk memastikan bahwa kode dan infrastruktur selalu dalam keadaan dapat diterapkan, dan bahwa semua kode yang diperiksa pada trunk dapat diterapkan dengan aman ke produksi. Ide ini pertama kali disajikan pada konferensi Agile 2006, dan juga dikembangkan secara independen pada 2009 oleh Tim Fitz dalam sebuah posting blog di situs webnya yang berjudul \"Continuous Deployment.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTOYOTA KATA\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003ePada tahun 2009, Mike Rother menulis Toyota Kata: Managing People for Improvement, Adaptiveness and Superior Results, yang merangkum perjalanannya selama dua puluh tahun untuk memahami dan mengkodekan Sistem Produksi Toyota. Dia adalah salah satu mahasiswa pascasarjana yang terbang bersama eksekutif GM untuk mengunjungi pabrik Toyota dan membantu mengembangkan toolkit Lean, tetapi dia bingung ketika tidak ada perusahaan yang mengadopsi praktik ini berhasil mereplikasi tingkat kinerja yang diamati di pabrik Toyota.\u003c/p\u003e\n\u003cp\u003eDia menyimpulkan bahwa komunitas Lean melewatkan praktik paling penting dari semua, yang disebut improvement kata. Dia menjelaskan bahwa setiap organisasi memiliki rutinitas kerja, dan improvement kata memerlukan menciptakan struktur untuk praktik perbaikan harian yang habitual, karena praktik harianlah yang meningkatkan hasil. Siklus konstan untuk menetapkan keadaan masa depan yang diinginkan, menetapkan target hasil mingguan, dan peningkatan terus-menerus dari pekerjaan harian adalah yang membimbing perbaikan di Toyota.\u003c/p\u003e\n\u003cp\u003eDi atas menjelaskan sejarah DevOps dan gerakan relevan yang digunakannya. Sepanjang sisa Bagian I, kami melihat aliran nilai, bagaimana prinsip Lean dapat diterapkan pada aliran nilai teknologi, dan Tiga Cara dari Aliran, Umpan Balik, dan Pembelajaran dan Eksperimen yang Berkelanjutan.\u003c/p\u003e\n\u003ch3 id=\"ringkasan\"\u003eRingkasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ringkasan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eInti dari \"Part 1 - The Three Ways\" adalah memberikan pemahaman tentang tiga konsep dasar yang menjadi pondasi dari DevOps, yaitu Flow, Feedback, dan Continual Learning and Experimentation. Konsep-konsep ini masing-masing menggambarkan cara bagaimana sebuah organisasi dapat mencapai pengiriman perangkat lunak yang lebih cepat, lebih handal, dan lebih aman. Flow mengacu pada bagaimana pengiriman perangkat lunak harus mengalir lancar dan cepat melalui sistem, Feedback mengacu pada bagaimana umpan balik harus diterapkan di seluruh siklus pengiriman, sementara Continual Learning and Experimentation mengacu pada bagaimana pengembangan perangkat lunak harus selalu belajar dan meningkatkan secara terus-menerus. Tiga konsep ini saling berkaitan dan saling memperkuat satu sama lain dalam mencapai pengiriman perangkat lunak yang efektif dan efisien.\u003c/p\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/book-summaries.the-devops-handbook.part-I-the-three-ways.Agile-Continuous-Delivery-and-the-Three-Ways\"\u003eAgile Continuous Delivery and the Three Ways\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"enableAutoCreateOnDefinition":false,"enableXVaultWikiLink":false,"enableRemoteVaultInit":true,"enableUserTags":true,"enableHashTags":true,"workspaceVaultSyncMode":"noCommit","enableAutoFoldFrontmatter":false,"enableEditorDecorations":true,"maxPreviewsCached":10,"maxNoteLength":204800,"seeds":{"dendron.templates":{}},"ena
