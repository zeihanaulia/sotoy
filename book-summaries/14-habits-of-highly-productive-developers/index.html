ext":"Yang harus dilakukan","value":"yang-harus-dilakukan-13","line":370,"column":0,"depth":4},"pertanyaan--jawaban-13":{"type":"header","text":"Pertanyaan \u0026 Jawaban","value":"pertanyaan--jawaban-13","line":371,"column":0,"depth":4},"part-seven-the-end":{"type":"header","text":"Part Seven: The End","value":"part-seven-the-end","line":373,"column":0,"depth":2}},"children":[],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"14-habits-of-highly-productive-developers\"\u003e14 Habits of Highly Productive Developers\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#14-habits-of-highly-productive-developers\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #840000;\" href=\"/sotoy/notes/tags.self-improvement\"\u003e#self-improvement\u003c/a\u003e\n\u003ca class=\"color-tag\" style=\"--tag-color: #feb209;\" href=\"/sotoy/notes/tags.zeno-rocha\"\u003e#zeno-rocha\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eBuku ini ditulis oleh Zeno Rocha pada tahun 2020, dia juga menginterview atau bertanya ke beberapa software engineer yang berkerja di perusahaan-perusahaan besar seperti Google, Microsoft, Spotify, Amazon dan lain lain.\u003c/p\u003e\n\u003ch2 id=\"part-one-principles\"\u003ePart One: Principles\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-one-principles\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eApa sih keunikan dari  orang-orang yang berkeja di perusahaan besar?\u003c/li\u003e\n\u003cli\u003eApa yang spesial dari seseorang yang aplikasinya digunakan oleh banyak orang?\u003c/li\u003e\n\u003cli\u003eBagaimana beberapa programmer bisa sangat produktif ditempat kerja dan juga diluar kerjaan mereka?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePertanyaan diatas yang sedang dicari jawabannya oleh penulis, buku ini bukanlah tentang jalur kesuksesan yang pasti, akan tetapi buku ini adalah pencarian atau penyelidikan kepada programmer yang produktif diluar sana.\u003c/p\u003e\n\u003ch3 id=\"why-habits-private\"\u003eWhy \u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eHabits (Private)\u003c/a\u003e?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#why-habits-private\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSemuanya mengenai kebiasaan, seperti yang dikatakan oleh James Clear, yang ditulis pada bukunya \u003cem\u003eatomic habits\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eKebiasaan adalah \u003cem\u003ecompound interest\u003c/em\u003e dari perkembangan diri. Sama seperti uang yang bunga berbunga, efek dari kebiasaan akan terasa berlipatganda jika kita terus mengulanginya. \u003c/p\u003e\n\u003cp\u003eDaripada kita bertanya apa bahasa pemrograman yang harus kita pelajari lebih baik tanyakan pertanyaan seperti ini:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eApa kebiasaan yang perlu saya kembangkan agar efektif dalam bahasa pemrograman apapun?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"part-two-learning-habits\"\u003ePart Two: Learning Habits\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-two-learning-habits\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"habit-1-look-for-the-signals\"\u003eHabit 1: Look for the signals\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-1-look-for-the-signals\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDaripada FOMO (Fear of missing out) mendingan JOMO (Joy of missing out). Senangi sesuatu yang sudah lo tau atau sudah ada. Ambil pelajarannya dan cari alternatifnya. \u003c/p\u003e\n\u003cp\u003eAkan banyak orang yang terus jualan, apapun yang menurut mereka itu yang terbaik. Perlu diingat apa yang terbaik buat mereka bisa jadi gak cocok buat lo.\u003c/p\u003e\n\u003cp\u003ePilihlah informasi yang sesuai dengan kebutuhan lo. Ya gak perlu se extreme, menghapus semua sosial media atau unsubsrcribe semua newsletter, ribet. digital detox seperti itu cuma membantu sementara dan bukan solusi untuk jangka panjang. Lo harus bisa membentuk kebiasaan memilih informasi yang relevan buat karir lo.\u003c/p\u003e\n\u003cp\u003eTerima aja kalo lo gak bisa belajar semuanya.  Keinginan mah gak ada batasnya, kebutuhan itu terbatas. Terima aja kalo sesuatu yang baru gak selalu lebih bagus.\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eBuatlah list dari semua teknologi dan tools yang ingin lo pelajari. Lalu labelin dengan prioritas berbeda, \"Minggu ini\", \"Bulan depan\", \"Tahun depan\". Kapanpun lo merasa ketinggalan sesuatu dari sesuatu yang lagi trend, coba check lagi list ini dan atur ulang prioritasnya.\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Bagaimana lo memutuskan teknologi yang mau dipelajari dan menginvestasikan waktu lo untuk mempelajarinya?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/csuwildcat\"\u003eDaniel Buchner\u003c/a\u003e (Microsoft):\u003c/p\u003e\n\u003cp\u003eDia fokus ke beberapa pertanyaan dibawah ini\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eApasih kebutuhan teknikal yang sedang gw kerjakan saat ini?\u003c/li\u003e\n\u003cli\u003eSeberapa mudah untuk orang lain dapat ikut merngerjakan apa yang gw buat? dan seperti apa mereka mengintegrasikan kedalam proyek yang sedang mereka kerjakan?\u003c/li\u003e\n\u003cli\u003eApakah yang saya lakukan sudah selaran dengan standar dan spesifikasi yang saya yakini akan bertahan lama?\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/addyosmani\"\u003eAddy Osmani\u003c/a\u003e (Google)\u003c/p\u003e\n\u003cp\u003eTerima aja lo gak bisa belajar semuanya, tapi lo bisa belajar untuk menjadi efektif. Saya menginvestasikan waktu disore hari. Dan selalu bertanya-tanya:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003e- Apakah hal ini mengimprove produktifitas saya?\n- Apakah hal ini mengimprove user experience dari project yang biasa saya buat?\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau jawabannya iya semua, pertimbangin buat meluangkan waktu untuk belajar lebih dalam.\u003c/p\u003e\n\u003cp\u003eKarena waktu itu terbatas dan banyak banget teknologi yang mesti saya coba. Lebih bagus lagi kalo kita bisa menemukan keseimbangan dari apa yang kita pilih agar tetap efektif.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/loiane\"\u003eLoiane Groner\u003c/a\u003e (Citibank)\u003c/p\u003e\n\u003cp\u003eDia selalu bertanya beberapa pertanyan kepada dirinya sendiri.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMasalah apa yang dipecahkan oleh teknologi?\nkita sebagai developers dibawa buat menyelesaikan masalah bukan cuma nulis ocde. \u003c/li\u003e\n\u003cli\u003eJadi masalah apa yang ingin dipecahkan sama teknologi atau framework baru ini?\u003c/li\u003e\n\u003cli\u003eApa yang membedakan dari yang sudah ada?\u003c/li\u003e\n\u003cli\u003eApakah saya butuh belajar sesuatu yang baru?\u003c/li\u003e\n\u003cli\u003eBisa kah saya mengambil manfaat dari kemamupan dan pengetahuan yang sudah ada?\u003c/li\u003e\n\u003cli\u003eBagaimana infrastructurenya? apakah ada cloud provider yang sudah support teknologi baru ini? atau infrastructure saya saat ini sudah mendukung?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDiluar dari pertanyaan diatas, lo juga harus belajar overview dari teknologinya, mungkin coba dikantor lo atau personal project buat lo latihan menggunakan teknologi baru ini.\u003c/p\u003e\n\u003cp\u003eLalu coba lihat seberapa banyak perusahaan yang menggunakan teknologi yang mau lo pelajari itu. Bikin POC, belajar semua skenario apa yang diperlukan untuk maintain project.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"habit-2-focus-on-the-fundamentals\"\u003eHabit 2: Focus on the fundamentals\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-2-focus-on-the-fundamentals\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMengtip dari Michael Jordan:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eYou can practice shooting eight hours a day, but if your technique is wrong, then all you become is very good at shooting the wrong way. Get the fundamentals down and the level of everything you do will rise.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eMemahami fundamental atau inti  dari konsep itu penting. Seperti algoritma, logic, network, accessbility, security and user experience. Memang betul, kita tidak membutuhkan semuanya ketika membuat aplikasi pertama kita, tapi mengetahui fundamental ini akan membantu kita untuk membuat aplikasi yang lebih kompleks dimasa depan.\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan-1\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-1\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eLuangkan waktu untuk research fundamental konsep dari apa yang kita kerjain sekarang. Ambil kertas dan bagi mendjadi 2 kolom. Kolom sebela kiri, tuliskan apa pengetahuan yang sudah kita pahami. Dan kolom sebelah kanan isi dengan list pengetahuan yang ingin kita pahami. Rencanakan dan dedikasikan waktu untuk mempelajari konsepnya.\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-1\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-1\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Bagaimana pendekatan anda dalam mempelajari bahasa pemrograman baru hari ini?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://uk.linkedin.com/in/lais-andrade-55981930\"\u003eLais Andrade\u003c/a\u003e (Google):\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePendekatan saya untuk belajar bahasa pemrograman baru sama seperti pendekatan belajar framework baru. Saya coba untuk mendapatkan perngertian dasar dari konsep dan mencari example dari hal lain yang menyelesaikan problem yang sama.\u003c/p\u003e\n\u003cp\u003eDan yang paling penting adalah saya coba mengerti apa pun yang saya tulis. Baca dokumentasi dan mengerti teori dibelakangnya. Saya butuh percaya diri tentang kenapa ini adalah pilihan terbaik.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/fabiomiranda\"\u003eFabio Costa\u003c/a\u003e (GoDaddy, Ex-Facebook):\u003c/p\u003e\n\u003cp\u003eSaya belajar bahasa pemrograman baru dengan mengambil salah satu dari pet project saya yang sudah ada lalu tulis ulang menggunakan bahasa pemgrograman baru itu. Opini saya ini adalah cara paling efisien untuk belajar bahasa pemrograman baru, karena saya bisa fokus 100% hanya untuk belajar bahasa pemrograman.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/weblancaster\"\u003eMichael Lancaster\u003c/a\u003e (BlackBerry):\u003c/p\u003e\n\u003cp\u003eSaya gak punya pendidikan komputer. semua berawal dari ABC (always be coding). Saya biasanya ambil tutoral dari youtube yang membuat project dan saya pilih youtuber yang membahas lebih dalam ke fundamental. Selain itu dokumentasi resmi, project unit test dan opensource project menjadi referensi saya juga.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"habit-3-teaching-private-equals-learning-private\"\u003eHabit 3: \u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eTeaching (Private)\u003c/a\u003e equals \u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003elearning (Private)\u003c/a\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-3-teaching-private-equals-learning-private\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePenulis sudah melakukan persentasi mulai dari tahun 2011, sudah 100 acara dia menjadi pembicara. Dia juga sudah pergi ke 16 negara dan 71 kota untuk presentasi. Menurut kalian ini tidak membuat saya takut ketika berbicara didepan orang banyak? hmm, seujurnya setiap saya masuk ke panggung saya tetap masih merasa takut.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eKalo lo mau belajar sesuatu, lu harus ngajajarin.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eDengan lu coba menjelaskan ke orang lain, lo bisa mengambil sesuatu yang paling penting untuk dibagikan kepada orang lain. Menuliskan apa yang sedang lo pelajarin itu membuat lo lebih dapat mengingat.\u003c/p\u003e\n\u003cp\u003eAda banyak cara untuk mengajari orang lain, bisa posting disosial media, tulis blog dan merekam screen cast. Kalo favoritnya penulis adalah dengan mejadi pembicara.\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan-2\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-2\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eTemukan acara online dan submit presentasi. Rekam pembelajaran lo dan bagikan. Bikin blog dan bagikan artikel. Pilih topik yang mau lu pelajari dan coba untuk mengajari.\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-2\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-2\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Apakah kalian pernah mengajar didepan umum? Bagaimana itu mempengaruhi hidup kalian?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://br.linkedin.com/in/ftadashi\"\u003eFernando Tadashi\u003c/a\u003e (Adobe):\u003c/p\u003e\n\u003cp\u003e Saya tidak ada habit dalam memberikan pelajaran untuk audience yang besar, tapi saya berkerja di area konsulting. Audience saya selalu membutuhkan saya mengetahui maximum dari pengetahuan teknikal saya.\n\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/loiane\"\u003eLoiane Groner\u003c/a\u003e (Citibank)\u003c/p\u003e\n\u003cp\u003eSaya menjadi pembicara, menulis beberapa buku, membuat beberapa video di youtube dan selalu diundang untuk mengajar dikelas tambahan dikampus.\u003c/p\u003e\n\u003cp\u003eUntuk mengetahui konsep atau teknologi dengan cara membuat  praktical project. Cara efektif lainnya adalah dengan menjelaskan ke orang lain. Dengan kata lain mengajar adalah cara yang hebat untuk belajar tentang spesifik topik.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003ca href=\"https://twitter.com/addyosmani\"\u003eAddy Osmani\u003c/a\u003e (Google)\u003c/p\u003e\n\u003cp\u003eBenar! Mengajari orang lain mengubah lo untuk menjadi lebih baik. Memaksa lo buat kritis dan selalu bertanya.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eApakah gw benar benar paham dengan topic ini?\u003c/li\u003e\n\u003cli\u003eBisa gak gw menjelaskan ke pemula dalam hitungan menit?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTerkadang ketika lo perlu menjelaskan sesuatu kepada orang lain, itu menantang lo buat menyederhanakan ke ide paling utama. Ini akan memaksa lo untuk terus improve pengetahuan.\u003c/p\u003e\n\u003cp\u003eMengajari orang lain membantu lo buat bertanya apakah lo beneran paham apa engga. Lo mungkin tau secara umum tapi lo tau gak lebih dalam dari topik yang paling lo minati? Apakah masuk akal buat belajar lebih jauh lagi?\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"part-three-daily-habits\"\u003ePart Three: Daily Habits\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-three-daily-habits\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"habit-4-be-boring\"\u003eHabit 4: Be Boring\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-4-be-boring\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSebenarnya programmer yang bagus itu kaya gimana sih?\u003c/p\u003e\n\u003cp\u003eNan untuk menjwab itu, kita perlu tau ada istilah permainan terbatas dan permainan tidak terbatas.\u003c/p\u003e\n\u003cp\u003ePermainan terbatas itu seperti sepak bola ada waktu dan tujuannya.\nSesangkan permainan terbatas itu seperti pernikahan tidak ada yang akan menang atau kalah yang ada adalah bagaimana mempertahankannya.\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan-3\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-3\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eApakah kamu bermain dipermainan terbatas atau tidak terbatas?\nBerapa banyak lo meluangkan waktu untuk mengejar keuntungan jangka pendek vs menginvestasikan waktu untuk hasil yang panjang.\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-3\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-3\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Coba deh pikirin tentang programmer terbaik yang pernah kerja bareng lo. Apa yang mereka lakukan terus menerus yang membuat dia bisa bagus?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eLuciano Sousa (Shopify):\u003c/p\u003e\n\u003cp\u003eSaya pikir saya belajar banyak dari orang orang yang selalu memiliki jadwal/agenda yang baik dalam hidup mereka. Mereka selalu tepat waktu, memulai dan menyelesaikan perkerjaan mereka pada yang tepat setiap hari.\u003c/p\u003e\n\u003cp\u003eOrang orang ini menunjukan kepada saya ahwa saya anya akan menang jika saya dapat mengatur hari saya dengan cerdas dan menghindari penundaan. Secara umum, mereka memiliki dampak positif dalam hidup saya. mendorong saya untuk selalu mecoba membangun pola kerja sehari hari yang sederhana dan lugas. tidak terlalu banyak dan tidak terlalu sedikit.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBerg Brandt (Amazon, Ex-Yahoo):\u003c/p\u003e\n\u003cp\u003eYang paling saya hargai adalah integritas tinggi. Integritas tinggi memanifestasikan dirinya dalam berbagai bentuk dan programmer terbaik yang pernah berkerja dengan saya telah menunjukan integritas yang dingi dalam beberapa cara. Yang paling dasar adaalah fokus pada melakukan hal yang benar dan untuk alasan yang benar.\u003c/p\u003e\n\u003cp\u003eProgrammer berintergitas tinggi memperhatikan hasil dan mengapa itu penting. Sementara mereka akan berlajir jika perlu,, mereka secara konsisten tanpa henti berbari menuju tuuan.\nMereka aalah orang orang yang secara proaktif akan memanggil jika ada sesuatu yang salah atau memanggil anda jika renaca atau arahan anda perlu penyesuaaian.\u003c/p\u003e\n\u003cp\u003emerekalah yang mengerjakan proyek yang tidak begitu glamor hanya karena penting unuk diselesaikan. Terakhir, mereka adalah orang orang yang akana berada disampng anda membantu menemukan solusi ketika dalam keadaan buruk.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eCaio Gondim (New York Times):\u003c/p\u003e\n\u003cp\u003eMenurut saya programmer terbaik adalah yang dapat diandalkan (reliable). lo gak bisa konsisten kalo gak reliable. mereka tau bahwa tidak layak berkerja sepanjang malam dan keesokan harinya tidak bisa befikir jernih.\u003c/p\u003e\n\u003cp\u003emereka tau bahwa sangat penting untuk bersenang senang dan makan dengan baik. mereka tidak memberikan estimasi dalam kondisi sempurna, karena mereka tau sangat jarang mendapatkan satu hari penuh tanpa gangguan. mereka tau bahwa akan ada meeting, sesuatu pada production dan membantu orang lain dalam membaca source code.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eBlake Williams (GitHub):\u003c/p\u003e\n\u003cp\u003eSaya melihat sebuah polah yang saya anggap sebagai programmer terbaik, semuanya disiplin. Mereka selalu punya waktu menulis kode yang baus, menambahkan cakupan pengujuan yang komperhensif dan menjelaskan detail seluk beluk melalui pesan commit message yang terperinci.\u003c/p\u003e\n\u003cp\u003eprogrammer yang disiplin ini tidak berkerja sepanjang malam dan stres pada delivery fitur berikutnya. Mereka menginvestasikan waktu dalam melakukan sesuatu yang baik dan berkomunikasi dengan jelas. Disiplin itu membantu orang lain dalam tim merasa tidak terburu buru dan memungkinkan mereka menginvestasikan waktu untuk meningkatkan ppekeraan mereka yang sudah ada dari pada pindah ke tugas berikutnya. Pada akhirnya mereka menghemat waktu mereka dan tim mereka dengan memperlambat mengambil pendekatan pragmatis untuk pemecahan masalah.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"habit-5-do-it-for-your-future-self\"\u003eHabit 5: Do It For Your Future Self\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-5-do-it-for-your-future-self\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJangan menjadi sok pintar, jangan mencoba membuat kode yang membuat lo merasa lebih pintar. Lo gak perlu pamer trik baru  yang baru aja lo pelajari. cukup dengan menulis kode yang dapat dibaca. Pikirin tentang maintainabilityu dan gunakan nama yang bermakna untuk variable dan function lo. Tanyakan pada diri sendiri: Apakah dimasa depan saya akan paham kode maksud dari kode ini?\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan-4\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-4\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eBuka project yang sedang lo kerjakan. Apakah ada refactoring yang bisa lo lakukan untuk membuat kehidupan dimasa depan jadi lebih mudah?\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-4\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-4\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Hal-hal apa yang lo lakukan dihari ini untuk membantu lo dimasa depan?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eSilvio Gustavo (Spotify):\u003c/p\u003e\n\u003cp\u003eSaya mencoba berempati dengan siapapun yang dapat menyentuh kode itu dimasa depan, termasuk diri saya dimasa depan. Apakah kode ini dapt dibaca oleh siapa pun dengan tingkat pengalaman apapun? Dengan pemikiran itu saya menargetkan.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eTulis kode sederhana dengan nama variabel/method/class yang bermakna. Jangan berasumsi bahwa orang lain (termasuk lo) akan memahami nama pendek yang tidak berarti banyak.\u003c/li\u003e\n\u003cli\u003ePunya automated testuang baik, ini akan memberikan dokumentasi tambahan tentang kode anda dan juga membantu siapa saja yang perlu menyentuh kode itu dimasa depan.\u003c/li\u003e\n\u003cli\u003eGunakan version control sebagai dokumentasi. Ketika proyek berkembang, perubahan dan pebaikan bug dilakukan setiap saat. Dimasa depan ketika itu menjadi legacy code tidak ada yang bisa memahamu keputusan dan perubahan yang dibuat saat itu jika tidak didokumentasikan.\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eLais Andrade (Google):\u003c/p\u003e\n\u003cp\u003eSalah satu hal terbaik untuk menjaga basis kode dimasa depan adalah memiliki standar yang baik untuk praktik terbaik dan ini haru diikuti oleh tim. \u003c/p\u003e\n\u003cp\u003e early optimization is the root of all evil. Sangat mudah menulis satu baris tanpa komentar, tapi nanti akan sulit untuk mendebug kode itu dalam waktu beberapa minggu, bulan atau tahun.\nPeer review juga sangat penting.\u003c/p\u003e\n\u003cp\u003e Test semua kode yang lo tulis. Unit test,integration, performace/benchmark test. semuanya. Bikin aturan semuakode harus ada testnya.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"habit-6-your-9-to-5-is-not-enough\"\u003eHabit 6: Your 9-to-5 Is Not Enough\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-6-your-9-to-5-is-not-enough\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003emenurut penulis jam 9  ke 5 ini gak cukup untuk untuk berkari didunia teknologi.\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan-5\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-5\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003ePikirkan tentang keterampilan yang menurut lo dapat ditingkatkan. Bisakah lo merencanakan waktu ekstra untuk mengembangkannya? 10 menit sehari juga tidak apa apa itu juga bisa membuat pebedaan.\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-5\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-5\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Bagaimana lo menghabiskan waktu luang? Bagaimana lo menyeimbangkan personal dan perkerjaan?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eSilvio Gustavo (Spotify):\u003c/p\u003e\n\u003cp\u003eSaya dulu menghabiskan waktu dengan menyelam lebih dalam pada internal android , best practice dan arsitektur code. ini sudah seperti hobi buat saya.\u003c/p\u003e\n\u003cp\u003ePada titik tertentu, meskipun saya suka, tapi terkadan merasa tsres ketika menggabungkannya dengan pekerjaan 9-5. saya kemudian memutuskan untuk memperlambat dan menggunakan waktu luang saya untuk melakukan lebih banyak ha; seperti main game dan mempelajari hobi baru dan berolahraga. Saya memili keseimbangan kehidupan kerja yang jauh lebih baik saat ini.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFernando Tadashi (Adobe):\u003c/p\u003e\n\u003cp\u003eSaya mendedikasikan waktu saya untuk tau teknologi baru dan yang masih digunakan. terkadang saya belajar lebih dalam.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFabio Costa (GoDaddy, Ex-Facebook):\u003c/p\u003e\n\u003cp\u003ePada akhir pekan saya cenderung lebih banyak bekumpul dengan keluarga dan teman teman atau mengerjakan pet project.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"part-four-career-habits\"\u003ePart Four: Career Habits\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-four-career-habits\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"habit-7-master-the-dark-side\"\u003eHabit 7: Master The Dark Side\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-7-master-the-dark-side\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJaman dulu belajar bahasa pemrograman itu cuma ada di universitas yang bagus bagus saja. saat ini suah berbeda tidak perlu ke universitas sudah banyak bootcamp , tutorial dan kurus menjadi programmer.\u003c/p\u003e\n\u003cp\u003ePada dasarnya programmer adalah penerjemah, tugas kita adalah menerjemahkan kebutuhan pengguna kedalam fungsi. Biasanya kebutuhan itu akan dibuat oleh BA (bisnis analis). Pada awalnya saya merasa orang bisnis itu seperti orang jahat tidak peduli dengan kualitas kode saya, tapi pada akhirnya saya menyadari ssi bisnis dapat membatu saya dalam aktifitas sehari hari.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eHemat Waktu: Semakin lo paham bisnis, semakin mampu lo untuk memecahkan masalah itu sendir. \u003c/li\u003e\n\u003cli\u003eMencegah kode yang rumit: Kita selalu ingin membuat kode yang abstrak, fleksibel dapat diextend dan dapat digunakan kembali. Kita sangat ingin seperti itu hingga kita membuat aplikasi yang terlalu rumit.\u003c/li\u003e\n\u003cli\u003ePrioritas yang lebih baik: Dengan pengethuan bisnis akan lebih mudah untuk memprioritaskan keputusan mikro. Lo bisa mengantisipasi mana bagian yang lebih penting.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eRekomendasi saya adalah mulai dengan kosakata atau vocabulary. Perhatikan kata dan istilah kusus yang digunakan oleh para pebisnis. Jika lo meniru terminologi yang sama komunikasi dengan mereka akan jauh lebih baik.\u003c/p\u003e\n\u003cp\u003eIngat, orang yang tau cara membuat kode iti kuat, orang yang tau membuat kode dan tau cari kejar bisnis tidak dapat dihentikan.\u003c/p\u003e\n\u003ch4 id=\"yang-harus-dilakukan-6\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-6\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eElaborasi daftar istilah yang paling umum digunakan dalam industri lo. Mulailah percakapan dengan teman kerja lo untuk memahami bidang mereka. Misalnya, Sales funnel itu seperti apa? Market yang niche apa yang sedang ditargetkan? Apa pertannyaan paling umum untuk customer suport? bagaimana produk kita berbeda dengan produk kompetitor?\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-6\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-6\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eQ: Apakah kalian mencoba untuk mengerti dari sisi bisnis sebelum programming sesuatu?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eMichael Lancaster (BlackBerry):\u003c/p\u003e\n\u003cp\u003eTergantung pada kerumitan pekeraan dan waktu. Karena kadang kita juga bisa menyelesaikan pekerjaan tanpa tau bisnis sama sekali.\u003c/p\u003e\n\u003cp\u003eKarena itu, semakin banyak kami tau tentangbinis ini, semakin berharga kami bagi tim karena itu memungkinkan kami untuk menggunakan pengetahuan teknnis dan bisnis kami untuk memberikan kontribusi lebih besar.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"habit-8-side-projects-private\"\u003eHabit 8: \u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eSide Projects (Private)\u003c/a\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-8-side-projects-private\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePasti kalian sudah tau kalo twitter, craiglist dan slack dimulai sebagai side project. ya side project, yang bisa sebesar sekarang. Side project dapat membantu kita mengembangkan portofolio lo, membuat resume, memamerkan keahlian lo. \u003c/p\u003e\n\u003cp\u003eKalo lo udah mapan dalam karir lo, side project bisa sangat berguna. memungkinkan lo untuk mengalami dan mempelajari keterampilan baru yang mungkin gak ada dikerjaan lo. Juga gak ada tekanan, jadwal atau spesifikasi yang dipaksakan oleh  siapapun, yang artinya  lo bisa menggunakan semua kreativitas lo dan bersenang senang melakukannya.\u003c/p\u003e\n\u003cp\u003eLangkah apa yang selanjutnya? Ide apa yang layak dikerjakan?\u003c/p\u003e\n\u003cp\u003eIni adalah daftar pertanyaan yang biasanya gw tanyakan ke dirisendiri sebelum memulai project sampingan baru.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eSide project berarti lo harus mengorbankan waktu pribadi untuk mengerjakan project itu. Pertanyaannya:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eApakah saya benar benar menikmati subject, bidang pada jenis pekerjaan ini?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJika jawabannya \u003cstrong\u003etidak\u003c/strong\u003e, ya gak usah, kalau dikerjakan pun gak dapet apa apa dan biasanya terbengkalai.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eButuh waktu untuk side project untuk mendapkatkan traction, pertanyaannya:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eApakah saya bersedia setidaknya 5 tahun untuk mengerjakan ide ini?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eKalau jawabannya \u003cstrong\u003etidak\u003c/strong\u003e, kemungkinan besar anda akan kehilangan motivasi dan akan menyerah pada proyek inisebelum dimulai. namun, jika tujuan lo hanya untuk bereksperimen ya gak perlu khawatir.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMemiliki ide adalah sau hal, memiliki kemampuan untuk mengeksekusi ide itu sama sekali berbeda, jadi lo harus tanya ke diri sendiri. \u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBisakah saya menjalankan ide ini sendirian?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eKalau jawabannya \u003cstrong\u003etidak\u003c/strong\u003e, lo perlu mempertimbangkan untuk mempelajari keterampilan baru atau mengundang seorang teman untuk mengisi kekosongan tersebut.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMengatakan \u003cstrong\u003eYa\u003c/strong\u003e untuk satu ide berarti mengatakan tidak untuk banyak ide lain. Jadi tanyakan sama diri lo\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eApakah ide ini lebih baik dari ide lain?\nApakah ada ide lain yang dapat menggunakan waktu saya dengan baik?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eKalau jawabannya \u003cstrong\u003etidak\u003c/strong\u003e,  ulangi siklus ini untuk ide yang lain.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMemahamu untuk siapa lo membangun solusi ini, Jika lo gak kenal audiens lo kemungkinan besar lo gak akan memahami kebutuhan mereka. jadi tanyakan pada diri lo:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eApakah saya secara pribadi mengalami hal ini atau saya memecahkannya untuk orang lain?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eKalau jawabannya \u003cstrong\u003etidak\u003c/strong\u003e,  maka pertimbangkan untuk menjangkau orang orang yang benar benar mengalami rasa sakit yang coba anda selesaikan.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eDan pertanyaan terakhir adalah \u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eMengapa saya senang dengan ide ini sekarang?\nApakah lo pengen mempelajari teknologi baru?\nApakah lo ingin menghasilkan lebih banyak uang?\nApakah lo membutuhkan pengalian dari masalah lain?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJujur pada diri sendiri. Hal yang lebih penting dari memilih ide adalah memilih scope dari project lo.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch4 id=\"yang-harus-dilakukan-7\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-7\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eSelama beberapa hari kedepan perhatikan aplikasi yang sering lo gunakan. Apakah yang kurang dari mereka? Apakah lo dapat membuat versi lebih baik dari itu\u003c/p\u003e\n\u003ch4 id=\"pertanyaan--jawaban-7\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-7\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch3 id=\"habit-9-mario-or-sonic\"\u003eHabit 9: Mario or Sonic?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-9-mario-or-sonic\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003ch4 id=\"yang-harus-dilakukan-8\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-8\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch4 id=\"pertanyaan--jawaban-8\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-8\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch2 id=\"part-five-team-habits\"\u003ePart Five: Team Habits\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-five-team-habits\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"habit-10-active-listening\"\u003eHabit 10: Active Listening\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-10-active-listening\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003ch4 id=\"yang-harus-dilakukan-9\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-9\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch4 id=\"pertanyaan--jawaban-9\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-9\"\u003e\u003c/a\u00 e\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-12\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch3 id=\"habit-14-stop-waiting\"\u003eHabit 14: Stop Waiting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habit-14-stop-waiting\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003ch4 id=\"yang-harus-dilakukan-13\"\u003eYang harus dilakukan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-harus-dilakukan-13\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch4 id=\"pertanyaan--jawaban-13\"\u003ePertanyaan \u0026#x26; Jawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan--jawaban-13\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003ch2 id=\"part-seven-the-end\"\u003ePart Seven: The End\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#part-seven-the-end\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #2c6fbb;\" href=\"/sotoy/notes/tags.self-improvement\"\u003eSelf Improvement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #089404;\" href=\"/sotoy/notes/tags.zeno-rocha\"\u003eZeno Rocha\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"pri
