34,"offset":1905},"end":{"line":24,"column":111,"offset":1982},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"til.managing-team.youtube.the-most-powerful-way-to-think-first-principles"}},{"from":{"fname":"daily.journal.2023.04.27","id":"m79fi9nn8b57mxo5o3tjdc1","vaultName":"vault-private"},"type":"backlink","position":{"start":{"line":8,"column":11,"offset":68},"end":{"line":8,"column":32,"offset":89},"indent":[]},"value":"til.managing-team"}],"anchors":{},"children":["til.managing-team.belajar-coaching","til.managing-team.oreily","til.managing-team.preparing-performance-review","til.managing-team.quantified-self","til.managing-team.youtube"],"parent":"til","data":{}},"body":"\u003ch1 id=\"managing-team\"\u003eManaging Team\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#managing-team\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eMalem ini gw kembali melek karena ada diskusi menarik dari thread hrd bacot tentang managing teams.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230426232639.png\" alt=\"screenshot twitter\"\u003e\u003c/p\u003e\n\u003cp\u003eLinknya \u003ca href=\"https://twitter.com/hrdbacot/status/1651163534863261698?t=14CJyK-bxEFLYz8Q0rWbqA\u0026#x26;s=19\"\u003edisini\u003c/a\u003e, yang dimana kebetulan gw juga lagi pelajarin banget cara manage team. Ada beberapa tweet yang menurut gw menarik dan bisa gw kulik lebih dalam. Reply tweet yang pertama gw baca itu \u003ca href=\"https://twitter.com/JetVeetlev/status/1651247102054531073\"\u003eini\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230426233852.png\" alt=\"tweet 1\"\u003e\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eKasih arahan yg jelas mau lo apa. Ceritain thought process lo.\u003c/li\u003e\n\u003cli\u003eDelegasi kerjaan.\u003c/li\u003e\n\u003cli\u003eCek periodically utk update or kendala.\u003c/li\u003e\n\u003cli\u003eJangan micromanage.\u003c/li\u003e\n\u003cli\u003eNgobrol bukan menggurui.\u003c/li\u003e\n\u003cli\u003eSaying Thank you, please and sorry goes very long way.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eIni poin poin yang menurut gw actionable dan cukup jelas. Yang pertama adalah lo harus bisa memberikan arahan yang jelas, apa yang lo mau capai dengan team lo dan lo harus bisa ceritain cara berpikir lo. hasil penelusuran sederhana dengan mencari video youtube dengan kata kunci \"thought process\" gw bisa dapet beberapa masukan yang bagus dan actionable.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=rrOnk0JnXW4\"\u003ehttps://www.youtube.com/watch?v=rrOnk0JnXW4\u003c/a\u003e\n\u003cul\u003e\n\u003cli\u003evideo ini berisi talks dari alan alda, beliau adalah pakar komunikasi yang sebenarnya dia tidak suka dengan istilah memberikan tips, dan dia menyaranan kalau jangan pernah ambil \"pro tips\" dari siapa pun. gak ada yang namanya hacks atau jalan pintas semua butuh proses\u003c/li\u003e\n\u003cli\u003egw bahas lebih detail disini \u003ca href=\"/sotoy/notes/til.managing-team.youtube.3-ways-to-express-your-thoughts-so-that-everyone-will-understand-you\"\u003e3 Ways to Express Your Thoughts so That Everyone Will Understand You\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=HZRDUZuIKg4\"\u003ehttps://www.youtube.com/watch?v=HZRDUZuIKg4\u003c/a\u003e\n\u003cul\u003e\n\u003cli\u003epoint pentingnya adalah cara berpikir dari first principles thinker atau pemikir prinsip-prinsip dasar yang mencari kebenaran dari suatu konsep atau ide dengan memulai dari fundamental terkecil yang dapat dikonseptualisasikan.\u003c/li\u003e\n\u003cli\u003egw bahas lebih detail disini \u003ca href=\"/sotoy/notes/til.managing-team.youtube.the-most-powerful-way-to-think-first-principles\"\u003eThe Most Powerful Way to Think First Principles\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDari sini jadi terbuka apa yang selanjutnya harus gw pelajari, ini relate dengan critical thinking, sesuatu yang mau gw pahami dan memiliki pemikiran yang kritis. gw tulis beberapa reading list yang harus gw baca dan nanti gw buat summarynya.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://blog.pragmaticengineer.com/critical-thinking/\"\u003ehttps://blog.pragmaticengineer.com/critical-thinking/\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/library/view/hbr-guide-to/9781647824471/\"\u003ehttps://learning.oreilly.com/library/view/hbr-guide-to/9781647824471/\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/videos/-/9781492028383/\"\u003ehttps://learning.oreilly.com/videos/-/9781492028383/\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/live-events/introduction-to-critical-thinking/0636920118909/\"\u003ehttps://learning.oreilly.com/live-events/introduction-to-critical-thinking/0636920118909/\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/library/view/critical-thinking-skills/9781118924730/05_9781118924723-ch01.xhtml\"\u003ehttps://learning.oreilly.com/library/view/critical-thinking-skills/9781118924730/05_9781118924723-ch01.xhtml\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://learning.oreilly.com/library/view/the-lost-art/53863MIT57409/\"\u003ehttps://learning.oreilly.com/library/view/the-lost-art/53863MIT57409/\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.criticalthinkingatwork.com/2-chapters.html\"\u003ehttps://www.criticalthinkingatwork.com/2-chapters.html\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.indeed.com/career-advice/career-development/importance-of-critical-thinking\"\u003ehttps://www.indeed.com/career-advice/career-development/importance-of-critical-thinking\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cstrong\u003
