784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8z"></path></svg></span></div></div></header><div class="ant-layout css-mncuj7" style="margin-top:64px;display:flex;flex-direction:row;width:100%;max-width:1200px;margin:0 auto"><div class="site-layout-sidebar" style="flex:0 0 auto;width:200px;min-width:200px"><aside class="ant-layout-sider ant-layout-sider-dark css-mncuj7" style="position:fixed;top:64px;overflow:auto;height:calc(100vh - 64px);background-color:transparent;flex:0 0 200px;max-width:200px;min-width:200px;width:200px"><div class="ant-layout-sider-children"></div></aside></div><main class="ant-layout-content side-layout-main css-mncuj7" style="flex:1;min-width:0;display:block"><div style="padding:48px 24px 0;max-width:1200px;margin:0 auto"><div class="main-content" role="main"></div></div><div class="ant-divider css-mncuj7 ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer css-mncuj7" style="padding:0 24px 24px"></footer></main></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"note":{"id":"til.coding.two-sum-ii","title":"Two Sum II - Input Array Is Sorted","desc":"","updated":1742443122881,"created":1742345168688,"custom":{},"fname":"til.coding.two-sum-ii","type":"note","vault":{"fsPath":"vault"},"contentHash":"1ed5c253795fe13a0e257b76bbec6d59","links":[{"type":"wiki","from":{"fname":"til.coding.two-sum-ii","id":"til.coding.two-sum-ii","vaultName":"vault"},"value":"til.coding.two-sum","position":{"start":{"line":47,"column":28,"offset":1400},"end":{"line":47,"column":50,"offset":1422},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"til.coding.two-sum"}}],"anchors":{"solusi":{"type":"header","text":"Solusi","value":"solusi","line":51,"column":0,"depth":2},"maps":{"type":"header","text":"Maps","value":"maps","line":55,"column":0,"depth":3},"two-pointer":{"type":"header","text":"Two Pointer","value":"two-pointer","line":69,"column":0,"depth":3},"dry-run":{"type":"header","text":"Dry Run","value":"dry-run","line":92,"column":0,"depth":3}},"children":["til.coding.two-sum-ii.code"],"parent":"til.coding","data":{}},"body":"\u003ch1 id=\"two-sum-ii---input-array-is-sorted\"\u003eTwo Sum II - Input Array Is Sorted\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#two-sum-ii---input-array-is-sorted\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eLink: \u003ca href=\"https://leetcode.com/problems/two-sum-ii-input-array-is-sorted/description/\"\u003ehttps://leetcode.com/problems/two-sum-ii-input-array-is-sorted/description/\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eGiven a 1-indexed array of integers numbers that is \u003cstrong\u003ealready sorted in non-decreasing order\u003c/strong\u003e, find two numbers such that they add up to a specific target number. Let these two numbers be \u003ccode\u003enumbers[index1]\u003c/code\u003e and \u003ccode\u003enumbers[index2]\u003c/code\u003ewhere \u003ccode\u003e1 \u0026#x3C;= index1 \u0026#x3C; index2 \u0026#x3C;= numbers.length\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eReturn the indices of the two numbers, \u003ccode\u003eindex1\u003c/code\u003e and \u003ccode\u003eindex2\u003c/code\u003e, \u003cstrong\u003eadded by one\u003c/strong\u003e as an integer array \u003ccode\u003e[index1, index2]\u003c/code\u003e of length 2.\u003c/p\u003e\n\u003cp\u003eThe tests are generated such that there is \u003cem\u003eexactly one solution\u003c/em\u003e. You may not use the same element twice.\u003c/p\u003e\n\u003cp\u003eYour solution must use only constant extra space.\u003c/p\u003e\n\u003cp\u003eExample 1:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eInput: numbers = [2,7,11,15], target = 9\nOutput: [1,2]\nExplanation: The sum of 2 and 7 is 9. Therefore, index1 = 1, index2 = 2. We return [1, 2].\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eExample 2:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eInput: numbers = [2,3,4], target = 6\nOutput: [1,3]\nExplanation: The sum of 2 and 4 is 6. Therefore index1 = 1, index2 = 3. We return [1, 3].\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eExample 3:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eInput: numbers = [-1,0], target = -1\nOutput: [1,2]\nExplanation: The sum of -1 and 0 is -1. Therefore index1 = 1, index2 = 2. We return [1, 2].\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eConstraints:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e2 \u0026#x3C;= numbers.length \u0026#x3C;= 3 * 104\u003c/li\u003e\n\u003cli\u003e-1000 \u0026#x3C;= numbers[i] \u0026#x3C;= 1000\u003c/li\u003e\n\u003cli\u003enumbers is sorted in non-decreasing order.\u003c/li\u003e\n\u003cli\u003e-1000 \u0026#x3C;= target \u0026#x3C;= 1000\u003c/li\u003e\n\u003cli\u003eThe tests are generated such that there is exactly one solution.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"solusi\"\u003eSolusi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#solusi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eCaranya masih sama seperti \u003ca href=\"/sotoy/notes/til.coding.two-sum\"\u003eTwo Sum\u003c/a\u003e, tapi di deskripsi ada tambahan \u003ccode\u003eadded by one as an integer array [index1, index2] of length 2.\u003c/code\u003e Jadi pada sat return kita tambahin 1. Langsung aja ke solusi maps ya, karen sama. Jadi gini:\u003c/p\u003e\n\u003ch3 id=\"maps\"\u003eMaps\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#maps\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eGolang punya hash table. Jadi bisa juga dimanfaatkan untuk menyimpan hasil dari pengurangan. logikanya\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ebikin variable hash\u003c/li\u003e\n\u003cli\u003elooping nums [2,7,11,15]\u003c/li\u003e\n\u003cli\u003eiterasi 1: x = 0, nums[x] = 2, check apakah target - nums[x] ada didalam hash atau tidak\u003c/li\u003e\n\u003cli\u003etidak ada, masukan \"nums[x], x\" kedalam hash map, jadi [2,0]\u003c/li\u003e\n\u003cli\u003eiterasi 2: x = 1,nums[x] = 7, check apakah target - nums[x] ada didalam hash atau tidak\u003c/li\u003e\n\u003cli\u003eada, target - 7 = 2. value dari 2 adalah 0\u003c/li\u003e\n\u003cli\u003ereturn value dari hash map yaitu 0, dan x yaitu 1, jadi []int{0+1,1+1}\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eHasilnya \u003ca href=\"https://leetcode.com/problems/two-sum-ii-input-array-is-sorted/submissions/1578506826/\"\u003eesekusinya\u003c/a\u003e. Runtime 0ms dan Memory 8.09 MB. Dicoba esekusi dengan \u003ca href=\"https://leetcode.com/problems/two-sum-ii-input-array-is-sorted/submissions/1578513843/\"\u003ebrute force\u003c/a\u003e, Runtime 312ms dan Memory 7.82 MB. \u003c/p\u003e\n\u003ch3 id=\"two-pointer\"\u003eTwo Pointer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#two-pointer\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKarena di deskripsi ada clue \u003cstrong\u003ealready sorted in non-decreasing order\u003c/strong\u003e, Ada teknik lain yang bisa digunakan, yaitu two pointer. Ini bisa menurunkan memory.\u003c/p\u003e\n\u003cp\u003eDengan menggunakan 2 pointer, lo bisa menggerakan kedua index, index dari kiri dan dari kanan. \u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003eIndex:  \u003cspan class=\"token number\"\u003e0\u003c/span\u003e   \u003cspan class=\"token number\"\u003e1\u003c/span\u003e   \u003cspan class=\"token number\"\u003e2\u003c/span\u003e   \u003cspan class=\"token number\"\u003e3\u003c/span\u003e\n        ┌───┬───┬───┬───┐\nnums \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e  │ \u003cspan class=\"token number\"\u003e1\u003c/span\u003e │ \u003cspan class=\"token number\"\u003e5\u003c/span\u003e │ \u003cspan class=\"token number\"\u003e5\u003c/span\u003e │ \u003cspan class=\"token number\"\u003e7\u003c/span\u003e │\n        └───┴───┴───┴───┘\n         ↑           ↑\n        left        right\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eSoal two sum cocok menggunakan solusi ini. Tapi check array apakah sudah terurut atau belum kalau belum \u003ccode\u003esort\u003c/code\u003e dulu aja. Logikannya gini:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eInisiasi two pointer, \u003ccode\u003eleft = 1\u003c/code\u003e, \u003ccode\u003eright = len(nums)-1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLook sampai \u003ccode\u003eleft \u0026#x3C; right\u003c/code\u003e. Jika kondisi sudah sampai sini, artinya semua kemungkinan sudah di check.\n\u003col\u003e\n\u003cli\u003eJika kondisi \u003ccode\u003esum == target\u003c/code\u003e, Maka ini jawaban yang kita akan return\u003c/li\u003e\n\u003cli\u003eJika kondisi \u003ccode\u003esum \u0026#x3C; target\u003c/code\u003e, Maka kita perlu angka yang lebih besar, jadi kita geser yang kiri \u003ccode\u003eleft++\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eJika kondisi \u003ccode\u003esum \u003e target\u003c/code\u003e, Maka kira perlu angka yang lebih kecil, jadi kita geser yang kanan \u003ccode\u003eright--\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"dry-run\"\u003eDry Run\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#dry-run\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003enums = [2, 7, 11, 15]\ntarget = 9\u003c/p\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eIteration\u003c/th\u003e\u003cth\u003eleft\u003c/th\u003e\u003cth\u003eright\u003c/th\u003e\u003cth\u003enums[left]\u003c/th\u003e\u003cth\u003enums[right]\u003c/th\u003e\u003cth\u003esum\u003c/th\u003e\u003cth\u003ePergeseran\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e1\u003c/td\u003e\u003ctd\u003e0\u003c/td\u003e\u003ctd\u003e3\u003c/td\u003e\u003ctd\u003e2\u003c/td\u003e\u003ctd\u003e15\u003c/td\u003e\u003ctd\u003e17\u003c/td\u003e\u003ctd\u003e17 \u003e 9, geser kanan\u003c/td\u003e\u003c/tr\u003e\u003ctr\u0
