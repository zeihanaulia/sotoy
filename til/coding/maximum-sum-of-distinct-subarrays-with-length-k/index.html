ps":{"note":{"id":"til.coding.maximum-sum-of-distinct-subarrays-with-length-k","title":"Maximum Sum of Distinct Subarrays with Length K","desc":"","updated":1742788580503,"created":1742443701789,"custom":{},"fname":"til.coding.maximum-sum-of-distinct-subarrays-with-length-k","type":"note","vault":{"fsPath":"vault"},"contentHash":"946a381aa42fcdaf956a87bbab7aa96b","links":[],"anchors":{"memahami-soal":{"type":"header","text":"Memahami soal","value":"memahami-soal","line":44,"column":0,"depth":2},"1-constraints":{"type":"header","text":"1. Constraints","value":"1-constraints","line":46,"column":0,"depth":3},"2-memahami-clue":{"type":"header","text":"2. Memahami clue","value":"2-memahami-clue","line":53,"column":0,"depth":3},"3-melihat-example":{"type":"header","text":"3. Melihat Example","value":"3-melihat-example","line":61,"column":0,"depth":3},"solusi":{"type":"header","text":"Solusi","value":"solusi","line":92,"column":0,"depth":2},"brute-force":{"type":"header","text":"Brute Force","value":"brute-force","line":94,"column":0,"depth":3},"sliding-window":{"type":"header","text":"Sliding Window","value":"sliding-window","line":109,"column":0,"depth":3},"^5":{"type":"block","value":"5","line":42,"column":20}},"children":["til.coding.maximum-sum-of-distinct-subarrays-with-length-k.Coding"],"parent":"til.coding","data":{}},"body":"\u003ch1 id=\"maximum-sum-of-distinct-subarrays-with-length-k\"\u003eMaximum Sum of Distinct Subarrays with Length K\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#maximum-sum-of-distinct-subarrays-with-length-k\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eYou are given an integer array nums and an integer k. Find the maximum subarray sum of all the subarrays of nums that meet the following conditions:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe length of the subarray is k, and\u003c/li\u003e\n\u003cli\u003eAll the elements of the subarray are \u003cstrong\u003edistinct\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eReturn the maximum subarray sum of all the subarrays that meet the conditions. If no subarray meets the conditions, return 0.\u003c/p\u003e\n\u003cp\u003eA \u003cstrong\u003esubarray\u003c/strong\u003e is a contiguous non-empty sequence of elements within an array.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eExample 1:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eInput: nums = [1,5,4,2,9,9,9], k = 3\nOutput: 15\nExplanation: The subarrays of nums with length 3 are:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e[1,5,4] which meets the requirements and has a sum of 10.\u003c/li\u003e\n\u003cli\u003e[5,4,2] which meets the requirements and has a sum of 11.\u003c/li\u003e\n\u003cli\u003e[4,2,9] which meets the requirements and has a sum of 15.\u003c/li\u003e\n\u003cli\u003e[2,9,9] which does not meet the requirements because the element 9 is repeated.\u003c/li\u003e\n\u003cli\u003e[9,9,9] which does not meet the requirements because the element 9 is repeated.\nWe return 15 because it is the maximum subarray sum of all the subarrays that meet the conditions\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eExample 2:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eInput: nums = [4,4,4], k = 3\nOutput: 0\nExplanation: The subarrays of nums with length 3 are:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e[4,4,4] which does not meet the requirements because the element 4 is repeated.\nWe return 0 because no subarrays meet the conditions.\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eConstraints:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca aria-hidden=\"true\" class=\"block-anchor anchor-heading icon-link\" id=\"^5\" href=\"#^5\"\u003e\u003c/a\u003e1 \u0026#x3C;= k \u0026#x3C;= nums.length \u0026#x3C;= 10\u003c/li\u003e\n\u003cli\u003e\u003ca aria-hidden=\"true\" class=\"block-anchor anchor-heading icon-link\" id=\"^5\" href=\"#^5\"\u003e\u003c/a\u003e1 \u0026#x3C;= nums[i] \u0026#x3C;= 10\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"memahami-soal\"\u003eMemahami soal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#memahami-soal\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-constraints\"\u003e1. Constraints\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-constraints\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e1 \u0026#x3C;= k \u0026#x3C;= nums.length \u0026#x3C;= 10^5\u003c/code\u003e isi dari \u003ccode\u003ek\u003c/code\u003e dari 1 - 100k\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e1 \u0026#x3C;= nums[i] \u0026#x3C;= 10^5\u003c/code\u003e jumlah nums bisa sampai 100k\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTidak ada problem yang signifikan. Bisa mulai dari brute force.\u003c/p\u003e\n\u003ch3 id=\"2-memahami-clue\"\u003e2. Memahami clue\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-memahami-clue\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esum of all the subarrays of nums\u003c/code\u003e Jumlahkan array \u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eThe length of the subarray is k\u003c/code\u003e berdasarkan \u003ccode\u003ek\u003c/code\u003e \u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAll the elements of the subarray are distinct.\u003c/code\u003e Semua element adalah distinct, jadi tidak ada angka yang duplicate. Artinya perlu dibersihkan dulu atau perlu di check apakah dari sub array ada angka yang sama atau tidak.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eReturn the maximum subarray sum of all the subarrays that meet the conditions\u003c/code\u003e cari maksimal sum dari subarray tersebut.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eA subarray is a contiguous non-empty sequence of elements within an array.\u003c/code\u003e subarray tidak boleh kosong dan harus berurutan, urutannya harus sama kaya aslinya\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-melihat-example\"\u003e3. Melihat Example\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-melihat-example\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e1. Example 1:\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eInput: nums = [1,5,4,2,9,9,9], k = 3\u003c/p\u003e\n\u003cp\u003eOutput: 15\u003c/p\u003e\n\u003cp\u003eExplanation: The subarrays of nums with length 3 are:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e[1,5,4] which meets the requirements and has a sum of 10.\u003c/li\u003e\n\u003cli\u003e[5,4,2] which meets the requirements and has a sum of 11.\u003c/li\u003e\n\u003cli\u003e[4,2,9] which meets the requirements and has a sum of 15.\u003c/li\u003e\n\u003cli\u003e[2,9,9] which does not meet the requirements because the element 9 is repeated.\u003c/li\u003e\n\u003cli\u003e[9,9,9] which does not meet the requirements because the element 9 is repeated.\nWe return 15 because it is the maximum subarray sum of all the subarrays that meet the conditions\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eDari example 1,kita bisa lihat array yang mau dijumlahkan adalah 3, maka pecah dari array dan ambil per 3 element. Sampai disini kepikiran buat di slice, kaya gini misalnya \u003ccode\u003earr[1:3]\u003c/code\u003e.\nDi pecah menjadi 3 sub array, lalu cek apakah dalam array ada nomor yang sama atau tidak.\nJika ada maka skip.\u003c/p\u003e\n\u003cp\u003eExample 2:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eInput: nums = [4,4,4], k = 3\nOutput: 0\nExplanation: The subarrays of nums with length 3 are:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e[4,4,4] which does not meet the requirements because the element 4 is repeated.\nWe return 0 because no subarrays meet the conditions.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eDari sini kita bisa tau, kalau ada angka yang sama langsung return 0 aja.\u003c/p\u003e\n\u003ch2 id=\"solusi\"\u003eSolusi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#solusi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"brute-force\"\u003eBrute Force\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#brute-force\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKita bagi jadi 2 iterasi\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ePrepare SubArray\n\u003col\u003e\n\u003cli\u003eDefinisikan dulu \u003ccode\u003e[][]int{}\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLooping nums dengan kondisi \u003ccode\u003efor i:=0; i \u0026#x3C; len(nums); i++\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eMasukan angka dalam nums sesuai dengan \u003ccode\u003ek\u003c/code\u003e jadi \u003ccode\u003esubarray = append(subarray, nums[i:k+i])\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eSum Subarray dengan kondisi\n\u003col\u003e\n\u003cli\u003eLooping SubArray jika ada angka yang sama, maka skip\u003c/li\u003e\n\u003cli\u003eJika tidak sama, maka hitung.\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePercobaan peratama gagal nih, kena time limit di leetcode. Karena ngecek satu satu. Kita pelajari teknik baru, Yaitu sliding window\u003c/p\u003e\n\u003ch3 id=\"sliding-window\"\u003eSliding Window\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sliding-window\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eJika \u003ccode\u003ek\u003c/code\u003e lebih besar dari array \u003ccode\u003en\u003c/code\u003e, langsung return \u003ccode\u003e0\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eInisialisasi Variable:\n\u003col\u003e\n\u003cli\u003e\u003ccode\u003emaxSum\u003c/code\u003e: ini akan digunakan untuk menyimpan nilai maksimum dari semua subarray valid dengan tipe (int64)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecurrentSum\u003c/code\u003e: Menyimpan jumlah elemen dalam window saat ini dengan tipe (int64)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eleft\u003c/code\u003e: Pointer kiri /batas awal window dengan tipe (int)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eseen\u003c/code\u003e: Digunakan untuk tracking element unik dengan tipe \u003ccode\u003emake(map[int]bool)\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eSliding window dengan Two Pounter\n\u003col\u003e\n\u003cli\u003eCheck Duplikat\n\u003col\u003e\n\u003cli\u003eSelama elemen \u003ccode\u003enums[right]\u003c/code\u003e sudah ada dalam set\n\u003col\u003e\n\u003cli\u003eBuang elemen paling kiri nums[left] dari window\u003c/li\u003e\n\u003cli\u003eKurangi \u003ccode\u003ecurrentSum\u003c/code\u003e dengan nilai \u003ccode\u003enums[left]\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eGeser \u003ccode\u003eleft\u003c/code\u003e pointer ke kanan \u003ccode\u003eleft++\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eTambahin elemen ke window\n\u003col\u003e\n\u003cli\u003eMasukin \u003ccode\u003enums[right]\u003c/code\u003e ke dalam set\u003c/li\u003e\n\u003cli\u003eTambahin \u003ccode\u003enums[right]\u003c/code\u003e ke currentSum\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eCheck Panjang Window\n\u003col\u003e\n\u003cli\u003eJika panjang window sama dengan \u003ccode\u003ek\u003c/code\u003e\n\u003col\u003e\n\u003cli\u003eUpdate \u003ccode\u003emaxSum\u003c/code\u003e jika \u003ccode\u003ecurrentSum\u003c/code\u003e lebih besar\u003c/li\u003e\n\u003cli\u003eBuang elemen paling kiri dengan elemen \u003ccode\u003enums[left]\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eKurangi \u003ccode\u003esum\u003c/code\u003e dengan elemen \u003ccode\u003enums[left]\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003c/li\u003e\n\u003cli\u003eReturn \u003ccode\u003emaxSum\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/
