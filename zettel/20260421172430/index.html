alue":"klaim-utama","line":22,"column":0,"depth":2},"skill-named-agent-dan-customization":{"type":"header","text":"Skill, named agent, dan customization","value":"skill-named-agent-dan-customization","line":28,"column":0,"depth":2},"skill":{"type":"header","text":"Skill","value":"skill","line":32,"column":0,"depth":3},"named-agent":{"type":"header","text":"Named agent","value":"named-agent","line":38,"column":0,"depth":3},"customization":{"type":"header","text":"Customization","value":"customization","line":51,"column":0,"depth":3},"mengapa-named-agents-penting":{"type":"header","text":"Mengapa named agents penting?","value":"mengapa-named-agents-penting","line":59,"column":0,"depth":2},"menu-vs-named-agents":{"type":"header","text":"Menu vs named agents","value":"menu-vs-named-agents","line":63,"column":0,"depth":3},"blank-prompt-vs-named-agents":{"type":"header","text":"Blank prompt vs named agents","value":"blank-prompt-vs-named-agents","line":67,"column":0,"depth":3},"apa-yang-sedang-dibangun-bmad-di-sini":{"type":"header","text":"Apa yang sedang dibangun BMAD di sini?","value":"apa-yang-sedang-dibangun-bmad-di-sini","line":73,"column":0,"depth":2},"activation-flow-dan-maknanya":{"type":"header","text":"Activation flow dan maknanya","value":"activation-flow-dan-maknanya","line":85,"column":0,"depth":2},"kenapa-nama-manusia-berguna":{"type":"header","text":"Kenapa nama manusia berguna?","value":"kenapa-nama-manusia-berguna","line":102,"column":0,"depth":2},"customization-sebagai-struktur-bukan-bonus":{"type":"header","text":"Customization sebagai struktur, bukan bonus","value":"customization-sebagai-struktur-bukan-bonus","line":108,"column":0,"depth":2},"implikasi-untuk-ai-native-engineering":{"type":"header","text":"Implikasi untuk AI-native engineering","value":"implikasi-untuk-ai-native-engineering","line":122,"column":0,"depth":2},"insight-penting":{"type":"header","text":"Insight penting","value":"insight-penting","line":135,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":148,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-named-agents-membangun-ai-coworker-model-bukan-sekadar-persona-lucu\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-named-agents-membangun-ai-coworker-model-bukan-sekadar-persona-lucu\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eKenapa BMAD memakai named agents seperti Mary, John, Winston, dan Amelia?\u003c/li\u003e\n\u003cli\u003eApa perbedaan antara skill, named agent, dan customization?\u003c/li\u003e\n\u003cli\u003eBagaimana struktur ini mengubah cara pengguna berinteraksi dengan AI?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD named agents bukan gimmick kosmetik. Mereka adalah cara menurunkan beban kognitif user sekaligus menjaga kontinuitas perilaku AI dalam alur kerja nyata.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBMAD tidak sedang menjual maskot. Dia sedang membangun model interaksi AI coworker yang punya identitas, batas kemampuan, dan kebiasaan tim.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"skill-named-agent-dan-customization\"\u003eSkill, named agent, dan customization\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#skill-named-agent-dan-customization\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman Named Agents memperkenalkan tiga primitive yang membentuk pengalaman agent BMAD.\u003c/p\u003e\n\u003ch3 id=\"skill\"\u003eSkill\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#skill\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSkill adalah kemampuan diskret: brainstorming, bikin PRD, membuat arsitektur, menulis story, review kode. Ini adalah jawaban atas pertanyaan \"apa yang bisa dilakukan?\"\u003c/p\u003e\n\u003cp\u003eSkill adalah unit kerja. Jika Anda menghapus semua nama, inilah yang tersisa: katalog kapabilitas yang bisa dipanggil saat relevan.\u003c/p\u003e\n\u003ch3 id=\"named-agent\"\u003eNamed agent\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#named-agent\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eNamed agent adalah pembungkus identitas di atas kumpulan skill.\u003c/p\u003e\n\u003cp\u003eMisalnya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMary = Business Analyst / analyst mode\u003c/li\u003e\n\u003cli\u003eJohn = Product Manager / planning mode\u003c/li\u003e\n\u003cli\u003eWinston = Architect / solutioning mode\u003c/li\u003e\n\u003cli\u003eAmelia = Senior Engineer / implementation mode\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni menjawab pertanyaan \"siapa yang sedang melakukan pekerjaan ini?\" Nama memberi anchor mental dan ekspektasi mode kerja.\u003c/p\u003e\n\u003ch3 id=\"customization\"\u003eCustomization\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#customization\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eCustomization membuat perilaku named agent bisa disesuaikan dengan tim dan organisasi.\u003c/p\u003e\n\u003cp\u003eTanpa customization, semua tim dipaksa memakai perilaku default tunggal. Tanpa named agent, identitasnya jadi kurang stabil. Dengan customization, BMAD memberikan struktur bersama sekaligus ruang adaptasi lokal.\u003c/p\u003e\n\u003cp\u003eCustomization memetakan aturan coding tim, preferensi artefak, toolchain, dan kebiasaan delivery ke dalam perilaku agent.\u003c/p\u003e\n\u003ch2 id=\"mengapa-named-agents-penting\"\u003eMengapa named agents penting?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-named-agents-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePilihan BMAD untuk memberi nama pada agent adalah tentang pengalaman pengguna, bukan hanya estetika.\u003c/p\u003e\n\u003ch3 id=\"menu-vs-named-agents\"\u003eMenu vs named agents\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#menu-vs-named-agents\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika semua yang tersedia hanyalah menu atau daftar kemampuan, beban navigasi jatuh ke user. Mereka harus ingat skill apa yang dipakai untuk fase mana. Ini membuat antarmuka terasa kaku dan mengundang kesalahan.\u003c/p\u003e\n\u003ch3 id=\"blank-prompt-vs-named-agents\"\u003eBlank prompt vs named agents\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#blank-prompt-vs-named-agents\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBlank prompt kelihatan natural, tetapi sebenarnya memindahkan beban ke pengguna untuk menebak frasa yang tepat dan mode kerja yang benar. Ini membuat user menjadi prompt engineer setiap kali.\u003c/p\u003e\n\u003cp\u003eNamed agents mencoba memotong kedua beban itu. Mereka membuat interaksi terasa seperti bicara dengan teammate: cukup panggil nama, dan sistem mengarahkan ke mode kerja yang relevan.\u003c/p\u003e\n\u003ch2 id=\"apa-yang-sedang-dibangun-bmad-di-sini\"\u003eApa yang sedang dibangun BMAD di sini?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-sedang-dibangun-bmad-di-sini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD membangun bukan sekadar AI tool, tetapi \u003cstrong\u003eAI coworker model\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eThis model memiliki tiga lapisan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eskill = tangan\u003c/li\u003e\n\u003cli\u003enamed agent = karakter / peran\u003c/li\u003e\n\u003cli\u003ecustomization = kebiasaan lokal tim\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan lapisan ini, AI bisa diberikan batas peran, tidak terlalu cair, dan tetap bisa beradaptasi.\u003c/p\u003e\n\u003ch2 id=\"activation-flow-dan-maknanya\"\u003eActivation flow dan maknanya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#activation-flow-dan-maknanya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman ini juga menyoroti delapan langkah aktivasi agent:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eresolve agent block\u003c/li\u003e\n\u003cli\u003emerge config\u003c/li\u003e\n\u003cli\u003eprepend steps\u003c/li\u003e\n\u003cli\u003eadopt persona\u003c/li\u003e\n\u003cli\u003eload persistent facts\u003c/li\u003e\n\u003cli\u003eload config bahasa/nama/output\u003c/li\u003e\n\u003cli\u003egreeting personal\u003c/li\u003e\n\u003cli\u003eappend steps\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eArti pentingnya bukan urutan teknis. Arti pentingnya adalah bahwa agent dibentuk secara bertahap: dari template umum, lalu ditambah konteks tim, lalu diberi identitas sosial, lalu diarahkan ke workflow.\u003c/p\u003e\n\u003cp\u003eIni menunjukkan bahwa agent bukan entitas statis. Ia adalah sosok yang dirakit ketika dipanggil, dengan identitas yang tetap tetapi perilaku yang bisa dikustomisasi.\u003c/p\u003e\n\u003ch2 id=\"kenapa-nama-manusia-berguna\"\u003eKenapa nama manusia berguna?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-nama-manusia-berguna\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eNama manusia seperti Mary, John, Winston, dan Amelia menciptakan \u003cstrong\u003esocial handle\u003c/strong\u003e yang lebih mudah diingat daripada \u003ccode\u003eanalysis-agent\u003c/code\u003e atau \u003ccode\u003earchitect-agent\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eFungsi ini bukan sekadar friendly interface. Nama membantu user membangun model mental: jika saya panggil Winston, saya mengharapkan mode engineer arsitektur. Ini menurunkan friction karena user tidak perlu memikirkan detail implementasi skill.\u003c/p\u003e\n\u003ch2 id=\"customization-sebagai-struktur-bukan-bonus\"\u003eCustomization sebagai struktur, bukan bonus\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#customization-sebagai-struktur-bukan-bonus\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD menempatkan customization sebagai kaki ketiga dari sistem. Ini penting karena banyak tool AI punya customization, tetapi biasanya sifatnya tempelan. BMAD ingin customization menjadi bagian struktural.\u003c/p\u003e\n\u003cp\u003eDengan customization, tim bisa menyimpan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003estandar coding,\u003c/li\u003e\n\u003cli\u003etemplate artefak,\u003c/li\u003e\n\u003cli\u003efallback toolchain,\u003c/li\u003e\n\u003cli\u003eaturan review,\u003c/li\u003e\n\u003cli\u003epreferensi komunikasi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni membuat agent terasa lebih \"bagian dari tim\" daripada hanya agent generik.\u003c/p\u003e\n\u003ch2 id=\"implikasi-untuk-ai-native-engineering\"\u003eImplikasi untuk AI-native engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi-untuk-ai-native-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD named agents menyambungkan fase dan persona.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMary untuk Analysis,\u003c/li\u003e\n\u003cli\u003eJohn untuk Planning,\u003c/li\u003e\n\u003cli\u003eWinston untuk Solutioning,\u003c/li\u003e\n\u003cli\u003eAmelia untuk Implementation.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni bukan kebetulan. Ini pemetaan dari fase ke mode kognitif. Analisis phase tidak hanya membutuhkan skill brainstorming; ia membutuhkan identitas analyst. Implementation bukan hanya membutuhkan skill dev-story; ia membutuhkan identitas engineer.\u003c/p\u003e\n\u003cp\u003eDengan cara ini, BMAD menciptakan continuity expectation. Ketika Anda memanggil Mary, Anda tahu apa yang akan dilakukan dan bagaimana dia akan bekerja.\u003c/p\u003e\n\u003ch2 id=\"insight-penting\"\u003eInsight penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#insight-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eNamed agents dalam BMAD adalah cara mengemas workflow engineering menjadi antarmuka yang lebih murah secara mental.\u003c/p\u003e\n\u003cp\u003eBukan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esekadar roleplay,\u003c/li\u003e\n\u003cli\u003ebukan sekadar peran.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTapi: \u003cstrong\u003elapisan koordinasi antara skill, identity, dan local process.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eItulah yang membuat halaman Named Agents relevan bagi AI-native engineering: ini adalah argumen bahwa pengalaman AI harus dibangun sebagai sistem coworker, bukan sebagai katalog fitur atau prompt.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170516\"\u003eBMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/a\u003e — BMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170812\"\u003eBMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/a\u003e — BMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172636\"\u003eBMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003c/a\u003e — BMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003enamed-agents (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eagent-model (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172636\"\u003eBMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172800\"\u003eBMAD project context adalah konstitusi implementasi untuk AI agents, bukan dokumentasi biasa\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173427\"\u003eAI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193303\"\u003eBMAD duduk di lapisan methodology dan orchestration, bukan sekadar prompt atau persona\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-named-agents\"\u003eBMAD Named Agents sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"enableAutoCreateO
