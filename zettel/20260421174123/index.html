,"why-the-review-system-matters":{"type":"header","text":"Why the review system matters","value":"why-the-review-system-matters","line":76,"column":0,"depth":2},"mental-model":{"type":"header","text":"Mental model","value":"mental-model","line":93,"column":0,"depth":2},"mermaid-diagram":{"type":"header","text":"Mermaid diagram","value":"mermaid-diagram","line":102,"column":0,"depth":2},"node-by-node-mindset":{"type":"header","text":"Node-by-node mindset","value":"node-by-node-mindset","line":140,"column":0,"depth":2},"sistem-kompresi-keputusan":{"type":"header","text":"Sistem kompresi keputusan","value":"sistem-kompresi-keputusan","line":144,"column":0,"depth":2},"implikasi-bmad":{"type":"header","text":"Implikasi BMAD","value":"implikasi-bmad","line":155,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":166,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-quick-dev-mengoptimalkan-attention-manusia-bukan-sekadar-kecepatan-model\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-quick-dev-mengoptimalkan-attention-manusia-bukan-sekadar-kecepatan-model\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eKenapa BMAD menempatkan human attention sebagai bottleneck utama di Quick Dev?\u003c/li\u003e\n\u003cli\u003eApa bedanya Quick Dev dengan mode \"cepat ngoding\" biasa?\u003c/li\u003e\n\u003cli\u003eBagaimana review dirancang agar tidak menghancurkan momentum pengerjaan?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD Quick Dev bukan hanya mode untuk mempercepat coding. Ia adalah desain workflow untuk mengurangi checkpoint manusia tanpa membuat model liar.\u003c/p\u003e\n\u003cp\u003ePrinsip inti: intent in, code changes out, with as few human-in-the-loop turns as possible — without sacrificing quality.\u003c/p\u003e\n\u003cp\u003eDalam BMAD, Quick Dev bukan fase pembuka. Ia muncul setelah analysis phase, ketika intent sudah diklarifikasi dan task sudah cukup diprioritaskan untuk diberi ruang otonom.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eQuick Dev memindahkan kontrol manusia ke titik-titik bernilai tinggi: klarifikasi intent, persetujuan spec, dan review akhir.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"core-design-bmad-quick-dev\"\u003eCore design BMAD Quick Dev\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#core-design-bmad-quick-dev\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-compress-intent-first\"\u003e1. Compress intent first\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-compress-intent-first\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eInput apapun bisa datang: kalimat kasar, link issue tracker, output plan mode, chat, atau story number.\u003c/p\u003e\n\u003cp\u003eSebelum model dibebaskan, request harus dipadatkan menjadi satu goal yang coherent, kecil, jelas, dan bebas kontradiksi. Jika intent belum stabil, otonomi model hanya akan menghasilkan kesalahan dengan efisien.\u003c/p\u003e\n\u003cp\u003eQuick Dev tidak menghilangkan kontrol manusia. Ia merelokasikan kontrol ke awal, dan hanya pada momen yang paling bernilai.\u003c/p\u003e\n\u003ch3 id=\"2-route-to-the-smallest-safe-path\"\u003e2. Route to the smallest safe path\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-route-to-the-smallest-safe-path\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSetelah goal jelas, workflow memutuskan jalur teraman.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJika perubahan kecil dan blast radius nol atau hampir nol, jalur one-shot bisa digunakan.\u003c/li\u003e\n\u003cli\u003eJika tidak, task melewati jalur penuh dengan planning dan spec yang lebih kuat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni bukan sekadar kecepatan. Ini router risiko: efisiensi berarti memilih jalur paling kecil yang tetap aman.\u003c/p\u003e\n\u003ch3 id=\"3-run-longer-with-less-supervision\"\u003e3. Run longer with less supervision\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-run-longer-with-less-supervision\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDi jalur penuh, spec yang disetujui menjadi boundary. Model diberi ruang jalan lebih lama sendiri, tapi hanya setelah boundary itu ada.\u003c/p\u003e\n\u003cp\u003eOtonomi model tidak diberikan mentah-mentah. Ia diberikan setelah intent dibekukan dan scope dibatasi.\u003c/p\u003e\n\u003ch3 id=\"4-diagnose-failure-at-the-right-layer\"\u003e4. Diagnose failure at the right layer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-diagnose-failure-at-the-right-layer\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika implementasi salah karena intent salah, memperbaiki kode adalah langkah yang salah.\nJika kode salah karena spec lemah, memperbaiki diff juga salah.\u003c/p\u003e\n\u003cp\u003eWorkflow ini mencari di layer mana kegagalan pertama kali masuk, lalu kembali ke layer itu:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eintent\u003c/li\u003e\n\u003cli\u003espec\u003c/li\u003e\n\u003cli\u003elocal implementation\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHanya masalah lokal yang dipatch lokal. Sisanya kembali ke sumbernya.\u003c/p\u003e\n\u003ch3 id=\"5-bring-the-human-back-only-when-needed\"\u003e5. Bring the human back only when needed\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-bring-the-human-back-only-when-needed\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eManusia hadir saat intent interview, saat spec harus disetujui, dan saat review akhir.\u003c/p\u003e\n\u003cp\u003eRecurring checkpoints yang bernilai rendah dikurangi. Jika workflow bisa lanjut dengan aman, ia akan terus berjalan tanpa interupsi manusia yang konstan.\u003c/p\u003e\n\u003ch2 id=\"why-the-review-system-matters\"\u003eWhy the review system matters\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#why-the-review-system-matters\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eReview Quick Dev bukan sekadar cari bug. Ia adalah triage untuk koreksi tanpa menghancurkan momentum.\u003c/p\u003e\n\u003cp\u003eReview sering gagal ketika:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eterlalu banyak temuan sehingga manusia tenggelam dalam noise,\u003c/li\u003e\n\u003cli\u003etemuan yang tidak terkait dengan task saat ini mengubah run menjadi cleanup liar.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eQuick Dev memperlakukan review sebagai triage:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etemuan yang terkait task saat ini bisa dipatch,\u003c/li\u003e\n\u003cli\u003etemuan yang menunjukkan gap spec atau intent kembali ke layer itu,\u003c/li\u003e\n\u003cli\u003etemuan incidental didefer ke \u003ccode\u003edeferred_work.md\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSistem ini mengoptimalkan signal quality, bukan exhaustive recall.\u003c/p\u003e\n\u003ch2 id=\"mental-model\"\u003eMental model\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mental-model\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eQuick Dev berada di antara dua ekstrem:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eworkflow checkpoint rapat = human attention tinggi, velocity rendah\u003c/li\u003e\n\u003cli\u003eprompt-to-code liar = velocity tinggi, quality tidak terkontrol\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePosisinya adalah pipeline semi-otonom dengan boundary cerdas. Model mendapat ruang lebih panjang, tapi hanya setelah workflow memastikan batasannya aman.\u003c/p\u003e\n\u003ch2 id=\"mermaid-diagram\"\u003eMermaid diagram\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mermaid-diagram\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cdiv class=\"mermaid\"\u003e\n  flowchart TD\n    A([Initial Intent]) --\u003e B[Clarify \u0026#x26; Route]\n    B --\u003e|safe small change| E[Implement]\n    B --\u003e|needs stronger boundary| C[Plan]\n    C --\u003e D([Spec])\n    D --\u003e E[Implement]\n    E --\u003e F[Review]\n    F --\u003e G[Present]\n    G --\u003e H([Result])\n\n    H1([Human Interview]) -.-\u003e B\n    H2([Spec Review Optional]) -.-\u003e D\n    H3([Final Review]) -.-\u003e H\n\n    subgraph REV[Reviewers / Subagents]\n      R1[Find 10 things to fix]\n      R2[Edge Cases Hunter]\n      R3[AC / Rules Audit]\n    end\n\n    R1 --\u003e F\n    R2 --\u003e F\n    R3 --\u003e F\n\n    F --\u003e|local fix| P[Patch]\n    P --\u003e E\n\n    F --\u003e|spec weak| D\n    F --\u003e|intent gap| B\n    F --\u003e|incidental| J[deferred_work.md]\n    F --\u003e|reject| X[[VOID]]\n\n    B -. one-shot mode .-\u003e E\n\u003c/div\u003e\n\u003ch2 id=\"node-by-node-mindset\"\u003eNode-by-node mindset\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#node-by-node-mindset\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eUntuk analisis lengkap tiap node diagram, lihat \u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"sistem-kompresi-keputusan\"\u003eSistem kompresi keputusan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sistem-kompresi-keputusan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMelihat semua node bersama, Quick Dev adalah sistem kompresi keputusan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekabut jadi intent,\u003c/li\u003e\n\u003cli\u003eintent jadi plan/spec,\u003c/li\u003e\n\u003cli\u003espec jadi perubahan kode,\u003c/li\u003e\n\u003cli\u003eperubahan kode jadi keputusan final.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTiap node adalah stasiun penyaringan yang memisahkan kesalahan berdasarkan layer. Ini membuat Quick Dev lebih disiplin: bukan hanya cepat, tapi juga lebih jelas dalam menjawab \"kalau salah, salahnya di mana?\".\u003c/p\u003e\n\u003ch2 id=\"implikasi-bmad\"\u003eImplikasi BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eQuick Dev menunjukkan bahwa mempercepat development bukan hanya soal model latency atau token. Ini soal mengurangi biaya attention manusia.\u003c/p\u003e\n\u003cp\u003eIa menolak dua jebakan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emicromanagement continuous,\u003c/li\u003e\n\u003cli\u003eimprovisasi liar tanpa boundary.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSebagai hasilnya, Quick Dev mengoptimalkan waktu pikir manusia dan memberi model ruang yang lebih panjang dalam batas yang aman.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173427\"\u003eAI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/a\u003e — AI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173600\"\u003eSimulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/a\u003e — simulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e — Quick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-quick-dev\"\u003eBMAD Quick Dev sebagai literature note\u003c/a\u003e — literature note BMAD Quick Dev\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421175034\"\u003eSimulasi Quick Dev: reset password via email menunjukkan PATCH, BAD SPEC, dan INTENT GAP\u003c/a\u003e — simulasi Quick Dev: reset password via email menunjukkan PATCH, BAD SPEC, dan INTENT GAP\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003equick-dev (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ereview (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421175034\"\u003eSimulasi Quick Dev: reset password via email menunjukkan PATCH, BAD SPEC, dan INTENT GAP\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421180059\"\u003eCheckpoint Preview membuat review manusia fokus pada pemahaman, bukan sekadar diff\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193440\"\u003ePATCH, BAD SPEC, dan INTENT GAP: diagnosis kegagalan dalam workflow AI-native\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193757\"\u003eKapan struktur AI-native jadi layak dipakai dan kapan ia justru overkill\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-quick-dev\"\u003eBMAD Quick Dev sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior"
