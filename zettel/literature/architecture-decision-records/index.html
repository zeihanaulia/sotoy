hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#architecture-decision-record--martin-fowler\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"tentang-sumber\"\u003eTentang Sumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tentang-sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJudul\u003c/strong\u003e: Architecture Decision Record\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePenulis / Author\u003c/strong\u003e: Martin Fowler\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTahun\u003c/strong\u003e: 2011 / revisi artikel Bliki\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJenis\u003c/strong\u003e: artikel web\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLink / ISBN\u003c/strong\u003e: \u003ca href=\"https://martinfowler.com/bliki/ArchitectureDecisionRecord.html\"\u003ehttps://martinfowler.com/bliki/ArchitectureDecisionRecord.html\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"catatan-per-gagasan\"\u003eCatatan Per Gagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan-per-gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-adr-itu-sebenarnya-apa-dan-kenapa-harus-pendek\"\u003e1. ADR itu sebenarnya apa, dan kenapa harus pendek?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-adr-itu-sebenarnya-apa-dan-kenapa-harus-pendek\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eADR adalah dokumen singkat yang menjelaskan satu keputusan arsitektur, konteksnya, dan konsekuensinya.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: ADR bukan dokumentasi teknis yang lengkap; ia adalah sistem rekaman alasan. Kalau dokumen terlalu panjang, ia berubah dari alat bantu keputusan jadi beban baca. Itulah alasan Fowler mendorong gaya \"inverted pyramid\": inti keputusan di depan, detail pendukung di belakang.\u003c/p\u003e\n\u003ch3 id=\"2-kenapa-satu-keputusan-per-dokumen\"\u003e2. Kenapa satu keputusan per dokumen?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-kenapa-satu-keputusan-per-dokumen\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eSatu ADR per keputusan membantu menjaga batasan yang jelas, timeline yang bersih, dan diskusi tim yang fokus.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: kalau satu file menggabungkan banyak keputusan, riwayat jadi kabur dan supersede jadi rumit. Satu file = satu unit keputusan yang mudah dipindai dan gampang dilacak.\u003c/p\u003e\n\u003ch3 id=\"3-kenapa-adr-tidak-boleh-diedit-sembarangan-tapi-harus-di-supersede\"\u003e3. Kenapa ADR tidak boleh diedit sembarangan, tapi harus di-supersede?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-kenapa-adr-tidak-boleh-diedit-sembarangan-tapi-harus-di-supersede\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eSetelah accepted, ADR harus dibiarkan utuh. Perubahan dibuat lewat ADR baru yang supersede.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: ini menjaga nilai histori. Keputusan lama mencatat konteks, constraint, dan asumsi saat itu. Mengubah ADR lama sama dengan menghapus jejak pikiran yang pernah memimpin tim.\u003c/p\u003e\n\u003ch3 id=\"4-apa-hubungan-adr-dengan-kolaborasi-tim-bukan-cuma-dokumentasi\"\u003e4. Apa hubungan ADR dengan kolaborasi tim, bukan cuma dokumentasi?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-apa-hubungan-adr-dengan-kolaborasi-tim-bukan-cuma-dokumentasi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eFowler menempatkan ADR sebagai medium diskusi dan alignment, bukan sekadar arsip setelah keputusan.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: proses menulis ADR memaksa tim menimbang alternatif, trade-off, dan masukan. ADR yang sehat adalah scaffold untuk negosiasi keputusan, bukan rasionalisasi setelah fakta.\u003c/p\u003e\n\u003ch3 id=\"5-adr-ini-nyambung-ke-praktik-lain-apa-saja-di-luar-artikel-fowler\"\u003e5. ADR ini nyambung ke praktik lain apa saja di luar artikel Fowler?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-adr-ini-nyambung-ke-praktik-lain-apa-saja-di-luar-artikel-fowler\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eADR modern terkait dengan praktik seperti MADR, decision log, dan tools ADR.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: Fowler memberi prinsip ringkas dan riwayat. MADR memberi format Markdown yang konsisten. Sementara praktik decision log menekankan bahwa riwayat keputusan bernilai untuk tim baru, audit, dan adaptasi.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"zettels-yang-dibuat-dari-sumber-ini\"\u003eZettels yang Dibuat dari Sumber Ini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#zettels-yang-dibuat-dari-sumber-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055413\"\u003eADR adalah decision log yang merekam alasan, bukan dokumentasi desain\u003c/a\u003e — ADR adalah decision log yang merekam alasan, bukan dokumentasi desain\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055414\"\u003eSatu keputusan per ADR menjaga batasan dan riwayat yang bersih\u003c/a\u003e — Satu keputusan per ADR menjaga batasan dan riwayat yang bersih\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055415\"\u003eADR accepted harus disupersede, bukan diedit ulang\u003c/a\u003e — ADR accepted harus disupersede, bukan diedit ulang\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055619\"\u003eADR sehat memaksa maintainer mengubah perilaku, bukan sekadar menambah dokumen\u003c/a\u003e — ADR sehat memaksa maintainer mengubah perilaku, bukan sekadar menambah dokumen\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055738\"\u003eSoftware architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/a\u003e — Software architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"pertanyaan-terbuka\"\u003ePertanyaan Terbuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-terbuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eKapan keputusan arsitektur layak di-ADR-kan, dan kapan cukup diarahkan lewat dokumentasi lain?\u003c/li\u003e\n\u003cli\u003eBagaimana tim menjaga ADR tetap ringan tanpa kehilangan nilai historis?\u003c/li\u003e\n\u003cli\u003eApa batas praktis antara \"keputusan arsitektur signifikan\" dan \"keputusan implementasi biasa\"?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #154406;\" href=\"/sotoy/notes/tags.literature-note\"\u003eliterature-note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003earchitecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eadr (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003edecision-making (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055413\"\u003eADR adalah decision log yang merekam alasan, bukan dokumentasi desain\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055414\"\u003eSatu keputusan per ADR menjaga batasan dan riwayat yang bersih\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055415\"\u003eADR accepted harus disupersede, bukan diedit ulang\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055619\"\u003eADR sehat memaksa maintainer mengubah perilaku, bukan sekadar menambah dokumen\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055738\"\u003eSoftware architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.software-architecture-guide\"\u003eSoftware Architecture Guide — Fowler: arsitektur sebagai keputusan penting dan mahal kalau salah\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, expe
