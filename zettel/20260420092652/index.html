2652","id":"zettel.20260420092652","vaultName":"vault"},"value":"zettel.literature.software-architecture-guide","position":{"start":{"line":20,"column":3,"offset":952},"end":{"line":20,"column":52,"offset":1001},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.literature.software-architecture-guide"}},{"type":"wiki","from":{"fname":"zettel.20260420092652","id":"zettel.20260420092652","vaultName":"vault"},"value":"zettel.20260420091825","position":{"start":{"line":21,"column":3,"offset":1004},"end":{"line":21,"column":28,"offset":1029},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260420091825"}},{"type":"wiki","from":{"fname":"zettel.20260420092652","id":"zettel.20260420092652","vaultName":"vault"},"value":"zettel.20260420092009","position":{"start":{"line":22,"column":3,"offset":1083},"end":{"line":22,"column":28,"offset":1108},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260420092009"}},{"type":"wiki","from":{"fname":"zettel.20260420092652","id":"zettel.20260420092652","vaultName":"vault"},"value":"zettel.20260420092459","position":{"start":{"line":23,"column":3,"offset":1183},"end":{"line":23,"column":28,"offset":1208},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260420092459"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":47,"column":3,"offset":3470},"end":{"line":47,"column":28,"offset":3495},"indent":[]},"value":"zettel.20260420092652"},{"from":{"fname":"zettel.20260420092901","id":"zettel.20260420092901","vaultName":"vault"},"type":"backlink","position":{"start":{"line":24,"column":3,"offset":1745},"end":{"line":24,"column":28,"offset":1770},"indent":[]},"value":"zettel.20260420092652"},{"from":{"fname":"zettel.moc.software-architecture","id":"zettel.moc.software-architecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":54,"column":3,"offset":3635},"end":{"line":54,"column":28,"offset":3660},"indent":[]},"value":"zettel.20260420092652"}],"anchors":{},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"fowler-condong-ke-desentralisasi-tetapi-tetap-waspada-terhadap-chaos\"\u003eFowler condong ke desentralisasi tetapi tetap waspada terhadap chaos\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#fowler-condong-ke-desentralisasi-tetapi-tetap-waspada-terhadap-chaos\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cblockquote\u003e\n\u003cp\u003eLike most people with an agile mindset, I prefer to err on the side of decentralization, so will head closer to the rocks of chaos rather than suffocating control. But being on that side of the channel still means we have to avoid the rocks, and a way to maximize local decision making in a way that minimizes the real costs involved.\u003c/p\u003e\n\u003cp\u003eSumber: \u003ca href=\"https://martinfowler.com/architecture/\"\u003ehttps://martinfowler.com/architecture/\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFowler memilih arah desentralisasi, tetapi bukan tanpa batas.\u003c/li\u003e\n\u003cli\u003eIa menggunakan metafora \"rocks of chaos\" untuk menegaskan bahwa otonomi membawa bahaya tersendiri.\u003c/li\u003e\n\u003cli\u003eTargetnya adalah memaksimalkan keputusan lokal sambil meminimalkan biaya nyata dari chaos.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eImplikasi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFowler bukan anti-governance; dia pro-governance yang cukup, bukan governance yang melumpuhkan.\u003c/li\u003e\n\u003cli\u003eEnterprise architecture adalah seni menjaga kebebasan tanpa kehilangan arah.\u003c/li\u003e\n\u003cli\u003eDesentralisasi harus didesain dengan mekanisme untuk menghindari biaya nyata chaos.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHubungan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.software-architecture-guide\"\u003eSoftware Architecture Guide — Fowler: arsitektur sebagai keputusan penting dan mahal kalau salah\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420091825\"\u003eEnterprise architecture adalah soal apakah biaya koordinasi pusat layak\u003c/a\u003e — evaluasi biaya koordinasi pusat vs otonomi lokal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092009\"\u003eSentralisasi total di EA melambatkan keputusan dan kehilangan konteks lokal\u003c/a\u003e — sentralisasi total melambatkan keputusan dan kehilangan konteks lokal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420092459\"\u003eOtonomi tanpa koordinasi di EA berubah jadi fragmentasi mahal\u003c/a\u003e — otonomi tanpa koordinasi berubah jadi fragmentasi mahal\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003epermanent-note (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-architecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eenterprise-architecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ecoordination (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003egovernance (Priv
