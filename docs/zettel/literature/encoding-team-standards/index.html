en=\"true\" class=\"anchor-heading icon-link\" href=\"#encoding-team-standards--executable-ai-instruction-untuk-konsistensi-tim\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"tentang-sumber\"\u003eTentang Sumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tentang-sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJudul\u003c/strong\u003e: Encoding Team Standards\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePenulis / Author\u003c/strong\u003e: Rahul Garg\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTahun\u003c/strong\u003e: 2026\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJenis\u003c/strong\u003e: artikel\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLink / ISBN\u003c/strong\u003e: Martin Fowler\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"catatan-per-gagasan\"\u003eCatatan Per Gagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan-per-gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-problem-utama-kualitas-ai-tergantung-siapa-yang-menulis-instruksi\"\u003e1. Problem utama: kualitas AI tergantung siapa yang menulis instruksi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-problem-utama-kualitas-ai-tergantung-siapa-yang-menulis-instruksi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e“The gap is not in what the AI knows about the project. It is in what the AI is told to do with that knowledge.”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: masalah utama bukan hanya model atau konteks repo. Masalahnya adalah bahwa judgement senior masih tersimpan di kepala seseorang, lalu diterjemahkan secara tidak konsisten lewat prompt.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSenior tahu heuristic tim: arsitektur, error handling, folder placement, kapan refactor valid.\u003c/li\u003e\n\u003cli\u003eJunior sering nulis prompt generik seperti “buat notification service” tanpa judgement tim.\u003c/li\u003e\n\u003cli\u003eHasil berbeda padahal tool, konteks, dan repo sama.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"2-dokumentasi-biasa-tidak-cukup-karena-sifatnya-pasif\"\u003e2. Dokumentasi biasa tidak cukup karena sifatnya pasif\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-dokumentasi-biasa-tidak-cukup-karena-sifatnya-pasif\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003e“A checklist on a wiki depends on someone reading it, remembering it, and applying it consistently under time pressure.”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue: wiki / guideline / checklist masih bergantung pada manusia untuk memindahkan aturan ke tindakan.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDokumentasi memberi tahu, tapi tidak mengeksekusi.\u003c/li\u003e\n\u003cli\u003eDalam workflow AI, aturan harus melekat ke prompt dan model, bukan disimpan di halaman terpisah.\u003c/li\u003e\n\u003cli\u003eIni mirip lint/CI/IaC: sukses karena sistem menjalankan aturan, bukan karena orang mengingatnya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-executable-governance--membuat-standar-tim-jadi-artefak-yang-dijalankan-ai\"\u003e3. Executable governance = membuat standar tim jadi artefak yang dijalankan AI\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-executable-governance--membuat-standar-tim-jadi-artefak-yang-dijalankan-ai\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eEksekusi governance berarti standar tidak berhenti di tulisan. Ia harus:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003editulis dan disimpan,\u003c/li\u003e\n\u003cli\u003edireview oleh tim,\u003c/li\u003e\n\u003cli\u003edi-PR-kan,\u003c/li\u003e\n\u003cli\u003elalu dipakai langsung oleh AI.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIntinya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etacit judgment jadi explicit.\u003c/li\u003e\n\u003cli\u003edokumentasi jadi instruction set.\u003c/li\u003e\n\u003cli\u003einstruksi itu sendiri adalah aplikasi dari governance.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"4-bentuk-praktis-instruksi-standar-tim\"\u003e4. Bentuk praktis instruksi standar tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-bentuk-praktis-instruksi-standar-tim\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eArtikel mengusulkan empat elemen penting:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRole definition: beri framing seperti \"you are a senior engineer yang mengikuti pola arsitektur tim\".\u003c/li\u003e\n\u003cli\u003eContext requirements: sebutkan file, constraints, library, dan konteks yang diperlukan.\u003c/li\u003e\n\u003cli\u003eCategorized standards: bagi cek ke level critical / important / advisory untuk menjaga prioritas.\u003c/li\u003e\n\u003cli\u003eOutput format: minta hasil yang terstruktur agar review konsisten.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCatatan gue: ini bukan sekadar template prompt. Ini mengencode judgement yang biasanya ada di kepala senior.\u003c/p\u003e\n\u003cp\u003e→ \u003ca href=\"/sotoy/notes/zettel.20260419192541\"\u003ePraktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/a\u003e — Praktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/p\u003e\n\u003ch3 id=\"5-trade-off-dan-batasannya\"\u003e5. Trade-off dan batasannya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-trade-off-dan-batasannya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eRisiko utama:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ebiaya awal tinggi: interview senior, drafting, kalibrasi.\u003c/li\u003e\n\u003cli\u003ebisa terlalu preskriptif jika dibuat kaku.\u003c/li\u003e\n\u003cli\u003emaintenance burden, karena tim dan arsitektur berubah.\u003c/li\u003e\n\u003cli\u003erisiko over-engineering jika setiap hal kecil dibuat aturan khusus.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCatatan gue: pendekatan ini cocok kalau tim sudah mulai bergantung pada prompt tertentu dan standar kualitas team output AI belum stabil.\u003c/p\u003e\n\u003ch3 id=\"6-batasan-use-case\"\u003e6. Batasan use case\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#6-batasan-use-case\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eArtikel menyebut cocok untuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGeneration: pencegahan misalignment sejak awal.\u003c/li\u003e\n\u003cli\u003eRefactoring: encode filosofi tim tentang kontrak publik dan simplifikasi.\u003c/li\u003e\n\u003cli\u003eSecurity: threat model tim sendiri, bukan checklist generik.\u003c/li\u003e\n\u003cli\u003eReview: quality gate dengan severity konsisten.\u003c/li\u003e\n\u003cli\u003eOptional CI: kalau bisa dibuat cepat dan tidak noisy.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"7-implementasi-copilot-dokumentasi-custom-instructions-skills-agent-behavior\"\u003e7. Implementasi Copilot: dokumentasi, custom instructions, skills, agent behavior\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#7-implementasi-copilot-dokumentasi-custom-instructions-skills-agent-behavior\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eCatatan gue: kalau ingin menerapkan prinsip artikel secara nyata di GitHub Copilot, lo perlu memetakan fungsi tiap layer.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edocumentation\u003c/code\u003e menjelaskan alasan dan konteks untuk manusia.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecustom instructions\u003c/code\u003e (\u003ccode\u003e.github/copilot-instructions.md\u003c/code\u003e, \u003ccode\u003e.github/instructions/*.instructions.md\u003c/code\u003e) meng-encode aturan yang hampir selalu berlaku.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eskills\u003c/code\u003e adalah workflow task-specific yang dipanggil saat relevan.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eagent instructions\u003c/code\u003e / \u003ccode\u003eAGENTS.md\u003c/code\u003e mendefinisikan cara agent bertindak ketika pekerjaan lebih otonom.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni membuat struktur tim menjadi lebih rapi: docs untuk \"kenapa\", instructions untuk \"apa yang harus diikuti\", skills untuk \"bagaimana melakukan\", dan agent behavior untuk \"bagaimana seharusnya agent mengambil keputusan\".\u003c/p\u003e\n\u003ch2 id=\"zettels-yang-dibuat-dari-sumber-ini\"\u003eZettels yang Dibuat dari Sumber Ini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#zettels-yang-dibuat-dari-sumber-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419190800\"\u003eJudgement senior harus di-infrastrukturkan sebagai executable instruction AI\u003c/a\u003e — Judgement senior harus di-infrastrukturkan sebagai executable instruction AI\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192040\"\u003eExecutable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior\u003c/a\u003e — Executable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192239\"\u003eExecutable governance adalah standar tim yang bukan hanya ditulis, tapi dijalankan oleh AI\u003c/a\u003e — Executable governance adalah standar tim yang bukan hanya ditulis, tapi dijalankan oleh AI\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192541\"\u003ePraktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/a\u003e — Praktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192952\"\u003ePlan, onboarding, dan tracker adalah artefak governance AI, bukan dokumentasi pasif\u003c/a\u003e — Plan, onboarding, dan tracker adalah artefak governance AI, bukan dokumentasi pasif\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193541\"\u003ePlan AI bukan sekadar to-do list; ia adalah artefak governance operasional\u003c/a\u003e — Plan AI bukan sekadar to-do list; ia adalah artefak governance operasional\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193542\"\u003eOnboarding docs penting untuk agent karena mereka menyediakan mental model repo\u003c/a\u003e — Onboarding docs penting untuk agent karena mereka menyediakan mental model repo\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193543\"\u003eTracker adalah artefak observabilitas untuk workflow AI dan developer\u003c/a\u003e — Tracker adalah artefak observabilitas untuk workflow AI dan developer\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193544\"\u003eAgent eksplorasi codebase harus struktural, bukan sekadar search random\u003c/a\u003e — Agent eksplorasi codebase harus struktural, bukan sekadar search random\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"pertanyaan-terbuka\"\u003ePertanyaan Terbuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-terbuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eApa struktur terbaik untuk menaruh instruction this repo? (misal \u003ccode\u003eai/instructions/generation.md\u003c/code\u003e, \u003ccode\u003ereview.md\u003c/code\u003e, \u003ccode\u003esecurity.md\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eBagaimana tim menjaga fleksibilitas tanpa jadi kaku saat semua instruksi di-commit ke repo?\u003c/li\u003e\n\u003cli\u003eKapan sebuah instruction sebaiknya dipisah menjadi beberapa unit kecil?\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #154406;\" href=\"/sotoy/notes ault)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193542\"\u003eOnboarding docs penting untuk agent karena mereka menyediakan mental model repo (vault)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193543\"\u003eTracker adalah artefak observabilitas untuk workflow AI dan developer (vault)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419193544\"\u003eAgent eksplorasi codebase harus struktural, bukan sekadar search random (vault)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419194901\"\u003eTacit knowledge senior diubah jadi artefak operasional untuk AI dan tim (vault)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.copilot.tacit-knowledge-extraction\"\u003eEkstraksi Tacit Knowledge Senior untuk AI dan Tim (vault)\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncwhf8qpuaoz764uzfn","y8jzdhjhhmqub1t9wx5w9e4","ff8zp75qbznut6joziqr1nx"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies
