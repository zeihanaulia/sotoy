column":0,"depth":2},"apa-yang-dicari-bmad-market-research":{"type":"header","text":"Apa yang dicari BMAD market research?","value":"apa-yang-dicari-bmad-market-research","line":27,"column":0,"depth":2},"kenapa-ini-penting":{"type":"header","text":"Kenapa ini penting?","value":"kenapa-ini-penting","line":38,"column":0,"depth":2},"output-yang-berguna":{"type":"header","text":"Output yang berguna","value":"output-yang-berguna","line":44,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":55,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-market-research-menangkap-realitas-eksternal-sebelum-planning\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-market-research-menangkap-realitas-eksternal-sebelum-planning\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa tujuan BMAD market research?\u003c/li\u003e\n\u003cli\u003eBagaimana ia berbeda dari sekadar \"cek kompetitor\"?\u003c/li\u003e\n\u003cli\u003eApa output yang membuat planning lebih tajam?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD market research bukan sekadar daftar pemain. Itu adalah upaya untuk memastikan bahwa ide produk tidak berjalan sebagai solusi untuk masalah yang hanya ada dalam kepala tim.\u003c/p\u003e\n\u003cp\u003eBMAD menempatkan market research di phase awal agar produk yang akan direncanakan punya dasar realitas eksternal: kebutuhan nyata, ruang kompetisi, dan ruang diferensiasi.\u003c/p\u003e\n\u003ch2 id=\"apa-yang-dicari-bmad-market-research\"\u003eApa yang dicari BMAD market research?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-dicari-bmad-market-research\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDi fase ini AI membantu menggali:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esiapa saja pemain yang sudah melayani problem domain ini,\u003c/li\u003e\n\u003cli\u003eapa pendekatan mereka,\u003c/li\u003e\n\u003cli\u003edimana celah kompetitif yang nyata,\u003c/li\u003e\n\u003cli\u003eapa ekspektasi user yang spesifik.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAnalogi yang bagus: jika ide Anda adalah hipotesis, market research adalah uji pertama terhadap realitas pasar. Ia memastikan Anda tidak sedang membangun jawaban untuk pertanyaan yang salah.\u003c/p\u003e\n\u003ch2 id=\"kenapa-ini-penting\"\u003eKenapa ini penting?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBanyak ide AI-native terus bergerak ke coding karena mereka terasa \"menarik\" saja. Market research membatasi kelincahan ini. Ia menuntut bahwa fokus problem bukan sekadar menarik secara internal, tetapi relevan secara eksternal.\u003c/p\u003e\n\u003cp\u003eTanpa fase ini, planning bisa tetap tajam secara teknis, tetapi tidak terikat ke demand pasar. BMAD ingin menghindari product-led tunnel vision.\u003c/p\u003e\n\u003ch2 id=\"output-yang-berguna\"\u003eOutput yang berguna\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#output-yang-berguna\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetelah research, Anda seharusnya memiliki:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003epemahaman kompetitor yang kontekstual,\u003c/li\u003e\n\u003cli\u003esinyal peluang yang nyata,\u003c/li\u003e\n\u003cli\u003epoin diferensiasi awal,\u003c/li\u003e\n\u003cli\u003erisiko pasar yang sebaiknya diwaspadai.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eItu membuat planning tidak lagi dimulai dari intuisi semata, tetapi dari realitas eksternal yang lebih stabil.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eanalysis-phase (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emarket-research (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy
