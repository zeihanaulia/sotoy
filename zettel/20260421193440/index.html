":"zettel.20260421193440","id":"zettel.20260421193440","vaultName":"vault"},"value":"zettel.20260421174751","position":{"start":{"line":66,"column":3,"offset":2900},"end":{"line":66,"column":28,"offset":2925},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260421174751"}},{"type":"wiki","from":{"fname":"zettel.20260421193440","id":"zettel.20260421193440","vaultName":"vault"},"value":"zettel.moc.ai-native","position":{"start":{"line":67,"column":3,"offset":2995},"end":{"line":67,"column":27,"offset":3019},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.moc.ai-native"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":153,"column":3,"offset":14251},"end":{"line":153,"column":28,"offset":14276},"indent":[]},"value":"zettel.20260421193440"},{"from":{"fname":"zettel.moc.ai-native","id":"zettel.moc.ai-native","vaultName":"vault"},"type":"backlink","position":{"start":{"line":51,"column":3,"offset":4323},"end":{"line":51,"column":28,"offset":4348},"indent":[]},"value":"zettel.20260421193440"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":15,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":21,"column":0,"depth":2},"definisi":{"type":"header","text":"Definisi","value":"definisi","line":31,"column":0,"depth":2},"patch":{"type":"header","text":"PATCH","value":"patch","line":33,"column":0,"depth":3},"bad-spec":{"type":"header","text":"BAD SPEC","value":"bad-spec","line":39,"column":0,"depth":3},"intent-gap":{"type":"header","text":"INTENT GAP","value":"intent-gap","line":45,"column":0,"depth":3},"mengapa-perbedaan-ini-penting":{"type":"header","text":"Mengapa perbedaan ini penting","value":"mengapa-perbedaan-ini-penting","line":51,"column":0,"depth":2},"prinsip-yang-harus-dipegang":{"type":"header","text":"Prinsip yang harus dipegang","value":"prinsip-yang-harus-dipegang","line":59,"column":0,"depth":2},"hubungan-ke-quick-dev":{"type":"header","text":"Hubungan ke Quick Dev","value":"hubungan-ke-quick-dev","line":65,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":75,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"patch-bad-spec-dan-intent-gap-diagnosis-kegagalan-dalam-workflow-ai-native\"\u003ePATCH, BAD SPEC, dan INTENT GAP: diagnosis kegagalan dalam workflow AI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#patch-bad-spec-dan-intent-gap-diagnosis-kegagalan-dalam-workflow-ai-native\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa bedanya PATCH, BAD SPEC, dan INTENT GAP dalam AI-native workflow?\u003c/li\u003e\n\u003cli\u003eKenapa penting memperbaiki layer yang tepat saat review atau koreksi?\u003c/li\u003e\n\u003cli\u003eBagaimana konsekuensinya jika masalah di-layer salah justru diperbaiki?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTidak semua kegagalan berasal dari kode. Dalam AI-native engineering, ada tiga layer diagnosis yang berbeda:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePATCH: implementasi lokal perlu diperbaiki,\u003c/li\u003e\n\u003cli\u003eBAD SPEC: boundary atau spec eksekusi perlu direvisi,\u003c/li\u003e\n\u003cli\u003eINTENT GAP: pemahaman awal tentang maksud user perlu diklarifikasi ulang.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMemperbaiki pada layer yang salah sering membuat rework jadi lebih besar daripada manfaatnya.\u003c/p\u003e\n\u003ch2 id=\"definisi\"\u003eDefinisi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#definisi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"patch\"\u003ePATCH\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#patch\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMasalahnya ada di level implementasi lokal. Intent dan spec sudah benar, tetapi detail implementasi, bug, atau edge case belum ditangani.\u003c/p\u003e\n\u003cp\u003eContoh: error handling tidak meliputi kondisi tertentu, test case terlewat, atau helper dipanggil dengan argumen yang salah.\u003c/p\u003e\n\u003ch3 id=\"bad-spec\"\u003eBAD SPEC\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bad-spec\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eIntent awal benar, tetapi spesifikasi yang dibekukan terlalu lemah atau tidak lengkap. Agent menerjemahkan spec secara konsisten, tetapi spec itu sendiri tidak memuat constraint yang penting.\u003c/p\u003e\n\u003cp\u003eContoh: acceptance criteria tidak mencakup keamanan, format response salah, atau precondition tidak ditentukan.\u003c/p\u003e\n\u003ch3 id=\"intent-gap\"\u003eINTENT GAP\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#intent-gap\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMasalah lebih dalam: tim atau agent salah memahami apa yang sebenarnya diminta. Baik spec maupun implementasi bisa konsisten, tapi terhadap pemahaman yang keliru.\u003c/p\u003e\n\u003cp\u003eContoh: fitur dibuat sesuai pengertian awal, tetapi user sebenarnya menginginkan behavior lain.\u003c/p\u003e\n\u003ch2 id=\"mengapa-perbedaan-ini-penting\"\u003eMengapa perbedaan ini penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-perbedaan-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI-native workflows seperti Quick Dev mengandalkan agen yang dapat melakukan banyak perubahan cepat. Ini memperbesar biaya jika perbaikan dipaksa pada layer yang salah.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJika PATCH dilakukan saat BAD SPEC asli, kode bisa jadi valid tapi terus gagal di use case yang tepat.\u003c/li\u003e\n\u003cli\u003eJika BAD SPEC diubah saat sebenarnya ada INTENT GAP, tim kehilangan arah karena batas yang diperbaiki masih salah.\u003c/li\u003e\n\u003cli\u003eJika INTENT GAP ditangani sebagai PATCH, tim akan terus mengejar gejala tanpa menyelesaikan kebutuhan bisnis.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"prinsip-yang-harus-dipegang\"\u003ePrinsip yang harus dipegang\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#prinsip-yang-harus-dipegang\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eTemukan level kegagalan pertama kali masuk.\u003c/li\u003e\n\u003cli\u003ePerbaiki di layer itu.\u003c/li\u003e\n\u003cli\u003eJika diperlukan, dorong koreksi ke layer yang lebih dalam, bukan hanya tambal di atasnya.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"hubungan-ke-quick-dev\"\u003eHubungan ke Quick Dev\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-quick-dev\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eQuick Dev menempatkan review sebagai triage. Ia memisahkan respons menjadi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePATCH untuk kesalahan lokal,\u003c/li\u003e\n\u003cli\u003eBAD SPEC untuk koreksi boundary,\u003c/li\u003e\n\u003cli\u003eINTENT GAP untuk klarifikasi ulang mogul.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni membuat workflow lebih disiplin: output yang tampak baik tidak otomatis dibiarkan. Review harus menentukan apakah masalahnya di kode, spec, atau pemahaman dasar.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u00
