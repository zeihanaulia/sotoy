ttel.20260421192951","id":"zettel.20260421192951","vaultName":"vault"},"value":"zettel.20260421172800","position":{"start":{"line":45,"column":3,"offset":2377},"end":{"line":45,"column":28,"offset":2402},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260421172800"}},{"type":"wiki","from":{"fname":"zettel.20260421192951","id":"zettel.20260421192951","vaultName":"vault"},"value":"zettel.moc.ai-native","position":{"start":{"line":46,"column":3,"offset":2500},"end":{"line":46,"column":27,"offset":2524},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.moc.ai-native"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":119,"column":3,"offset":10799},"end":{"line":119,"column":28,"offset":10824},"indent":[]},"value":"zettel.20260421192951"},{"from":{"fname":"zettel.20260421193756","id":"zettel.20260421193756","vaultName":"vault"},"type":"backlink","position":{"start":{"line":68,"column":3,"offset":3044},"end":{"line":68,"column":28,"offset":3069},"indent":[]},"value":"zettel.20260421192951"},{"from":{"fname":"zettel.moc.ai-native","id":"zettel.moc.ai-native","vaultName":"vault"},"type":"backlink","position":{"start":{"line":32,"column":3,"offset":2318},"end":{"line":32,"column":28,"offset":2343},"indent":[]},"value":"zettel.20260421192951"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":17,"column":0,"depth":2},"jawaban":{"type":"header","text":"Jawaban","value":"jawaban","line":23,"column":0,"depth":2},"risiko-utama-jika-spec-lemah":{"type":"header","text":"Risiko utama jika spec lemah","value":"risiko-utama-jika-spec-lemah","line":37,"column":0,"depth":3},"peran-spec-sebagai-boundary":{"type":"header","text":"Peran spec sebagai boundary","value":"peran-spec-sebagai-boundary","line":44,"column":0,"depth":3},"mengapa-ini-penting-untuk-ai-native-engineering":{"type":"header","text":"Mengapa ini penting untuk AI-native engineering","value":"mengapa-ini-penting-untuk-ai-native-engineering","line":50,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":56,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"spec-semakin-penting-ketika-ai-bisa-menulis-kode-bukan-hanya-karena-kode-lebih-murah\"\u003eSpec semakin penting ketika AI bisa menulis kode, bukan hanya karena kode lebih murah\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#spec-semakin-penting-ketika-ai-bisa-menulis-kode-bukan-hanya-karena-kode-lebih-murah\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eMengapa kemampuan AI menulis kode memindahkan hambatan utama dari implementasi ke spesifikasi?\u003c/li\u003e\n\u003cli\u003eApa risiko kunci ketika spesifikasi lemah dalam workflow AI-native?\u003c/li\u003e\n\u003cli\u003eBagaimana spesifikasi berfungsi sebagai boundary antara niat manusia dan aksi agent?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"jawaban\"\u003eJawaban\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#jawaban\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKemampuan AI menulis kode membuat pekerjaan implementasi teknis menjadi lebih murah. Ketika biaya pembuatan kode turun, kesalahan paling mahal tidak lagi terjadi pada tulisan kode itu sendiri, tetapi pada ketidaksesuaian antara apa yang diminta dan apa yang dihasilkan.\u003c/p\u003e\n\u003cp\u003eSpec menjadi boundary operasional yang menjawab:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eapa yang sedang dibangun,\u003c/li\u003e\n\u003cli\u003eapa batasnya,\u003c/li\u003e\n\u003cli\u003eapa acceptance criteria-nya,\u003c/li\u003e\n\u003cli\u003eapa constraint pentingnya,\u003c/li\u003e\n\u003cli\u003edan apa yang jangan dilakukan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTanpa spec yang jelas, AI akan mengisi kekosongan dengan tebakan yang tampak valid secara syntaksis tapi salah arah secara domain.\u003c/p\u003e\n\u003ch3 id=\"risiko-utama-jika-spec-lemah\"\u003eRisiko utama jika spec lemah\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#risiko-utama-jika-spec-lemah\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eAI menghasilkan kode yang terlihat benar namun tidak memenuhi tujuan.\u003c/li\u003e\n\u003cli\u003ePerubahan cepat menjadi false confidence: banyak commit baik, tapi tidak tepat.\u003c/li\u003e\n\u003cli\u003eReview manusia jadi lebih sulit karena output sudah tersebar di banyak file.\u003c/li\u003e\n\u003cli\u003eRework meningkat karena masalahnya bukan kode, tapi definisi tugas.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"peran-spec-sebagai-boundary\"\u003ePeran spec sebagai boundary\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#peran-spec-sebagai-boundary\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSpesifikasi adalah jembatan antara intent manusia dan aksi agent. Ia memberitahu agent bukan hanya \"lakukan ini\", tetapi juga \"lakukan ini dalam batas yang ini.\" Jika agent diberi ruang tanpa boundary, ia cenderung mengisi ruang itu dengan solusi generik yang tidak relevan.\u003c/p\u003e\n\u003cp\u003eSpec adalah kontrol operasional: semakin otonom agent, semakin penting spec sebagai guardrail.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting-untuk-ai-native-engineering\"\u003eMengapa ini penting untuk AI-native engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting-untuk-ai-native-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKarena AI-native bukan sekadar mempermudah penulisan kode. Ini soal memindahkan pusat gravitasi kerja dari \"menulis kode\" ke \"mendefinisikan kebutuhan dan membuat batas yang dapat dieksekusi.\" \u003c/p\u003e\n\u003cp\u003eJika AI hanya dilihat sebagai penulis kode, maka focus masih di level lamanya. Jika AI dipandang sebagai pelaku operasional, maka spec menjadi kotak kendali yang menentukan arah, bukan sekadar catatan awal.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421161001\"\u003eAI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/a\u003e — AI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162310\"\u003eAI-native Software Engineering memindahkan gravitasi kerja engineering ke orkestrasi dan verifikasi AI\u003c/a\u003e — AI-native Software Engineering memindahkan gravitasi kerja engineering ke orkestrasi dan verifikasi AI\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172800\"\u003eBMAD project context adalah konstitusi implementasi untuk AI agents, bukan dokumentasi biasa\u003c/a\u003e — BMAD project context adalah konstitusi implementasi untuk AI agents, bukan dokumentasi biasa\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" targ
