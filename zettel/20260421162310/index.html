\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI-native Software Engineering bukan lagi tentang manusia menulis sebagian besar kode. Pusat tenaga utama berpindah dari implementasi manual ke orkestrasi intent, konteks, constraint, dan verifikasi output AI.\u003c/p\u003e\n\u003ch2 id=\"gravitasi-kerja-di-tiga-mode\"\u003eGravitasi kerja di tiga mode\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gravitasi-kerja-di-tiga-mode\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eClassic: tenaga utama di coding manual dan prosedur manusia.\u003c/li\u003e\n\u003cli\u003eModern: tenaga utama di automasi pipeline dan arsitektur delivery.\u003c/li\u003e\n\u003cli\u003eAI-native: tenaga utama di orkestrasi intent, constraint, context, dan verifikasi output AI.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"konsekuensi-perubahan-gravitasi\"\u003eKonsekuensi perubahan gravitasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#konsekuensi-perubahan-gravitasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"classic\"\u003eClassic\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#classic\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineering energy spent on writing code and executing manual workflows.\u003c/li\u003e\n\u003cli\u003eTools are passive helpers.\u003c/li\u003e\n\u003cli\u003eResult: high control, low speed, high bottleneck.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"modern\"\u003eModern\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#modern\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineering energy spent on designing delivery systems and maintaining automation.\u003c/li\u003e\n\u003cli\u003eTools become active guards for quality and speed.\u003c/li\u003e\n\u003cli\u003eResult: faster delivery, more repeatable process, but code generation still human-led.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"ai-native\"\u003eAI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineering energy spent on defining what should happen, why, and under what constraints.\u003c/li\u003e\n\u003cli\u003eAI acts as operational collaborator that writes, tests, and proposes changes.\u003c/li\u003e\n\u003cli\u003eResult: faster multi-file change, but output requires strong human oversight.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"titik-beratnya-berubah\"\u003eTitik beratnya berubah\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#titik-beratnya-berubah\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eIntent dan spesifikasi menjadi input utama.\u003c/li\u003e\n\u003cli\u003eContext engineering menjadi fungsi kritis.\u003c/li\u003e\n\u003cli\u003eGuardrail dan trust model menjadi bagian kerja sehari-hari.\u003c/li\u003e\n\u003cli\u003eReview manusia berubah dari memeriksa kode ke memeriksa keputusan AI.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"peringatan\"\u003ePeringatan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#peringatan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI-native bukan berarti kerja manusia hilang. Alih-alih, peran manusia bergeser dari \"penulis\" ke \"penentu batas\"\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJika human review melemah, AI-native bisa jadi false confidence machine.\u003c/li\u003e\n\u003cli\u003eJika context miskin, AI menghasilkan output generik yang tampak benar.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162253\"\u003eClassic, Modern, dan AI-native Software Engineering adalah tiga mode kerja, bukan disiplin formal\u003c/a\u003e — Classic, Modern, dan AI-native Software Engineering adalah tiga mode kerja, bukan disiplin formal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-engineering (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162320\"\u003eAI-native Software Engineering membutuhkan fondasi Modern SE agar tidak mempercepat chaos\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421192951\"\u003eSpec semakin penting ketika AI bisa menulis kode, bukan hanya karena kode lebih murah\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193756\"\u003eSpec Kit tetap relevan sebagai pipeline spesifikasi meski banyak framework AI-native muncul\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.thoughtworks-ai-native-engineering\"\u003eThoughtworks AI-native engineering sebagai literature note\u003c/a\u003e\u0
