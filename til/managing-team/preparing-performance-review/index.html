ps":{"note":{"id":"til.managing-team.preparing-performance-review","title":"Preparing Performance Review","desc":"","updated":1667200045946,"created":1667189427102,"custom":{},"fname":"til.managing-team.preparing-performance-review","type":"note","vault":{"fsPath":"vault"},"contentHash":"efcc24672b7789d7fb33cbd2f7a2a466","links":[],"anchors":{"mulai-diawal-kumpulkan-context-dan-set-goals":{"type":"header","text":"Mulai diawal; kumpulkan context dan set goals","value":"mulai-diawal-kumpulkan-context-dan-set-goals","line":12,"column":0,"depth":2},"tanya-ke-manager":{"type":"header","text":"Tanya ke manager","value":"tanya-ke-manager","line":19,"column":0,"depth":3},"tanya-kepada-teman-teman-yang-ada-di-tim":{"type":"header","text":"Tanya kepada teman-teman yang ada di tim","value":"tanya-kepada-teman-teman-yang-ada-di-tim","line":28,"column":0,"depth":3},"dengarkan-company-leaders-dan-executive":{"type":"header","text":"Dengarkan company leaders dan executive","value":"dengarkan-company-leaders-dan-executive","line":32,"column":0,"depth":3},"tanyakan-kepada-orang-orang-yang-berpengaruh":{"type":"header","text":"Tanyakan kepada orang orang yang berpengaruh","value":"tanyakan-kepada-orang-orang-yang-berpengaruh","line":38,"column":0,"depth":3},"the-power-of-habit":{"type":"header","text":"The Power of Habit","value":"the-power-of-habit","line":62,"column":0,"depth":2},"ahead-of-performance-review":{"type":"header","text":"Ahead of performance review","value":"ahead-of-performance-review","line":134,"column":0,"depth":2},"perparing-to-receive-rating":{"type":"header","text":"Perparing to receive rating","value":"perparing-to-receive-rating","line":137,"column":0,"depth":2},"how-to-not-be-that-person-who-only-cares-about-their-own-performance":{"type":"header","text":"How to not be “that person” who only cares about their own performance","value":"how-to-not-be-that-person-who-only-cares-about-their-own-performance","line":138,"column":0,"depth":2}},"children":[],"parent":"til.managing-team","data":{}},"body":"\u003ch1 id=\"preparing-performance-review\"\u003ePreparing Performance Review\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#preparing-performance-review\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eTulisan ini catatan dari artikel \u003ca href=\"https://newsletter.pragmaticengineer.com/p/preparing-for-performance-reviews\"\u003ePreparing for performance reviews ahead of time\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eBagaimana cara mempersiapkan performance review?\u003c/p\u003e\n\u003ch2 id=\"mulai-diawal-kumpulkan-context-dan-set-goals\"\u003eMulai diawal; kumpulkan context dan set goals\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mulai-diawal-kumpulkan-context-dan-set-goals\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSesuatu yang lo harus segera lakukan, idealnya lo lakukan sebulan sebelumnya.\u003c/p\u003e\n\u003cp\u003eIdentifikasi dan mengerti apa faktor yang paling penting untuk tim dan perusahaan tempat lo berkerja.\nSalah satu caranya adalah dengan bertanya ke manager.\u003c/p\u003e\n\u003ch3 id=\"tanya-ke-manager\"\u003eTanya ke manager\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tanya-ke-manager\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eApa tujuan tim ini\u003c/li\u003e\n\u003cli\u003eBagaimana tim ini terlibat didalam perusahaan\u003c/li\u003e\n\u003cli\u003eApa goal dari manager\u003c/li\u003e\n\u003cli\u003eApa yang paling penting menurut manager\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan mengerti hal-hal ini lo akan banyak membantu di tim\u003c/p\u003e\n\u003ch3 id=\"tanya-kepada-teman-teman-yang-ada-di-tim\"\u003eTanya kepada teman-teman yang ada di tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tanya-kepada-teman-teman-yang-ada-di-tim\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eTanyakan kepada mereka apa yang mereka lihat sebagai tujuan paling penting bagi tim dan perusahaan.\u003c/p\u003e\n\u003ch3 id=\"dengarkan-company-leaders-dan-executive\"\u003eDengarkan company leaders dan executive\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#dengarkan-company-leaders-dan-executive\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePerusahaan yang baik jelas tentang tujuan mereka. Temukan apa yang paling penting caranya dengan menghadiri meetings, menonton rekaman dan membaca email yang dikirim leader yang membahas prioritas.\u003c/p\u003e\n\u003cp\u003eKalau di big tech lo perlu mendengarkan beberapa seperti himbawan oraganisasi level, product org, parent organisasi, tech organisasi.\u003c/p\u003e\n\u003ch3 id=\"tanyakan-kepada-orang-orang-yang-berpengaruh\"\u003eTanyakan kepada orang orang yang berpengaruh\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tanyakan-kepada-orang-orang-yang-berpengaruh\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eCarilah 1:1 dengan rekan kerja yang memainkan peran kunci dan juga dapat diakses.\u003c/p\u003e\n\u003cp\u003eSelain lo bertanya dan memahami tujuan dan apa hal yang penting bagi organisasi. lo perlu juga untuk memahami cara kerja dari sistem performance review.\u003c/p\u003e\n\u003cp\u003eLo perlu mengumpulkan details dari sistem performa review, dengan cara seperti ini.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSiapa yang membuat keputusan akhir? Biasanya si manager, tapi perlu diklarifikasi.\u003c/li\u003e\n\u003cli\u003eSiapa yang memiliki major input dari performa review lo?\u003c/li\u003e\n\u003cli\u003eKapan review ini dilaksanakan? Cek tanggal tanggal penting yang perlu diingat. Kapan deadline dari peer review atau self review? Kapan waktu kalibrasi.\u003c/li\u003e\n\u003cli\u003eSaran tentang apa yang dapat memastikan review ini adil. Tanya ke teman teman.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBicara dengan manager tentang goals lo. Setelah lo mengumpulkan context apa yang terjadi disekitar lo. lo harus punya tujuan sendiri.\nDan tujuan lo itu harus mendukung tim dan perusahaan atau mungkin manager. Dan tentu saja, mereka harus membantu lo.\u003c/p\u003e\n\u003cp\u003eSetelah lo memiliki daftar tujuan, lo kasih ke manager untuk meminta feedback. Kalau lo punya mentor didalam organisasi, share tujuan lo ini.\nDan tanya apa yang mereka pikirkan? Tujuan mana yang paling mereka sukai? Apa yang kurang? Apa suggestion yang mereka berikan?\u003c/p\u003e\n\u003cp\u003eSepakati tujuan lo dengan manager lo. Salah satu cara terbaik untuk berada dipihak lo adalah dengan mereka mendukung tujuan lo.\u003c/p\u003e\n\u003cp\u003ePastikan tujuan lo dituliskan.\u003c/p\u003e\n\u003ch2 id=\"the-power-of-habit\"\u003eThe Power of Habit\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-power-of-habit\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBiasanya performance reveiew ini berjalan sekali atau dua kali dalam setahun. Maka dari itu lo perlu membentuk kebiasaan dalam mencatat pekerjaan harian lo.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKeep track of your wins\u003c/strong\u003e maksudnya adalah performance review biasanya bias, maka ada baiknya lo catat kejadian apa yang bagus dari hari hari lo kebelakang.\nUntuk mencounter ini, lo perlu melampirkan bukti, screenshot prais ini emails atau chat atau bukti lain.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eKeep a \"Work Log\"\u003c/strong\u003e Ini cukup mudah dengan membuat catatan lo ngapain aja dan lo membantu apa aja.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/preparing-performance-review-work-log.png\" alt=\"Work Log\"\u003e  \u003c/p\u003e\n\u003cp\u003eShare progress dengan manager lo. Buat regular 1:1 untuk catch up dengan manager setiap minggu.\nLalu bahas tentang pekerjaan yang telah lo lakukan, bicarakan tentang kemenangan lo, apa tantangan lo, tunjukan ke manager lo kalo lo mengelola semua task secara efektif.\u003c/p\u003e\n\u003cp\u003eSebagai manager, biasanya tidak tau seberapa banyak pekerjaan yang dilakukan oleh rekan kerja. Dan biasanya pekerjaan dari engineer yang lebih experience yang mengambil banyak inisiatif. Jika engineer seperti ini tidak membagikan detailnya, manager tidak akan tau apa yang sudah dilakukan.\u003c/p\u003e\n\u003cp\u003eJadi karena alasan seperti ini lebih baik lo membagikan apa yang lo lakukan dari pada lo berasumsi manager lo sudah tau.\u003c/p\u003e\n\u003cp\u003eKalau lo ada di posisi leadership. lo tulis dan kirimkan weekly  \u003ca href=\"https://lethain.com/weekly-updates/\"\u003e\"5-15 update\"\u003c/a\u003e. Maksudnya, lo tulis selama 15 menit dan tidak lebih dari 5 menit untuk membacanya.\u003c/p\u003e\n\u003cp\u003eBiasanya strukturnya seperti ini\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eWins \u003c/li\u003e\n\u003cli\u003eChallenges\u003c/li\u003e\n\u003cli\u003eFocus for the next week\u003c/li\u003e\n\u003cli\u003eWhat I learned\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAda juga yang seperti ini\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTop-of mind things\u003c/li\u003e\n\u003cli\u003eProgress this week\u003c/li\u003e\n\u003cli\u003eGoals for the next week\u003c/li\u003e\n\u003cli\u003eInteresting things I’ve come across\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUpdate seperti ini lo perlu kirim setiap minggu atau dua minggu sekali\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGet things done.\u003c/strong\u003e Semua ini gak ada gunanya kalo cuma sok sibuk tapi gak ada sesuatu yang lo deliver. Lo harus membangun reputasi lo sebagai seseorang yang \"menyelesaikan sesuatu\". \u003ca href=\"https://newsletter.pragmaticengineer.com/p/internal-politics-part-2\"\u003eInternal politics for software engineers and managers:\u003c/a\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e“‘Great’ is subjective to your environment; if possible, make sure it’s the right balance of high quality and speed. At startups, ‘great’ might lean towards shipping things quickly, while at larger companies, ‘great’ might mean well-tested and clean code, or code changes which are straightforward to review, and maintainable solutions.\u003c/p\u003e\n\u003cp\u003eSo, get familiar with what ‘great’ means in the context of your engineering organization, and gather regular feedback from your peers and managers to get a sense of how close your work is to this. Once you build up a reputation as someone who does great work, this will help others trust you.”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eHelp others.\u003c/strong\u003e Lo gak akan bisa melangkah jauh, kalau lo cuma mau melakukan apa yang lo suka aja. Lo harus menyeimbangkan pekerjaan yang membantu lo dengan pekerjaan yang membantu tim dan perusahaan. Jadi coba menawarkan bantuan ketika lo melihat kesempatan. Ini bisa berupa hal hal sepele seperti code review, menawarkan code review, memberikan feedback project dan merencanakan dokument.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eCapture this work you do to help others\u003c/strong\u003e. Salah satu sisi negatif dari membantu orang itu adalah lo jadi terlalu banyak membantu dan malah pekerjaan lo jadi gak bisa diakui.\u003c/p\u003e\n\u003cp\u003eSaran, pastikan tidak ada pekerjaan yang berarti tapi tidak diketahui, setidaknya oleh manager lo. Disinila work log dapat membantu dan juga lo dapat melihat apakah lo akan menghabiskan waktu hanya dengan membantu orang lain, kalau iya lo perlu re evaluasi penggunaan waktu lo.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAsk for specific feedback, every now and then.\u003c/strong\u003e. lo perlu meminta feedback, salah satu masalah klasik adalah tiba tiba manager lo memberikan feedback yang negatif dan lo baru tau ketika di review akhir dan lo merasa manager gak kasih tau lo. jadi dari pada lo berasumsi semua baik baik saja ada baiknya lo yang mulai bertanya.\u003c/p\u003e\n\u003cp\u003eBeberapa situasi dimana lo bisa mencari feedback.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFasilitasi meeting.\u003c/strong\u003e Lo setup meeting buat tim lo. lalu setelahnya lo bertanya pada perserta yang hadir\n\u003cul\u003e\n\u003cli\u003ebagaimana pendapat lo tentang meeting tadi\u003c/li\u003e\n\u003cli\u003eapa yang bisa lo lakukan agar bisa jadi lebih baik\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResolving an outage.\u003c/strong\u003e Lo menyelesaikan issue di production, lalu lo berfikir lo telah melakukan pekerjaan yang hebat? apa benar? lo bisa pastikan ini ke manager lo\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePresenting in front of a larger group.\u003c/strong\u003e Ketika lo presentasi didepan banyak orang lo mungkin merasa hebat atau sepertinya ada yang kurang. Kenapa gak tanya ke salah satu yang hadir disana tentang lo, apakah lo melakukan dengan baik. Lebih baik lagi kalau lo rekam dan lo rewatch dan melakukan analisa terkait performa persentasi lo.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProposing a new initiative.\u003c/strong\u003e Ketika lo mengajukan project baru ke product manager dan engineering manager dan project itu mendapat lampu hijau. ada baiknya lo bertanya ke beberapa orang yang terlibat dalam proses tersebut bagaimana menurut mereka.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLeading a project\u003c/strong\u003e Selama project lo perlu bertanya apa yang disukai mengenai proses yang ada di project ini apa yang membingungkan? Setelah project selesai lakukan retrospektif dan tentu undang teman untuk membagikan feedback bagaimana kinerja lo sebagai project lead dan apa yang bisa lo improve.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCriticizing someone else’s code.\u003c/strong\u003e ketika lo memberikan feedback ke kode seseorang, kalau lo gak yakin apakah lo mereview dengan cara terlalu lemah atau keras lo bisa minta feedback ke peer lain apakah review yang gw tulis ini baik atau tidak.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLo harus selalu minta feedback dari apa yang lo lakukan pertama kali dan perlu diingat lo harus menganggapi feedback dengan serius, dan ingat itu adalah opini bukan arahan. Dengarkan apa yang mereka katakan lalu cari tau apakah pengamatannya valid dan adakah sesuatu yang mau lo ubah dikedepannya.\u003c/p\u003e\n\u003cp\u003eCaritau feedback mana yang perlu lo tindak lanjuti. Dan semuanya diawali dengan meminta feedback kalo gak ada ya lo gak punya sesuatu yang perlu pikirin nantinya.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eInvest in connections beyond your manager and peer group.\u003c/strong\u003e lo akan menghabiskan banyak waktu lo dengan peer dan manager. Tapi kalau lo diposisi senior lo perlu lebih banyak kolaborasi dengan manager dan peer di luar dari grup lo.  \u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/preparing-performance-review-politic.png\" alt=\"Politic\"\u003e  \u003c/p\u003e\n\u003cp\u003ePertimbangkan apakah lo akan lebih banyak menghabiskan waktu dengan yang lain, coba membantu dan membangun relasi dengan tim lain. tapi perlu diingat lo melakukan ini bukan hanya sebatas nilai untuk performa review lo. tapi lo perlu membuat dampak positi di organisasi lo.\u003c/p\u003e\n\u003ch2 id=\"ahead-of-performance-review\"\u003eAhead of performance review\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ahead-of-performance-review\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"perparing-to-receive-rating\"\u003ePerparing to receive rating\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#perparing-to-receive-rating\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"how-to-not-be-that-person-who-only-cares-about-their-own-performance\"\u003eHow to not be “that person” who only cares about their own performance\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#how-to-not-be-that-person-who-only-cares-about-their-own-performance\"\u003e\u003c/a\u003e\u003c/h2\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteI
