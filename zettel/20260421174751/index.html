=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa fungsi setiap node utama dalam diagram Quick Dev?\u003c/li\u003e\n\u003cli\u003eBagaimana node-node itu membedakan jenis kegagalan berdasarkan layer?\u003c/li\u003e\n\u003cli\u003eMengapa review Quick Dev membutuhkan jalur PATCH, BAD SPEC, INTENT GAP, DEFER, dan VOID?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDiagram Quick Dev adalah sistem kompresi keputusan: setiap node berfungsi sebagai stasiun penyaringan yang memetakan input kasar ke hasil yang dapat diterima.\u003c/p\u003e\n\u003cp\u003eReview bukan hanya QA. Review adalah diagnosis untuk menentukan apakah koreksi harus dilakukan di implementasi, spec, atau intent.\u003c/p\u003e\n\u003ch2 id=\"node-breakdown\"\u003eNode breakdown\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#node-breakdown\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"initial-intent\"\u003eInitial Intent\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#initial-intent\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eState awal, bukan aksi.\u003c/p\u003e\n\u003cp\u003eFungsi: menandai bahwa input manusia biasanya masih kabur dan bukan goal eksekusi langsung.\nInput: request awal apa pun.\nOutput: bahan baku untuk klarifikasi.\nFailure mode: memperlakukan intent awal sebagai spesifikasi yang cukup.\u003c/p\u003e\n\u003ch3 id=\"clarify--route\"\u003eClarify \u0026#x26; Route\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#clarify--route\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eNode ini memurnikan intent dan memilih jalur.\u003c/p\u003e\n\u003cp\u003eFungsi: menjadikan niat coherent dan memutuskan apakah task aman ke one-shot atau perlu plan.\nInput: Initial Intent, interview manusia.\nOutput: intent lebih jelas dan rute eksekusi.\nFailure mode: under-clarification atau misrouting.\u003c/p\u003e\n\u003ch3 id=\"plan\"\u003ePlan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#plan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eNode aksi untuk task berisiko.\u003c/p\u003e\n\u003cp\u003eFungsi: membentuk strategi kerja terkompresi dan area yang akan disentuh.\nInput: intent yang diklarifikasi.\nOutput: arah kerja untuk spec.\nFailure mode: plan terlalu dangkal, terlalu berat, atau berbasis framing yang salah.\u003c/p\u003e\n\u003ch3 id=\"spec\"\u003eSpec\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#spec\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eArtefak boundary yang dibeku.\u003c/p\u003e\n\u003cp\u003eFungsi: membekukan pemahaman yang cukup matang menjadi referensi eksekusi.\nInput: plan.\nOutput: spec yang disetujui.\nFailure mode: spec lemah atau salah, memicu jalur BAD SPEC.\u003c/p\u003e\n\u003ch3 id=\"implement\"\u003eImplement\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implement\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eEksekusi model terhadap spec atau intent one-shot.\u003c/p\u003e\n\u003cp\u003eFungsi: menerjemahkan boundary ke perubahan nyata.\nInput: spec atau intent.\nOutput: hasil implementasi.\nFailure mode: bug lokal, atau kegagalan yang sebenarnya berasal dari spec/intent.\u003c/p\u003e\n\u003ch3 id=\"review\"\u003eReview\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#review\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePusat diagnosis dan routing koreksi.\u003c/p\u003e\n\u003cp\u003eFungsi: menilai hasil implementasi dan menentukan layer koreksi.\nInput: produk implementasi dan temuan reviewer.\nOutput: PATCH, BAD SPEC, INTENT GAP, DEFER, atau REJECT.\nFailure mode: salah diagnosis atau triage buruk.\u003c/p\u003e\n\u003ch3 id=\"present\"\u003ePresent\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#present\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePackaging hasil untuk keputusan manusia.\u003c/p\u003e\n\u003cp\u003eFungsi: mengubah artefak teknis menjadi ringkasan yang bisa dinilai.\nInput: hasil review yang lolos.\nOutput: presentasi hasil.\nFailure mode: presentasi buruk membuat decision expensive.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e — BMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421175034\"\u003eSimulasi Quick Dev: reset password via email menunjukkan PATCH, BAD SPEC, dan INTENT GAP\u003c/a\u003e — simulasi Quick Dev: reset password via email menunjukkan PATCH, BAD SPEC, dan INTENT GAP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"result\"\u003eResult\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#result\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKeputusan akhir manusia.\u003c/p\u003e\n\u003cp\u003eFungsi: titik terima/tolak akhir.\nInput: presentasi hasil.\nOutput: keputusan run.\nFailure mode: informasi tidak cukup jelas atau artefak sulit dinilai.\u003c/p\u003e\n\u003ch2 id=\"review-helper-nodes\"\u003eReview helper nodes\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#review-helper-nodes\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"reviewers--subagents\"\u003eReviewers / Subagents\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#reviewers--subagents\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: menyediakan sudut pandang spesifik tanpa membebani Review utama.\u003c/p\u003e\n\u003ch3 id=\"patch\"\u003ePATCH\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#patch\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: perbaikan lokal untuk masalah implementasi.\u003c/p\u003e\n\u003ch3 id=\"bad-spec\"\u003eBAD SPEC\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bad-spec\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: kembali ke Spec saat boundary eksekusi salah.\u003c/p\u003e\n\u003ch3 id=\"intent-gap\"\u003eINTENT GAP\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#intent-gap\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: kembali ke Clarify \u0026#x26; Route saat goal awal disalahtafsirkan.\u003c/p\u003e\n\u003ch3 id=\"defer\"\u003eDEFER\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#defer\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: menunda temuan incidental yang tidak kausal terhadap run saat ini.\u003c/p\u003e\n\u003ch3 id=\"deferred_workmd\"\u003edeferred_work.md\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#deferred_workmd\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: menyimpan temuan deferred agar tidak hilang.\u003c/p\u003e\n\u003ch3 id=\"reject--void\"\u003eREJECT / VOID\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#reject--void\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFungsi: menghentikan run yang tidak layak diteruskan.\u003c/p\u003e\n\u003ch2 id=\"sistem-kompresi-keputusan\"\u003eSistem kompresi keputusan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sistem-kompresi-keputusan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDiagram Quick Dev mengompres layer kegagalan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekabut awal menjadi intent,\u003c/li\u003e\n\u003cli\u003eintent menjadi plan/spec,\u003c/li\u003e\n\u003cli\u003espec menjadi perubahan kode,\u003c/li\u003e\n\u003cli\u003eperubahan kode menjadi keputusan akhir.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eItu membuat workflow lebih disiplin: jika salah, dia tahu di mana harus kembali.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga-1\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga-1\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e — BMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e — BMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003equick-dev (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\"
