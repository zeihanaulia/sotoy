ps":{"note":{"id":"book-summaries.team-topologies.the-problem-with-org-charts","title":"The Problem with Org Charts","desc":"","updated":1683595988177,"created":1683526227862,"custom":{},"fname":"book-summaries.team-topologies.the-problem-with-org-charts","type":"note","vault":{"fsPath":"vault"},"contentHash":"ba0314a871151c0db790687d1ea96be0","links":[],"anchors":{"masalah-dengan-struktur-organisasi":{"type":"header","text":"Masalah dengan Struktur Organisasi","value":"masalah-dengan-struktur-organisasi","line":9,"column":0,"depth":2},"struktur-komunikasi-dalam-organisasi":{"type":"header","text":"Struktur Komunikasi dalam Organisasi","value":"struktur-komunikasi-dalam-organisasi","line":27,"column":0,"depth":3},"berpikir-menggunakan-org-chart-adalah-masalah":{"type":"header","text":"Berpikir Menggunakan Org Chart Adalah Masalah","value":"berpikir-menggunakan-org-chart-adalah-masalah","line":37,"column":0,"depth":2},"melampaui-diagram-organisasi":{"type":"header","text":"Melampaui Diagram Organisasi","value":"melampaui-diagram-organisasi","line":49,"column":0,"depth":2},"tim-topologi-cara-baru-memikirkan-tentang-tim":{"type":"header","text":"Tim Topologi: Cara Baru Memikirkan Tentang Tim","value":"tim-topologi-cara-baru-memikirkan-tentang-tim","line":78,"column":0,"depth":2},"kebangkitan-hukum-conway":{"type":"header","text":"Kebangkitan Hukum Conway","value":"kebangkitan-hukum-conway","line":90,"column":0,"depth":3},"beban-kognitif-dan-bottlenecks":{"type":"header","text":"Beban Kognitif dan Bottlenecks","value":"beban-kognitif-dan-bottlenecks","line":106,"column":0,"depth":3},"ringkasan-rethink-struktur-tim-tujuan-dan-interaksi":{"type":"header","text":"Ringkasan: Rethink Struktur Tim, Tujuan, dan Interaksi","value":"ringkasan-rethink-struktur-tim-tujuan-dan-interaksi","line":124,"column":0,"depth":3},"catatan":{"type":"header","text":"Catatan","value":"catatan","line":138,"column":0,"depth":2}},"children":[],"parent":"book-summaries.team-topologies","data":{}},"body":"\u003ch1 id=\"the-problem-with-org-charts\"\u003eThe Problem with Org Charts\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-problem-with-org-charts\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"masalah-dengan-struktur-organisasi\"\u003eMasalah dengan Struktur Organisasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#masalah-dengan-struktur-organisasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eOrganisasi seharusnya dipandang sebagai organisme yang kompleks dan adaptif daripada sistem mekanistik dan linear.\u003c/p\u003e\n\u003cp\u003e—Naomi Stanford, Panduan Desain Organisasi\u003c/p\u003e\n\u003cp\u003ePara pekerja teknologi berada dalam keadaan aksi yang konstan: menciptakan dan memperbarui sistem dengan kecepatan yang luar biasa, serta menggabungkan berbagai jenis teknologi untuk menciptakan pengalaman pengguna yang menarik. Aplikasi seluler; layanan berbasis cloud; aplikasi web; dan perangkat IoT terbenam, dikenakan atau industri semua perlu berinteraksi secara efektif untuk mencapai hasil bisnis yang diinginkan.\u003c/p\u003e\n\u003cp\u003eHari ini, sistem-sistem ini mempengaruhi hampir setiap aspek kehidupan sehari-hari orang dengan cara yang semakin mendalam. Jika perangkat lunak dirancang dengan buruk - atau yang lebih penting, jika ada ketidakcocokan dalam interaksi perangkat lunak, penyedia, dan pelanggan - orang akan terpengaruh buruk. Mereka dapat terdampar jauh dari rumah jika aplikasi pemesanan taksi gagal. Mereka mungkin tidak dapat membayar sewa jika perangkat lunak atau proses untuk perbankan internet gagal. Mereka bahkan dapat melihat hidup mereka dalam bahaya jika perangkat medis gagal. Tidak pernah sebelumnya desain sosioteknis yang eksplisit begitu penting.\u003c/p\u003e\n\u003cp\u003eMembangun dan menjalankan sistem perangkat lunak yang sangat kompleks dan saling terhubung ini adalah kegiatan tim, yang membutuhkan upaya gabungan dari orang-orang dengan keterampilan yang berbeda di berbagai platform. Selain itu, organisasi TI modern harus memberikan dan mengoperasikan sistem perangkat lunak dengan cepat dan aman, sambil tumbuh dan beradaptasi dengan perubahan dan tekanan di lingkungan bisnis atau regulasi. Bisnis tidak lagi dapat memilih antara mengoptimalkan stabilitas dan mengoptimalkan kecepatan.\u003c/p\u003e\n\u003cp\u003eNamun, meskipun risiko dan tuntutan ini, banyak organisasi masih mengorganisir orang dan tim mereka dengan cara yang tidak produktif untuk pengembangan dan operasi perangkat lunak modern. Organisasi yang terlalu bergantung pada bagan organisasi dan matriks untuk membagi dan mengontrol pekerjaan sering gagal untuk menciptakan kondisi yang diperlukan untuk merangkul inovasi sambil tetap mengirim dengan cepat. Untuk berhasil dalam hal itu, organisasi membutuhkan tim yang stabil dan pola dan interaksi tim yang efektif. Mereka perlu berinvestasi dalam tim yang terampil dan diberdayakan sebagai dasar untuk kecepatan dan adaptabilitas. Untuk tetap hidup di pasar yang semakin kompetitif, organisasi membutuhkan tim dan orang yang mampu merasakan perubahan konteks dan berkembang sesuai.\u003c/p\u003e\n\u003cp\u003eKabar baiknya adalah memungkinkan untuk menjadi cepat dan aman dengan pola pikir yang tepat dan dengan menggunakan alat yang menekankan pada adaptabilitas serta pengulangan, sambil menempatkan tim dan individu pada pusat perhatian. Seperti yang dikatakan oleh Mark Schwartz dan rekannya dalam makalah mereka yang berjudul \"Thinking Environments\" tahun 2016, \"struktur organisasi harus mengkoordinasikan tanggung jawab untuk mendukung tujuan pengiriman perangkat lunak berkualitas tinggi dan bermakna.\" Sebagai anggota tim teknologi yang mengelola antarmuka ini, kita harus mengubah pola pikir kita dari memperlakukan tim sebagai kumpulan individu yang dapat saling dipertukarkan yang akan berhasil selama mereka mengikuti proses \"benar\" dan menggunakan alat \"benar\", menjadi memperlakukan orang dan teknologi sebagai satu ekosistem sosioteknik manusia/komputer karbon/silikon. Pada saat yang sama, kita perlu memastikan bahwa tim memiliki motivasi intrinsik dan diberi kesempatan nyata untuk melakukan pekerjaan terbaik mereka dalam sistem tersebut.\u003c/p\u003e\n\u003cp\u003eBab ini akan memperkenalkan Team Topologies sebagai model adaptif untuk desain organisasi teknologi yang memungkinkan bisnis untuk mencapai kecepatan dan stabilitas. Namun, pertama-tama, mari kita lihat bagaimana struktur komunikasi yang sebenarnya dalam sebagian besar organisasi seringkali berbeda jauh dari apa yang diberitahukan oleh struktur organisasi, dan apa implikasinya.\u003c/p\u003e\n\u003ch3 id=\"struktur-komunikasi-dalam-organisasi\"\u003eStruktur Komunikasi dalam Organisasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#struktur-komunikasi-dalam-organisasi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSebagian besar organisasi ingin atau diharuskan memiliki pandangan tunggal terhadap tim dan orang-orang mereka yang disebut \"org chart.\" Chart ini menggambarkan tim, departemen, unit, dan entitas organisasi lainnya, serta hubungan mereka satu sama lain. Biasanya, chart ini menunjukkan garis hierarki pelaporan, yang mengimplikasikan jalur komunikasi yang berjalan \"naik dan turun\" organisasi.\u003c/p\u003e\n\u003cp\u003eOrg chart memang memiliki kegunaannya dalam konteks membangun sistem perangkat lunak, terutama seputar kepatuhan hukum dan peraturan. Namun, dalam konteks kolaborasi yang sangat tinggi dan penuh ketidakpastian atas hasil yang diinginkan, mengandalkan org chart sebagai mekanisme utama untuk membagi pekerjaan yang harus dilakukan mengarah pada harapan yang tidak realistis. Sebaliknya, kita perlu mengandalkan tim yang terpisah dan berumur panjang yang dapat bekerja sama secara efektif untuk menghadapi tantangan keseimbangan kecepatan dan keamanan.\u003c/p\u003e\n\u003cp\u003eMasalahnya dengan menganggap org chart sebagai kebenaran adalah kita akhirnya mencoba membangun manusia seolah-olah mereka adalah perangkat lunak, dengan rapi mempertahankan komunikasi mereka hanya dalam garis-garis yang diterima. Namun, manusia tidak membatasi komunikasi mereka hanya pada garis-garis yang terhubung di chart tersebut. Kita mencapai siapa saja yang kita butuhkan untuk menyelesaikan pekerjaan. Kita melanggar aturan jika diperlukan untuk mencapai tujuan kita. Itulah mengapa garis komunikasi yang sebenarnya terlihat sangat berbeda dari org chart, seperti yang ditunjukkan dalam Gambar 1.1 (lihat halaman 6).\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/1683524489.png\" alt=\"Figure 1.1: Org Chart with Actual Lines of Communication In practice, people communicate laterally or “horizontally” with people from other reporting lines in order to get work done. This creativity and problem solving needs to be nurtured for the benefit of the organization, not restricted to optimize for top-down/bottom-up communication and reporting.\"\u003e\u003c/p\u003e\n\u003ch2 id=\"berpikir-menggunakan-org-chart-adalah-masalah\"\u003eBerpikir Menggunakan Org Chart Adalah Masalah\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#berpikir-menggunakan-org-chart-adalah-masalah\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eOrg chart tradisional tidak membantu kita memahami pola komunikasi aktual dalam organisasi kita, seperti yang diilustrasikan dalam Gambar 1.1. Sebagai gantinya, organisasi perlu mengembangkan gambaran yang lebih realistis tentang komunikasi yang diharapkan dan aktual yang terjadi antara individu dan tim. Kesenjangan akan membantu menginformasikan jenis sistem yang lebih cocok untuk organisasi.\u003c/p\u003e\n\u003cp\u003eSelain itu, keputusan yang didasarkan pada struktur org-chart cenderung dioptimalkan hanya untuk sebagian organisasi, mengabaikan efek hulu dan hilir. Optimisasi lokal membantu tim yang terlibat langsung, tetapi tidak selalu membantu meningkatkan pengiriman nilai secara keseluruhan kepada pelanggan. Dampak mereka mungkin diabaikan jika ada bottleneck yang lebih besar dalam aliran kerja. Misalnya, memiliki tim yang mengadopsi cloud dan infrastruktur-as-code dapat mengurangi waktu untuk menyediakan infrastruktur baru dari minggu atau bulan menjadi menit atau jam. Tetapi jika setiap perubahan membutuhkan persetujuan deployment (ke produksi) dari dewan yang bertemu sekali seminggu, maka kecepatan pengiriman akan tetap mingguan.\u003c/p\u003e\n\u003cp\u003eSistem thinking berfokus pada mengoptimalkan keseluruhan, melihat aliran kerja secara keseluruhan, mengidentifikasi bottleneck terbesar hari ini, dan mengeliminasi. Kemudian ulangi. Team Topologies berfokus pada cara menyiapkan struktur tim dan mode interaksi dinamis yang dapat membantu tim beradaptasi dengan cepat dengan kondisi baru dan mencapai pengiriman perangkat lunak yang cepat dan aman. Mungkin bukan bottleneck terbesar Anda saat ini, tetapi suatu saat nanti, Anda akan menghadapi masalah struktur tim yang kaku dengan komunikasi yang buruk dan/atau proses yang tidak memadai, yang memperlambat pengiriman.\u003c/p\u003e\n\u003cp\u003eMenganggap org chart sebagai representasi setia tentang bagaimana pekerjaan dilakukan dan bagaimana tim berinteraksi satu sama lain mengarah pada keputusan yang tidak efektif seputar alokasi pekerjaan dan tanggung jawab. Sama seperti dokumen arsitektur perangkat lunak menjadi usang segera setelah pengembangan perangkat lunak sebenarnya dimulai, org chart selalu tidak sinkron dengan realitas.\u003c/p\u003e\n\u003cp\u003eTentu saja, kami bukanlah orang pertama yang mengakui ketidakseimbangan antara struktur organisasi formal dan cara kerja sebenarnya. Buku Geary Rummler dan Alan Brache Improving Performance: How to Manage the White Space on the Organization Chart menetapkan panggung untuk perbaikan dan manajemen proses bisnis yang berkelanjutan. Fokus terbaru (setidaknya dalam TI) pada produk dan sentralitas tim, seperti yang diilustrasikan oleh buku Mik Kersten tentang beralih dari Proyek ke Produk, adalah tonggak besar lainnya. Kami suka berpikir bahwa Team Topologies adalah bagian lain dari teka-teki ini—terutama, memiliki struktur tim yang jelas dan fluid, tanggung jawab, dan mode interaksi.\u003c/p\u003e\n\u003ch2 id=\"melampaui-diagram-organisasi\"\u003eMelampaui Diagram Organisasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#melampaui-diagram-organisasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika diagram organisasi tidak mewakili struktur organisasi dengan akurat, lalu apa yang mewakilinya? Niels Pflaeging, penulis buku Organize for Complexity, mengidentifikasi tidak satu, melainkan tiga struktur organisasi yang berbeda dalam setiap organisasi:2\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eStruktur formal (diagram organisasi) - memfasilitasi kepatuhan\u003c/li\u003e\n\u003cli\u003eStruktur informal - \"wilayah pengaruh\" antara individu\u003c/li\u003e\n\u003cli\u003eStruktur penciptaan nilai - bagaimana pekerjaan sebenarnya dilakukan berdasarkan reputasi interpersonal dan antar tim\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePflaeging menyarankan bahwa kunci keberhasilan organisasi pekerjaan berbasis pengetahuan terletak pada interaksi antara struktur informal dan struktur penciptaan nilai (yaitu, interaksi antara orang dan tim).3 Penulis lain telah mengusulkan karakterisasi yang serupa, seperti Frédéric Laloux dalam Reinventing Organizations atau pendekatan Holacracy dari Brian Robertson.4\u003c/p\u003e\n\u003cp\u003ePendekatan Team Topologies mengakui pentingnya struktur informal dan struktur penciptaan nilai seperti yang ditentukan oleh Pflaeging. Dengan memberdayakan tim dan memperlakukan mereka sebagai blok bangunan fundamental, individu dalam tim tersebut menjadi lebih dekat untuk bertindak sebagai tim daripada sekadar sekelompok orang. Di sisi lain, dengan secara eksplisit menyetujui mode interaksi dengan tim lain, harapan perilaku menjadi lebih jelas dan kepercayaan antar tim meningkat.\u003c/p\u003e\n\u003cp\u003eSelama beberapa dekade terakhir, banyak pendekatan baru dalam mengorganisir bisnis, tetapi biasanya desain baru tetap menjadi pandangan statis dari organisasi yang tidak mempertimbangkan perilaku dan struktur nyata yang muncul setelah restrukturisasi. Misalnya, pendekatan \"manajemen matriks\" yang dimulai pada tahun 1990-an - dan menjadi cukup populer selama beberapa dekade berikutnya - mencoba mengatasi kompleksitas inheren pekerjaan yang sangat tidak pasti dan sangat terampil dengan meminta individu melaporkan kepada manajer bisnis dan fungsional. Meskipun fokus yang lebih jelas pada nilai bisnis dibandingkan dengan organisasi fungsional murni dari tim, ini masih menjadi pandangan dunia yang statis yang menjadi usang karena bisnis dan teknologi domain dengan cepat berkembang.\u003c/p\u003e\n\u003cp\u003eBagi pekerja, restrukturisasi seperti pengenalan manajemen matriks dapat membawa banyak ketakutan dan kekhawatiran. Seringkali, hal ini dianggap sebagai pemborosan waktu dan upaya yang lebih mungkin membuat bisnis mundur daripada maju. Dan setelah revolusi teknologi atau metodologi berikutnya terjadi, bisnis melakukan restrukturisasi lagi, merusak bentuk komunikasi yang telah mapan dan memecah tim yang baru saja mulai bekerja dengan baik.\u003c/p\u003e\n\u003cp\u003ePendekatan Team Topologies menambahkan aspek dinamis dan sensorik yang dibutuhkan untuk organisasi teknologi yang hilang dari desain organisasi tradisional.\nSudah semakin jelas bahwa mengandalkan struktur organisasi tunggal dan statis, seperti org chart atau manajemen matriks, tidak dapat dipertahankan untuk hasil yang efektif dengan sistem perangkat lunak modern. Alih-alih struktur tunggal, yang dibutuhkan adalah model yang dapat beradaptasi dengan situasi saat ini - yang mempertimbangkan bagaimana tim tumbuh dan berinteraksi satu sama lain. Team Topologies menyediakan pendekatan (r) evolusioner yang diperlukan untuk menjaga tim, proses, dan teknologi selaras untuk semua jenis organisasi.\u003c/p\u003e\n\u003cp\u003eDalam bukunya yang luar biasa pada tahun 2015, Guide to Organisation Design: Creating High-Performing and Adaptable Enterprises, Naomi Stanford mencantumkan lima aturan praktis untuk merancang organisasi:5\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eDesain saat ada alasan yang kuat.\u003c/li\u003e\n\u003cli\u003eKembangkan opsi untuk memutuskan desain.\u003c/li\u003e\n\u003cli\u003ePilih waktu yang tepat untuk merancang.\u003c/li\u003e\n\u003cli\u003eCari petunjuk bahwa hal-hal tidak sejalan.\u003c/li\u003e\n\u003cli\u003eTetap waspada terhadap masa depan.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eKetika kami terus melalui buku ini, kami akan menjelajahi cara mengatasi lima heuristik untuk desain organisasi ini.\u003c/p\u003e\n\u003ch2 id=\"tim-topologi-cara-baru-memikirkan-tentang-tim\"\u003eTim Topologi: Cara Baru Memikirkan Tentang Tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tim-topologi-cara-baru-memikirkan-tentang-tim\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePendekatan Tim Topologi membawa pemikiran baru seputar struktur tim yang efektif untuk pengiriman perangkat lunak perusahaan. Ini menyediakan panduan yang konsisten dan dapat dilaksanakan untuk mengembangkan desain tim secara terus-menerus agar bisa menyesuaikan dengan perubahan teknologi, orang, dan bisnis, mencakup ukuran, bentuk, penempatan, tanggung jawab, batas, dan interaksi tim dalam membangun dan menjalankan sistem perangkat lunak modern.\u003c/p\u003e\n\u003cp\u003eTim Topologi menyediakan empat jenis tim fundamental - yang sejalan dengan aliran kerja, platform, memungkinkan, dan sub-sistem yang rumit - dan tiga mode interaksi tim inti - kolaborasi, X-as-a-Service, dan memfasilitasi. Bersama-sama dengan kesadaran atas hukum Conway, beban kognitif tim, dan cara menjadi organisasi pencium, Tim Topologi menghasilkan pendekatan yang efektif dan humanistik untuk membangun dan menjalankan sistem perangkat lunak.\u003c/p\u003e\n\u003cp\u003eKhususnya, pendekatan ini melihat cara di mana berbagai topologi tim dapat berkembang dengan kedewasaan teknologi dan organisasi. Periode penemuan teknis dan produk biasanya memerlukan lingkungan yang sangat kolaboratif (dengan batas tim yang tumpang tindih) untuk berhasil. Namun, tetap mempertahankan struktur yang sama ketika penemuan sudah selesai (teknologi dan produk yang sudah mapan) bisa menyebabkan usaha yang sia-sia dan salah paham.\u003c/p\u003e\n\u003cp\u003eDengan menekankan model adaptif untuk desain organisasi dan secara aktif memprioritaskan interaksi tim, pendekatan Tim Topologi menyediakan mekanisme kunci yang tidak terikat teknologi bagi perusahaan-perusahaan yang bergantung pada perangkat lunak modern untuk menyadari kapan perubahan strategi diperlukan (baik dari sudut pandang bisnis atau teknologi). Tujuannya adalah untuk membantu tim memproduksi perangkat lunak yang sejalan dengan kebutuhan pelanggan dan lebih mudah untuk dibangun, dijalankan, dan dimiliki.\u003c/p\u003e\n\u003cp\u003eTim Topologi juga menekankan pendekatan humanistik dalam merancang dan membangun sistem perangkat lunak. Ia melihat tim sebagai elemen yang tidak terpisahkan dalam pengiriman perangkat lunak dan mengakui bahwa tim memiliki kapasitas kognitif yang terbatas yang perlu dihormati. Bersama dengan desain tim yang dinamis yang kuat berdasarkan hukum Conway, Tim Topologi menjadi alat strategis untuk menemukan solusi.\u003c/p\u003e\n\u003ch3 id=\"kebangkitan-hukum-conway\"\u003eKebangkitan Hukum Conway\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kebangkitan-hukum-conway\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKita telah menyebutkan pentingnya Hukum Conway sebagai pendorong untuk desain dan evolusi tim. Tetapi apa sebenarnya hukum ini?\u003c/p\u003e\n\u003cp\u003ePada tahun 1968, peneliti sistem komputer Mel Conway menerbitkan makalah di Datamation yang berjudul \"How Do Committees Invent?\" di mana dia menjelajahi hubungan antara struktur organisasi dan desain sistem yang dihasilkan. Artikel ini penuh dengan wawasan yang cemerlang, beberapa di antaranya akan kita bahas nanti dalam bab ini, tetapi inilah frasa yang dikenal sebagai hukum Conway: \"Organisasi yang merancang sistem ... terikat untuk menghasilkan desain yang merupakan salinan dari struktur komunikasi organisasi tersebut.\"\u003c/p\u003e\n\u003cp\u003eConway berdasarkan pengamatannya pada organisasi yang membangun sistem komputer elektronik awal. Menurutnya, \"hukum\" ini menunjukkan korelasi kuat antara jalur komunikasi sebenarnya suatu organisasi (struktur penciptaan nilai yang disebut Pflaeging) dan arsitektur perangkat lunak yang dihasilkan, atau apa yang disebut penulis Allan Kelly sebagai \"kekuatan homomorfik\". Kekuatan homomorfik ini cenderung membuat bentuk yang sama antara arsitektur perangkat lunak dan struktur tim. Dengan kata lain, membangun perangkat lunak membutuhkan pemahaman tentang komunikasi antar tim untuk dapat secara realistis mempertimbangkan jenis arsitektur perangkat lunak yang memungkinkan. Jika arsitektur sistem teoretis yang diinginkan tidak cocok dengan model organisasi, maka salah satu dari keduanya harus berubah.\u003c/p\u003e\n\u003cp\u003eEric Raymond menyatakan hal ini dengan cara yang lucu dalam bukunya The New Hacker's Dictionary: \"Jika Anda memiliki empat kelompok yang bekerja pada kompilator, Anda akan mendapatkan kompilator 4 kali.\"\u003c/p\u003e\n\u003cp\u003eSejak tahun 1968, semakin jelas bahwa hukum Conway terus berlaku untuk semua perangkat lunak yang dibangun. Mereka di antara kita yang telah membangun sistem perangkat lunak yang harus mematuhi \"blueprint\" arsitektur pasti ingat memiliki waktu ketika terasa seperti kita melawan arsitektur daripada membantu mengarahkan pekerjaan kita ke arah yang tepat. Nah, itu adalah hukum Conway dalam tindakan.\u003c/p\u003e\n\u003cp\u003eStruktur tim harus sesuai dengan arsitektur perangkat lunak yang dibutuhkan atau berisiko menghasilkan desain yang tidak diinginkan.\u003c/p\u003e\n\u003cp\u003eSejenis \"kebangkitan\" hukum Conway terjadi sekitar tahun 2015, ketika arsitektur mikro layanan meningkat. Khususnya, James Lewis, Direktur Teknis di Thoughtworks, dan yang lainnya mengembangkan ide untuk menerapkan \"manuver Conway terbalik\" (atau manuver Conway terbalik), di mana suatu organisasi berfokus pada mengorganisir struktur tim untuk cocok dengan arsitektur yang mereka inginkan sistem untuk memamerkan daripada mengharapkan tim untuk mengikuti desain arsitektur yang diperintahkan.\u003c/p\u003e\n\u003ch3 id=\"beban-kognitif-dan-bottlenecks\"\u003eBeban Kognitif dan Bottlenecks\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#beban-kognitif-dan-bottlenecks\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKetika kita berbicara tentang beban kognitif, mudah dipahami bahwa setiap orang memiliki batas pada berapa banyak informasi yang dapat mereka ingat dalam pikiran mereka pada setiap saat. Hal yang sama terjadi pada setiap tim dengan cara hanya menambahkan kapasitas kognitif semua anggota tim.\u003c/p\u003e\n\u003cp\u003eNamun, kami hampir tidak pernah membahas beban kognitif ketika menugaskan tanggung jawab atau bagian perangkat lunak tertentu ke suatu tim. Mungkin karena sulit untuk mengkuantifikasi kapasitas yang tersedia dan apa yang akan menjadi beban kognitifnya. Atau mungkin karena tim diharapkan untuk menyesuaikan diri dengan apa yang diminta tanpa banyak bertanya.\u003c/p\u003e\n\u003cp\u003eKetika beban kognitif tidak dipertimbangkan, tim tersebar tipis mencoba menangani jumlah tanggung jawab dan domain yang berlebihan. Tim seperti ini kekurangan kapasitas untuk mengejar penguasaan di bidangnya dan mengalami kesulitan dalam beralih konteks.\u003c/p\u003e\n\u003cp\u003eMiguel Antunes, R\u0026#x26;D Principle Software Engineer di OutSystems, sebuah vendor platform low-code, memberikan contoh tantangan ini. Tim Produktivitas Rekayasa mereka di OutSystems berusia lima tahun. Misi tim adalah membantu tim produk menjalankan build mereka dengan efisien, memelihara infrastruktur, dan meningkatkan eksekusi pengujian. Tim terus bertumbuh dan mengambil tanggung jawab tambahan seputar integrasi berkelanjutan (CI), pengiriman berkelanjutan (CD), dan otomatisasi infrastruktur.\u003c/p\u003e\n\u003cp\u003eKorban keberhasilan mereka sendiri, perencanaan sprint untuk tim yang kini terdiri dari delapan orang ini adalah campuran permintaan di seluruh tanggung jawab mereka. Prioritisasi menjadi sulit, dan sering beralih konteks bahkan dalam satu sprint mengakibatkan penurunan motivasi orang-orang. Hal ini tidak mengherankan jika kita mempertimbangkan tiga elemen motivasi intrinsik menurut Dan Pink: otonomi (terhambat oleh jongkok konstan permintaan dan prioritas dari beberapa tim), penguasaan (\"jack of all trades, master of none\"), dan tujuan (terlalu banyak domain tanggung jawab).11\u003c/p\u003e\n\u003cp\u003eSementara tim dalam contoh industri ini menyediakan layanan internal untuk tim pengembangan, efeknya sama untuk tim yang bekerja pada perangkat lunak untuk pelanggan eksternal. Jumlah layanan dan komponen yang menjadi tanggung jawab tim produk (dalam kata lain, permintaan pada tim) biasanya terus bertambah dari waktu ke waktu. Namun, pengembangan layanan baru sering direncanakan seolah-olah tim memiliki ketersediaan penuh dan beban kognitif nol untuk memulainya. Pengabaian ini problematis karena tim tetap diharuskan untuk memperbaiki dan meningkatkan layanan yang ada. Akhirnya, tim menjadi bottleneck pengiriman, karena kapasitas kognitif mereka telah jauh melebihi batas, menyebabkan keterlambatan, masalah kualitas, dan seringkali, penurunan motivasi anggota tim.\u003c/p\u003e\n\u003cp\u003eKita perlu memprioritaskan tim terlebih dahulu, menganjurkan untuk membatasi beban kognitif mereka. Berpikir secara eksplisit tentang beban kognitif bisa menjadi alat yang ampuh untuk memutuskan ukuran tim, menugaskan tanggung jawab, dan menetapkan batas dengan tim lain. (Kami akan membahas ini secara detail di Bab 3.)\u003c/p\u003e\n\u003cp\u003eSecara keseluruhan, pendekatan Topologi Tim menganjurkan desain organisasi yang dioptimalkan untuk aliran perubahan dan umpan balik dari sistem yang berjalan. Ini memerlukan pembatasan beban kognitif pada tim dan merancang komunikasi antartim secara eksplisit untuk membantu menghasilkan arsitektur sistem perangkat lunak yang kita butuhkan (berdasarkan hukum Conway).\u003c/p\u003e\n\u003ch3 id=\"ringkasan-rethink-struktur-tim-tujuan-dan-interaksi\"\u003eRingkasan: Rethink Struktur Tim, Tujuan, dan Interaksi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ringkasan-rethink-struktur-tim-tujuan-dan-interaksi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMengembangkan dan mengoperasikan perangkat lunak secara efektif untuk sistem dan layanan yang saling terhubung memerlukan organisasi untuk mempertimbangkan banyak dimensi yang berbeda. Secara historis, kebanyakan organisasi telah melihat pengembangan perangkat lunak sebagai jenis manufaktur yang harus diselesaikan oleh individu yang terpisah yang diatur ke dalam spesialisasi fungsional, dengan proyek-proyek besar yang direncanakan dari awal dan dengan sedikit pertimbangan untuk dinamika sosioteknis. Hal ini menyebabkan masalah yang umum terjadi seperti yang digambarkan pada Gambar 1.2 di halaman 12.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/1683525609.png\" alt=\"Obstacles to Fast Flow\"\u003e\u003c/p\u003e\n\u003cp\u003eGerakan Agile, Lean IT, dan DevOps membantu menunjukkan nilai besar dari tim yang lebih kecil dan lebih otonom yang sejalan dengan aliran bisnis, mengembangkan dan melepaskan dalam siklus kecil dan iteratif, serta melakukan perbaikan berdasarkan umpan balik dari pengguna. Lean IT dan DevOps juga mendorong kemajuan besar dalam alat telemetri dan metrik untuk sistem dan tim, membantu orang-orang yang membangun dan menjalankan perangkat lunak untuk membuat keputusan proaktif dan lebih dini berdasarkan tren masa lalu, daripada hanya merespons insiden dan masalah saat muncul.\u003c/p\u003e\n\u003cp\u003eNamun, organisasi tradisional sering terbatas dalam kemampuan mereka untuk sepenuhnya memanfaatkan manfaat dari Agile, Lean IT, dan DevOps karena model organisasi mereka. Tidaklah mengherankan bahwa fokus kuat pada adopsi otomatisasi dan alat, sementara perubahan budaya dan organisasi secara tidak teratur diatasi. Perubahan terakhir jauh lebih sulit untuk divisualisasikan, apalagi untuk mengukur efektivitasnya. Namun, memiliki struktur tim, pendekatan, dan interaksi yang tepat, serta memahami kebutuhan mereka untuk berevolusi dari waktu ke waktu adalah kunci yang berbeda untuk kesuksesan dalam jangka panjang.\u003c/p\u003e\n\u003cp\u003eKhususnya, diagram organisasi tradisional tidak sinkron dengan realitas baru dari pengaturan (ulang) tim untuk pengetahuan kolaboratif dalam lingkungan yang penuh dengan ketidakpastian dan kebaruan. Sebaliknya, kita perlu memanfaatkan hukum Conway (desain organisasi mendominasi desain arsitektur perangkat lunak), pembatasan beban kognitif, dan pendekatan tim-first untuk merancang tim dengan tujuan yang jelas dan mempromosikan interaksi tim yang memprioritaskan aliran pengiriman perangkat lunak dan adaptabilitas strategis.\u003c/p\u003e\n\u003cp\u003eTujuan dari Team Topologies adalah memberi Anda pendekatan dan alat mental untuk memungkinkan organisasi Anda beradaptasi dan menemukan tempat dan waktu secara dinamis ketika kolaborasi diperlukan, serta kapan yang terbaik untuk fokus pada eksekusi dan mengurangi overhead komunikasi.\u003c/p\u003e\n\u003ch2 id=\"catatan\"\u003eCatatan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKetika melakukan riset untuk buku ini, kami menemukan contoh interaksi strategis dan kolaboratif yang menarik di bidang yang sangat berbeda. Ternyata, ikan grouper dan belut moray, spesies yang tidak terkait satu sama lain (seperti silo pada umumnya), secara eksplisit bekerja sama (melalui sinyal) untuk berburu ikan kecil yang bersembunyi di celah-celah. Belut masuk ke celah dan menakuti ikan kecil, yang kemudian terpaksa keluar dan menjadi mangsa yang mudah bagi ikan grouper. Lanjutkan membaca untuk mengetahui bagaimana cara memungkinkan grouper dan belut di organisasi Anda untuk bergabung demi aliran dan hasil bisnis yang lebih baik!\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter /
