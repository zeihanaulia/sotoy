ps":{"note":{"id":"book-summaries.the-compound-effect","title":"The Compound Effect","desc":"","updated":1646860250529,"created":1646856184154,"tags":["Self Improvement","Darren Hardy"],"custom":{},"fname":"book-summaries.the-compound-effect","type":"note","vault":{"fsPath":"vault"},"contentHash":"025ed12cec151cbdfd38dcb6f7c92026","links":[{"type":"frontmatterTag","from":{"fname":"book-summaries.the-compound-effect","id":"book-summaries.the-compound-effect","vaultName":"vault"},"value":"tags.Self Improvement","alias":"Self Improvement","xvault":false,"to":{"fname":"tags.Self Improvement"}},{"type":"frontmatterTag","from":{"fname":"book-summaries.the-compound-effect","id":"book-summaries.the-compound-effect","vaultName":"vault"},"value":"tags.Darren Hardy","alias":"Darren Hardy","xvault":false,"to":{"fname":"tags.Darren Hardy"}},{"type":"wiki","from":{"fname":"book-summaries.the-compound-effect","id":"book-summaries.the-compound-effect","vaultName":"vault"},"value":"tags.self-improvement","alias":"#self-improvement","position":{"start":{"line":2,"column":1,"offset":1},"end":{"line":2,"column":18,"offset":18},"indent":[]},"xvault":false,"to":{"fname":"tags.self-improvement"}},{"type":"wiki","from":{"fname":"book-summaries.the-compound-effect","id":"book-summaries.the-compound-effect","vaultName":"vault"},"value":"tags.darren-hardy","alias":"#darren-hardy","position":{"start":{"line":3,"column":1,"offset":19},"end":{"line":3,"column":14,"offset":32},"indent":[]},"xvault":false,"to":{"fname":"tags.darren-hardy"}}],"anchors":{"the-compound-effect-in-action":{"type":"header","text":"The Compound Effect in Action","value":"the-compound-effect-in-action","line":18,"column":0,"depth":2},"action-step":{"type":"header","text":"Action Step","value":"action-step","line":43,"column":0,"depth":3},"choices":{"type":"header","text":"Choices","value":"choices","line":50,"column":0,"depth":2},"action-step-1":{"type":"header","text":"Action Step","value":"action-step-1","line":82,"column":0,"depth":3},"habits":{"type":"header","text":"Habits","value":"habits","line":88,"column":0,"depth":2},"momentum":{"type":"header","text":"Momentum","value":"momentum","line":103,"column":0,"depth":2},"action-step-2":{"type":"header","text":"Action Step","value":"action-step-2","line":125,"column":0,"depth":3},"influences":{"type":"header","text":"Influences","value":"influences","line":130,"column":0,"depth":2},"action-step-3":{"type":"header","text":"Action Step","value":"action-step-3","line":148,"column":0,"depth":3},"acceleration":{"type":"header","text":"Acceleration","value":"acceleration","line":154,"column":0,"depth":2},"action-step-4":{"type":"header","text":"Action Step","value":"action-step-4","line":171,"column":0,"depth":3},"lesson-learn":{"type":"header","text":"Lesson Learn","value":"lesson-learn","line":178,"column":0,"depth":2}},"children":[],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"the-compound-effect\"\u003eThe Compound Effect\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-compound-effect\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #840000;\" href=\"/sotoy/notes/tags.self-improvement\"\u003e#self-improvement\u003c/a\u003e\n\u003ca class=\"color-tag\" style=\"--tag-color: #490648;\" href=\"/sotoy/notes/tags.darren-hardy\"\u003e#darren-hardy\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eHal besar tidak terjadi dalam semalam, melainkan hal kecil yang dikumpulkan dan menjadi kebiasaan.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://go.darrenhardy.com/the-compound-effect-resources/\"\u003ehttps://go.darrenhardy.com/the-compound-effect-resources/\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"the-compound-effect-in-action\"\u003eThe Compound Effect in Action\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-compound-effect-in-action\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eChapter pertama judulnya The Compound Effect in Action.\u003c/p\u003e\n\u003cp\u003eCompound efek itu adalah pilihan-pilihan yang kecil yang baik, efektif dan dilakukan secara konsisten.\nDan dipilih secara sadar bukan autopilot.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eSMALL, SMART CHOICES + CONSISTENCY + TIME = RADICAL DIFFERENCE\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote\u003e\n\u003cp\u003eKalian pilih yang mana? dapet uang 3 juta dolar didepan atau 1 sen yang berlipat ganda selama 30 hari.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eJika kita pilih 3 juta didepan, ya sudah tidak akan ada penambahan lagi dihari hari berikutnya.\nTapi jika kita pilih 1 sen yang berlipat ganda kita akan mendapat total lebih dari 10juta di hari ke 30.\u003c/p\u003e\n\u003cp\u003eJika pilihan yang kecil dibuat secara konsisten maka akan menghasilkan sesuatu yang besar.\u003c/p\u003e\n\u003cp\u003eMisalnya seperti pada cerita kura-kura dan kelinci.\u003c/p\u003e\n\u003cp\u003eTaukan yang akhirnya siapa? ya, yang menang adalah si kura kura yang lambat.\u003c/p\u003e\n\u003cp\u003eKura-kura memang pelan, tapi dia konsisten selangkah demi selangkah berjalan hingga sampai tujuan.\nSedangkan kelinci yang cepat tapi tidak fokus sehingga tidak pernah sampai ke tujuan.\u003c/p\u003e\n\u003ch3 id=\"action-step\"\u003eAction Step\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#action-step\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eKita harus bertanggung jawab dengan diri kita sendiri.\u003c/li\u003e\n\u003cli\u003eTuliskan 6 langkah positif yang bisa dilakukan secara konsisten setiap hari.\u003c/li\u003e\n\u003cli\u003eTuliskan 6 langkah negatif yang ingin kita hentikan.\u003c/li\u003e\n\u003cli\u003eIdentifikasikan area dimana dulu kita pernah sukses, tapi tidak melakukannya lagi karena sudah berpuas diri.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"choices\"\u003eChoices\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#choices\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eChapter kedua judulnya Choices atau pilihan-pilihan.\u003c/p\u003e\n\u003cp\u003eSemua dimulai dari sebuah pilihan.\u003c/p\u003e\n\u003cp\u003eTidak mungkinkan, dalam semalam berat badan kita naik hingga 100kg.\nItu adalah hasil dari pilihan-pilihan buruk kita dimasa lalu.\u003c/p\u003e\n\u003cp\u003eLalu bagaimana kita menjadi lebih baik dengan memilih pilihan yang tepat?\u003c/p\u003e\n\u003cp\u003eJawabannya adalah berhenti hidup dengan autopilot dan mulai keputusan dengan sadar dan bertanggung jawab atas pilihan yang kita pilih.\u003c/p\u003e\n\u003cp\u003eIngat keberuntungan adalah Preparation + Attitude + Opportunity + Action.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eHow? “You can’t manage what you can’t measure,” so choose to start tracking every action in the part of life that you’re focussing on.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLalu, bagaimana kita bisa mengatur sesuatu yang kita gak bisa ukur?\nYa pilihannya kita bisa mulai melakukan \"tracing\" dari setiap aksi yang paling kita fokusin.\u003c/p\u003e\n\u003cp\u003eContoh,\u003c/p\u003e\n\u003cp\u003eMisalnya kita ingin menurunkan berat badan, caranya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTrack berat badan\u003c/li\u003e\n\u003cli\u003eTrack ukuran badan\u003c/li\u003e\n\u003cli\u003eTrack kalori\u003c/li\u003e\n\u003cli\u003eTrack steps\u003c/li\u003e\n\u003cli\u003eTrack waktu latihan setiap hari\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!-- TODO: Bikin contoh cerita --\u003e\n\u003ch3 id=\"action-step-1\"\u003eAction Step\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#action-step-1\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIdentifikasi satu hal yang paling kalian perjuangkan lalu mulai buat journal yang kita syukuri.\u003c/li\u003e\n\u003cli\u003eIdentifikasi satu hal kehidupan yang ingin kalian ubah dan kalian tidak bertanggung jawab 100%.\u003c/li\u003e\n\u003cli\u003eStart tracking setidaknya satu hal yang ingin diubah dan ditingkatkan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"habits\"\u003eHabits\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#habits\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eChapter ketiga judulnya habits atau kebiasaan.\u003c/p\u003e\n\u003cp\u003eMembuat habit baru memang membutuhkan waktu, sabar dengan diri sendiri.  Jika kita gagal jangan menyalahkan diri sendiri atau siapapun. Mulai coba kembali.\u003c/p\u003e\n\u003cp\u003eBagaimana kita mengambil tanggung jawab akan habit kita?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKita harus mengetahui impact dari habit yang kita lakukan terhadap hidup kita.\u003c/li\u003e\n\u003cli\u003eTetukan \"Why?\" yang memotivasi untuk mengubah perilaku.\u003c/li\u003e\n\u003cli\u003eHilangkan kebiasaan buruk.\u003c/li\u003e\n\u003cli\u003eBuat kebiasaan baik yang akan mencapai tujuan kita.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!-- TODO: Bikin contoh cerita --\u003e\n\u003ch2 id=\"momentum\"\u003eMomentum\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#momentum\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eChapter keempat judulnya momentum.\u003c/p\u003e\n\u003cp\u003eDibuku ini ada yang namanya the big mo.\nKalau kita bisa menjaga perilaku baik dalam jangka waktu yang cukup lama, kemungkinan besar kita akan masuk kedalam ritme yang alami secara konsisten.\nSaat kita sudah mengikuti ritme ini, kita akan terus membuat keputusan yang lebih baik.\u003c/p\u003e\n\u003cp\u003eKalau sudah mulai, jangan berhenti. Jika berhenti kita bukan saja kehilangan semua kerja keras sebelumnya, tapi kita juga kehilangan momentum.\u003c/p\u003e\n\u003cp\u003eKonsistensi dan ketekunan adalah penghasil efek compound.\u003c/p\u003e\n\u003cp\u003eDibuku ini daren mencontohkan,\u003c/p\u003e\n\u003cp\u003eDipagi hari dia merefleksi diri dengan 3 hal yang disyukuri. lalu memvisualisasikan apa yang mau dicapai dihari itu.\nLalu buat 3 aksi nyata untuk mewujudkannya.\u003c/p\u003e\n\u003cp\u003eLalu retrospeksi dimalam hari tentang apa yang dilakukannya hari ini. Refleksikan apa yang dipelajari dihari ini.\nApa yang bisa membuat hari esok jadi lebih baik.\u003c/p\u003e\n\u003c!-- TODO: Bikin contoh cerita --\u003e\n\u003ch3 id=\"action-step-2\"\u003eAction Step\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#action-step-2\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eBikin list dimalam hari dan morning routines.\u003c/li\u003e\n\u003cli\u003eList 3 hal dimana lo gak cukup konsisten.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"influences\"\u003eInfluences\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#influences\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eChapter kelima judulnya influences atau pengaruh\u003c/p\u003e\n\u003cp\u003eSalah satu langkah penting dalam memperbaiki kebiasaan adalah pengaruh.\nKita harus pintar-pintar memilah informasi. Otak kita adalah mesin pemroses informasi. garbage in, garbage out.\u003c/p\u003e\n\u003cp\u003eBagaimana caranya menjaga informasi yang masuk?\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ePilih media yang memberikan informasi mendekati tujuan kita dan hindari informasi berita berita tidak penting.\u003c/li\u003e\n\u003cli\u003ePilih asosiasi atau inner circle yang tepat, yang suportif dan menginpirasi.\n\u003cul\u003e\n\u003cli\u003eEvaluasi asosiasi saat ini. Apakah kita dikelilingi orang-orang yang cinta, mendukung dan menginspirasi?\u003c/li\u003e\n\u003cli\u003eVisualisasi ideal asosiasi. Kalau boleh berangan angan kira kira teman seperti apa yang kita mau?\u003c/li\u003e\n\u003cli\u003eSingkirkan yang terburuk sepenuhnya. Temukan cara untuk menjadu dari bad actor.\u003c/li\u003e\n\u003cli\u003eBatasi pertemanan, kualitas lebih penting dari kuantitas.\u003c/li\u003e\n\u003cli\u003ePerluas dan tiru yang baik.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003ePilih lingkungan yang tepat.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"action-step-3\"\u003eAction Step\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#action-step-3\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIdentifikasi pengaruh media dan informasi didalam hidup kita. Identifikasi cara untuk memproteksi dari informasi negatif.\u003c/li\u003e\n\u003cli\u003eevaluasi asosiasi saat ini. Mana yang harus dihentidan atau dibatasi? lalu bagai mana kita memperluas pertemanan yang baik.\u003c/li\u003e\n\u003cli\u003eidentifikasi 3 hal yang paling kita fokusin untuk diimprove. cari mentor disetiap area tersebut. \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"acceleration\"\u003eAcceleration\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#acceleration\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eChapter keenam judulnya acceleration atau mempercepat.\u003c/p\u003e\n\u003cp\u003eHadapilah rintangan bukan sebagai masalah, tetapi sebagai kesempatan.\nPerlu diingat pertumbuhan akan terlihat jika kita berhasil melewati rintangan-rintangan.\nDengan adanya rintangan kita dikasi kesempatan untuk belajar.\u003c/p\u003e\n\u003cp\u003eSemua orang mungkin menghadapi masalah yang sama, tapi kebanyakan dari mereka menyerah begitu saja.\u003c/p\u003e\n\u003cp\u003eBerdiri dan keluarlah, lakukan hal hal yang tidak terduga. carilah sebanyak mungkin peluang yang mengejutkan.\nAmbil aksi yang luar biasa. Manfaatkan compound efek dan kita akan menemukan cara untuk memulai pendapatan, kehidupan dan kesuksesan.\u003c/p\u003e\n\u003cp\u003eMisalnya, Kalau kita sudah rutin berolah raga dipagi hari dan kita pikir kita hanya kuat push up sebanyak 50 kali.\nCoba paksakan diri kamu untuk menambahkan 20 kali lagi. Dengan cara seperti ini kita bisa menembuat ambang batas yang baru.\u003c/p\u003e\n\u003ch3 id=\"action-step-4\"\u003eAction Step\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#action-step-4\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eIdentifikasi waktu ketika kita mencapai moment of truth dan berkomitmen untuk sampai disana.\u003c/li\u003e\n\u003cli\u003eTemukan 3 hal didalam hidup kita dimana kita bisa melakukan \"extra\" dan membuat rencana untuk melakukan lebih.\u003c/li\u003e\n\u003cli\u003eIdentifikasi 3 hal didalam hidup kita yang melewati ekspektasi lalu rencankan dan bahanya mana cara membuat \"wow\" moment.\u003c/li\u003e\n\u003cli\u003eIdentifikasi 3 cara dimana kita bisa melakukan hal-hal yang tak terduga. Temukan perbedaan antara umum, normal dan expected.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lesson-learn\"\u003eLesson Learn\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lesson-learn\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKita tidak bisa mengubah hidup kita hingga rutinitas kita berubah.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eTerima kekuatan compounding\u003c/li\u003e\n\u003cli\u003eBuat dan track pilihan pilihan secara sadar\u003c/li\u003e\n\u003cli\u003eTumbuhkan kebiasaan positof dan membuang kebiasaan buruk.\u003c/li\u003e\n\u003cli\u003eSet up rutin harian dan mingguan.\u003c/li\u003e\n\u003cli\u003eOptimasi lingkungan\u003c/li\u003e\n\u003cli\u003eAmbil aksi yang luar biasa.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eTerdengan sederhana tapi susah buat dikerjakan.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #2c6fbb;\" href=\"/sotoy/notes/tags.self-improvement\"\u003eSelf Improvement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #9cef43;\" href=\"/sotoy/notes/tags.darren-hardy\"\u003eDarren Hardy\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"al
