tama","line":23,"column":0,"depth":2},"skenario":{"type":"header","text":"Skenario","value":"skenario","line":33,"column":0,"depth":2},"clarify--route":{"type":"header","text":"Clarify \u0026 Route","value":"clarify--route","line":39,"column":0,"depth":3},"plan--spec":{"type":"header","text":"Plan \u0026 Spec","value":"plan--spec","line":55,"column":0,"depth":2},"flow-sukses-dengan-patch":{"type":"header","text":"Flow sukses dengan PATCH","value":"flow-sukses-dengan-patch","line":77,"column":0,"depth":2},"flow-bad-spec":{"type":"header","text":"Flow BAD SPEC","value":"flow-bad-spec","line":104,"column":0,"depth":2},"flow-intent-gap":{"type":"header","text":"Flow INTENT GAP","value":"flow-intent-gap","line":132,"column":0,"depth":2},"mengapa-ini-penting":{"type":"header","text":"Mengapa ini penting","value":"mengapa-ini-penting","line":163,"column":0,"depth":2},"hubungan-ke-quick-dev":{"type":"header","text":"Hubungan ke Quick Dev","value":"hubungan-ke-quick-dev","line":173,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"simulasi-quick-dev-reset-password-via-email-menunjukkan-patch-bad-spec-dan-intent-gap\"\u003eSimulasi Quick Dev: reset password via email menunjukkan PATCH, BAD SPEC, dan INTENT GAP\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#simulasi-quick-dev-reset-password-via-email-menunjukkan-patch-bad-spec-dan-intent-gap\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBagaimana Quick Dev memutuskan kapan masalah reset-password cukup di-PATCH, kapan harus kembali ke spec, dan kapan harus kembali ke intent?\u003c/li\u003e\n\u003cli\u003eMengapa fitur reset password via email cenderung masuk jalur penuh, bukan one-shot?\u003c/li\u003e\n\u003cli\u003eBagaimana review triage menjaga fokus agar workflow tidak berubah menjadi cleanup auth umum?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eFitur reset password via email adalah contoh bagus untuk Quick Dev karena risiko keamanan dan ambiguitasnya tinggi.\u003c/p\u003e\n\u003cp\u003eQuick Dev tidak sekadar mempercepat kode. Ia memisahkan tiga jenis kesalahan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePATCH = implementasi lokal perlu diperbaiki,\u003c/li\u003e\n\u003cli\u003eBAD SPEC = boundary eksekusi perlu diperbaiki,\u003c/li\u003e\n\u003cli\u003eINTENT GAP = pemahaman awal terhadap maksud user perlu dikoreksi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"skenario\"\u003eSkenario\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#skenario\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eInitial Intent: \"Tambahin forgot password ya. User harus bisa reset password lewat email.\"\u003c/p\u003e\n\u003cp\u003eIni masih terlalu longgar karena banyak aspek yang belum terjawab: user enumeration, token expiry, one-time link, rate limit, audit log, session invalidation, dan apakah akun SSO boleh ikut.\u003c/p\u003e\n\u003ch3 id=\"clarify--route\"\u003eClarify \u0026#x26; Route\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#clarify--route\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eHasil interview memadatkan intent menjadi goal yang jelas:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eemail reset link, bukan OTP\u003c/li\u003e\n\u003cli\u003etoken berlaku 15 menit\u003c/li\u003e\n\u003cli\u003elink one-time use\u003c/li\u003e\n\u003cli\u003etidak pernah bocorkan apakah email terdaftar\u003c/li\u003e\n\u003cli\u003erate limit endpoint forgot-password\u003c/li\u003e\n\u003cli\u003ekirim email async via job queue\u003c/li\u003e\n\u003cli\u003ecatat setiap reset action di audit log\u003c/li\u003e\n\u003cli\u003einvalidasi semua session aktif lain setelah reset sukses\u003c/li\u003e\n\u003cli\u003etambahkan UI \"Forgot password?\" tanpa memodifikasi flow login lain\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKarena task ini menyentuh auth flow, email, queue, dan security behavior, Quick Dev memilih jalur penuh, bukan one-shot. Ini terjadi setelah analysis phase, ketika intent cukup dipadatkan sehingga routing bisa diputuskan.\u003c/p\u003e\n\u003ch2 id=\"plan--spec\"\u003ePlan \u0026#x26; Spec\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#plan--spec\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePlan menyusun langkah kerja:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003etambah endpoint \u003ccode\u003ePOST /auth/forgot-password\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003egenerate token hash + expiry\u003c/li\u003e\n\u003cli\u003ekirim email via queue jika user ditemukan\u003c/li\u003e\n\u003cli\u003etambah endpoint \u003ccode\u003ePOST /auth/reset-password\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003evalidasi token dan set password baru\u003c/li\u003e\n\u003cli\u003einvalidasi session aktif lain\u003c/li\u003e\n\u003cli\u003ecatat audit log\u003c/li\u003e\n\u003cli\u003etambahkan UI sederhana dan tes edge case\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eSpec lalu membeku sebagai boundary:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003erespons request reset harus netral\u003c/li\u003e\n\u003cli\u003etoken satu kali pakai, berlaku 15 menit\u003c/li\u003e\n\u003cli\u003eemail non-terdaftar tidak mengungkapkan keberadaan akun\u003c/li\u003e\n\u003cli\u003esemua reset tercatat di audit log\u003c/li\u003e\n\u003cli\u003esession lain diinvalidasi setelah reset\u003c/li\u003e\n\u003cli\u003ehanya flow forgot-password yang berubah, login normal tidak berubah\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"flow-sukses-dengan-patch\"\u003eFlow sukses dengan PATCH\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#flow-sukses-dengan-patch\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eModel implementasikan sesuai spec. Review menemukan dua masalah lokal:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003epesan error token expired/invalid berbeda, membuka sinyal teknis\u003c/li\u003e\n\u003cli\u003erate limit hanya diterapkan pada reset-password, bukan forgot-password\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDiagnosis review: masalah masih dalam layer implementasi.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePATCH\u003c/strong\u003e dipilih.\u003c/p\u003e\n\u003cdiv class=\"mermaid\"\u003e\n  flowchart TD\n    A([Initial Intent]) --\u003e B[Clarify \u0026#x26; Route]\n    B --\u003e C[Plan]\n    C --\u003e D([Spec])\n    D --\u003e E[Implement]\n    E --\u003e F[Review]\n    F --\u003e|local fix| P[PATCH]\n    P --\u003e E\n    E --\u003e F\n    F --\u003e G[Present]\n    G --\u003e H([Result])\n\u003c/div\u003e\n\u003cp\u003eSetelah PATCH, implementasi diperbaiki dan review ulang. Hasilnya masuk Present dan manusia menerima.\u003c/p\u003e\n\u003ch2 id=\"flow-bad-spec\"\u003eFlow BAD SPEC\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#flow-bad-spec\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBayangkan spec disetujui tanpa menyebut session invalidation secara eksplisit.\u003c/p\u003e\n\u003cp\u003eImplementasi yang dihasilkan akan bekerja untuk reset password, tetapi tidak mengakhiri session lain.\u003c/p\u003e\n\u003cp\u003eReview menemukan bahwa behavior penting hilang dari boundary.\u003c/p\u003e\n\u003cp\u003eDiagnosis review: bukan lagi bug lokal, melainkan spec lemah.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eBAD SPEC\u003c/strong\u003e dipilih.\u003c/p\u003e\n\u003cdiv class=\"mermaid\"\u003e\n  flowchart TD\n    A([Initial Intent]) --\u003e B[Clarify \u0026#x26; Route]\n    B --\u003e C[Plan]\n    C --\u003e D([Spec])\n    D --\u003e E[Implement]\n    E --\u003e F[Review]\n    F --\u003e|spec weak| D\n    D --\u003e E\n    E --\u003e F\n    F --\u003e G[Present]\n    G --\u003e H([Result])\n\u003c/div\u003e\n\u003cp\u003eSpec direvisi untuk memasukkan \"invalidasi semua session aktif lain setelah successful reset.\" Setelah itu implementasi dijalankan ulang.\u003c/p\u003e\n\u003ch2 id=\"flow-intent-gap\"\u003eFlow INTENT GAP\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#flow-intent-gap\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSituasi lain: interview awal luput mengungkap bahwa akun enterprise SSO tidak boleh memakai flow forgot-password lokal.\u003c/p\u003e\n\u003cp\u003eSpec dibangun atas asumsi semua akun lokal dapat reset password.\u003c/p\u003e\n\u003cp\u003eReview akhir manusia menilai hasil implementasi dan berkata:\n\"Akun SSO tidak boleh masuk flow ini.\"\u003c/p\u003e\n\u003cp\u003eIni bukan bug lokal, dan bukan sekadar boundary yang lemah. Ini menunjuk ke pemahaman awal yang salah.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eINTENT GAP\u003c/strong\u003e dipilih.\u003c/p\u003e\n\u003cdiv class=\"mermaid\"\u003e\n  flowchart TD\n    A([Initial Intent]) --\u003e B[Clarify \u0026#x26; Route]\n    B --\u003e C[Plan]\n    C --\u003e D([Spec])\n    D --\u003e E[Implement]\n    E --\u003e F[Review]\n    F --\u003e|intent gap| B\n    B --\u003e C\n    C --\u003e D\n    D --\u003e E\n    E --\u003e F\n    F --\u003e G[Present]\n    G --\u003e H([Result])\n\u003c/div\u003e\n\u003cp\u003eIntent dianalisis ulang, constraint SSO ditambahkan, lalu plan/spec dibuat ulang.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa ini penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eFitur reset-password adalah test case yang baik karena risiko kecilnya tersembunyi dan failure mode-nya berbeda:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePATCH bersih saat batasan sudah benar dan hanya detail kode yang perlu dibetulkan.\u003c/li\u003e\n\u003cli\u003eBAD SPEC muncul saat boundary formal tidak memuat kebutuhan keamanan atau behavior penting.\u003c/li\u003e\n\u003cli\u003eINTENT GAP muncul saat domain constraints yang mahal tidak digali sejak awal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan membedakan ketiganya, Quick Dev menjaga human attention tetap fokus pada titik leverage besar.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-quick-dev\"\u003eHubungan ke Quick Dev\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-quick-dev\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e — inti desain Quick Dev, termasuk intent compression dan review triage\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e — node-by-node diagnosis layer dan alur koreksi\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003equick-dev (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esimulation (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eauth (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193440\"\u003ePATCH, BAD SPEC, dan INTENT GAP: diagnosis kegagalan dalam workflow AI-native\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-quick-dev\"\u003eBMAD Quick Dev sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m
