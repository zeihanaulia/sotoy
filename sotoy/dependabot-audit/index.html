3ctr\u003e\u003ctd\u003e\u003ccode\u003enode-forge\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;1.4.0\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=1.4.0\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eEd25519 forgery, RSA-PKCS forgery, DoS (override kita masih \u003ccode\u003e\u003e=1.3.1\u003c/code\u003e)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003epath-to-regexp\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;0.1.13\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=0.1.13\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS via multiple params\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003epicomatch\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;2.3.2\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=2.3.2\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS via extglob + method injection\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003etar\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;=7.5.10\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=7.5.11\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eMultiple path traversal \u0026#x26; symlink CVEs\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003ejws\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e==4.0.0\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=4.0.1\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eHMAC signature verification bypass\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003elodash\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;=4.17.23\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=4.17.21\u003c/code\u003e (partial)\u003c/td\u003e\u003ctd\u003ePrototype pollution + code injection\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003etrim\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;0.0.3\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=0.0.3\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eminimatch\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u0026#x3C;3.1.4\u003c/code\u003e atau \u003ccode\u003e\u003e=5.0.0 \u0026#x3C;5.1.8\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e\u003e=3.1.4\u003c/code\u003e dan \u003ccode\u003e\u003e=5.1.8\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS via wildcards \u0026#x26; extglob\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003ch3 id=\"kelompok-b--tidak-bisa-di-override-internal-dendronhq\"\u003eKelompok B — Tidak bisa di-override (internal \u003ccode\u003e@dendronhq/*\u003c/code\u003e)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kelompok-b--tidak-bisa-di-override-internal-dendronhq\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePackage berikut adalah bagian dari \u003ccode\u003e@dendronhq\u003c/code\u003e monorepo itu sendiri. Mereka vulnerable karena membawa sub-dep bermasalah di dalam build mereka, tapi npm overrides tidak bisa menjangkau ke dalam package yang sudah di-publish ke npm registry.\u003c/p\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003ePackage\u003c/th\u003e\u003cth\u003eVia\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/common-all\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003eminimatch\u003c/code\u003e, \u003ccode\u003etitle\u003c/code\u003e, \u003ccode\u003ezod\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/common-server\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/common-all\u003c/code\u003e, \u003ccode\u003e@sentry/node\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/engine-server\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003eremark\u003c/code\u003e, \u003ccode\u003eremark-parse\u003c/code\u003e, \u003ccode\u003esqlite3\u003c/code\u003e, \u003ccode\u003erehype-katex\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/unified\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003erehype-katex\u003c/code\u003e, \u003ccode\u003eremark\u003c/code\u003e, \u003ccode\u003eremark-parse\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/api-server\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e(via semua di atas)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/pods-core\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e(via semua di atas)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003e@dendronhq/dendron-cli\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e(root package)\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003chr\u003e\n\u003ch2 id=\"opsi-penanganan-sisa-high\"\u003eOpsi Penanganan Sisa High\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#opsi-penanganan-sisa-high\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"opsi-1--tambah-override-kelompok-a-rekomendasi\"\u003eOpsi 1 — Tambah Override Kelompok A (Rekomendasi)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#opsi-1--tambah-override-kelompok-a-rekomendasi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePaling pragmatis. Tambahkan override untuk semua Kelompok A. Ini akan mengurangi ~15-18 high dari total 27.\u003c/p\u003e\n\u003cpre class=\"language-json\"\u003e\u003ccode class=\"language-json\"\u003e\u003cspan class=\"token property\"\u003e\"overrides\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"handlebars\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=4.7.9\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"simple-git\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=3.32.3\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"axios\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=1.7.4\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"form-data\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=4.0.4\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"tar-fs\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=3.0.6\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"node-forge\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=1.4.0\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"cross-spawn\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=6.0.6\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"path-to-regexp\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=0.1.13\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"picomatch\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=2.3.2\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"tar\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=7.5.11\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"jws\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=4.0.1\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"lodash\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=4.17.21\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"trim\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=0.0.3\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"minimatch\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=3.1.4\"\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eSisa setelah ini: hanya Kelompok B (\u003ccode\u003e@dendronhq/*\u003c/code\u003e internal) yang belum bisa diperbaiki dengan cara ini.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTrade-off\u003c/strong\u003e: Ada risiko minor bahwa override versi baru tidak kompatibel dengan cara \u003ccode\u003e@dendronhq/dendron-cli\u003c/code\u003e menggunakan package tersebut — perlu test setelah apply.\u003c/p\u003e\n\u003ch3 id=\"opsi-2--terima-risk-untuk-kelompok-b-mitigate\"\u003eOpsi 2 — Terima Risk untuk Kelompok B (Mitigate)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#opsi-2--terima-risk-untuk-kelompok-b-mitigate\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKarena \u003ccode\u003e@dendronhq/dendron-cli\u003c/code\u003e dipakai sebagai \u003cstrong\u003eCLI tool lokal\u003c/strong\u003e (bukan server yang menerima input publik), banyak dari CVE Kelompok B (ReDoS di \u003ccode\u003eminimatch\u003c/code\u003e, prototype pollution di \u003ccode\u003elodash\u003c/code\u003e) tidak relevan secara praktis — exploitnya butuh input yang dikontrol attacker ke proses yang tidak terekspos.\u003c/p\u003e\n\u003cp\u003eDismiss alert Dependabot untuk Kelompok B dengan alasan \"vulnerable code path not reachable\" atau \"CLI tool only, no network exposure.\"\u003c/p\u003e\n\u003ch3 id=\"opsi-3--migrasi-dari-dendronhqdendron-cli\"\u003eOpsi 3 — Migrasi dari \u003ccode\u003e@dendronhq/dendron-cli\u003c/code\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#opsi-3--migrasi-dari-dendronhqdendron-cli\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDendron CLI terakhir publish Maret 2024 dan proyeknya tidak aktif. Opsi jangka panjang:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDendron alternatives\u003c/strong\u003e: Cek apakah ada fork aktif atau tool pengganti untuk kebutuhan vault/notes management\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRemove dependency\u003c/strong\u003e: Jika Dendron CLI tidak dipakai aktif, hapus dan ganti workflow\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVendor-in\u003c/strong\u003e: Clone dan build sendiri dari source di \u003ccode\u003eresearch/dendron\u003c/code\u003e (high effort, sudah didiskusikan sebelumnya)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"opsi-4--gunakan-npm-audit---omitdev--production-only-scope\"\u003eOpsi 4 — Gunakan \u003ccode\u003enpm audit --omit=dev\u003c/code\u003e / Production-only scope\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#opsi-4--gunakan-npm-audit---omitdev--production-only-scope\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika beberapa vulnerable package hanya dipakai di dev/build pipeline dan tidak di runtime produksi, flag ini membantu mempersempit scope alert yang perlu direspons.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"rekomendasi-final\"\u003eRekomendasi Final\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#rekomendasi-final\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eSegera\u003c/strong\u003e: Apply Opsi 1 — tambah override Kelompok A untuk menghapus semua high yang bisa di-fix\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShort-term\u003c/strong\u003e: Dismiss Kelompok B di Dependabot dengan justifikasi \"CLI-only, no public exposure\"\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLong-term\u003c/strong\u003e: Evaluasi migrasi atau removal \u003ccode\u003e@dendronhq/dendron-cli\u003c/code\u003e (Opsi 3)\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003chr\u003e\n\u003ch2 id=\"analisis-risiko-untuk-httpszeihanauliagithubiosotoy\"\u003eAnalisis Risiko untuk \u003ca href=\"https://zeihanaulia.github.io/sotoy/\"\u003ehttps://zeihanaulia.github.io/sotoy/\u003c/a\u003e\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#analisis-risiko-untuk-httpszeihanauliagithubiosotoy\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003eKonteks penting\u003c/strong\u003e: Site ini adalah \u003cstrong\u003estatic export\u003c/strong\u003e — \u003ccode\u003enext build \u0026#x26;\u0026#x26; next export\u003c/code\u003e di GitHub Actions, hasilnya file HTML/CSS/JS statis yang di-serve GitHub Pages.\nTidak ada server Node.js yang berjalan di production. Semua page menggunakan \u003ccode\u003egetStaticProps\u003c/code\u003e, tidak ada \u003ccode\u003egetServerSideProps\u003c/code\u003e atau API routes.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 id=\"konsekuensi-arsitektur-ini-terhadap-cve\"\u003eKonsekuensi arsitektur ini terhadap CVE\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#konsekuensi-arsitektur-ini-terhadap-cve\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMayoritas CVE di \u003ccode\u003enext@12\u003c/code\u003e \u003cstrong\u003etidak berlaku\u003c/strong\u003e karena tidak ada server:\u003c/p\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eCVE\u003c/th\u003e\u003cth\u003eDeskripsi\u003c/th\u003e\u003cth\u003eRelevan?\u003c/th\u003e\u003cth\u003eAlasan\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003eNext.js Authorization Bypass in Middleware\u003c/td\u003e\u003ctd\u003eBypass auth middleware\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eTIDAK\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eMiddleware tidak jalan di static export\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eNext.js HTTP Request Smuggling in rewrites\u003c/td\u003e\u003ctd\u003eSmuggling via rewrite rules\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eTIDAK\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eTidak ada server\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eNext.js SSRF via Middleware Redirect\u003c/td\u003e\u003ctd\u003eSSRF dari redirect handling\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eTIDAK\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eTidak ada server\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eNext.js Image Optimization DoS\u003c/td\u003e\u003ctd\u003eDoS via banyak request ke \u003ccode\u003e/_next/image\u003c/code\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eTIDAK\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eTidak ada image optimization server\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eNext.js Cache Poisoning / Cache Key Confusion\u003c/td\u003e\u003ctd\u003ePoisoning CDN cache\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eTIDAK\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eGitHub Pages hanya serve file statis\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eNext.js Content Injection via Image API\u003c/td\u003e\u003ctd\u003eInject konten via image endpoint\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eTIDAK\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eTidak ada endpoint\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003ch3 id=\"cve-yang-benar-benar-berbahaya\"\u003eCVE yang BENAR-BENAR berbahaya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cve-yang-benar-benar-berbahaya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKarena tidak ada server runtime, risiko bergeser ke \u003cstrong\u003ebuild pipeline\u003c/strong\u003e (GitHub Actions).\u003c/p\u003e\n\u003ch4 id=\"1-babeltraverse-7232--arbitrary-code-execution-critical-build-time\"\u003e1. \u003ccode\u003e@babel/traverse \u0026#x3C;7.23.2\u003c/code\u003e — Arbitrary Code Execution (Critical, BUILD-TIME)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-babeltraverse-7232--arbitrary-code-execution-critical-build-time\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003e\u003cstrong\u003eBerbahaya.\u003c/strong\u003e Babel dipakai saat \u003ccode\u003enext build\u003c/code\u003e mengkompilasi semua JS/TS. Jika ada kode JavaScript berbahaya yang masuk ke dalam proses build (misalnya melalui dependency yang dikompromikan atau file di repo), ini bisa mengeksekusi kode arbitrer di GitHub Actions runner — di mana \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e dan secrets lain tersedia.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eExploit butuh: kode JS berbahaya masuk ke dalam build process\u003c/li\u003e\n\u003cli\u003eImpact: RCE di GitHub Actions runner, potential secret exfiltration\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eFix\u003c/strong\u003e: Override \u003ccode\u003e@babel/traverse\u003c/code\u003e ke \u003ccode\u003e\u003e=7.23.2\u003c/code\u003e\u003c/p\u003e\n\u003ch4 id=\"2-axios0214--multiple-cve-high-build-time--client-side\"\u003e2. \u003ccode\u003eaxios@0.21.4\u003c/code\u003e — Multiple CVE (High, BUILD-TIME + CLIENT-SIDE)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-axios0214--multiple-cve-high-build-time--client-side\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003e\u003ccode\u003eaxios\u003c/code\u003e masih ada di \u003ccode\u003e@dendronhq/common-all\u003c/code\u003e. Meski tidak dipakai langsung di pages client-side (tidak ada \u003ccode\u003eimport axios\u003c/code\u003e ditemukan di code), library ini bisa dieksekusi selama proses build saat Dendron CLI memproses vault.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSSRF + credential leakage: relevan jika axios dipakai di build untuk fetch external data dengan env vars GitHub Actions\u003c/li\u003e\n\u003cli\u003eCSRF: tidak relevan (tidak ada session/cookie di static site)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eFix\u003c/strong\u003e: Override \u003ccode\u003eaxios\u003c/code\u003e di nextjs-template juga\u003c/p\u003e\n\u003ch4 id=\"3-lodash-code-injection-via-_template-high-build-time\"\u003e3. \u003ccode\u003elodash\u003c/code\u003e Code Injection via \u003ccode\u003e_.template\u003c/code\u003e (High, BUILD-TIME)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-lodash-code-injection-via-_template-high-build-time\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003e\u003ccode\u003elodash\u003c/code\u003e dipakai sebagai direct dependency di nextjs-template. Jika \u003ccode\u003e_.template()\u003c/code\u003e dipanggil dengan string yang berasal dari konten vault/notes, bisa dieksploitasi.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eExploit butuh: content dari notes/vault diteruskan ke \u003ccode\u003e_.template()\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eImpact: code injection di build time\u003c/li\u003e\n\u003cli\u003eProbabilitas rendah untuk use case notes biasa\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"cve-yang-low-risk-untuk-use-case-ini\"\u003eCVE yang LOW RISK untuk use case ini\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cve-yang-low-risk-untuk-use-case-ini\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003ePackage\u003c/th\u003e\u003cth\u003eCVE\u003c/th\u003e\u003cth\u003eKenapa Low Risk\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eminimatch\u003c/code\u003e, \u003ccode\u003ecross-spawn\u003c/code\u003e, \u003ccode\u003epicomatch\u003c/code\u003e, \u003ccode\u003emicromatch\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS\u003c/td\u003e\u003ctd\u003eBuild-time only, input adalah file paths yang dikontrol — bukan user input\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003ews\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eDoS via HTTP headers\u003c/td\u003e\u003ctd\u003eTidak ada WebSocket server\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eip\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eSSRF improper classification\u003c/td\u003e\u003ctd\u003eHanya di \u003ccode\u003e@react-native-community/cli\u003c/code\u003e (dev tool, tidak di-bundle)\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eluxon\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS\u003c/td\u003e\u003ctd\u003eInput dari notes yang dikontrol sendiri\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003esemver\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS\u003c/td\u003e\u003ctd\u003eHanya di build tools, bukan runtime\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003ejson5\u003c/code\u003e\u003c/td\u003e\u003ctd\u003ePrototype Pollution\u003c/td\u003e\u003ctd\u003eBukan di hot path dengan user input\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eimmutable\u003c/code\u003e\u003c/td\u003e\u003ctd\u003ePrototype Pollution\u003c/td\u003e\u003ctd\u003eTidak ada user-controlled input\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003eflatted\u003c/code\u003e\u003c/td\u003e\u003ctd\u003ePrototype Pollution / DoS\u003c/td\u003e\u003ctd\u003eTidak ada user-controlled input\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\u003ccode\u003ebraces\u003c/code\u003e, \u003ccode\u003edecode-uri-component\u003c/code\u003e\u003c/td\u003e\u003ctd\u003eReDoS / DoS\u003c/td\u003e\u003ctd\u003eBuild-time only\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003ch3 id=\"prioritas-fix-untuk-nextjs-template\"\u003ePrioritas Fix untuk nextjs-template\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#prioritas-fix-untuk-nextjs-template\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eTier 1 — DONE (2026-04-16):\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eOverride ditambahkan ke \u003ccode\u003enextjs-template/package.json\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"language-json\"\u003e\u003ccode class=\"language-json\"\u003e\u003cspan class=\"token property\"\u003e\"overrides\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"trim\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"0.0.3\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"@types/react\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"17.0.38\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"@babel/traverse\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=7.23.2\"\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e,\u003c/span\u003e\n  \u003cspan class=\"token property\"\u003e\"axios\"\u003c/span\u003e\u003cspan class=\"token operator\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e\"\u003e=1.7.4\"\u003c/span\u003e\n\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHasil setelah \u003ccode\u003enpm install\u003c/code\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSebelum: \u003cstrong\u003e3 critical\u003c/strong\u003e, 23 high, total 53\u003c/li\u003e\n\u003cli\u003eSesudah: \u003cstrong\u003e1 critical\u003c/strong\u003e, 23 high, total 50\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@babel/traverse\u003c/code\u003e → resolved ke \u003ccode\u003e7.29.0\u003c/code\u003e ✓\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eaxios\u003c/code\u003e → resolved ke \u003ccode\u003e1.15.0\u003c/code\u003e ✓\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSisa 1 critical: \u003ccode\u003enext@12\u003c/code\u003e itu sendiri — seluruh CVE-nya adalah server-side (middleware, image optimization, rewrites). \u003cstrong\u003eTidak berlaku\u003c/strong\u003e untuk static export di GitHub Pages.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTier 2 — Upgrade Next.js (jangka panjang):\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003enext@12\u003c/code\u003e sudah EOL. Upgrade ke \u003ccode\u003enext@14\u003c/code\u003e atau \u003ccode\u003enext@15\u003c/code\u003e akan menutup seluruh blok CVE Next.js sekaligus. Ini butuh effort lebih karena ada breaking changes, tapi ini fix yang paling bersih.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eTier 3 — Accept \u0026#x26; dismiss:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eCVE \u003ccode\u003enext@12\u003c/code\u003e server-side bisa di-dismiss di Dependabot dengan catatan: \u003cem\u003e\"Not applicable — site is a static export served via GitHub Pages, no Next.js server running in production.\"\u003c/em\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"referensi\"\u003eReferensi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#referensi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esotoy/package.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esotoy/package-lock.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enextjs-template/package.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enextjs-template/next.config.js\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/workflows/publish.yml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/zeihanaulia/sotoy/security/dependabot\"\u003eGitHub Dependabot Alerts\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaax
