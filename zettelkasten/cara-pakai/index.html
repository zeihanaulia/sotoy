anual\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cara-1-manual\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"langkah-langkah\"\u003eLangkah-langkah\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#langkah-langkah\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003e1. Tentukan jenis Zettel yang kamu butuhkan:\u003c/strong\u003e\u003c/p\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eSituasi\u003c/th\u003e\u003cth\u003eJenis\u003c/th\u003e\u003cth\u003eContoh nama file\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003ePikiran sendiri, satu klaim jelas\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003ePermanent Zettel\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.202604171430.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eSedang baca buku/artikel, mau catat\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eLiterature Note\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.literature.nama-buku.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eIde masih kasar, belum bisa dirumuskan\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eFleeting Note\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003edi \u003ccode\u003evault2/\u003c/code\u003e atau daily journal\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eMau buat peta dari banyak Zettel\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eMOC\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003e\u003ccode\u003ezettel.moc.topik-saya.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003cp\u003e\u003cstrong\u003e2. Generate ID timestamp:\u003c/strong\u003e\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003edate\u003c/span\u003e +%Y%m%d%H%M%S\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGunakan hasilnya sebagai nama file. Contoh: \u003ccode\u003ezettel.202604171430.md\u003c/code\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e3. Buat file menggunakan template:\u003c/strong\u003e\u003c/p\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003eTemplate\u003c/th\u003e\u003cth\u003eFile\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003ePermanent Zettel\u003c/td\u003e\u003ctd\u003e\u003ccode\u003eseeds/dendron.templates/templates/templates.zettel.permanent.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eLiterature Note\u003c/td\u003e\u003ctd\u003e\u003ccode\u003eseeds/dendron.templates/templates/templates.zettel.literature.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eMOC\u003c/td\u003e\u003ctd\u003e\u003ccode\u003eseeds/dendron.templates/templates/templates.zettel.moc.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003eFleeting Note\u003c/td\u003e\u003ctd\u003e\u003ccode\u003eseeds/dendron.templates/templates/templates.zettel.fleeting.md\u003c/code\u003e\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003cp\u003e\u003cstrong\u003e4. Isi konten:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJudul = klaim/pernyataan (bukan topik)\u003c/li\u003e\n\u003cli\u003eBody = tulis dengan kata-katamu sendiri\u003c/li\u003e\n\u003cli\u003eSelalu cari dan tambahkan link ke Zettel yang sudah ada\u003c/li\u003e\n\u003cli\u003eSelalu jelaskan \u003cem\u003emengapa\u003c/em\u003e sebuah link dibuat\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003e5. Update index:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBuka \u003ccode\u003evault/zettel.md\u003c/code\u003e → tambahkan entry baru\u003c/li\u003e\n\u003cli\u003eJika ada MOC yang relevan → tambahkan link di sana juga\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"cara-2-pakai-zettel-scribe-agent\"\u003eCara 2: Pakai Zettel Scribe Agent\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cara-2-pakai-zettel-scribe-agent\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"setup\"\u003eSetup\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#setup\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAgent sudah tersedia di \u003ccode\u003e.github/agents/zettel-scribe.agent.md\u003c/code\u003e. Tidak perlu konfigurasi tambahan.\u003c/p\u003e\n\u003ch3 id=\"cara-menggunakan\"\u003eCara Menggunakan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cara-menggunakan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003eBuka \u003cstrong\u003eCopilot Chat\u003c/strong\u003e di VS Code (\u003ccode\u003e⌃⌘I\u003c/code\u003e / \u003ccode\u003eCtrl+Alt+I\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eKlik dropdown agent di kiri bawah chat input → pilih \u003cstrong\u003e\"Zettel Scribe\"\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eCeritakan pikiranmu — \u003cstrong\u003ebebas, tidak perlu rapi\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eContoh input yang valid:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003egue baru baca artikel tentang bagaimana para programmer bisa burn out karena\nterus-terusan belajar hal baru tanpa ada waktu untuk mengintegrasikan pengetahuan.\nkayaknya ini berhubungan sama konsep deliberate practice yang pernah gue baca\ndi somewhere, intinya belajar tanpa refleksi itu tidak efektif.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eAgent akan:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eMenganalisis ada berapa gagasan di input kamu\u003c/li\u003e\n\u003cli\u003eMenentukan jenis Zettel yang tepat\u003c/li\u003e\n\u003cli\u003eMencari Zettel yang sudah ada dan relevan\u003c/li\u003e\n\u003cli\u003eMenulis ulang menjadi Zettel yang proper (klaim atomik, bahasa jelas)\u003c/li\u003e\n\u003cli\u003eMembuat file dengan ID timestamp yang benar\u003c/li\u003e\n\u003cli\u003eMenghubungkan ke Zettel yang sudah ada beserta konteks mengapa\u003c/li\u003e\n\u003cli\u003eUpdate index/MOC yang relevan\u003c/li\u003e\n\u003cli\u003eMelaporkan hasilnya ke kamu\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"contoh-output-agent\"\u003eContoh Output Agent\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-output-agent\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cpre\u003e\u003ccode\u003e✅ Dibuat: vault/zettel.202604171430.md\n   Judul: \"Belajar tanpa refleksi tidak mengintegrasikan pengetahuan baru ke skema yang ada\"\n   Jenis: Permanent Zettel\n\n🔗 Koneksi yang dibuat:\n   → [[zettel.202604170002]] — karena keduanya berargumen bahwa tanpa proses\n     elaborasi aktif (menulis/refleksi), informasi baru tidak berubah menjadi\n     pengetahuan yang bisa digunakan\n   → [[zettel.202604170003]] — gagasan ini memperkuat argumen bahwa koneksi\n     antar ide (bukan koleksi) adalah kunci pembelajaran efektif\n\n📍 Diindeks di:\n   → vault/zettel.md\n   → vault/zettel.moc.personal-knowledge-management.md (klaster \"Prinsip Belajar Efektif\")\n\n💡 Saran langkah berikutnya:\n   Apakah kamu mau membuat Zettel tentang apa itu \"deliberate practice\" \n   dan kenapa ia berbeda dari sekedar latihan berulang?\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2 id=\"konvensi-penamaan\"\u003eKonvensi Penamaan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#konvensi-penamaan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cpre\u003e\u003ccode\u003evault/\n├── zettel.md                                    ← root index, update setiap ada Zettel baru\n├── zettel.202604170001.md                       ← permanent Zettel (ID = timestamp)\n├── zettel.202604171430.md                       ← permanent Zettel lain\n├── zettel.literature.building-a-second-brain.md ← literature note\n├── zettel.literature.nama-buku-lain.md\n└── zettel.moc.personal-knowledge-management.md  ← MOC / peta topik\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2 id=\"aturan-emas\"\u003eAturan Emas\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#aturan-emas\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-judul--klaim-bukan-topik\"\u003e1. Judul = Klaim, Bukan Topik\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-judul--klaim-bukan-topik\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cdiv class=\"table-responsive\"\u003e\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\u003ctable\u003e\u003cthead\u003e\u003ctr\u003e\u003cth\u003e❌ Topik (hindari)\u003c/th\u003e\u003cth\u003e✅ Klaim (pakai ini)\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e\u003ctr\u003e\u003ctd\u003e\"Pair Programming\"\u003c/td\u003e\u003ctd\u003e\"Pair programming menemukan bug 15x lebih cepat dibanding code review async\"\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\"Motivasi\"\u003c/td\u003e\u003ctd\u003e\"Motivasi eksternal merusak motivasi intrinsik jangka panjang\"\u003c/td\u003e\u003c/tr\u003e\u003ctr\u003e\u003ctd\u003e\"Tidur\"\u003c/td\u003e\u003ctd\u003e\"Tidur cukup meningkatkan konsolidasi memori lebih dari latihan tambahan\"\u003c/td\u003e\u003c/tr\u003e\u003c/tbody\u003e\u003c/table\u003e\u003c/div\u003e\n\u003ch3 id=\"2-satu-zettel--satu-gagasan\"\u003e2. Satu Zettel = Satu Gagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-satu-zettel--satu-gagasan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika kamu menulis dua paragraf yang membahas dua hal berbeda → dua Zettel.\u003c/p\u003e\n\u003ch3 id=\"3-link--konteks--mengapa\"\u003e3. Link = Konteks + Mengapa\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-link--konteks--mengapa\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cpre class=\"language-markdown\"\u003e\u003ccode class=\"language-markdown\"\u003e❌ Buruk:\nLihat juga: [[zettel.202604170001]]\n\n✅ Baik:\nGagasan ini \u003cspan class=\"token bold\"\u003e\u003cspan class=\"token punctuation\"\u003e**\u003c/span\u003e\u003cspan class=\"token content\"\u003emenguatkan\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e**\u003c/span\u003e\u003c/span\u003e [[zettel.202604170001]] karena keduanya berargumen\nbahwa sistem eksternal membebaskan working memory untuk tugas yang lebih penting\ndaripada sekadar mengingat fakta.\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 id=\"4-tulis-ulang-jangan-copy-paste\"\u003e4. Tulis Ulang, Jangan Copy-Paste\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-tulis-ulang-jangan-copy-paste\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSelalu tulis dengan kata-katamu sendiri. Boleh ada quote, tapi harus ada interpretasimu setelah itu.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"pertanyaan-yang-sering-muncul\"\u003ePertanyaan yang Sering Muncul\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-sering-muncul\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cstrong\u003eQ: Zettel saya sudah ada, boleh diedit?\u003c/strong\u003e\nBoleh, tapi hindari mengubah klaim utama. Tambahkan koneksi baru atau klarifikasi sesuai perkembangan pemikiran. Jangan hapus konten lama — Zettel adalah rekam jejak berpikir.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ: Apa bedanya sama \u003ccode\u003ebook-summaries.*\u003c/code\u003e yang sudah ada?\u003c/strong\u003e\n\u003ccode\u003ebook-summaries.*\u003c/code\u003e adalah ringkasan bab per bab — berguna sebagai catatan awal. Tapi untuk Zettelkasten, kamu perlu mengekstrak gagasan-gagasan individual menjadi Zettel terpisah. Anggap \u003ccode\u003ebook-summaries.*\u003c/code\u003e sebagai \u003cem\u003efleeting note\u003c/em\u003e yang perlu diproses.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ: Berapa ideal jumlah Zettel?\u003c/strong\u003e\nTidak ada target jumlah. Yang penting: setiap Zettel baru \u003cstrong\u003eterhubung\u003c/strong\u003e ke yang sudah ada. Mulai terasa berguna setelah 50-100 Zettel saling terhubung.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eQ: Bahasa Indonesia atau Inggris?\u003c/strong\u003e\nBebas — gunakan bahasa sesuai sumber atau pikiranmu. Agent akan mengikuti bahasa inputmu.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat Juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.zettelkasten\"\u003eZettelkasten di Dendron — Panduan Implementasi\u003c/a\u003e — panduan konsep Zettelkasten (mengapa dan apa)\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e — root index semua Zettel di vault ini\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.personal-knowledge-management\"\u003eMOC: Personal Knowledge Management\u003c/a\u003e — contoh MOC\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.building-a-second-brain\"\u003eLiterature Note — Building a Second Brain\u003c/a\u003e — contoh literature note\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — contoh permanent Zettel\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #de9dac;\" href=\"/sotoy/notes/tags.zettelkasten\"\u003ezettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #c7fdb5;\"
