azure\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"1-pendahuluan\"\u003e1. Pendahuluan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-pendahuluan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eLo mungkin udah sering denger soal \u003cstrong\u003eFlowise\u003c/strong\u003e—platform open-source yang simpel buat bikin chatflow AI dan integrasi ke berbagai sumber data. Kenapa Flowise? Karena dia bener-bener plug and play: lu tinggal deploy, bikin workflow, dan langsung bisa ngobrol pake LLM kayak ChatGPT. Ga usah repot setup backend ribet—langsung gas.\u003c/p\u003e\n\u003cp\u003eDi tutorial kali ini, kita bakal setup Flowise dari awal sampe jalan di server, pake VM. Tapi apa sih \u003cstrong\u003eVM\u003c/strong\u003e itu?\nSingkatnya, VM (Virtual Machine) adalah server virtual yang lu bisa sewa dan kontrol sendiri. Ibaratnya kayak PC lo, tapi jalan di cloud. Lu bisa pilih: mau di Azure, AWS, GCP—semua sama prinsipnya. Kali ini, gue contohin di \u003cstrong\u003eAzure VM\u003c/strong\u003e, tapi langkahnya bakal sama aja kalau lu mau pake yang lain.\u003c/p\u003e\n\u003cp\u003eKenapa pake VM?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eKarena \u003cstrong\u003eFlowise\u003c/strong\u003e itu butuh environment yang stabil dan bisa diakses internet.\u003c/li\u003e\n\u003cli\u003eGa ribet: lu punya full akses buat ngatur environment, install apa aja, aman.\u003c/li\u003e\n\u003cli\u003eBisa di-scale: nanti butuh worker, tinggal jalanin worker. Mau load balancer? Tinggal setup.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJadi, di sini kita bakal \u003cstrong\u003ebikin VM di Azure, setup environment (Docker, Compose), deploy Flowise sampe kelar\u003c/strong\u003e.\nNextnya, lu bisa lanjut ke worker (buat load queue), bikin backup otomatis, sampe customin environment. Tapi yang penting: Flowise harus hidup dulu.\u003c/p\u003e\n\u003cp\u003eOke, Section 2 gue lanjut!\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"2-persiapan-vm\"\u003e2. Persiapan VM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-persiapan-vm\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSebelum Flowise bisa jalan, kita butuh environment-nya dulu: \u003cstrong\u003eVM\u003c/strong\u003e (Virtual Machine) yang siap jadi rumah Flowise. Gue bakal bahas mulai dari bikin VM sampe nyiapin environment dasarnya.\u003c/p\u003e\n\u003cp\u003eOke, mari kita revisi dan bikin lebih detail, biar bener-bener komprehensif. Ini \u003cstrong\u003eSection 2.1 Buat VM di Azure\u003c/strong\u003e yang lebih mendalam!\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"21-buat-vm-di-azure-langkah-lengkap\"\u003e2.1 Buat VM di Azure (Langkah Lengkap)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#21-buat-vm-di-azure-langkah-lengkap\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e\u003cstrong\u003eKenapa VM?\u003c/strong\u003e\nKarena Flowise bakal jalan stabil di environment yang dedicated. Azure VM ini semacam “rumah” yang lu kelola sendiri — lu bisa atur CPU, RAM, disk space, dan keamanan sesuai kebutuhan.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLangkah-langkah lengkapnya:\u003c/strong\u003e\u003c/p\u003e\n\u003ch4 id=\"a-akses-portal-azure\"\u003ea. Akses Portal Azure\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-akses-portal-azure\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003col\u003e\n\u003cli\u003eBuka browser dan login ke \u003ca href=\"https://portal.azure.com/\"\u003eAzure Portal\u003c/a\u003e.\u003c/li\u003e\n\u003cli\u003eDi sidebar kiri, klik \u003cstrong\u003eVirtual Machines\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch4 id=\"b-mulai-buat-vm\"\u003eb. Mulai Buat VM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#b-mulai-buat-vm\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003col\u003e\n\u003cli\u003eKlik \u003cstrong\u003e+ Create\u003c/strong\u003e \u003e \u003cstrong\u003eAzure Virtual Machine\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eLu bakal lihat form “Create a virtual machine”.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch4 id=\"c-basic-details\"\u003ec. Basic Details\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#c-basic-details\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSubscription\u003c/strong\u003e: biasanya udah default ke subscription lu.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResource Group\u003c/strong\u003e: pilih yang udah ada, atau klik \u003cstrong\u003eCreate new\u003c/strong\u003e buat bikin resource group baru (misalnya \u003ccode\u003erg-flowise\u003c/code\u003e).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVirtual machine name\u003c/strong\u003e: nama VM lu, misalnya \u003ccode\u003etest-vm-1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegion\u003c/strong\u003e: pilih region yang dekat sama user. Kalau buat testing, \u003ccode\u003eSoutheast Asia\u003c/code\u003e atau \u003ccode\u003eEast Asia\u003c/code\u003e biasanya bagus.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAvailability options\u003c/strong\u003e: default \u003ccode\u003eNo infrastructure redundancy required\u003c/code\u003e (oke buat testing).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eImage\u003c/strong\u003e: pilih \u003cstrong\u003eUbuntu 22.04 LTS\u003c/strong\u003e (versi stabil dan familiar).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSize\u003c/strong\u003e: klik \u003cstrong\u003eSee all sizes\u003c/strong\u003e dan pilih yang pas. Buat testing, \u003ccode\u003eB1s\u003c/code\u003e udah cukup (1 vCPU, 1 GB RAM).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuthentication type\u003c/strong\u003e:\n\u003cul\u003e\n\u003cli\u003ePilih \u003cstrong\u003eSSH public key\u003c/strong\u003e biar lebih aman.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUsername\u003c/strong\u003e: misalnya \u003ccode\u003eazureuser\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSSH public key source\u003c/strong\u003e: biasanya lu udah punya key di \u003ccode\u003e~/.ssh/id_rsa.pub\u003c/code\u003e. Copy paste ke kolom ini.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInbound port rules\u003c/strong\u003e:\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePublic inbound ports\u003c/strong\u003e: \u003ccode\u003eAllow selected ports\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSelect inbound ports\u003c/strong\u003e: pilih \u003ccode\u003eSSH (22)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eNanti kita atur port lain (3000 buat Flowise, 6379 buat Redis).`\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4 id=\"d-disk-dan-storage\"\u003ed. Disk dan Storage\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#d-disk-dan-storage\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOS disk type\u003c/strong\u003e: defaultnya \u003cstrong\u003eStandard SSD\u003c/strong\u003e (cukup untuk testing).\u003c/li\u003e\n\u003cli\u003eKalau butuh data disk tambahan, nanti bisa attach disk lain.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4 id=\"e-networking\"\u003ee. Networking\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#e-networking\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003eAzure otomatis bikin Virtual Network dan Subnet.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePublic IP\u003c/strong\u003e: biar lu bisa SSH, pastikan aktif.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNIC network security group\u003c/strong\u003e: defaultnya bikin \u003cstrong\u003eBasic\u003c/strong\u003e rule SSH (22). Nanti lu bisa atur rule buat 3000 \u0026#x26; 6379 manual kalau perlu.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4 id=\"f-management-monitoring-dan-lainnya\"\u003ef. Management, Monitoring, dan lainnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#f-management-monitoring-dan-lainnya\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eBuat testing, lu bisa biarin default.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eKalau buat production, pastikan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBoot diagnostics\u003c/strong\u003e: aktif.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuto-shutdown\u003c/strong\u003e: aktifin biar hemat biaya kalo lupa shutdown.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4 id=\"g-review--create\"\u003eg. Review \u0026#x26; Create\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#g-review--create\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003eKlik \u003cstrong\u003eReview + create\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eAzure bakal validasi. Kalau ga ada error, klik \u003cstrong\u003eCreate\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTunggu 1–2 menit sampe VM ready.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"h-ssh-ke-vm\"\u003eh. SSH ke VM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#h-ssh-ke-vm\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003eSetelah VM aktif, liat \u003cstrong\u003ePublic IP address\u003c/strong\u003e di dashboard VM.\u003c/li\u003e\n\u003cli\u003eDi terminal lokal lu:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003essh\u003c/span\u003e azureuser@\u003cspan class=\"token operator\"\u003e\u0026#x3C;\u003c/span\u003epublic-ip\u003cspan class=\"token operator\"\u003e\u003e\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGanti \u003ccode\u003e\u0026#x3C;public-ip\u003e\u003c/code\u003e dengan IP VM lu. Kalau pake password, dia bakal minta password. Kalau pake SSH key, langsung connect.\u003c/p\u003e\n\u003ch4 id=\"i-atur-firewall-buat-port-flowise--redis\"\u003ei. Atur Firewall Buat Port Flowise \u0026#x26; Redis\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#i-atur-firewall-buat-port-flowise--redis\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eBy default, cuma port 22 yang kebuka. Flowise jalan di port 3000 dan Redis di 6379. Jadi:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eBalik ke Azure Portal.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMasuk ke VM \u003e \u003cstrong\u003eNetworking\u003c/strong\u003e.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eKlik \u003cstrong\u003eAdd inbound port rule\u003c/strong\u003e:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSource\u003c/strong\u003e: Any\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSource port ranges\u003c/strong\u003e: *\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDestination\u003c/strong\u003e: Any\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDestination port ranges\u003c/strong\u003e: 3000\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProtocol\u003c/strong\u003e: TCP\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAction\u003c/strong\u003e: Allow\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePriority\u003c/strong\u003e: 300 (biar ga bentrok sama rule lain).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eName\u003c/strong\u003e: allow-3000\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eUlangi buat port 6379 (Redis).\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003ch4 id=\"j-sekarang-vm-lu-siap\"\u003ej. Sekarang VM lu siap\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#j-sekarang-vm-lu-siap\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003eOS Ubuntu 22.04 LTS\u003c/li\u003e\n\u003cli\u003ePort 22 (SSH), 3000 (Flowise), 6379 (Redis) udah kebuka\u003c/li\u003e\n\u003cli\u003eSSH udah bisa dipake\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUdah. Tinggal setup environment dasar (update OS, pasang Docker, dll.) di section selanjutnya.\u003c/p\u003e\n\u003ch3 id=\"22-akses-vm\"\u003e2.2 Akses VM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#22-akses-vm\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSetelah VM jadi, lu dapet public IP. Buka terminal lokal lu:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003essh\u003c/span\u003e azureuser@\u003cspan class=\"token operator\"\u003e\u0026#x3C;\u003c/span\u003epublic-ip\u003cspan class=\"token operator\"\u003e\u003e\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eGanti \u003ccode\u003e\u0026#x3C;public-ip\u003e\u003c/code\u003e pake IP VM yang lu buat.\u003c/p\u003e\n\u003cp\u003eKalau pake password, dia minta password. Kalau SSH key, tinggal masuk aja.\u003c/p\u003e\n\u003cp\u003eUdah connect? Mantap. Kita lanjut ke setup dasar.\u003c/p\u003e\n\u003ch3 id=\"23-update--install-basic-tools\"\u003e2.3 Update \u0026#x26; Install Basic Tools\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#23-update--install-basic-tools\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKarena ini VM fresh, kita update dulu biar paketnya aman dan terbaru:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e update \u003cspan class=\"token operator\"\u003e\u0026#x26;\u0026#x26;\u003c/span\u003e \u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e upgrade -y\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eInstall tools basic yang sering kepake:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e \u003cspan class=\"token function\"\u003einstall\u003c/span\u003e -y \u003cspan class=\"token function\"\u003egit\u003c/span\u003e \u003cspan class=\"token function\"\u003ecurl\u003c/span\u003e \u003cspan class=\"token function\"\u003ewget\u003c/span\u003e \u003cspan class=\"token function\"\u003ehtop\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eNanti lu bisa pake \u003ccode\u003ehtop\u003c/code\u003e buat monitor load VM.\u003c/p\u003e\n\u003ch3 id=\"24-pasang-docker--docker-compose\"\u003e2.4 Pasang Docker \u0026#x26; Docker Compose\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#24-pasang-docker--docker-compose\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eFlowise butuh Docker biar ga ribet dependensi.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eInstall Docker:\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003ecurl\u003c/span\u003e -fsSL https://get.docker.com -o get-docker.sh\n\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003esh\u003c/span\u003e get-docker.sh\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"2\"\u003e\n\u003cli\u003eCek Docker udah jalan:\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e systemctl status \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\"\u003e\n\u003cli\u003eInstall Docker Compose (biar gampang manage multi-container):\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e \u003cspan class=\"token function\"\u003einstall\u003c/span\u003e -y \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"4\"\u003e\n\u003cli\u003eBiar ga pake \u003ccode\u003esudo\u003c/code\u003e terus, tambahin user ke grup Docker:\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eusermod\u003c/span\u003e -aG \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e \u003cspan class=\"token environment constant\"\u003e$USER\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKeluar SSH (\u003ccode\u003eexit\u003c/code\u003e) dan masuk lagi biar group Docker langsung aktif.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003eDi sini, VM lu udah siap buat deploy Flowise. Docker dan Compose udah jalan. Next, kita bakal setup Flowise bareng config dasar (pake file \u003ccode\u003e.env\u003c/code\u003e, \u003ccode\u003edocker-compose.yml\u003c/code\u003e, dll).\u003c/p\u003e\n\u003cp\u003eOke, lanjut ke \u003cstrong\u003eSection 3: Deploy Flowise\u003c/strong\u003e?\u003c/p\u003e\n\u003cp\u003eOke, kita lanjut ke \u003cstrong\u003eSection 3: Setup Environment Dasar di VM\u003c/strong\u003e. Ini bagian penting biar VM lu siap buat deploy Flowise dan Redis.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"3-setup-environment-dasar-di-vm\"\u003e3. Setup Environment Dasar di VM\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-setup-environment-dasar-di-vm\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBegitu lu SSH ke VM, kita langsung rapihin environment-nya supaya stabil dan ga bikin pusing ke depannya.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ea. Update OS\u003c/strong\u003e\nPertama, update OS ke versi terbaru biar aman dan stabil:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e update \u003cspan class=\"token operator\"\u003e\u0026#x26;\u0026#x26;\u003c/span\u003e \u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e upgrade -y\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eIni bakal ambil update security patch dan package terbaru. Tunggu sampe kelar.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eb. Install Dependency Dasar\u003c/strong\u003e\nFlowise butuh Docker \u0026#x26; Docker Compose. Kita pasang dulu:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eInstall Docker:\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e \u003cspan class=\"token function\"\u003einstall\u003c/span\u003e docker.io -y\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"2\"\u003e\n\u003cli\u003e\u003cstrong\u003eEnable dan Start Docker:\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e systemctl \u003cspan class=\"token builtin class-name\"\u003eenable\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e\n\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e systemctl start \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\"\u003e\n\u003cli\u003e\u003cstrong\u003eCek Docker:\u003c/strong\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003edocker\u003c/span\u003e --version\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHarusnya muncul versi Docker.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ec. Install Docker Compose\u003c/strong\u003e\nDocker Compose biasanya ga include di Ubuntu. Kita install manual:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eapt\u003c/span\u003e \u003cspan class=\"token function\"\u003einstall\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e -y\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eCek versi:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e --version\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ed. Tambah User ke Group Docker (opsional)\u003c/strong\u003e\nSupaya ga perlu \u003ccode\u003esudo\u003c/code\u003e tiap kali jalanin Docker:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003eusermod\u003c/span\u003e -aG \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e \u003cspan class=\"token environment constant\"\u003e$USER\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKeluar dan login lagi biar groupnya kebaca:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token builtin class-name\"\u003eexit\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eTerus SSH lagi ke VM.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ee. Cek Firewall (Opsional)\u003c/strong\u003e\nKadang firewall VM nutup port default:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e ufw status\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau aktif dan lu mau atur rule:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e ufw allow \u003cspan class=\"token number\"\u003e3000\u003c/span\u003e/tcp\n\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e ufw allow \u003cspan class=\"token number\"\u003e6379\u003c/span\u003e/tcp\n\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e ufw reload\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ef. Tes Docker\u003c/strong\u003e\nLu bisa coba jalanin container dummy buat tes:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003edocker\u003c/span\u003e run hello-world\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau muncul “Hello from Docker!”, environment Docker lu udah beres.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eg. Siapin Direktori Project\u003c/strong\u003e\nLu bisa buat satu folder buat simpen semua file:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003emkdir\u003c/span\u003e ~/myapp\n\u003cspan class=\"token builtin class-name\"\u003ecd\u003c/span\u003e ~/myapp\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch3 id=\"4-deploy-flowise--redis-pakai-docker-compose\"\u003e4. Deploy Flowise \u0026#x26; Redis pakai Docker Compose\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-deploy-flowise--redis-pakai-docker-compose\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSekarang kita udah punya environment yang siap tempur. Waktunya deploy Flowise barengan Redis pake Docker Compose.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ea. Buat File \u003ccode\u003e.env\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eSimpan environment variable di satu file \u003ccode\u003e.env\u003c/code\u003e. Contoh paling basic:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003ecat\u003c/span\u003e \u003cspan class=\"token operator\"\u003e\u0026#x3C;\u0026#x3C;\u003c/span\u003e\u003cspan class=\"token string\"\u003eEOF\u003cspan class=\"token bash punctuation\"\u003e \u003cspan class=\"token operator\"\u003e\u003e\u003c/span\u003e .env\u003c/span\u003e\nPORT=3000\nDATABASE_PATH=/root/.flowise\nSECRETKEY_PATH=/root/.flowise\nLOG_PATH=/root/.flowise/logs\nBLOB_STORAGE_PATH=/root/.flowise/storage\nJWT_AUTH_TOKEN_SECRET=secret\nJWT_REFRESH_TOKEN_SECRET=secret\nJWT_ISSUER=flowise\nJWT_AUDIENCE=flowise\nEXPRESS_SESSION_SECRET=flowise\n\nREDIS_HOST=redis\nREDIS_PORT=6379\nMODE=queue\nQUEUE_NAME=flowise-queue\nQUEUE_REDIS_EVENT_STREAM_MAX_LEN=100000\nEOF\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eb. Buat File \u003ccode\u003edocker-compose.yml\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eIni file utama yang bakal jalanin Flowise \u0026#x26; Redis:\u003c/p\u003e\n\u003cpre class=\"language-yaml\"\u003e\u003ccode class=\"language-yaml\"\u003e\u003cspan class=\"token key atrule\"\u003eversion\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e'3.1'\u003c/span\u003e\n\n\u003cspan class=\"token key atrule\"\u003eservices\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n  \u003cspan class=\"token key atrule\"\u003eredis\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003eimage\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e redis\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003ealpine\n    \u003cspan class=\"token key atrule\"\u003econtainer_name\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e docker_redis_1\n    \u003cspan class=\"token key atrule\"\u003erestart\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e always\n    \u003cspan class=\"token key atrule\"\u003eports\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e \u003cspan class=\"token string\"\u003e'6379:6379'\u003c/span\u003e\n\n  \u003cspan class=\"token key atrule\"\u003eflowise-web\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003eimage\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e flowiseai/flowise\n    \u003cspan class=\"token key atrule\"\u003econtainer_name\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e flowise\u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003eweb\n    \u003cspan class=\"token key atrule\"\u003erestart\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e always\n    \u003cspan class=\"token key atrule\"\u003eenvironment\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e PORT=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003ePORT\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e MODE=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eMODE\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e REDIS_HOST=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eREDIS_HOST\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e REDIS_PORT=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eREDIS_PORT\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e QUEUE_NAME=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eQUEUE_NAME\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e QUEUE_REDIS_EVENT_STREAM_MAX_LEN=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eQUEUE_REDIS_EVENT_STREAM_MAX_LEN\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e DATABASE_PATH=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eDATABASE_PATH\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e SECRETKEY_PATH=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eSECRETKEY_PATH\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e LOG_PATH=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eLOG_PATH\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e BLOB_STORAGE_PATH=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eBLOB_STORAGE_PATH\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e JWT_AUTH_TOKEN_SECRET=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eJWT_AUTH_TOKEN_SECRET\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e JWT_REFRESH_TOKEN_SECRET=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eJWT_REFRESH_TOKEN_SECRET\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e JWT_ISSUER=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eJWT_ISSUER\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e JWT_AUDIENCE=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eJWT_AUDIENCE\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e EXPRESS_SESSION_SECRET=$\u003cspan class=\"token punctuation\"\u003e{\u003c/span\u003eEXPRESS_SESSION_SECRET\u003cspan class=\"token punctuation\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003eports\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e \u003cspan class=\"token string\"\u003e'${PORT}:${PORT}'\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003evolumes\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e ~/.flowise\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e/root/.flowise\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ec. Jalankan Docker Compose\u003c/strong\u003e\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e --env-file .env up -d\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eDocker Compose bakal:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDownload image Redis \u0026#x26; Flowise\u003c/li\u003e\n\u003cli\u003eJalanin container\u003c/li\u003e\n\u003cli\u003eOtomatis restart kalo VM reboot\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ed. Cek Status\u003c/strong\u003e\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e \u003cspan class=\"token function\"\u003eps\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHarusnya muncul dua container:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edocker_redis_1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eflowise-web\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ee. Akses Flowise\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eBuka browser, ketik:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003ehttp://\u0026#x3C;IP_VM\u003e:3000\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHarusnya udah muncul Flowise Dashboard.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003ef. Troubleshoot Kecil\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eKalo container crash:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs flowise-web\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eKalo Redis error:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs docker_redis_1\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003eg. Next: Setup Worker\u003c/strong\u003e\nFlowise ini udah jalan, tapi dia masih single instance. Worker Redis belum di-setup. Nanti worker Redis ini yang bakal scale dan handle background job.\u003c/p\u003e\n\u003ch3 id=\"5-konfigurasi-environment\"\u003e5. Konfigurasi Environment\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-konfigurasi-environment\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eOke, di tahap ini kita udah punya Flowise repo dan file-file pentingnya. Sekarang waktunya bikin file environment variable biar Flowise tau di mana dia harus nyimpen data dan konek ke Redis (kalau pakai).\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"a-kenapa-penting\"\u003ea. Kenapa Penting?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-kenapa-penting\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eFile \u003ccode\u003e.env\u003c/code\u003e ini penting banget. Semua setting environment — port, database path, secret key, Redis, dll — disimpen di sini. Biar kalo lu mau deploy lagi di server lain, tinggal copy file \u003ccode\u003e.env\u003c/code\u003e doang. Praktis!\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"b-bikin-file-env-dasar\"\u003eb. Bikin File \u003ccode\u003e.env\u003c/code\u003e Dasar\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#b-bikin-file-env-dasar\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eLu bisa bikin file \u003ccode\u003e.env\u003c/code\u003e langsung di VM:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003enano\u003c/span\u003e .env\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eTerus isiin basic config kayak gini:\u003c/p\u003e\n\u003cpre class=\"language-env\"\u003e\u003ccode class=\"language-env\"\u003ePORT=3000\n\n# Path default storage Flowise\nDATABASE_PATH=/root/.flowise\nSECRETKEY_PATH=/root/.flowise\nLOG_PATH=/root/.flowise/logs\nBLOB_STORAGE_PATH=/root/.flowise/storage\n\n# Basic JWT dan session secret\nJWT_AUTH_TOKEN_SECRET=secret\nJWT_REFRESH_TOKEN_SECRET=secret\nJWT_ISSUER=flowise\nJWT_AUDIENCE=flowise\nEXPRESS_SESSION_SECRET=flowise\n\n# Redis config\nREDIS_HOST=redis\nREDIS_PORT=6379\nMODE=queue\nQUEUE_NAME=flowise-queue\nQUEUE_REDIS_EVENT_STREAM_MAX_LEN=100000\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eSimpan file \u003ccode\u003e.env\u003c/code\u003e ini. Ini settingan yang udah cukup buat jalanin Flowise web plus Redis queue worker (opsional).\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"c-opsi-setting-bisa-dikosongin--custom\"\u003ec. Opsi Setting (Bisa Dikosongin / Custom)\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#c-opsi-setting-bisa-dikosongin--custom\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau mau minimalis banget, lu bisa \u003cstrong\u003eskip\u003c/strong\u003e beberapa setting kayak SMTP, storage S3, atau Postgres. Flowise bisa jalanin semua data langsung di path \u003ccode\u003e~/.flowise\u003c/code\u003e default.\u003c/p\u003e\n\u003cp\u003eTapi kalo lu mau:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eConnect ke Postgres → Lu bisa tambah \u003ccode\u003eDATABASE_TYPE\u003c/code\u003e, \u003ccode\u003eDATABASE_HOST\u003c/code\u003e, \u003ccode\u003eDATABASE_PORT\u003c/code\u003e, dll.\u003c/li\u003e\n\u003cli\u003ePakai storage S3 / GCS → Lu bisa tambah \u003ccode\u003eSTORAGE_TYPE\u003c/code\u003e, \u003ccode\u003eS3_*\u003c/code\u003e, \u003ccode\u003eGOOGLE_*\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAktifin monitoring (Prometheus, OpenTelemetry) → Tambah \u003ccode\u003eMETRICS_*\u003c/code\u003e di \u003ccode\u003e.env\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"d-cek-kembali\"\u003ed. Cek Kembali\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#d-cek-kembali\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eSebelum lu \u003ccode\u003edocker-compose up -d\u003c/code\u003e, pastiin file \u003ccode\u003e.env\u003c/code\u003e lu udah:\n✅ Path storage\n✅ JWT secret\n✅ Redis config (kalau mau pakai queue)\n✅ Port (3000 default)\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"e-gunakan-env-di-docker-compose\"\u003ee. Gunakan \u003ccode\u003e.env\u003c/code\u003e di Docker Compose\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#e-gunakan-env-di-docker-compose\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003ePas lu jalanin Docker Compose, jangan lupa pake parameter \u003ccode\u003e--env-file\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e --env-file .env up -d\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eDengan ini, Docker Compose bakal inject semua setting di \u003ccode\u003e.env\u003c/code\u003e ke environment container. Jadi config lu rapih dan gampang dikelola.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"6-jalankan-flowise-web\"\u003e6. Jalankan Flowise Web\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#6-jalankan-flowise-web\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eNah, sekarang lu udah punya semua yang lu butuhin — Docker Compose, file \u003ccode\u003e.env\u003c/code\u003e, dan repo Flowise yang udah di-clone. Waktunya ngejalanin Flowise biar bisa lu akses lewat browser!\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"a-jalankan-docker-compose\"\u003ea. Jalankan Docker Compose\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-jalankan-docker-compose\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eCukup satu perintah ini, asalkan lu udah di direktori yang sama sama \u003ccode\u003edocker-compose.yml\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e --env-file .env up -d\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003ePenjelasannya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e--env-file .env\u003c/code\u003e → buat baca file \u003ccode\u003e.env\u003c/code\u003e lu.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-d\u003c/code\u003e → biar container jalan di background, gak ganggu terminal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"b-cek-status\"\u003eb. Cek Status\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#b-cek-status\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eCek container yang lagi jalan:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e \u003cspan class=\"token function\"\u003eps\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHarusnya lu bakal liat:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eflowise-web\u003c/code\u003e (container Flowise)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edocker_redis_1\u003c/code\u003e (container Redis, kalau lu setup Redis juga)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKalau statusnya \u003cstrong\u003eUp\u003c/strong\u003e, artinya udah beres!\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"c-akses-flowise-di-browser\"\u003ec. Akses Flowise di Browser\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#c-akses-flowise-di-browser\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eSekarang, lu tinggal buka browser dan masuk ke:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003ehttp://\u0026#x3C;IP_VM\u003e:3000\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eContoh:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003ehttp://20.212.155.7:3000\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHarusnya lu udah liat dashboard Flowise — itu artinya \u003cstrong\u003eFlowise udah running!\u003c/strong\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"d-apa-yang-dilakuin-flowise\"\u003ed. Apa yang Dilakuin Flowise\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#d-apa-yang-dilakuin-flowise\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003ePas Flowise Web udah jalan, dia bakal:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBuka port 3000 buat antarmuka (dashboard web).\u003c/li\u003e\n\u003cli\u003eSimpen semua data (flow, setting, secret) di folder \u003ccode\u003e~/.flowise\u003c/code\u003e (volume mapping).\u003c/li\u003e\n\u003cli\u003eKalau Redis aktif dan lu udah set \u003ccode\u003eMODE=queue\u003c/code\u003e, dia juga siap ngoper ke worker (nanti lu setup).\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"e-troubleshooting-singkat\"\u003ee. Troubleshooting Singkat\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#e-troubleshooting-singkat\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau lu gak bisa akses di browser:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCek firewall VM (port 3000 udah kebuka belum?).\u003c/li\u003e\n\u003cli\u003eCek status container pakai \u003ccode\u003esudo docker ps\u003c/code\u003e (ada yang restart?).\u003c/li\u003e\n\u003cli\u003eLiat log container Flowise:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs flowise-web\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eBiasanya error log cukup jelas, kayak salah path atau conflict port.\u003c/p\u003e\n\u003chr\u003e\n\u003ch3 id=\"7-opsional-setup-worker\"\u003e7. (Opsional) Setup Worker\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#7-opsional-setup-worker\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eWorker ini sebenernya \u003cstrong\u003ebukan wajib\u003c/strong\u003e — Flowise Web udah cukup kalau trafficnya santai. Tapi kalau lu mau:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLoad lebih berat\u003c/strong\u003e (banyak user / banyak flow jalan bareng).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePakai mode queue\u003c/strong\u003e biar lebih scalable.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePisahin job processing\u003c/strong\u003e biar web lebih ringan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWorker adalah jawabannya.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"a-apa-itu-worker\"\u003ea. Apa itu Worker?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-apa-itu-worker\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eSecara singkat:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFlowise Web\u003c/strong\u003e: frontend dan API.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFlowise Worker\u003c/strong\u003e: backend yang kerjain job intensif (eksekusi alur RAG, LLM, dkk).\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWorker \u003cstrong\u003engambil job\u003c/strong\u003e dari Redis, yang jadi queue. Jadi Redis \u003cstrong\u003eharus jalan dulu\u003c/strong\u003e.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"b-kapan-worker-ini-kepake\"\u003eb. Kapan Worker Ini Kepake?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#b-kapan-worker-ini-kepake\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eWorker jalan kalau di \u003ccode\u003e.env\u003c/code\u003e lu set:\u003c/p\u003e\n\u003cpre class=\"language-env\"\u003e\u003ccode class=\"language-env\"\u003eMODE=queue\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eDi Flowise Web, dia cuma ngirim job ke Redis. Worker yang bakal ambil job dan eksekusi.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"c-setup-docker-compose-worker\"\u003ec. Setup Docker Compose Worker\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#c-setup-docker-compose-worker\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eBiasanya \u003cstrong\u003eworker Compose file\u003c/strong\u003e (\u003ccode\u003edocker-compose.worker.yml\u003c/code\u003e) beda sama \u003ccode\u003edocker-compose.yml\u003c/code\u003e web. Contoh file:\u003c/p\u003e\n\u003cpre class=\"language-yaml\"\u003e\u003ccode class=\"language-yaml\"\u003e\u003cspan class=\"token key atrule\"\u003eversion\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e \u003cspan class=\"token string\"\u003e'3.1'\u003c/span\u003e\n\n\u003cspan class=\"token key atrule\"\u003eservices\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n  \u003cspan class=\"token key atrule\"\u003eworker\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003eimage\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e flowiseai/flowise\n    \u003cspan class=\"token key atrule\"\u003erestart\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e always\n    \u003cspan class=\"token key atrule\"\u003eenvironment\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e MODE=queue\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e QUEUE_NAME=flowise\u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003equeue\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e REDIS_HOST=redis\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e REDIS_PORT=6379\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e WORKER_CONCURRENCY=100\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e DATABASE_PATH=/root/.flowise\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e SECRETKEY_PATH=/root/.flowise\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e LOG_PATH=/root/.flowise/logs\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e BLOB_STORAGE_PATH=/root/.flowise/storage\n    \u003cspan class=\"token key atrule\"\u003eentrypoint\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e /bin/sh \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003ec \"sleep 3; flowise worker\"\n    \u003cspan class=\"token key atrule\"\u003edepends_on\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e redis\n    \u003cspan class=\"token key atrule\"\u003evolumes\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n      \u003cspan class=\"token punctuation\"\u003e-\u003c/span\u003e ~/.flowise\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e/root/.flowise\n\n  \u003cspan class=\"token key atrule\"\u003eredis\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003eimage\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e redis\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e\u003cspan class=\"token number\"\u003e7\u003c/span\u003e\n    \u003cspan class=\"token key atrule\"\u003erestart\u003c/span\u003e\u003cspan class=\"token punctuation\"\u003e:\u003c/span\u003e always\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eWorker ini bakal \u003cstrong\u003enyambung ke Redis\u003c/strong\u003e (port 6379) dan siap tarik job.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"d-jalankan-worker\"\u003ed. Jalankan Worker\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#d-jalankan-worker\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau Redis udah jalan:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e --env-file .env -f docker-compose.worker.yml up -d\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eCek worker status:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e \u003cspan class=\"token function\"\u003eps\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eHarusnya container \u003ccode\u003eworker\u003c/code\u003e statusnya \u003cstrong\u003eUp\u003c/strong\u003e.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"e-kapan-worker-ini-bakal-aktif\"\u003ee. Kapan Worker Ini Bakal \"Aktif\"?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#e-kapan-worker-ini-bakal-aktif\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eWorker jalan terus, tapi dia \u003cstrong\u003ebaru \"sibuk\"\u003c/strong\u003e kalau ada job masuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlowise Web lempar job (misal deploy Flow).\u003c/li\u003e\n\u003cli\u003eWorker ambil job dari Redis dan eksekusi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKalau job kosong, worker standby aja.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"f-tips-tambahan\"\u003ef. Tips Tambahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#f-tips-tambahan\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003ePastikan \u003ccode\u003eMODE=queue\u003c/code\u003e di Web dan Worker sama.\u003c/li\u003e\n\u003cli\u003eKalau lu pake volume mapping \u003ccode\u003e~/.flowise\u003c/code\u003e, Worker share data yang sama sama Web.\u003c/li\u003e\n\u003cli\u003eRedis \u003cstrong\u003eharus stabil\u003c/strong\u003e — worker butuh Redis buat ngambil job.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"8-troubleshooting--tips\"\u003e8. Troubleshooting \u0026#x26; Tips\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#8-troubleshooting--tips\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eWalaupun setup Flowise di VM lumayan gampang, pasti ada beberapa masalah yang sering muncul. Nah, di section ini, gue kasih tips troubleshooting dan juga beberapa tools yang bisa bantu lu mantau performa container.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"a-container-restart-terus\"\u003ea. Container Restart Terus\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-container-restart-terus\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau lu lihat container \u003cstrong\u003erestart terus\u003c/strong\u003e di \u003ccode\u003edocker ps\u003c/code\u003e (statusnya “Restarting”), biasanya karena:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFile \u003ccode\u003e.env\u003c/code\u003e belum lengkap atau ada yang typo.\u003c/li\u003e\n\u003cli\u003eRedis belum jalan (padahal Web/Worker butuh Redis).\u003c/li\u003e\n\u003cli\u003eVolume \u003ccode\u003e~/.flowise\u003c/code\u003e belum ada permission (biasanya di VM fresh, butuh \u003ccode\u003esudo chown\u003c/code\u003e).\u003c/li\u003e\n\u003cli\u003ePort conflict: port \u003ccode\u003e3000\u003c/code\u003e (web) atau \u003ccode\u003e6379\u003c/code\u003e (Redis) udah kepake sama service lain.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eSolusi:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCek log container:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs flowise-web\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePastikan file \u003ccode\u003e.env\u003c/code\u003e valid:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003ecat\u003c/span\u003e .env\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eTes Redis udah running:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e \u003cspan class=\"token function\"\u003eps\u003c/span\u003e \u003cspan class=\"token operator\"\u003e|\u003c/span\u003e \u003cspan class=\"token function\"\u003egrep\u003c/span\u003e redis\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"b-port-conflict\"\u003eb. Port Conflict\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#b-port-conflict\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau muncul error \u003ccode\u003eport already in use\u003c/code\u003e pas \u003ccode\u003edocker-compose up\u003c/code\u003e, itu tandanya port 3000 atau 6379 udah dipake.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSolusi:\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCari service yang pake port itu:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003elsof\u003c/span\u003e -i :3000\n\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003elsof\u003c/span\u003e -i :6379\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eKill service yang ganggu:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003ekill\u003c/span\u003e -9 \u003cspan class=\"token operator\"\u003e\u0026#x3C;\u003c/span\u003epid\u003cspan class=\"token operator\"\u003e\u003e\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"c-worker-gak-jalan--diam-aja\"\u003ec. Worker Gak Jalan / Diam Aja\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#c-worker-gak-jalan--diam-aja\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eWorker gak ngapa-ngapain?\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eCek Redis:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs docker_redis_1\n\u003c/code\u003e\u003c/pre\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePastikan \u003ccode\u003eMODE=queue\u003c/code\u003e di \u003ccode\u003e.env\u003c/code\u003e Web dan Worker \u003cstrong\u003esama\u003c/strong\u003e.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eWorker cuma “bangun” kalau ada job. Jadi lu coba jalanin Flow biar dia ada kerjaan.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"d-cara-baca-log-container\"\u003ed. Cara Baca Log Container\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#d-cara-baca-log-container\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003ePenting nih buat debugging:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs flowise-web\n\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs worker\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau lognya terlalu panjang, bisa pakai \u003ccode\u003etail\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003esudo\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker\u003c/span\u003e logs -f flowise-web\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch4 id=\"e-tools-bantu-portainer--docker-dashboard\"\u003ee. Tools Bantu: Portainer \u0026#x26; Docker Dashboard\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#e-tools-bantu-portainer--docker-dashboard\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau lu mau \u003cstrong\u003eliat container secara visual\u003c/strong\u003e, cobain tools kayak:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePortainer\u003c/strong\u003e: UI buat manage container, liat logs, restart, dll.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDocker Dashboard\u003c/strong\u003e (kalau lu pake Docker Desktop).\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eInstall Portainer:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003edocker\u003c/span\u003e volume create portainer_data\n\u003cspan class=\"token function\"\u003edocker\u003c/span\u003e run -d -p \u003cspan class=\"token number\"\u003e9000\u003c/span\u003e:9000 -p \u003cspan class=\"token number\"\u003e8000\u003c/span\u003e:8000 --name portainer \u003cspan class=\"token punctuation\"\u003e\\\u003c/span\u003e\n    --restart\u003cspan class=\"token operator\"\u003e=\u003c/span\u003ealways -v /var/run/docker.sock:/var/run/docker.sock \u003cspan class=\"token punctuation\"\u003e\\\u003c/span\u003e\n    -v portainer_data:/data portainer/portainer-ce\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eAkses di browser:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003ehttp://\u0026#x3C;VM_IP\u003e:9000\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch4 id=\"f-tips-tambahan-1\"\u003ef. Tips Tambahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#f-tips-tambahan-1\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBackup data \u003ccode\u003e.flowise\u003c/code\u003e\u003c/strong\u003e: semua logs, DB, dan storage Flowise ada di folder ini.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuto restart\u003c/strong\u003e: Compose udah \u003ccode\u003erestart: always\u003c/code\u003e, jadi kalau VM reboot, container auto naik lagi.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScaling\u003c/strong\u003e: kalau Flowise makin rame, lu bisa deploy Worker di VM lain (asal Redisnya bareng).\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"9-next-step-worker-dan-beyond\"\u003e9. Next Step: Worker dan Beyond\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#9-next-step-worker-dan-beyond\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKalau lu udah deploy Flowise Web, biasanya yang kepikiran selanjutnya adalah:\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"a-kapan-perlu-setup-worker\"\u003ea. Kapan Perlu Setup Worker?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-kapan-perlu-setup-worker\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eFlowise Worker itu kayak “otak tambahan” buat ngerjain job berat (kayak scraping, generate response panjang, dll.). Worker \u003cstrong\u003ejalanin job\u003c/strong\u003e yang dikasih Flowise Web.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eKalau Flowise Web doang\u003c/strong\u003e: semua job jalan di Web, bisa overload.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKalau pake Worker\u003c/strong\u003e: job dijalanin Worker, Web lebih ringan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWorker \u003cstrong\u003ewajib\u003c/strong\u003e kalau lu:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMau performa lebih stabil\u003c/li\u003e\n\u003cli\u003eAda job yang panjang\u003c/li\u003e\n\u003cli\u003eNiat integrasi Flowise di production\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"b-redis-jadi-penghubung-web--worker\"\u003eb. Redis Jadi “Penghubung” Web \u0026#x26; Worker\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#b-redis-jadi-penghubung-web--worker\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eRedis itu \u003cstrong\u003equeue broker\u003c/strong\u003e di Flowise:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFlowise Web naro job ke Redis\u003c/li\u003e\n\u003cli\u003eWorker ambil job dari Redis\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMakanya Redis wajib kalau pake Worker. Redis bisa lu deploy bareng (satu Compose) atau \u003cstrong\u003ecluster\u003c/strong\u003e (kalau mau scalable).\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"c-opsi-lanjutan-ssl--load-balancer\"\u003ec. Opsi Lanjutan: SSL \u0026#x26; Load Balancer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#c-opsi-lanjutan-ssl--load-balancer\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau lu udah deploy Web \u0026#x26; Worker, next step biasanya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePasang SSL\u003c/strong\u003e (HTTPS) pake Nginx Proxy Manager atau Caddy.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLoad balancer\u003c/strong\u003e: kalo lu deploy banyak Worker, lu load balance biar stabil.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"d-opsi-auth-tambahan\"\u003ed. Opsi Auth Tambahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#d-opsi-auth-tambahan\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eFlowise udah support \u003cstrong\u003eBasic Auth\u003c/strong\u003e di level dashboard.\nTapi kalo mau lebih secure, bisa:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eReverse Proxy (Nginx Proxy Manager) + Basic Auth.\u003c/li\u003e\n\u003cli\u003eOAuth2 / SSO pake Nginx atau external proxy.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch4 id=\"e-upgrade--update-flowise\"\u003ee. Upgrade \u0026#x26; Update Flowise\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#e-upgrade--update-flowise\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eFlowise lumayan aktif update, jadi lu juga perlu jaga:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003e\u003cspan class=\"token function\"\u003edocker\u003c/span\u003e pull flowiseai/flowise\n\u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e down \u003cspan class=\"token operator\"\u003e\u0026#x26;\u0026#x26;\u003c/span\u003e \u003cspan class=\"token function\"\u003edocker-compose\u003c/span\u003e up -d\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eJangan lupa backup dulu \u003ccode\u003e.flowise\u003c/code\u003e biar data aman.\u003c/p\u003e\n\u003chr\u003e\n\u003ch4 id=\"f-integrasi-lain\"\u003ef. Integrasi Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#f-integrasi-lain\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eFlowise itu enak karena bisa:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDipake bareng chatbot di WhatsApp, Discord, Slack, dll.\u003c/li\u003e\n\u003cli\u003eDitaro di workflow automation (kayak n8n, Zapier).\u003c/li\u003e\n\u003cli\u003ePake OpenAI atau LLM lain (Claude, Qwen, Ollama).\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"enableAutoCreateOnDefinition":false,"enableXVaultWikiLink":false,"enableRemoteVaultInit":true,"enableUserTags":true,"enableHashTags":true,"workspaceVaultSyncMode
