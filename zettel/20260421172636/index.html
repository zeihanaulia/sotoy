"6-load-config-languagenameoutput","line":54,"column":0,"depth":3},"7-greeting-personal":{"type":"header","text":"7. Greeting personal","value":"7-greeting-personal","line":58,"column":0,"depth":3},"8-append-steps":{"type":"header","text":"8. Append steps","value":"8-append-steps","line":62,"column":0,"depth":3},"kenapa-urutan-ini-penting":{"type":"header","text":"Kenapa urutan ini penting?","value":"kenapa-urutan-ini-penting","line":66,"column":0,"depth":2},"customization-sebagai-bagian-struktural":{"type":"header","text":"Customization sebagai bagian struktural","value":"customization-sebagai-bagian-struktural","line":72,"column":0,"depth":2},"jenis-kustomisasi-bmad":{"type":"header","text":"Jenis kustomisasi BMAD","value":"jenis-kustomisasi-bmad","line":82,"column":0,"depth":2},"contoh-relevansi-dunia-nyata":{"type":"header","text":"Contoh relevansi dunia nyata","value":"contoh-relevansi-dunia-nyata","line":91,"column":0,"depth":2},"mengapa-customization-bukan-sekadar-prompt-template":{"type":"header","text":"Mengapa customization bukan sekadar prompt template?","value":"mengapa-customization-bukan-sekadar-prompt-template","line":100,"column":0,"depth":2},"implikasi-untuk-ai-native-engineering":{"type":"header","text":"Implikasi untuk AI-native engineering","value":"implikasi-untuk-ai-native-engineering","line":111,"column":0,"depth":2},"konsistensi":{"type":"header","text":"Konsistensi","value":"konsistensi","line":115,"column":0,"depth":3},"adaptasi":{"type":"header","text":"Adaptasi","value":"adaptasi","line":119,"column":0,"depth":3},"reduksi-friksi":{"type":"header","text":"Reduksi friksi","value":"reduksi-friksi","line":123,"column":0,"depth":3},"insight-penting":{"type":"header","text":"Insight penting","value":"insight-penting","line":127,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":139,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-activation-flow-dan-customization-menyusun-agent-dari-template-konteks-dan-kebiasaan-tim\"\u003eBMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-activation-flow-dan-customization-menyusun-agent-dari-template-konteks-dan-kebiasaan-tim\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBagaimana BMAD membentuk satu named agent saat dipanggil?\u003c/li\u003e\n\u003cli\u003eMengapa activation flow penting untuk konsistensi dan adaptasi tim?\u003c/li\u003e\n\u003cli\u003eApa peran customization dalam membuat agent layak dipakai di dunia nyata?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD activation flow menunjukkan bahwa named agent bukan identitas statis. Ia adalah agent yang dirakit setiap kali dipanggil: template umum + konteks tim + override personal.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eDalam BMAD, agent bukan hanya \"Mary exists\". Dia adalah \"Mary in this team, dengan kebiasaan ini, pada sesi ini.\"\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"activation-flow-apa-yang-terjadi-saat-agent-dinyalakan\"\u003eActivation flow: apa yang terjadi saat agent dinyalakan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#activation-flow-apa-yang-terjadi-saat-agent-dinyalakan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman Named Agents menyebutkan delapan langkah aktivasi. Secara konseptual, urutannya menunjukkan bahwa agent dibentuk lebih dalam daripada sekadar memanggil sebuah persona.\u003c/p\u003e\n\u003ch3 id=\"1-resolve-agent-block\"\u003e1. Resolve agent block\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-resolve-agent-block\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eIni berarti BMAD mulai dengan definisi agent yang sudah ada: skill, voice, role, default behavior.\u003c/p\u003e\n\u003ch3 id=\"2-merge-config\"\u003e2. Merge config\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-merge-config\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDi sini BMAD menggabungkan konfigurasi global agent dengan override tim. Artinya perilaku agent tidak hanya berdasarkan template default.\u003c/p\u003e\n\u003ch3 id=\"3-prepend-steps\"\u003e3. Prepend steps\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-prepend-steps\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eLangkah-langkah tambahan yang dijalankan sebelum persona aktif. Contohnya, persiapan konteks awal atau checklist yang harus dipasang.\u003c/p\u003e\n\u003ch3 id=\"4-adopt-persona\"\u003e4. Adopt persona\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-adopt-persona\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAgent mengambil karakter dan mode kerja tertentu: analyst, architect, dev, dsb. Ini bukan hanya nama, tetapi flow mental.\u003c/p\u003e\n\u003ch3 id=\"5-load-persistent-facts\"\u003e5. Load persistent facts\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-load-persistent-facts\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eInformasi yang tidak boleh hilang demi menjaga konsistensi: aturan tim, preferensi tool, knowledge organisasi.\u003c/p\u003e\n\u003ch3 id=\"6-load-config-languagenameoutput\"\u003e6. Load config language/name/output\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#6-load-config-languagenameoutput\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAgent disesuaikan dengan setting bahasa, nama, dan format keluaran yang relevan.\u003c/p\u003e\n\u003ch3 id=\"7-greeting-personal\"\u003e7. Greeting personal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#7-greeting-personal\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMemberi kesan bahwa agent ini terhubung ke sesi, bukan hanya template kosong.\u003c/p\u003e\n\u003ch3 id=\"8-append-steps\"\u003e8. Append steps\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#8-append-steps\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eLangkah tambahan yang dijalankan setelah persona aktif: misalnya tugas pengingat, atau hooking ke workflow selanjutnya.\u003c/p\u003e\n\u003ch2 id=\"kenapa-urutan-ini-penting\"\u003eKenapa urutan ini penting?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-urutan-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKarena urutan ini memisahkan tiga hal berbeda. Pertama, identitas umum agent. Kedua, konteks tim. Ketiga, kebiasaan lokal dan preferensi.\u003c/p\u003e\n\u003cp\u003eJika semua digabung sekaligus tanpa struktur, agent akan menjadi lumpuh dan tidak bisa dikustomisasi dengan aman. Dengan alur ini, BMAD menunjukkan bahwa agent dapat tetap memiliki bentuk umum yang konsisten, sambil berevolusi sesuai tim.\u003c/p\u003e\n\u003ch2 id=\"customization-sebagai-bagian-struktural\"\u003eCustomization sebagai bagian struktural\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#customization-sebagai-bagian-struktural\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD tidak memposisikan customization sebagai fitur tambahan. Ia adalah kaki ketiga dari sistem named agent.\u003c/p\u003e\n\u003cp\u003eTanpa customization, seluruh agent akan terasa generik. Tanpa named agent, customization tidak punya tempat untuk menetap. Bersama-sama, mereka membuat model agent BMAD:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eskill = apa yang bisa dilakukan,\u003c/li\u003e\n\u003cli\u003enamed agent = siapa yang melakukannya,\u003c/li\u003e\n\u003cli\u003ecustomization = bagaimana dia melakukannya dalam konteks tim.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"jenis-kustomisasi-bmad\"\u003eJenis kustomisasi BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#jenis-kustomisasi-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman ini menjelaskan dua jenis utama:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eteam overrides — konfigurasi yang di-commit agar seluruh tim punya perilaku yang konsisten.\u003c/li\u003e\n\u003cli\u003epersonal overrides — preferensi individu yang tidak di-commit, untuk kebiasaan pribadi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePerbedaan ini penting. Team overrides menanamkan standar dan guardrail. Personal overrides memberi fleksibilitas tanpa mengacaukan standar.\u003c/p\u003e\n\u003ch2 id=\"contoh-relevansi-dunia-nyata\"\u003eContoh relevansi dunia nyata\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-relevansi-dunia-nyata\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBayangkan Amelia dipanggil untuk \u003ccode\u003ebmad-dev-story\u003c/code\u003e di dua tim berbeda.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDi tim A, ia pakai pola \u003ccode\u003efeature branch + PR + unit test first\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDi tim B, ia pakai \u003ccode\u003etrunk-based + CI gated commit + contract test\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNama Amelia tetap sama, tetapi perilaku detailnya berbeda karena customization tim. Ini memungkinkan user tetap menggunakan anchor mental \"Amelia untuk implementasi\", tanpa harus memikirkan detail toolchain setiap kali.\u003c/p\u003e\n\u003ch2 id=\"mengapa-customization-bukan-sekadar-prompt-template\"\u003eMengapa customization bukan sekadar prompt template?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-customization-bukan-sekadar-prompt-template\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBanyak platform lain memberi kemungkinan \"custom instructions\" atau \"preferred style.\" BMAD menempatkannya lebih dalam: pada activation flow agent.\u003c/p\u003e\n\u003cp\u003eArtinya customization BMAD bukan hanya mengubah cara menjawab. Ia mengubah layer yang aktif sebelum jawaban dibuat:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emesin mana yang dipakai,\u003c/li\u003e\n\u003cli\u003ekonteks apa yang dimuat,\u003c/li\u003e\n\u003cli\u003ebatasan mana yang diterapkan,\u003c/li\u003e\n\u003cli\u003epekerjaan mana yang diprioritaskan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"implikasi-untuk-ai-native-engineering\"\u003eImplikasi untuk AI-native engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi-untuk-ai-native-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eActivation flow + customization membuat BMAD lebih mirip sistem staff engineer otomatis daripada assistant generik.\u003c/p\u003e\n\u003ch3 id=\"konsistensi\"\u003eKonsistensi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#konsistensi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eUser tahu apa yang diharapkan dari Mary, John, Winston, Amelia karena activation flow memberi mereka konteks yang seragam.\u003c/p\u003e\n\u003ch3 id=\"adaptasi\"\u003eAdaptasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#adaptasi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eTim bisa melokalkan agent tanpa merusak identitas dasar. Ini penting untuk adopsi di organisasi nyata.\u003c/p\u003e\n\u003ch3 id=\"reduksi-friksi\"\u003eReduksi friksi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#reduksi-friksi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eUser tidak perlu mengingat apakah \"feature branch\" harus disebutkan setiap kali. Mereka cukup memanggil nama agent, dan kebiasaan tim sudah terpasang.\u003c/p\u003e\n\u003ch2 id=\"insight-penting\"\u003eInsight penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#insight-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD activation flow memperlihatkan bahwa named agents bukan hanya persona sosial.\u003c/p\u003e\n\u003cp\u003eIa adalah mekanisme untuk merakit identitas agent yang:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003estabil secara ekspektasi,\u003c/li\u003e\n\u003cli\u003eadaptif secara perilaku,\u003c/li\u003e\n\u003cli\u003edan terikat ke konteks tim.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni membuat interaksi AI lebih dapat diandalkan daripada antarmuka agen yang langsung dan generik.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e — BMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170812\"\u003eBMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/a\u003e — BMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003enamed-agents (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ecustomization (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eactivation-flow (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172800\"\u003eBMAD project context adalah konstitusi implementasi untuk AI agents, bukan dokumentasi biasa\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193300\"\u003eModel dan agent adalah fungsi berbeda dalam AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-named-agents\"\u003eBMAD Named Agents sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubble
