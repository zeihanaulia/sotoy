ting?","value":"kenapa-ini-penting","line":38,"column":0,"depth":2},"output-yang-berguna":{"type":"header","text":"Output yang berguna","value":"output-yang-berguna","line":44,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":54,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-domain-research-memaksa-pemahaman-logika-industri-sebelum-solusi\"\u003eBMAD domain research memaksa pemahaman logika industri sebelum solusi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-domain-research-memaksa-pemahaman-logika-industri-sebelum-solusi\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eUntuk apa BMAD melakukan domain research?\u003c/li\u003e\n\u003cli\u003eKenapa domain research berbeda dari market research?\u003c/li\u003e\n\u003cli\u003eBagaimana outputnya berubah planning dan architecture?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD domain research bukan hanya tentang istilah industri. Ia adalah proses memaksa tim memahami cara domain itu berpikir, beroperasi, dan membuat keputusan.\u003c/p\u003e\n\u003cp\u003eJika market research menyingkap realitas eksternal, domain research menyingkap logika internal problem space.\u003c/p\u003e\n\u003ch2 id=\"fokus-bmad-domain-research\"\u003eFokus BMAD domain research\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#fokus-bmad-domain-research\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDi sini AI membantu memahami:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etata bahasa dan istilah domain,\u003c/li\u003e\n\u003cli\u003econstraint regulasi dan proses bisnis,\u003c/li\u003e\n\u003cli\u003ereward/penalty yang berlaku bagi pelaku domain,\u003c/li\u003e\n\u003cli\u003epola kerja dan ekspektasi yang berbeda dari pengguna domain.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan cara ini, BMAD mencegah produk AI terdengar generik. Ia ingin produk mengikuti nalar domain, bukan hanya mengikuti teknologi.\u003c/p\u003e\n\u003ch2 id=\"kenapa-ini-penting\"\u003eKenapa ini penting?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBanyak solusi AI gagal karena mereka tidak menghormati fakta domain. Mereka mungkin membangun fitur yang secara teknis logis, tetapi tidak sesuai dengan cara orang bekerja atau aturan di lapangan.\u003c/p\u003e\n\u003cp\u003eDomain research bertindak seperti sensor. Ia memberi tahu Anda jika ide Anda akan menabrak kontraint domain sebelum masuk planning.\u003c/p\u003e\n\u003ch2 id=\"output-yang-berguna\"\u003eOutput yang berguna\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#output-yang-berguna\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetelah domain research, Anda seharusnya sudah bisa menjawab:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eapakah asumsi domain kita benar?\u003c/li\u003e\n\u003cli\u003eapakah ada constraint yang harus diakomodasi?\u003c/li\u003e\n\u003cli\u003eapakah solusi kita memerlukan adaptasi khusus?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan begitu, planning dan architecture tidak lagi dibangun di atas generalisasi kosong.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171634\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003c/a\u003e — BMAD market research menangkap realitas eksternal sebelum planning\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eanalysis-phase (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003edomain-research (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171636\"\u003eBMAD technical research memvalidasi feasibility sebelum architecture\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171825\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadC
