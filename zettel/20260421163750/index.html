ine":42,"column":28,"offset":2682},"indent":[]},"value":"zettel.20260421163750"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":19,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":27,"column":0,"depth":2},"apa-yang-dibahas":{"type":"header","text":"Apa yang dibahas?","value":"apa-yang-dibahas","line":33,"column":0,"depth":2},"mengapa-vibe-coding-tidak-cukup":{"type":"header","text":"Mengapa \"vibe coding\" tidak cukup?","value":"mengapa-vibe-coding-tidak-cukup","line":45,"column":0,"depth":2},"lima-building-block":{"type":"header","text":"Lima building block","value":"lima-building-block","line":60,"column":0,"depth":2},"bagaimana-kelima-block-menyatu":{"type":"header","text":"Bagaimana kelima block menyatu?","value":"bagaimana-kelima-block-menyatu","line":88,"column":0,"depth":2},"titik-gagal-paling-umum":{"type":"header","text":"Titik gagal paling umum","value":"titik-gagal-paling-umum","line":106,"column":0,"depth":2},"relevansi-untuk-engineer":{"type":"header","text":"Relevansi untuk engineer","value":"relevansi-untuk-engineer","line":120,"column":0,"depth":2},"hubungan-ke-catatan-lain":{"type":"header","text":"Hubungan ke catatan lain","value":"hubungan-ke-catatan-lain","line":141,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"thoughtworks-ai-native-engineering-adalah-operating-model-untuk-mengorkestrasikan-ai-bukan-sekadar-ai-coding\"\u003eThoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#thoughtworks-ai-native-engineering-adalah-operating-model-untuk-mengorkestrasikan-ai-bukan-sekadar-ai-coding\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eSebenarnya artikel ini sedang ngomongin apa?\u003c/li\u003e\n\u003cli\u003eKenapa “vibe coding” dianggap tidak cukup?\u003c/li\u003e\n\u003cli\u003eApa saja lima building block yang dimaksud?\u003c/li\u003e\n\u003cli\u003eGimana kelima block itu saling nyambung jadi workflow nyata?\u003c/li\u003e\n\u003cli\u003eDi mana titik gagal paling umum saat tim coba pakai AI buat engineering?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eArtikel Thoughtworks ini bukan membahas AI yang bisa menulis kode. Ia membahas bagaimana membangun \u003cstrong\u003eoperating model engineering\u003c/strong\u003e yang menjadikan AI sebagai bagian terstruktur dari proses software delivery.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e“AI should be treated as an engineering stack, bukan chatbot yang diajak ngobrol santai.”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"apa-yang-dibahas\"\u003eApa yang dibahas?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-dibahas\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eProject yang dibahas adalah kerangka pemikiran untuk AI-native engineering. Bukan repositori spesifik, bukan software tertentu, melainkan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememilih agent yang bisa mengeksekusi kerja,\u003c/li\u003e\n\u003cli\u003ememilih model yang bisa berpikir,\u003c/li\u003e\n\u003cli\u003ememilih methodology yang membatasi chaos,\u003c/li\u003e\n\u003cli\u003emenulis spec yang jelas,\u003c/li\u003e\n\u003cli\u003ememberikan context yang membuat output AI relevan dengan tim dan arsitektur.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJadi fokusnya adalah: \u003cstrong\u003eAI bukan sekadar tool, tapi bagian dari workflow engineering yang harus diorkestrasikan.\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 id=\"mengapa-vibe-coding-tidak-cukup\"\u003eMengapa \"vibe coding\" tidak cukup?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-vibe-coding-tidak-cukup\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003e“Vibe coding” dianggap kegagalan untuk software serius karena ia:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eterlalu mengandalkan prompt mentah,\u003c/li\u003e\n\u003cli\u003eberharap hasil benar tanpa struktur,\u003c/li\u003e\n\u003cli\u003ememperbaiki kesalahan secara manual berulang,\u003c/li\u003e\n\u003cli\u003etidak memberikan audit trail,\u003c/li\u003e\n\u003cli\u003etidak memastikan konsistensi arsitektur,\u003c/li\u003e\n\u003cli\u003etidak mendukung maintainability di sistem nyata.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAtomic insight:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eKode yang jalan tidak sama dengan kode yang bisa dipelihara. Vibe coding memberi ilusi produktivitas, tetapi untuk enterprise engineering nilai terbesarnya adalah repeatability, safety, dan alignment.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"lima-building-block\"\u003eLima building block\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lima-building-block\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eAgent\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLapisan eksekusi otonom.\u003c/li\u003e\n\u003cli\u003eBisa baca project, run command, install dependency, edit file, jalankan test, dan refactor multi-file.\u003c/li\u003e\n\u003cli\u003eIni lebih dari chatbot; ini “tangan” yang bisa pakai alat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eModel\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMesin reasoning.\u003c/li\u003e\n\u003cli\u003eBerbeda dengan agent: model adalah otak, agent adalah aktornya.\u003c/li\u003e\n\u003cli\u003ePasar sudah terfragmentasi menjadi model spesialis untuk code gen, architectural reasoning, QA, dokumentasi, dan security.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eMethodology\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAturan main untuk mencegah agent thrashing.\u003c/li\u003e\n\u003cli\u003eMenegakkan struktur: prompt yang terarah, CI/CD integration, test-driven AI, versioning, audit, human review.\u003c/li\u003e\n\u003cli\u003eContoh yang relevan: BMAD Method sebagai framework workflow AI-native engineering.\u003c/li\u003e\n\u003cli\u003eTanpa ini, AI cepat tapi liar.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eSpec\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJembatan dari niat manusia ke eksekusi AI.\u003c/li\u003e\n\u003cli\u003eMenjadikan requirement yang buram menjadi acceptance criteria, batasan, dan tujuan yang bisa diinterpretasi AI.\u003c/li\u003e\n\u003cli\u003eAI-native engineering memindahkan bottleneck biaya mental ke kualitas spesifikasi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eContext\u003c/strong\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePengetahuan institusional dan guardrail yang menetapkan cara kerja di lingkungan khusus tim.\u003c/li\u003e\n\u003cli\u003eBerisi aturan coding, arsitektur, security, design system, dependency policy, dan persistent instruction.\u003c/li\u003e\n\u003cli\u003eTanpa context, AI cenderung menghasilkan solusi generik yang tidak fit dengan codebase.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"bagaimana-kelima-block-menyatu\"\u003eBagaimana kelima block menyatu?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bagaimana-kelima-block-menyatu\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSerangkaian ini saling tergantung:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTanpa \u003cstrong\u003eagent\u003c/strong\u003e, model cuma bisa menjawab teks.\u003c/li\u003e\n\u003cli\u003eTanpa \u003cstrong\u003emodel\u003c/strong\u003e yang tepat, agent bergerak tanpa reasoning yang sesuai.\u003c/li\u003e\n\u003cli\u003eTanpa \u003cstrong\u003emethodology\u003c/strong\u003e, agent akan muter-muter dan sulit diaudit.\u003c/li\u003e\n\u003cli\u003eTanpa \u003cstrong\u003espec\u003c/strong\u003e, agent bergerak ke tujuan yang salah.\u003c/li\u003e\n\u003cli\u003eTanpa \u003cstrong\u003econtext\u003c/strong\u003e, output agent bisa tidak sesuai standar tim dan arsitektur.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJadi rangkaian yang benar adalah:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eagent = siapa yang mengeksekusi\u003c/li\u003e\n\u003cli\u003emodel = mesin yang berpikir\u003c/li\u003e\n\u003cli\u003emethodology = aturan main proses\u003c/li\u003e\n\u003cli\u003espec = apa yang harus dilakukan\u003c/li\u003e\n\u003cli\u003econtext = bagaimana melakukannya dengan benar\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"titik-gagal-paling-umum\"\u003eTitik gagal paling umum\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#titik-gagal-paling-umum\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKegagalan paling berbahaya menurut artikel ini bukan sekadar bug syntax. Melainkan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eAI menghasilkan solusi yang nampak rapi tapi salah domain.\u003c/li\u003e\n\u003cli\u003eSpec kabur atau bertentangan.\u003c/li\u003e\n\u003cli\u003eContext tidak cukup.\u003c/li\u003e\n\u003cli\u003eAgent diberi kebebasan tanpa metodologi.\u003c/li\u003e\n\u003cli\u003eReview manusia melemah karena AI terlihat produktif.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eInti penting:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eMasalah AI-native engineering bukan model terbaik. Masalahnya adalah membangun workflow AI yang bisa dipercaya.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"relevansi-untuk-engineer\"\u003eRelevansi untuk engineer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#relevansi-untuk-engineer\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePeran engineer bergeser dari:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003epenulis kode langsung\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eke:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003epenyusun intent,\u003c/li\u003e\n\u003cli\u003epengarah constraint,\u003c/li\u003e\n\u003cli\u003ereviewer AI,\u003c/li\u003e\n\u003cli\u003earchitect of flow,\u003c/li\u003e\n\u003cli\u003epenjaga kualitas sistem.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSkill yang naik nilainya bukan lagi sekadar menulis kode cepat, tapi juga:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emembuat spec yang tajam,\u003c/li\u003e\n\u003cli\u003ememahami boundary arsitektural,\u003c/li\u003e\n\u003cli\u003emendesain guardrail,\u003c/li\u003e\n\u003cli\u003ememverifikasi output AI.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"hubungan-ke-catatan-lain\"\u003eHubungan ke catatan lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-catatan-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421161001\"\u003eAI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/a\u003e — AI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162253\"\u003eClassic, Modern, dan AI-native Software Engineering adalah tiga mode kerja, bukan disiplin formal\u003c/a\u003e — Classic, Modern, dan AI-native Software Engineering adalah tiga mode kerja, bukan disiplin formal\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u00 e\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultO
