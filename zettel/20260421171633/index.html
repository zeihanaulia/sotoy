el.moc.ai-native","id":"zettel.moc.ai-native","vaultName":"vault"},"type":"backlink","position":{"start":{"line":37,"column":3,"offset":2904},"end":{"line":37,"column":28,"offset":2929},"indent":[]},"value":"zettel.20260421171633"},{"from":{"fname":"zettel.moc.software-architecture","id":"zettel.moc.software-architecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":46,"column":3,"offset":3188},"end":{"line":46,"column":28,"offset":3213},"indent":[]},"value":"zettel.20260421171633"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":16,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":23,"column":0,"depth":2},"model-kerja-bmad-brainstorming":{"type":"header","text":"Model kerja BMAD Brainstorming","value":"model-kerja-bmad-brainstorming","line":31,"column":0,"depth":2},"peran-ai-dalam-bmad-brainstorming":{"type":"header","text":"Peran AI dalam BMAD brainstorming","value":"peran-ai-dalam-bmad-brainstorming","line":52,"column":0,"depth":2},"kenapa-ini-penting":{"type":"header","text":"Kenapa ini penting?","value":"kenapa-ini-penting","line":63,"column":0,"depth":2},"konsekuensi-untuk-workflow-ai-native":{"type":"header","text":"Konsekuensi untuk workflow AI-native","value":"konsekuensi-untuk-workflow-ai-native","line":72,"column":0,"depth":2},"hubungan-ke-analysis-phase-dan-named-agents":{"type":"header","text":"Hubungan ke analysis phase dan named agents","value":"hubungan-ke-analysis-phase-dan-named-agents","line":78,"column":0,"depth":2},"implikasi":{"type":"header","text":"Implikasi","value":"implikasi","line":84,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":95,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-brainstorming-memperjelas-ide-sebelum-requirement\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-brainstorming-memperjelas-ide-sebelum-requirement\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eMengapa BMAD menempatkan brainstorming sebelum planning?\u003c/li\u003e\n\u003cli\u003eApa peran AI dalam BMAD brainstorming?\u003c/li\u003e\n\u003cli\u003eBagaimana BMAD mencegah brainstorming menjadi daftar fitur dangkal?\u003c/li\u003e\n\u003cli\u003eKenapa ownership insight tetap berada pada manusia?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD brainstorming bukan pabrik fitur. Ia adalah proses terfasilitasi yang membantu engineer mengeluarkan asumsi, ketidakpastian, dan kemungkinan sebelum requirement disusun.\u003c/p\u003e\n\u003cp\u003ePrinsip inti BMAD: setiap ide berasal dari manusia; AI menciptakan kondisi agar insight itu muncul lebih konsisten.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBMAD menolak pola \"kasih gue 20 ide startup\" sebagai default. Di fase ini, AI bukan sumber ide utama; ia adalah arsitek kondisi berpikir.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"model-kerja-bmad-brainstorming\"\u003eModel kerja BMAD Brainstorming\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#model-kerja-bmad-brainstorming\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eSetup: tentukan topik, goals, dan constraints.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTujuan utamanya bukan mengerem kreativitas, melainkan memberi bidang permainan yang tepat.\u003c/li\u003e\n\u003cli\u003eTanpa setup, diskusi bisa melebar jadi variasi ide yang tidak bisa dibandingkan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eChoose approach: pilih teknik sendiri, minta rekomendasi AI, pakai random, atau ikuti progressive flow.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBMAD tahu tidak semua sesi sama. Ini membuat brainstorm menjadi mode eksplorasi yang bisa disesuaikan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFacilitation: proses berjalan lewat probing questions dan collaborative coaching.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFokusnya bukan output langsung, tapi cara membantu user melihat masalah dari perspektif baru.\u003c/li\u003e\n\u003cli\u003eIni mengubah percakapan dari \"apa solusi\" menjadi \"apa masalah yang sebenarnya?\" dan \"apa asumsi tersembunyi?\".\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eOrganize: kelompokkan ide ke tema, susun, dan prioritaskan.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBanyak sesi gagal bukan karena kekurangan ide, tapi karena hasilnya masih serpihan.\u003c/li\u003e\n\u003cli\u003eStruktur ini adalah nilai tambah utama BMAD: hasil brainstorming menjadi bahan yang bisa diolah selanjutnya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAction: pilih ide terbaik, beri next steps dan success metrics.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIni menghubungkan brainstorming dengan fase engineering berikutnya.\u003c/li\u003e\n\u003cli\u003eTanpa action, sesi tetap terasa inspiratif, tapi mudah mati di tempat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"peran-ai-dalam-bmad-brainstorming\"\u003ePeran AI dalam BMAD brainstorming\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#peran-ai-dalam-bmad-brainstorming\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI di sini bukan otomatisasi ide. AI membantu:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememunculkan sudut pandang baru,\u003c/li\u003e\n\u003cli\u003emenajamkan framing masalah,\u003c/li\u003e\n\u003cli\u003emenguji asumsi,\u003c/li\u003e\n\u003cli\u003emembuat output pemikiran lebih terstruktur.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAI tidak menggantikan judgment manusia. BMAD menempatkan manusia sebagai sumber insight, sedangkan AI adalah fasilitator proses berpikir.\u003c/p\u003e\n\u003ch2 id=\"kenapa-ini-penting\"\u003eKenapa ini penting?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika AI diposisikan sebagai generator ide utama, dua risiko muncul:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eide menjadi generik, karena model sering mengombinasikan pola umum dari data latihnya,\u003c/li\u003e\n\u003cli\u003euser jadi pasif, kehilangan kesempatan untuk menguji konteks, pengalaman, dan motivasi sendiri.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBMAD menghindari dua jebakan itu dengan memindahkan nilai utama dari output ke proses: emergence of insight.\u003c/p\u003e\n\u003ch2 id=\"konsekuensi-untuk-workflow-ai-native\"\u003eKonsekuensi untuk workflow AI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#konsekuensi-untuk-workflow-ai-native\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBrainstorming BMAD adalah alat hulu yang mempersiapkan bahan mentah berpikir sebelum riset, product brief, atau PRFAQ.\u003c/p\u003e\n\u003cp\u003eDibandingkan chat AI biasa, BMAD menjaga agar user tetap aktif sebagai sumber ide. Dibandingkan whiteboard tradisional, BMAD menyediakan struktur yang membuat hasil brainstorming bisa dilanjutkan ke engineering.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-analysis-phase-dan-named-agents\"\u003eHubungan ke analysis phase dan named agents\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-analysis-phase-dan-named-agents\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBrainstorming adalah fase paling awal di analysis phase. Ia bergeser dari sekadar eksplorasi menjadi bagian pertama dari pipeline engineering.\u003c/p\u003e\n\u003cp\u003eNamed agent seperti Mary mendukung peran ini: ia bukan sekadar nama, tetapi identitas AI yang menjaga sesi tetap dalam mode discovery dan facilitation.\u003c/p\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetelah brainstorming BMAD yang berhasil, Anda tidak hanya punya daftar kemungkinan. Anda punya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emasalah yang lebih tajam,\u003c/li\u003e\n\u003cli\u003easumsi yang teridentifikasi,\u003c/li\u003e\n\u003cli\u003etema ide yang terstruktur,\u003c/li\u003e\n\u003cli\u003elangkah nyata untuk melanjutkan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni memastikan planning berikutnya bukan menebak arah, tetapi merapikan pemikiran yang sudah lebih valid.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173600\"\u003eSimulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/a\u003e — simulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173427\"\u003eAI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/a\u003e — prinsip AI sebagai fasilitator insight dalam BMAD brainstorming\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171634\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003c/a\u003e — BMAD market research menangkap realitas eksternal sebelum planning\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e — BMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eanalysis-phase (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebrainstorming (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003efacilitation (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171634\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171637\"\u003eBMAD product brief merapikan visi produk sebelum PRD\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171825\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173427\"\u003eAI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173600\"\u003eSimulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174751\"\u003eQuick Dev diagram: node-by-node diagnosis layer dan alur koreksi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193304\"\u003ePlanning harus dipisah dari solutioning agar requirement dan teknikal decision tetap jernih\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-brainstorming\"\u003eBMAD Brainstorming sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":164
