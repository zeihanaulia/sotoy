ne":61,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"project-context-dan-feature-context-punya-fungsi-berbeda\"\u003eProject context dan feature context punya fungsi berbeda\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#project-context-dan-feature-context-punya-fungsi-berbeda\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eProject context dan feature context bukan dua nama untuk hal yang sama.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eIni penting supaya kita nggak salah pakai satu solusi untuk dua problem yang beda.\u003c/p\u003e\n\u003cp\u003eProject context memberi dasar stabil: bahasa proyek, stack, pola arsitektur, konvensi coding, dan aturan umum yang berlaku di seluruh repositori. Feature context memberi rekaman hidup dari keputusan spesifik, constraint, alternatif yang ditolak, dan titik terbuka untuk satu fitur atau saga kerja tertentu.\u003c/p\u003e\n\u003ch2 id=\"perbedaannya\"\u003ePerbedaannya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#perbedaannya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eProject context:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003estabil dan relatif jarang berubah\u003c/li\u003e\n\u003cli\u003edibaca oleh banyak sesi/fitur\u003c/li\u003e\n\u003cli\u003emenjawab pertanyaan seperti “apa framework utama?”, “bagaimana middleware ditangani?”, “apakah proyek ini monorepo atau single repo?”\u003c/li\u003e\n\u003cli\u003econtoh: \u003ccode\u003eProject uses Fastify, Postgres with JSONB, tenant-aware middleware, no GraphQL for v1\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFeature context:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ecepat berubah dan berkembang selama pengembangan\u003c/li\u003e\n\u003cli\u003ehanya relevan untuk satu fitur atau satu perjalanan keputusan\u003c/li\u003e\n\u003cli\u003emenjawab pertanyaan seperti “kenapa kita pilih BullMQ langsung?”, “apa yang sudah dipertimbangkan dan ditolak?”, “apa yang belum selesai?”\u003c/li\u003e\n\u003cli\u003econtoh: \u003ccode\u003eDecision: BullMQ direct retry; Rejected: RetryQueue wrapper due to unnecessary indirection; Open question: rate limiting approach\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"use-case\"\u003eUse case\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#use-case\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eProject context use case:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememulai sesi AI baru untuk proyek lama.\u003c/li\u003e\n\u003cli\u003ememperkenalkan karakteristik umum proyek ke AI tanpa mengulang seluruh sejarah fitur.\u003c/li\u003e\n\u003cli\u003emempercepat onboarding atau warm start: “project context says we use Fastify and tenant-aware auth, so start suggestions within that frame.”\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eFeature context use case:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emelanjutkan pengembangan feature yang berlangsung beberapa sesi.\u003c/li\u003e\n\u003cli\u003emenghindari AI mengulang ide yang sudah ditolak di sesi sebelumnya.\u003c/li\u003e\n\u003cli\u003emembuat sesi baru menjadi warm start dengan state: “feature doc says Email-only v1, no retry abstraction, keep existing auth middleware.”\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"kenapa-jangan-disamakan\"\u003eKenapa jangan disamakan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-jangan-disamakan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKalau kita mengandalkan satu dokumen saja, dua risiko muncul:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eproject context jadi terlalu kabur untuk keputusan mikro — AI tahu stack, tapi tidak tahu apakah \u003ccode\u003eRetryQueue\u003c/code\u003e sudah ditolak;\u003c/li\u003e\n\u003cli\u003efeature context jadi terlalu berat jika diperlakukan seperti dokumentasi proyek — terlalu banyak detail sesi, cepat usang, dan sulit dikelola.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMendukung \u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — klaim diambil dari Paragraf 13.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e — tesis utama bahwa chat AI adalah medium berpikir, bukan tempat penyimpanan keputusan.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e — baseline kolaborasi manusia yang transfer konteks ke dokumen.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — Paragraf 13\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon
