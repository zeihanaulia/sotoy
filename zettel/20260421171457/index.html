text":"Simulasi: ide invoice app","value":"simulasi-ide-invoice-app","line":84,"column":0,"depth":2},"mengapa-ini-relevan-untuk-ai-native-engineering":{"type":"header","text":"Mengapa ini relevan untuk AI-native engineering?","value":"mengapa-ini-relevan-untuk-ai-native-engineering","line":96,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":102,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-analysis-phase-menghentikan-ketidakjelasan-sebelum-berubah-jadi-prd-dan-architecture\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-analysis-phase-menghentikan-ketidakjelasan-sebelum-berubah-jadi-prd-dan-architecture\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eKenapa BMAD percaya analysis perlu ada sebelum planning?\u003c/li\u003e\n\u003cli\u003eApa yang dilakukan BMAD di fase ini, tool per tool?\u003c/li\u003e\n\u003cli\u003eDalam praktik nyata, hasil analysis itu mengubah apa?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD analysis phase bukan fase untuk menambah dokumen. Ia adalah fase untuk mencegah ketidakjelasan naik level: sebelum PRD, sebelum architecture, sebelum story breakdown.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eKalau ide kabur, PRD-nya ikut kabur. Kalau PRD kabur, architecture akan mengambil taruhan teknis yang salah.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"mengapa-analysis-phase-diperlukan-sebelum-planning\"\u003eMengapa analysis phase diperlukan sebelum planning?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-analysis-phase-diperlukan-sebelum-planning\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman BMAD Analysis Phase mengatakan sesuatu yang cukup tajam: PRD bukan tempat terbaik untuk berpikir dari nol. PRD adalah tempat untuk merapikan keputusan.\u003c/p\u003e\n\u003cp\u003eKalau Anda langsung lompat ke PRD dari ide mentah, Anda sedang memberi AI bahan yang berpotensi sangat berbahaya. AI bisa merapikan sesuatu yang belum matang dengan tampilan profesional, tetapi itu tidak membuatnya benar. BMAD melihat itu sebagai risiko utama dalam AI-native engineering.\u003c/p\u003e\n\u003cp\u003eJadi, phase ini hadir untuk menghentikan error sebelum error itu menjadi struktur. Ini bukan soal menunda sampai segalanya sempurna. Ini soal memastikan bahwa ide mentah diproses dulu menjadi insight, dan bukan diletakkan ke dalam requirement secara mentah.\u003c/p\u003e\n\u003ch2 id=\"apa-yang-bmad-lakukan-di-phase-ini\"\u003eApa yang BMAD lakukan di phase ini?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-bmad-lakukan-di-phase-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman itu menawarkan beberapa tool: brainstorming, research, product brief, dan PRFAQ. Kreatifnya, BMAD tidak memberi nama-nama ini sebagai fitur tambahan. Mereka dijajarkan sebagai cara berbeda untuk mengerjakan ketidakjelasan.\u003c/p\u003e\n\u003ch3 id=\"brainstorming\"\u003eBrainstorming\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#brainstorming\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eIni bukan sekadar memaksa AI menghasilkan daftar fitur. Brainstorming di BMAD dirancang sebagai sesi kreatif terstruktur yang membantu Anda mengeluarkan apa yang ada di kepala.\u003c/p\u003e\n\u003cp\u003eAI di fase ini bertindak lebih sebagai coach daripada pabrik ide. Ia membantu Anda menajamkan apa yang sebenarnya Anda rasakan, apa yang Anda asumsikan, dan apa yang Anda belum tahu. Tujuannya bukan untuk menggantikan pemikiran Anda, melainkan untuk membuat pemikiran itu lebih eksplisit.\u003c/p\u003e\n\u003cp\u003eFungsi utamanya adalah menangkap wilayah \"saya merasa ada sesuatu di sini, tapi belum kebentuk\". Brainstorming adalah alat untuk membuat wilayah itu menjadi cukup jelas supaya Anda tidak langsung terkunci di requirement yang salah.\u003c/p\u003e\n\u003ch3 id=\"research\"\u003eResearch\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#research\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD membagi research menjadi tiga domain: market, domain, dan technical.\u003c/p\u003e\n\u003cp\u003eMarket research menguji realitas eksternal: siapa pemainnya, apa tren pasar, bagaimana user sekarang menyelesaikan masalah ini. Domain research menguji logika internal: istilah apa yang penting, apa constraint industri, bagaimana ahli domain bicara. Technical research menguji feasibility: apakah solusi ini bisa dibangun dengan trade-off yang wajar?\u003c/p\u003e\n\u003cp\u003eIni bukan sekadar \"kami perlu riset\". Ini pengakuan bahwa satu jenis riset saja tidak cukup. Memahami hanya pasar tanpa domain memunculkan produk yang tidak relevan. Memahami hanya teknis tanpa pasar memunculkan solusi tanpa pembeli. BMAD memecah riset agar analysis dapat menangkap berbagai buta: pasar, domain, dan teknik.\u003c/p\u003e\n\u003ch3 id=\"product-brief\"\u003eProduct Brief\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#product-brief\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eProduct Brief adalah jalur yang lebih lembut menuju planning. Ini bukan media untuk menemukan ide dari nol. Ini alat untuk merapikan keyakinan yang sudah ada.\u003c/p\u003e\n\u003cp\u003eJika Anda sudah cukup yakin tentang target customer dan masalah utamanya, Product Brief membantu mengeluarkan visi itu dengan jelas. Ia memaksa perbedaan antara \"saya punya gagasan\" dan \"ini gagasan yang dapat dijelaskan secara strategis.\" Dalam konteks BMAD, brief adalah cara membuat ide yang belum perlu dipukul habis oleh adversarial questions tetap dapat ditransisi ke PRD.\u003c/p\u003e\n\u003ch3 id=\"prfaq\"\u003ePRFAQ\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#prfaq\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePRFAQ adalah mode yang lebih keras. Ini adalah versi BMAD dari Amazon Working Backwards.\u003c/p\u003e\n\u003cp\u003eAlih-alih sekadar menerima deskripsi produk, BMAD memaksa Anda menulis press release seolah produk sudah jadi, lalu menjawab FAQ yang kritis. Ini adalah momen di mana elasticitas ide diuji: apakah nilai itu komunikatif? apakah solusi itu berbeda? apakah masalahnya jelas?\u003c/p\u003e\n\u003cp\u003eDi sini AI berperan bukan sebagai pembenaran, tetapi sebagai penantang. Jika ide Anda tidak bisa dijelaskan dengan bahasa yang meyakinkan, itu menandakan bahwa fase analysis belum selesai.\u003c/p\u003e\n\u003ch2 id=\"apa-yang-berubah-setelah-analysis\"\u003eApa yang berubah setelah analysis?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-berubah-setelah-analysis\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDalam BMAD, hasil analysis bukan sekadar lebih banyak dokumen. Ia mengubah kualitas input ke tahap berikutnya.\u003c/p\u003e\n\u003cp\u003eSecara praktis, analysis yang baik dapat membuat perbedaan ini:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eide mentah berubah dari \"invoice app\" menjadi \"accounts receivable assistant for freelancers yang mengurangi keterlambatan pembayaran\";\u003c/li\u003e\n\u003cli\u003easumsi yang tersembunyi dikonversi menjadi risiko eksplisit;\u003c/li\u003e\n\u003cli\u003eruang lingkup yang awalnya luas disempitkan menjadi arah yang lebih tajam;\u003c/li\u003e\n\u003cli\u003ekeputusan teknis awal tidak lagi berdiri di atas tebakan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan kata lain, analysis phase adalah filter epistemik. Ia menyaring asumsi-asumsi kabur sebelum asumsi tersebut menjadi struktur yang lebih kuat, seperti PRD dan architecture.\u003c/p\u003e\n\u003ch2 id=\"simulasi-ide-invoice-app\"\u003eSimulasi: ide invoice app\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#simulasi-ide-invoice-app\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBayangkan Anda punya gagasan \"aplikasi invoice untuk freelancer.\" Tanpa analysis, langkah pertama yang banyak diambil adalah langsung meminta AI membuat PRD atau fitur.\u003c/p\u003e\n\u003cp\u003eDalam BMAD, langkah pertama adalah menguji apakah fokus masalah itu benar. Di sesi brainstorming, Anda akan didorong untuk menjawab: freelancer mana? masalah sebenarnya di mana? apakah ini soal pembuatan invoice atau soal penagihan dan visibilitas cashflow? Apakah targetnya freelancer lokal atau global? Apakah klien mereka lebih sering menunda atau lupa membayar?\u003c/p\u003e\n\u003cp\u003eJika Anda lanjut ke market research, Anda akan menemukan apakah pasar ini sudah terang, apakah persaingan tinggi, dan di mana celahnya. Domain research akan memberitahu apakah ada regulasi atau pola administratif yang membuat solusi Anda berbeda. Technical research akan menguji apakah fitur pembeda seperti follow-up WhatsApp atau otomatisasi reminder memang layak dan dapat dibangun.\u003c/p\u003e\n\u003cp\u003eJika Anda kemudian membuat Product Brief, Anda mungkin akan menuliskan bahwa produk Anda bukan sekadar invoice generator, tetapi alat yang membantu freelancer mengelola keterlambatan pembayaran dan cashflow. Jika Anda memilih PRFAQ, ide ini akan diuji keras: apakah pesan itu cukup jelas? apakah pengguna peduli? apakah solusi ini cukup berbeda dari software akuntansi yang sudah ada?\u003c/p\u003e\n\u003cp\u003eDari sana, jika fase analysis berhasil, yang dibawa ke Planning bukan lagi sekadar keinginan untuk membuat invoice app. Ia menjadi konsep yang jauh lebih kuat dan berarah. Dan itu adalah nilai utama dari fase ini.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-relevan-untuk-ai-native-engineering\"\u003eMengapa ini relevan untuk AI-native engineering?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-relevan-untuk-ai-native-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD analysis phase adalah jawaban atas bahaya yang muncul ketika AI diperlakukan sebagai mesin spontan. AI sangat baik dalam menstrukturkan hal yang belum matang. Itu justru bahayanya. BMAD mendesain analysis phase untuk mengambil langkah mundur dan berkata: sebelum kita memberi AI tugas membuat solusi, mari kita pastikan masalahnya sudah cukup jernih.\u003c/p\u003e\n\u003cp\u003eDengan kata lain, phase ini bukan tentang menambah biaya proses. Ia tentang menambah kualitas proses sebelum mesin percepatan itu diaktifkan.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170812\"\u003eBMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/a\u003e — BMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170516\"\u003eBMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/a\u003e — BMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171634\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003c/a\u003e — BMAD market research menangkap realitas eksternal sebelum planning\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171635\"\u003eBMAD domain research memaksa pemahaman logika industri sebelum solusi\u003c/a\u003e — BMAD domain research memaksa pemahaman logika industri sebelum solusi\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171636\"\u003eBMAD technical research memvalidasi feasibility sebelum architecture\u003c/a\u003e — BMAD technical research memvalidasi feasibility sebelum architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171637\"\u003eBMAD product brief merapikan visi produk sebelum PRD\u003c/a\u003e — BMAD product brief merapikan visi produk sebelum PRD\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171638\"\u003eBMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/a\u003e — BMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171823\"\u003eBMAD analysis phase sebagai epistemic filter sebelum PRD\u003c/a\u003e — BMAD analysis phase sebagai epistemic filter sebelum PRD\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171824\"\u003eBMAD Product Brief vs PRFAQ: klarifikasi lembut versus pengujian adversarial\u003c/a\u003e — BMAD Product Brief vs PRFAQ: klarifikasi lembut versus pengujian adversarial\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171825\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003c/a\u003e — Simulasi BMAD analysis phase: invoice app untuk freelancer\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eanalysis-phase (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emethodology (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171634\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171635\"\u003eBMAD domain research memaksa pemahaman logika industri sebelum solusi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171636\"\u003eBMAD technical research memvalidasi feasibility sebelum architecture\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171637\"\u003eBMAD product brief merapikan visi produk sebelum PRD\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171638\"\u003eBMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171823\"\u003eBMAD analysis phase sebagai epistemic filter sebelum PRD\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171824\"\u003eBMAD Product Brief vs PRFAQ: klarifikasi lembut versus pengujian adversarial\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171825\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172636\"\u003eBMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172800\"\u003eBMAD project context adalah konstitusi implementasi untuk AI agents, bukan dokumentasi biasa\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173427\"\u003eAI brainstorming terbaik adalah fasilitasi kondisi insight, bukan generator ide\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173600\"\u003eSimulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193304\"\u003ePlanning harus dipisah dari solutioning agar requirement dan teknikal decision tetap jernih\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-analysis-phase\"\u003eBMAD Analysis Phase sebagai literature note\u003c/a\u003e\u003c/li\u003e\
