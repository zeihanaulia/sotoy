ps":{"note":{"id":"zettel.20260419192040","title":"Executable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior","desc":"Prinsip Martin Fowler tentang mengeksekusi standar tim lewat AI diterjemahkan ke dalam lapisan Copilot: docs, custom instructions, skills, dan agent instructions.","tags":["permanent-note","copilot","ai","governance","workflow"],"custom":{},"fname":"zettel.20260419192040","type":"note","vault":{"fsPath":"vault"},"contentHash":"79fd67f7537fcd3a29ad83159d2b4585","updated":1776683200177,"created":1776683200177,"links":[{"type":"frontmatterTag","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"tags.permanent-note","alias":"permanent-note","xvault":false,"to":{"fname":"tags.permanent-note"}},{"type":"frontmatterTag","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"tags.copilot","alias":"copilot","xvault":false,"to":{"fname":"tags.copilot"}},{"type":"frontmatterTag","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"tags.ai","alias":"ai","xvault":false,"to":{"fname":"tags.ai"}},{"type":"frontmatterTag","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"tags.governance","alias":"governance","xvault":false,"to":{"fname":"tags.governance"}},{"type":"frontmatterTag","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"tags.workflow","alias":"workflow","xvault":false,"to":{"fname":"tags.workflow"}},{"type":"wiki","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"zettel.literature.encoding-team-standards","position":{"start":{"line":48,"column":18,"offset":3257},"end":{"line":48,"column":63,"offset":3302},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.literature.encoding-team-standards"}},{"type":"wiki","from":{"fname":"zettel.20260419192040","id":"zettel.20260419192040","vaultName":"vault"},"value":"notes.copilot.custom-instructions-best-practices","position":{"start":{"line":49,"column":22,"offset":3324},"end":{"line":49,"column":74,"offset":3376},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"notes.copilot.custom-instructions-best-practices"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":101,"column":3,"offset":8716},"end":{"line":101,"column":28,"offset":8741},"indent":[]},"value":"zettel.20260419192040"},{"from":{"fname":"zettel.20260419192239","id":"zettel.20260419192239","vaultName":"vault"},"type":"backlink","position":{"start":{"line":22,"column":3,"offset":956},"end":{"line":22,"column":28,"offset":981},"indent":[]},"value":"zettel.20260419192040"},{"from":{"fname":"zettel.20260419194901","id":"zettel.20260419194901","vaultName":"vault"},"type":"backlink","position":{"start":{"line":113,"column":3,"offset":4075},"end":{"line":113,"column":28,"offset":4100},"indent":[]},"value":"zettel.20260419192040"},{"from":{"fname":"notes.copilot.tacit-knowledge-extraction","id":"notes.copilot.tacit-knowledge-extraction","vaultName":"vault"},"type":"backlink","position":{"start":{"line":227,"column":3,"offset":7531},"end":{"line":227,"column":28,"offset":7556},"indent":[]},"value":"zettel.20260419192040"},{"from":{"fname":"zettel.literature.encoding-team-standards","id":"zettel.literature.encoding-team-standards","vaultName":"vault"},"type":"backlink","position":{"start":{"line":97,"column":3,"offset":4246},"end":{"line":97,"column":28,"offset":4271},"indent":[]},"value":"zettel.20260419192040"}],"anchors":{"bentuk-praktis-instruksi":{"type":"header","text":"Bentuk praktis instruksi","value":"bentuk-praktis-instruksi","line":28,"column":0,"depth":3},"referensi-praktis":{"type":"header","text":"Referensi praktis","value":"referensi-praktis","line":44,"column":0,"depth":3}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"executable-governance-di-copilot-butuh-dokumentasi-custom-instructions-skills-dan-agent-behavior\"\u003eExecutable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#executable-governance-di-copilot-butuh-dokumentasi-custom-instructions-skills-dan-agent-behavior\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cblockquote\u003e\n\u003cp\u003eUntuk membuat judgement senior bisa digunakan secara konsisten, tim perlu membangun stack instruksi yang berlapis: dokumentasi untuk manusia, custom instructions untuk aturan umum, skills untuk workflow spesifik, dan agent behavior untuk task otonom.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edocumentation\u003c/code\u003e tetap penting sebagai konteks panjang dan alasan. Ia membantu onboarding dan menjelaskan kenapa aturan ada.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecustom instructions\u003c/code\u003e (\u003ccode\u003e.github/copilot-instructions.md\u003c/code\u003e dan \u003ccode\u003e.github/instructions/*.instructions.md\u003c/code\u003e) meng-encode aturan repo-wide dan context-specific yang hampir selalu berlaku.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eskills\u003c/code\u003e adalah playbook task-specific yang dipanggil saat relevan, misalnya \u003ccode\u003esystematic-debugging\u003c/code\u003e atau \u003ccode\u003ebug-reporting\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eagent instructions\u003c/code\u003e / \u003ccode\u003eAGENTS.md\u003c/code\u003e mendefinisikan perilaku Copilot agent saat task lebih otonom.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"bentuk-praktis-instruksi\"\u003eBentuk praktis instruksi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bentuk-praktis-instruksi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePraktik yang benar bukan \"tulisan panjang di dalam prompt\", tapi file artefak yang berfungsi sebagai kontrak operasi.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.github/copilot-instructions.md\u003c/code\u003e untuk hukum umum repo: tujuan utama, standar must/should/avoid, validasi akhir, dan dokumen onboarding yang harus dibaca.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/instructions/*.instructions.md\u003c/code\u003e untuk aturan domain atau path-specific: kapan berlaku, apa yang harus diikuti di area itu, dan output yang diharapkan.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAGENTS.md\u003c/code\u003e untuk agent behavior: bagaimana agent merencanakan, kapan berhenti, kapan eskalasi, dan kapan memprioritaskan bukti sebelum eksekusi.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/skills/\u0026#x3C;skill\u003e/SKILL.md\u003c/code\u003e untuk workflow task-specific: input yang diperlukan, langkah diagnosis/implementasi, dan format output yang konsisten.\u003c/li\u003e\n\u003cli\u003eKonteks tambahan seperti \u003ccode\u003edocs/onboarding/\u003c/code\u003e, \u003ccode\u003edocs/plans/tasks/\u003c/code\u003e, dan tracker dipakai sebagai sumber niat dan batasan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBentuk praktis ini menekankan empat hal:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003erole dan orientasi keputusan (misalnya \"bertindak sebagai senior engineer\").\u003c/li\u003e\n\u003cli\u003ekonteks wajib baca sebelum mulai (misalnya onboarding+plan).  \u003c/li\u003e\n\u003cli\u003eprioritas standar \u003ccode\u003eMust / Should / Avoid\u003c/code\u003e yang terstruktur.  \u003c/li\u003e\n\u003cli\u003eoutput terformat yang bisa diaudit.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"referensi-praktis\"\u003eReferensi praktis\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#referensi-praktis\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eGitHub Docs: Adding repository custom instructions for GitHub Copilot\n\u003ca href=\"https://docs.github.com/copilot/customizing-copilot/adding-custom-instructions-for-github-copilot\"\u003ehttps://docs.github.com/copilot/customizing-copilot/adding-custom-instructions-for-github-copilot\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eGitHub Docs: Your first custom instructions\n\u003ca href=\"https://docs.github.com/en/copilot/tutorials/customization-library/custom-instructions/your-first-custom-instructions\"\u003ehttps://docs.github.com/en/copilot/tutorials/customization-library/custom-instructions/your-first-custom-instructions\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eGitHub Docs: Support for different types of custom instructions\n\u003ca href=\"https://docs.github.com/en/copilot/reference/custom-instructions-support\"\u003ehttps://docs.github.com/en/copilot/reference/custom-instructions-support\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eGitHub Docs: Adding agent skills for GitHub Copilot\n\u003ca href=\"https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/add-skills\"\u003ehttps://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/add-skills\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eGitHub Docs: About agent skills\n\u003ca href=\"https://docs.github.com/en/copilot/concepts/agents/about-agent-skills\"\u003ehttps://docs.github.com/en/copilot/concepts/agents/about-agent-skills\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eMartin Fowler: Encoding Team Standards\n\u003ca href=\"https://martinfowler.com/articles/reduce-friction-ai/encoding-team-standards.html\"\u003ehttps://martinfowler.com/articles/reduce-friction-ai/encoding-team-standards.html\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eImplikasi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIni jadi arsitektur governance, bukan sekadar prompt collection.\u003c/li\u003e\n\u003cli\u003eTanpa pemisahan ini, repo Copilot mudah jadi berantakan: aturan umum, aturan khusus, dan workflow bisa saling tumpang tindih.\u003c/li\u003e\n\u003cli\u003ePaling baik mulai dari satu global instruction, satu atau dua path-specific instructions, dan satu skill penting. Setelah itu selalu kalibrasi berdasarkan penggunaan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e→ Dikuatkan oleh \u003ca href=\"/sotoy/notes/zettel.literature.encoding-team-standards\"\u003eEncoding Team Standards — executable AI instruction untuk konsistensi tim\u003c/a\u003e\n→ Berhubungan dengan \u003ca href=\"/sotoy/notes/notes.copilot.custom-instructions-best-practices\"\u003eBest Practices for Writing Copilot Custom Instructions\u003c/a\u003e\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003epermanent-note (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ecopilot (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003egovernance (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192239\"\u003eExecutable governance adalah standar tim yang bukan hanya ditulis, tapi dijalankan oleh AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419194901\"\u003eTacit knowledge senior diubah jadi artefak operasional untuk AI dan tim\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.copilot.tacit-knowledge-extraction\"\u003eEkstraksi Tacit Knowledge Senior untuk AI dan Tim\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.encoding-team-standards\"\u003eEncoding Team Standards — executable AI instruction untuk konsistensi tim\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you
