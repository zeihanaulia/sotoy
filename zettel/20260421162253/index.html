36,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"classic-modern-dan-ai-native-software-engineering-adalah-tiga-mode-kerja-bukan-disiplin-formal\"\u003eClassic, Modern, dan AI-native Software Engineering adalah tiga mode kerja, bukan disiplin formal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#classic-modern-dan-ai-native-software-engineering-adalah-tiga-mode-kerja-bukan-disiplin-formal\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa beda inti cara berpikir dari Classic, Modern, dan AI-native Software Engineering?\u003c/li\u003e\n\u003cli\u003eDalam workflow nyata, siapa yang melakukan apa di tiap mode?\u003c/li\u003e\n\u003cli\u003eKalau dikasih tugas yang sama, hasilnya akan berbeda di mana?\u003c/li\u003e\n\u003cli\u003eTrade-off dan failure mode masing-masing apa?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eClassic, Modern, dan AI-native Software Engineering bukan tiga disiplin formal yang punya definisi universal. Mereka adalah tiga mode kerja engineering yang dibedakan oleh di mana letak tenaga utama engineering dikeluarkan.\u003c/p\u003e\n\u003ch2 id=\"definisi-atomik\"\u003eDefinisi atomik\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#definisi-atomik\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"classic-software-engineering\"\u003eClassic Software Engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#classic-software-engineering\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003ePelaku utama: manusia.\u003c/li\u003e\n\u003cli\u003eCoding, testing, dokumentasi, debugging, deployment banyak dilakukan manual atau semi-manual.\u003c/li\u003e\n\u003cli\u003eProses cenderung linear: requirement → design → code → test → release.\u003c/li\u003e\n\u003cli\u003eKnowledge sering tersimpan di senior engineer dan dokumen formal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eModel mental: \u003cstrong\u003esoftware dibangun oleh manusia, dengan tool sebagai alat bantu pasif.\u003c/strong\u003e\u003c/p\u003e\n\u003ch3 id=\"modern-software-engineering\"\u003eModern Software Engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#modern-software-engineering\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003ePelaku utama tetap manusia, tetapi delivery sangat diotomasi.\u003c/li\u003e\n\u003cli\u003eCI/CD, cloud, observability, test automation, trunk-based development, infra-as-code, dan platform engineering menjadi norma.\u003c/li\u003e\n\u003cli\u003eFeedback loop lebih cepat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eModel mental: \u003cstrong\u003esoftware dibangun oleh manusia, dibantu sistem automasi yang menjaga kualitas dan kecepatan.\u003c/strong\u003e\u003c/p\u003e\n\u003ch3 id=\"ai-native-software-engineering\"\u003eAI-native Software Engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native-software-engineering\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eManusia tidak lagi menulis semua perubahan langsung.\u003c/li\u003e\n\u003cli\u003eAI agent/model menjadi aktor aktif dalam analisis, implementasi, test generation, dokumentasi, refactor, dan eksplorasi codebase.\u003c/li\u003e\n\u003cli\u003eTugas engineer bergeser ke orkestrasi intent, context, constraint, workflow, dan verifikasi output AI.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eModel mental: \u003cstrong\u003esoftware dibangun oleh manusia + AI sebagai co-worker operasional, di bawah constraint dan review yang didefinisikan manusia.\u003c/strong\u003e\u003c/p\u003e\n\u003ch2 id=\"perbedaan-inti-cara-berpikir\"\u003ePerbedaan inti cara berpikir\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#perbedaan-inti-cara-berpikir\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eClassic = engineer sebagai pembuat langsung.\u003c/li\u003e\n\u003cli\u003eModern = engineer sebagai perancang dan pemelihara delivery system.\u003c/li\u003e\n\u003cli\u003eAI-native = engineer sebagai orchestrator AI dan penyusun konteks.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"siapa-melakukan-apa\"\u003eSiapa melakukan apa\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#siapa-melakukan-apa\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"classic\"\u003eClassic\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#classic\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineer menulis kode dan tes.\u003c/li\u003e\n\u003cli\u003eQA melakukan verifikasi manual.\u003c/li\u003e\n\u003cli\u003eRelease engineer atau ops menjalankan deployment.\u003c/li\u003e\n\u003cli\u003eTool hanya membantu editing, version control, dan eksekusi manual.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"modern\"\u003eModern\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#modern\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineer menulis kode dan tes.\u003c/li\u003e\n\u003cli\u003eSistem otomatis menjalankan CI, build, test, security scan, deploy.\u003c/li\u003e\n\u003cli\u003ePlatform engineer menjaga pipeline dan observability.\u003c/li\u003e\n\u003cli\u003eManual review fokus pada desain dan kualitas.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"ai-native\"\u003eAI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineer menulis spec, acceptance criteria, context, dan guardrail.\u003c/li\u003e\n\u003cli\u003eAI agent menganalisis codebase, mengenerate kode, membuat tes, dan menyiapkan PR.\u003c/li\u003e\n\u003cli\u003eSistem otomatis masih melakukan validasi dan deployment.\u003c/li\u003e\n\u003cli\u003eEngineer review hasil AI dan memutuskan aksi final.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"skenario-yang-sama-fitur-reset-password\"\u003eSkenario yang sama: fitur reset password\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#skenario-yang-sama-fitur-reset-password\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"classic-1\"\u003eClassic\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#classic-1\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eRequirement turun lewat tiket.\u003c/li\u003e\n\u003cli\u003eEngineer implement manual endpoint, token, email, UI, validasi.\u003c/li\u003e\n\u003cli\u003eQA mengetes manual/staging.\u003c/li\u003e\n\u003cli\u003eDeploy prosedural.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBeban utama: ingatan engineer, navigasi codebase, komunikasi manusia, checklist manual.\u003c/p\u003e\n\u003ch3 id=\"modern-1\"\u003eModern\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#modern-1\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineer masih menulis mayoritas kode.\u003c/li\u003e\n\u003cli\u003eNamun kode diuji, dibuild, dan dideploy oleh pipeline otomatis.\u003c/li\u003e\n\u003cli\u003eObservability dan rollback tersedia.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBeban utama: desain sistem, kualitas delivery, pipeline sehat.\u003c/p\u003e\n\u003ch3 id=\"ai-native-1\"\u003eAI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native-1\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eEngineer mendefinisikan spec, context, constraint, dan workflow.\u003c/li\u003e\n\u003cli\u003eAI agent scan codebase, generate perubahan, dan jalankan tes.\u003c/li\u003e\n\u003cli\u003eEngineer fokus pada review kualitas dan domain.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBeban utama: orkestrasi intent, context, guardrail, dan verifikasi AI.\u003c/p\u003e\n\u003ch2 id=\"trade-off-dan-failure-mode\"\u003eTrade-off dan failure mode\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#trade-off-dan-failure-mode\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"classic-2\"\u003eClassic\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#classic-2\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eKelebihan: kontrol manusia tinggi, reasoning eksplisit.\u003c/li\u003e\n\u003cli\u003eKekurangan: lambat, costly, knowledge bottleneck, mudah lupa.\u003c/li\u003e\n\u003cli\u003eFailure mode: proses manual berat, release kaku, human error.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"modern-2\"\u003eModern\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#modern-2\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eKelebihan: lebih cepat, stabil, feedback loop pendek.\u003c/li\u003e\n\u003cli\u003eKekurangan: masih bergantung pada jam manusia untuk implementasi besar.\u003c/li\u003e\n\u003cli\u003eFailure mode: tooling kompleks tanpa tujuan, pipeline rapuh, developer experience buruk.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"ai-native-2\"\u003eAI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ai-native-2\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eKelebihan: perubahan multi-file cepat, eksplorasi murah, dokumentasi/test paralel.\u003c/li\u003e\n\u003cli\u003eKekurangan: spesifikasi jelek cepat jadi masalah, context miskin, overtrust AI.\u003c/li\u003e\n\u003cli\u003eFailure mode: solusi terlihat rapi tapi salah domain/security/architecture; false confidence.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"catatan-penting\"\u003eCatatan penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eAI-native bukan sekadar modern SE plus Copilot.\u003c/li\u003e\n\u003cli\u003eJika engineer masih menulis sebagian besar kode sendiri dan AI hanya autocomplete, itu lebih tepat disebut \u003cstrong\u003emodern engineering with AI assistance\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eAI-native sehat dibangun di atas fondasi modern: repo rapi, test ada, observability hidup, boundary jelas.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421161001\"\u003eAI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/a\u003e — AI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-engineering (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emodern-software-engineering (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162310\"\u003eAI-native Software Engineering memindahkan gravitasi kerja engineering ke orkestrasi dan verifikasi AI\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162320\"\u003eAI-native Software Engineering membutuhkan fondasi Modern SE agar tidak mempercepat chaos\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421163750\"\u003eThoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articl
