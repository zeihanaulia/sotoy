cblockquote\u003e\n\u003cp\u003e\"When faced with the need to replace existing software systems, organizations often fall into a cycle of half-completed technology replacements. Our experiences have taught us a series of patterns that allow us to break this cycle, relying on: a deliberate recognition of the desired outcomes of displacing the legacy software, breaking this displacement in parts, incrementally delivering these parts, and changing the culture of the organization to recognize that change is the unvarying reality.\"\u003c/p\u003e\n\u003cp\u003eSumber: \u003ca href=\"https://martinfowler.com/architecture/\"\u003ehttps://martinfowler.com/architecture/\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eParagraf 17 menyorot bahwa modernisasi sering gagal karena organisasi jatuh ke rewrite besar yang tidak selesai.\u003c/li\u003e\n\u003cli\u003eSolusi Fowler adalah displacement bertahap dengan outcome jelas, delivery incremental, dan perubahan budaya organisasi.\u003c/li\u003e\n\u003cli\u003eIni konsisten dengan pandangan bahwa arsitektur sehat mendukung evolusi bertahap, bukan lompatan besar yang rapuh.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eImplikasi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eModernisasi bukan soal membuang semuanya dan membangun ulang secara sekali jalan.\u003c/li\u003e\n\u003cli\u003eLebih aman menggeser beban sistem lama secara terarah sambil terus mengirim nilai.\u003c/li\u003e\n\u003cli\u003eArsitektur dan organisasi harus siap melihat modernisasi sebagai proses berkelanjutan yang melibatkan outcome, delivery, dan budaya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHubungan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.software-architecture-guide\"\u003eSoftware Architecture Guide — Fowler: arsitektur sebagai keputusan penting dan mahal kalau salah\u003c/a\u003e — ringkasan halaman Software Architecture Guide\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085507\"\u003eBoundary aplikasi adalah konstruksi sosial, bukan fakta alam\u003c/a\u003e — boundary aplikasi adalah konstruksi sosial, bukan fakta alam\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085834\"\u003eMicroservices adalah trade-off machine, bukan arsitektur modern otomatis\u003c/a\u003e — microservices adalah trade-off machine, bukan arsitektur modern otomatis\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420085349\"\u003eKeputusan arsitektural penting bergantung pada skala sistem\u003c/a\u003e — keputusan arsitektural penting bergantung pada skala sistem\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003epermanent-note (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-architecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003earchitecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003elegacy-modernization (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emartin-fowler (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/st
