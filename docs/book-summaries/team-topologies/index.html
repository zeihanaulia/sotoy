784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8z"></path></svg></span></div></div></header><div class="ant-layout css-mncuj7" style="margin-top:64px;display:flex;flex-direction:row;width:100%;max-width:1200px;margin:0 auto"><div class="site-layout-sidebar" style="flex:0 0 auto;width:200px;min-width:200px"><aside class="ant-layout-sider ant-layout-sider-dark css-mncuj7" style="position:fixed;top:64px;overflow:auto;height:calc(100vh - 64px);background-color:transparent;flex:0 0 200px;max-width:200px;min-width:200px;width:200px"><div class="ant-layout-sider-children"></div></aside></div><main class="ant-layout-content side-layout-main css-mncuj7" style="flex:1;min-width:0;display:block"><div style="padding:48px 24px 0;max-width:1200px;margin:0 auto"><div class="main-content" role="main"></div></div><div class="ant-divider css-mncuj7 ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer css-mncuj7" style="padding:0 24px 24px"></footer></main></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"note":{"id":"book-summaries.team-topologies","title":"Team Topologies","desc":"","updated":1683595554316,"created":1683524168473,"custom":{},"fname":"book-summaries.team-topologies","type":"note","vault":{"fsPath":"vault"},"contentHash":"9395b73544f5d4bb435a05144a4625bc","links":[],"anchors":{"the-problem-with-org-charts":{"type":"header","text":"The Problem with Org Charts","value":"the-problem-with-org-charts","line":8,"column":0,"depth":2},"problem--solution":{"type":"header","text":"Problem \u0026 Solution","value":"problem--solution","line":10,"column":0,"depth":3},"takeaways":{"type":"header","text":"Takeaways","value":"takeaways","line":17,"column":0,"depth":3},"summary":{"type":"header","text":"Summary","value":"summary","line":25,"column":0,"depth":3}},"children":["book-summaries.team-topologies.the-problem-with-org-charts"],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"team-topologies\"\u003eTeam Topologies\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#team-topologies\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"the-problem-with-org-charts\"\u003eThe Problem with Org Charts\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-problem-with-org-charts\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"problem--solution\"\u003eProblem \u0026#x26; Solution\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#problem--solution\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePada Chapter 1, buku ini membahas tentang masalah dalam pengembangan perangkat lunak yang sering terjadi di banyak organisasi, yaitu ketidakmampuan untuk mengoptimalkan aliran kerja dan feedback dari sistem yang dijalankan. Hal ini disebabkan oleh model organisasi tradisional yang terfokus pada spesialisasi fungsional, perencanaan proyek besar, dan minimnya perhatian terhadap dinamika sosioteknis dalam pengembangan perangkat lunak. Akibatnya, tim pengembang menjadi bottleneck dalam aliran kerja, memperlambat produksi, menurunkan kualitas, dan merusak motivasi anggota tim.\u003c/p\u003e\n\u003cp\u003eSolusi yang ditawarkan oleh buku ini adalah pendekatan Team Topologies. Pendekatan ini mengusulkan desain organisasi yang lebih fleksibel dan adaptif dengan mengoptimalkan aliran perubahan dan umpan balik dari sistem yang dijalankan. Pendekatan ini mencakup perubahan dalam struktur, tujuan, dan interaksi tim, seperti pembatasan beban kognitif pada tim, perancangan interaksi tim secara eksplisit, dan pendekatan yang berorientasi pada tim. Dengan mengadopsi pendekatan Team Topologies, organisasi dapat mengoptimalkan aliran kerja dan meningkatkan adaptabilitas strategis mereka dalam jangka panjang.\u003c/p\u003e\n\u003ch3 id=\"takeaways\"\u003eTakeaways\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#takeaways\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eStruktur organisasi yang tepat sangat penting untuk pengembangan dan operasi perangkat lunak yang efektif. Pendekatan konvensional yang menganggap pengembangan perangkat lunak sebagai jenis manufaktur yang dilakukan oleh individu yang disusun ke dalam spesialisasi fungsional tidak lagi cocok untuk lingkungan bisnis yang cepat berubah dan penuh ketidakpastian.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eUntuk merespon kebutuhan pengembangan perangkat lunak yang cepat dan adaptif, organisasi harus mempertimbangkan desain tim yang memprioritaskan aliran pengiriman perangkat lunak dan adaptabilitas strategis. Desain organisasi yang terkait dengan desain arsitektur perangkat lunak, pembatasan beban kognitif, dan pendekatan yang memprioritaskan tim harus dipertimbangkan.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003ePenting untuk mengurangi beban kognitif pada tim dengan mempertimbangkan ukuran tim, tugas, dan batasan dengan tim lain. Dalam lingkungan yang cepat berubah dan penuh ketidakpastian, tim perlu beradaptasi dan menemukan tempat dan waktu yang tepat untuk bekerja sama untuk hasil yang lebih baik.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"summary\"\u003eSummary\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#summary\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePoint inti dari buku \"Team Topologies\" adalah bahwa organisasi harus memikirkan kembali struktur tim, tujuan, dan interaksi mereka untuk membangun dan mengoperasikan perangkat lunak secara efektif dalam sistem yang terhubung dan kompleks. Buku ini menyarankan pendekatan yang berfokus pada tim untuk mempercepat aliran pengiriman perangkat lunak dan meningkatkan adaptabilitas strategis organisasi.\u003c/p\u003e\n\u003cp\u003eBeberapa hal penting yang ditekankan oleh buku ini antara lain:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ePentingnya memikirkan beban kognitif dan membatasinya agar tim dapat bekerja secara efektif.\u003c/li\u003e\n\u003cli\u003ePerubahan dan umpan balik harus diintegrasikan dalam siklus pengembangan dan pengoperasian perangkat lunak secara terus-menerus.\u003c/li\u003e\n\u003cli\u003eStruktur organisasi tradisional seringkali tidak memungkinkan organisasi untuk sepenuhnya memanfaatkan keuntungan dari Agile, Lean IT, dan DevOps. Oleh karena itu, perubahan budaya dan organisasi harus dihadapi secara serius.\u003c/li\u003e\n\u003cli\u003eConway's law dapat dimanfaatkan untuk mempercepat pengiriman perangkat lunak dengan merancang struktur organisasi yang tepat.\u003c/li\u003e\n\u003cli\u003eTim harus dirancang dengan tujuan yang jelas dan diorganisir sedemikian rupa sehingga memprioritaskan aliran pengiriman perangkat lunak dan adaptabilitas strategis.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eBuku ini memberikan pendekatan dan alat mental yang dapat membantu organisasi menyesuaikan dan menemukan tempat dan waktu yang tepat untuk kolaborasi, serta kapan yang terbaik untuk fokus pada eksekusi dan mengurangi biaya komunikasi.\u003c/p\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/book-summaries.team-topologies.the-problem-with-org-charts\"\u003eThe Problem with Org Charts\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncw
