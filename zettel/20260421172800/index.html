g tidak boleh dimasukkan?","value":"apa-yang-tidak-boleh-dimasukkan","line":125,"column":0,"depth":2},"kenapa-ini-penting":{"type":"header","text":"Kenapa ini penting","value":"kenapa-ini-penting","line":133,"column":0,"depth":2},"kapan-membuat-file-ini":{"type":"header","text":"Kapan membuat file ini?","value":"kapan-membuat-file-ini","line":139,"column":0,"depth":2},"cara-membuat-dan-memperbarui":{"type":"header","text":"Cara membuat dan memperbarui","value":"cara-membuat-dan-memperbarui","line":149,"column":0,"depth":2},"mengapa-ini-penting-untuk-ai-native-engineering":{"type":"header","text":"Mengapa ini penting untuk AI-native engineering?","value":"mengapa-ini-penting-untuk-ai-native-engineering","line":164,"column":0,"depth":2},"insight-penting":{"type":"header","text":"Insight penting","value":"insight-penting","line":182,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":192,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"bmad-project-context-adalah-konstitusi-implementasi-untuk-ai-agents-bukan-dokumentasi-biasa\"\u003eBMAD project context adalah konstitusi implementasi untuk AI agents, bukan dokumentasi biasa\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-project-context-adalah-konstitusi-implementasi-untuk-ai-agents-bukan-dokumentasi-biasa\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa fungsi utama \u003ccode\u003eproject-context.md\u003c/code\u003e dalam BMAD?\u003c/li\u003e\n\u003cli\u003eBagaimana file ini dimuat dan dipakai oleh workflows BMAD?\u003c/li\u003e\n\u003cli\u003eApa perbedaan antara project context dan dokumentasi biasa?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD project context bukan sekadar dokumentasi proyek. Ia adalah konstitusi implementasi untuk AI agents yang memastikan semua workflow membuat keputusan yang konsisten dan sesuai dengan pola tim.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eJika artefak lain menjelaskan \"apa\" dan \"kenapa\", project context menjelaskan \"bagaimana\" untuk agent.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003ccode\u003eproject-context.md\u003c/code\u003e berfungsi sebagai memori operasional proyek: aturan lokal yang membuat agent bisa bertindak seolah mereka sudah cukup lama bekerja di repositori.\u003c/p\u003e\n\u003ch2 id=\"apa-fungsi-utama-project-contextmd\"\u003eApa fungsi utama \u003ccode\u003eproject-context.md\u003c/code\u003e?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-fungsi-utama-project-contextmd\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman Project Context menegaskan bahwa AI agents membuat keputusan implementasi secara terus menerus. Tanpa context ini, mereka akan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ememakai pola generic yang tidak cocok,\u003c/li\u003e\n\u003cli\u003emengambil keputusan yang inkonsisten antar story,\u003c/li\u003e\n\u003cli\u003emelewatkan constraint spesifik proyek,\u003c/li\u003e\n\u003cli\u003eberjalan sendiri tanpa alignment.\u003c/li\u003e\n\u003cli\u003emengisi kekosongan dengan best practice umum yang tidak relevan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTanpa \u003ccode\u003eproject-context.md\u003c/code\u003e, agent bisa mengalami tiga failure mode utama:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGenericity failure: solusi teknis valid secara umum tapi tidak sesuai pola proyek.\u003c/li\u003e\n\u003cli\u003eCross-story inconsistency: perubahan antar story drift karena tidak ada shared rules.\u003c/li\u003e\n\u003cli\u003eConstraint blindness: aturan lokal wajib tidak terlihat dari kode atau best practice umum.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003ccode\u003eproject-context.md\u003c/code\u003e hadir sebagai file LLM-optimized yang memberi tahu agent apa yang perlu mereka ketahui sebelum bekerja.\u003c/p\u003e\n\u003ch2 id=\"bagaimana-project-contextmd-bekerja\"\u003eBagaimana \u003ccode\u003eproject-context.md\u003c/code\u003e bekerja?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bagaimana-project-contextmd-bekerja\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetiap workflow implementasi BMAD otomatis memuat file ini jika ada. Ini bukan hanya untuk dev story; arsitek juga memakainya.\u003c/p\u003e\n\u003cp\u003eProject context beroperasi sebagai lapisan context cross-cutting: bukan hanya untuk menulis kode, tetapi juga untuk architecture, story creation, review, planning, dan penyesuaian arah.\u003c/p\u003e\n\u003cp\u003eWorkflows yang memuat context ini termasuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ebmad-create-architecture\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-create-story\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-dev-story\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-code-review\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-quick-dev\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-sprint-planning\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-retrospective\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ebmad-correct-course\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eImplikasinya: project context bukan sekadar helper untuk developer. Ia adalah sumber kebenaran yang dipakai sepanjang lifecycle.\u003c/p\u003e\n\u003ch2 id=\"project-context-dalam-established-project\"\u003eProject Context dalam established project\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#project-context-dalam-established-project\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman Established Projects FAQ menegaskan realitas brownfield: kode lama punya sejarah, kompromi, dokumentasi bolong, dan pola yang tidak selalu ideal.\u003c/p\u003e\n\u003cp\u003eUntuk repo existing, \u003ccode\u003edocument-project\u003c/code\u003e sangat direkomendasikan karena ia membantu agent membangun peta mental sistem yang tersebar. Ini bukan ritual wajib; tujuannya adalah context discovery yang cukup baik. Jika dokumentasi lain sudah komprehensif dan up to date, tujuan operasionalnya sama-sama tercapai.\u003c/p\u003e\n\u003cp\u003eTanpa field survey seperti itu, agent cenderung melakukan dua kesalahan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eterlalu percaya pada inferensi lokal dan pola yang tampak,\u003c/li\u003e\n\u003cli\u003eatau menerapkan best practice umum yang tidak cocok dengan kebiasaan proyek.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"quick-flow-di-existing-project\"\u003eQuick Flow di existing project\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#quick-flow-di-existing-project\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eQuick Flow tetap bisa dipakai untuk repo lama, khususnya untuk bug fix dan fitur kecil. Bedanya, workflow harus:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eauto-detect stack dan tooling yang ada,\u003c/li\u003e\n\u003cli\u003eanalisis pattern kode existing,\u003c/li\u003e\n\u003cli\u003edeteksi conventions dan minta konfirmasi manusia,\u003c/li\u003e\n\u003cli\u003ehasilkan spec yang menghormati konteks repo, bukan hanya ide ideal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eItu membuat Quick Flow lebih seperti workflow adaptif daripada generator greenfield.\u003c/p\u003e\n\u003ch2 id=\"ketika-codebase-tidak-mengikuti-best-practice\"\u003eKetika codebase tidak mengikuti best practice\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ketika-codebase-tidak-mengikuti-best-practice\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD mengakui bahwa established project bisa hidup dengan pola yang bukan best practice universal. Dalam kasus itu, agent sebaiknya meminta konfirmasi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eapakah kita mengikuti conventions existing untuk menjaga konsistensi?\u003c/li\u003e\n\u003cli\u003eatau kita membangun standar baru yang lalu didokumentasikan secara jelas?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni menjadikan modernisasi sebuah keputusan sadar, bukan efek samping otomatis dari perbaikan kecil.\u003c/p\u003e\n\u003ch2 id=\"apa-yang-masuk-ke-dalamnya\"\u003eApa yang masuk ke dalamnya?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-masuk-ke-dalamnya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD membagi file ini menjadi dua bagian utama:\u003c/p\u003e\n\u003ch3 id=\"technology-stack--versions\"\u003eTechnology Stack \u0026#x26; Versions\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#technology-stack--versions\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eIni adalah daftar spesifik stack dan versi yang berlaku. Contohnya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eNode.js 20.x, TypeScript 5.3, React 18.2\u003c/li\u003e\n\u003cli\u003eZustand, Vitest, Playwright, MSW\u003c/li\u003e\n\u003cli\u003eTailwind CSS dengan design tokens custom\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePenting bahwa ini bukan jawaban umum. Ia harus spesifik untuk proyek.\u003c/p\u003e\n\u003ch3 id=\"critical-implementation-rules\"\u003eCritical Implementation Rules\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#critical-implementation-rules\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBagian ini berisi pola dan aturan yang agent mungkin tidak infer dari kode saja:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eaturan TypeScript (\u003ccode\u003estrict\u003c/code\u003e, \u003ccode\u003euse interface for public APIs\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eorganisasi kode (\u003ccode\u003e/src/components/\u003c/code\u003e, \u003ccode\u003e/src/lib/\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAPI dan networking (\u003ccode\u003eapiClient\u003c/code\u003e singleton, no direct fetch)\u003c/li\u003e\n\u003cli\u003etesting pattern (\u003ccode\u003eunit tests\u003c/code\u003e untuk logika bisnis, \u003ccode\u003eMSW\u003c/code\u003e untuk integrasi)\u003c/li\u003e\n\u003cli\u003eframework-specific rules (\u003ccode\u003ehandleError\u003c/code\u003e wrapper, feature flag helper, file-based routing)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHalaman Project Context menegaskan: fokus pada hal yang tidak jelas dari kode. Jangan tulis standar universal. Tulis hanya yang akan membuat agent berbeda dari generic.\u003c/p\u003e\n\u003ch2 id=\"apa-yang-tidak-boleh-dimasukkan\"\u003eApa yang tidak boleh dimasukkan?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-tidak-boleh-dimasukkan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eStandar umum yang berlaku di semua proyek.\u003c/li\u003e\n\u003cli\u003eFilosofi besar yang tidak memengaruhi keputusan implementasi lokal.\u003c/li\u003e\n\u003cli\u003ePenjelasan teoretis tanpa aturan operasional.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTulisan seharusnya hanya berisi aturan, pola, dan preferensi yang membuat tindakan agent menjadi berbeda dari inferensi kode generik.\u003c/p\u003e\n\u003ch2 id=\"kenapa-ini-penting\"\u003eKenapa ini penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eProject context bukan hanya dokumentasi tambahan. Ia adalah memori operasional yang menjaga agar semua agent BMAD mengikuti aturan lokal yang sama, bahkan ketika workflow mereka berbeda.\u003c/p\u003e\n\u003cp\u003eTanpa file ini, detail seperti helper khusus, error wrapper, atau pola test dapat hilang dalam inferensi generik, yang menghasilkan perubahan yang secara teknis valid tapi tidak konsisten.\u003c/p\u003e\n\u003ch2 id=\"kapan-membuat-file-ini\"\u003eKapan membuat file ini?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-membuat-file-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD memberikan tiga kesempatan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eNew project, before architecture: buat manual jika Anda sudah tahu preferensi teknis.\u003c/li\u003e\n\u003cli\u003eNew project, after architecture: generate setelah architecture untuk menangkap keputusan.\u003c/li\u003e\n\u003cli\u003eExisting project: generate dari kode untuk menemukan pola yang ada.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUntuk Quick Flow, file ini jadi pengganti gap planning/architecture.\u003c/p\u003e\n\u003ch2 id=\"cara-membuat-dan-memperbarui\"\u003eCara membuat dan memperbarui\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cara-membuat-dan-memperbarui\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAda tiga opsi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emanual creation di \u003ccode\u003e_bmad-output/project-context.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003egenerate after architecture dengan \u003ccode\u003ebmad-generate-project-context\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003egenerate for existing projects dengan \u003ccode\u003ebmad-generate-project-context\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFile ini hidup. Update ketika:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekeputusan arsitektur berubah,\u003c/li\u003e\n\u003cli\u003ekonvensi baru disetujui,\u003c/li\u003e\n\u003cli\u003eimplementasi mengungkap pola baru,\u003c/li\u003e\n\u003cli\u003eagent menunjukkan perilaku yang salah.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"mengapa-ini-penting-untuk-ai-native-engineering\"\u003eMengapa ini penting untuk AI-native engineering?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting-untuk-ai-native-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eProject context adalah bentuk nyata context engineering. Ia mengubah dokumentasi dari catatan pasif menjadi input operasional bagi agent.\u003c/p\u003e\n\u003cp\u003eTanpa context:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eagent menggunakan generic patterns\u003c/li\u003e\n\u003cli\u003epola implementasi jadi inkonsisten\u003c/li\u003e\n\u003cli\u003eagent tidak tahu constraint proyek\u003c/li\u003e\n\u003cli\u003esemua agent membuat keputusan sendiri-sendiri\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan context:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esemua agent align dengan aturan proyek\u003c/li\u003e\n\u003cli\u003ehasil implementasi konsisten antar story\u003c/li\u003e\n\u003cli\u003earsitektur dihormati selama pengembangan\u003c/li\u003e\n\u003cli\u003eQuick Flow tetap terjebak di pola yang sesuai\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"insight-penting\"\u003eInsight penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#insight-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD project context adalah konstitusi implementasi, bukan dokumentasi biasa. Ia memberi agent jawaban atas pertanyaan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003egaya apa yang harus dipakai?\u003c/li\u003e\n\u003cli\u003epola apa yang harus diikuti?\u003c/li\u003e\n\u003cli\u003eaturan khusus apa yang wajib dijaga?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTanpa itu, BMAD hanya jadi rangka kerja AI dengan agen. Dengan itu, BMAD jadi rangka kerja AI dengan satu sumber kebenaran operasional.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172430\"\u003eBMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/a\u003e — BMAD named agents membangun AI coworker model, bukan sekadar persona lucu\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421172636\"\u003eBMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003c/a\u003e — BMAD activation flow dan customization: menyusun agent dari template, konteks, dan kebiasaan tim\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eproject-context (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003econtext-engineering (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421192951\"\u003eSpec semakin penting ketika AI bisa menulis kode, bukan hanya karena kode lebih murah\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421193302\"\u003eContext engineering adalah menyusun constraint lokal, bukan sekadar menambahkan informasi\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-getting-started\"\u003eBMAD Getting Started sebagai literature note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"enableAutoCreateOnDefinition":false,"enableXVaultWikiLink":false,"enableRemoteVaultInit":true,"enableUserTags":true,"enableHashTags":true,"workspaceVaultSyncMode":"noCommit","enableAutoFoldFrontmatter":false,"enableEditorDecorations":true,"maxPreviewsCached":10,"maxNoteLength":204800,"seeds":{"dendron.templates":{}},"enableF
