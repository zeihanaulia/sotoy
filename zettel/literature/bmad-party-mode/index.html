hat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":57,"column":0,"depth":2}},"children":[],"parent":"ae3bw38eg7l5p3ntry27x87","data":{}},"body":"\u003ch1 id=\"bmad-party-mode-sebagai-literature-note\"\u003eBMAD Party Mode sebagai literature note\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-party-mode-sebagai-literature-note\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eMengapa BMAD mengumpulkan banyak agent dalam satu percakapan? \u003c/li\u003e\n\u003cli\u003eBagaimana Party Mode membuat trade-off lebih eksplisit dibandingkan mode agent tunggal? \u003c/li\u003e\n\u003cli\u003eDalam situasi apa Party Mode paling bernilai?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"ringkasan-literatur\"\u003eRingkasan literatur\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ringkasan-literatur\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eParty Mode adalah fitur BMAD untuk mengumpulkan banyak agent dalam satu percakapan yang sama, lalu membiarkan BMAD Master memilih agent relevan untuk merespons setiap pesan.\u003c/p\u003e\n\u003cp\u003eFungsi utamanya adalah membuat perbedaan perspektif terlihat sekaligus. Alih-alih satu agent memberi satu garis reasoning, Party Mode menciptakan percakapan yang menunjukkan tegangan antar reasoning:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePM\u003c/li\u003e\n\u003cli\u003eArchitect\u003c/li\u003e\n\u003cli\u003eDev\u003c/li\u003e\n\u003cli\u003eUX\u003c/li\u003e\n\u003cli\u003eQA/TEA\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHalaman tersebut menempatkan Party Mode sebagai alat yang cocok untuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ekeputusan besar dengan trade-off,\u003c/li\u003e\n\u003cli\u003esesi brainstorming,\u003c/li\u003e\n\u003cli\u003epost-mortem,\u003c/li\u003e\n\u003cli\u003esprint retrospectives/planning.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"ide-penting\"\u003eIde penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#ide-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eParty Mode adalah \"mesin konflik terkontrol\"; bukan untuk berseteru, tapi untuk memunculkan trade-off.\u003c/li\u003e\n\u003cli\u003eKeuntungan utama adalah peta keputusan dari banyak perspektif, bukan jawaban konsensus instan.\u003c/li\u003e\n\u003cli\u003eParty Mode komplementer dengan Named Agents, bukan menggantikannya.\u003c/li\u003e\n\u003cli\u003eMode ini efektif ketika masalah kompleks dan multi-peran, tetapi overkill untuk isu kecil.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"interpretasi\"\u003eInterpretasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#interpretasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDengan menggabungkan banyak peran dalam satu ruang diskusi, BMAD Party Mode mengeksternalisasi perbedaan framing yang biasanya tetap tersembunyi di kepala satu pembuat keputusan atau satu reviewer.\u003c/p\u003e\n\u003cp\u003eItu membuat keputusan lebih transparan sekaligus lebih sulit dipaksa oleh satu bias tunggal.\u003c/p\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://docs.bmad-method.org/explanation/party-mode/\"\u003ehttps://docs.bmad-method.org/explanation/party-mode/\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421185424\"\u003eParty Mode adalah mesin konflik terkontrol untuk menampilkan trade-off multi-agent\u003c/a\u003e — Party Mode adalah mesin konflik terkontrol untuk menampilkan trade-off multi-agent\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-adversarial-review\"\u003eBMAD Adversarial Review sebagai literature note\u003c/a\u003e — literature note BMAD Adversarial Review\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.bmad-advanced-elicitation\"\u003eBMAD Advanced Elicitation sebagai literature note\u003c/a\u003e — literature note BMAD Advanced Elicitation\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e — MOC AI-native engineering\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eparty-mode (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eliterature (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\
