d"}},{"type":"wiki","from":{"fname":"zettel.20260420062120","id":"zettel.20260420062120","vaultName":"vault"},"value":"zettel.literature.software-architecture-guide","position":{"start":{"line":21,"column":3,"offset":1246},"end":{"line":21,"column":52,"offset":1295},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.literature.software-architecture-guide"}},{"type":"wiki","from":{"fname":"zettel.20260420062120","id":"zettel.20260420062120","vaultName":"vault"},"value":"zettel.20260420060847","position":{"start":{"line":22,"column":3,"offset":1346},"end":{"line":22,"column":28,"offset":1371},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260420060847"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":55,"column":3,"offset":4283},"end":{"line":55,"column":28,"offset":4308},"indent":[]},"value":"zettel.20260420062120"},{"from":{"fname":"zettel.20260420062331","id":"zettel.20260420062331","vaultName":"vault"},"type":"backlink","position":{"start":{"line":21,"column":3,"offset":1254},"end":{"line":21,"column":28,"offset":1279},"indent":[]},"value":"zettel.20260420062120"},{"from":{"fname":"zettel.20260420085220","id":"zettel.20260420085220","vaultName":"vault"},"type":"backlink","position":{"start":{"line":21,"column":3,"offset":1162},"end":{"line":21,"column":28,"offset":1187},"indent":[]},"value":"zettel.20260420062120"},{"from":{"fname":"zettel.moc.software-architecture","id":"zettel.moc.software-architecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":88,"column":3,"offset":7311},"end":{"line":88,"column":28,"offset":7336},"indent":[]},"value":"zettel.20260420062120"}],"anchors":{},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"cruft-adalah-utang-kebingungan-yang-memperlambat-perubahan\"\u003eCruft adalah utang kebingungan yang memperlambat perubahan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#cruft-adalah-utang-kebingungan-yang-memperlambat-perubahan\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"Architecture is a tricky subject for the customers and users of software products - as it isn't something they immediately perceive. But a poor architecture is a major contributor to the growth of cruft - elements of the software that impede the ability of developers to understand the software. Software that contains a lot of cruft is much harder to modify, leading to features that arrive more slowly and with more defects.\"\u003c/p\u003e\n\u003cp\u003eSumber: \u003ca href=\"https://martinfowler.com/architecture/\"\u003ehttps://martinfowler.com/architecture/\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eCatatan gue:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFowler mengatakan arsitektur yang buruk jarang terlihat langsung oleh pengguna, tetapi dampaknya nyata bagi developer dan delivery.\u003c/li\u003e\n\u003cli\u003eCruft adalah lapisan kekacauan yang menghambat pemahaman kode.\u003c/li\u003e\n\u003cli\u003eKetika software susah dipahami, perubahan menjadi lambat dan defect lebih sering muncul.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eImplikasi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCruft bukan hanya technical debt umum; dia adalah \"utang kebingungan\" yang membuat tim semakin ragu saat menyentuh sistem.\u003c/li\u003e\n\u003cli\u003eMengurangi cruft adalah cara praktis menjaga kecepatan perubahan jangka panjang.\u003c/li\u003e\n\u003cli\u003eArsitektur yang baik harus mencegah akumulasi cruft dengan membuat sistem lebih mudah dipahami.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHubungan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.internal-quality-is-speed\"\u003eKualitas internal adalah infrastruktur kecepatan delivery\u003c/a\u003e — literatur Fowler yang menekankan internal quality dan kecepatan delivery\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.software-architecture-guide\"\u003eSoftware Architecture Guide — Fowler: arsitektur sebagai keputusan penting dan mahal kalau salah\u003c/a\u003e — ringkasan halaman Software Architecture Guide\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420060847\"\u003eArsitektur adalah penentu biaya perubahan masa depan\u003c/a\u003e — arsitektur sebagai penentu biaya perubahan masa depan\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003epermanent-note (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-architecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003earchitecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emartin-fowler (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ecruft (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420062331\"\u003eInternal quality adalah infrastruktur kecepatan delivery\u003c/a\u003e\u003c/li\u003e\n
