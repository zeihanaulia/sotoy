":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"kapan-struktur-ai-native-jadi-layak-dipakai-dan-kapan-ia-justru-overkill\"\u003eKapan struktur AI-native jadi layak dipakai dan kapan ia justru overkill\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-struktur-ai-native-jadi-layak-dipakai-dan-kapan-ia-justru-overkill\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eKapan pendekatan AI-native berstruktur layak dipakai?\u003c/li\u003e\n\u003cli\u003eKapan struktur itu justru menjadi overkill?\u003c/li\u003e\n\u003cli\u003eBagaimana menilai proporsionalitas antara risiko dan proses?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKematangan AI-native engineering tidak ditandai oleh penggunaan semua tool dan proses. Ia ditandai oleh kemampuan merutekan task ke tingkat struktur yang paling kecil tetapi masih aman.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eStruktur bukan tujuan. Struktur adalah cara mengelola risiko.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"kriteria-layak-dipakai\"\u003eKriteria layak dipakai\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kriteria-layak-dipakai\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePendekatan terstruktur layak ketika:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ebiaya salah tinggi,\u003c/li\u003e\n\u003cli\u003eblast radius perubahan besar atau multi-file,\u003c/li\u003e\n\u003cli\u003eada banyak agent/engineer yang terlibat,\u003c/li\u003e\n\u003cli\u003eada potensi konflik teknis atau bisnis,\u003c/li\u003e\n\u003cli\u003eoutput harus konsisten dengan sistem lama,\u003c/li\u003e\n\u003cli\u003eatau area yang disentuh sensitif (security, billing, public API, data schema).\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDalam konteks ini, struktur tambahan membantu menjaga drift agar tetap terkendali dan membuat reasoning dapat di-review.\u003c/p\u003e\n\u003ch2 id=\"kriteria-overkill\"\u003eKriteria overkill\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kriteria-overkill\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eStruktur menjadi overkill ketika:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etask kecil dan jelas,\u003c/li\u003e\n\u003cli\u003eblast radius rendah,\u003c/li\u003e\n\u003cli\u003eperubahan terisolasi dan mudah diverifikasi,\u003c/li\u003e\n\u003cli\u003eartifak proses lebih mahal daripada benefitnya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eContoh overkill:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emengganti teks UI kecil,\u003c/li\u003e\n\u003cli\u003ememperbaiki typo,\u003c/li\u003e\n\u003cli\u003eupdate minor pada helper lokal,\u003c/li\u003e\n\u003cli\u003ebug fix sederhana dengan scope terbatas.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDi situ, workflow ringan atau Quick Dev dengan context yang cukup sering lebih efisien.\u003c/p\u003e\n\u003ch2 id=\"menilai-proporsionalitas\"\u003eMenilai proporsionalitas\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#menilai-proporsionalitas\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTanya dulu:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eseberapa ambigu task ini?\u003c/li\u003e\n\u003cli\u003eseberapa besar dampak salahnya?\u003c/li\u003e\n\u003cli\u003eseberapa kompleks domain atau sistem yang terlibat?\u003c/li\u003e\n\u003cli\u003eapakah tim bisa memvalidasi hasil dengan mudah?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJika jawaban menunjukkan risiko besar, layak menambah struktur. Jika jawaban menunjukkan task kecil, struktur besar hanya menambah overhead.\u003c/p\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eAI-native bukan berarti selalu pakai proses berat.\u003c/li\u003e\n\u003cli\u003eIa berarti pakai proses yang sesuai dengan risiko.\u003c/li\u003e\n\u003cli\u003eStruktur yang baik adalah struktur yang bisa ditarik mundur ketika task memungkinkan.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421174123\"\u003eBMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/a\u003e — BMAD Quick Dev mengoptimalkan attention manusia, bukan sekadar kecepatan model\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421180059\"\u003eCheckpoint Preview membuat review manusia fokus pada pemahaman, bukan sekadar diff\u003c/a\u003e — Checkpoint Preview membuat review manusia fokus pada pemahaman, bukan sekadar diff\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421185424\"\u003eParty Mode adalah mesin konflik terkontrol untuk menampilkan trade-off multi-agent\u003c/a\u003e — Party Mode adalah mesin konflik terkontrol untuk menampilkan trade-off multi-agent\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" s
