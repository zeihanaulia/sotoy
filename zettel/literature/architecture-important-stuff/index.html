e.architecture-important-stuff"},{"from":{"fname":"zettel.literature.architecture-not-a-blueprint","id":"zettel.literature.architecture-not-a-blueprint","vaultName":"vault"},"type":"backlink","position":{"start":{"line":21,"column":3,"offset":866},"end":{"line":21,"column":53,"offset":916},"indent":[]},"value":"zettel.literature.architecture-important-stuff"},{"from":{"fname":"zettel.literature.software-architecture-guide","id":"zettel.literature.software-architecture-guide","vaultName":"vault"},"type":"backlink","position":{"start":{"line":54,"column":3,"offset":4177},"end":{"line":54,"column":53,"offset":4227},"indent":[]},"value":"zettel.literature.architecture-important-stuff"},{"from":{"fname":"zettel.moc.software-architecture","id":"zettel.moc.software-architecture","vaultName":"vault"},"type":"backlink","position":{"start":{"line":33,"column":3,"offset":1617},"end":{"line":33,"column":53,"offset":1667},"indent":[]},"value":"zettel.literature.architecture-important-stuff"}],"anchors":{"klaim":{"type":"header","text":"Klaim","value":"klaim","line":16,"column":0,"depth":2},"catatan":{"type":"header","text":"Catatan","value":"catatan","line":20,"column":0,"depth":2},"implikasi":{"type":"header","text":"Implikasi","value":"implikasi","line":26,"column":0,"depth":2},"hubungan":{"type":"header","text":"Hubungan","value":"hubungan","line":32,"column":0,"depth":2}},"children":[],"parent":"ae3bw38eg7l5p3ntry27x87","data":{}},"body":"\u003ch1 id=\"arsitektur-adalah-apa-yang-paling-penting-bukan-hanya-struktur-tinggi\"\u003eArsitektur adalah apa yang paling penting, bukan hanya struktur tinggi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#arsitektur-adalah-apa-yang-paling-penting-bukan-hanya-struktur-tinggi\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"klaim\"\u003eKlaim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eArsitektur adalah aspek sistem internal yang penting, yaitu keputusan yang jika buruk akan membuat fitur baru jadi lebih lambat dan lebih mahal.\u003c/p\u003e\n\u003ch2 id=\"catatan\"\u003eCatatan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#catatan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eFowler membuka dengan mengakui bahwa istilah \"architecture\" kabur dalam software. Dia lebih memilih melihatnya dari efek ekonomi perubahan.\u003c/li\u003e\n\u003cli\u003eFokusnya bukan pada bentuk atau struktur visual, tapi pada \"apa yang penting\" dalam desain yang menentukan biaya perubahan di masa depan.\u003c/li\u003e\n\u003cli\u003eIni menempatkan arsitektur dalam konteks ekonomi: bukan status simbol, tetapi faktor yang menentukan kecepatan evolusi sistem.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"implikasi\"\u003eImplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implikasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003ePerdebatan arsitektur harus dimulai dari pertanyaan \"apa yang paling mahal jika salah?\" bukan dari \"bagaimana diagramnya?\"\u003c/li\u003e\n\u003cli\u003eArsitektur yang baik jadi penentu \u003ccode\u003espeed of future change\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eTim harus memilih perhatian untuk elemen yang memengaruhi perubahan, reliabilitas, koordinasi tim, dan umur sistem.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"hubungan\"\u003eHubungan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.software-architecture-guide\"\u003eSoftware Architecture Guide — Fowler: arsitektur sebagai keputusan penting dan mahal kalau salah\u003c/a\u003e — ringkasan halaman Software Architecture Guide\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420055738\"\u003eSoftware architecture adalah jaringan keputusan trade-off, bukan sekadar diagram\u003c/a\u003e — arsitektur sebagai jaringan keputusan trade-off, bukan sekadar diagram\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #154406;\" href=\"/sotoy/notes/tags.literature-note\"\u003eliterature-note\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003esoftware-architecture (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003edecision-making (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emartin-fowler (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420060847\"\u003eArsitektur adalah penentu biaya perubahan masa depan\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061232\"\u003eFowler memulai definisi arsitektur dengan kritik terhadap ‘fundamental organization’\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260420061530\"\u003eArchitecture adalah seni memilah keputusan penting\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.application-boundary-social-construction\"\u003eApplication boundary adalah konstruksi sosial\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/
