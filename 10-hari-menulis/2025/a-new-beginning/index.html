ps":{"note":{"id":"notes.10-hari-menulis.2025.a-new-beginning","title":"20 Tahun Setelahnya","desc":"","updated":1742251402186,"created":1742251018406,"custom":{},"fname":"notes.10-hari-menulis.2025.a-new-beginning","type":"note","vault":{"fsPath":"vault"},"contentHash":"4f2ff4c5e9d0f601c1f9ae533336ea1b","links":[],"anchors":{"kembali-ke-rumah-lama":{"type":"header","text":"Kembali ke Rumah Lama","value":"kembali-ke-rumah-lama","line":13,"column":0,"depth":2},"temuan-dari-masa-lalu":{"type":"header","text":"Temuan dari Masa Lalu","value":"temuan-dari-masa-lalu","line":21,"column":0,"depth":2},"titik-balik":{"type":"header","text":"Titik Balik","value":"titik-balik","line":30,"column":0,"depth":2},"a-new-beginning":{"type":"header","text":"A New Beginning","value":"a-new-beginning","line":39,"column":0,"depth":2}},"children":[],"parent":"notes.10-hari-menulis.2025","data":{}},"body":"\u003ch1 id=\"20-tahun-setelahnya\"\u003e20 Tahun Setelahnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#20-tahun-setelahnya\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eAda 2 cara seseorang mengingat ulang tahun ke-35. Pertama, dengan perasaan bangga dan bahagia bahwa ia telah mencapai banyak hal. Kedua, dengan kembali ke rumah orang tuanya setelah kehilangan pekerjaan dan hanya bisa termenung sambil bertanya tanya apa yang salah dengan hidupnya. \u003c/p\u003e\n\u003cp\u003eHana, ada di kategori kedua. Setelah 20 tahun, Hana kembali ke rumah orang tuanya di Jambi, bukan untuk liburan, tapi karena PHK massal dari kantornya di Jakarta. Bukan hanya hana, Suaminya Bagus Wicaksono yang selama ini berkarir sebagai staff personalia juga ikut di PHK dari kantornya di jakarta. Dengan perhitungan yang matang Hana dan Bagus memutuskan untuk pulang dulu ke rumah orang tua Hana untuk sekedar menjernihkan pikiran dari gelapnya tahun 2025 ini. \u003c/p\u003e\n\u003ch2 id=\"kembali-ke-rumah-lama\"\u003eKembali ke Rumah Lama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kembali-ke-rumah-lama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDi perjalanan, tak banyak yang bisa mereka diskusikan. Mereka hanya duduk berdampingan dalam diam. Sesekali Bagus melirik ke arah Hana, tapi keduanya memilih berbicara seadanya. Setelah 14 jam perjalanan dengan bus, akhirnya mereka tiba.\u003c/p\u003e\n\u003cp\u003eBegitu tiba, Ia segera masuk ke kamar lamanya masih bersih dan rapi—beda dengan hidupnya yang sekarang berantakan. Ibunya selalu memastikan kamar itu tetap terawat, seolah-olah Hana masih remaja yang bisa pulang kapan saja. Tapi kenyataannya, pulang kali ini terasa lebih seperti pelarian. \u003c/p\u003e\n\u003cp\u003eMalam pertama di rumah, Hana sulit sekali untuk terlelap selalu gelisah mempertanyakan masa depan dan masa lalunya. Ia terlalu khawatir dengan apa yang terjadi di masa depan dan terlalu menyalahkan masa lalunya.\u003c/p\u003e\n\u003ch2 id=\"temuan-dari-masa-lalu\"\u003eTemuan dari Masa Lalu\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#temuan-dari-masa-lalu\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMasih dengan pikiran kosong, Ia terbangun dari kasur dan iseng membuka lemari tua yang masih menyimpan barang-barang masa kecilnya. Di antara tumpukan album foto lama, ia menemukan sebuah buku catatan dengan tulisan besar diatas label putih di sampulnya. \"Mimpiku\". Jantung Hana berdegup pelan. Ia mengenali buku ini. Seketika hana teringat buku ini adalah catatanya kurang lebih 20 tahun yang lalu. Buku itu berisi impian masa kecil Hana, yang ditulisnya saat berusia 15 tahun. Saat dirinya masih percaya bahwa semua mimpi bisa diwujudkan.\u003c/p\u003e\n\u003cp\u003ePada halaman pertama terlihat list mimpi, yang pertama Aku ingin menulis buku yang bisa dikenang selamanya. Kedua, Aku ingin menjadi musisi dan membuat lagu yang dimainkan di radio. Ia tersenyum kecil. Radio? Dulu, ia sering mendengarkan iSwara FM, mencatat lirik lagu yang diputarkan, bermimpi suatu hari lagunya sendiri yang akan dimainkan.\nKetiga, Aku ingin menjadi penulis yang dikenal luas seperti Pramoedya, Kafka, Ilana Tan, atau Tolstoy.\u003c/p\u003e\n\u003cp\u003eTapi waktu terus berjalan. Seiring waktu, mimpi-mimpi ini perlahan terkubur oleh realitas. Setelah lulus kuliah, ia memilih realistis untuk merantau dan memilih berkarir menjadi karyawan, menikah, dan membangun keluarga. Setelah menikah, ia semakin fokus pada keluarga dan pekerjaan. Ia bekerja di kantor dengan harapan mendapat stabilita yang akhirnya dipecat juga. Sekarang, 20 tahun berlalu, dan tidak ada satu pun impiannya yang terwujud.\u003c/p\u003e\n\u003ch2 id=\"titik-balik\"\u003eTitik Balik\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#titik-balik\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTerdengar suara ketukan di pintu. Ibu masuk ke kamar dan melihat Hana sedang terdiam dengan tatapan kosong.\n\"Jangan kayak orang gagal, nak. Hidup kamu belum selesai.\". Hana menatap Ibunya, Kata-kata itu sederhana tapi terasa seperti tamparan. Dalam hati hana berkata, \"Kalau hidupnya memang sudah jatuh begini, kenapa tidak mencoba lagi?\". \u003c/p\u003e\n\u003cp\u003eIa tidak lagi punya alasan untuk menunda. Ia memutuskan untuk menulis lagi. Hana membuka laptopnya dan membaca ulang draft novel yang ia tulis 12 tahun lalu. Setelah 30 menit membaca, ia menutup laptopnya dengan satu kesimpulan \"YA ALLAH, YA ROBI, INI JELEK BANGET TULISANNYA.” Hana tertawa kecil membaca tulisannya sendiri. Mood Hana berubah dan Ia terdiam. \u003c/p\u003e\n\u003cp\u003eIa kembali teringat dengan masalahnya. Dunia kerja sudah berubah. Ia mencoba mencari pekerjaan baru, tapi merasa semakin tertinggal, sulit sekali mencari pekerjaan saat ini karena harus bersaing dengan ribuan fresh graduate ditambah orang orang yang senasib dengannya yang di phk dan jumlahnya pun tidak sedikit, bisa sampai puluhan ribu orang. Ia juga harus memikirkan masa depan anaknya. Ia takut suaminya menganggapnya terlalu idealis dan tidak realistis.\u003c/p\u003e\n\u003ch2 id=\"a-new-beginning\"\u003eA New Beginning\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#a-new-beginning\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSaat hampir menyerah, ia menemukan satu catatan kecil di belakang buku mimpinya “Kalau kamu membaca ini 20 tahun dari sekarang dan masih takut… KAMU NGGAK BERUBAH SAMA SEKALI.”. Hana menangis. Dulu, dirinya yang berusia 15 percaya bahwa suatu hari nanti, ia akan berani. Tapi 20 tahun berlalu, dan ia masih takut. Hana sadar selama ini yang menahannya bukan realitas, tapi ketakutannya sendiri.\u003c/p\u003e\n\u003cp\u003eDengan dorongan dari masa lalunya, Hana berjanji untuk mencoba sungguh-sungguh kali ini. Ia mulai menulis ulang bukunya, tanpa takut salah. Ia juga mulai merekam lagu-lagu yang dulu ia buat dan mengunggahnya di instagram dan youtube. Untuk pertama kalinya, ia tidak menunggu sempurna. Ia mulai dulu. Beberapa bulan kemudian, Hana menerima email dari penerbit kecil yang tertarik dengan draft novelnya. Ia tidak langsung sukses, tapi untuk pertama kalinya, ia tidak lagi takut gagal. Di meja kerja kecilnya di rumah, ia mengambil buku catatan yang dulu ia temukan dan menulis satu kalimat baru. \"Kalau kamu membaca ini 20 tahun dari sekarang dan masih takut mencoba… JANGAN BUANG-BUANG WAKTU LAGI.\"\u003c/p\u003e\n\u003cp\u003eSelesai.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m wor
