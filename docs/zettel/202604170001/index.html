n":0,"depth":2},"sumber":{"type":"header","text":"Sumber","value":"sumber","line":38,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"second-brain-memperluas-kapasitas-berpikir-dengan-memindahkan-beban-memori-ke-sistem-eksternal\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#second-brain-memperluas-kapasitas-berpikir-dengan-memindahkan-beban-memori-ke-sistem-eksternal\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eOtak manusia sangat terbatas sebagai tempat penyimpanan — \u003cem\u003eworking memory\u003c/em\u003e hanya bisa menampung 4±1 item sekaligus (Miller's Law direvisi Cowan). Tapi otak sangat handal dalam membuat \u003cem\u003ekoneksi\u003c/em\u003e dan menghasilkan \u003cem\u003einsight\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003e\"Second brain\" — sistem catatan eksternal yang terstruktur — membebaskan kapasitas kognitif dari beban menyimpan, dan mengalihkannya ke tugas yang lebih tinggi: \u003cstrong\u003eberpikir, menghubungkan, dan menciptakan\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eIni bukan soal malas mengingat. Ini soal \u003cem\u003eoptimalkan otak untuk tugasnya yaitu berpikir\u003c/em\u003e, bukan \u003cem\u003emengingat\u003c/em\u003e.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKalau kamu mencoba menyimpan semua ide di kepala, kamu akan selalu kehabisan \"RAM\". Akibatnya kamu:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTakut lupa → anxious\u003c/li\u003e\n\u003cli\u003eTidak berani move on dari satu topik ke topik lain\u003c/li\u003e\n\u003cli\u003eKehilangan ide bagus yang datang di waktu yang tidak tepat\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDengan sistem eksternal yang dipercaya, otak bisa \u003cem\u003emelepas\u003c/em\u003e dan fokus pada tugas saat ini.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMendukung \u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e — karena kalau ada sistem eksternal yang dipercaya, kamu \u003cem\u003eharus\u003c/em\u003e menuliskan ide setiap kali muncul agar sistem bekerja\u003c/li\u003e\n\u003cli\u003eMendasari \u003ca href=\"/sotoy/notes/zettel.202604170003\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003c/a\u003e — karena nilai sistem eksternal bukan di jumlah catatannya, tapi di koneksi yang terbentuk antar gagasan di dalamnya\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.building-a-second-brain\"\u003eLiterature Note — Building a Second Brain\u003c/a\u003e — Bab 2: \"What Is a Second Brain?\"\u003c/li\u003e\n\u003cli\u003eDavid Allen, \u003cem\u003eGetting Things Done\u003c/em\u003e — \"Your mind is for having ideas, not holding them\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #a03623;\" href=\"/sotoy/notes/tags.zettel\"\u003ezettel\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\"
