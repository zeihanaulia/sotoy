si-lewat-perbandingan-kasus":{"type":"header","text":"4. Kalibrasi lewat perbandingan kasus","value":"4-kalibrasi-lewat-perbandingan-kasus","line":84,"column":0,"depth":3},"5-turunkan-menjadi-artifact-operasional":{"type":"header","text":"5. Turunkan menjadi artifact operasional","value":"5-turunkan-menjadi-artifact-operasional","line":94,"column":0,"depth":3},"contoh-hasil-ekstraksi":{"type":"header","text":"Contoh hasil ekstraksi","value":"contoh-hasil-ekstraksi","line":104,"column":0,"depth":2},"mengapa-ini-penting-untuk-ai":{"type":"header","text":"Mengapa ini penting untuk AI","value":"mengapa-ini-penting-untuk-ai","line":121,"column":0,"depth":2},"implisit-yang-harus-digarisbawahi":{"type":"header","text":"Implisit yang harus digarisbawahi","value":"implisit-yang-harus-digarisbawahi","line":133,"column":0,"depth":2},"langkah-berikutnya":{"type":"header","text":"Langkah berikutnya","value":"langkah-berikutnya","line":139,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"tacit-knowledge-senior-diubah-jadi-artefak-operasional-untuk-ai-dan-tim\"\u003eTacit knowledge senior diubah jadi artefak operasional untuk AI dan tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tacit-knowledge-senior-diubah-jadi-artefak-operasional-untuk-ai-dan-tim\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cblockquote\u003e\n\u003cp\u003eTacit knowledge senior bukan sekadar pengalaman umum; ia adalah judgement konkret yang aktif saat melihat kasus nyata, dan nilai terbaiknya muncul ketika diubah menjadi artefak operasional.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"pertanyaan-yang-dijawab\"\u003ePertanyaan yang dijawab\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dijawab\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBagaimana jenis tacit knowledge senior yang bisa diekstrak?\u003c/li\u003e\n\u003cli\u003eBagaimana cara mengambilnya dari kepala senior secara sistematis?\u003c/li\u003e\n\u003cli\u003eBagaimana menjadikannya artefak yang bisa dipakai oleh AI dan developer lain?\u003c/li\u003e\n\u003cli\u003eBagaimana kaitannya dengan custom instructions, skills, dan agent behavior?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"definisi-penting\"\u003eDefinisi penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#definisi-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTacit knowledge\u003c/strong\u003e: pengetahuan yang dipakai lewat insting dan pengalaman, tapi belum tertulis jelas. Biasanya muncul sebagai judgement cepat terhadap PR, debugging, atau desain.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExplicit knowledge\u003c/strong\u003e: pengetahuan yang sudah dituliskan secara gamblang, bisa dibaca orang lain, dan bisa diikuti langsung. Contoh: aturan kode, instruksi, checklist, dokumentasi.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTribal knowledge\u003c/strong\u003e: pengetahuan tim yang hidup sebagai kebiasaan atau budaya bersama. Lebih sempit dari tacit, karena berhubungan dengan cara kerja kelompok tertentu.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eContoh perbedaan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etacit: \"gue tahu service ini terlalu banyak tanggung jawab\"\u003c/li\u003e\n\u003cli\u003eexplicit: \"controller tidak boleh mengandung business rule; pindahkan ke service layer\"\u003c/li\u003e\n\u003cli\u003etribal: \"di tim ini, perubahan API harus selalu didiskusikan di standup sebelum di-merge\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"inti-klaim\"\u003eInti klaim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#inti-klaim\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTacit knowledge senior paling efektif diambil lewat \u003cstrong\u003ecase-based decision mining\u003c/strong\u003e: gunakan PR, bug, incident, atau desain nyata sebagai pemicu, lalu bongkar judgement senior menjadi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003erule operasional\u003c/li\u003e\n\u003cli\u003esmell detection\u003c/li\u003e\n\u003cli\u003eseverity/prioritas\u003c/li\u003e\n\u003cli\u003eexception dan batas penggunaan\u003c/li\u003e\n\u003cli\u003everification yang bisa diuji\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSetelah itu, artefak ini bisa dipindahkan ke custom instructions, skill workflow, atau review rubric.\u003c/p\u003e\n\u003ch2 id=\"langkah-ekstraksi-yang-praktis\"\u003eLangkah ekstraksi yang praktis\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#langkah-ekstraksi-yang-praktis\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-mulai-dari-kasus-nyata\"\u003e1. Mulai dari kasus nyata\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-mulai-dari-kasus-nyata\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePilih sesuatu yang konkret:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePR yang ditolak atau direview ketat\u003c/li\u003e\n\u003cli\u003ebug yang lolos ke production\u003c/li\u003e\n\u003cli\u003eflaky test yang sulit direproduksi\u003c/li\u003e\n\u003cli\u003edesain arsitektur yang diperdebatkan\u003c/li\u003e\n\u003cli\u003eincident postmortem\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni memaksa proses pola menjadi jelas, karena senior beroperasi dalam mode pattern recognition.\u003c/p\u003e\n\u003ch3 id=\"2-tanyakan-terhadap-bukti-bukan-teori\"\u003e2. Tanyakan terhadap bukti, bukan teori\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-tanyakan-terhadap-bukti-bukan-teori\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDaripada bertanya \"apa best practice?\", tanyakan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eapa yang pertama membuat lo pause?\u003c/li\u003e\n\u003cli\u003emasalah apa yang lo lihat?\u003c/li\u003e\n\u003cli\u003ekenapa ini berisiko?\u003c/li\u003e\n\u003cli\u003ekapan ini harus ditolak?\u003c/li\u003e\n\u003cli\u003ekapan ini boleh dilanggar?\u003c/li\u003e\n\u003cli\u003ebukti minimalnya apa?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-uraikan-jawaban-jadi-unit-kecil\"\u003e3. Uraikan jawaban jadi unit kecil\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-uraikan-jawaban-jadi-unit-kecil\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJangan simpan sebagai narasi panjang. Ubah menjadi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRule\u003c/strong\u003e: keputusan yang bisa diikuti\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSmell\u003c/strong\u003e: tanda awal masalah\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVerify\u003c/strong\u003e: bukti bahwa aturan sudah dipatuhi\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eException\u003c/strong\u003e: kapan aturan tidak berlaku\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSeverity\u003c/strong\u003e: blocking / important / suggestion\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"4-kalibrasi-lewat-perbandingan-kasus\"\u003e4. Kalibrasi lewat perbandingan kasus\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-kalibrasi-lewat-perbandingan-kasus\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBandingkan aturan dengan beberapa situasi lain agar tidak menjadi terlalu kaku atau generik.\u003c/p\u003e\n\u003cp\u003eContoh:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eapakah aturan ini berlaku untuk endpoint internal dan public?\u003c/li\u003e\n\u003cli\u003eapakah ini berlaku untuk service kecil dan arsitektur monolit?\u003c/li\u003e\n\u003cli\u003eapakah ini masih masuk ketika dependency berubah?\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"5-turunkan-menjadi-artifact-operasional\"\u003e5. Turunkan menjadi artifact operasional\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-turunkan-menjadi-artifact-operasional\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eArtifact yang ideal:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ecustom instructions\u003c/code\u003e untuk aturan yang konsisten\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eskills\u003c/code\u003e untuk workflow investigasi/debugging\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAGENTS.md\u003c/code\u003e untuk agent behavior dan eskalasi\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ereview rubric\u003c/code\u003e atau checklist untuk reviewer manusia\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eonboarding docs\u003c/code\u003e untuk mental model tim\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"contoh-hasil-ekstraksi\"\u003eContoh hasil ekstraksi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-hasil-ekstraksi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika senior bilang tentang PR API:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003econtroller terlalu gemuk\u003c/li\u003e\n\u003cli\u003eauth tidak eksplisit\u003c/li\u003e\n\u003cli\u003eresponse contract berubah tanpa diskusi\u003c/li\u003e\n\u003cli\u003etest hanya happy path\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMaka hasil ekstraksinya bisa menjadi:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eRule: authorization eksplisit wajib untuk endpoint state-changing\u003c/li\u003e\n\u003cli\u003eSmell: auth bergantung ke middleware implicit\u003c/li\u003e\n\u003cli\u003eVerify: tunjukkan jalur auth dan contract impact\u003c/li\u003e\n\u003cli\u003eException: boleh skip untuk endpoint public terdokumentasi\u003c/li\u003e\n\u003cli\u003eSeverity: missing auth = blocking\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"mengapa-ini-penting-untuk-ai\"\u003eMengapa ini penting untuk AI\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting-untuk-ai\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAI dan Copilot bisa menjawab lebih konsisten ketika tacit knowledge senior tidak lagi tersimpan hanya di kepala, melainkan tersusun sebagai artefak yang bisa dibaca dan dieksekusi.\u003c/p\u003e\n\u003cp\u003eIni sejalan dengan praktik di:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192040\"\u003eExecutable governance di Copilot butuh dokumentasi, custom instructions, skills, dan agent behavior\u003c/a\u003e — executable governance di Copilot\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260419192541\"\u003ePraktisnya instruksi standar tim untuk AI: role, konteks, prioritas, dan format\u003c/a\u003e — instruksi standar tim untuk AI: role, konteks, prioritas, output\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.encoding-team-standards\"\u003eEncoding Team Standards — executable AI instruction untuk konsistensi tim\u003c/a\u003e — konsep executable AI instruction sebagai prasyarat konsistensi tim\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.copilot.custom-instructions-best-practices\"\u003eBest Practices for Writing Copilot Custom Instructions\u003c/a\u003e — jenis file instruksi dan struktur yang efektif\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.copilot.tacit-knowledge-extraction\"\u003eEkstraksi Tacit Knowledge Senior untuk AI dan Tim\u003c/a\u003e — dokumentasi praktis untuk ekstraksi tacit knowledge senior\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"implisit-yang-harus-digarisbawahi\"\u003eImplisit yang harus digarisbawahi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implisit-yang-harus-digarisbawahi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eTacit knowledge jarang bisa ditangkap lewat “tolong tulis best practice”.\u003c/li\u003e\n\u003cli\u003eIa keluar paling baik lewat diskusi langsung tentang kasus nyata.\u003c/li\u003e\n\u003cli\u003eArtefak yang baik tidak hanya menulis aturan; ia juga menulis kapan aturan boleh dilanggar dan bagaimana membuktikannya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"langkah-berikutnya\"\u003eLangkah berikutnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#langkah-berikutnya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eBuat \u003ccode\u003edecision mining\u003c/code\u003e session untuk satu PR atau bug nyata.\u003c/li\u003e\n\u003cli\u003eUbah hasilnya langsung menjadi \u003ccode\u003ecustom instructions\u003c/code\u003e dan \u003ccode\u003eskill checklist\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eValidasi artefak tersebut dengan developer lain atau agent AI.\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003epermanent-note (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003etacit-knowledge (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ecopilot (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003egovernance (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten (vault)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/notes.copilot.tacit-knowledge-extraction\"\u003eEkstraksi Tacit Knowledge Senior untuk AI dan Tim (vault)\u003c/a\u003e\u003c/l
