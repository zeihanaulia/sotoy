784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8z"></path></svg></span></div></div></header><div class="ant-layout css-mncuj7" style="margin-top:64px;display:flex;flex-direction:row;width:100%;max-width:1200px;margin:0 auto"><div class="site-layout-sidebar" style="flex:0 0 auto;width:200px;min-width:200px"><aside class="ant-layout-sider ant-layout-sider-dark css-mncuj7" style="position:fixed;top:64px;overflow:auto;height:calc(100vh - 64px);background-color:transparent;flex:0 0 200px;max-width:200px;min-width:200px;width:200px"><div class="ant-layout-sider-children"></div></aside></div><main class="ant-layout-content side-layout-main css-mncuj7" style="flex:1;min-width:0;display:block"><div style="padding:48px 24px 0;max-width:1200px;margin:0 auto"><div class="main-content" role="main"></div></div><div class="ant-divider css-mncuj7 ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer css-mncuj7" style="padding:0 24px 24px"></footer></main></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"note":{"id":"til.setup-spring-boot.package-explanation","title":"Package Explanation","desc":"","updated":1746616252103,"created":1746616241368,"custom":{},"fname":"til.setup-spring-boot.package-explanation","type":"note","vault":{"fsPath":"vault"},"contentHash":"c1eaabd63fd5ffbd06af15cb9e94b503","links":[],"anchors":{"penamaan-package-java--spring-boot-kenapa-harus-seribet-itu":{"type":"header","text":"Penamaan Package Java \u0026 Spring Boot: Kenapa Harus Seribet Itu?","value":"penamaan-package-java--spring-boot-kenapa-harus-seribet-itu","line":8,"column":0,"depth":1},"package-itu-bukan-sekadar-folder":{"type":"header","text":"Package Itu Bukan Sekadar Folder","value":"package-itu-bukan-sekadar-folder","line":14,"column":0,"depth":2},"kenapa-harus-idmycompany":{"type":"header","text":"Kenapa Harus \"id.mycompany\"?","value":"kenapa-harus-idmycompany","line":25,"column":0,"depth":2},"tambahan-modul-di-akhir":{"type":"header","text":"Tambahan Modul di Akhir","value":"tambahan-modul-di-akhir","line":33,"column":0,"depth":2},"tapi-gue-cuma-pake-buat-service-kecil-emang-perlu":{"type":"header","text":"Tapi Gue Cuma Pake Buat Service Kecil, Emang Perlu?","value":"tapi-gue-cuma-pake-buat-service-kecil-emang-perlu","line":51,"column":0,"depth":2},"kesimpulan":{"type":"header","text":"Kesimpulan","value":"kesimpulan","line":57,"column":0,"depth":2}},"children":[],"parent":"til.setup-spring-boot","data":{}},"body":"\u003ch1 id=\"package-explanation\"\u003ePackage Explanation\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#package-explanation\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch1 id=\"penamaan-package-java--spring-boot-kenapa-harus-seribet-itu\"\u003ePenamaan Package Java \u0026#x26; Spring Boot: Kenapa Harus Seribet Itu?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#penamaan-package-java--spring-boot-kenapa-harus-seribet-itu\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eKalau lo datang dari dunia Go atau Node.js yang cenderung simple dan flat, struktur package Java kelihatan ribet banget. Kenapa mesti ada \u003ccode\u003eid.mycompany.adm\u003c/code\u003e segala? Kenapa gak cukup \u003ccode\u003eapp\u003c/code\u003e, \u003ccode\u003eservice\u003c/code\u003e, atau \u003ccode\u003emain\u003c/code\u003e aja?\u003c/p\u003e\n\u003cp\u003eNah, ini gue jelasin secara naratif dan pakai logika, bukan sekadar ikut-ikutan best practice.\u003c/p\u003e\n\u003ch2 id=\"package-itu-bukan-sekadar-folder\"\u003ePackage Itu Bukan Sekadar Folder\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#package-itu-bukan-sekadar-folder\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDi Java, package itu bukan cuma struktur folder buat nyimpan file \u003ccode\u003e.java\u003c/code\u003e. Package itu juga berfungsi sebagai namespace yang ngatur akses antar class, dan jadi identitas unik suatu bagian dari aplikasi lo.\u003c/p\u003e\n\u003cp\u003eJadi kalau lo punya class \u003ccode\u003eUserService\u003c/code\u003e di dua tempat berbeda, misalnya:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eid.mycompany.billing.UserService\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eid.mycompany.userprofile.UserService\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eItu sah-sah aja karena beda package. Gak bakal bentrok. Java compiler tahu mana yang mana. Di Go, namespace biasanya ngikut dari import path (misal: \u003ccode\u003egithub.com/myorg/userprofile/service\u003c/code\u003e), dan konsepnya mirip walaupun lebih fleksibel.\u003c/p\u003e\n\u003ch2 id=\"kenapa-harus-idmycompany\"\u003eKenapa Harus \"id.mycompany\"?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-harus-idmycompany\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eNama package di Java umumnya pakai domain perusahaan dalam bentuk terbalik (\u003ccode\u003ereverse domain name\u003c/code\u003e). Jadi kalau domain lo \u003ccode\u003emycompany.id\u003c/code\u003e, lo tulis \u003ccode\u003eid.mycompany\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eKenapa dibalik? Karena di dunia Java, ini udah jadi cara umum buat bikin namespace yang unik. Google misalnya pakai \u003ccode\u003ecom.google\u003c/code\u003e, Apache pakai \u003ccode\u003eorg.apache\u003c/code\u003e, Spring pakai \u003ccode\u003eorg.springframework\u003c/code\u003e, dan seterusnya.\u003c/p\u003e\n\u003cp\u003eTujuannya biar gak bentrok. Bayangin semua orang pakai \u003ccode\u003eapp.service\u003c/code\u003e — kacau nanti kalau semua library campur di satu project.\u003c/p\u003e\n\u003ch2 id=\"tambahan-modul-di-akhir\"\u003eTambahan Modul di Akhir\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tambahan-modul-di-akhir\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetelah \u003ccode\u003eid.mycompany\u003c/code\u003e, lo tambahin nama aplikasi atau modulnya. Misalnya \u003ccode\u003eadm\u003c/code\u003e buat \u003ccode\u003eADMInfoHandlerWrapper\u003c/code\u003e. Jadi lengkapnya:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eid.mycompany.adm\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eKalau mau lebih rapi, lo bisa strukturin lagi kayak:\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003eid.mycompany.adm.controller\nid.mycompany.adm.service\nid.mycompany.adm.repository\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp\u003eMirip banget sama layered architecture yang dipakai di mana-mana: controller buat HTTP layer, service buat business logic, repository buat database access.\u003c/p\u003e\n\u003ch2 id=\"tapi-gue-cuma-pake-buat-service-kecil-emang-perlu\"\u003eTapi Gue Cuma Pake Buat Service Kecil, Emang Perlu?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tapi-gue-cuma-pake-buat-service-kecil-emang-perlu\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKalau lo lagi nulis microservice kecil buat internal, dan yakin itu gak bakal digabung ke sistem besar, ya boleh aja lo flatten semua jadi satu package: \u003ccode\u003eapp\u003c/code\u003e misalnya. Spring Boot gak bakal ngambek.\u003c/p\u003e\n\u003cp\u003eTapi kalau lo main di monorepo, enterprise system, atau ngembangin open source lib, pake struktur \u003ccode\u003eid.mycompany.module\u003c/code\u003e itu penting banget. Framework kayak Spring Boot juga scan komponen berdasarkan package. Jadi kalau lo nyebar bean lo ke package yang gak kerelasi sama root package, Spring bisa gak nemu komponen lo. Trust me, itu pain point yang umum banget di project Java.\u003c/p\u003e\n\u003ch2 id=\"kesimpulan\"\u003eKesimpulan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kesimpulan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePenamaan package \u003ccode\u003eid.mycompany.adm\u003c/code\u003e itu bukan buat gaya-gayaan. Itu cara Java ngebuat struktur yang scalable, traceable, dan gak bentrok kalau proyek lo makin besar. Lo boleh aja mulai dari yang simple, tapi seiring waktu lo bakal ngerasa sendiri kenapa struktur itu jadi penting. Beda konteks, beda kebutuhan.\u003c/p\u003e\n\u003cp\u003eKalau lo mau ngulik lebih dalam soal konvensi ini, ini beberapa referensi yang bisa lo baca:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://docs.oracle.com/javase/tutorial/java/package/namingpkgs.html\"\u003eOracle Java Package Naming Guide\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://docs.spring.io/spring-boot/reference/using/structuring-your-code.html\"\u003eStructuring Code in Spring Boot\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.baeldung.com/java-packages\"\u003eBaeldung: Java Packages\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncwhf8qpuaoz764uzfn","y8jzdhjhhmqub1t9wx5w9e4","ff8zp75qbznut6joziqr1nx"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about techno
