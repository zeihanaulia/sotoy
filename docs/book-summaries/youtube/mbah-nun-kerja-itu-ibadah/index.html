-summaries.youtube.mbah-nun-kerja-itu-ibadah","id":"book-summaries.youtube.mbah-nun-kerja-itu-ibadah","vaultName":"vault"},"value":"tags.inspirasi","alias":"inspirasi","xvault":false,"to":{"fname":"tags.inspirasi"}}],"anchors":{},"children":[],"parent":"book-summaries.youtube","data":{}},"body":"\u003ch1 id=\"sinau-bareng-cak-nun-dan-kiaikanjeng-bpd-diy-3-november-2006\"\u003eSinau Bareng Cak Nun dan KiaiKanjeng: BPD DIY, 3 November 2006\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sinau-bareng-cak-nun-dan-kiaikanjeng-bpd-diy-3-november-2006\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ccenter\u003e\n    \u003ciframe width=\"560\" height=\"315\" src=\"https://www.youtube.com/embed/sgmscPrLHZ8?si=Si6PvijefWbXUZyr\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" referrerpolicy=\"strict-origin-when-cross-origin\" allowfullscreen\u003e\u003c/iframe\u003e\n\u003c/center\u003e\n---\n\u003cp\u003eMalam itu, Cak Nun berbicara dengan tema “Bekerja Itu Ibadah.” Dia buka dengan guyon, bilang kalau dia dipaksa pake sorban karena katanya dapat rahmat dari Allah—dulu nggak ikut ngerasain gempa, sekarang jadi ikut kebanting-banting.\u003c/p\u003e\n\u003cp\u003eCak Nun langsung lempar pertanyaan buat ngebuka: “Jenengan niki wong kuto apa wong deso?” Tapi dia sendiri nyimpulin: meskipun tinggal di kota, jenengan semua tetep punya akar desa. Dan orang desa itu biasanya lebih berani dan tangguh dalam hidup. “Tukang bakso masih bisa jadi bupati, tapi bupati belum tentu bisa jadi tukang bakso.”\u003c/p\u003e\n\u003cp\u003eTerus dia nyebut-nyebut beberapa orang dari Kiai Kanjeng yang kerja biasa aja. Ada yang kerja di puskesmas, ada tukang laundry, ada guru. Intinya, semua ini kerjaan bener, kerjaan halal. Sementara Cak Nun dan timnya malah kadang nggak jelas, nggak ada gaji tetap. Jadi kalau kamu kerja, digaji, dan jelas, itu udah hebat banget. Jangan sedih sama hidup, katanya, “jen kebangeten nek isih sedih uripe kui.”\u003c/p\u003e\n\u003cp\u003eCak Nun masuk ke obrolan penting: bahwa ukuran sukses dan gagal itu berbeda antara manusia dan Allah. Kadang apa yang kita anggap enak, ternyata justru bikin rugi. Dan sebaliknya, yang kita kira nyebelin, malah jadi berkah.\u003c/p\u003e\n\u003cp\u003eDia juga sempat singgung makna Idul Fitri—bukan cuma soal baju baru dan saling maaf-maafan. Idul Fitri itu harus dimaknai dalam level akhlak, bukan cuma hukum. Bahkan menurut Cak Nun, dalam Al-Qur’an nggak ada perintah untuk minta maaf. Yang ada justru disuruh memaafkan. Jadi yang lebih penting adalah jadi orang yang legowo.\u003c/p\u003e\n\u003cp\u003eTerus dia cerita bahwa dalam Islam ada tiga level: fikih (hukum), akhlak (moral), dan takwa. Hukum itu penting, tapi paling bawah. Akhlak di atasnya. Takwa lebih tinggi lagi. Dan yang paling penting dari semua itu adalah jadi manusia bermoral. Karena kalau orang udah bermoral, dia nggak perlu diatur hukum—dia udah tahu mana yang baik.\u003c/p\u003e\n\u003cp\u003eCak Nun juga kritik soal gelar-gelar kayak “Kyai,” “Kaji.” Menurut dia, Nabi Muhammad sendiri nggak pernah terlalu bawa-bawa gelar. Yang penting itu bukan dirinya, tapi Allah. Bahkan pas Rasulullah sekarat pun, yang disebut di mulutnya adalah “umatku, umatku,” bukan “saya, saya.”\u003c/p\u003e\n\u003cp\u003eAbis bahas soal akhlak, Cak Nun mulai masuk ke tema besar: \u003cstrong\u003ebekerja itu ibadah\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eDia bilang, dalam hidup ini, ada tiga hal yang gak bisa dipisahin: kerja, ibadah, dan ilmu. Tiga-tiganya harus jalan bareng. Kayak laut sama ombaknya, gak bisa dipisah. Kalo kita kerja tanpa ilmu, bisa ngawur. Kalo ibadah tanpa kerja, jadi beban sosial. Dan kalo cari ilmu tapi gak dipraktikin lewat kerja atau ibadah, ya ilmunya jadi mandek.\u003c/p\u003e\n\u003cp\u003eCak Nun juga nyindir budaya kita yang kadang terlalu mengagung-agungkan orang yang cuma duduk di masjid, wiridan, salat, tapi gak kerja. Dia cerita soal seorang ibu yang datang ke dia, ngeluh suaminya rajin ibadah tapi gak pernah kerja. Tagihan utang numpuk, dan tiap ada yang nagih, istrinya yang disuruh ngadepin. Itu, kata Cak Nun, bukan ibadah yang bener. Ibadah harus jalan bareng tanggung jawab sosial.\u003c/p\u003e\n\u003cp\u003eTerus dia bilang, masuk surga itu bisa lewat ibadah, bisa lewat ilmu, bisa lewat kerja. Tapi yang paling tinggi derajatnya justru \u003cstrong\u003epekerja\u003c/strong\u003e. Kenapa? Karena orang yang kerja, dia menjalankan amanat Allah pakai seluruh tubuhnya—tangan, kaki, otak, hati. Dan kalau niatnya bener, caranya bener, itu jauh lebih mulia daripada cuma ibadah mahdhah (ritual doang).\u003c/p\u003e\n\u003cp\u003eDia bahkan nyebut ayat:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cem\u003e“Barang siapa ingin bertemu langsung dengan Allah, maka bekerjalah yang baik.”\u003c/em\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eMakanya, kata Cak Nun, orang yang bener-bener kerja, itu justru orang yang paling siap buat \u003cem\u003ebermuwajahah\u003c/em\u003e sama Allah—tatap muka langsung, bukan sekadar cari surga. Karena surga itu cuman bagian kecil dari kehadiran Allah. Kalau lo udah ngerasain kehadiran Allah di kerjaan lo, surga itu udah bonus.\u003c/p\u003e\n\u003cp\u003eTerus dia bilang lagi, jangan terlalu memuliakan ulama, kiai, termasuk dirinya sendiri. “Aku tak buang-buang awakku, ora penting,” katanya. Soalnya dia ngaku kalah sregep, kalah rajin dari orang-orang yang kerja setiap hari dari subuh sampai sore.\u003c/p\u003e\n\u003cp\u003eKerja itu ibadah, iya. Tapi bukan sekadar nyari duit. Karena orang yang kerja—entah tukang becak, pegawai bank, guru, petani—kalau dia ikhlas dan lurus, dia juga melayani Allah. Bahkan Allah ikut tanggung jawab atas rezeki anak istrinya. Gak cuman perusahaannya aja.\u003c/p\u003e\n\u003cp\u003eMakanya, orang yang hidup karena diperintah Allah (bukan karena ego sendiri), dia akan dilindungi dan dijamin sama Allah. Kalo hidupnya gak melibatkan Allah, ya siap-siap tanggung risiko sendiri.\u003c/p\u003e\n\u003cp\u003eCak Nun juga cerita soal dirinya yang gak pernah pegang ATM, gak paham kartu kredit, dan lebih suka nyimpen duit di kaos kaki. Semua karena dia gak pengen dikontrol sama sistem yang dia gak ngerti. Tapi dia percaya: rezeki cukup kok, asal hidupnya bener.\u003c/p\u003e\n\u003cp\u003eLanjut, bro.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003eSetelah ngomong soal ibadah dan kerja, Cak Nun pindah ke bagian yang cukup satir tapi dalem: \u003cstrong\u003ekita ini sering merasa kekurangan, padahal hidup kita udah super nyaman dibandingin banyak negara lain\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eDia nyebut soal rumah temennya, Mas Toto, yang tinggal di tengah sawah—aksesnya cuma bisa lewat motor, harus jalan kaki dulu dari tempat parkir. Terus ada yang nyeletuk, “Koe dalan ning dunya wae angel koyok ngene, opo meneh ning akhirat?” Itu jadi bahan kontemplasi. Kalau di dunia udah susah, jangan sampai akhirat juga susah.\u003c/p\u003e\n\u003cp\u003eLalu Cak Nun nyorotin kehidupan rakyat Indonesia. Katanya, kalau dibanding negara lain, terutama negara berkembang seperti Mesir atau Filipina, \u003cstrong\u003erakyat Indonesia hidupnya jauh lebih enak\u003c/strong\u003e. Di Kairo, rumah walikota aja kalah sama rumah lurah di Condong Catur. Menteri di sana biasa aja, naik bis kota. Di Indonesia? Luar biasa mewah.\u003c/p\u003e\n\u003cp\u003eDia juga bahas betapa kuatnya daya beli orang Indonesia, meskipun katanya lagi krisis. Handphone laku keras, bahkan TKW di Hong Kong jadi konsumen nomor satu buat kartu voucher. Bahkan katanya, di sana kartu-kartu top-up dinamain “Bandung Indah,” “Megawati,” “Tari Bali.” Orang luar sampe bingung, ini negara katanya krisis kok belanjanya segitu?\u003c/p\u003e\n\u003cp\u003eJadi menurut dia, krisis yang sering digembar-gemborkan itu lebih ke propaganda politik atau ketidakwawasan struktural. Sementara di lapangan, rakyatnya tetap makan, tetap rokok, tetap shopping. Dan itu bukan berarti kita hedonis, tapi bukti bahwa Allah masih ngasih berkah di negeri ini, meskipun pemerintahnya sering nggak bener.\u003c/p\u003e\n\u003cp\u003eTerus masuk ke bagian yang lebih personal dan lucu. Cak Nun cerita pengalaman dia waktu di Belanda selama dua tahun. Dia ngaku nggak pernah bayar tiket kereta, bis, atau trem. Pernah ketangkep, tapi berhasil lolos terus. Dan ketika akhirnya kepergok, dia ngeles dengan cara orang Jawa: ngomong ngawur sampai polisinya bingung, dikira orang gila, akhirnya dilepas. Dia bilang, itu caranya bikin “musuh kehilangan akal satu detik”—dan saat itulah kemenangan terjadi. Satire, tapi nyentil.\u003c/p\u003e\n\u003cp\u003eAda satu bagian lagi yang cukup dalam, waktu dia cerita soal Rasulullah dan sahabat. Cerita ringan, tapi maknanya dalem banget.\u003c/p\u003e\n\u003cp\u003eWaktu pengajian malam-malam, Ali bin Abi Thalib selalu duduk di sebelah Rasulullah buat ngelindungin beliau dari perokok—soalnya Abu Bakar dan Umar waktu itu ngerokok oyot-oyotan. Nah, Rasulullah tahu itu, dan pengen ngajarin Ali buat gak terlalu overprotektif. Malam itu, beliau godain Ali.\u003c/p\u003e\n\u003cp\u003eRasulullah makan kurma dan taruh semua bijinya di depan Ali. Jadi kelihatannya cuma Ali yang rakus. Terus Rasulullah nyeletuk, “Coba lihat siapa yang paling rakus malam ini?” Semua orang nengok ke Ali, karena biji kurma numpuk di depannya.\u003c/p\u003e\n\u003cp\u003eTapi Ali balas dengan cerdas, dia bilang, “Betul, saya paling rakus karena ada banyak biji kurma di depan saya. Tapi yang lebih rakus adalah yang makan kurma beserta bijinya, sampai gak ada satu pun biji yang tersisa.” Semuanya langsung ketawa, dan Rasulullah pun memuji kecerdasan Ali. Sejak itu Ali dijuluki \u003cem\u003eBabul Ilmi\u003c/em\u003e—pintu ilmu. Rasulullah sendiri disebut \u003cem\u003eMadinatul Ilmi\u003c/em\u003e—kota ilmu.\u003c/p\u003e\n\u003cp\u003eCak Nun pakai cerita ini buat ngingetin: kadang kita terlalu serius liat hidup. Padahal Rasulullah sendiri juga suka guyon, suka santai, tapi tetap penuh makna.\u003c/p\u003e\n\u003cp\u003eDi bagian penutup, Cak Nun balik lagi nekenin poin utama dari semuanya: \u003cstrong\u003ebekerja itu jalan tertinggi untuk nyambung langsung ke Allah\u003c/strong\u003e. Jadi, bukan cuma ibadah formal kayak salat, puasa, haji—yang penting itu apakah kita \u003cem\u003emelibatkan Allah\u003c/em\u003e dalam seluruh hidup kita atau enggak.\u003c/p\u003e\n\u003cp\u003eDia bilang, banyak orang kerja itu cuma buat nyari duit. Tapi kalau kamu kerja karena disuruh Allah, dan kamu ngerti bahwa yang kamu layani itu sejatinya juga Allah, maka Allah juga ikut tanggung jawab atas hidupmu. Termasuk rezekimu, anakmu sekolah, keluargamu tenang—semua itu ikut dijamin sama Allah. Yang penting, kamu melibatkan Dia.\u003c/p\u003e\n\u003cp\u003eTerus Cak Nun nanya, “Lo mending hidup sendiri atau disuruh Allah?” Dia milih disuruh, karena kalau disuruh, yang nyuruh ikut tanggung jawab. Kalau jalan sendiri, ya semua tanggung jawab ditanggung sendiri juga. Sama kayak di perusahaan—kalau kamu disuruh ke luar kota sama kantor, pasti tiket, hotel, dan keselamatanmu ditanggung. Tapi kalau kamu jalan sendiri, ya resiko ditanggung sendiri.\u003c/p\u003e\n\u003cp\u003eNah, dalam hidup juga gitu. Kalau kamu kerja karena Allah nyuruh, kamu nggak akan pernah sendirian. Dan kamu gak bakal takut miskin. Karena bukan perusahaan doang yang jamin kamu, tapi Allah juga.\u003c/p\u003e\n\u003cp\u003eDia sempat nyentil soal fatwa-fatwa agama dan debat-debat hukum yang ribet. Bagi Cak Nun, dia nggak tertarik ikut ribut soal hukum hari raya, perbedaan pandangan agama, atau aturan-aturan yang ribet. Dia bilang terus terang, “Aku iki ora tanggung jawab karo sopo-sopo, aku mung tanggung jawab karo anak bojoku.” Jadi kalau ditanya pendapatnya soal hal-hal kayak perbedaan hari raya, dia jawab: gak penting. Yang penting itu akhlak, bukan debat hukum yang gak selesai-selesai.\u003c/p\u003e\n\u003cp\u003eLalu dia bahas soal demokrasi, perda-perda absurd yang suka muncul di daerah, dan bagaimana negara ini sering nuntut rakyat untuk taat tanpa ngasih fasilitas atau keadilan. Dia cerita pernah ditangkap polisi cuma gara-gara jalan rusak, dan dia malah “nangkep balik” polisinya—karena menurut dia, yang salah itu sistem dan aturannya, bukan rakyatnya.\u003c/p\u003e\n\u003cp\u003eIntinya: rakyat itu gak bisa terus disalahin kalau sistemnya aja gak bener.\u003c/p\u003e\n\u003cp\u003eTerakhir, dia tutup dengan semangat untuk mencintai Indonesia. Katanya, Indonesia itu kekasihnya, tapi dia gak mau diatur sama negara. Dia lebih milih tunduk sama ilmu dan akhlak daripada tunduk sama aturan negara yang gak masuk akal.\u003c/p\u003e\n\u003cp\u003eCak Nun juga bilang, teman-teman Kiai Kanjeng itu udah biasa nginep di rumah-rumah pejabat luar negeri, dan rumah lurah di Jogja aja jauh lebih bagus. Dia sampe ngakak sendiri liat banner SCTV soal bantuan gempa, yang malah nyari \"pundi amal SCTV\" kayak orang lagi promosi.\u003c/p\u003e\n\u003cp\u003eTerus, penutupnya sangat menyentuh. Dia doa buat semua yang hadir—semoga hidupnya ditenangkan, rezekinya cukup, keluarganya diberi perlindungan. Lalu semua ditutup dengan shalawat bersama. Merinding sih bagian akhir ini, karena terasa banget ketulusan dan cintanya ke umat.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003eKesimpulannya?\u003c/p\u003e\n\u003cp\u003eMenurut Cak Nun, \u003cstrong\u003ebekerja itu bukan cuma aktivitas duniawi, tapi jalan langsung menuju Allah\u003c/strong\u003e. Asal kita sadar, kerja kita itu untuk kebaikan, kita melibatkan Allah, dan kita nggak lepas dari akhlak, maka hidup kita udah nyambung ke yang Maha Kuasa. Gak perlu gelar-gelar agamis, gak perlu ibadah-ibadah pamer—cukup kerja yang bener, niat yang lurus, dan hidup dengan akhlak.\u003c/p\u003e\n\u003cp\u003eSelesai.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-head
