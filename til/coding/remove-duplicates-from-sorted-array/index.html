ps":{"note":{"id":"til.coding.remove-duplicates-from-sorted-array","title":"Remove Duplicates from Sorted Array","desc":"","updated":1742443390960,"created":1742346679252,"custom":{},"fname":"til.coding.remove-duplicates-from-sorted-array","type":"note","vault":{"fsPath":"vault"},"contentHash":"c0e1181af3c655334c676a937e37b2e1","links":[],"anchors":{"memahami-problemnya":{"type":"header","text":"Memahami problemnya","value":"memahami-problemnya","line":53,"column":0,"depth":2},"1-pelajari-constraintnya":{"type":"header","text":"1. Pelajari constraintnya","value":"1-pelajari-constraintnya","line":55,"column":0,"depth":3},"2-cek-narasi-dari-soalnya":{"type":"header","text":"2. Cek narasi dari soalnya","value":"2-cek-narasi-dari-soalnya","line":62,"column":0,"depth":3},"3-check-examle":{"type":"header","text":"3. Check examle","value":"3-check-examle","line":70,"column":0,"depth":3},"solusi":{"type":"header","text":"Solusi","value":"solusi","line":96,"column":0,"depth":2}},"children":["til.coding.remove-duplicates-from-sorted-array.Code"],"parent":"til.coding","data":{}},"body":"\u003ch1 id=\"remove-duplicates-from-sorted-array\"\u003eRemove Duplicates from Sorted Array\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#remove-duplicates-from-sorted-array\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eGiven an integer array nums sorted in \u003cstrong\u003enon-decreasing order\u003c/strong\u003e, remove the duplicates [in-place(https://en.wikipedia.org/wiki/In-place_algorithm)] such that each unique element appears only \u003cstrong\u003eonce\u003c/strong\u003e. The \u003cstrong\u003erelative order\u003c/strong\u003e of the elements should be kept the same. Then return the number of unique elements in nums.\u003c/p\u003e\n\u003cp\u003eConsider the number of unique elements of nums to be k, to get accepted, you need to do the following things:\u003c/p\u003e\n\u003cp\u003eChange the array nums such that the first k elements of nums contain the unique elements in the order they were present in nums initially. The remaining elements of nums are not important as well as the size of nums.\nReturn k.\nCustom Judge:\u003c/p\u003e\n\u003cp\u003eThe judge will test your solution with the following code:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eint[] nums = [...]; // Input array\nint[] expectedNums = [...]; // The expected answer with correct length\u003c/p\u003e\n\u003cp\u003eint k = removeDuplicates(nums); // Calls your implementation\u003c/p\u003e\n\u003cp\u003eassert k == expectedNums.length;\nfor (int i = 0; i \u0026#x3C; k; i++) {\nassert nums[i] == expectedNums[i];\n}\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIf all assertions pass, then your solution will be \u003cstrong\u003eaccepted\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eExample 1:\u003c/p\u003e\n\u003cp\u003eInput: nums = [1,1,2]\nOutput: 2, nums = [1,2,_]\nExplanation: Your function should return k = 2, with the first two elements of nums being 1 and 2 respectively.\nIt does not matter what you leave beyond the returned k (hence they are underscores).\u003c/p\u003e\n\u003cp\u003eExample 2:\u003c/p\u003e\n\u003cp\u003eInput: nums = [0,0,1,1,1,2,2,3,3,4]\nOutput: 5, nums = [0,1,2,3,4,\u003cem\u003e,\u003c/em\u003e,\u003cem\u003e,\u003c/em\u003e,_]\nExplanation: Your function should return k = 5, with the first five elements of nums being 0, 1, 2, 3, and 4 respectively.\nIt does not matter what you leave beyond the returned k (hence they are underscores).\u003c/p\u003e\n\u003cp\u003eConstraints:\u003c/p\u003e\n\u003cp\u003e1 \u0026#x3C;= nums.length \u0026#x3C;= 3 * 104\n-100 \u0026#x3C;= nums[i] \u0026#x3C;= 100\nnums is sorted in non-decreasing order.\u003c/p\u003e\n\u003ch2 id=\"memahami-problemnya\"\u003eMemahami problemnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#memahami-problemnya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"1-pelajari-constraintnya\"\u003e1. Pelajari constraintnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-pelajari-constraintnya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e1 \u0026#x3C;= nums.length \u0026#x3C;= 3 * 104\u003c/code\u003e = lengthnya bisa sampai 30rb digit, artinya kalau pake brute force ini bakalan lama banget\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e-100 \u0026#x3C;= nums[i] \u0026#x3C;= 100\u003c/code\u003e = setiap angka dalam array berisi -100 sampai 100.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enums is sorted in non-decreasing order\u003c/code\u003e. Array sudah diurutkan dalam \u003ca href=\"https://stackoverflow.com/questions/1963474/is-a-non-decreasing-sequence-increasing\"\u003enon-decreasing order\u003c/a\u003e artinya urutannya terus naik, 1-2-3-4 dant tidak menurun, tapi memungkinkan duplicate 1-1-1-2-3-4-4-4.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"2-cek-narasi-dari-soalnya\"\u003e2. Cek narasi dari soalnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-cek-narasi-dari-soalnya\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eSorted in \u003cstrong\u003enon-decreasing order\u003c/strong\u003e = karena dia sudah terurut jadi bisa nih pake two pointer buat remove duplicatenya.\u003c/li\u003e\n\u003cli\u003eRemove the duplicates [in-place(https://en.wikipedia.org/wiki/In-place_algorithm)] = berarti gak boleh bikin array baru, tapi ubah aja array nums.\u003c/li\u003e\n\u003cli\u003eeach unique element appears only \u003cstrong\u003eonce\u003c/strong\u003e = jadi hasilnya setiap angka cuma muncul sekali\u003c/li\u003e\n\u003cli\u003eThe \u003cstrong\u003erelative order\u003c/strong\u003e of the elements should be kept the same = pastikan urutan arraynya harus sama jangan diubah dan gak boleh di sort ulang.\u003c/li\u003e\n\u003cli\u003eThen return the number of unique elements in nums. =  hasilnya jumlah dari nilai uniknya (k), dan gak perlu hapus nilai (k).\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"3-check-examle\"\u003e3. Check examle\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-check-examle\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eExample 1:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003eInput: nums \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e1,1\u003c/span\u003e,2\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\nOutput: \u003cspan class=\"token number\"\u003e2\u003c/span\u003e, nums \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e1,2\u003c/span\u003e,_\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003eDuplikat angka 1 dihapus\u003c/li\u003e\n\u003cli\u003eLalu array tetap dalam urutan yang sama\u003c/li\u003e\n\u003cli\u003eOutputnya jumlah element unit yaitu k = 2\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eExample 2:\u003c/p\u003e\n\u003cpre class=\"language-bash\"\u003e\u003ccode class=\"language-bash\"\u003eInput: nums \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e0,0\u003c/span\u003e,1,1,1,2,2,3,3,4\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\nOutput: \u003cspan class=\"token number\"\u003e5\u003c/span\u003e, nums \u003cspan class=\"token operator\"\u003e=\u003c/span\u003e \u003cspan class=\"token punctuation\"\u003e[\u003c/span\u003e\u003cspan class=\"token number\"\u003e0,1\u003c/span\u003e,2,3,4,_,_,_,_,_\u003cspan class=\"token punctuation\"\u003e]\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul\u003e\n\u003cli\u003eSemua yang duplikat dihapus\u003c/li\u003e\n\u003cli\u003eUrutan angkanya tetap sama\u003c/li\u003e\n\u003cli\u003eOutputnya k = 5\u003c/li\u003e\n\u003cli\u003eBagian setelah k tidak dibiarkan, artinya jika di len size tetap sama\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"solusi\"\u003eSolusi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#solusi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDari pemahaman soal kita sudah tau, bakal pake two pointer.\nKita tau data sorted kiri lebih kecil dari kanan tapi bisa sama, jadi kita akan cata perubahan yang tidak samanya saja karena kita mau cari keunikannya. jadi kalau ada array [1,1,2], kita geser terus ke kiri, jadi [1,2,2] karena jika ada perbedaan antara nums[left] != nums[right] maka nums[left] = nums[right] dan left kita tambah, jadi indexnya akan maju.\nJadi logikanya gini\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eDefinisikan \u003ccode\u003eleft=0\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLooping dengan kondisi \u003ccode\u003eright=1; right \u0026#x3C; len(nums); right++\u003c/code\u003e\n2.1. Jika \u003ccode\u003enums[left] != nums[right]\u003c/code\u003e maka nums[left] = nums[right] dan tambahkan nlai \u003ccode\u003eleft++\u003c/code\u003e \u003c/li\u003e\n\u003cli\u003eReturn left + 1\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/til.coding.remove-duplicates-from-sorted-array.Code\"\u003eCode\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body
