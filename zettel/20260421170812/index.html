ar-installasi\"\u003eBMAD Getting Started mengajarkan workflow awal AI-native engineering, bukan sekadar installasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bmad-getting-started-mengajarkan-workflow-awal-ai-native-engineering-bukan-sekadar-installasi\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eSebenarnya halaman “Getting Started” ini sedang mengajarkan apa?\u003c/li\u003e\n\u003cli\u003eKenapa BMAD menyusun prosesnya dalam fase-fase?\u003c/li\u003e\n\u003cli\u003eApa fungsi \u003ccode\u003ebmad-help\u003c/code\u003e dalam keseluruhan sistem?\u003c/li\u003e\n\u003cli\u003eApa arti tiga track: Quick Flow, BMad Method, dan Enterprise?\u003c/li\u003e\n\u003cli\u003eDari semua ini, apa insight paling penting buat praktik engineering nyata?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman BMAD Getting Started bukan tutorial installasi biasa. Dari awal dia sedang mencoba menanamkan satu keyakinan besar: \u003cstrong\u003eAI coding harus dimulai dari proses kerja, bukan dari prompt spontan.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eDi permukaan, halaman ini memang membahas hal-hal praktis seperti instalasi, perintah \u003ccode\u003ebmad-help\u003c/code\u003e, dan langkah-langkah build. Namun jika kita membaca lebih dalam, BMAD sebenarnya sedang menawarkan sebuah model kerja. Model ini menuntun engineer untuk mengubah interaksi dengan AI dari percakapan bebas menjadi workflow yang bisa diulang.\u003c/p\u003e\n\u003ch2 id=\"1-apa-yang-diajarkan-halaman-ini\"\u003e1. Apa yang diajarkan halaman ini?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#1-apa-yang-diajarkan-halaman-ini\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika Anda mengikuti halaman ini sebagai pengguna biasa, Anda mungkin merasa sedang diajarkan cara memasang alat dan menjalankan perintah. Tetapi keseluruhan struktur halaman mengisyaratkan tujuan yang lebih dalam. BMAD ingin agar engineer tidak langsung menuntut kode dari AI. Sebaliknya, ia ingin engineer membangun artefak-artefak awal — seperti komponen bisnis, dokumen requirement, dan konteks proyek — yang kemudian menjadi dasar untuk implementasi.\u003c/p\u003e\n\u003cp\u003eItu sebabnya Getting Started memosisikan output awal bukan sebagai kode, melainkan sebagai artefak proses. Dokumen seperti PRD dan architecture bukan sekadar dokumentasi tambahan. Mereka adalah alat untuk membuat niat manusia bisa diterjemahkan dengan lebih aman dan lebih konsisten oleh AI. Dalam praktiknya, BMAD mengajarkan satu hal yang radikal bagi banyak pengguna AI: sebelum Anda bertanya pada AI untuk membuat sesuatu, pastikan dulu Anda sudah punya proses kerja yang jelas.\u003c/p\u003e\n\u003ch2 id=\"2-kenapa-bmad-membagi-proses-ke-fase\"\u003e2. Kenapa BMAD membagi proses ke fase?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#2-kenapa-bmad-membagi-proses-ke-fase\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman ini membagi alur menjadi empat fase: Analysis, Planning, Solutioning, dan Implementation. Itu tampak seperti garis besar SDLC tradisional, tetapi pembagian ini menjalankan fungsi yang jauh lebih spesifik di konteks AI.\u003c/p\u003e\n\u003cp\u003eFase Analysis diletakkan sebagai opsional bukan tanpa alasan. BMAD mengakui bahwa tidak semua proyek dimulai dari ketidakjelasan total. Namun dengan menempatkan Analysis sebagai fase yang tersedia, BMAD mengirim pesan penting: ada kondisi di mana masalah sebenarnya belum cukup matang untuk ditangani oleh agent. Pada tahap ini, AI diajak membantu menentukan apakah ide layak dibangun, memahami domain, dan menguji value proposition. Ini adalah rem epistemik, sebuah usaha untuk mencegah AI melompat ke implementasi sebelum tujuan bisnis benar-benar dipahami.\u003c/p\u003e\n\u003cp\u003eSetelah itu Planning hadir sebagai fase wajib. Di BMAD, requirement bukan lagi sesuatu yang bisa ditunda sampai nanti. Ia dijadikan fondasi minimum. Terutama di track BMad Method dan Enterprise, output seperti PRD dianggap wajib. Alasan desain ini mencerminkan asumsi sentral BMAD: kegagalan AI-native engineering bukan sekadar karena AI tidak mampu menulis kode. Kegagalan jauh lebih mungkin terjadi karena requirement tidak cukup jelas. Karena itu, Planning diposisikan sebagai quality gate pertama yang harus dilalui sebelum implementasi dipertimbangkan.\u003c/p\u003e\n\u003cp\u003eKemudian datang Solutioning, fase yang menarik karena BMAD dengan sengaja memisahkan requirement dari solusi teknis. Artinya BMAD tidak menerima praktik umum di mana orang langsung menerjemahkan kebutuhan ke desain, lalu langsung ke kode. Di sinilah architecture ditempatkan sebagai konteks yang memberi makna pada backlog. Hanya setelah architecture jelas, epics dan stories dapat dibuat dengan hati-hati. Sikap ini menunjukkan bahwa BMAD percaya backlog yang baik harus lahir dari keputusan arsitektural, bukan sebaliknya.\u003c/p\u003e\n\u003cp\u003eAkhirnya Implementation. Ketika BMAD sampai pada tahap ini, ia tidak menyerahkannya pada improvisasi. Implementasi dipecah menjadi ritme teratur: sprint planning, penulisan story, implementasi story, code review, dan retrospective. Ini menegaskan bahwa dalam model BMAD, coding bukanlah ledakan satu kali, tetapi rangkaian unit kerja yang sengaja dikendalikan.\u003c/p\u003e\n\u003ch2 id=\"3-apa-fungsi-bmad-help\"\u003e3. Apa fungsi \u003ccode\u003ebmad-help\u003c/code\u003e?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#3-apa-fungsi-bmad-help\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika Anda bertanya mengapa BMAD menempatkan \u003ccode\u003ebmad-help\u003c/code\u003e di pintu masuk, jawabannya ada pada masalah yang jauh lebih besar daripada daftar perintah. \u003ccode\u003ebmad-help\u003c/code\u003e diposisikan sebagai navigator proyek, bukan sebagai manual biasa. Ia menginspeksi kondisi proyek, membaca modul yang terpasang, mengetahui apa yang sudah selesai, dan memberi tahu langkah selanjutnya. Dalam istilah desain sistem, ia adalah dispatcher proses.\u003c/p\u003e\n\u003cp\u003eFungsi ini penting karena BMAD menghadapi masalah disorientasi yang khas bagi pengguna AI. Ketika ada terlalu banyak fase, terlalu banyak agen, dan terlalu banyak pilihan, user cenderung tersesat. Tanpa seorang pemandu yang bisa merutekan alur, banyak orang akan kembali ke improvisasi. \u003ccode\u003ebmad-help\u003c/code\u003e mencoba memotong kebiasaan itu. Dengan menekankan bahwa ia aktif di akhir setiap workflow, BMAD juga mengurangi jeda antara satu langkah dan langkah berikutnya. Ini mencegah celah di mana pengguna berhenti dan mulai menebak-nebak.\u003c/p\u003e\n\u003cp\u003eKesimpulannya, \u003ccode\u003ebmad-help\u003c/code\u003e bukan hanya helper; ia adalah mekanisme pengurangi disorientasi sekaligus penegak kontinuitas workflow.\u003c/p\u003e\n\u003ch2 id=\"4-apa-arti-tiga-track\"\u003e4. Apa arti tiga track?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#4-apa-arti-tiga-track\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eHalaman BMAD Getting Started menjelaskan tiga track perencanaan: Quick Flow, BMad Method, dan Enterprise. Perbedaan di antara ketiganya bukan soal label yang keren. Mereka merepresentasikan cara BMAD menyesuaikan tingkat formalitas dengan kompleksitas proyek.\u003c/p\u003e\n\u003cp\u003eQuick Flow diperuntukkan bagi pekerjaan yang jelas dan kecil, seperti bug fix atau fitur sederhana. Di sini BMAD mengakui bahwa tidak semua pekerjaan perlu birokrasi berat. Untuk kasus seperti ini, cukup ada tech-spec untuk menjaga agar agent tetap mendapat arah tanpa harus memaksa pembuatan PRD dan architecture.\u003c/p\u003e\n\u003cp\u003eBMad Method berada di tengah: untuk produk, platform, atau fitur kompleks yang tidak seberat enterprise, namun sudah cukup besar untuk membutuhkan pemisahan yang jelas antara kebutuhan, desain, dan implementasi. Di track ini, PRD dan architecture menjadi artefak penting karena mereka menahan kompleksitas agar tidak meledak menjadi kerja yang salah arah.\u003c/p\u003e\n\u003cp\u003eEnterprise menambahkan lapisan formalitas lagi. Project dengan compliance, multi-tenant system, atau persyaratan governance tinggi tidak hanya butuh architecture; mereka butuh security dan DevOps explicit. Di level ini, BMAD mengakui bahwa biaya kesalahan sangat tinggi, sehingga artefak dan quality gate juga harus lebih banyak.\u003c/p\u003e\n\u003cp\u003eTrack-track ini pada akhirnya menyampaikan satu pesan: struktur jangan dipaksa sama untuk semua skenario. Semakin besar risiko, semakin banyak struktur yang diperlukan. Tetapi struktur itu juga tidak harus dipaksakan pada task kecil yang jelas.\u003c/p\u003e\n\u003ch2 id=\"5-insight-paling-penting-untuk-praktik-engineering-nyata\"\u003e5. Insight paling penting untuk praktik engineering nyata\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#5-insight-paling-penting-untuk-praktik-engineering-nyata\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMeski terdengar seperti tutorial, halaman ini sedang membahas ide yang jauh lebih besar. Intinya adalah bahwa AI-native engineering harus dimulai dari proses, bukan prompt. BMAD Getting Started bukan sekadar memberi tahu Anda command mana yang harus dijalankan. Ia memberi tahu Anda bahwa caranya membangun software dengan AI harus melewati tahapan, artefak, dan perpindahan konteks yang sengaja diatur.\u003c/p\u003e\n\u003cp\u003eImplikasinya untuk praktik engineering adalah nyata. Pertama, jangan gunakan AI untuk langsung membuat kode dari ide yang kabur. Kedua, gunakan fase Planning untuk memastikan masalah dan kebutuhan tertulis dengan jelas. Ketiga, pisahkan Solutioning agar arsitektur ditempatkan sebelum backlog dibuat. Keempat, pakai \u003ccode\u003ebmad-help\u003c/code\u003e sebagai navigator agar workflow tidak tercerai-beraikan. Kelima, pilih track yang sesuai, karena bukan semua task layak diperlambat oleh proses enterprise. Dan keenam, mulai setiap workflow di chat baru agar konteks model tetap bersih.\u003c/p\u003e\n\u003cp\u003eSecara lebih luas, halaman ini menegaskan bahwa AI-native engineering bukan tentang model atau prompt yang lebih canggih. Ia tentang bagaimana menempatkan AI dalam proses delivery yang bisa dipercaya. Itu juga alasan mengapa artefak seperti PRD, architecture, epics, dan project context bukan sekadar dokumentasi. Mereka adalah medium transmisi niat dan aturan antara manusia dan AI.\u003c/p\u003e\n\u003ch2 id=\"hubungan-dengan-ai-native-engineering\"\u003eHubungan dengan AI-native engineering\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-dengan-ai-native-engineering\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eJika dibandingkan dengan kerangka sekali pakai lain, BMAD Getting Started mengarahkan kita pada pemahaman yang sama dengan artikel Thoughtworks: AI harus diperlakukan sebagai bagian dari engineering stack, bukan sebagai chatbot improvisasi. Specialized agents di BMAD adalah lapisan agent, Planning dan Solutioning adalah methodology, artefak adalah spec discipline, project context adalah context engineering, dan fresh chats adalah pengakuan atas keterbatasan konteks model.\u003c/p\u003e\n\u003cp\u003eDengan demikian, BMAD Getting Started bukan hanya onboarding software. Ia adalah onboarding ke sebuah model kerja AI-native engineering yang menempatkan proses lebih dulu sebelum prompt.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421170516\"\u003eBMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/a\u003e — BMAD adalah framework workflow AI-native engineering yang mengganti prompt chaos dengan peran dan fase terstruktur\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421163750\"\u003eThoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003c/a\u003e — Thoughtworks: AI-native engineering adalah operating model untuk mengorkestrasikan AI, bukan sekadar AI coding\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.software-architecture\"\u003eMOC: Software Architecture\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003ebmad (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #ff9a8a;\" href=\"/sotoy/notes/tags.workflow\"\u003eworkflow\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emethodology (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentik
