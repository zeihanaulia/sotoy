:"wiki","from":{"fname":"zettel.20260421193756","id":"zettel.20260421193756","vaultName":"vault"},"value":"zettel.20260421192951","position":{"start":{"line":68,"column":3,"offset":3044},"end":{"line":68,"column":28,"offset":3069},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.20260421192951"}},{"type":"wiki","from":{"fname":"zettel.20260421193756","id":"zettel.20260421193756","vaultName":"vault"},"value":"zettel.moc.ai-native","position":{"start":{"line":69,"column":3,"offset":3160},"end":{"line":69,"column":27,"offset":3184},"indent":[]},"xvault":false,"sameFile":false,"to":{"fname":"zettel.moc.ai-native"}},{"from":{"fname":"zettel","id":"zettel","vaultName":"vault"},"type":"backlink","position":{"start":{"line":120,"column":3,"offset":10915},"end":{"line":120,"column":28,"offset":10940},"indent":[]},"value":"zettel.20260421193756"},{"from":{"fname":"zettel.moc.ai-native","id":"zettel.moc.ai-native","vaultName":"vault"},"type":"backlink","position":{"start":{"line":33,"column":3,"offset":2434},"end":{"line":33,"column":28,"offset":2459},"indent":[]},"value":"zettel.20260421193756"}],"anchors":{"pertanyaan-yang-dibuka":{"type":"header","text":"Pertanyaan yang dibuka","value":"pertanyaan-yang-dibuka","line":17,"column":0,"depth":2},"klaim-utama":{"type":"header","text":"Klaim utama","value":"klaim-utama","line":23,"column":0,"depth":2},"apa-yang-spec-kit-tawarkan":{"type":"header","text":"Apa yang Spec Kit tawarkan","value":"apa-yang-spec-kit-tawarkan","line":29,"column":0,"depth":2},"mengapa-relevan-di-era-ai-native":{"type":"header","text":"Mengapa relevan di era AI-native","value":"mengapa-relevan-di-era-ai-native","line":41,"column":0,"depth":2},"hubungan-dengan-bmad":{"type":"header","text":"Hubungan dengan BMAD","value":"hubungan-dengan-bmad","line":51,"column":0,"depth":2},"kesalahan-umum":{"type":"header","text":"Kesalahan umum","value":"kesalahan-umum","line":60,"column":0,"depth":2},"kapan-spec-kit-pantas-dipakai":{"type":"header","text":"Kapan Spec Kit pantas dipakai","value":"kapan-spec-kit-pantas-dipakai","line":66,"column":0,"depth":2},"kapan-cukup-ambil-prinsipnya-saja":{"type":"header","text":"Kapan cukup ambil prinsipnya saja","value":"kapan-cukup-ambil-prinsipnya-saja","line":75,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":79,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"spec-kit-tetap-relevan-sebagai-pipeline-spesifikasi-meski-banyak-framework-ai-native-muncul\"\u003eSpec Kit tetap relevan sebagai pipeline spesifikasi meski banyak framework AI-native muncul\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#spec-kit-tetap-relevan-sebagai-pipeline-spesifikasi-meski-banyak-framework-ai-native-muncul\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eApa yang membuat Spec Kit relevan di tengah BMAD dan workflow AI-native lainnya?\u003c/li\u003e\n\u003cli\u003eDi mana titik tumpu Spec Kit dalam alur antara intent dan implementasi?\u003c/li\u003e\n\u003cli\u003eKapan Spec Kit pantas dipakai, dan kapan cukup mengambil prinsipnya saja?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSpec Kit masih relevan karena ia fokus pada satu problem yang tidak hilang dengan munculnya BMAD atau framework AI-native lain: AI perlu artefak spesifikasi yang cukup kuat agar tidak bekerja dari prompt mentah.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eSpesifikasi bukan sekadar dokumen. Ia adalah boundary operasional antara niat manusia dan aksi agent.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"apa-yang-spec-kit-tawarkan\"\u003eApa yang Spec Kit tawarkan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-yang-spec-kit-tawarkan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSpec Kit memberikan pipeline spesifikasi yang eksplisit dan terikat ke artefak:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003edefine — capture intent dan requirement,\u003c/li\u003e\n\u003cli\u003especify — buat boundary dan acceptance criteria,\u003c/li\u003e\n\u003cli\u003ekit — siapkan task-level artefak dan implementasi yang dapat dieksekusi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDalam praktiknya, ini setara dengan pipeline Constitution → Specify → Plan → Task → Implement yang membuat proses planning dan solutioning lebih konkret.\u003c/p\u003e\n\u003cp\u003eIni melengkapi AI-native engineering dengan prinsip yang sama: lawan vibe coding dengan struktur yang bisa dieksekusi.\u003c/p\u003e\n\u003ch2 id=\"mengapa-relevan-di-era-ai-native\"\u003eMengapa relevan di era AI-native\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-relevan-di-era-ai-native\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKarena kemampuan AI menulis kode tidak menghilangkan kebutuhan untuk:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emenjelaskan apa yang harus dibangun,\u003c/li\u003e\n\u003cli\u003emenetapkan batas eksekusi,\u003c/li\u003e\n\u003cli\u003ememecah pekerjaan menjadi artefak yang bisa diverifikasi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTanpa lapisan ini, AI cenderung mengisi celah dengan tebakan generik, drift dari tujuan, atau menghasilkan output yang plausible tetapi tidak tepat.\u003c/p\u003e\n\u003ch2 id=\"hubungan-dengan-bmad\"\u003eHubungan dengan BMAD\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-dengan-bmad\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eBMAD dan Spec Kit bukan dua pilihan yang saling eksklusif. Mereka berdiri di poros yang sama:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBMAD lebih kuat sebagai operating model dan fase workflow,\u003c/li\u003e\n\u003cli\u003eSpec Kit lebih kuat sebagai pipeline artefak spesifikasi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSpec Kit bisa dilihat sebagai salah satu cara untuk membuat fase planning dan solutioning BMAD lebih konkret dan terukur.\u003c/p\u003e\n\u003ch2 id=\"kesalahan-umum\"\u003eKesalahan umum\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kesalahan-umum\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMengira Spec Kit hanya untuk tim yang butuh dokumentasi berat.\u003c/li\u003e\n\u003cli\u003eMengira Spec Kit menandakan \"lebih banyak proses\" daripada yang diperlukan.\u003c/li\u003e\n\u003cli\u003eMengira Spec Kit kalah relevan karena \"BMAD sudah punya workflow.\" Faktanya, kunci yang sama—spesifikasi kuat—masih valid.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"kapan-spec-kit-pantas-dipakai\"\u003eKapan Spec Kit pantas dipakai\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-spec-kit-pantas-dipakai\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSpec Kit paling layak ketika:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003etask punya blast radius menengah sampai besar,\u003c/li\u003e\n\u003cli\u003eada banyak aspek cross-cutting (API, security, data schema),\u003c/li\u003e\n\u003cli\u003eoutput harus konsisten dengan artefak lain,\u003c/li\u003e\n\u003cli\u003eada beberapa agent atau orang yang perlu berbagi pemahaman.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"kapan-cukup-ambil-prinsipnya-saja\"\u003eKapan cukup ambil prinsipnya saja\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kapan-cukup-ambil-prinsipnya-saja\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSpec Kit bisa terlalu berat untuk task kecil, lokal, atau sangat jelas. Dalam situasi seperti itu, prinsipnya tetap berguna: tuliskan boundary yang cukup jelas, pilih artefak yang bisa diverifikasi, tapi jangan paksa pipeline penuh.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421161001\"\u003eAI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/a\u003e — AI-native adalah jargon strategi yang menandai asumsi desain AI sebagai fondasi, bukan sekadar fitur tambahan\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421162310\"\u003eAI-native Software Engineering memindahkan gravitasi kerja engineering ke orkestrasi dan verifikasi AI\u003c/a\u003e — AI-native Software Engineering memindahkan gravitasi kerja engineering ke orkestrasi dan verifikasi AI\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421192951\"\u003eSpec semakin penting ketika AI bisa menulis kode, bukan hanya karena kode lebih murah\u003c/a\u003e — Spec semakin penting ketika AI bisa menulis kode, bukan hanya karena kode lebih murah\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.moc.ai-native\"\u003eMOC AI-native engineering\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-native (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003espec (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003emethodology (Private)\u003c
