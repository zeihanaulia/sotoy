ps":{"note":{"id":"til.managing-team.oreily.critical-thinking-at-work","title":"Critical Thinking at Work","desc":"","updated":1682562686824,"created":1682560486525,"custom":{},"fname":"til.managing-team.oreily.critical-thinking-at-work","type":"note","vault":{"fsPath":"vault"},"contentHash":"42af5157b2203d69f08e874451b99654","links":[],"anchors":{"what-is-critical-thinking--actually":{"type":"header","text":"What Is Critical Thinking,  Actually?","value":"what-is-critical-thinking--actually","line":8,"column":0,"depth":2},"inti":{"type":"header","text":"Inti","value":"inti","line":12,"column":0,"depth":3},"transkrip":{"type":"header","text":"Transkrip","value":"transkrip","line":16,"column":0,"depth":3}},"children":[],"parent":"til.managing-team.oreily","data":{}},"body":"\u003ch1 id=\"critical-thinking-at-work\"\u003eCritical Thinking at Work\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#critical-thinking-at-work\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"what-is-critical-thinking--actually\"\u003eWhat Is Critical Thinking,  Actually?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#what-is-critical-thinking--actually\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eLink: \u003ca href=\"https://learning.oreilly.com/videos/critical-thinking-at/9781492028383/9781492028383-video318508/\"\u003ehttps://learning.oreilly.com/videos/critical-thinking-at/9781492028383/9781492028383-video318508/\u003c/a\u003e\u003c/p\u003e\n\u003ch3 id=\"inti\"\u003eInti\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#inti\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003etentang bagaimana pikiran kita cenderung lebih memilih hal-hal yang sederhana dan mudah diproses, dan bagaimana hal ini dapat memengaruhi keputusan kita dalam berbagai hal, termasuk dalam membeli barang atau dalam berpikir kritis. Penelitian juga menunjukkan bahwa membandingkan dua atau lebih hal adalah fitur yang diperlukan dalam berpikir kritis, tetapi pikiran kita cenderung untuk memilih opsi yang lebih sederhana dan terbatas. Pembicara merekomendasikan buku \"Predictably Irrational\" oleh Dan Ariely yang membahas cara-cara aneh yang kita gunakan dalam pengambilan keputusan dan bagaimana kita dapat menggunakan pengetahuan tentang cara kerja otak kita untuk membuat keputusan yang lebih baik.\u003c/p\u003e\n\u003ch3 id=\"transkrip\"\u003eTranskrip\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#transkrip\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003e50 tahun yang lalu, Hakim Mahkamah Agung, Potter Stewart, terkenal mengatakan tentang pornografi, \"Saya tidak bisa mendefinisikannya, tapi saya tahu ketika saya melihatnya.\" Nah, apakah kita berada dalam situasi yang sama dengan pemikiran kritis? Jika saya melihat atau memahami sebuah gagasan dari seseorang dan saya sangat menyukainya, saya bisa berkata, \"Wow, ya, itu pemikiran kritis.\" Di sisi lain, jika ada gagasan yang saya tidak peduli, yang dipegang oleh seseorang, apakah baik-baik saja bagi saya untuk berkata, \"Saya tidak suka itu. Itu tidak bisa dianggap pemikiran kritis.\" Saya tidak berpikir begitu.\u003c/p\u003e\n\u003cp\u003eItu bukan cara yang baik untuk memikirkan tentang pemikiran kritis karena itu hanya membawa kita pada bias kita sendiri. Dan kita tidak benar-benar belajar dengan cara itu. Jadi, ada kualitas struktural dalam pemikiran kritis. Dan saya ingin menggambarkannya sekarang. Sangat mudah seperti membandingkan dua objek atau dua gagasan. Jadi, saya berpikir tentang ponsel ini. Satu yang lebih baik daripada yang lain? Saya membandingkan keduanya.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230427092500.png\" alt=\"critical thingking is comparing\"\u003e\u003c/p\u003e\n\u003cp\u003eSaya menimbang opsi dari keduanya. Ini sesederhana itu, tetapi semenonjol itu karena dalam pertumbuhan pengetahuan dan sepanjang sejarah, kita memiliki segala jenis perbandingan. Jadi, apakah teori bahwa sel melakukan bunuh diri lebih baik daripada teori bahwa mereka hanya mati secara alami? Haruskah saya memilih Anna atau Mary? Apakah saya suka restoran A, B, atau C? Apakah teori string lebih mungkin daripada gravitasi loop kuantum? Sekarang lihat, saya tidak tahu apa-apa tentang gravitasi loop kuantum, tetapi saya bisa melihat bahwa orang-orang melakukan perbandingan semacam ini. Jadi, perbandingan adalah inti dari apa yang disebut pemikiran kritis.\u003c/p\u003e\n\u003cp\u003eJadi membandingkan, membandingkan apa saja - oke, apa saja? Bagaimana dengan selai? Sekarang jika saya dalam mode otomatis, alias kebiasaan, maka saya hanya akan memilih selai boysenberry ini. Ini akan seperti, \"Oh, itu yang saya dapatkan di pasar. Saya mengambilnya dari rak.\" Tetapi jika saya berpikir tentang - saya ingin selai baru dalam hidup saya. Maka saya akan melakukan beberapa pemikiran kritis. Dan saya akan membandingkan. Jadi begitulah cara kerjanya. Tetapi saya membawa selai kepada Anda karena ada kualitas yang sangat menarik tentang apa yang sering kita lakukan ketika kita berpikir secara kritis.\u003c/p\u003e\n\u003cp\u003eSeringkali, hanya dua hal yang kita bandingkan. Dan saya ingin memberikan Anda perasaan cepat tentang cara pikiran ingin mengecilkan alternatif. Ada sebuah studi selai yang sangat terkenal yang dilakukan, tetapi direplikasi di banyak area lain. Jadi juga terkait dengan hal lain, tentu saja, dalam hidup.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230427093005.png\" alt=\"why is often just two things\"\u003e\u003c/p\u003e\n\u003cp\u003eTetapi para peneliti ini melakukan penelitian dalam dua pengaturan yang berbeda. Pertama, pada suatu hari di pasar, mereka menampilkan 24 botol selai. Dan mereka meminta orang untuk mencoba, orang bisa mencicipi. Kemudian orang dapat membeli atau tidak membeli, dan sebagainya. Dalam kasus itu, 60% orang sebenarnya tertarik pada tampilan yang besar ini, tetapi hanya 3% yang membeli selai. Pada hari lain, para peneliti hanya menampilkan enam botol selai, lagi-lagi, mencicipi, tetapi 10 kali lebih banyak orang membeli selai. Dan mereka telah mereplikasi hal ini banyak kali. Ini sangat menarik. Saya pikir alasannya adalah bahwa pikiran kita hanya ingin menjaga segala sesuatu semudah mungkin. Kami agak kebanjiran jika ada lebih dari itu. Jadi jika perbandingan dengan berpikir kritis itu kompleks, kami cenderung mengurangi pilihan kami, bahkan dengan selai. Jadi, fitur yang diperlukan dari berpikir kritis adalah membandingkan dua atau mungkin lebih hal.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230427093110.png\" alt=\"book recommendation\"\u003e\u003c/p\u003e\n\u003cp\u003eJadi, saya ingin merekomendasikan buku ini oleh Dan Ariely yang berjudul Predictably Irrational. Dan di buku ini, dia banyak membahas beberapa cara aneh kita memutuskan. Aneh bahwa banyak orang tidak memutuskan dalam selai. Ada juga yang disebut anchoring. Jadi dalam studi ini, jika orang hanya diingatkan pada dua digit terakhir nomor keamanan sosial mereka, orang yang memiliki nomor keamanan sosial yang lebih tinggi - jika mereka hanya diingatkan pada itu - akhirnya mengatakan bahwa vas atau beberapa hal acak lainnya lebih berharga daripada orang yang memiliki nomor keamanan sosial yang lebih rendah.\u003c/p\u003e\n\u003cp\u003eSaya maksud, kita gila, tetapi kita gila dengan cara yang bisa diprediksi. Dan kita dapat menggunakan apa yang kita ketahui tentang berpikir kritis - menghubungkannya dengan ilmu otak - untuk membantu kita membuat keputusan yang lebih baik. Pikirkan sebentar. Apakah Anda membandingkan beberapa hal baru-baru ini di tempat kerja? Kami akan melihat alasan untuk segmen berikutnya.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"fi
