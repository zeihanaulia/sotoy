ps":{"note":{"id":"book-summaries.self-driving","title":"Self Driving","updated":1742029724968,"created":1646854981225,"tags":["Self Improvement","Rhenald Kasali"],"desc":null,"custom":{},"fname":"book-summaries.self-driving","type":"note","vault":{"fsPath":"vault"},"contentHash":"9b2cc4aa4f0d3c074834200c75cf79cc","links":[{"type":"frontmatterTag","from":{"fname":"book-summaries.self-driving","id":"book-summaries.self-driving","vaultName":"vault"},"value":"tags.Self Improvement","alias":"Self Improvement","xvault":false,"to":{"fname":"tags.Self Improvement"}},{"type":"frontmatterTag","from":{"fname":"book-summaries.self-driving","id":"book-summaries.self-driving","vaultName":"vault"},"value":"tags.Rhenald Kasali","alias":"Rhenald Kasali","xvault":false,"to":{"fname":"tags.Rhenald Kasali"}},{"type":"wiki","from":{"fname":"book-summaries.self-driving","id":"book-summaries.self-driving","vaultName":"vault"},"value":"tags.self-improvement","alias":"#self-improvement","position":{"start":{"line":2,"column":1,"offset":1},"end":{"line":2,"column":18,"offset":18},"indent":[]},"xvault":false,"to":{"fname":"tags.self-improvement"}},{"type":"wiki","from":{"fname":"book-summaries.self-driving","id":"book-summaries.self-driving","vaultName":"vault"},"value":"tags.rhenald-kasali","alias":"#rhenald-kasali","position":{"start":{"line":3,"column":1,"offset":19},"end":{"line":3,"column":16,"offset":34},"indent":[]},"xvault":false,"to":{"fname":"tags.rhenald-kasali"}}],"anchors":{"01-ini-soal-mandataris-kehidupan":{"type":"header","text":"01: Ini Soal Mandataris Kehidupan","value":"01-ini-soal-mandataris-kehidupan","line":45,"column":0,"depth":2},"02-manusia-berpikir":{"type":"header","text":"02: Manusia Berpikir","value":"02-manusia-berpikir","line":102,"column":0,"depth":2},"03-mengapa-kaum-muda-memilih-universitas":{"type":"header","text":"03: Mengapa Kaum Muda Memilih Universitas","value":"03-mengapa-kaum-muda-memilih-universitas","line":209,"column":0,"depth":2},"04-dua-jenis-penumpang-bad-and-good-passangers":{"type":"header","text":"04: Dua Jenis Penumpang: Bad And Good Passangers","value":"04-dua-jenis-penumpang-bad-and-good-passangers","line":258,"column":0,"depth":2},"05-dua-jenis-pengemudi-bad-and-good-drivers":{"type":"header","text":"05: Dua Jenis Pengemudi: Bad And Good Drivers","value":"05-dua-jenis-pengemudi-bad-and-good-drivers","line":291,"column":0,"depth":2},"06-self-dicipline":{"type":"header","text":"06: Self Dicipline","value":"06-self-dicipline","line":355,"column":0,"depth":2},"07-ambilah-resiko":{"type":"header","text":"07: Ambilah Resiko","value":"07-ambilah-resiko","line":356,"column":0,"depth":2},"08-play-to-win":{"type":"header","text":"08: Play to Win","value":"08-play-to-win","line":357,"column":0,"depth":2},"09-the-power-of-simplicity":{"type":"header","text":"09: The Power Of Simplicity","value":"09-the-power-of-simplicity","line":358,"column":0,"depth":2},"10-creative-thinking":{"type":"header","text":"10: Creative Thinking","value":"10-creative-thinking","line":359,"column":0,"depth":2},"11-critical-thinking":{"type":"header","text":"11: Critical Thinking","value":"11-critical-thinking","line":360,"column":0,"depth":2},"12-growth-mindset":{"type":"header","text":"12: Growth Mindset","value":"12-growth-mindset","line":361,"column":0,"depth":2},"13-epilog":{"type":"header","text":"13: Epilog","value":"13-epilog","line":362,"column":0,"depth":2}},"children":[],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"self-driving\"\u003eSelf Driving\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#self-driving\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #840000;\" href=\"/sotoy/notes/tags.self-improvement\"\u003e#self-improvement\u003c/a\u003e\n\u003ca class=\"color-tag\" style=\"--tag-color: #7b002c;\" href=\"/sotoy/notes/tags.rhenald-kasali\"\u003e#rhenald-kasali\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eBuku ini ditulis oleh Bapak Rhenald Kasali, Ph,D., Beliau adalah seorang guru besar FEUI, Praktisi Management dan Penulis Buku.\u003c/p\u003e\n\u003cp\u003eDunia usaha menghendaki manusia-manusia berkarakter driver yang berkompetensi, namun juga cekatan, gesit, berinisiatif dan kreatif.\nMasalahnya tanpa disadari kampus-kampus saat ini malah membentuk manusia-manusia menjadi passenger.\nKaum mudanya cenderung pandai namun outputnya adalah manusia-manusia penumpang.\nYang dimana fokus mereka hanyalah text book atau memindahkan pengetahuan dari buku ke kertas ujian.\nJadi pintar itu adalah pintar kertas dan sarjananya sangat mungkin menjadi sarjana kertas.\u003c/p\u003e\n\u003cp\u003eBerbeda dengan para TKI diluar negri (Hongkong, Jepang, Taiwan), mereke mungkin tidak bersekolah tinggi,\ntapi mereka dipaksa lingkungan untuk berpikir kritis menghadapi dunia baru yang sangat menuntut.\nMereka melatih kegesitan, belajar dari kehidupan.\u003c/p\u003e\n\u003cp\u003eDengan tuntuntan dan tantangan seperti itu akan mengasilkan manusia-manusia driver,tak ada waktu bagi mereka untuk diam.\nSeperti ucapan Syekh Mohammand Al-Mahtum yang membuat dasar-dasar perubahan di Dubai, dia berkata.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eKita ini seperti rusa di padang sabana yang dikelilingi harimau yang siap memangsa.\nKalau tidak bisa lari lebih kencang, maka kita akan menjadi mangsa mereka.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIntinya adalah tentang mengubah mentalitas dan ini bukan lah perubahan yang mudah.\u003c/p\u003e\n\u003cp\u003ePertanyaannya,\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBagaimana cara melatihnya?\u003c/li\u003e\n\u003cli\u003eSudah tepatkan cara-cara yang dilakukan oleh pusat pelatihan? (sekolah, universitas)\u003c/li\u003e\n\u003cli\u003eApakah dengan memberikan ilmu berupa pengatahuan manajerial mereka otomatis akan mendapatkan kompetensi?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003eOrang jujur itu mujur. Tetapi jujur dan disiplin seperti sekeping koin dengan dua sisi, saling melengkapi.\nKarena kejujuran harus menjadi komitmen dan komitment dibentuk oleh Self Discipline.\nInilah modeal dasar Self Driver\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIwan Setiawan, CEO PT Rintis Sejahtera\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"01-ini-soal-mandataris-kehidupan\"\u003e01: Ini Soal Mandataris Kehidupan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#01-ini-soal-mandataris-kehidupan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKita semua adalah pemeang mandat kehidupan. Sewaktu dilahirkan, Tuhan hanya bersabda, \"Inilah hidupmu\" setelah itu jelajahi sendiri.\nKarena suratnya dipegang orangtua lebih dulu, mereka ditugasi untuk memelihara dengan penuh kesungguhan.\nSetelah itu, suratnya pun dikembalikan dan pemegangnya bisa memilih untuk menjelajahi kehidupan itu engan penuh tantangan atau diam saja sebagai penumpang.\u003c/p\u003e\n\u003cp\u003eMenjelajahi kehidupan berarti bertarung menghadapi tantangan dan perubahan, seperti seorang pengendara yang tak bebas dari resiko.\nKadang ia tergores, berbenturan dengan kendaraan lain. Dan kalau kecelakaan dialah yang diadili, bukan penumpangnya.\nSebaliknya, untuk menjadi penumpang, Lo boleh mengantuk, tertidur, terdiam, tak perlu tahu arah jalan, bahkan tak perlu merawat kendaan sama sekali.\u003c/p\u003e\n\u003cp\u003eAda yang menggunakan surat mandat itu untuk tumbuh dan berkarya ada juga yang cuma menyimpan surat itu didalam sakunya sebagai dokumen pribadi.\nKedua duanya sama-sama mempunyai mandat, tapi keberadaannya berbeda. Dan tentu saja hidupnya berbeda.\nSebagian orang bilang nasib dan yang lain bilang ini adalah pergulatan hidup yang diawali dengan ada atau tidaknya kesadaran mandataris itu sendiri.\u003c/p\u003e\n\u003cp\u003eSesuatu yang ada pada diri lo, ya itulah kendaraan lo. Ia menjelma menjadi kekuatan mencipta, berkarya, berprestasi dan berkreasi.\nKita menyebutnya sebagai gabungan antara kompetensi (apa yang lo bisa), kecekatan dan perilaku.\u003c/p\u003e\n\u003cp\u003eKalo lo kuliah atau sertifikasi dan merasa dengan label-label itu akan membuat lo sukses, lo salah.\nJangan jual label-label itu, tapi jualah apa yang lo bisa lakuin. Tahu bukan berarti bisa.\u003c/p\u003e\n\u003cp\u003eJadilah driver, Driver adalah sebuah sikap hidup yang membedakan dirinya dari passenger.\nLo tinggal memilih, ingin duduk manis, menjadi penumpang dibelakang atau mengambl resiko sebagai driver di depan?\u003c/p\u003e\n\u003cp\u003eAda tiga hal yang harus dilakukan yaitu,\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMen-drive diri sendiri\u003c/li\u003e\n\u003cli\u003eMen-drive orang lain\u003c/li\u003e\n\u003cli\u003eMen-drive bangsa\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKalau lo tidak bisa men-drive diri lo sendiri, bagaimana lo bisa men-drive orang lain? dan berarti gak ada kepemimpinan dari diri lo.\u003c/p\u003e\n\u003cp\u003eSeorang driver bisa hidup dimana pun mereka berada dan selalu menumbuhkan harapan.\nMereka selalu mengajak orang untuk terus berkembang selalu melakukan pembaharuan.\nMereka berinisiatif memulai perubahan tanpa ada yang memerintahkan, namun tetap rendah hati dan kaya empati.\nSeorang driver harus seimbang antara logic (rasionalitas, hitung-hitungan, analisis dan targetnya) dengan hatinya (empati).\nMereka adalah orang tau arah dan resiko yang akan dihadapi.\nSedangkan passanger adalah orang orang yang terbelenggu dengan fix mindset.\u003c/p\u003e\n\u003cp\u003eKesadaran yang dibentuk oleh pengalaman dan pendidikan itulah maksud dari driver mentality.\nPendidikan diperlukan untuk memperbaiki cara berpikir dan cara menjalani hidup yang menantang.\nBelajar artinya berpikir. Kalo lo ambil pendidikan cuma buat menghapal, ya lo rugi sih.\nIPK lo gak akan ada artinya kalo lo gak bisa berpikir dan cuma manfaatin hapalan aja.\u003c/p\u003e\n\u003cp\u003eBerpikir juga gak ada batas waktunya, gak pernah berhenti cuma karena lo udah dapet ijasah.\nBagaimana lo bisa berpikir kalo lo gak berani ambil resiko?\nMenjadi driver sama dengan mengekspos diri lo terhadap resiko.\nTapi resiko itu hanya akan jadi masalah kalo lo ugal-ugalan.\u003c/p\u003e\n\u003cp\u003eKetika lo udah takut buat melakukan \"kesalahan\" kecil, lo akan masuk kedalam mentalitas penumpang.\nOrang-orang yang gak pernah melakukan kesalahan sesungguhnya adalah orang yang gak berbuat apa-apa.\u003c/p\u003e\n\u003cp\u003eTapi bisa gak sih, orang yang gak berpendidikan tinggi, punya mental driver?\nTentu bisa, tapi seorang driver tidak cukup hanya bermodalkan tekad dan semangat, lo butuh referensi dari pengetahuan akademis dan belajar dari orang lain.\nIntinya cara berpikir yang tepat adalah modal penting.\u003c/p\u003e\n\u003cp\u003ePersoalan perubahan yang dihadapi manusia bukanlah mengadopsi hal-hal baru, melainkan sulitnya membuang kebiasaan lama. - Albert Einstein.\u003c/p\u003e\n\u003ch2 id=\"02-manusia-berpikir\"\u003e02: Manusia Berpikir\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#02-manusia-berpikir\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMengambil kutipan dari George Bernarr Shaw,\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eHanya 2 persen dari orang orang berpikir, 2 persen berpikir kalo dia berpikir dan 95 persen memilih mati dari pada berpikir.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eApa yang terjadi dengan 95 persen itu?\nMereka terperangkapdalam mentalitas penumpang yang memilih menunggu ketimbang berinisiatif,\ngak merasa perlu mengeksplorasi jalan-jalan baru sehingga hanya tau jalan yang itu-itu saja,\ngak merasa perlu merawat kendaraan hidupnya, sehinga boleh mengantuk bahkan tertidur selama perjalanan karirnya yang mudah itu.\nMaksudnya autopilot.\u003c/p\u003e\n\u003cp\u003eDari sejumlah orang yang menekuni profesi tertentu. Hanya kurang dari 2% yang benar-benar serius dan mengembangkan dirinya.\nYang lain terperangkap dalam mentalitas penumpang yang memilih untuk menunggu.\u003c/p\u003e\n\u003cp\u003eSetiap manusia memiliki kendaraannya sediri. Pandangilah diri lo di cermin.\nJangan lihat sepotong-sepotong namun lihatlah seluruh tubuh lo dari ujung rambut hingga ujung jari.\nYa, itulah kendaraan lo. Dialah teman setia yang menemani diri lo kemanapun lo pergi. Dialah yang mengantarkan mimpi-mimpi lo sampai ketujuan.\u003c/p\u003e\n\u003cp\u003eSetiap orang memiliki kendaraan yang kita sebut dengan diri. Dan dalam diri itu terdapat mentalitas atau jowa pembawa diri itu.\nMaka itulah kita bisa membedaka kedalamdua kategori mental: mentalitas penumpang dan mentalitas pengemudi.\u003c/p\u003e\n\u003cp\u003eMenjadi pengemudi bukanlah sekedar menyetir dan memiliki surat izin.\nBanyak manajer memegang legalitas untuk memimpin tetapi tak banyak berbuat dalam posisinya itu.\nJabatan tinggi tapi belum tentu bisa disebut sebagai driver.\u003c/p\u003e\n\u003cp\u003eAkibat yang terjadi jika bermental penumpang.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eKurang kemandirian, cepat menyerah\u003c/li\u003e\n\u003cli\u003eDikendalikan oleh kehidupan \"rutin\" menjadi autopilot\u003c/li\u003e\n\u003cli\u003eMudah mengeluh dan bersungut-sungut sepanjang hidup\u003c/li\u003e\n\u003cli\u003eTidak tahu alternatif jalan keluar\u003c/li\u003e\n\u003cli\u003eMudah frustasi ketika suatu keadaan berubah tiba-tiba\u003c/li\u003e\n\u003cli\u003eKurang berhasil dalam karir dan usaha\u003c/li\u003e\n\u003cli\u003eMenjadi boros meski tujuannya berhemat.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePrinsip seorang diver adalah inisiatif, melayani, navigasi dan tanggung jawab.\nIa harus tau arah jalan dan cara memperbaiki serta merawat kendaraan.\nSadar bahwa sesuatu hanya akan menjadi lebih baik bila lo sendiri yang mengubahnya.\nLo adalah penentu masa depan, baik masa depan diri sendiri, keluarga maupun perusahaan tempat lo berada.\nDan lo juga penentu nasib bangsa. \u003c/p\u003e\n\u003cp\u003eKuncinya adalah berpikir, keluar dari sangkar emas.\u003c/p\u003e\n\u003cp\u003eMentalitas penumpang ditandai dengan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSudah puas dengan keadaan sekarang\u003c/li\u003e\n\u003cli\u003eTidak menyukai tantangan baru\u003c/li\u003e\n\u003cli\u003eMenyerahkan masalah kepada atasa atau orang lain\u003c/li\u003e\n\u003cli\u003eTakut menghadapi masalah\u003c/li\u003e\n\u003cli\u003eMenunggu perintah dan menjawab dengan kata \"siap\"\u003c/li\u003e\n\u003cli\u003eSangat mencintai jawaban atau kekuasannya\u003c/li\u003e\n\u003cli\u003eDikendalikan oleh autopilot\u003c/li\u003e\n\u003cli\u003eTerlalu membanggangkan apa yang telah dicapai\u003c/li\u003e\n\u003cli\u003eMenyandera organisasi sebagai alat untuk \"menumpang hidup\"\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMentalitas driver ditandai dengan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSangat tidak puas dengan keadaan sekarang\u003c/li\u003e\n\u003cli\u003eMenyukai tantangan-tantangan baru, mengeksplorasi peluang-peluang baru\u003c/li\u003e\n\u003cli\u003eMemecahkan masalah bersama, menginspirasi orang lain.\u003c/li\u003e\n\u003cli\u003eBerkerja dengan hati, mencintai semama, menjaga hubungan baik, memiliki kepedulian.\u003c/li\u003e\n\u003cli\u003eMemimpin dengan pertanyaan, memperbaiki cara berpikir penumpang-penumpangnya.\u003c/li\u003e\n\u003cli\u003eMemberikan arah jalan yang jelas, merangkul orang-orang yang berbeda paham dengannya\u003c/li\u003e\n\u003cli\u003eBerani melakukan kesalahan-kesalahan kecil dan mengambil resiko terukur.\u003c/li\u003e\n\u003cli\u003eSangat mencintai perubahan, namun rendah hati dan penuh empati\u003c/li\u003e\n\u003cli\u003eDikendalikan oleh creative thinking\u003c/li\u003e\n\u003cli\u003eSelalu belajar tentang hal-hal baru\u003c/li\u003e\n\u003cli\u003eMembebaskan para sandera dari penumpang yang membajak organisasi\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eUntuk menjadi seorang driver, maka diri lo sendiri yang menentukannya.\nLo sendiri yang mentukan mau terperangkap sebagai penumpang atau keluar sebagai pemimpin\u003c/p\u003e\n\u003cp\u003eSeorang driver melakukan investasi diri seperti layaknya seorang pengusaha.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDispilin diri\u003c/li\u003e\n\u003cli\u003eMenghadapi resiko\u003c/li\u003e\n\u003cli\u003eBermain untuk menang\u003c/li\u003e\n\u003cli\u003eKekuatan berpikir simple\u003c/li\u003e\n\u003cli\u003e2C critical \u0026#x26; creative thinking\u003c/li\u003e\n\u003cli\u003eMindset yang tumbuh\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSeorang driver tidak akan tumbuh hanya dengan kekuatan dari dirinya sendiri, tapi juga tumbuh dengan kekuatan orang lain.\nBantulah orang lain agar mereka juga berhasil.\u003c/p\u003e\n\u003cp\u003eSeorang driver bertugas membawa penumpang ke tempat tujuannya agar mampu meneruskan perjalanan berikutnya.\nSedangkan seorang passanger tidak memperdulikan orang orang disekitarnya.\u003c/p\u003e\n\u003cp\u003eSeorang driver mengambangkan orang lain dengan berbagai pendekatan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eGoal setting dan mengambil keputusan\u003c/li\u003e\n\u003cli\u003eMemimpin dengan hatinya\u003c/li\u003e\n\u003cli\u003eKekuatan memberi\u003c/li\u003e\n\u003cli\u003eLeadership 360 ke atas keawah dan kesamping\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKalo lo udah berhasi drive diri lo, drive orang lain, maka yang ketiga adalah drive organisasi lo.\nSeorang driver tidak membarkan organisasinya tidak tumbuh. Lo perlu memperbarui organisasi atau perusahaan lo menjadi perushaan yang tumbuh.\u003c/p\u003e\n\u003cp\u003eUntuk men-drive orgnisasi, seorang driver memerlukan.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBerpikir strategis\u003c/li\u003e\n\u003cli\u003eBerbagai teori klasik, konsep-konsep dasar dan pandangan baru.\u003c/li\u003e\n\u003cli\u003ePemahaman tentang competitiveness dan klaster yang didukung oleh pentingnya complementarity.\u003c/li\u003e\n\u003cli\u003eBerpkir perubahan dan adaptif\u003c/li\u003e\n\u003cli\u003eBerkerja dengan tata nilai dan etika\u003c/li\u003e\n\u003cli\u003eAgility\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"03-mengapa-kaum-muda-memilih-universitas\"\u003e03: Mengapa Kaum Muda Memilih Universitas\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#03-mengapa-kaum-muda-memilih-universitas\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSebagian orang menganggap perkembangan data orang yang masuk universitas makin banyak adalah sesuatu yang mengembirakan.\nBenarkah ini kabar gembira? Belum tentu, kenapa? karena banyak sekali sarjana pengangguran yang tidak siap dengan dunia kerja.\nPara orang tua mengirim anaknya ke universitas agar menjadi sarjana dan mereka berpikir dengan menjadi sarjana anak-anak itu otomatis telah berpikir.\nPada kenyataannya mereka hanya mendapat selembar ijasah dan tetap sulit berkerja.\u003c/p\u003e\n\u003cp\u003eMengapa para sarjana sulit memperoleh pekerjaan?\nKarena semasa menjalani pendidikan mereka tidak berpikir, hanya menghafal.\nPadahal yang dibutuhkan adalah keterampilan dalam memindahkan pikiran kedalam tindakan nyata.\nTindakan hanya bisa didapat melalui latihan yang nantinya tersimpan di mucle memory (myelin).\nSedangkan pengetahuan disimpan di brain memory, brain memory baru bisa berkembang jika manusia melatihnya.\nDan celakanya, mereka tidak mendapatkan ini dibangu kuliah.\u003c/p\u003e\n\u003cp\u003eApakah ada perusahaan tanpa driver? Bisa saja ada, dan gejalanya seperti ini:\u003c/p\u003e\n\u003cp\u003ePertama, Mereka tidak berani mengambil keputusan.\nSelalu ragu ragu dalam bertindak dan menunggu approval orang lain.\nPadalah orang itu sudah berada dipuncak jabatan.\u003c/p\u003e\n\u003cp\u003eKedua, Mereka selalu membutuhkan data.\nData diambil berulang ulang,\ntapi tidak ada rasa percaya diri sehingga organisasi lo berkerja mengumpulkan data terus menerus.\u003c/p\u003e\n\u003cp\u003eKetiga, Waktu berkerja dihabiskan oleh meeting.\nWaktunya gak jelas.\nDan ketika selesai rapat tidak ada keputusan atau masih bingung.\u003c/p\u003e\n\u003cp\u003eKeempat, Keputusan justru diambil oleh bawahan menjelang akhir,\ndan bawahan menjadi kurang bersemangat\nbahkan ragu ragu karena atasannya tidak memberi gambaran strategis\ndan menyatukan tindakan para bawahan yang bergerak sendiri sendiri\u003c/p\u003e\n\u003cp\u003eKelima, Perusahaan tidak mengalami kemajuan.\nTetapi atasan berada di dalam jabatannya dalam tempowaktu yang panjang.\nJabatan aman, tapi satu persatu lampu di tempat lo berkerja mulai redup dan tidak ada gantinya.\u003c/p\u003e\n\u003cp\u003eKeenam, Banyak masalah tapi tidak ada terobosan.\nSemua mencara aman.\nProgam sudah dibuat, tapi kegiatannya hanya rutin.\nKarena semuanya bersifat formalitas sehingga tidak ada terobosan.\u003c/p\u003e\n\u003cp\u003eKondisi seperti ini membutuhkan \"tentara pembebasan\". Siapa dia? dialah yang disebut driver.\nDia adalah seorang yang berpikir, membuat langkah kreatif juga kritis terhadap informasi dan fakta.\u003c/p\u003e\n\u003cp\u003eBagaimana cara menjadi driver yang menyenangkan dan penumpangnya bisa enjoy.\nLengkapi dan latih mereka agar menjadi jadi driver selanjutnya.\u003c/p\u003e\n\u003ch2 id=\"04-dua-jenis-penumpang-bad-and-good-passangers\"\u003e04: Dua Jenis Penumpang: Bad And Good Passangers\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#04-dua-jenis-penumpang-bad-and-good-passangers\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAda dua jenis penumpang, penumpang yang baik dan penumpang yang buruk.\u003c/p\u003e\n\u003cp\u003ePenulis melakukan action research bersama sejumlah psikolog yang biasa menangani karyawan bermasalah.\nOrang-orang bermasalah ini biasanya menyakitkan bagi orang-orang disekitarnya, termasuk bagi atasan-atasannya.\nKepimimpinannya buruk, prestasi rendah, kurang disukai rekan-rekan kerja, tetapi gak mau mengundurkan diri.\nDitambah lagi, perusahaa tempat mereka berkerja enggan mengambil tindakan apa-apa.\u003c/p\u003e\n\u003cp\u003eIni adalah gejala-gejala dari penumpang yang buruk.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003egemar menyalahkan orang lain\u003c/li\u003e\n\u003cli\u003emenjadi sangat agresif\u003c/li\u003e\n\u003cli\u003emudah jengkel\u003c/li\u003e\n\u003cli\u003ecepat dan sering mengeluh\u003c/li\u003e\n\u003cli\u003ehidup tak terarah\u003c/li\u003e\n\u003cli\u003eterlalu cepat menyerah\u003c/li\u003e\n\u003cli\u003epesimistis\u003c/li\u003e\n\u003cli\u003emudah menghasut orang lain untuk menjegal orang-orang baik\u003c/li\u003e\n\u003cli\u003epunya kecenderungan membalas dendam\u003c/li\u003e\n\u003cli\u003emenarik diri\u003c/li\u003e\n\u003cli\u003ehidup penuh kebencian\u003c/li\u003e\n\u003cli\u003etak ada passion\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePerusahaan atau organisasi yang sehat perlu dukungan dari pegawai-pegawainya.\nNamum, kalau pasukan yang dipimpinnya sudah berubah menjadi kumpulan orang-orang yang \"sakit hati\" dan punya banyak kepentingan dan luka batin\nmaka bisa jadi bukan perubahan positif yang didapat, melainkan bumerang.\u003c/p\u003e\n\u003cp\u003eBagaimana mengubah dari penumpang yang buruk menjadi penumpang baik? Ya, segera berubah.\u003c/p\u003e\n\u003cp\u003eBerubah artinya selalu dimulai dengan menerima realitas, berdamai dengan diri sendiri, menerima suma dengan lapang dada, introspeksi diri.\nMasalahnya hanya satu, Lo mau apa engga untuk berubah? Mustahil kita mendapatkan hasil yang berbeda dari tindakan yang sama berulang-ulang.\u003c/p\u003e\n\u003ch2 id=\"05-dua-jenis-pengemudi-bad-and-good-drivers\"\u003e05: Dua Jenis Pengemudi: Bad And Good Drivers\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#05-dua-jenis-pengemudi-bad-and-good-drivers\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDua jenis pengemudi: yang baik dan yang buruk.\u003c/p\u003e\n\u003cp\u003eJika mengambil perumpanaan sopir, Bad driver sama seperti sopir ugal-ugalan.\nIngatlah, the first class car membutuhkan the first class driver.\nPada setiap diri yang memiliki inteligensi yang tinggi, dibutuhkan pengemudi berkualitas tinggi pula.\nOrang-orang yang terlatih akan tahu menempatkan diri, kapan harus berbicara dan kapan harus mendengarkan.\nIa harus tahu pakan harus bergera maju dan kapan harus mundur.\u003c/p\u003e\n\u003cp\u003eMungkin lo banyak menemukan orang-orang hebat yang tidak berada ditempat yang tepat.\nIa adalah good driver, tetapi ia dikelilingi oleh teman-teman yang buruk, yang asal bicara, asal bertindak.\nMereka bergerak cepat, berinisiatif tinggi, tetapi selalu menumbulkan masalah.\nKata-katanya tidak dipikirkan sebelum diucapkan, niatnya belum tentu tulus.\u003c/p\u003e\n\u003cp\u003eOrang-orang yang kita sebut sebagai bad drivers akan lebih banyak mengambil energi kita,\nMengaak kita menngunakan tenaga untuk melakukan keributan-keributan ketimbang langkah langkah yang tepat.\nAkibatnya, reputasi kita perlahan0lahan tergerus, semakin terpuruk, semakin tidak dipercaya.\u003c/p\u003e\n\u003cp\u003eBad drivers adalah kumpulan orang-orang yang sakit hati, agresif, mudah tersulut kebencian,\ntak menentukan arah tindakannya, lebih mencari pembenaran ketimbang kebenaran\ndan senang membuat alasan-alasan untuk menutupi kekalahan atau kesalah-kesalahannya.\u003c/p\u003e\n\u003cp\u003eSopir ugal-ugalan ini akan membuat penumpang-penumpang baik belajar cara mengemudi kehidupan yang buruk.\nMereka akan menjadi orang yang mencari pembenaran dan senang memancing keributan.\nMereka hanya dapat dilibatkan kembali setelah lulus dari proses terapi diri,sebuah proses yang harus dimulai kembali.\nAtau melakukan self healing yang datang dari dalam diri sendiri.\u003c/p\u003e\n\u003cp\u003eLalu siapakah yang bisa disebut dengan good drivers?\u003c/p\u003e\n\u003cp\u003eGood diver adalah seorang inisiator, tokoh perubahan dan mampu menjadi role model bagi banyak orang. \u003c/p\u003e\n\u003cp\u003eLalu bagaimana cara menjadi good driver?\nBisa dengan latihan assertiveness /seni bertutur kata, menampilkan gerak-isyarat yang menunjukan ketegasan namun tetap bersahabat.\nLo dilatih untuk berbicara secara terbuka, menyampaikan unek-unek dan hak lo.\nNamun dengan seni yang tinggi lo bisa sampaikan tanpa merendahkan diri lo atau orang lain.\nMalah mereka dapat menerima dengan hormat karena lo menegurnya dengan cara halus, santun dan tidak menyakiti perasaannya.\u003c/p\u003e\n\u003cp\u003eIni bukan sekedar bahasa melaikan perasaan dan kedewasaan, kepercayaan diri, dan gesture. Melalui latihan itu lo dibangkitkan kesadaran diri (self awarenes).\nKemampuan bernegosiasi, mencaca isyarat, mengurangi agresivitas memperbaiki tone dan komunikasi.\u003c/p\u003e\n\u003cp\u003eLatihan selanjutnya adalah berfikir dalam kotak baru. \u003c/p\u003e\n\u003cp\u003eBefikir out of the box adalah latihan awal seorang passenger untuk menjadi seorang driver.\nIa harus memiliki kemampuan mencoba jalan jalan baru, keluar dari jalur-jalur utama, mengambil resiko tersesat tanpa harus melanggar hukum.\nMaka, ia pun mengenal peta besar, biasa melihat dari luar maupun dari dalam.\u003c/p\u003e\n\u003cp\u003eLalu apa itu berfikir dalam kotak baru?\u003c/p\u003e\n\u003cp\u003eKonsep ini diperkenalkan loleh Luc De Brabandere dan alan Iny pada tahun 2013.\nIni disebabkan oleh banyak hal yang telah ditemukan oleh manusia, sehingga ruang bagi lo untuk menemukan sesuatu yang bener-benar baru sangat terbatas.\nJadi yang dibutuhkan adalah cara baru dalam memandang segala hal yang sudah exist itu.\nMisalnya, Coba lo membayangkan seakan-akan perusahaan atau pemerintahan yang lo pimpim telah benar-benar lenyap. Mulailah dari awal.\u003c/p\u003e\n\u003cp\u003eBerpikir dengan cara-cara baru itu akan memudahkan seseorang berubah dari passanger menjadi driver.\nPandanglah dengan segala potensinya dengan cara-carabaru.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eSaya kasihan melihat anak-anak kita yang sesungguhnya bisa menjadi lebih hebat,\ntetapi kirang dipercaya orangtua.\nBerikan kepercayaan, tantangan dan dukungan, maka mereka dapat menjadi lebih hebat lagi.\nJangan kekang, hambat atau jadikan mereka passanger.\nTrihatma Kusuma Haliman - Fouunder Podomoro University\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"06-self-dicipline\"\u003e06: Self Dicipline\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#06-self-dicipline\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"07-ambilah-resiko\"\u003e07: Ambilah Resiko\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#07-ambilah-resiko\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"08-play-to-win\"\u003e08: Play to Win\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#08-play-to-win\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"09-the-power-of-simplicity\"\u003e09: The Power Of Simplicity\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#09-the-power-of-simplicity\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"10-creative-thinking\"\u003e10: Creative Thinking\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#10-creative-thinking\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"11-critical-thinking\"\u003e11: Critical Thinking\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#11-critical-thinking\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"12-growth-mindset\"\u003e12: Growth Mindset\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#12-growth-mindset\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch2 id=\"13-epilog\"\u003e13: Epilog\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#13-epilog\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePembentukan mental dan karakter semasa muda itu sangat menentukan.\nPembentukan mental itu mencangkup ketrampilan-keterampilan hidup dasar yang membentuk fondasi kepemimpinan seseorang,\nsekaligus fondasi ekonomi satu bangsa.\nMentalitas passenger pada dasarnya terbentuk karena kurang terlatihnya lif skills seseorang sehingga individu itummenjadi tidak cekatan dan terbelenggy.\nExecutive function dan self regulationnya tidak jalan.\nTerdapat indikasi kuat anak-anak muda sangat tidakfokus dalam berkerja.\nPikirannya bercabang-cabang, lambat laun mereka akan sangat mengandalkan corporate branding sehingga inisiatif mereka untuk mendatangi dan melaynikurang kuat.\nUmumnya punya ilmu, tetapi maaf \"malas\" menggunakan ilmu-ilmu yang mereka miliki untuk berpikir, menalisis, mencari penyebab dan memecahkan masalah-masalah yang dihadapi.\u003c/p\u003e\n\u003cp\u003eKalau tidak kita bentuk, maka mereka akan lebih banyak mengeluh karena semakin hari semakin terlihat tidak berkarya, lalu terancam berbagai sanksi.\nMulailah mereka merasa diperlakukan kurang adil karena gaji teman-temannya yang lebih muda naik lebih cepat, posisi para driver melonjak tinggi sementara mereka tetap dibawah.\nMenjadi compainer dan terlihat kumuh, kurang mampu membeli kesejahteraan dan kebahagiaan.\u003c/p\u003e\n\u003cp\u003eSetiap passenger bisa memlih, menjadi bad atau good atau sekalian menjadi bad driver.\nDan perusahaan ayau institusi pun punya piliham\"\nmemasukan mereka ke dalam lemari es atau melakukan transformasi.\u003c/p\u003e\n\u003cp\u003eKaum muda perlu dilatih tiga hal:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eworking memory (kemampuan menata informasi)\u003c/li\u003e\n\u003cli\u003einhibitory control (tahu dan tidak melakukan apa yang tidak boleh diucapkan /dilakukan) /pengendalian diri\u003c/li\u003e\n\u003cli\u003ecognitive flexiibility (kemampuan beradaptasi)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eKetiga hal itulah yang akan membentuk generasi emas yang bertanggung jawab dan produktif.\nMereka sedari dini perlu dibentuk untuk berkerja secara efektif, fokus, tahu dan berkerja dengan aturan, sikap positif terhadap oranglain, mengatasi ketidaknyamanan dan permintaan yang beragam, serta cara mengelola infirmasi yang datang bertubi tubi.\u003c/p\u003e\n\u003cp\u003eMemberikan tantangan pada kamumuda atau pegawai  itu penting. Bahkan, lebih pending dari sekadar pujian.\nTantangan yang dibasakan akan melatih working memory, fokus, dan cognitive flexibilitu seseorang.\nDan ini sangat menentukan kualias seseorang untuk menjadi driver atau passenger.\u003c/p\u003e\n\u003cp\u003eHidup yang indah adalah hidup yang bermanfaat, bermatabat dan tumbuh.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eJika anda ingin menaklukan rasa takut, jangan berpangku tangan didalam rumah dan diam didepannya.\nPergilah keluar, temui banyak orang dan buatlah diri anda sibuk.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDale carnegie\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #2c6fbb;\" href=\"/sotoy/notes/tags.self-improvement\"\u003eSelf Improvement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #d3494e;\" href=\"/sotoy/notes/tags.rhenald-kasali\"\u003eRhenald Kasali\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"creat
