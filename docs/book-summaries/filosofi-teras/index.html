omi-kendali":{"type":"header","text":"Dikotomi Kendali","value":"dikotomi-kendali","line":151,"column":0,"depth":3},"bab-5":{"type":"header","text":"Bab 5","value":"bab-5","line":185,"column":0,"depth":2},"mengendalikan-interpretasi-dan-persepsi":{"type":"header","text":"Mengendalikan Interpretasi dan Persepsi","value":"mengendalikan-interpretasi-dan-persepsi","line":186,"column":0,"depth":3}},"children":[],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"filosofi-teras\"\u003eFilosofi Teras\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#filosofi-teras\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #840000;\" href=\"/sotoy/notes/tags.self-improvement\"\u003e#self-improvement\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"kata-pengantar\"\u003eKata Pengantar\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kata-pengantar\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDitulis oleh A. Setyo Wibowo.\u003c/p\u003e\n\u003ch3 id=\"filsuf-dimedan-perang\"\u003eFilsuf dimedan perang\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#filsuf-dimedan-perang\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAda yang pernah menonton film gladiator?\u003c/p\u003e\n\u003cp\u003eAda makna yang bisa diambil dalam film gladiator. Dimana sang kaisar menang dalam peperangan tapi alih alih ikut berpesta, dia malah merenung. \u003c/p\u003e\n\u003cp\u003eDia merenung seperti ini,\u003c/p\u003e\n\u003cp\u003eApakah tindakanku tepat, apakah perang dengan korban begitu banyak memang diperlukan?\u003c/p\u003e\n\u003cp\u003eKaisar selalu mencatat perenungan-perenungan pribadinya. Karena tulisan tulisannya bagus, maka sempat dibukukan dengan judul meditations.\u003c/p\u003e\n\u003cp\u003eLewat latihan dan menuliskan setiap hari refleksi atas pengalamannya, Marcus Aurelius sang kaisar membangun jiwanya seperti benteng yang kokoh. Dia selalu berlatih memilah \"Apa yang tergantung padaku dan apa yang tidak tergantung padaku\" supaya terhindar dari penyakit jiwa yaitu emosi negatif.\u003c/p\u003e\n\u003cp\u003eSelain itu Marcus Aurelius mempraktekan kategori yang paling sulit dalam filsafat stoa, yaitu kathekonta, kewajiban yang tidak wajib tapi layak dilakukan.\u003c/p\u003e\n\u003ch3 id=\"filsafat-stoa-masih-relevan\"\u003eFilsafat stoa masih relevan?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#filsafat-stoa-masih-relevan\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eMasih, filsafat stoa adalah jalan hidup. Loh, bukannya ada agama? Ya, apa salahnya sih beragama sambil belajar filsafat? Supaya cara beragama kita makin mantap.\u003c/p\u003e\n\u003cp\u003eKisah james stockdale, seorang tawanan perang yang disiksa sangat parah sekali, tapi dia bisa bertahan hingga akhirnya bisa bebas. Stockdale mengamalkan / mengingat pemikiran epiktos yang isinya.\u003c/p\u003e\n\u003cp\u003eA. Pembedaan apa yang tergantung pada kita dan apa yang tidak tergantung pada kita\nB. Soal baik atau buruk itu tergantung cara jiwa menyelesaikannya.\nC. Segala situasi buruk yang menimpa kita bersifat indifferent atau netral saja.\u003c/p\u003e\n\u003cp\u003ePada tahun 1990an berkembang sebuah metode psikokogi poluler bernama \"terapi kognitif\" katanya ini terinspirasi dari buddha dan epiktos yang intinya:\u003c/p\u003e\n\u003cp\u003eTerapi kognitif meyatakan bahwa segala emosi yang mengganggu kita sebenarnya berasal dari cara penilaian yang salah.\nCara berpikir yang salah menyebabkan munculnya simtom-simtom yang   menggangu.\nCara pandang kita yang keliru dalam hidup menyebabkan kita stress, gelisah, depresi atau marah marah dengan alasan yang tidak jelas.\u003c/p\u003e\n\u003ch2 id=\"bab-1\"\u003eBab 1\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bab-1\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"survey-khawatir-nasional\"\u003eSurvey Khawatir Nasional\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#survey-khawatir-nasional\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDi bab ini penulis membuat survey kekhawatiran yang diisi oleh 3000an responden. Dan hasilnya semua merasa khawatir. Tidak ada yang tidak khawatir.\u003c/p\u003e\n\u003cp\u003eMaka kalo gitu kenapa kita harus khawatir tentang khawatir sih?\u003c/p\u003e\n\u003cp\u003eKhawatir itu ada biayanya loh\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eMenghabiskan energi dan pikiran.\u003c/li\u003e\n\u003cli\u003eMenghabiskan waktu dan juga uang\u003c/li\u003e\n\u003cli\u003eMenggangu kesehatan tubuh\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eMasih banyak orang yang memisahkan kesehatan pikiran dan tubuh, seolah olah yang ada dipikiran tidak mempengaruhi kesehatan tubuh kita.\u003c/p\u003e\n\u003cp\u003eDi bab ini ada wawancara dengan dokter Andri SpKj FAPM seorang spesialis kesehatan jiwa, yang akan membahas topik ini.\u003c/p\u003e\n\u003ch4 id=\"jadi-bagaimana-sih-stres-bisa-merusak-kesehatan-tubuh-kita\"\u003eJadi, bagaimana sih stres bisa merusak kesehatan tubuh kita?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#jadi-bagaimana-sih-stres-bisa-merusak-kesehatan-tubuh-kita\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eAda kutipan kalimat dari hans seyle\u003c/p\u003e\n\u003cp\u003e\"Bukan stres yang membunuh kita, tapi reaksi kita terhadapnya\" - hans seyle.\u003c/p\u003e\n\u003cp\u003ePersepsi kita lah yang membuatnya, misalnya stres karena macet atau karena hutang. Khawatir seperti ini dalam jangka panjang akan menyebabkan tubuh mengeluarkan zat kortisol. Zat ini bersifat oksidatif, merusak apapun didalam tubuh kita. Jika dia menempel di pankreas, dia akan meningkatkan insulin. Yang menyebabkan kita, bawaannya ingin makan terus. Badan memanggil manggil karena badan kita merasa kalau dia sedang membutuhkan banyak energi.\u003c/p\u003e\n\u003cp\u003eDokter Andri selalu berpesan kepada pasiennya, jangan stres lama lama karena jika sudah akut lo gak akan bisa membedakan lagi kondisi stress dan tidak, karena sudah terbiasa hidup dalam stres.  Badan akan merespon hal yang lo tidak tau kalau lo sedang stres. Contohnya penyakit dispesia atau gangguan lambung. Dalam jangka panjang bisa kena penyakit jantung, diabetes dan hipertensi.\u003c/p\u003e\n\u003ch4 id=\"apa-bedanya-takut-khawatircemas-dan-stres\"\u003eApa bedanya takut, khawatir/cemas dan stres?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-bedanya-takut-khawatircemas-dan-stres\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKalau takut, lo tau apa yang lo takuti.\nMisal, takut setan atau takut berkelahi.\u003c/p\u003e\n\u003cp\u003eKalau cemas, gak jelas penyebabnya. Orang menjadi cemas karena tidak bisa mengendalikan hidup disituasi ketidak pastian.\u003c/p\u003e\n\u003cp\u003eKalau stres, artinya tekanan atau sesuatu yabg menggangu keseimbangan hidup kita. Ada stres fisik dan psikis.\u003c/p\u003e\n\u003cp\u003eKalau fisik itu contohnya habis olah raga, kecapean. Kalau mental, lo merasa kelelahan diperkerjaan atau lingkungan. Dan ini ada sumbernya.\u003c/p\u003e\n\u003cp\u003eKalau stresnya terus meningkat dan sudah tidak tau stressnya dari mana. Itu artinya lo sudah masuk fase cemas. Kalau dibiarkan akan menjadi depresi.\u003c/p\u003e\n\u003cp\u003eAda dua gejala penting depresi,\nPertama mood yang sedih dan yang kedua putus asa, tidak ada harapan, merasa hidupnya kok gini gini aja.\u003c/p\u003e\n\u003cp\u003eMakannya, kalo ada temen lo yang suka merasa \"hidup gw kok gini gini aja ya\" bisa jadi dia udah mengalami gejala awal depresi. Karena apa yang terucap bisa jadi memang refleksi dari hidup dia.\u003c/p\u003e\n\u003ch4 id=\"apa-pesan-untuk-pembaca\"\u003eApa pesan untuk pembaca?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-pesan-untuk-pembaca\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eCoba kenali sumber stressnya. Kalau kita bisa mengenali sumbernya, maka kita bisa melawannya.\u003c/p\u003e\n\u003cp\u003eCatat hal hal dalam hidup yang bisa atau membuat lo bahagia. Lalu lakukan aktivitas yang membahagiakan itu.\u003c/p\u003e\n\u003ch2 id=\"bab-2\"\u003eBab 2\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bab-2\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"the-problem-with-positive-thinking\"\u003eThe problem with positive thinking\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-problem-with-positive-thinking\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003ePerkembangan terakhir ilmu psikologi justru menemukan adanya masalah dengan anjiran berfikir positif. Artikel \"The problem with positive thinkkng\" menyebutkan bahwa justru sering menghambat kita.\u003c/p\u003e\n\u003cp\u003ePositive Thinking menipu pikiran kita, bahwa seolah olah kita sudah mencapai apa yabg kita inginkan, sehingga melemahkan keuletan kita untuk mencapainya. Tapi, nyuruh orang buat berpikir relaistis aja juga gak membantu sih.\u003c/p\u003e\n\u003cp\u003ePenulis artikel tersebut mengusulkan istilah \"mental contasing\" yaitu menggabungkan positive thiking atau membayangkan hasil yang diharapkan telah dicapai dengan memikirkan hambatan apa saja yang akan mereka temui.\u003c/p\u003e\n\u003ch3 id=\"filosofi-teras-1\"\u003eFilosofi Teras\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#filosofi-teras-1\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKenapa namanya filosofi teras, karena dijaman itu para filsuf mengajarkan filosofi di teras atau stoa bahasa yunaninya. Dijaman itu disebutnya stoisism tapi karena banyak orang indonesia sulit menyebutnya maka diterjmahkan menjadi filosofi teras.\u003c/p\u003e\n\u003cp\u003eDi bab ini juga penulis sedikit bercerita dampak dari filosofi teras. Setelag dia pelajari dan amalkan, hidupnya mebjadi lebih tenang. Tidak lagi terganggu hal hal negatif, kesialan, tekanan pekerjaan sampai orang orang toxic disekitar kita. \u003c/p\u003e\n\u003cp\u003ePenulis juga merasa filosofi teras bisa kompatible dan sebagai tambahan dengan berbagai kepercayaan atau agama.\u003c/p\u003e\n\u003ch4 id=\"apa-tujuan-utama-dari-filosofi-teras\"\u003eApa tujuan utama dari filosofi teras\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-tujuan-utama-dari-filosofi-teras\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003col\u003e\n\u003cli\u003eHidup bebas dari emosi negatif, mendapatkan hidup tentram. Ketentraman ini hanya bisa diperoleh dengan memfokuskan diri pada hal hal yang bisa kita kendalikan.\u003c/li\u003e\n\u003cli\u003eHidup mengasah kebajikan. Ada empat kebajikan:\na. Kebijaksanaan: kemampuan mengambil keputusan terbaik dalam situasi apapun.\nb. Keadilan: memperlakukan orang lain dengan adil dan jujur\nc. Keberanian: keneranian berbuat yang benar, berani berpegang prinsip kepada yang benar.\nd. Menahan Diri: disiplin, kesederhanaan, kepantasan dan kontrol diri.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch4 id=\"kenapa-stoisisme-bisa-tetap-relevan\"\u003eKenapa stoisisme bisa tetap relevan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kenapa-stoisisme-bisa-tetap-relevan\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eKare Andreson menyebutkan dalam bukunya \"Why stoicism matter today\"\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eDitulis untuk menghadapi masa sulit\u003c/li\u003e\n\u003cli\u003eDibuat untuk globalisasi\u003c/li\u003e\n\u003cli\u003eFilsafat kepemimpinan\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"bab-3\"\u003eBab 3\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bab-3\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"hidup-selaras-dengan-alam\"\u003eHidup selaras dengan alam\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hidup-selaras-dengan-alam\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSalah satu prinsip utama stoisme adalah kita harus hidup berselaras dengan alam. Maksudnya alam atau nature disini adalah kemampuan alami manusia yang memiliki nalar, akal sehat rasio dan kemampuan untuk hidup berkebajikan.\u003c/p\u003e\n\u003cp\u003eManusia yang hidup berselaras dengan alam adalah manusia yang hidup sesuai desainnya, yaitu manusia yang bernalar.\u003c/p\u003e\n\u003cp\u003eKetika kita tidak menggunakan nalar, kita menjadi rentan merasa tidak bahagia. Karena kita tidak selaras dengan alam, bayangkan singa yang seharusnya dipadang savana tapi kini ia harus ada diruangan kecil dikebun binatang.\u003c/p\u003e\n\u003cp\u003eContoh ketika kita kehilangan nalar,\u003c/p\u003e\n\u003cp\u003eKita baca postingan di media sosial yang bernada provokatif dan langsung emosi. Marah marah dibagian komen, memfoward tanpa mencari tau sebenarnya.\u003c/p\u003e\n\u003cp\u003eKalau lo pernah ada diposisi itu, coba pikir lagi deh. Apakah semua tindakan tadi membawa hasil positif?\u003c/p\u003e\n\u003cp\u003eSebisa mungkin disetiap situasi hidup kita tidak kehilangam nalar kita dan berlaku seperti binatang dan akhirnya berujung pada ketidak bahagiaan.\u003c/p\u003e\n\u003ch2 id=\"bab-4\"\u003eBab 4\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bab-4\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"dikotomi-kendali\"\u003eDikotomi Kendali\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#dikotomi-kendali\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAda hal-hal yang dibawah kendali kita dan ada juga yang tidak.\u003c/p\u003e\n\u003cp\u003eContoh yang tidak dibawah kendali kita.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eOpini orang lain\u003c/li\u003e\n\u003cli\u003eReputasi\u003c/li\u003e\n\u003cli\u003eKesehatan\u003c/li\u003e\n\u003cli\u003eKekayaan\u003c/li\u003e\n\u003cli\u003eKondisi saat lahir\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eKalo yang ada dibawah kendali kita itu, contohnya\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003ePertimbangan, opini pribadi atau persepsi kita\u003c/li\u003e\n\u003cli\u003eKeinginan kita\u003c/li\u003e\n\u003cli\u003eTujuan kita\u003c/li\u003e\n\u003cli\u003ePikiran dan tindakan kita sendiri\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eHal-hal dibawah kendali kita itu bersifat merdeka, tidak terikat, tidak terhambat. Sebaliknya yang tidak dalam kendali kita bersifat lemah, terikat dan milik orang lain.\u003c/p\u003e\n\u003cp\u003eYa lo siap siap kecewa aja kalo lo terobsesi dengan apa yang tidak ada dibawah kendali lo.\nlogak perlu ambil pusing dan khawatir dari perbuatan atau opini orang lain, apa lagi sampai lo menyesali dilahirkan oleh orang tua lo.\u003c/p\u003e\n\u003cp\u003eStoa mengajarkan, kebahagiaan sejati cuma bisa datang dari apa yang bisa lo kendalikan. Lo gak bisa tuh menggantukan kebahagiaan lo dari orang lain atau yang tidak bisa lo kendalikan.\u003c/p\u003e\n\u003cp\u003eKalau gitu apa stoisme mengajarkan untuk pasrah pada keadaan?\u003c/p\u003e\n\u003cp\u003eSama sekali tidak, Di semua situasi bahkan pada saat kita tidak ada dalam kendali pun, selalu ada bagian dalam dari diri kita yang tetap merdeka, yaitu pikiran dan persepsi.\u003c/p\u003e\n\u003cp\u003eLo bisa aja dalam kondisi terburuk seperti kisah james stockdale yang menjadi tawanan selama lebih dari tujuh tahun, dimana teman temanya sudah menyerah dan akhirnya mati. james memilih cara lain untuk tetap bertahan hidup hingga akhirnya dia bisa diselamatkan.\u003c/p\u003e\n\u003cp\u003eManusia tidak memiliki kuasa untuk memiliki apapun, tapi dia memiliki kuasa untuk tidak mengingini apa yang dia belum miliki dan dengan gembira memaksimalkan apa yang dia terima.\u003c/p\u003e\n\u003ch2 id=\"bab-5\"\u003eBab 5\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bab-5\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"mengendalikan-interpretasi-dan-persepsi\"\u003eMengendalikan Interpretasi dan Persepsi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengendalikan-interpretasi-dan-persepsi\"\u003e\u003c/a\u003e\u003c/h3\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncwhf8qpuaoz764uzfn","y8jzdhjhhmqub1t9wx5w9e4","ff8zp75qbznut6joziqr1nx"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"ve
