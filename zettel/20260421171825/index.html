"value":"technical-research","line":47,"column":0,"depth":3},"product-brief--prfaq":{"type":"header","text":"Product Brief / PRFAQ","value":"product-brief--prfaq","line":53,"column":0,"depth":3},"hasilnya":{"type":"header","text":"Hasilnya","value":"hasilnya","line":59,"column":0,"depth":2},"lihat-juga":{"type":"header","text":"Lihat juga","value":"lihat-juga","line":70,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"simulasi-bmad-analysis-phase-invoice-app-untuk-freelancer\"\u003eSimulasi BMAD analysis phase: invoice app untuk freelancer\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#simulasi-bmad-analysis-phase-invoice-app-untuk-freelancer\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"pertanyaan-yang-dibuka\"\u003ePertanyaan yang dibuka\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#pertanyaan-yang-dibuka\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003eBagaimana BMAD analysis phase bekerja pada contoh ide invoice app?\u003c/li\u003e\n\u003cli\u003eApa yang berubah setelah brainstorming dan research?\u003c/li\u003e\n\u003cli\u003eBagaimana Product Brief atau PRFAQ menajamkan konsep tersebut?\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"klaim-utama\"\u003eKlaim utama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#klaim-utama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSimulasi BMAD analysis phase menunjukkan bahwa fase ini bukan tentang menunda pengerjaan. Ia adalah proses peningkatan kualitas ide sehingga implementasi berikutnya tidak tersesat.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eIde \"invoice app\" berubah menjadi konsep yang jauh lebih jelas: bukan sekadar bikin invoice, tapi membantu freelancer mengelola keterlambatan pembayaran dan cashflow.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"langkah-langkah-dalam-simulasi\"\u003eLangkah-langkah dalam simulasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#langkah-langkah-dalam-simulasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"brainstorming\"\u003eBrainstorming\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#brainstorming\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eBMAD tidak langsung memproduksi daftar fitur. Ia mengajak Anda menjawab pertanyaan: freelancer mana yang dilayani? apakah masalah utama adalah pembuatan invoice atau penagihan? apakah klien sering menunda atau lupa membayar?\u003c/p\u003e\n\u003cp\u003eDari sini, fokus bisa bergeser dari \"invoice app umum\" ke \"accounts receivable assistant untuk freelancer.\" Perubahan ini sangat penting karena memengaruhi seluruh struktur produk.\u003c/p\u003e\n\u003ch3 id=\"market-research\"\u003eMarket Research\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#market-research\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDi sini BMAD memeriksa apakah ruang ini sudah ramai dan dimana celah kompetitifnya. Jika pasar invoice untuk freelancer sudah berat, nilai potensial bisa bergeser ke fitur follow-up pembayaran atau visibilitas cashflow.\u003c/p\u003e\n\u003cp\u003eMarket research membantu menghindari building-in-a-bubble.\u003c/p\u003e\n\u003ch3 id=\"domain-research\"\u003eDomain Research\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#domain-research\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eUntuk freelancer, domainnya bisa berbeda tergantung jenis pekerjaan dan lokasi. BMAD akan membantu memahami apakah ada kebutuhan spesifik seperti format invoice lokal, proses penagihan, atau aturan pajak.\u003c/p\u003e\n\u003cp\u003eIni memastikan solusi tidak sekadar teknis, tetapi relevan dengan cara dunia freelancing bekerja.\u003c/p\u003e\n\u003ch3 id=\"technical-research\"\u003eTechnical Research\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#technical-research\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika fitur pembeda adalah follow-up WhatsApp otomatis, technical research menguji apakah itu feasible. Biaya, provider, dan regulasi harus dipertimbangkan. Jika tidak layak, ide itu perlu disesuaikan.\u003c/p\u003e\n\u003cp\u003eIni mencegah planning turun ke solutioning tanpa basis teknis.\u003c/p\u003e\n\u003ch3 id=\"product-brief--prfaq\"\u003eProduct Brief / PRFAQ\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#product-brief--prfaq\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika Anda menggunakan Product Brief, Anda bakal merumuskan target user dan nilai inti: freelancer yang butuh cashflow visibility tanpa software akuntansi berat.\u003c/p\u003e\n\u003cp\u003eJika Anda menggunakan PRFAQ, ide tersebut akan diuji lebih keras: mengapa pengguna mau pakai? apakah notifikasi follow-up tidak mengganggu? apakah ini cukup berbeda dari invoice software lain?\u003c/p\u003e\n\u003ch2 id=\"hasilnya\"\u003eHasilnya\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hasilnya\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSetelah analysis phase, Anda seharusnya keluar dengan gagasan yang lebih terarah:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003efokus masalah yang jelas,\u003c/li\u003e\n\u003cli\u003enilai proposisi terdiferensiasi,\u003c/li\u003e\n\u003cli\u003easumsi pasar dan teknis yang dievaluasi,\u003c/li\u003e\n\u003cli\u003ebatas awal yang membuat PRD bisa dibangun dengan lebih aman.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eJika analysis gagal, Anda tetap mendapat sinyal untuk mengoreksi ide sebelum memasukkan ke PRD.\u003c/p\u003e\n\u003ch2 id=\"lihat-juga\"\u003eLihat juga\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#lihat-juga\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171457\"\u003eBMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/a\u003e — BMAD analysis phase menghentikan ketidakjelasan sebelum berubah jadi PRD dan architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171633\"\u003eBMAD brainstorming memperjelas ide sebelum requirement\u003c/a\u003e — BMAD brainstorming memperjelas ide sebelum requirement\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421173600\"\u003eSimulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/a\u003e — simulasi BMAD brainstorming: dari keresahan tim kecil AI coding tools ke problem definition\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171634\"\u003eBMAD market research menangkap realitas eksternal sebelum planning\u003c/a\u003e — BMAD market research menangkap realitas eksternal sebelum planning\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171635\"\u003eBMAD domain research memaksa pemahaman logika industri sebelum solusi\u003c/a\u003e — BMAD domain research memaksa pemahaman logika industri sebelum solusi\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171636\"\u003eBMAD technical research memvalidasi feasibility sebelum architecture\u003c/a\u003e — BMAD technical research memvalidasi feasibility sebelum architecture\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171637\"\u003eBMAD product brief merapikan visi produk sebelum PRD\u003c/a\u003e — BMAD product brief merapikan visi produk sebelum PRD\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.20260421171638\"\u003eBMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/a\u003e — BMAD PRFAQ menguji ide dengan pendekatan adversarial sebelum planning\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendro
