n":{"start":{"line":25,"column":20,"offset":1279},"end":{"line":25,"column":43,"offset":1302},"indent":[]},"value":"zettel.202604170003"},{"from":{"fname":"zettel.literature.building-a-second-brain","id":"zettel.literature.building-a-second-brain","vaultName":"vault"},"type":"backlink","position":{"start":{"line":40,"column":18,"offset":1783},"end":{"line":40,"column":41,"offset":1806},"indent":[]},"value":"zettel.202604170003"},{"from":{"fname":"zettel.literature.building-a-second-brain","id":"zettel.literature.building-a-second-brain","vaultName":"vault"},"type":"backlink","position":{"start":{"line":48,"column":3,"offset":2035},"end":{"line":48,"column":26,"offset":2058},"indent":[]},"value":"zettel.202604170003"},{"from":{"fname":"zettel.moc.personal-knowledge-management","id":"zettel.moc.personal-knowledge-management","vaultName":"vault"},"type":"backlink","position":{"start":{"line":12,"column":3,"offset":461},"end":{"line":12,"column":26,"offset":484},"indent":[]},"value":"zettel.202604170003"},{"from":{"fname":"zettel.moc.personal-knowledge-management","id":"zettel.moc.personal-knowledge-management","vaultName":"vault"},"type":"backlink","position":{"start":{"line":26,"column":3,"offset":985},"end":{"line":26,"column":26,"offset":1008},"indent":[]},"value":"zettel.202604170003"}],"anchors":{"gagasan":{"type":"header","text":"Gagasan","value":"gagasan","line":14,"column":0,"depth":2},"mengapa-ini-penting":{"type":"header","text":"Mengapa Ini Penting","value":"mengapa-ini-penting","line":24,"column":0,"depth":2},"hubungan-ke-zettel-lain":{"type":"header","text":"Hubungan ke Zettel Lain","value":"hubungan-ke-zettel-lain","line":33,"column":0,"depth":2},"sumber":{"type":"header","text":"Sumber","value":"sumber","line":39,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"koneksi-antar-gagasan-lebih-bernilai-dari-koleksi-informasi\"\u003eKoneksi antar gagasan lebih bernilai dari koleksi informasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#koneksi-antar-gagasan-lebih-bernilai-dari-koleksi-informasi\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eNilai dari sistem pencatatan bukan di \u003cem\u003eberapa banyak\u003c/em\u003e yang disimpan, tapi di \u003cem\u003eberapa banyak hubungan\u003c/em\u003e yang tercipta antar unit pengetahuan.\u003c/p\u003e\n\u003cp\u003eIni berlawanan dengan intuisi kebanyakan orang. Kita cenderung mengumpulkan: lebih banyak highlight, lebih banyak bookmark, lebih banyak catatan. Tapi koleksi tanpa koneksi hanya menghasilkan \u003cem\u003ekuburan informasi\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003eLuhmann menulis: \u003cem\u003e\"It is not important where you place a new note as long as you can link to it.\"\u003c/em\u003e Artinya, posisi fisik (atau hierarki folder) tidak penting — yang penting adalah \u003cstrong\u003ekemampuan menghubungkan\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eInsight baru adalah produk dari koneksi yang \u003cem\u003etidak diharapkan\u003c/em\u003e: ketika gagasan dari domain A tiba-tiba relevan dengan masalah di domain B.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDalam praktik sehari-hari, ini berarti:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJangan hanya menyimpan — \u003cstrong\u003ehubungkan\u003c/strong\u003e setiap Zettel baru ke yang sudah ada\u003c/li\u003e\n\u003cli\u003eSaat membuat link, \u003cstrong\u003ejelaskan mengapa\u003c/strong\u003e link itu dibuat (bukan sekadar taruh link)\u003c/li\u003e\n\u003cli\u003eSemakin banyak koneksi yang dibuat dengan \u003cem\u003esadar\u003c/em\u003e, semakin kaya jaring pengetahuanmu\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni juga menjelaskan mengapa Wikipedia bukan Zettelkasten — Wikipedia menghubungkan \u003cem\u003eartikel\u003c/em\u003e, bukan \u003cem\u003egagasan\u003c/em\u003e.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eDikuatkan oleh \u003ca href=\"/sotoy/notes/zettel.202604170001\"\u003eSecond brain memperluas kapasitas berpikir dengan memindahkan beban memori ke sistem eksternal\u003c/a\u003e — karena second brain hanya berguna kalau isinya saling terhubung, bukan hanya bertumpuk\u003c/li\u003e\n\u003cli\u003eDikuatkan oleh \u003ca href=\"/sotoy/notes/zettel.202604170002\"\u003eIde yang tidak ditulis sama dengan ide yang tidak ada\u003c/a\u003e — karena ide yang tidak ditulis tidak bisa terhubung sama sekali\u003c/li\u003e\n\u003cli\u003eKeduanya membentuk dasar dari seluruh praktik Zettelkasten: \u003cstrong\u003etulis → hubungkan → temukan insight baru\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.building-a-second-brain\"\u003eLiterature Note — Building a Second Brain\u003c/a\u003e — Bab 3 tentang \"commonplace book\" dan jaringan ide\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://zettelkasten.de/introduction/\"\u003eIntroduction to the Zettelkasten Method\u003c/a\u003e — bagian \"Connecting Zettel\"\u003c/li\u003e\n\u003cli\u003eNiklas Luhmann, \u003cem\u003eCommunicating with Slip Boxes\u003c/em\u003e (terjemahan)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003c
