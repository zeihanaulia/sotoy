:"#self-improvement","position":{"start":{"line":2,"column":1,"offset":1},"end":{"line":2,"column":18,"offset":18},"indent":[]},"xvault":false,"to":{"fname":"tags.self-improvement"}},{"type":"wiki","from":{"fname":"book-summaries.dare-to-lead","id":"book-summaries.dare-to-lead","vaultName":"vault"},"value":"tags.brené-brown","alias":"#brené-brown","position":{"start":{"line":3,"column":1,"offset":19},"end":{"line":3,"column":13,"offset":31},"indent":[]},"xvault":false,"to":{"fname":"tags.brené-brown"}}],"anchors":{"the-heart-of-daring-leadership":{"type":"header","text":"The Heart of Daring Leadership","value":"the-heart-of-daring-leadership","line":50,"column":0,"depth":3},"rumbling-with-vulnerability":{"type":"header","text":"Rumbling with vulnerability","value":"rumbling-with-vulnerability","line":66,"column":0,"depth":2},"hidup-didalam-value-kita":{"type":"header","text":"Hidup didalam value kita","value":"hidup-didalam-value-kita","line":83,"column":0,"depth":2},"kepercayaan-adalah-hal-yang-penting":{"type":"header","text":"Kepercayaan adalah hal yang penting","value":"kepercayaan-adalah-hal-yang-penting","line":139,"column":0,"depth":2},"belajar-dari-kegagalan-membantu-menjadi-lebih-berani":{"type":"header","text":"Belajar dari kegagalan membantu menjadi lebih berani","value":"belajar-dari-kegagalan-membantu-menjadi-lebih-berani","line":162,"column":0,"depth":2},"perfeksionisme-menggagalkan-kita-dari-peningkatan-diri-dan-keberanian":{"type":"header","text":"Perfeksionisme menggagalkan kita dari peningkatan diri dan keberanian","value":"perfeksionisme-menggagalkan-kita-dari-peningkatan-diri-dan-keberanian","line":188,"column":0,"depth":2},"yang-gw-dipelajari":{"type":"header","text":"Yang gw dipelajari","value":"yang-gw-dipelajari","line":210,"column":0,"depth":2}},"children":[],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"dare-to-lead\"\u003eDare to Lead\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#dare-to-lead\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #840000;\" href=\"/sotoy/notes/tags.self-improvement\"\u003e#self-improvement\u003c/a\u003e\n\u003ca class=\"color-tag\" style=\"--tag-color: #e4cbff;\" href=\"/sotoy/notes/tags.brené-brown\"\u003e#brené-brown\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eBrave work, Tough conversations, Whole heart.\u003c/p\u003e\n\u003cp\u003eJadi buku ini dibuat dari riset-riset yang dilakukan oleh penulis,\nyang ditujukan kepada pembaca agar menjadi bacaan yang dapat dilakukan untuk menjadi pemimpin yang berani.\u003c/p\u003e\n\u003cp\u003eDari banyaknya interview dengan para pemimpin, penulis selalu bertanya kepada mereka, \u003c/p\u003e\n\u003cp\u003eApa yang dilakukan pemimpin untuk berhasil dalam lingkungannya yang kompleks dan berubah dengan cepat?\u003c/p\u003e\n\u003cp\u003eJawabannya beragam, tapi yang paling sering muncul adalah jawaban\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003eKita membutuhkan pemimpin yang lebih berani dan budaya (culture) yang lebih berani.\u003c/code\u003e\u003c/p\u003e\n\u003cp\u003eYang dimaksud pemimpin menurut penulis itu adalah,\u003c/p\u003e\n\u003cp\u003ePemimpin adalah siapapun yang mengambil tanggung jawab untuk menemukan potensi didalam seseorang atau proses,\ndan berani untuk membangun potensi itu.\u003c/p\u003e\n\u003cp\u003eLalu penulis bertanya lagi, bisakah kalian merinci keterampilan khusus yang anda yakini dapat mendukung kepemimpinan yang berani? hmm, ini tuh sesuatu yang kita miliki dan tidak kita miliki.\u003c/p\u003e\n\u003cp\u003eLebih dari 80% pemimpin percaya kalau keberanian itu adalah perilaku bukan kemampuan.\u003c/p\u003e\n\u003cp\u003eMereka lebih bersemangat berbicara tentang beberapa masalah, seperti behavioral problem dan cultural problem yang merusak kepercayaan dan keberanian.\u003c/p\u003e\n\u003cp\u003eMisalnya, menghindari percakapan yang sulit, seperti memberikan \u003ccode\u003efeedback\u003c/code\u003e yang jujur dan produktif.\u003c/p\u003e\n\u003cp\u003ePenyebabnya bisa jadi karena, kurangnya keberanian, kurangnya keterampilan, sisanya masalah norma \"merasa gak enakan, merasa gak sopan\" yang sering digunakan sebagai alasan untuk menghindari percapakan yang sulit seperti itu.\u003c/p\u003e\n\u003cp\u003eAkbatnya, ada ketidakjelasan yang akan mengurangi kepercayaan dan keterlibatan serta mendorong perilaku \u003ca href=\"https://www.verywellmind.com/what-is-passive-aggressive-behavior-2795481\"\u003epasif-agresif\u003c/a\u003e alias ngomongin dibelakang.\u003c/p\u003e\n\u003cp\u003eMeskipun ini sepertinya masalah organisasi ditempat kerja, tapi sebenarnya masalah ini berasal dari manusia.\u003c/p\u003e\n\u003cp\u003eAda beberapa contoh lagi dibukunya, kalo penasaran silahkan dibaca.\u003c/p\u003e\n\u003cp\u003eOya, dibuku ini ada hasil pembelajaran dari penulis. Judulnya\u003c/p\u003e\n\u003ch3 id=\"the-heart-of-daring-leadership\"\u003eThe Heart of Daring Leadership\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-heart-of-daring-leadership\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAda tiga point,\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eKita tidak bisa mendapatkan keberanian tanpa bregemuruh dengan kerentanan, rangkulah kelemahan kita.\u003c/p\u003e\n\u003cp\u003eYang dimaksud dengan gemuruh adalah diskusi, percakapan atau pertemuan yang didasari oleh kerentanan. Mengidentifikasi masalahnya, hadapi dan mencoba lagi tanpa rasa takut dan belajar dari kesalahan.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eKesadaran diri dan cinta diri itu penting. Siapa kita adalah bagaimana kita memimpin.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eKeberanian itu menular.\u003c/p\u003e\n\u003cp\u003eUntuk meningkatkan kepemimpinan dan membangun keberanian didalam tim dan ognasisasi. Kita harus menumbuhkan budaya kerja yang berani, tough conversation dan sepenuh hati dan armor (jabatan) tidak diperdulikan.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePemimpin yang berani harus peduli dan terhubung dengan orang-orang yang dipimpinnya.\u003c/p\u003e\n\u003ch2 id=\"rumbling-with-vulnerability\"\u003eRumbling with vulnerability\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#rumbling-with-vulnerability\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eApa itu vulnerability / kerentanan? Menurut penulis kerentanan bukanlah hal  menang atau kalah, tetapi lebih ke perasaan kita. \u003c/p\u003e\n\u003cp\u003eMisalnya, memulai sesuatu yang baru, misal mulai bisnis baru atau ketika kita baru saja diberhentikan dari perkerjaan, atau sesimple meminta maaf kepada teman, mendapatkan feedback. Itu semua membuat kita merasa cemas, takut dan bimbang.\u003c/p\u003e\n\u003cp\u003eIntinya kita pasti akan ada momen momen ketika kita merasa rentan waktu kita berada diketidak-pastian, resiko dan paparan emosi.\u003c/p\u003e\n\u003cp\u003eKerentanan adalah emosi manusia yang wajar dan dirasakan oleh semua orang.\nKerentanan membutuhkan keberanian,dan bukan suatu kelemahan.\u003c/p\u003e\n\u003cp\u003eTanpa kerentanan tidak akan ada invovasi dan kreativitas. Tidak ada inovasi tidak akan ada jika tidak belajar dari kesalahan.\u003c/p\u003e\n\u003cp\u003eComedian \u003ca href=\"https://www.goodreads.com/quotes/960017-it-s-very-hard-to-have-ideas-it-s-very-hard-to\"\u003eAmy Poehler\u003c/a\u003e, bilang, \u003ccode\u003eSangat sulit untuk memiliki ide. Sangat sulit untuk menempatkan diri diluar sana, Sangat sulit untuk menjadi rentan, Tetapi pemimpi, pemikir dan creator orang orang ajaib yang berani melakukannya.\u003c/code\u003e\u003c/p\u003e\n\u003cp\u003eJadi, kemampuan kita untuk berubah, melakukan percakapan yang sulit, memberikan feedback yang produktif, dan jujur yang merupakan keterampilan kepemimpinan yang berani, semuanya lahir dari kerentanan.\u003c/p\u003e\n\u003ch2 id=\"hidup-didalam-value-kita\"\u003eHidup didalam value kita\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hidup-didalam-value-kita\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePerjelas apa yang jadi value kita dan bertindak sesuai dengan value yang kita percayai.\u003c/p\u003e\n\u003cp\u003eYang dimaksud value apa? gimana kita mau hidup didalam value kalo kita gak tau?\u003c/p\u003e\n\u003cp\u003eContoh value bisa dilihat \u003ca href=\"https://daretolead.brenebrown.com/wp-content/uploads/2019/02/Values.pdf\"\u003edisini\u003c/a\u003e. \u003c/p\u003e\n\u003cp\u003eTanya pada diri kita:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eValue apa yang mendefinisikan saya?\u003c/li\u003e\n\u003cli\u003eApakah ini yang tebaik untuk saya?\u003c/li\u003e\n\u003cli\u003eApakah value ini menjadi filter yang bisa saya gunakan untuk membuat keputusan yang sulit?\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePilih satu atau dua value yang akan kita yakini. \u003c/p\u003e\n\u003cp\u003eLalu bawa value tersebut dari sekedar bullshit menjadi behavior. \u003c/p\u003e\n\u003cp\u003eCoba lihat workbook \u003ca href=\"https://daretolead.brenebrown.com/wp-content/uploads/2018/10/DTL-Read-Along-Workbook-v1.pdf\"\u003eini\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eIsi pertanyaan yang ada dihalaman 31. \u003c/p\u003e\n\u003cp\u003eSelanjutnya, Berempati dan welas asih adalah hal terpenting.\u003c/p\u003e\n\u003cp\u003eLalu belajar cara memberi feedback dan menerima feedback.\u003c/p\u003e\n\u003cp\u003eDibuku ini ada petunjuk untuk memberikan feedback.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya siap untuk duduk disebelah anda daripada disebrang anda.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya bersedia meletakan masalah didepan kita daripada diantara kita (atau diarahkan kepada anda)   \u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya siap untuk mendengarkan, mengajukan pertanyaan dan menerima kalau saya mungkin tidak sepenuhnya memahami masalah ini.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya siap untuk mengakui apa yang anda lakukan dengan baik, bukan hanya mencari cari kesalan anda.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya mengenali kekuatan anda dan bagaimana anda dapat menggunkannya untuk mengatasi tantangan anda.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya dapat meminta pertanggung jawaban anda tanpa mempermalukan atau menyalahkan\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya terbuka untuk memili bagian saya.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya benar benar dapat berterima kasih kepada seseorang atas upaya mereka daripada hanya mengkritik mereka karena kegagalan mereka.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya dapat berbicara tentang bagaimana menyelesaikan tantangan ini yang akan mengarah kepada pertumbuhan dan kesempatan.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eSaya tau, saya siap memberikan feedback ketika saya dapat mencontoh kerentanan dan ketebukaan yang diharapkan dari ana.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eItu dalah sepulu petunjuk yang akan menjadi panduan ketika kita akan memberikan feeback.\u003c/p\u003e\n\u003cp\u003eLalu bagaimana sikap yang baik ketika menerima feedback?\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eSaya berani mendengarkan dan menerima\u003c/li\u003e\n\u003cli\u003eAmbil sesuatu yang berharga, ambil yang baiknya buang sisanya.\u003c/li\u003e\n\u003cli\u003ePercaya setiap feedback yang diterima adalah jalan menjadi lebih baik.\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"kepercayaan-adalah-hal-yang-penting\"\u003eKepercayaan adalah hal yang penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kepercayaan-adalah-hal-yang-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSeberapa jauh kita bisa dipercaya dan berapa banyak orang yang betul betul kita percayai.\u003c/p\u003e\n\u003cp\u003ePenulis telah membuat tujuh peroilaku yang mendorong kepecayaan. dan disingkan BRAVING.\u003c/p\u003e\n\u003cp\u003eB adalah Boundaries (batas) artinya kita harung menghormati batasan orang lain.\u003c/p\u003e\n\u003cp\u003eR adalah reliability (dapat diandalkan) apa yang kita katakan itu yang kita lakukan. Kita harus menyadari kemampuan dan keterbatasan kita, sehingga kita tidak berlebihan dan akibatnya tidak bisa memenu komitment yang telah kita katakan.\u003c/p\u003e\n\u003cp\u003eA adalah accountability, kita bertanggungjwab atas kesalahan kita, benari meminta maaf dan mencoba dan mencari jalan terbaik untuk menebus kesalahan.\u003c/p\u003e\n\u003cp\u003eV adalah vault (lemari besi), anggap lah kita seperti lemari besi informasi.Kita harus jaga informasi penting yang bukan milik kita.\u003c/p\u003e\n\u003cp\u003eI adalah integrity (integritas). lakukan apa yang benar daripada cari jalan pintas cari yang mudah, menyenangkan, tapi mengorbankan kebenaran.\u003c/p\u003e\n\u003cp\u003eN adalah non-juggement (tidak menghakimi), dengan tidak menghakimi orang akan memberitahu apa yang sebenarnya mereka rasakan dan meminta bantuan tanpa mengharapkan kita menghakimi mereka.\u003c/p\u003e\n\u003cp\u003eG adalah generosity (kemurahan hati) orang akan lebih mempercayai kita kalau mereka tau kita selelu melihat yang terbaik dari orang lain bukan yang terburuk.\u003c/p\u003e\n\u003cp\u003eTerapkan perilaku ini untuk menjadi pemimpin yang sukses dan bisa dipercaya.\u003c/p\u003e\n\u003ch2 id=\"belajar-dari-kegagalan-membantu-menjadi-lebih-berani\"\u003eBelajar dari kegagalan membantu menjadi lebih berani\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#belajar-dari-kegagalan-membantu-menjadi-lebih-berani\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003ePelajaran bagi pemimpin? kalau kita ingin lebih berani, maka yang terbaik adalah dengan mempersiapkan diri untuk jalan yang tidak mulus.\u003c/p\u003e\n\u003cp\u003eKita bisa ambil pelajaran dari skydivers, calon skydivers akan dizinkan untuk terbang diatas langit ketika mereka susah menghabiskan banyak sesi pelatihan untuk belajar bagaimana cara mendarat dengan aman, mulai dari ketinggian yang rendah misal lompat dari tangga.\u003c/p\u003e\n\u003cp\u003ePara pemimpin dan pelatih kepemimpinan menyadari perlunya pelatihan ketahanan ini. Tapi bisanya mereka lakukan setelah mengalami kegagalan atau pas krisis terjadi. \u003c/p\u003e\n\u003cp\u003eCoba bayangkan jika skydivers yang seperti itu, terjun bebas tanpa pernah mencoba berlatih dan belajar gagal mendarat dari ketinggian yang rendah.\u003c/p\u003e\n\u003cp\u003eAda cara lebih baik, yaitu mencoba belajar sejak dini, dengan belajar sedari awal, akan menimbulkan perilaku lebih berani. Kenapa? karena setelah pelatihan kita akan yakin dengan kemampuan untuk bangkit kembali jika perilaku berani kita tidak membuahkan hasil yang baik.\u003c/p\u003e\n\u003cp\u003eNamun, beberapa organissari khawatir kalau mengajari cara gagal sejak awal akan mendorong performa yang rendah.\u003c/p\u003e\n\u003cp\u003ePadahal, yang terjadi malah sebaliknya.\u003c/p\u003e\n\u003cp\u003eMisalnya, di perusahaan penulis sendiri, dia menjadikan prioritas untuk mengajarkan keterampilan untuk gagal dan ketahan sebagai bagian dari proses orientasi untuk para karyawan baru.\u003c/p\u003e\n\u003cp\u003eIni adalah cara perusahaan memberitahu karyawan baru, kalau keberanian mereka sangat diharapkan tapi kegagalan juga tetap diekspektasikan sesekali.\u003c/p\u003e\n\u003cp\u003epernahkan dengar slogan \"Fall forward\" and \"fail fast\" kalau tanpa program keterampilan ketahanan akan membuat banyak kerusahakan dari pada kebaikan.\u003c/p\u003e\n\u003cp\u003eKenapa?\u003c/p\u003e\n\u003cp\u003eKarena para pemimpin yang gagal tanpa keterampilan ketahanan akan dengan cepat merasakan sedang berhadapan dengan rasa malu dua kali lipat lebih dari orang yang belajar keterampilan ketahanan.\u003c/p\u003e\n\u003ch2 id=\"perfeksionisme-menggagalkan-kita-dari-peningkatan-diri-dan-keberanian\"\u003ePerfeksionisme menggagalkan kita dari peningkatan diri dan keberanian\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#perfeksionisme-menggagalkan-kita-dari-peningkatan-diri-dan-keberanian\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSalah satu jenis perlindungan diri yang paling luas adalah perfeksionisme. Untuk menjadi pemimpin yang berani, kita harus membersihkan diri dari perfeksionisme.\u003c/p\u003e\n\u003cp\u003eKita harus mendobrak dari mitos mitos perfeksionisme ini.\u003c/p\u003e\n\u003cp\u003emitos yang paling merusak adalah kalau perfeksionisme adalah tentang perbaikan diri dan berjuang untuk keunggulan.\u003c/p\u003e\n\u003cp\u003ePadahal kenyataannya, perfeksionisme sebenarnya tentang upaya untuk memenangkan penerimaan, ingin mendapat pujian dari lingkungan, butuh pengakuan dan selalu bertanya \"Apa pendapat orang lain tentang gw?\"\u003c/p\u003e\n\u003cp\u003eSebaliknya, orang orang dengan dorongan yang sehat untuk sukses, jauh lebih fokus pada diri sendiri dan terinspirasi dengan bertanya pada diri sendiri bagaimana cara mereka bisa bertumbuh.\u003c/p\u003e\n\u003cp\u003eOrang orang perfeksionis sering berasumsi kalau cara berpikir ini akan membawa mereka sukses, \u003c/p\u003e\n\u003cp\u003eSebenernya sih gak salah juga dengan perfksionis, tapi ada yang mengganggu dari penelitian yang dilakukan penulis. kalau perfeksionisme dikaitkan dengan kecanduan, depresi dan kecemasan. lebih jauh lagi perfeksionis lebih cenderung kehilang peluang dan mengalami kelumpuhan mental yang membuat mereka gak sepenuhnya terlibat dalam kehidupan.\u003c/p\u003e\n\u003cp\u003eKenapa?\u003c/p\u003e\n\u003cp\u003eKarena ketakutan ketika dikritik atau gak memenuhi harapah orang lain.\u003c/p\u003e\n\u003cp\u003eUntuk menjadi pemimpin yang berani, lepaskan tameng perfeksionis ini dan masuklah ke kehidupan yang nyata. Kita mungkin membuat kesalahan dalam proses, tetapi kita akan mendaptkan sesuati yang berharga sebagai gantinya. Keberanian untuk berhasil dan memimpin.\u003c/p\u003e\n\u003ch2 id=\"yang-gw-dipelajari\"\u003eYang gw dipelajari\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#yang-gw-dipelajari\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKetika kita jujur dan menerima kerentanan, artinya kita telah membuka diri terhadap keberanian dan kreativitas.\u003c/p\u003e\n\u003cp\u003eKetika kita melepaskan sikap perfeksionis dan ketakutan akan kegagalan, artinya kita menemukan keberanian untuk memperbaiki diri kita.\u003c/p\u003e\n\u003cp\u003eKita perlu semua emosi, untuk mengikuti kita jika ingin menjadi pemimpin yang berani.\u003c/p\u003e\n\u003cpre\u003e\u003ccode\u003ecatatan:\n\nbanyak banget yang bisa diambil dari buku ini dan sepertinya ringkasannya akan diperbaharui.\n\u003c/code\u003e\u003c/pre\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #2c6fbb;\" href=\"/sotoy/notes/tags.self-improvement\"\u003eSelf Improvement\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #9b5fc0;\" href=\"/sotoy/notes/tags.brené-brown\"\u003eBrené Brown\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncwhf8qpuaoz764uzfn","y8jzdhjhhmqub1t9wx5w9e4","ff8zp75qbznut6joziqr1nx"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew"
