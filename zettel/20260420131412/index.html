ama dengan PRD/FSD/TSD/RFC?","value":"apakah-ini-sama-dengan-prdfsdtsdrfc","line":59,"column":0,"depth":2},"mengapa-ini-penting":{"type":"header","text":"Mengapa Ini Penting","value":"mengapa-ini-penting","line":74,"column":0,"depth":2},"hubungan-ke-zettel-lain":{"type":"header","text":"Hubungan ke Zettel Lain","value":"hubungan-ke-zettel-lain","line":78,"column":0,"depth":2},"sumber":{"type":"header","text":"Sumber","value":"sumber","line":84,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"feature-document-adalah-memori-dinamis-level-pekerjaan-yang-sedang-berlangsung\"\u003eFeature document adalah memori dinamis level pekerjaan yang sedang berlangsung\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#feature-document-adalah-memori-dinamis-level-pekerjaan-yang-sedang-berlangsung\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eFeature document itu tempat kerja yang nyimpen konteks fitur selama proses berlangsung.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eCatatan ini dimaksudkan sebagai anchor permanen untuk konsep feature document dalam konteks AI-collaboration dan context anchoring.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"apa-itu-feature-document\"\u003eApa itu Feature Document\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apa-itu-feature-document\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eFeature document adalah dokumen hidup untuk satu fitur atau pekerjaan yang sedang berjalan. Ia mencatat keputusan, alasan di baliknya, alternatif yang ditolak, batasan yang berlaku, dan apa yang masih terbuka. Tujuannya bukan membuat spesifikasi final, tetapi menjaga konteks sesi agar dapat diakses ulang di sesi berikutnya.\u003c/p\u003e\n\u003cp\u003eContoh isi feature document:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDecision: gunakan BullMQ langsung untuk retry handling\u003c/li\u003e\n\u003cli\u003eWhy: lebih sederhana, lebih mudah dipahami, cukup untuk v1\u003c/li\u003e\n\u003cli\u003eRejected: \u003ccode\u003eRetryQueue\u003c/code\u003e wrapper karena menambah indirection tanpa benefit nyata\u003c/li\u003e\n\u003cli\u003eConstraints: all queries must include \u003ccode\u003etenantId\u003c/code\u003e, email-only v1, jangan ubah auth middleware\u003c/li\u003e\n\u003cli\u003eOpen questions: rate limiting strategy, monitoring alert thresholds\u003c/li\u003e\n\u003cli\u003eState: design approved, handler + renderer implementasi selesai, delivery tracker belum\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"contoh-use-case\"\u003eContoh Use Case\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-use-case\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSesi pertama membuat keputusan desain untuk notifikasi v1. Sesi kedua dimulai dengan feature document, sehingga AI tidak lagi menebak apakah \u003ccode\u003eRetryQueue\u003c/code\u003e sudah dipertimbangkan atau apakah feature masih menerima SMS. Sesi baru bisa langsung membaca konteks: keputusan sudah dibuat, alasan sudah tercatat, dan hanya menyelesaikan item yang belum tuntas.\u003c/p\u003e\n\u003ch2 id=\"contoh-implementasi-nyata\"\u003eContoh Implementasi Nyata\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-implementasi-nyata\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMartin Fowler menulis kasus nyata di artikel \"Context Anchoring\" tentang fitur Notification Service v1. Di sana, dokumen fitur yang berisi keputusan \u003ccode\u003eBullMQ langsung\u003c/code\u003e, \u003ccode\u003eEmail-only v1\u003c/code\u003e, dan \u003ccode\u003estate\u003c/code\u003e implementasi disimpan sebagai working record sepanjang beberapa sesi. Dokumen itu singkat—sekitar 50 baris—dan diperbarui di akhir setiap momen keputusan penting.\u003c/p\u003e\n\u003cp\u003ePraktik ini setara dengan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003emenaruh file live di repo, misalnya \u003ccode\u003edocs/feature-context/notification-service-v1.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003ememperbarui section \u003ccode\u003eDecisions\u003c/code\u003e, \u003ccode\u003eConstraints\u003c/code\u003e, \u003ccode\u003eOpen Questions\u003c/code\u003e, dan \u003ccode\u003eState\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003emenggunakan dokumen itu sebagai sumber otoritatif saat memulai sesi AI baru\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIni bukan PRD final. Ini lebih mirip ADR yang hidup, tapi fokusnya pada fitur berjalan dan konteks sesi.\u003c/p\u003e\n\u003ch2 id=\"artikel-tambahan-dan-referensi\"\u003eArtikel Tambahan dan Referensi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#artikel-tambahan-dan-referensi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eMartin Fowler, \"Context Anchoring\"\u003c/code\u003e — real case feature document dan alasan mengapa konteks harus keluar dari chat\n\u003ca href=\"https://martinfowler.com/articles/reduce-friction-ai/context-anchoring.html\"\u003ehttps://martinfowler.com/articles/reduce-friction-ai/context-anchoring.html\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eMartin Fowler, \"Knowledge Priming\"\u003c/code\u003e — pola praktis untuk membangun proyek context sebagai infrastructure\n\u003ca href=\"https://martinfowler.com/articles/reduce-friction-ai/knowledge-priming.html\"\u003ehttps://martinfowler.com/articles/reduce-friction-ai/knowledge-priming.html\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eMichael Nygard, \"Documenting Architecture Decisions\"\u003c/code\u003e — akar sejarah ADR dan kenapa keputusan perlu dicatat singkat\n\u003ca href=\"https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions.html\"\u003ehttps://cognitect.com/blog/2011/11/15/documenting-architecture-decisions.html\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eADR.org\u003c/code\u003e — template dan tooling untuk decision record yang bisa diadaptasi jadi feature document\n\u003ca href=\"https://adr.github.io/\"\u003ehttps://adr.github.io/\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eOpen Practice Library, Architectural Decision Records (ADR)\u003c/code\u003e — praktik umum untuk membuat keputusan arsitektur yang mudah dibaca dan dikelola\n\u003ca href=\"https://openpracticelibrary.com/practice/architectural-decision-records-adr/\"\u003ehttps://openpracticelibrary.com/practice/architectural-decision-records-adr/\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"apakah-ini-sama-dengan-prdfsdtsdrfc\"\u003eApakah Ini Sama dengan PRD/FSD/TSD/RFC?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#apakah-ini-sama-dengan-prdfsdtsdrfc\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eTidak persis.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ePRD (Product Requirements Document) fokus pada \"apa\" dan \"kenapa\" dari perspektif produk. Ia biasanya lebih luas, mencakup kebutuhan pengguna, value proposition, dan batasan bisnis.\u003c/li\u003e\n\u003cli\u003eFSD (Functional Specification Document) sering menjelaskan \"bagaimana\" fungsi akan bekerja dari sudut pandang fungsional, termasuk alur pengguna, input/output, dan behavior.\u003c/li\u003e\n\u003cli\u003eTSD (Technical Specification Document) biasanya mendetailkan implementasi teknis: arsitektur, API, data flow, dan komponen.\u003c/li\u003e\n\u003cli\u003eRFC (Request for Comments) adalah proposal formal untuk perubahan atau penambahan, biasanya dipakai untuk diskusi dan persetujuan sebelum implementasi.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFeature document berbeda karena:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esifatnya lebih ringan dan iteratif;\u003c/li\u003e\n\u003cli\u003editulis selama proses, bukan sebagai dokumen akhir;\u003c/li\u003e\n\u003cli\u003efokusnya pada konteks keputusan dan keadaan saat ini, bukan proposal formal;\u003c/li\u003e\n\u003cli\u003eia menjadi external memory untuk sesi AI dan tim, bukan hanya dokumentasi internal.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eIni bikin productivity lebih aman, karena konteks fitur nggak lagi terjebak di chat.\u003c/p\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMendukung \u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — klaim diambil dari Paragraf 15.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e — tesis utama bahwa chat AI adalah medium berpikir, bukan tempat penyimpanan keputusan.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e — baseline kolaborasi manusia yang transfer konteks ke dokumen.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — Paragraf 15\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #a03623;\" href=\"/sotoy/notes/tags.zettel\"\u003ezettel\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-collaboration (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\" href=\"/sotoy/notes/tags.knowledge-management\"\u003eknowledge-management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003econtext-anchoring (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch","dateFormat":"y.MM.dd.HHmmss","addBehavior":"asOwnDomain"},"task":{"name":"","dateFormat":"","addBehavior":"childOfCurrent","statusSymbols":{"":" ","wip":"w","done":"x","assigned":"a","moved":"m","blocked":"b","delegated":"l","dropped":"d","pending":"y"},"prioritySymbols":{"H":"high","M":"medium","L":"low"},"todoIntegration":false,"createTaskSelectionType":"selection2link","taskCompleteStatus":["done","x"]},"graph":{"zoomSpeed":1,"createStub":false},"en
