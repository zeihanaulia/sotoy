784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8z"></path></svg></span></div></div></header><div class="ant-layout css-mncuj7" style="margin-top:64px;display:flex;flex-direction:row;width:100%;max-width:1200px;margin:0 auto"><div class="site-layout-sidebar" style="flex:0 0 auto;width:200px;min-width:200px"><aside class="ant-layout-sider ant-layout-sider-dark css-mncuj7" style="position:fixed;top:64px;overflow:auto;height:calc(100vh - 64px);background-color:transparent;flex:0 0 200px;max-width:200px;min-width:200px;width:200px"><div class="ant-layout-sider-children"></div></aside></div><main class="ant-layout-content side-layout-main css-mncuj7" style="flex:1;min-width:0;display:block"><div style="padding:48px 24px 0;max-width:1200px;margin:0 auto"><div class="main-content" role="main"></div></div><div class="ant-divider css-mncuj7 ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer css-mncuj7" style="padding:0 24px 24px"></footer></main></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"note":{"id":"book-summaries.continuous-integration-CI-and-continuous-delivery-CD-a-practical-guide-to-designing-and-developing-pipelines.implementing-pipelines","title":"7. Implementing Pipelines","desc":"","updated":1742029591960,"created":1688714023571,"custom":{},"fname":"book-summaries.continuous-integration-CI-and-continuous-delivery-CD-a-practical-guide-to-designing-and-developing-pipelines.implementing-pipelines","type":"note","vault":{"fsPath":"vault"},"contentHash":"acc98a263bc38c771370e2a3c0d5deac","links":[],"anchors":{"implementasi-pipeline":{"type":"header","text":"Implementasi Pipeline","value":"implementasi-pipeline","line":14,"column":0,"depth":2},"dampak-organisasi":{"type":"header","text":"Dampak Organisasi","value":"dampak-organisasi","line":22,"column":0,"depth":2},"disiplin-tim":{"type":"header","text":"Disiplin Tim","value":"disiplin-tim","line":30,"column":0,"depth":3},"platform-integrasi":{"type":"header","text":"Platform Integrasi","value":"platform-integrasi","line":46,"column":0,"depth":3},"model-saas":{"type":"header","text":"Model SaaS","value":"model-saas","line":50,"column":0,"depth":4},"model-iaas":{"type":"header","text":"Model IaaS","value":"model-iaas","line":53,"column":0,"depth":4},"model-self-hosting":{"type":"header","text":"Model Self-Hosting","value":"model-self-hosting","line":58,"column":0,"depth":3},"keamanan-infrastruktur":{"type":"header","text":"Keamanan Infrastruktur","value":"keamanan-infrastruktur","line":67,"column":0,"depth":3},"persiapan-environment-target":{"type":"header","text":"Persiapan environment Target","value":"persiapan-environment-target","line":80,"column":0,"depth":3},"playbook":{"type":"header","text":"Playbook","value":"playbook","line":88,"column":0,"depth":4},"implementasi-aplikasi":{"type":"header","text":"Implementasi Aplikasi","value":"implementasi-aplikasi","line":94,"column":0,"depth":3},"runbook":{"type":"header","text":"Runbook","value":"runbook","line":98,"column":0,"depth":4},"release-note":{"type":"header","text":"Release Note","value":"release-note","line":111,"column":0,"depth":3},"promosi-artefak":{"type":"header","text":"Promosi Artefak","value":"promosi-artefak","line":139,"column":0,"depth":4}},"children":[],"parent":"book-summaries.continuous-integration-CI-and-continuous-delivery-CD-a-practical-guide-to-designing-and-developing-pipelines","data":{}},"body":"\u003ch1 id=\"7-implementing-pipelines\"\u003e7. Implementing Pipelines\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#7-implementing-pipelines\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003cp\u003eSuatu hari, tim kita akhirnya siap merilis sebuah aplikasi baru ke environment production. Saat momen penting ini tiba, berbagai persiapan pun dimulai. Dimulai dari memasang sertifikat SSL, menata seluruh kredensial dan secret agar aman, hingga memastikan monitoring aplikasi terkonfigurasi dengan benar. Tak semuanya bisa diotomatisasi; sebagian tugas masih memerlukan sentuhan manual. Di sisi lain, pengelolaan aplikasi pun perlu direncanakan dengan rapi. Tim harus tahu persis apa yang harus dilakukan jika aplikasi tiba-tiba gagal atau berperilaku di luar dugaan, dan prosedur untuk menangani perubahan, insiden, maupun masalah operasional harus tersedia agar ketersediaan service tetap aman.\u003c/p\u003e\n\u003cp\u003eHal serupa juga berlaku untuk pipeline. Environment tempat pipeline dijalankan harus dipersiapkan dan terus ditingkatkan. Platform pipeline mungkin terhubung ke service eksternal yang perlu diamankan, dan infrastrukturnya—termasuk integrasi dan pipeline itu sendiri—wajib diawasi dengan cermat. Bila pipeline gagal atau tidak berfungsi seperti yang diharapkan, tim perlu segera tanggap untuk memperbaikinya. Barulah setelah semua persiapan tersebut matang, pipeline siap dijalankan. Tidak jarang pekerjaan tambahan diperlukan, jauh lebih banyak daripada yang sering terlihat di permukaan.\u003c/p\u003e\n\u003ch2 id=\"implementasi-pipeline\"\u003eImplementasi Pipeline\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implementasi-pipeline\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKetika membahas implementasi pipeline, konsepnya sedikit unik. Jika kita membandingkan implementasi pipeline dengan implementasi aplikasi, keduanya sama-sama memerlukan konfigurasi dan penerapan di environment target. Namun, pertanyaannya adalah: apa sebenarnya “environment target” untuk sebuah pipeline? Lalu, bisakah kita benar-benar berbicara tentang “implementasi pipeline” layaknya implementasi aplikasi biasa? Dalam diskusi mengenai “pipeline dari pipeline,” kesimpulannya menyiratkan bahwa menerapkan pipeline ke production tak lebih dari sekadar mendorong kode pipeline ke repositori jarak jauh dan menggabungkannya ke jalur utama. Gambar 7-1 memperlihatkan bagaimana proses ini berlangsung.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/2023-07-07-14-15-08.png\" alt=\"Gambar 7-1 Implementasi Pipeline\"\u003e\u003c/p\u003e\n\u003cp\u003eSaat melihat Gambar 7-1, kita menemukan bahwa kode pipeline yang baru maupun yang telah diperbarui dapat berada di branch terpisah dalam repositori yang sama dengan aplikasi, atau mungkin di repositori terpisah yang merupakan hasil kloning. Semua itu bergantung pada bagaimana pipeline dikembangkan. Setelah ditulis, kode pipeline tersebut akan ditesting di environment khusus untuk pengtestingan pipeline. Di sana, pipeline otomatis membangun dan menjalankan aplikasi di environment testing pertama, yang disebut “testing Jalankan-1.” Begitu proses penggabungan kode pipeline ke jalur utama selesai, pipeline resmi dianggap “diimplementasikan” dan siap digunakan di seluruh environment tujuan (testing Jalankan-1, testing Jalankan-2, maupun Produksi Jalankan).\u003c/p\u003e\n\u003ch2 id=\"dampak-organisasi\"\u003eDampak Organisasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#dampak-organisasi\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eSebuah pipeline yang dirancang dengan cermat mengikuti beragam persyaratan dan pedoman organisasi. Sebelum siap digunakan oleh tim DevOps, pipeline itu harus melewati serangkaian testing ketat: mulai dari memastikan perilaku fungsional yang sesuai spesifikasi, mengtesting performa agar memenuhi standar tertentu, menerapkan langkah-langkah keamanan, hingga memeriksa compliance terhadap kebijakan internal. Begitu semua aspek terverifikasi, barulah seluruh anggota tim yakin pipeline tersebut dapat diandalkan. Apabila diperlukan, mereka pun menyiapkan dokumentasi tentang cara penggunaan, penyesuaian teknis, dan pemeliharaan. Semua itu tidak wajib, namun sering kali memudahkan seluruh tim untuk memulai. Pada akhirnya, tim akan bermusyawarah, menilai kesiapan pipeline, dan memberi lampu hijau saat semuanya dianggap layak.\u003c/p\u003e\n\u003cp\u003eSetiap kali pipeline diperbarui, tim perlu mengenali batasannya dan mendokumentasikan masalah yang telah diketahui. Jika terdapat persyaratan yang belum terwujud, catat tindakan mitigasinya, seperti pemeriksaan manual, agar potensi risiko tetap terkendali. Tim dan pemangku kepentingan dari sisi bisnis kemudian bersama-sama mengevaluasi berbagai celah yang mungkin muncul, lalu merancang perbaikan-perbaikan berikutnya. Semua masukan tersebut disatukan dalam backlog dan diprioritaskan sesuai kebutuhan. Bisnis umumnya akan berfokus pada strategi rilis dan kebijakan organisasi: apakah setiap fitur baru harus langsung diterapkan ke produksi dalam waktu 15 menit, atau cukup menunggu hingga terkumpul dan dirilis seminggu sekali? Keputusan seperti ini akan memengaruhi alur kerja tim, bahkan mungkin menuntut perubahan desain pipeline. Di sinilah struktur pengawasan berperan, memastikan evaluasi yang berkelanjutan. Tim pun perlu meluangkan waktu untuk meninjau dan terus menyempurnakan pipeline, sama seperti mereka melakukan perbaikan berkelanjutan pada pengembangan aplikasi.\u003c/p\u003e\n\u003cp\u003eApabila pipeline belum ditetapkan sistem notifikasinya, penting untuk menentukan siapa saja yang berhak mendapatkan informasi serta jenis pembaruan apa yang perlu diberitahukan. Saat tahap pengembangan, mungkin seluruh anggota tim mendapat email serupa setiap kali pipeline berjalan atau ketika dibutuhkan persetujuan penerapan. Namun, menjelang penerapan ke produksi, konfigurasi penerima notifikasi perlu disesuaikan agar setiap orang hanya menerima informasi yang benar-benar relevan. Tujuannya adalah mencegah informasi berlebihan dan sekaligus memaksimalkan efektivitas pipeline. Selain itu, dashboard dapat dimanfaatkan untuk menampilkan data penting secara visual, sehingga tim bisa memantau kondisi pipeline secara real-time dan segera mengambil tindakan bila terjadi masalah.\u003c/p\u003e\n\u003ch3 id=\"disiplin-tim\"\u003eDisiplin Tim\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#disiplin-tim\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAda kalanya tim sangat antusias mengadopsi otomatisasi dan pipeline. Mereka telah merencanakan segalanya dengan matang, mempelajari berbagai tools, dan berharap proses pengembangan menjadi lebih lancar. Namun, seiring berjalannya waktu, tim mulai menyadari bahwa ada beberapa hal yang kerap terabaikan, dan disiplin kerja diperlukan untuk mengatasinya. Berikut adalah beberapa masalah yang terus-menerus muncul:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eBreaking Builds: Salah satu prinsip integrasi berkelanjutan menyatakan bahwa build yang rusak harus segera diperbaiki. Idealnya, setiap developer langsung menghentikan pekerjaan lain dan fokus memperbaiki pipeline. Namun pada praktiknya, developer sering kali menunda. Jika tidak menimbulkan keterlambatan rilis, mereka menganggapnya biasa saja. Padahal, membiarkan pipeline rusak berlarut-larut—satu hingga dua hari—bukanlah kebiasaan yang baik. Udah gitu, kerusakan pipeline tidak selalu disebabkan oleh kode yang salah. Lingkungan eksternal pun bisa berubah: sistem eksternal down, SSL kedaluwarsa, bahkan platform ALM/integrasi mengalami gangguan. Jika diabaikan, penanganannya semakin hari semakin sulit.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eDisabled Quality Gates: Idealnya, jika analisis kode mendeteksi vulnerabelity serius, pipeline harus “gagal” agar tim segera menyelesaikan masalah tersebut. Akan tetapi, ada situasi di mana quality gates dimatikan—entah secara tidak sengaja atau disengaja—sehingga vulnerabelity dibiarkan. Sering kali hal ini terjadi karena tim tidak ingin mengatasi temuan analisis kode yang menumpuk.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMenindak lajuti code yang busuk dan cacat: Sebagian tim rajin membersihkan vulnerabelity penting yang terdeteksi. Mereka memprioritaskan quality gates, sehingga pipeline hanya “hijau” bila kualitas kodenya benar-benar aman. Namun, ada juga yang justru mengabaikan temuan analisis kode hingga menonaktifkan quality gates. Akibatnya, utang teknis menumpuk dan makin sulit dilunasi di kemudian hari.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eUnit Testing Coverage: Prinsip yang sama berlaku untuk unit testing coverage. Beberapa tim menjadikannya target penting agar senantiasa berada di ambang tertentu. Jika di bawah batas, pipeline akan “gagal.” Namun, ada pula tim yang tidak memprioritaskan hal ini. Dampaknya, coverage testing rendah dan kualitas kode mudah terganggu oleh bug yang tak terdeteksi.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAutomated testing yang ditunda tunda: Tidak jarang backlog untuk automated test terus menumpuk. Ini terjadi jika jumlah orang yang mengerjakan otomatisasi terbatas, misalnya hanya tim QA dengan anggota sedikit. Jalan keluar yang sering terbukti efektif adalah melibatkan seluruh tim—termasuk developer—dalam menulis dan memelihara tes otomatis, sehingga beban kerja pengujian tersebar lebih merata.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eDi samping itu, tim yang belum sepenuhnya beradaptasi kadang mencari “jalan pintas”: menghindari pipeline resmi dan menerapkan aplikasi ke produksi dengan cara lain, atau melakukan integrasi berkelanjutan dari cabang pengembangan saja, sementara rilis dilakukan dari branch main secara manual di local. Bahkan, ada kalanya pull request disetujui tanpa code review mendalam ketika ada push dari tim product. Semua ini merupakan bagian dari proses pembelajaran. Namun, demi kebaikan jangka panjang, masalah-masalah tersebut harus diatasi agar pipeline benar-benar bermanfaat bagi kualitas, kecepatan, dan stabilitas pengembangan.\u003c/p\u003e\n\u003ch3 id=\"platform-integrasi\"\u003ePlatform Integrasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#platform-integrasi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eAda Tim DevOps yang akan membangun dan menjalankan pipeline di sebuah organisasi. Mereka menyadari bahwa pipeline tidak hanya sekadar menulis skrip dan menekan tombol “jalankan,” tetapi juga mencakup infrastruktur di belakangnya. Tiba-tiba tim dihadapkan pada pertanyaan besar: \u003cstrong\u003edi mana dan bagaimana pipeline ini akan berjalan?\u003c/strong\u003e Mereka pun mulai berdiskusi dan menimbang berbagai model operasional—mulai dari SaaS, IaaS, hingga mengelola infrastruktur sendiri (self-hosting).\u003c/p\u003e\n\u003ch4 id=\"model-saas\"\u003eModel SaaS\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#model-saas\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003ePertama, tim mempertimbangkan \u003cstrong\u003emodel SaaS\u003c/strong\u003e, di mana mereka menggunakan platform integrasi yang sudah tersedia sebagai layanan. Bayangkan kemudahan yang dirasakan oleh tim DevOps: mereka tinggal fokus pada pembuatan pipeline, sementara penyedia SaaS bertanggung jawab atas pengelolaan infrastruktur dan semua pembaruan software. Solusi seperti Azure DevOps atau CircleCI Cloud masuk dalam kategori ini. Berbagai kekhawatiran teknis seolah-olah hilang, karena penyedia layanan menangani keamanan, kapasitas server, dan pemeliharaan rutin. Tim DevOps pun dapat mencurahkan waktu untuk meningkatkan kualitas pipeline tanpa terjebak masalah infrastruktur.\u003c/p\u003e\n\u003ch4 id=\"model-iaas\"\u003eModel IaaS\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#model-iaas\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eNamun, tim menemukan alasan untuk tidak langsung menutup opsi lain. Mereka juga menimbang \u003cstrong\u003emodel IaaS\u003c/strong\u003e, di mana infrastruktur disediakan oleh platform cloud—misalnya AWS atau Azure—tetapi pengelolaan platform integrasi seperti Jenkins, SonarQube, dan alat-alat penerapan lainnya tetap berada di tangan tim IT4IT atau tim DevOps sendiri. Di sini, tanggung jawab mereka lebih luas: mulai dari memastikan kluster Kubernetes dalam kondisi prima, meng-upgrade kontainer secara rutin, hingga memeriksa apakah kapasitas server masih mencukupi. \u003c/p\u003e\n\u003cp\u003eCerita pun berlanjut ketika pipeline baru semakin banyak dan beban kerja melonjak. Ternyata, infrastruktur yang disiapkan di awal tak lagi mampu menampung tingginya lalu lintas build dan pengujian. Mau tak mau, tim harus meninjau ulang kebutuhan kapasitas. Mungkin memindahkan sebagian tahap build dan testing ke node atau agen lain adalah solusi yang tepat, sehingga beban kerja lebih merata. Dalam model IaaS ini, fleksibilitas cukup tinggi, tetapi tim juga harus siap mengurus hal-hal teknis lebih dalam.\u003c/p\u003e\n\u003ch3 id=\"model-self-hosting\"\u003eModel Self-Hosting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#model-self-hosting\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSelanjutnya, organisasi mungkin mengambil langkah paling menantang: \u003cstrong\u003eself-hosting\u003c/strong\u003e. Mereka memutuskan untuk memegang kendali penuh atas seluruh tumpukan integrasi, termasuk perangkat keras maupun perangkat lunaknya. Tentu ada sederet tanggung jawab ekstra:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eMenyediakan infrastruktur\u003c/strong\u003e tempat seluruh platform integrasi berjalan.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMengatur logging, pemantauan, dan notifikasi\u003c/strong\u003e di tingkat infrastruktur. Tim harus menentukan metrik apa yang akan diawasi, misalnya tingkat pemakaian CPU di atas 90 persen atau ruang disk yang menipis di atas 80 persen.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMemastikan infrastruktur memenuhi standar nonfungsional\u003c/strong\u003e, seperti yang diatur dalam ISO 25010. Ini mencakup keamanan, ketersediaan, serta berbagai aspek kualitas lain. Tim juga harus menilai keamanan infrastruktur menggunakan kerangka acuan seperti NIST, terutama untuk infrastruktur yang dianggap kritis.\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ePilihan ini membuat tim DevOps lebih leluasa menyesuaikan setiap aspek infrastruktur dengan kebutuhan unik di organisasi. Namun, konsekuensinya, beban kerja mereka dalam hal perawatan dan pemeliharaan ikut melonjak.\u003c/p\u003e\n\u003ch3 id=\"keamanan-infrastruktur\"\u003eKeamanan Infrastruktur\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#keamanan-infrastruktur\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDalam cerita ini, keamanan menjadi tema yang selalu mendominasi pikiran tim, apa pun model operasional yang dipilih. Mereka tak mau kecolongan. Berbagai hal diperhatikan:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePenguatan server dan manajemen kerentanan:\u003c/strong\u003e Server harus dijaga, rutin diperbarui, dan divalidasi keamanannya.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKoneksi yang aman:\u003c/strong\u003e Komunikasi antara platform ALM, sistem SCM, alat analisis kode, hingga environment produksi perlu terlindungi, misalnya dengan HTTPS atau mTLS.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePengaturan hak akses:\u003c/strong\u003e Tim memastikan bahwa yang memicu penerapan tidak bisa sekaligus menyetujui penerapan itu tanpa mekanisme kontrol.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKebijakan cabang:\u003c/strong\u003e Pipeline tidak boleh digabungkan ke jalur utama jika sedang gagal. Aturan ini harus dikonfigurasi dengan tepat agar tak ada kode bermasalah yang lolos ke production.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePenggunaan vault:\u003c/strong\u003e Token, kunci, dan kredensial disimpan secara aman di vault. Ini membantu mencegah kebocoran data kritis.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProteksi artefak rilis:\u003c/strong\u003e Kode aplikasi, pipeline, pengujian, maupun item kerja yang membentuk artefak rilis produksi harus diamankan agar tidak bisa dihapus sembarangan.  \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePemindai kepatuhan pipeline:\u003c/strong\u003e Mengawasi apakah pipeline telah sesuai dengan kebijakan organisasi, misalnya terkait audit, keamanan, atau standar internal lainnya.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ePada akhirnya, kisah ini memperlihatkan bahwa membangun dan menjalankan pipeline tidak sekadar soal menulis skrip otomatisasi. Tim DevOps perlu mempertimbangkan di mana pipeline tersebut akan hidup, bagaimana mengelola infrastruktur di belakangnya, serta bagaimana menjaga keamanan dan kepatuhan. \u003cstrong\u003eKeputusan dan disiplin\u003c/strong\u003e dalam hal infrastruktur, entah SaaS, IaaS, ataupun self-hosting, menjadi fondasi agar pipeline berfungsi andal, aman, dan efisien—persis seperti yang diharapkan oleh seluruh pemangku kepentingan.\u003c/p\u003e\n\u003ch3 id=\"persiapan-environment-target\"\u003ePersiapan environment Target\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#persiapan-environment-target\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eJika tim telah mengadopsi pengembangan pipeline yang diperluas (atau canggih), sebagian besar pengembangan dan pengtestingan pipeline dilakukan menggunakan environment pengembangan/testingan pipeline. Jika pipeline siap untuk diimplementasikan dan digunakan, pipeline tersebut dipromosikan sehingga dapat membangun dan menerapkan aplikasi ke berbagai environment target. Ini mungkin meliputi environment testing tambahan dan environment produksi. Konfigurasikan environment target ini agar dapat diakses oleh pipeline dan lakukan penerapan melalui koneksi yang aman.\u003c/p\u003e\n\u003cp\u003eAplikasi yang diimplementasikan kemungkinan juga memerlukan kredensial (basis data), sertifikat, atau data statis. Hal ini harus diminta atau dihasilkan dan diterapkan ke environment target sehingga aplikasi dapat menggunakannya. Lebih baik jika ini adalah proses otomatis; gunakan pipeline operasional untuk mengatur hal ini. Bab berikutnyaakan membahas pipeline operasional dengan lebih detail.\u003c/p\u003e\n\u003cp\u003eDalam kasus environment testing aplikasi, perlu diatur data testing. Entah menghasilkan data sintetis atau menggunakan salinan dari produksi, tetapi pastikan data tersebut dianonimkan.\u003c/p\u003e\n\u003ch4 id=\"playbook\"\u003ePlaybook\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#playbook\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eApa dampak bisnis jika terjadi insiden atau masalah dengan pipeline? Kegagalan pipeline dapat menyebabkan kerusakan. Misalnya, perbaikan mendesak pada aplikasi harus dibuat dan perlu diterapkan. Namun, pipeline tidak berfungsi karena kegagalan infrastruktur dari platform integrasi. Ini dapat merusak kelangsungan proses bisnis jika pipeline tidak tersedia dalam waktu yang lama. Proses ITIL juga berlaku untuk pipeline. Playbook dapat berperan penting dalam proses manajemen insiden dan masalah.\u003c/p\u003e\n\u003cp\u003ePlaybook berisi metode investigasi yang didokumentasikan untuk mendeteksi dan menyelesaikan masalah. Playbook ini berguna untuk menyelidiki insiden atau kegagalan. Playbook juga dapat digunakan untuk pipeline. Penyusunan playbook pipeline dapat dimulai selama pengtestingan pipeline. Kegagalan pipeline umum dan solusinya ditambahkan ke playbook. Tentu saja, playbook tidak pernah lengkap, dan setelah implementasi dan penggunaan pipeline, akan muncul lebih banyak kasus. Kasus-kasus ini juga ditambahkan ke playbook.\u003c/p\u003e\n\u003ch3 id=\"implementasi-aplikasi\"\u003eImplementasi Aplikasi\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#implementasi-aplikasi\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSulit untuk membicarakan implementasi pipeline tanpa menyebutkan implementasi aplikasi. Implementasi aplikasi, pada dasarnya, adalah tujuan penggunaan pipeline. Menambahkan fitur-fitur tertentu ke dalam pipeline dapat berkontribusi pada pengalaman implementasi aplikasi yang solid. Pertimbangkan untuk menggunakan atau mengimplementasikan fitur-fitur berikut.\u003c/p\u003e\n\u003ch4 id=\"runbook\"\u003eRunbook\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#runbook\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003e\"Sebuah runbook adalah sekumpulan proses dan prosedur yang Anda eksekusi secara berulang untuk mendukung berbagai tugas perusahaan.\"\u003c/p\u003e\n\u003cp\u003eReferensi [33]\u003c/p\u003e\n\u003cp\u003eMengapa Anda membutuhkan runbook jika Anda menggunakan pipeline otomatis? Itu pertanyaan yang bagus. Sebuah pipeline sudah mengatur pelaksanaan aplikasi, bukan? Tetapi tim masih menggunakan runbook meskipun mereka juga menggunakan pipeline. Ada beberapa alasan mengapa penggunaan runbook masih valid.\nMasih ada tugas atau aktivitas satu kali yang tidak termasuk dalam CI/CD. Awal CI adalah saat melakukan commit ke repositori. Akhir CD adalah saat penerapan artefak ke environment produksi. Banyak tugas termasuk dalam proses sebelum dan sesudah CI/CD. Pikirkan tentang meminta langganan Azure, mengonfigurasi peran IAM, dan mengalokasikan anggota tim. Selain itu, pemeliharaan atau migrasi rutin melibatkan aktivitas yang juga tidak termasuk dalam pipeline CI/CD. Terkadang aktivitas-aktivitas ini kompleks dan memerlukan runbook yang detail.\u003c/p\u003e\n\u003cp\u003eAlasan lain menggunakan runbook adalah implementasi pertama dari sistem lengkap. Anda tidak memiliki CI/CD yang disiapkan sejak hari pertama. Implementasi sistem baru dalam produksi mungkin memerlukan eksekusi beberapa pipeline dalam urutan tertentu; bahkan dalam arsitektur mikro layanan, beberapa pipeline harus berjalan dalam urutan tertentu. Pikirkan tentang menyiapkan komponen infrastruktur dasar yang digunakan oleh semua mikro layanan.\u003c/p\u003e\n\u003cp\u003eSegala sesuatu dapat diotomatiskan, termasuk runbook. Jika sebuah spreadsheet sederhana tidak cukup, gunakan salah satu dari beberapa alat runbook otomatis. Dan karena Anda sudah mengembangkan pipeline, mengatur pipeline orkestrasi untuk mengimplementasikan runbook juga menjadi pilihan. Namun, pertanyaannya adalah apakah manfaatnya sebanding dengan usaha dan biaya yang dikeluarkan. Itu adalah pertanyaan yang hanya dapat dijawab oleh tim.\u003c/p\u003e\n\u003ch3 id=\"release-note\"\u003eRelease Note\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#release-note\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eSebuah release note adalah catatan perubahan, yang menggambarkan pembaruan software. Ini juga dapat mencakup bukti bahwa semua fitur baru telah ditesting dan diterima. Jadi, release note terkait dengan artefak dan berisi informasi tentang fitur-fitur yang disampaikan dan (opsional) laporan pengtestingan. Karena buku ini membahas desain CI/CD, pembuatan release note seharusnya tidak dilakukan secara manual tetapi dibuat secara otomatis. Namun, ada satu hal yang perlu dipertimbangkan. Antara dua rilis produksi, kemungkinan ada beberapa kandidat rilis, termasuk fitur-fitur dan perubahan baru. Kandidat rilis terakhir ditandai sebagai \"rilis\" dan diterapkan ke produksi. Potensial, beberapa catatan rilis dibuat di antara mereka, masing-masing terkait dengan kandidat rilis. Hanya artefak terakhir yang diterapkan ke produksi yang berisi semua fitur baru sejak rilis produksi sebelumnya. Kemungkinan besar catatan rilis terakhir sangat ringkas, hanya menggambarkan perbaikan bug. Hal ini sedikit disayangkan. Catatan rilis dari artefak produksi seharusnya idealnya terdiri dari semua perubahan antara rilis produksi sebelumnya dan rilis produksi saat ini. Selain itu, catatan rilis juga harus berisi semua hasil pengtestingan yang dilakukan pada rilis yang diterapkan ke produksi.\u003c/p\u003e\n\u003cp\u003eUntuk memecahkan masalah ini, sistem harus melacak semua perubahan antara rilis produksi terbaru dan rilis produksi berikutnya dan mengumpulkan semua metadata perantara untuk membentuk catatan rilis yang teragregasi. Setelah setiap penerapan produksi, status metadata direset, dan proses pengumpulan dimulai kembali. Lihat Gambar 7-2.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/2023-07-07-14-46-39.png\" alt=\"Gambar 7-2 Pengumpulan data catatan rilis\"\u003e\u003c/p\u003e\n\u003cp\u003eKarena catatan rilis berpotensi berisi semua fitur artefak dan hasil pengtestingan yang terkait, pembuatannya biasanya dilakukan setelah semua pengtestingan selesai. Metadata yang terdiri dari semua fitur dihasilkan pada tahap Publish artefak, di mana semua data perubahan dan fitur artefak dikumpulkan. Tahap Perform test menghasilkan semua hasil pengtestingan. Sepertinya masuk akal bahwa pembuatan catatan rilis dilakukan sebagai bagian dari tahap Notify actors.\u003c/p\u003e\n\u003cp\u003ePertimbangkan kasus berikut:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eTim ingin mengotomatisasi pembuatan catatan rilis. Mereka menggunakan sistem pelacak masalah terpisah untuk mendaftar item kerja. Kode disimpan di Git, dan artefak disimpan di repositori artefak.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eTim diberi informasi tentang setiap penerapan produksi menggunakan email (baik penerapan yang berhasil maupun yang gagal).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eCatatan rilis dipublikasikan di halaman wiki. Tim ingin memiliki catatan rilis teragregasi, yang berisi semua fitur sejak rilis terakhir diterapkan ke produksi, termasuk hasil pengtestingan dari rilis terakhir.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eModel BPMN khas dapat terlihat seperti pada Gambar 7-3.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/2023-07-07-14-47-16.png\" alt=\"Gambar 7-3 BPMN, membuat catatan rilis\"\u003e\u003c/p\u003e\n\u003cp\u003eKetika tahap Publish artefak dieksekusi, artefak disimpan di repositori artefak, setelah itu tugas khusus mengumpulkan semua data yang terkait dengan artefak. Ini berarti pesan komit kode diambil dan item kerja yang terkait dengan artefak rilis diambil (tidak ditampilkan dalam diagram untuk alasan kejelasan). Informasi ini disimpan di database sehingga dapat digunakan nanti.\u003c/p\u003e\n\u003cp\u003ePada akhir tahap Perform test, hasil pengtesting akan terbaca. Data hasil pengtestingan dikumpulkan dan juga disimpan dalam database yang sama.\u003c/p\u003e\n\u003cp\u003ePada suatu waktu dalam proses CI/CD, artefak tersebut (berhasil) diimplementasikan ke environment produksi. Hasil dari penerapan tersebut diteruskan ke tahap Notify actors, dan tugas Publish release note mengambil metadata dari database, mengumpulkan data tersebut, memformatnya menjadi catatan rilis, dan mempublikasikannya ke halaman wiki. Setelah ini selesai, metadata dalam database direset ke situasi awal yang baru.\u003c/p\u003e\n\u003ch4 id=\"promosi-artefak\"\u003ePromosi Artefak\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#promosi-artefak\"\u003e\u003c/a\u003e\u003c/h4\u003e\n\u003cp\u003eHasil dari tahap build, package, dan publish adalah sebuah artefak yang disimpan dalam repositori biner. Artefak ini adalah kandidat rilis, artinya secara potensial dapat diimplementasikan ke produksi. Namun, pertama-tama artefak harus melalui berbagai siklus pengtestingan, sehingga segalanya dapat terjadi sepanjang perjalanan. Selama proses pengtestingan, artefak bergerak mendekati produksi, tetapi hanya artefak yang telah ditesting dengan sukses yang diizinkan untuk diimplementasikan ke produksi. Kandidat rilis yang terhenti di tengah proses pengtestingan harus diberi tanda karena ada potensi risiko bahwa rilis yang salah diimplementasikan ke produksi. Masalahnya adalah semua kandidat rilis, baik yang gagal dalam pengtestingan maupun yang berhasil, disimpan dalam repositori biner yang sama. Harus ada cara untuk membedakan kandidat rilis yang gagal dengan rilis yang berhasil. Untuk memastikan bahwa kandidat rilis yang gagal selama pengtestingan dicegah dari diimplementasikan ke produksi, dapat ditambahkan quality gate; ini adalah pemeriksaan tambahan untuk menentukan bahwa artefak valid. Pemeriksaan ini dapat diimplementasikan dalam tahap Validate exit criteria.\u003c/p\u003e\n\u003cp\u003eTapi berdasarkan informasi apa quality gate ini bekerja? Ada beberapa opsi untuk mencegah rilis yang salah diimplementasikan.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eArtefak dipromosikan dari tahap ke tahap. Salah satu jenis implementasi adalah artefak berpindah antara repositori biner yang berbeda. Jadi setelah pengtestingan integrasi, pengtestingan penerimaan, dan pengtestingan kinerja, artefak dipindahkan dari satu repositori ke repositori berikutnya. Repositori terakhir berisi rilis yang siap untuk produksi, jadi itu adalah repositori yang digunakan dalam tahap Deploy artefak ke produksi. Kondisi/quality gate tambahan bahkan tidak diperlukan karena repositori yang tepat sudah digunakan. Kelemahan besar dari solusi ini adalah bahwa multiple repositori diperlukan dan artefak dipindahkan beberapa kali.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eOpsi lainnya adalah mempromosikan artefak secara manual. Fitur ini ditawarkan oleh beberapa platform ALM. Masalah dengan opsi ini adalah bahwa itu adalah tindakan manual. Pengguna harus secara aktif mengubah status artefak dari pra-rilis menjadi rilis, misalnya. Tahap kontrol ganda sudah merupakan tindakan manual, jadi apa gunanya menambah lebih banyak tindakan manual? Jujur saja, promosi artefak manual adalah sesuatu yang harus dihindari.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eAlih-alih menarik artefak yang sama ke repositori biner yang berbeda, ada juga opsi untuk menyimpan semua artefak dalam repositori yang sama dan menyediakan metadata. Setelah tahap-tahap dan tugas-tugas tertentu selesai dan pengtestingan berhasil, metadata artefak diperbarui (menggunakan curl atau Maven, misalnya). Berdasarkan metadata-nya, status artefak menjadi jelas.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eGambar 7-4 menggambarkan artefak kerangka pengtestingan unit dengan metadata tambahan dalam format file XML. File metadata (unittest-1.0-metadata.xml) berisi informasi tambahan tentang status tugas pengtestingan.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/2023-07-07-14-50-03.png\" alt=\"Gambar 7-4 Menyimpan metadata tambahan\"\u003e\u003c/p\u003e\n\u003cp\u003eSebelum artefak diunduh dari repositori biner dan diimplementasikan ke produksi, metadata-nya dibaca dan diinterpretasikan (menggunakan tugas quality gate dalam tahap Validate exit criteria). Karena pengtestingan penerimaan dalam metadata di sebelah kiri Gambar 7-5 menunjukkan bahwa pengtestingan penerimaan gagal, pipeline berakhir di sini, dan implementasi ke produksi tidak dilakukan. Pada contoh kedua, di sebelah kanan, metadata menunjukkan bahwa semua pengtestingan berhasil. Quality gate terlewati, dan implementasi dapat dimulai.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/2023-07-07-14-50-34.png\" alt=\"Gambar 7-5 Menyimpan metadata dengan hasil pengtestingan\"\u003e\u003c/p\u003e\n\u003cp\u003eCatatan: Ini menjadi masalah yang lebih kecil jika bagian CI dan CD diimplementasikan sebagai satu pipeline fisik. Pipeline tersebut sudah gagal sebelum tahap Validate exit criteria dicapai. Namun, ini menjadi risiko jika implementasinya terdiri dari pipeline-pipeline terpisah. Salah satu contoh di mana ini menjadi masalah adalah dalam kasus strategi pembangunan multiteam, di mana ada satu pipeline CD terpisah, memproses artefak dari beberapa pipeline CI.\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3
