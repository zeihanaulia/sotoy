n ini baru tau dan baru join club menulis yang di inisiasi sama temen temen yang suka menulis di eFishery. Sepertinya menarik, jadi ada teman nulis bareng. Baca isi pikiran mereka dalam tulsan. Gue suka baca tapi gue gak pernah nulis sama sekali. Jadilah gue coba ikutin apa kaya orang orang di youtube aja dulu. Begitu typing belajar menulis langsung keluar video ini.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.youtube.com/watch?v=Ldz2SZ-L9rQ\"\u003e\u003cimg src=\"/sotoy/assets/youtube-pelajaran-menulis-dea-anugrah-malaka.png\" alt=\"Youtube - Pelajaran Menulis - Dea Anugrah\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003ePemberi materinya Dea Anugrah, Jujur baru tau namanya. Tapi ini insight yang bisa gue ambil.\u003c/p\u003e\n\u003cp\u003eAda empat point yang dibahas:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eStruktur\u003c/li\u003e\n\u003cli\u003eKalimat Pertama\u003c/li\u003e\n\u003cli\u003eInsight \u003c/li\u003e\n\u003cli\u003eHumor\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 id=\"struktur\"\u003eStruktur\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#struktur\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eLangkah pertama yang bisa dilakukan adalah membangun strukturnya dulu. Bikin outline dulu, ini yang nanti akan jadi panduan menulis. Dalam menulis pada umumnya ada structure yang terkenal seperti \u003ca href=\"https://en.wikipedia.org/wiki/Three-act_structure\"\u003ethree act structure\u003c/a\u003e atau drama tiga babak.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/til.belajar-menulis/image.png\" alt=\"three-act structure\"\u003e\u003c/p\u003e\n\u003cp\u003eTapi structure gak kaku atau cuma itu aja, kita bisa eksplorasi lebih dalam lagi soal struture. Gue coba pause videonya dan check ada apalagi sih? Misalnya novel terkenal sudah banyak yang membahas juga, Harry Potter menggunakan \u003ca href=\"https://en.wikipedia.org/wiki/Chiastic_structure#:~:text=Chiastic%20structure%2C%20or%20chiastic%20pattern,%2CB\u0026#x27;%2CA\u0026#x27;.\"\u003echiastic structure\u003c/a\u003e berdasarkan diskusi \u003ca href=\"https://www.reddit.com/r/harrypotter/comments/11lhwa/the_chiastic_symmetrical_structure_of_harry_potter/#:~:text=There%20is%20a%20book%20written,and%20ending%20at%20the%20Dursley\u0026#x27;s.\"\u003ereddit\u003c/a\u003e. Atau ketika menulis berita lo bisa pakai struktur 5W1H langsung to the point untuk menjabarkan informasinya. Jadi poinnya structure ini tergantung dari tujuan cerita lo mau kemana? abis itu lo tentuin strukturenya.\u003c/p\u003e\n\u003ch2 id=\"kalimat-pertama\"\u003eKalimat Pertama\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kalimat-pertama\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKalimat pertama jadi penting dan ritme tulisan ditentukan dari kalimat pertama. Kalimat pertama mengantarkan pembaca ke suatu dunia baru, dunia dimana si penulis sedang bercerita\u003c/p\u003e\n\u003ch2 id=\"insight\"\u003eInsight\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#insight\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDalam setiap tulisan, kalo bisa ada insight yang baru untuk para pembaca. Jadi mereka bisa dapet sesuatu dari dunia yang lo buat\u003c/p\u003e\n\u003ch2 id=\"humor\"\u003eHumor\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#humor\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eMenurut gue ini bagian sulit membuat humor dari tulisan. Ya memang gue juga bukan orang yang humoris. Tapi ini akan gue pelajari. Gue kemarin sempet nonton video andre dan radit lagi belajar stand up comedy munkin caranya bisa ditiru. \u003ca href=\"https://www.youtube.com/watch?v=xayskKycquU%60\"\u003ehttps://www.youtube.com/watch?v=xayskKycquU`\u003c/a\u003e\u003c/p\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vaul
