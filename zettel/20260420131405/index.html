2,"column":0,"depth":2},"sumber":{"type":"header","text":"Sumber","value":"sumber","line":38,"column":0,"depth":2}},"children":[],"parent":"zettel","data":{}},"body":"\u003ch1 id=\"kalau-medium-lupa-pindahkan-memori-ke-luar-medium-itu\"\u003eKalau medium lupa, pindahkan memori ke luar medium itu\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#kalau-medium-lupa-pindahkan-memori-ke-luar-medium-itu\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"gagasan\"\u003eGagasan\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#gagasan\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eKalau mediumnya nggak andal buat ingat, jangan harap konteks bisa bertahan di situ.\u003c/p\u003e\n\u003ch2 id=\"mengapa-ini-penting\"\u003eMengapa Ini Penting\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#mengapa-ini-penting\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eIni membuatnya jelas: solusi bukan memperbaiki chat, tapi memindahkan konteks dari chat ke tempat lain.\u003c/p\u003e\n\u003ch2 id=\"contoh-medium-handal-vs-tidak-handal\"\u003eContoh Medium Handal vs Tidak Handal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#contoh-medium-handal-vs-tidak-handal\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003ch3 id=\"medium-tidak-handal\"\u003eMedium tidak handal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#medium-tidak-handal\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eChat AI session\u003c/code\u003e saat diskusi berlangsung. Berguna untuk berpikir, eksplorasi, dan membuat keputusan sementara. Tidak handal untuk menyimpan keputusan jangka panjang karena context window terbatas dan struktur token membuat alasan panjang mudah tergerus.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eLong conversation history\u003c/code\u003e dalam chat. Walau tersimpan, posisi informasi di tengah mudah hilang, ringkasan otomatis bisa mengabaikan nuance, dan menutup sesi biasanya berarti kehilangan reasoning.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"medium-handal\"\u003eMedium handal\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#medium-handal\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eFeature document / living decision note\u003c/code\u003e: dokumen bersama yang mencatat keputusan, alasan, alternatif yang ditolak, constraint, open questions, dan status. Ini memindahkan konteks keluar dari medium rapuh dan menjadikannya external memory.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eProject priming document\u003c/code\u003e: dokumen stabil untuk konteks proyek (stack, pola, konvensi). Tidak menggantikan feature document, tetapi memberi AI fondasi yang lebih tahan lama.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eADR atau decision log ringan\u003c/code\u003e: jika keputusan penting perlu dicatat, ADR hidup atau note keputusan ringan memberi media yang dapat direferensikan ulang tanpa bergantung pada sesi chat.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"hubungan-ke-zettel-lain\"\u003eHubungan ke Zettel Lain\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#hubungan-ke-zettel-lain\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eMendukung \u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — klaim diambil dari Paragraf 8.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131310\"\u003ePercakapan AI adalah medium berpikir, bukan tempat penyimpanan keputusan\u003c/a\u003e — tesis utama bahwa chat AI adalah medium berpikir, bukan tempat penyimpanan keputusan.\u003c/li\u003e\n\u003cli\u003eLihat juga \u003ca href=\"/sotoy/notes/zettel.20260420131311\"\u003eKolaborasi manusia multi-hari memindahkan memori kerja ke dokumen bersama\u003c/a\u003e — baseline kolaborasi manusia yang transfer konteks ke dokumen.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"sumber\"\u003eSumber\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#sumber\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e — Paragraf 8\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2 id=\"tags\"\u003eTags\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#tags\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #a03623;\" href=\"/sotoy/notes/tags.zettel\"\u003ezettel\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003eai-collaboration (Private)\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca class=\"color-tag\" style=\"--tag-color: #f0944d;\" href=\"/sotoy/notes/tags.knowledge-management\"\u003eknowledge-management\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca title=\"Private\" href=\"https://wiki.dendron.so/notes/hfyvYGJZQiUwQaaxQO27q.html\" target=\"_blank\" class=\"private\"\u003econtext-anchoring (Private)\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003chr\u003e\n\u003cstrong\u003eBacklinks\u003c/strong\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel\"\u003eZettelkasten\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/zettel.literature.context-anchoring\"\u003eContext Anchoring — memindahkan konteks keputusan dari chat ke dokumen hidup\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHa
