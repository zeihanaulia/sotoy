784c4.4 0 8-3.6 8-8v-64c0-4.4-3.6-8-8-8z"></path></svg></span></div></div></header><div class="ant-layout css-mncuj7" style="margin-top:64px;display:flex;flex-direction:row;width:100%;max-width:1200px;margin:0 auto"><div class="site-layout-sidebar" style="flex:0 0 auto;width:200px;min-width:200px"><aside class="ant-layout-sider ant-layout-sider-dark css-mncuj7" style="position:fixed;top:64px;overflow:auto;height:calc(100vh - 64px);background-color:transparent;flex:0 0 200px;max-width:200px;min-width:200px;width:200px"><div class="ant-layout-sider-children"></div></aside></div><main class="ant-layout-content side-layout-main css-mncuj7" style="flex:1;min-width:0;display:block"><div style="padding:48px 24px 0;max-width:1200px;margin:0 auto"><div class="main-content" role="main"></div></div><div class="ant-divider css-mncuj7 ant-divider-horizontal" role="separator"></div><footer class="ant-layout-footer css-mncuj7" style="padding:0 24px 24px"></footer></main></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"note":{"id":"book-summaries.the-devops-handbook","title":"The Devops Handbook","desc":"","updated":1682050104200,"created":1682046153823,"custom":{},"fname":"book-summaries.the-devops-handbook","type":"note","vault":{"fsPath":"vault"},"contentHash":"b371517dd6f25f0c9795af6817202878","links":[],"anchors":{"outcomes-devops":{"type":"header","text":"Outcomes Devops","value":"outcomes-devops","line":8,"column":0,"depth":2},"awal-cerita":{"type":"header","text":"Awal cerita","value":"awal-cerita","line":12,"column":0,"depth":2},"the-problem-something-in-your-organization-must-need-improvement":{"type":"header","text":"THE PROBLEM: SOMETHING IN YOUR ORGANIZATION MUST NEED IMPROVEMENT","value":"the-problem-something-in-your-organization-must-need-improvement","line":24,"column":0,"depth":2},"the-core-chronic-conflict":{"type":"header","text":"THE CORE, CHRONIC CONFLICT","value":"the-core-chronic-conflict","line":28,"column":0,"depth":3},"downward-spiral-in-three-acts":{"type":"header","text":"DOWNWARD SPIRAL IN THREE ACTS","value":"downward-spiral-in-three-acts","line":42,"column":0,"depth":3},"why-does-this-downward-spiral-happen-everywhere":{"type":"header","text":"WHY DOES THIS DOWNWARD SPIRAL HAPPEN EVERYWHERE?","value":"why-does-this-downward-spiral-happen-everywhere","line":68,"column":0,"depth":2},"bagaimana-memecahkan-spiral-down-dengan-devops":{"type":"header","text":"Bagaimana memecahkan Spiral Down dengan Devops","value":"bagaimana-memecahkan-spiral-down-dengan-devops","line":72,"column":0,"depth":2},"beberapa-action-item":{"type":"header","text":"Beberapa action item","value":"beberapa-action-item","line":100,"column":0,"depth":3},"bisnis-value-dari-devops":{"type":"header","text":"Bisnis value dari devops","value":"bisnis-value-dari-devops","line":118,"column":0,"depth":2},"devops-helps-scale-developer-productivity":{"type":"header","text":"DEVOPS HELPS SCALE DEVELOPER PRODUCTIVITY","value":"devops-helps-scale-developer-productivity","line":142,"column":0,"depth":2},"bagian-dari-buku-the-devops-handbook":{"type":"header","text":"Bagian dari buku the devops handbook","value":"bagian-dari-buku-the-devops-handbook","line":156,"column":0,"depth":2}},"children":["book-summaries.the-devops-handbook.part-I-the-three-ways"],"parent":"book-summaries","data":{}},"body":"\u003ch1 id=\"the-devops-handbook\"\u003eThe Devops Handbook\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-devops-handbook\"\u003e\u003c/a\u003e\u003c/h1\u003e\n\u003ch2 id=\"outcomes-devops\"\u003eOutcomes Devops\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#outcomes-devops\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eThis enables organizations to create a safe system of work, where small teams are able to quickly and independently develop, test, and deploy code and value quickly, safely, securely, and reliably to customers. This allows organizations to maximize developer productivity, enable organizational learning, create high employee satisfaction, and win in the marketplace.\u003c/p\u003e\n\u003ch2 id=\"awal-cerita\"\u003eAwal cerita\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#awal-cerita\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eAwal revolusi devops dimulai pada tahun 1980an dengan adanya Manufacturing Revolution. By adopting Lean principles and practices, manufacturing organizations dramatically improved plant productivity, customer lead times, product quality, and customer satisfaction, enabling them to win in the marketplace.\u003c/p\u003e\n\u003cp\u003eSebelum revolusi, waktu pesanan rata-rata pabrik manufaktur adalah enam minggu, dengan kurang dari 70% pesanan yang dikirim tepat waktu. Namun, setelah diterapkannya praktik Lean secara luas, waktu pesanan rata-rata berkurang menjadi kurang dari tiga minggu, dan lebih dari 95% pesanan dikirim tepat waktu. \u003c/p\u003e\n\u003cp\u003eOrganisasi yang tidak menerapkan praktik Lean kehilangan pangsa pasar, dan banyak yang bangkrut. Hal ini menunjukkan betapa pentingnya penerapan praktik Lean dalam meningkatkan efisiensi dan daya saing industri manufaktur.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230421100423.png\" alt=\"(Source: Adrian Cockcroft, “Velocity and Volume (or Speed Wins),” presentation at FlowCon, San Francisco, CA, November 2013.)\"\u003e\u003c/p\u003e\n\u003cp\u003eJadi problem apa yang coba diselesaikan oleh devops?\u003c/p\u003e\n\u003ch2 id=\"the-problem-something-in-your-organization-must-need-improvement\"\u003eTHE PROBLEM: SOMETHING IN YOUR ORGANIZATION MUST NEED IMPROVEMENT\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-problem-something-in-your-organization-must-need-improvement\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eOrganisasi yang tidak dapat melakukan perubahan production dengan cepat dan tidak dapat melakukan rilis ratusan atau ribuan perubahan ke production per hari akan menghadapi ketidakmampuan bersaing dalam pasar yang memerlukan waktu development yang cepat, tingkat layanan yang tinggi, dan eksperimen yang tak henti-hentinya, yang disebabkan oleh konflik utama dalam organisasi teknologi mereka.\u003c/p\u003e\n\u003ch3 id=\"the-core-chronic-conflict\"\u003eTHE CORE, CHRONIC CONFLICT\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#the-core-chronic-conflict\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eKonflik utama dalam organisasi teknologi adalah antara tim dev (development) yang ingin membuat perubahan dengan cepat dan sering, dan tim operasi (operations) yang ingin menjaga stabilitas dan keandalan sistem. \u003c/p\u003e\n\u003cp\u003eKonflik ini terjadi karena tim dev harus membuat perubahan untuk memenuhi kebutuhan bisnis yang terus berubah, sedangkan tim operasi harus memastikan bahwa perubahan tersebut tidak mengganggu operasi yang sedang berjalan dan tetap menjaga stabilitas sistem.\u003c/p\u003e\n\u003cp\u003eUntuk menyelesaikan konflik ini, organisasi harus menerapkan prinsip-prinsip DevOps yang memungkinkan kolaborasi antara kedua tim dan mengotomatiskan proses delivery software agar lebih cepat dan aman.\u003c/p\u003e\n\u003cp\u003eDr. Eliyahu M. Goldratt, salah satu pendiri gerakan manajemen manufaktur, menyebut konfigurasi semacam ini sebagai \"konflik utama yang kronis\" - di mana pengukuran dan insentif organisasi di berbagai silo menghalangi pencapaian tujuan global organisasi. \u003c/p\u003e\n\u003cp\u003eKonflik ini menciptakan spiral penurunan yang begitu kuat sehingga mencegah pencapaian hasil bisnis yang diinginkan, baik di dalam maupun di luar organisasi TI.\u003c/p\u003e\n\u003cp\u003eKonflik kronis ini seringkali menempatkan pekerja teknologi dalam situasi yang mengarah pada kualitas software dan layanan yang buruk, serta hasil pelanggan yang buruk, serta kebutuhan harian untuk solusi sementara, pemadam kebakaran, dan heroisme, baik di Manajemen Produk, Development, QA, Operasi TI, atau Keamanan Informasi.\u003c/p\u003e\n\u003ch3 id=\"downward-spiral-in-three-acts\"\u003eDOWNWARD SPIRAL IN THREE ACTS\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#downward-spiral-in-three-acts\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eDownward spiral adalah suatu kondisi atau situasi di mana suatu masalah atau konflik semakin memburuk seiring waktu, dan akhirnya mengakibatkan dampak negatif yang semakin parah dan sulit untuk diperbaiki. \u003c/p\u003e\n\u003cp\u003eIT Operations yang memiliki tujuan untuk menjaga aplikasi dan infrastruktur agar tetap berjalan sehingga organisasi dapat memberikan nilai kepada pelanggan. Namun, banyak masalah yang dihadapi karena aplikasi dan infrastruktur yang kompleks, buruk dalam dokumentasi, dan sangat rapuh. \u003c/p\u003e\n\u003cp\u003eIni disebut \"technical debt\" yang sering diatasi dengan workaround, namun sulit untuk diperbaiki karena kekurangan waktu. Hal ini sangat mengkhawatirkan karena sistem yang paling rentan terhadap kegagalan adalah sistem yang paling penting dalam menghasilkan pendapatan atau proyek kritis. \u003c/p\u003e\n\u003cp\u003eKetika perubahan-perubahan terjadi pada sistem-sistem ini dan gagal, maka hal ini dapat membahayakan janji-janji organisasi yang paling penting, seperti ketersediaan bagi pelanggan, tujuan pendapatan, keamanan data pelanggan, pelaporan keuangan yang akurat, dan lain sebagainya.\u003c/p\u003e\n\u003cp\u003eDalam downward spiral act kedua, seseorang harus menggantikan \"broken promise\" - bisa saja seorang manajer produk yang berjanji untuk menambahkan fitur yang lebih besar, atau seorang eksekutif bisnis yang menetapkan target pendapatan yang lebih tinggi.\u003c/p\u003e\n\u003cp\u003eKemudian, tanpa memperhatikan kemampuan teknologi atau apa yang menyebabkan kegagalan komitmen sebelumnya, mereka menugaskan organisasi teknologi untuk memenuhi janji baru ini.\u003c/p\u003e\n\u003cp\u003eSebagai hasilnya, Development diberi tugas dengan proyek mendesak lain yang tak terelakkan membutuhkan pemecahan tantangan teknis baru dan memotong sudut untuk memenuhi tanggal rilis yang dijanjikan, yang semakin menambah hutang teknis kita.\u003c/p\u003e\n\u003cp\u003eAct ketiga dimulai saat segala hal menjadi sedikit lebih sulit, bit by bit. Semua orang semakin sibuk, pekerjaan semakin memakan waktu, komunikasi menjadi lebih lambat, dan antrean pekerjaan semakin panjang. \u003c/p\u003e\n\u003cp\u003eSemua orang semakin sibuk, pekerjaan semakin memakan waktu, komunikasi menjadi lebih lambat, dan antrean pekerjaan semakin panjang. Pekerjaan kita semakin terikat, tindakan kecil menyebabkan kegagalan yang lebih besar, dan kita menjadi lebih takut dan kurang toleran terhadap perubahan. \u003c/p\u003e\n\u003cp\u003ePekerjaan kita semakin terikat, tindakan kecil menyebabkan kegagalan yang lebih besar, dan kita menjadi lebih takut dan kurang toleran terhadap perubahan. \u003c/p\u003e\n\u003cp\u003ePekerjaan membutuhkan lebih banyak komunikasi, koordinasi, dan persetujuan; tim harus menunggu sedikit lebih lama untuk pekerjaan yang bergantung pada mereka selesai; dan kualitas pekerjaan semakin buruk. Roda mulai berputar lebih lambat dan membutuhkan lebih banyak usaha untuk tetap bergerak.\u003c/p\u003e\n\u003cp\u003eDan hasilnya. Akan makin menjadi lebih lama. Seperti yang disebutkan oleh Steven J. Spear dalam bukunya, The High-Velocity Edge, dampaknya dapat sangat merusak dan berbahaya, sama seperti penyakit yang merusak tubuh atau kecelakaan yang menghancurkan. Oleh karena itu, penting bagi organisasi untuk memprioritaskan investasi dalam sistem IT yang kuat dan efektif untuk mencegah kerusakan pada kinerja organisasi secara keseluruhan.\u003c/p\u003e\n\u003ch2 id=\"why-does-this-downward-spiral-happen-everywhere\"\u003eWHY DOES THIS DOWNWARD SPIRAL HAPPEN EVERYWHERE?\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#why-does-this-downward-spiral-happen-everywhere\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eIntinya adalah bahwa setiap perusahaan sebenarnya adalah perusahaan teknologi dan hampir setiap keputusan bisnis memerlukan setidaknya satu perubahan IT. Proyek-proyek sangat penting dalam konteks bisnis dan keuangan karena mereka merupakan mekanisme utama untuk perubahan di dalam organisasi. Proyek biasanya didanai melalui pengeluaran modal, dan pemimpin bisnis jauh lebih bergantung pada pengelolaan IT yang efektif untuk mencapai tujuan mereka daripada yang mereka pikirkan. Prinsip DevOps diperlukan untuk mengatasi spiral kehancuran yang terjadi pada organisasi IT.\u003c/p\u003e\n\u003ch2 id=\"bagaimana-memecahkan-spiral-down-dengan-devops\"\u003eBagaimana memecahkan Spiral Down dengan Devops\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bagaimana-memecahkan-spiral-down-dengan-devops\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDevOps dapat membantu memecahkan masalah dan konsekuensi negatif yang muncul akibat keadaan yang ada saat ini dalam dunia teknologi. Dengan menerapkan DevOps, tim developers dapat bekerja secara mandiri untuk mengimplementasikan fitur-fitur baru, menguji validitasnya di lingkungan yang mirip dengan production, dan melakukan deployment secara cepat, aman, dan terjamin. Hal ini memungkinkan deployment dilakukan pada saat yang rutin dan dapat diprediksi, bukan pada malam hari di akhir pekan, sehingga tidak mengganggu pengguna. \u003c/p\u003e\n\u003cp\u003eDalam penggunaan DevOps, feedback loop dilakukan secara cepat pada setiap tahap proses sehingga setiap orang dapat melihat efek dari tindakan yang mereka lakukan. Penggunaan automated testing juga memungkinkan developer untuk menemukan kesalahan dengan cepat sehingga memungkinkan perbaikan yang lebih cepat dan juga pembelajaran yang lebih baik. Dengan menggunakan DevOps, masalah dapat diperbaiki secepat mungkin, dan tujuan global menjadi lebih penting daripada tujuan lokal.\u003c/p\u003e\n\u003cp\u003eDalam pengimplementasiannya, DevOps dapat membuat tim developers bekerja secara mandiri dan aman dalam memasang fitur-fitur yang telah mereka buat ke dalam lingkungan production. Hal ini dapat mempercepat pengiriman fitur baru dan perbaikan kesalahan pada software yang dibuat.\u003c/p\u003e\n\u003cp\u003eDengan adanya tes otomatis yang cepat dan dilakukan secara terus menerus di lingkungan production, para developers dapat mendeteksi kesalahan mereka dengan cepat, memperbaikinya secara lebih cepat, dan belajar dari kesalahan tersebut. Pada akhirnya, keseluruhan organisasi akan terbebas dari hutang teknis, masalah akan diperbaiki segera setelah ditemukan, dan semua pihak di dalam organisasi akan merasa produktif.\u003c/p\u003e\n\u003cp\u003eDalam pengaplikasiannya, DevOps juga memanfaatkan teknologi telemetry untuk memonitor kesalahan yang terjadi pada software. Teknologi ini memungkinkan deteksi dan perbaikan kesalahan dengan cepat sehingga semua sistem dan lingkungan production bekerja sesuai dengan rencana dan memberikan nilai tambah bagi pengguna. Selain itu, DevOps juga menggunakan teknik dark launch dalam merilis produk baru dan fitur-fitur penting. Hal ini memungkinkan tim developers untuk menguji dan mengevaluasi fitur secara berkala dan memastikan bahwa fitur tersebut sesuai dengan tujuan bisnis sebelum dirilis ke publik.\u003c/p\u003e\n\u003cp\u003eDevOps dapat membantu menghindari masalah yang sering terjadi pada saat peluncuran produk baru dan meningkatkan produktivitas tim. Dengan adopsi DevOps, tim dapat bekerja secara mandiri dengan proses pengujian otomatis yang cepat dan terus menerus. Pemantauan terus menerus terhadap lingkungan production dan kode memastikan bahwa masalah dapat terdeteksi dan diperbaiki dengan cepat sehingga peluncuran produk baru menjadi terkontrol, dapat diprediksi, reversibel, dan rendah stres. \u003c/p\u003e\n\u003cp\u003eDalam penggunaan DevOps, tim juga dapat terus belajar dan memperbaiki proses mereka, sehingga dapat mencegah masalah terulang di masa depan. Dalam penggunaan DevOps, setiap proses development produk diperlakukan seperti eksperimen dan menggunakan metode ilmiah untuk memastikan keberhasilannya.\u003c/p\u003e\n\u003cp\u003eDevOps membantu dalam menciptakan lingkungan kerja yang produktif, efektif, dan efisien. Dengan melakukan pengujian secara otomatis di lingkungan yang mirip dengan produksi, tim developers dapat menemukan kesalahan dengan cepat dan memperbaikinya secepat mungkin, sehingga tidak ada masalah teknis yang menumpuk. Teknologi seperti pengumpulan data produksi juga memastikan bahwa setiap masalah dideteksi dan diperbaiki dengan cepat, sehingga dapat meminimalkan kerugian yang disebabkan oleh masalah tersebut.\u003c/p\u003e\n\u003cp\u003eSelain itu, DevOps juga membantu menciptakan lingkungan kerja yang kooperatif dan berbasis kepercayaan. Tim yang bertanggung jawab untuk mencapai tujuan jangka panjang akan terus dipertahankan dan bekerja sama, dan mereka terus mempelajari dan memperbaiki diri. Kultur risiko yang diterapkan juga memotivasi setiap orang untuk berbicara terbuka tentang masalah dan memberikan solusi untuk meningkatkan kinerja tim secara keseluruhan.\u003c/p\u003e\n\u003cp\u003esemua orang di organisasi memiliki tanggung jawab penuh terhadap kualitas pekerjaan mereka. Mereka membangun pengujian otomatis ke dalam pekerjaan sehari-hari dan menggunakan ulasan rekan untuk memastikan bahwa masalah ditangani sebelum mereka dapat memengaruhi pelanggan. Proses ini mengurangi risiko dan memungkinkan pengiriman nilai dengan cepat, dapat diandalkan, dan aman, bahkan membuktikan kepada auditor skeptis bahwa organisasi memiliki sistem pengendalian internal yang efektif.\u003c/p\u003e\n\u003cp\u003eKetika terjadi kesalahan, organisasi melakukan post-mortem yang bebas dari salahkan bukan untuk menghukum siapa pun, tetapi untuk memahami penyebab kecelakaan dan bagaimana mencegahnya di masa depan. Ritual ini memperkuat budaya belajar organisasi. Organisasi juga mengadakan konferensi teknologi internal untuk meningkatkan keterampilan dan memastikan bahwa semua orang selalu mengajar dan belajar.\u003c/p\u003e\n\u003cp\u003eKarena organisasi peduli pada kualitas, mereka bahkan menyuntikkan kesalahan ke dalam lingkungan produksi mereka sehingga mereka dapat belajar bagaimana sistem mereka gagal secara terencana. Organisasi melakukan latihan terencana untuk melatih kegagalan dalam skala besar, secara acak mematikan proses dan server komputasi di produksi, dan menyuntikkan keterlambatan jaringan dan tindakan jahat lainnya untuk memastikan organisasi semakin tangguh. Dengan melakukan ini, organisasi memungkinkan keandalan yang lebih baik, serta pembelajaran dan perbaikan organisasi.\u003c/p\u003e\n\u003cp\u003eDalam dunia ini, setiap orang memiliki kepemilikan dalam pekerjaannya, terlepas dari perannya dalam organisasi teknologi. Mereka memiliki keyakinan bahwa pekerjaan mereka penting dan berkontribusi secara berarti terhadap tujuan organisasi, terbukti dengan lingkungan kerja yang rendah tekanan dan keberhasilan organisasi di pasar. Bukti mereka adalah bahwa organisasi memang menang di pasar.\u003c/p\u003e\n\u003ch3 id=\"beberapa-action-item\"\u003eBeberapa action item\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#beberapa-action-item\"\u003e\u003c/a\u003e\u003c/h3\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eMenerapkan pengukuran (telemetry) secara luas dalam kode dan lingkungan produksi untuk mendeteksi masalah secepat mungkin dan memastikan semuanya berjalan sesuai yang diinginkan, sehingga pelanggan memperoleh nilai dari software yang diciptakan.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMenggunakan teknik dark launch untuk menguji dan mengembangkan fitur baru sebelum diluncurkan, sehingga peluncuran produk dan fitur dapat menjadi rutin dan lebih terkontrol.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMenggunakan fitur toggle atau pengaturan konfigurasi untuk membuat fitur baru terlihat oleh segmen pelanggan yang semakin besar secara otomatis, sehingga perilisan produk menjadi terkendali, terprediksi, dapat dikembalikan, dan rendah stres.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMenciptakan tim yang bertanggung jawab untuk mencapai tujuan jangka panjang, serta membentuk budaya eksperimen dan pembelajaran.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMembangun tes otomatis dalam pekerjaan sehari-hari dan melakukan ulasan rekan untuk memastikan kualitas kerja, serta melaksanakan post-mortem tanpa menyalahkan untuk meningkatkan pemahaman atas penyebab kegagalan dan cara mencegahnya.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMemiliki budaya kolaborasi dan kepercayaan yang tinggi, serta memotivasi orang untuk berbicara tentang masalah dan mengambil risiko dalam menyelesaikan masalah.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMenerapkan praktik resiliensi dengan memasukkan kesalahan yang direncanakan ke dalam lingkungan produksi untuk memahami cara sistem gagal secara terencana, melakukan latihan kegagalan berskala besar, serta memasukkan latensi jaringan dan tindakan lain untuk meningkatkan ketahanan organisasi dan pembelajaran.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eInti dari semua paragraf adalah untuk menciptakan lingkungan kerja yang produktif, kolaboratif, dan terorganisir dengan baik, di mana setiap orang merasa memiliki tanggung jawab atas kualitas pekerjaannya dan dapat belajar dari kesalahan. Hal ini dapat dilakukan dengan menerapkan praktik-praktik yang efektif dalam development produk dan manajemen risiko secara keseluruhan.\u003c/p\u003e\n\u003ch2 id=\"bisnis-value-dari-devops\"\u003eBisnis value dari devops\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bisnis-value-dari-devops\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDevOps memberikan nilai bisnis yang signifikan. Dalam kurun waktu 2013 hingga 2016, sebagai bagian dari State Of DevOps Report dari Puppet Labs, yang ditulis oleh Jez Humble dan Gene Kim, kami mengumpulkan data dari lebih dari dua puluh lima ribu profesional teknologi, dengan tujuan untuk lebih memahami kesehatan dan kebiasaan organisasi pada semua tahap adopsi DevOps.\u003c/p\u003e\n\u003cp\u003eHasil dari pengumpulan data mengejutkan, dimana terungkap bahwa organisasi yang melakukan praktik DevOps dengan kinerja tinggi jauh lebih unggul dari pesaing yang tidak melakukan praktik DevOps dalam beberapa area berikut:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMetrik throughput\u003c/li\u003e\n\u003cli\u003ePenyebaran kode dan perubahan (tiga puluh kali lebih sering)\u003c/li\u003e\n\u003cli\u003eWaktu pengiriman kode dan perubahan (dua ratus kali lebih cepat)\u003c/li\u003e\n\u003cli\u003eMetrik keandalan\u003c/li\u003e\n\u003cli\u003ePenyebaran produksi (tingkat kesuksesan perubahan enam puluh kali lebih tinggi)\u003c/li\u003e\n\u003cli\u003eWaktu rata-rata untuk memulihkan layanan (168 kali lebih cepat)\u003c/li\u003e\n\u003cli\u003eMetrik kinerja organisasi\u003c/li\u003e\n\u003cli\u003eProduktivitas, pangsa pasar, dan tujuan keuntungan (dua kali lebih mungkin untuk melampaui)\u003c/li\u003e\n\u003cli\u003ePertumbuhan kapitalisasi pasar (lebih tinggi 50% dalam tiga tahun)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHasil penelitian dari Puppet Labs' State of DevOps Report dari tahun 2013 hingga 2016. Penelitian ini dilakukan untuk memahami kesehatan dan kebiasaan organisasi pada semua tahap adopsi DevOps. Hasil penelitian menunjukkan bahwa organisasi dengan kinerja tinggi yang menggunakan praktik DevOps jauh lebih unggul dibandingkan dengan pesaing mereka yang tidak memiliki kinerja tinggi dalam beberapa area, seperti throughput metrics, reliability metrics, dan organizational performance metrics.\u003c/p\u003e\n\u003cp\u003eOrganisasi dengan kinerja tinggi lebih lincah dan andal, memberikan bukti empiris bahwa DevOps memungkinkan kita untuk memecahkan konflik inti yang kronis. Mereka mampu melakukan deployment code 30 kali lebih sering, dan waktu yang dibutuhkan untuk berhasil menjalankan produksi adalah 200 kali lebih cepat. Organisasi kinerja tinggi juga lebih mungkin untuk melampaui tujuan keuntungan, pangsa pasar, dan produktivitas dua kali lipat. \u003c/p\u003e\n\u003cp\u003eSelain itu, organisasi kinerja tinggi memiliki pertumbuhan kapitalisasi pasar 50% lebih tinggi selama tiga tahun dan tingkat kepuasan kerja yang lebih tinggi serta tingkat burnout yang lebih rendah. Mereka juga 2,2 kali lebih mungkin merekomendasikan organisasi mereka sebagai tempat kerja yang bagus. Selain itu, organisasi kinerja tinggi juga memiliki hasil keamanan informasi yang lebih baik, dengan mengintegrasikan tujuan keamanan ke dalam semua tahap proses development dan operasi. Mereka menghabiskan 50% lebih sedikit waktu untuk memperbaiki masalah keamanan.\u003c/p\u003e\n\u003cp\u003eInti dari section \"THE BUSINESS VALUE OF DEVOPS\" adalah bahwa DevOps dapat memberikan nilai bisnis yang signifikan melalui peningkatan produktivitas, keandalan, dan kecepatan pengiriman, serta pencapaian tujuan keuntungan, pangsa pasar, dan produktivitas yang lebih tinggi. Hasil survei menunjukkan bahwa organisasi yang mengadopsi praktik DevOps secara lebih terampil cenderung mengungguli pesaing mereka dan mencapai keberhasilan yang lebih besar. Dalam hal ini, DevOps juga membantu memecahkan konflik antara agilitas dan keandalan dalam development dan operasi teknologi.\u003c/p\u003e\n\u003ch2 id=\"devops-helps-scale-developer-productivity\"\u003eDEVOPS HELPS SCALE DEVELOPER PRODUCTIVITY\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#devops-helps-scale-developer-productivity\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDevOps membantu meningkatkan produktivitas developers dalam skala besar. Saat jumlah developers meningkat, produktivitas individu developers seringkali menurun karena masalah komunikasi, integrasi, dan pengujian yang berlebihan. Namun, DevOps menunjukkan bahwa dengan arsitektur yang tepat, praktik teknis yang tepat, dan norma budaya yang tepat, tim developers kecil dapat dengan cepat, aman, dan independen mengembangkan, mengintegrasikan, menguji, dan mendeploy perubahan ke dalam produksi.\u003c/p\u003e\n\u003cp\u003eDevOps dapat membantu organisasi besar dengan ribuan developers menjadi produktif seperti startup, dan tidak seperti metode development tradisional yang menambahkan developers saat proyek terlambat yang justru menurunkan produktivitas individu dan keseluruhan.\u003c/p\u003e\n\u003cp\u003eDalam laporan State of DevOps 2015, tidak hanya mengukur \"jumlah deploy per hari\", tetapi juga \"jumlah deploy per hari per developers\". Laporan ini berasumsi bahwa organisasi high performer mampu meningkatkan jumlah deployment dengan tim yang semakin besar.\u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/sotoy/assets/20230421104421.png\" alt=\"Deployments/day vs. number of developers (Source: Puppet Labs, 2015 State Of DevOps Report.)\"\u003e\u003c/p\u003e\n\u003cp\u003ePada dasarnya, DevOps membantu meningkatkan produktivitas developers. Ketika jumlah developers meningkat, produktivitas individu seringkali menurun karena adanya overhead komunikasi, integrasi, dan pengujian. DevOps menunjukkan bahwa ketika kita memiliki arsitektur yang tepat, praktik teknis yang tepat, dan norma budaya yang tepat, tim kecil developers dapat dengan cepat, aman, dan mandiri mengembangkan, mengintegrasikan, menguji, dan melakukan perubahan ke produksi. \u003c/p\u003e\n\u003cp\u003eSebuah laporan State of DevOps pada tahun 2015 meneliti \"deploys per day\" dan juga \"deploys per day per developer.\" Mereka menghipotesiskan bahwa \u003cstrong\u003ehigh performers akan dapat meningkatkan jumlah deployment saat jumlah tim developers bertambah\u003c/strong\u003e. Dan kenyataannya memang seperti itu. Pada low performers, deploys per day per developer menurun seiring dengan bertambahnya ukuran tim, tetap konstan untuk medium performers, dan meningkat secara linear untuk high performers. Artinya, organisasi yang mengadopsi DevOps dapat meningkatkan jumlah deploys per day secara linear saat mereka meningkatkan jumlah developers, sama seperti yang dilakukan oleh Google, Amazon, dan Netflix.\u003c/p\u003e\n\u003ch2 id=\"bagian-dari-buku-the-devops-handbook\"\u003eBagian dari buku the devops handbook\u003ca aria-hidden=\"true\" class=\"anchor-heading icon-link\" href=\"#bagian-dari-buku-the-devops-handbook\"\u003e\u003c/a\u003e\u003c/h2\u003e\n\u003cp\u003eDalam Bagian I, kami menyajikan sejarah singkat tentang DevOps dan memperkenalkan teori dasarnya serta tema-tema kunci dari pengetahuan yang relevan yang mencakup beberapa dekade. Kami kemudian menyajikan prinsip-prinsip tingkat tinggi dari Tiga Cara: Aliran, Umpan Balik, dan Pembelajaran dan Eksperimen Terus Menerus.\u003c/p\u003e\n\u003cp\u003eBagian II menjelaskan bagaimana dan di mana memulai, dan memperkenalkan konsep-konsep seperti aliran nilai, prinsip dan pola desain organisasi, pola adopsi organisasi, dan studi kasus.\u003c/p\u003e\n\u003cp\u003eBagian III menjelaskan bagaimana mempercepat Aliran dengan membangun dasar dari pipeline deployment kita: memungkinkan pengujian otomatis yang cepat dan efektif, integrasi terus menerus, pengiriman terus menerus, dan perancangan untuk rilis yang rendah risiko.\u003c/p\u003e\n\u003cp\u003eBagian IV membahas bagaimana mempercepat dan memperkuat Umpan Balik dengan menciptakan telemetri produksi yang efektif untuk melihat dan menyelesaikan masalah, lebih baik memperkirakan masalah dan mencapai tujuan, memungkinkan umpan balik sehingga Dev dan Ops dapat dengan aman melakukan perubahan, mengintegrasikan pengujian A/B ke dalam pekerjaan sehari-hari kita, dan menciptakan proses tinjauan dan koordinasi untuk meningkatkan kualitas kerja kita.\u003c/p\u003e\n\u003cp\u003eBagian V menjelaskan bagaimana mempercepat Pembelajaran Terus Menerus dengan membentuk budaya yang adil, mengubah penemuan lokal menjadi perbaikan global, dan menentukan waktu yang tepat untuk menciptakan pembelajaran dan perbaikan organisasi.\u003c/p\u003e\n\u003cp\u003eTerakhir, di Bagian VI, kami menjelaskan bagaimana mengintegrasikan keamanan dan kepatuhan dengan tepat ke dalam pekerjaan sehari-hari kita, dengan mengintegrasikan kontrol keamanan pencegahan ke dalam repositori dan layanan kode sumber bersama, mengintegrasikan keamanan ke dalam pipeline deployment kita, meningkatkan telemetri untuk lebih memungkinkan deteksi dan pemulihan, melindungi pipeline deployment, dan mencapai tujuan manajemen perubahan.\u003c/p\u003e\n\u003cp\u003eDengan mengkodekan praktik-praktik ini, kami berharap dapat mempercepat adopsi praktik DevOps, meningkatkan keberhasilan inisiatif DevOps, dan menurunkan energi aktivasi yang diperlukan untuk transformasi DevOps.\u003c/p\u003e\n\u003chr\u003e\n\u003cstrong\u003eChildren\u003c/strong\u003e\n\u003col\u003e\n\u003cli\u003e\u003ca href=\"/sotoy/notes/book-summaries.the-devops-handbook.part-I-the-three-ways\"\u003ePart I - The Three Ways\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e","noteIndex":{"id":"root","title":"Hello and Welcome! 👋","desc":"","updated":1742030256619,"created":1646842475821,"custom":{"nav_order":0,"permalink":"/"},"fname":"root","type":"note","vault":{"fsPath":"vault"},"contentHash":"453f88f4a5f1ad7629ebb7cc49502125","links":[],"anchors":{"find-more":{"type":"header","text":"Find More","value":"find-more","line":20,"column":0,"depth":2}},"children":["book-summaries","daily","handbook","notes","tags","til","zettel","t58wEmhAtf1GlHmO","suui91xeqz9oleqbmefavfl","2mtiit3qbzjx3fps6j2lrvl","3d3j63sy6aifg2cqmrty2j4","91eqybfohputr1iaxqbsbfe","xfsiepyapo4o9u17mvwwmmz","7udjlx2925dhyxgkrntgcbz","x1aw4xgjnlqqzeww7dkz75g","uq0494ev4mdkmc2k7tantoa","cjzzncwhf8qpuaoz764uzfn","y8jzdhjhhmqub1t9wx5w9e4","ff8zp75qbznut6joziqr1nx"],"parent":null,"data":{},"body":"\nWelcome to the homepage! I use Dendron to store and organize notes, ideas, and experiments I’m working on. Here are the main sections you’ll find on this site:\n\n1. **Learning Notes** — Practical notes on programming, recent technologies, and productivity tips.\n2. **Personal Projects** — Summaries of projects, experiments, and outcomes I’m working on or have completed.\n3. **Writings \u0026 Opinions** — Casual articles and reflections about technology, daily life, and other interesting topics.\n\nI’m constantly experimenting and learning. I hope the content here helps you as a reference, a starting point for discussion, or just light reading.\n\n\u003e Why Dendron?\n\u003e\nDendron helps keep notes organized. Its \"seed\" and \"vault\" concepts make it easy to structure content and find what you need.\n\n## Find More\n\nIf you want to learn more or connect, check these links:\n\n- [Homepage (Dendron)](https://zeihanaulia.github.io/sotoy/)\n- [My GitHub](https://github.com/zeihanaulia)\n- [My Twitter / X](https://x.com/zeihanaulia)\n\nThanks for stopping by. If you have feedback or want to chat, feel free to reach out.\n"},"collectionChildren":null,"customHeadContent":null,"config":{"version":5,"dev":{"enablePreviewV2":true},"commands":{"lookup":{"note":{"selectionMode":"extract","confirmVaultOnCreate":true,"vaultSelectionModeOnCreate":"smart","leaveTrace":false,"bubbleUpCreateNew":true,"fuzzThreshold":0.2}},"randomNote":{},"insertNoteLink":{"aliasMode":"none","enableMultiSelect":false},"insertNoteIndex":{"enableMarker":false},"copyNoteLink":{"aliasMode":"title"},"templateHierarchy":"template"},"workspace":{"dendronVersion":"0.83.0","vaults":[{"fsPath":"vault"},{"fsPath":"templates","seed":"dendron.templates","name":"dendron.templates","visibility":"private"},{"fsPath":"vault2","name":"vault-private","sync":"sync","visibility":"private","remote":{"type":"git","url":"git@github.com:zeihanaulia/journal.git"}}],"journal":{"dailyDomain":"daily","name":"journal","dateFormat":"y.MM.dd","addBehavior":"childOfDomain"},"scratch":{"name":"scratch"
